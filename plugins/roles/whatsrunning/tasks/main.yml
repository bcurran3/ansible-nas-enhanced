---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ whatsrunning_container_name }}"
        hostname: "{{ whatsrunning_container_name }}"
        image: "{{ whatsrunning_image_name }}:{{ whatsrunning_image_tag }}"
        pull: true
        cpu_shares: "{{ whatsrunning_cpu_shares }}"
        volumes:
          - "/var/run/docker.sock:/var/run/docker.sock:ro"
        env:
          HOST_HOSTNAME: "{{ whatsrunning_host_hostname }}"
          VERBOSE: "true"
          TZ: "{{ ansible_nas_timezone }}"
        ports:
          - "{{ whatsrunning_port_http }}:5000"
        labels:
          autoheal: "{{ whatsrunning_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ whatsrunning_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ whatsrunning_homepage_group }}"
          homepage.icon: "{{ whatsrunning_homepage_icon }}"
          homepage.href: "{{ whatsrunning_homepage_href }}"
#         homepage.description: "a barebones webpage showing all docker containers that expose ports"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ whatsrunning_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ whatsrunning_container_name }}"
          homepage.showStats: "{{ whatsrunning_homepage_showStats }}"
          traefik.enable: "{{ whatsrunning_available_externally | string }}"
          traefik.http.routers.whatsrunning.rule: "Host(`{{ whatsrunning_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.whatsrunning.tls.certresolver: "letsencrypt"
          traefik.http.routers.whatsrunning.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.whatsrunning.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ whatsrunning_hostname }}"
          traefik.http.routers.whatsrunning.middlewares: "{{ whatsrunning_hostname }}@docker"
          traefik.http.middlewares.whatsrunning.IPAllowList.sourcerange: "{{ whatsrunning_traefik_whitelist }}"
          traefik.http.services.whatsrunning.loadbalancer.server.port: "5000"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/mikeage/whatsrunning/tags/tags/$${major}.$${minor}.$${patch}"
        memory: "{{ whatsrunning_memory }}"
        restart_policy: unless-stopped
  when: whatsrunning_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ whatsrunning_container_name }}"
        state: absent
  when: whatsrunning_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ whatsrunning_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ whatsrunning_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: whatsrunning_enabled is false and archive_app_data_enabled is true

