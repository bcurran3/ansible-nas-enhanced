---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Get Joplin container state
      community.docker.docker_container_info:
        name: "{{ joplin_container_name }}"
      register: result

    - name: Check Joplin is running
      ansible.builtin.assert:
        that:
          - result.container['State']['Status'] == "running"
          - result.container['State']['Restarting'] == false

    - name: Get Joplin DB container state
      community.docker.docker_container_info:
        name: "{{ joplin_db_container_name }}"
      register: result

    - name: Check Joplin DB is running
      ansible.builtin.assert:
        that:
          - result.container['State']['Status'] == "running"
          - result.container['State']['Restarting'] == false
