---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ striparr_container_name }}"
        hostname: "{{ striparr_container_name }}"
        image: mikenye/striparr
        pull: true
        volumes:
          - "{{ sonarr_tv_directory }}:/tv:rw"
          - "{{ radarr_movies_directory }}:/movies:rw"
        ports:
          - "40000:40000"
        network_mode: bridge
        env:
          TZ: "{{ ansible_nas_timezone }}"
          PUID: "500"
          PGID: "0"
        restart_policy: unless-stopped
        memory: "{{ striparr_memory_limit }}"
        labels:
          autoheal: "{{ striparr_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ striparr_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ striparr_homepage_group }}"
          homepage.icon: "{{ striparr_homepage_icon }}"
          homepage.href: "{{ striparr_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ striparr_port_http }}"
#         homepage.description: "Strips metadata from files downloaded by Sonarr and Radarr."
          homepage.server: "my-docker"
          homepage.container: "{{ striparr_container_name }}"
          homepage.showStats: "{{ striparr_homepage_showStats }}"
          traefik.enable:: "false"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"
  when: striparr_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ striparr_container_name }}"
        state: absent
  when: striparr_enabled is false