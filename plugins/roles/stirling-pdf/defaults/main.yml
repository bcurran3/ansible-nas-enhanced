---
ansible_nas_app_name: "Stirling PDF"

#
stirling_pdf_enabled: false
stirling_pdf_available_externally: false
stirling_pdf_traefik_whitelist: "{{ lan }}"

# network
stirling_pdf_port_http: "3011"
stirling_pdf_hostname: "stirlingpdf"

stirling_pdf_data_directory: "{{ docker_home }}/stirling_pdf"

# docker
stirling_pdf_container_name: "stirling-pdf"
stirling_pdf_memory: "1024m"
stirling_pdf_cpu_shares: "1024"
stirling_pdf_image: ""
stirling_pdf_image_tag: ""

# autoheal
stirling_pdf_autoheal: "false"

# homepage
stirling_pdf_homepage_group: "Apps"
stirling_pdf_homepage_icon: "stirling-pdf.png"
stirling_pdf_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ stirling_pdf_port_http }}"
stirling_pdf_homepage_showStats: "false"

# watchtower
stirling_pdf_watchtower_monitor_only: "true"
