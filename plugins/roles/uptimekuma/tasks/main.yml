---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ uptimekuma_data_directory }}"
        - "{{ uptimekuma_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ uptimekuma_container_name }}"
        hostname: "{{ uptimekuma_container_name }}"
        image: "{{ uptimekuma_image_name }}:{{ uptimekuma_image_tag }}"
        pull: true
        cpu_shares: "{{ uptimekuma_cpu_shares }}"
        volumes:
          - "{{ uptimekuma_data_directory }}/data:/app/data"
          - "/var/run/docker.sock:/var/run/docker.sock"
        ports:
          - "{{ uptimekuma_port_http }}:3001"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ uptimekuma_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ uptimekuma_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ uptimekuma_homepage_group }}"
          homepage.href: "{{ uptimekuma_homepage_href }}"
          homepage.icon: "{{ uptimekuma_homepage_icon }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ uptimekuma_port_http }}"
#         homepage.description: "A fancy self-hosted monitoring tool"
          homepage.server: "my-docker"
          homepage.container: "{{ uptimekuma_container_name }}"
          homepage.showStats: "{{ uptimekuma_homepage_showStats }}"
          homepage.widget.type: "uptimekuma"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ uptimekuma_port_http }}"
          homepage.widget.slug: "{{ uptimekuma_homepage_widget_slug }}"
          traefik.enable: "{{ uptimekuma_available_externally | string }}"
          traefik.http.routers.uptimekuma.rule: "Host(`uptimekuma.{{ ansible_nas_domain }}`)"
          traefik.http.routers.uptimekuma.tls.certresolver: "letsencrypt"
          traefik.http.routers.uptimekuma.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.uptimekuma.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ uptimekuma_hostname }}"
          traefik.http.routers.uptimekuma.middlewares: "{{ uptimekuma_hostname }}@docker"
          traefik.http.middlewares.uptimekuma.IPAllowList.sourcerange: "{{ uptimekuma_traefik_whitelist }}"
          traefik.http.services.uptimekuma.loadbalancer.server.port: "3001"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/louislam/uptime-kuma/releases/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ uptimekuma_memory }}"
        restart_policy: unless-stopped
  when: uptimekuma_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ uptimekuma_container_name }}"
        state: absent
  when: uptimekuma_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ uptimekuma_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ uptimekuma_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: uptimekuma_enabled is false and archive_app_data_enabled is true
