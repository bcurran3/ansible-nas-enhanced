---
- name: Stop osTicket
  docker_container:
    name: "{{ osticket_container_name }}"
    state: absent
  when: osticket_enabled is false
  listen:
    - "stop osticket"
    - "stop disabled applications"

- name: Stop osTicket MariaDB
  docker_container:
    name: "{{ osticket_db_container_name }}"
    state: absent
  when: osticket_enabled is false
  listen:
    - "stop osticket"
    - "stop disabled applications"
