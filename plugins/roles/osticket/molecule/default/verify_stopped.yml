---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Try and stop and remove osTicket
      community.docker.docker_container:
        name: "{{ osticket_container_name }}"
        state: absent
      register: result

    - name: Check osTicket is stopped
      ansible.builtin.assert:
        that:
          - not result.changed

    - name: Try and stop and remove osTicket MariaDB
      community.docker.docker_container:
        name: "{{ osticket_db_container_name }}"
        state: absent
      register: result

    - name: Check osTicket MariaDB is stopped
      ansible.builtin.assert:
        that:
          - not result.changed