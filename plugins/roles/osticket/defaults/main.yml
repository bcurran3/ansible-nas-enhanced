---
ansible_nas_app_name: "osTicket"

#
osticket_enabled: false
osticket_available_externally: false
osticket_traefik_whitelist: "{{ lan }}"
osticket_data_directory: "{{ docker_home }}/osticket"

# network
osticket_hostname: "osticket"
osticket_network_name: "osticket"
osticket_port_http: "8082"

# docker
osticket_container_name: "osticket"
osticket_image_name: "devinsolutions/osticket"
osticket_image_tag: ""
osticket_cpu_shares: "1024"
osticket_memory: "1g"
osticket_db_container_name: "osticket_mariadb"
osticket_db_image_name: "bitnami/mariadb"
osticket_db_image_tag: "latest"
osticket_db_cpu_shares: "1024"
osticket_db_memory: "1g"
# ^ I'd prefer linuxserver/mariadb


# autoheal
osticket_autoheal: "false"
osticket_db_autoheal: "false"

# homepage
osticket_homepage_group: "Apps"
osticket_homepage_icon: "osticket.png"
osticket_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ osticket_port_http }}"
osticket_homepage_showStats: "false"
osticket_db_homepage_group: "DBs"
osticket_db_homepage_icon: "mariadb.png"
osticket_db_homepage_showStats: "false"

# watchtower
osticket_watchtower_monitor_only: "true"
osticket_db_watchtower_monitor_only: "true"