---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ homepage_data_directory }}/"
        - "{{ homepage_data_directory }}/config"
        - "{{ homepage_data_directory }}/config/logs"
        - "{{ homepage_data_directory }}/images"

    - name: Create {{ ansible_nas_app_name }} Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ homepage_container_name }}"
        hostname: "{{ homepage_hostname }}"
        image: "{{ homepage_image_name }}:{{ homepage_image_tag }}"
        pull: true
        cpu_shares: "{{ homepage_cpu_shares }}"
        volumes:
          - "{{ homepage_data_directory }}/config:/app/config"
          - "{{ homepage_data_directory }}/images:/app/public/images"
          - "/var/run/docker.sock:/var/run/docker.sock:ro" # ignores this and uses UTC
        ports:
          - "{{ homepage_port_http }}:3000"
        env:
          HOMEPAGE_ALLOWED_HOSTS: "{{ homepage_allowed_hosts }}"
          LOG_LEVEL: "debug"
          PUID: "{{ homepage_puid }}"
          PGID: "{{ homepage_pgid }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ homepage_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ homepage_watchtower_monitor_only }}"
          traefik.enable: "{{ homepage_available_externally | string }}"
          traefik.http.routers.homepage.rule: "Host(`homepage.{{ ansible_nas_domain }}`)"
          traefik.http.routers.homepage.tls.certresolver: "letsencrypt"
          traefik.http.routers.homepage.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.homepage.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ homepage_hostname }}"
          traefik.http.routers.homepage.middlewares: "{{ homepage_hostname }}@docker"
          traefik.http.middlewares.homepage.IPAllowList.sourcerange: "{{ homepage_traefik_whitelist }}"
          traefik.http.services.homepage.loadbalancer.server.port: "3000"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/gethomepage/homepage/releases/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ homepage_memory }}"
        restart_policy: unless-stopped
  when: homepage_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ homepage_container_name }}"
        state: absent
  when: homepage_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ homepage_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ homepage_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: homepage_enabled is false and archive_app_data_enabled is true
