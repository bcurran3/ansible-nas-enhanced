---
tdarr_node_enabled: false
tdarr_node_available_externally: false

# directories
tdarr_node_data_directory: "{{ docker_home }}/tdarr_node"
tdarr_node_cache_directory: "{{ samba_shares_root }}/dump/tdar_temp"
tdarr_node_configs_directory: "{{ docker_home }}/tdarr_node/configs"
tdarr_node_logs_directory: "{{ docker_home }}/tdarr_node/logs"
tdarr_node_media_directory: "{{ samba_shares_root }}"

# uid / gid
tdarr_node_user_id: "0"
tdarr_node_group_id: "0"

# network
tdarr_node_hostname: "tdarr_node"
tdarr_node_port_http: "8268"
tdarr_node_port_server: "8266"

# docker
tdarr_node_container_name: "tdarr_node"
tdarr_node_memory: "4g"
tdarr_node_cpu_shares: "512" # about half default CPU resources

# homepage
tdarr_node_homepage_group: "Apps"
tdarr_node_homepage_icon: "tdarr.png"
tdarr_node_homepage_showStats: "false"
