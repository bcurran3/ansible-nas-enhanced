---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ musicassistant_data_directory }}"
        - "{{ musicassistant_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ musicassistant_container_name }}"
        hostname: "{{ musicassistant_container_name }}"
        image: "{{ musicassistant_image_name }}:{{ musicassistant_image_tag }}"
        pull: true
        cpu_shares: "{{ musicassistant_cpu_shares }}"
        privileged: true
        volumes:
          - "{{ musicassistant_data_directory }}/data:/data"
          - "{{ music_root }}:/media:ro"
        network_mode: host
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ musicassistant_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ musicassistant_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ musicassistant_homepage_group }}"
          homepage.icon: "{{ musicassistant_homepage_icon }}"
#         homepage.description: "a free, opensource Media library manager that connects to your streaming services and a wide range of connected speakers"
          homepage.server: "my-docker"
          homepage.container: "{{ musicassistant_container_name }}"
          homepage.showStats: "{{ musicassistant_homepage_showStats }}"
          traefik.enable: "false"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ musicassistant_memory }}"
        restart_policy: unless-stopped
  when: musicassistant_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ musicassistant_container_name }}"
        state: absent
  when: musicassistant_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ musicassistant_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ musicassistant_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: musicassistant_enabled is false and archive_app_data_enabled is true
