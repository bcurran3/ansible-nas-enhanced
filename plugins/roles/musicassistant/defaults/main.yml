---
ansible_nas_app_name: "Music Assistant"

#
musicassistant_enabled: false
musicassistant_available_externally: false
musicassistant_traefik_whitelist: "{{ lan }}"
musicassistant_data_directory: "{{ docker_home }}/musicassistant"

# network
musicassistant_hostname: "musicassistant"

# docker
musicassistant_container_name: "music-assistant"
musicassistant_image_name: "ghcr.io/music-assistant/server"
musicassistant_image_tag: ""
musicassistant_cpu_shares: "1024"
musicassistant_memory: "1g"

# autoheal
musicassistant_autoheal: "false"

# homepage
musicassistant_homepage_group: "Apps"
musicassistant_homepage_icon: "musicassistant.png"
musicassistant_homepage_showStats: "false"

# watchtower
musicassistant_watchtower_monitor_only: "true"