---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Try and stop and remove Diskover
      community.docker.docker_container:
        name: "{{ diskover_container_name }}"
        state: absent
      register: result

    - name: Check Diskover is stopped
      ansible.builtin.assert:
        that:
          - not result.changed
