---
- name: Start Karaoke-Forever
  block:
    - name: Create Kavita Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ kavita_data_directory }}"
        - "{{ kavita_data_directory }}/config"

    - name: Kavita Docker Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ kavita_container_name }}"
        hostname: "{{ kavita_container_name }}"
        image: jvmilazz0/kavita:latest
        pull: true
        volumes:
          - "{{ kavita_data_directory }}/config:/kavita/config"
          - "{{ kavita_books_directory }}:/books:ro"
          - "{{ kavita_comics_directory }}:/comics:ro"
        network_mode: "bridge"
        ports:
          - "{{ kavita_port_http }}:5000"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        restart_policy: unless-stopped
        memory: "{{ kavita_memory }}"
        labels:
          com.centurylinklabs.watchtower.monitor-only: "{{ kavita_watchtower_monitor_only }}"
          homepage.group: "{{ kavita_homepage_group }}"
          homepage.name: "Kavita"
          homepage.icon: "{{ kavita_homepage_icon }}"
          homepage.href: "{{ kavita_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ kavita_port_http }}"
#         homepage.description: "Kavita is a fast, feature rich, cross platform reading server."
          homepage.server: "my-docker"
          homepage.container: "kavita"
          homepage.showStats: "{{ kavita_homepage_showStats }}"
          traefik.enable: "{{ kavita_available_externally | string }}"
          traefik.http.routers.kavita.rule: "Host(`{{ kavita_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.kavita.tls.certresolver: "letsencrypt"
          traefik.http.routers.kavita.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.kavita.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ kavita_hostname }}"
          traefik.http.routers.kavita.middlewares: "{{ kavita_hostname }}@docker"
          traefik.http.middlewares.kavita.IPAllowList.sourcerange: "{{ kavita_traefik_whitelist }}"
          traefik.http.services.kavita.loadbalancer.server.port: "5000"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/Kareadita/Kavita/releases/tag/$${major}.$${minor}.$${patch}"
  when: kavita_enabled is true

- name: Stop Kavita
  block:
    - name: Stop Kavita
      community.docker.docker_container:
        name: "{{ kavita_container_name }}"
        state: absent
  when: kavita_enabled is false