---
# WORK IN PROGRESS
- name: Start Nextcloud AIO
  block:
    - name: Create Nextcloud AIO directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ nextcloudaio_data_directory }}"
        - "{{ nextcloudaio_data_directory }}/config"
        - "{{ nextcloudaio_data_directory }}/data"
    #    - "{{ nextcloudaio_data_directory }}/nextcloudaio"
    #    - "{{ nextcloudaio_data_directory }}/nextcloudaio/before-starting"
    #    - "{{ nextcloudaio_data_directory }}/nextcloudaio/pre-installation"
    #    - "{{ nextcloudaio_data_directory }}/nextcloudaio/post-installation"
    #    - "{{ nextcloudaio_data_directory }}/nextcloudaio/pre-upgrade"
    #    - "{{ nextcloudaio_data_directory }}/nextcloudaio/post-upgrade"

    #- name: Create nextcloudaio network
    #  community.docker.docker_network:
    #    name: "{{ nextcloudaio_network_name }}"

    - name: Nextcloud AIO Docker Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ nextcloudaio_container_name }}"
        image: nextcloud/all-in-one:latest
        pull: true
    #    networks:
    #      - name: "{{ nextcloudaio_network_name }}"
    #    network_mode: "{{ nextcloudaio_network_name }}"
        volumes:
          - "nextcloud_aio_mastercontainer:/mnt/docker-aio-config"
          - "{{ nextcloudaio_data_directory }}/data:/mnt/ncdata"
    #      - "{{ nextcloudaio_data_directory }}/config:/mnt/docker-aio-config"
          - "/var/run/docker.sock:/var/run/docker.sock:ro"
    #      - "{{ nextcloudaio_data_directory }}/nextcloudaio:/var/www/html:rw"
    #      - "{{ nextcloudaio_data_directory }}/nextcloudaio/pre-installation:/docker-entrypoint-hooks.d/pre-installation"
    #      - "{{ nextcloudaio_data_directory }}/nextcloudaio/post-installation:/docker-entrypoint-hooks.d/post-installation"
    #      - "{{ nextcloudaio_data_directory }}/nextcloudaio/pre-upgrade:/docker-entrypoint-hooks.d/pre-upgrade"
    #      - "{{ nextcloudaio_data_directory }}/nextcloudaio/post-upgrade:/docker-entrypoint-hooks.d/post-upgrade"
    #      - "{{ nextcloudaio_data_directory }}/nextcloudaio/before-starting:/docker-entrypoint-hooks.d/before-starting"
    #      - "{{ audiobooks_root }}:/media/audiobooks:ro"
    #      - "{{ books_root }}:/media/books:ro"
    #      - "{{ comics_root }}:/media/comics:ro"
    #      - "{{ music_root }}:/media/music:ro"
        ports:
          - "{{ nextcloudaio_port }}:8080"
    #      - "3478:3478"     # TURN server for Talk
        env:
          NEXTCLOUD_DATADIR: "/mnt/ncdata"
    #      nextcloudaio_TRUSTED_DOMAINS: "{{ nextcloudaio_hostname }}.{{ ansible_nas_domain }} localhost"
    #      nextcloudaio_INIT_HTACCESS: "true"
    #      APACHE_DISABLE_REWRITE_IP: "1"  # added
          # - APACHE_PORT=11000 # Is needed when running behind a web server or reverse proxy (like Apache, Nginx and else). See https://github.com/nextcloud/all-in-one/blob/main/reverse-proxy.md
          # - APACHE_IP_BINDING=127.0.0.1 # Should be set when running behind a web server or reverse proxy (like Apache, Nginx and else) that is running on the same host. See https://github.com/nextcloud/all-in-one/blob/main/reverse-proxy.md
          # - COLLABORA_SECCOMP_DISABLED=false # Setting this to true allows to disable Collabora's Seccomp feature. See https://github.com/nextcloud/all-in-one#how-to-disable-collaboras-seccomp-feature
          # - DOCKER_SOCKET_PATH=/var/run/docker.sock # Needs to be specified if the docker socket on the host is not located in the default '/var/run/docker.sock'. Otherwise mastercontainer updates will fail. For macos it needs to be '/var/run/docker.sock'
          # - DISABLE_BACKUP_SECTION=false # Setting this to true allows to hide the backup section in the AIO interface.
          # - NEXTCLOUD_DATADIR=/mnt/ncdata # Allows to set the host directory for Nextcloud's datadir. See https://github.com/nextcloud/all-in-one#how-to-change-the-default-location-of-nextclouds-datadir
          # - NEXTCLOUD_MOUNT=/mnt/ # Allows the Nextcloud container to access the chosen directory on the host. See https://github.com/nextcloud/all-in-one#how-to-allow-the-nextcloud-container-to-access-directories-on-the-host
          # - NEXTCLOUD_UPLOAD_LIMIT=10G # Can be adjusted if you need more. See https://github.com/nextcloud/all-in-one#how-to-adjust-the-upload-limit-for-nextcloud
          # - NEXTCLOUD_MAX_TIME=3600 # Can be adjusted if you need more. See https://github.com/nextcloud/all-in-one#how-to-adjust-the-max-execution-time-for-nextcloud
          # - NEXTCLOUD_MEMORY_LIMIT=512M # Can be adjusted if you need more. See https://github.com/nextcloud/all-in-one#how-to-adjust-the-php-memory-limit-for-nextcloud
          # - NEXTCLOUD_TRUSTED_CACERTS_DIR=/path/to/my/cacerts # CA certificates in this directory will be trusted by the OS of the nexcloud container (Useful e.g. for LDAPS) See See https://github.com/nextcloud/all-in-one#how-to-trust-user-defiend-certification-authorities-ca
          # - NEXTCLOUD_STARTUP_APPS=deck twofactor_totp tasks calendar contacts # Allows to modify the Nextcloud apps that are installed on starting AIO the first time. See https://github.com/nextcloud/all-in-one#how-to-change-the-nextcloud-apps-that-are-installed-on-the-first-startup
          # - NEXTCLOUD_ADDITIONAL_APKS=imagemagick # This allows to add additional packages to the Nextcloud container permanently. Default is imagemagick but can be overwritten by modifying this value. See https://github.com/nextcloud/all-in-one#how-to-add-os-packages-permanently-to-the-nextcloud-container
          # - NEXTCLOUD_ADDITIONAL_PHP_EXTENSIONS=imagick # This allows to add additional php extensions to the Nextcloud container permanently. Default is imagick but can be overwritten by modifying this value. See https://github.com/nextcloud/all-in-one#how-to-add-php-extensions-permanently-to-the-nextcloud-container
          # - NEXTCLOUD_ENABLE_DRI_DEVICE=true # This allows to enable the /dev/dri device in the Nextcloud container which is needed for hardware-transcoding. See https://github.com/nextcloud/all-in-one#how-to-enable-hardware-transcoding-for-nextcloud
          # - TALK_PORT=3478 # This allows to adjust the port that the talk container is using.
          APACHE_PORT: "11000"
          APACHE_IP_BINDING: "0.0.0.0"
        restart_policy: unless-stopped
        memory: "{{ nextcloudaio_memory }}"
        labels:
          autoheal: "{{ nextcloudaio_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ nextcloudaio_watchtower_monitor_only }}"
          traefik.enable: "{{ nextcloudaio_available_externally | string }}"
          traefik.http.routers.nextcloudaio.rule: "Host(`{{ nextcloudaio_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.nextcloudaio.tls.certresolver: "letsencrypt"
          traefik.http.routers.nextcloudaio.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.nextcloudaio.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ nextcloudaio_hostname }}"
          traefik.http.routers.nextcloudaio.middlewares: "{{ nextcloudaio_hostname }}@docker"
          traefik.http.middlewares.nextcloudaio.IPAllowList.sourcerange: "{{ nextcloudaio_traefik_whitelist }}"
          traefik.http.services.nextcloudaio.loadbalancer.server.port: "8080"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"
  when: nextcloudaio_enabled is true

- name: Stop Nextcloud AIO
  block:
    - name: Stop Nextcloud AIO
      community.docker.docker_container:
        name: "{{ nextcloudaio_container_name }}"
        state: absent
  when: nextcloudaio_enabled is false

