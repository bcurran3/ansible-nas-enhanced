#
ntfy_enabled: false
ntfy_available_externally: false
ntfy_traefik_whitelist: "{{ lan }}"
ntfy_data_directory: "{{ docker_home }}/ntfy"

# network
ntfy_hostname: "ntfy"
ntfy_port_http: "3018"

# specs
ntfy_memory_limit: "1G"

# docker
ntfy_container_name: "ntfy"

# autoheal
ntfy_autoheal: "false"

# homepage
ntfy_homepage_group: "Apps"
ntfy_homepage_icon: "ntfy.png"
ntfy_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ ntfy_port_http }}"
ntfy_homepage_showStats: "false"

# watchtower
ntfy_watchtower_monitor_only: "true"