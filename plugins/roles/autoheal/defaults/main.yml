ansible_nas_app_name: "Autoheal"

# specs
autoheal_enabled: false
autoheal_available_externally: false
autoheal_traefik_whitelist: "{{ lan }}"

# docker
autoheal_container_name: "autoheal"
autoheal_image_name: "willfarrell/autoheal"
autoheal_image_tag: "latest"
autoheal_cpu_shares: "1024"
autoheal_memory: "256m"

# homepage
autoheal_homepage_group: "Misc"
autoheal_homepage_icon: "https://www.desdeelreloj.com/content/images/size/w1000/2023/09/ider-0682.jpg"
autoheal_homepage_showStats: "false"

# watchtower
autoheal_watchtower_monitor_only: "true"

# autoheal
autoheal_autoheal: "true"
