---
- name: Start Autoheal
  block:
    - name: Create Autoheal Docker Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ autoheal_container_name }}"
        image: willfarrell/autoheal:latest
        pull: true
        network_mode: "none"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        volumes:
          - "/etc/localtime:/etc/localtime:ro"
          - "/var/run/docker.sock:/var/run/docker.sock"
        restart_policy: unless-stopped
        memory: "{{ autoheal_memory_limit }}"
        labels:
          com.centurylinklabs.watchtower.monitor-only: "{{ autoheal_watchtower_monitor_only }}"
          homepage.name: "Autoheal"
          homepage.group: "{{ autoheal_homepage_group }}"
          homepage.icon: "{{ autoheal_homepage_icon }}"
#         homepage.description: "Monitor and restart unhealthy docker containers."
          homepage.server: "my-docker"
          homepage.container: "autoheal"
          homepage.showStats: "{{ autoheal_homepage_showStats }}"
          traefik.enable: "false"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"
  when: autoheal_enabled is true

- name: Stop Autoheal
  block:
    - name: Stop Autoheal
      community.docker.docker_container:
        name: "{{ autoheal_container_name }}"
        state: absent
  when: autoheal_enabled is false
