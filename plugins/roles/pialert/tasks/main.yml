---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ pialert_data_directory }}"
        - "{{ pialert_data_directory }}/config"
        - "{{ pialert_data_directory }}/db"

    # https://github.com/jokob-sk/Pi.Alert/blob/main/dockerfiles/README.md
    - name: Create {{ ansible_nas_app_name }} Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ pialert_container_name }}"
        hostname: "{{ pialert_container_name }}"
        image: "{{ pialert_image_name }}:{{ pialert_image_tag }}"
        pull: true
        cpu_shares: "{{ pialert_cpu_shares }}"
        volumes:
          - "{{ pialert_data_directory }}/config:/home/pi/pialert/config"
          - "{{ pialert_data_directory }}/db:/home/pi/pialert/db"
        network_mode: host
        env:
    #    HOST_USER_GID: "1000"
    #    HOST_USER_ID: "1000"
          PORT: "20211"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ pialert_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ pialert_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ pialert_homepage_group }}"
          homepage.icon: "{{ pialert_homepage_icon }}"
          homepage.href: "{{ pialert_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ pialert_port_http }}"
#         homepage.description: ""
          homepage.server: "my-docker"
          homepage.container: "{{ pialert_container_name }}"
          homepage.showStats: "{{ pialert_homepage_showStats }}"
          traefik.enable: "{{ pialert_available_externally | string }}"
          traefik.http.routers.pialert.rule: "Host(`{{ pialert_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.pialert.tls.certresolver: "letsencrypt"
          traefik.http.routers.pialert.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.pialert.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ pialert_hostname }}"
          traefik.http.routers.pialert.middlewares: "{{ pialert_hostname }}@docker"
          traefik.http.middlewares.pialert.IPAllowList.sourcerange: "{{ pialert_traefik_whitelist }}"
          traefik.http.services.pialert.loadbalancer.server.port: "20211"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ pialert_memory }}"
        restart_policy: unless-stopped
  when: pialert_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ pialert_container_name }}"
        state: absent
  when: pialert_enabled is false