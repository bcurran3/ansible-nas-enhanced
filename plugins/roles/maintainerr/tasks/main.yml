---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ maintainerr_data_directory }}"
        - "{{ maintainerr_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }} Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ maintainerr_container_name }}"
        hostname: "{{ maintainerr_container_name }}"
        image: "{{ maintainerr_image_name }}:{{ maintainerr_image_tag }}"
        pull: true
        cpu_shares: "{{ maintainerr_cpu_shares }}"
        ports:
          - "{{ maintainerr_port }}:80"
        volumes:
          - "{{ maintainerr_data_directory }}/data:/opt/data"
        env:
          UV_USE_IO_URING: "0"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ maintainerr_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ maintainerr_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ maintainerr_homepage_group }}"
          homepage.icon: "{{ maintainerr_homepage_icon }}"
          homepage.href: "{{ maintainerr_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ maintainerr_port_http }}"
#         homepage.description: "Looks and smells like Overseerr, does the opposite. Maintenance tool for the Plex ecosystem"
          homepage.server: "my-docker"
          homepage.container: "{{ maintainerr_container_name }}"
          homepage.showStats: "{{ maintainerr_homepage_showStats }}"
          traefik.enable: "{{ maintainerr_available_externally | string }}"
          traefik.http.routers.maintainerr.rule: "Host(`{{ maintainerr_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.maintainerr.tls.certresolver: "letsencrypt"
          traefik.http.routers.maintainerr.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.maintainerr.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ maintainerr_hostname }}"
          traefik.http.routers.maintainerr.middlewares: "{{ maintainerr_hostname }}@docker"
          traefik.http.middlewares.maintainerr.IPAllowList.sourcerange: "{{ maintainerr_traefik_whitelist }}"      
          traefik.http.services.maintainerr.loadbalancer.server.port: "80"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/jorenn92/Maintainerr/releases/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ maintainerr_memory }}"
        restart_policy: unless-stopped
  when: maintainerr_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ maintainerr_container_name }}"
        state: absent
  when: maintainerr_enabled is false