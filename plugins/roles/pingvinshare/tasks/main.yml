---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ pingvinshare_data_directory }}"
        - "{{ pingvinshare_data_directory }}/data"
        - "{{ pingvinshare_data_directory }}/data/images"

    - name: Create {{ ansible_nas_app_name }} Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ pingvinshare_container_name }}"
        image: stonith404/pingvin-share
        pull: true
        cpu_shares: "{{ pingvinshare_cpu_shares }}"
        ports:
          - "{{ pingvinshare_port_http }}:3000"
        volumes:
          - "{{ pingvinshare_data_directory }}/data:/opt/app/backend/data"
          - "{{ pingvinshare_data_directory }}/data/images:/opt/app/frontend/public/img"
        network_mode: bridge
        env:
          TZ: "{{ ansible_nas_timezone }}"
        restart_policy: unless-stopped
        memory: "{{ pingvinshare_memory_limit }}"
        labels:
          autoheal: "{{ pingvinshare_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ pingvinshare_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ pingvinshare_homepage_group }}"
          homepage.icon: "{{ pingvinshare_homepage_icon }}"
          homepage.href: "{{ pingvinshare_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ pingvinshare_port_http }}"
#         homepage.description: "A self-hosted file sharing platform that combines lightness and beauty, perfect for seamless and efficient file sharing."
          homepage.server: "my-docker"
          homepage.container: "{{ pingvinshare_container_name }}"
          homepage.showStats: "{{ pingvinshare_homepage_showStats }}"
          traefik.enable: "{{ pingvinshare_available_externally | string }}"
          traefik.http.routers.pingvinshare.rule: "Host(`{{ pingvinshare_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.pingvinshare.tls.certresolver: "letsencrypt"
          traefik.http.routers.pingvinshare.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.pingvinshare.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ pingvinshare_hostname }}"
          traefik.http.routers.pingvinshare.middlewares: "{{ pingvinshare_hostname }}@docker"
          traefik.http.middlewares.pingvinshare.IPAllowList.sourcerange: "{{ pingvinshare_traefik_whitelist }}"
          traefik.http.services.pingvinshare.loadbalancer.server.port: "3000"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"
  when: pingvinshare_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ pingvinshare_container_name }}"
        state: absent
  when: pingvinshare_enabled is false