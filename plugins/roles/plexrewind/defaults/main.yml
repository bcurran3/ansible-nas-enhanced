---
ansible_nas_app_name: "Plex Rewind"

#
plexrewind_enabled: false
plexrewind_available_externally: false
plexrewind_traefik_whitelist: "{{ lan }}"
plexrewind_data_directory: "{{ docker_home }}/plexrewind"

# app
# (required) used to encrypt auth JWT token, generate one with `openssl rand -base64 32`
plexrewind_nextauth_secret: "m07Gw05Gfdb0qeXOPuEGqMaVKIxLTwuXpwE7T14WSNk="
# change to your domain if you are exposing the app to the internet
plexrewind_nextauth_url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ plexrewind_port_http }}"
# change to your domain if you are exposing the app to the internet
plexrewind_next_public_site_url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ plexrewind_port_http }}"
# starting date for "all time" option (YYYY-MM-DD)
plexrewind_next_public_statistics_start_date: "2018-01-01"

# network
plexrewind_hostname: "plexrewind"
plexrewind_port_http: "8383"

# docker
plexrewind_container_name: "plexrewind"
plexrewind_memory_limit: "512m"

# autoheal
plexrewind_autoheal: "false"

# homepage
plexrewind_homepage_group: "Apps"
plexrewind_homepage_icon: "plexrewind.png"
plexrewind_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ plexrewind_port_http }}"
plexrewind_homepage_showStats: "false"

# watchtower
plexrewind_watchtower_monitor_only: "true"