---
ansible_nas_app_name: "Ollama"

#
ollama_enabled: false
ollama_available_externally: false
ollama_traefik_whitelist: "{{ lan }}"

ollama_data_directory: "{{ docker_home }}/ollama"

# network
ollama_port_http: "11434"
ollama_hostname: "ollama"
ollama_openedai_port_http: "11436"
ollama_openedai_hostname: "ollamaopenedai"
ollama_openwebui_port_http: "11435"
ollama_openwebui_hostname: "openwebui"

# docker
ollama_container_name: "ollama"
ollama_image_name: "ollama/ollama"
ollama_image_tag: "latest"
ollama_cpu_shares: "1024"
ollama_memory: "1G"
ollama_openedai_container_name: "ollama-openedai"
ollama_openedai_image_name: "ghcr.io/matatonic/openedai-speech"
ollama_openedai_image_tag: "latest"
ollama_openedai_cpu_shares: "1024"
ollama_openedai_memory: "1G"
ollama_openwebui_container_name: "open-webui"
ollama_openwebui_image_name: "ghcr.io/open-webui/open-webui"
ollama_openwebui_image_tag: "main"
ollama_openwebui_cpu_shares: "1024"
ollama_openwebui_memory: "1G"

# autoheal
ollama_autoheal: "false"
ollama_openedai_autoheal: "false"
ollama_openwebui_autoheal: "false"

# homepage
ollama_homepage_group: "Apps"
ollama_homepage_icon: "ollama.png"
ollama_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ ollama_port_http }}"
ollama_homepage_showStats: "false"
ollama_openedai_homepage_group: "Misc"
ollama_openedai_homepage_icon: "ollama.png"
ollama_openedai_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ ollama_openedai_port_http }}"
ollama_openedai_homepage_showStats: "false"
ollama_openwebui_homepage_group: "Apps"
ollama_openwebui_homepage_icon: "open-webui.png"
ollama_openwebui_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ ollama_openwebui_port_http }}"
ollama_openwebui_homepage_showStats: "false"

# watchtower
ollama_watchtower_monitor_only: "true"
ollama_openedai_watchtower_monitor_only: "true"
ollama_openwebui_watchtower_monitor_only: "true"
