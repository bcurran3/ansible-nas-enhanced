---
### WORK IN PROGRESS
- name: Start Mastodon
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ mastodon_data_directory }}"
        - "{{ mastodon_data_directory }}/data"
        - "{{ mastodon_data_directory }}/db"

    - name: Create {{ ansible_nas_app_name }} network
      community.docker.docker_network:
        name: "{{ mastodon_network_name }}"

    - name: Create {{ ansible_nas_app_name }} Redis Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ mastodon_redis_container_name }}"
        hostname: "{{ mastodon_redis_container_name }}"
        image: redis:7-alpine
        pull: true
        cpu_shares: "{{ mastodon_redis_cpu_shares }}"
        networks:
          - name: "{{ mastodon_network_name }}"
        networks_cli_compatible: "yes"
        network_mode: "bridge"
        volumes:
          - "{{ mastodon_data_directory }}/data:/data"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: ['CMD', 'redis-cli', 'ping']
        restart_policy: unless-stopped
        memory: "{{ mastodon_redis_memory_limit }}"
        command: "redis-server --requirepass topsecret"
        labels:
          autoheal: "{{ mastodon_redis_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ mastodon_redis_watchtower_monitor_only }}"
          traefik.enable: "false"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"

    - name: Create {{ ansible_nas_app_name }} DB Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ mastodon_db_container_name }}"
        hostname: "{{ mastodon_db_container_name }}"
        image: postgres:14-alpine
        pull: true
        cpu_shares: "{{ mastodon_db_cpu_shares }}"
        networks:
          - name: "{{ mastodon_network_name }}"
        networks_cli_compatible: "yes"
        network_mode: "bridge"
        volumes:
          - "{{ mastodon_data_directory }}/db:/var/lib/postgresql/data"
        env:
#          POSTGRES_DB: "mastodon"
#          POSTGRES_USER: "mastodon"
#          POSTGRES_PASSWORD: "mastodon"
          POSTGRES_HOST_AUTH_METHOD: "trust"
          TZ: "{{ ansible_nas_timezone }}"
        restart_policy: unless-stopped
        memory: "{{ mastodon_db_memory_limit }}"
        shm_size: "256m"
        healthcheck:
          test: ['CMD', 'pg_isready', '-U', 'postgres']
        labels:
          autoheal: "{{ mastodon_db_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ mastodon_db_watchtower_monitor_only }}"
          traefik.enable: "false"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"

    - name: Create {{ ansible_nas_app_name }} Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ mastodon_container_name }}"
        hostname: "{{ mastodon_container_name }}"
        image: lscr.io/linuxserver/mastodon:latest
#        image: ghcr.io/mastodon/mastodon:v4.3.0
        pull: true
        cpu_shares: "{{ mastodon_cpu_shares }}"
        networks:
          - name: "{{ mastodon_network_name }}"
        networks_cli_compatible: "yes"
        network_mode: "bridge"
        command: "bundle exec puma -C config/puma.rb"
        env:
          PUID: "1000"
          PGID: "1000"
          LOCAL_DOMAIN: "{{ ansible_nas_domain }}"
          REDIS_HOST: "{{ mastodon_redis_container_name }}"
          REDIS_PORT: "6379"
          ###
          ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: "4AAlMv8xlLW2VkyarE07onGQvxPbbkli"
          ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: "23hpHEmiyrAiSzZgTXJ0fkhNYYJIh9bG"
          ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: "uUDaonavJUigeOyHT8SNGW4dXaGW6Wak"
          ###
          DB_HOST: "{{ mastodon_db_container_name }}"
          DB_USER: "mastodon"
          DB_NAME: "mastodon"
          DB_PASS: "mastodon"
          DB_PORT: "5432"
          ES_ENABLED: "false"
          SECRET_KEY_BASE: "1ef03a1c0c4cf380854e762cb781148ab9bf53c2549aa53290bfed59494f6ffe73096602a6af9b9ddf0e41adbb3b88db92c264a7061ae5d1b35f2f475d4c8f55"
          OTP_SECRET: "81bc1c26a3dd643aedb8bf9afd7b49862bf8041cdb0f1414bdea3a34848c4bd6701eb3006b3c8467f21e391750575e47e5136ff46355cb1e315713e1942a7150"
          VAPID_PRIVATE_KEY: "U1uK2CNwIri4cmpfYhA-BH8k31-ZfJZhgVfKxB3ULxI="
          VAPID_PUBLIC_KEY: "BGg-1xf_cirYJhsjsTnyjWCMb5T1k1fzIOeYNfIxZvJcU7__32g9lEgRAwBEHZ-rdBSeCT3-MkTimNZdGDd_fag="
          SMTP_SERVER: "mail.mrbillsabode.org"
          SMTP_PORT: "25"
          SMTP_LOGIN: ""
          SMTP_PASSWORD: ""
          SMTP_FROM_ADDRESS: "notifications@{{ mastodon_hostname }}.{{ ansible_nas_domain }}"
          S3_ENABLED: "false"
          WEB_DOMAIN: "{{ mastodon_hostname }}.{{ ansible_nas_domain }}" #optional
#          ES_HOST: "es" #optional
#          ES_PORT: "9200" #optional
#          ES_USER: "elastic" #optional
#          ES_PASS: "elastic" #optional
#          S3_BUCKET: "" #optional
#          AWS_ACCESS_KEY_ID: "" #optional
#          AWS_SECRET_ACCESS_KEY: "" #optional
#          S3_ALIAS_HOST: "" #optional
#          SIDEKIQ_ONLY: "false" #optional
#          SIDEKIQ_QUEUE: "" #optional
#          SIDEKIQ_DEFAULT: "false" #optional
#          SIDEKIQ_THREADS: "5" #optional
          DB_POOL: "5" #optional
          TZ: "{{ ansible_nas_timezone }}"
        volumes:
          - "{{ mastodon_data_directory }}/config:/config"
        ports:
          - "{{ mastodon_port_https }}: 443"
        restart_policy: unless-stopped
        healthcheck:
          test: ['CMD-SHELL',"curl -s --noproxy localhost localhost:3000/health | grep -q 'OK' || exit 1"]
        memory: "{{ mastodon_memory_limit }}"
        links:
          - "{{ mastodon_redis_container_name }}"
          - "{{ mastodon_db_container_name }}"
        labels:
          autoheal: "{{ mastodon_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ mastodon_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ mastodon_homepage_group }}"
          homepage.icon: "{{ mastodon_homepage_icon }}"
          homepage.href: "{{ mastodon_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ mastodon_port_http }}"
#         homepage.description: ""
          homepage.server: "my-docker"
          homepage.container: "{{ mastodon_container_name }}"
          homepage.showStats: "{{ mastodon_homepage_showStats }}"
          traefik.enable: "{{ mastodon_available_externally | string }}"
          traefik.http.routers.mastodon.rule: "Host(`{{ mastodon_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.mastodon.tls.certresolver: "letsencrypt"
          traefik.http.routers.mastodon.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.mastodon.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ mastodon_hostname }}"
          traefik.http.routers.mastodon.middlewares: "{{ mastodon_hostname }}@docker"
          traefik.http.middlewares.mastodon.IPAllowList.sourcerange: "{{ mastodon_traefik_whitelist }}"
          traefik.http.services.mastodon.loadbalancer.server.port: "443"
#         https://docs.linuxserver.io/FAQ/#strict-proxy-traefik
          traefik.http.services.mastodon.loadbalancer.serverstransport: "ignorecert"
          traefik.http.services.mastodon.loadbalancer.server.scheme: "https"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"
  when: mastodon_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ mastodon_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} Redris Container
      community.docker.docker_container:
        name: "{{ mastodon_redris_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ mastodon_db_container_name }}"
        state: absent

    - name: Remove {{ ansible_nas_app_name }} network
      community.docker.docker_network:
        name: "{{ mastodon_network_name }}"
        state: absent
  when: mastodon_enabled is false
