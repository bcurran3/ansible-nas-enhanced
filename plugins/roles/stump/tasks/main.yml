---
- name: Start Stump
  block:
    - name: Create Stump Directory
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ stump_data_directory }}"
        - "{{ stump_data_directory }}/config"

    - name: Create Stump Docker Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ stump_container_name }}"
        hostname: "{{ stump_container_name }}"
        image: aaronleopold/stump
        pull: true
        volumes:
          - "{{ stump_data_directory }}/config:/config"
          - "{{ stump_comics_directory }}:/data/comics:ro"
          - "{{ stump_books_directory }}:/data/books:ro"
        ports:
          - "{{ stump_port_http }}:10801"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        restart_policy: unless-stopped
        labels:
          autoheal: "{{ stump_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ stump_watchtower_monitor_only }}"
          homepage.name: "Stump"
          homepage.group: "{{ stump_homepage_group }}"
          homepage.icon: "{{ stump_homepage_icon }}"
          homepage.href: "{{ stump_homepage_href }}"
#         homepage.description: "A free and open source comics, manga and digital book server with OPDS support"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ stump_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ stump_container_name }}"
          homepage.showStats: "{{ stump_homepage_showStats }}"
          traefik.enable: "{{ stump_available_externally | string }}"
          traefik.http.routers.stump.rule: "Host(`stump.{{ ansible_nas_domain }}`)"
          traefik.http.routers.stump.tls.certresolver: "letsencrypt"
          traefik.http.routers.stump.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.stump.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ stump_hostname }}"
          traefik.http.routers.stump.middlewares: "{{ stump_hostname }}@docker"
          traefik.http.middlewares.stump.IPAllowList.sourcerange: "{{ stump_traefik_whitelist }}"
          traefik.http.services.stump.loadbalancer.server.port: "10801"
          stump.tag.include: '^\d+\.\d+\.\d+$$'
          stump.link.template: "https://github.com/stumpapp/stump/releases/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ stump_memory_limit }}"
  when: stump_enabled is true

- name: Stop Stump
  block:
    - name: Stop Stump Container
      community.docker.docker_container:
        name: "{{ stump_container_name }}"
        state: absent
  when: stump_enabled is false
