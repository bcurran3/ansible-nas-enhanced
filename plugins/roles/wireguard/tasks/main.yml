---
- name: Start WireGuard
  block:
    - name: Create WireGuard Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ wireguard_data_directory }}"

    - name: Create WireGuard Docker Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ wireguard_container_name }}"
        hostname: "{{ wireguard_container_name }}"
        image: weejewel/wg-easy:latest
        pull: true
        env: "{{ wireguard_environment_variables }}"
        volumes:
          - "{{ wireguard_data_directory }}:/etc/wireguard"
        ports:
          - "{{ wireguard_port }}: 51820/udp"
          - "{{ wireguard_port_http }}: 51821"
        capabilities:
          - NET_ADMIN
          - SYS_MODULE
        sysctls:
          net.ipv4.conf.all.src_valid_mark=1
          net.ipv4.ip_forward=1
        restart_policy: unless-stopped
        memory: "{{ wireguard_memory_limit }}"
        labels:
          autoheal: "{{ wireguard_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ wireguard_watchtower_monitor_only }}"
          homepage.name: "WireGuard"
          homepage.group: "{{ wireguard_homepage_group }}"
          homepage.icon: "{{ wireguard_homepage_icon }}"
          homepage.href: "{{ wireguard_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ wireguard_port_http }}"
#         homepage.description: "The easiest way to run WireGuard VPN + Web-based Admin UI."
          homepage.server: "my-docker"
          homepage.container: "{{ wireguard_container_name }}"
          homepage.showStats: "{{ wireguard_homepage_showStats }}"
          traefik.enable: "{{ wireguard_available_externally | string }}"
          traefik.http.routers.wireguard.rule: "Host(`{{ wireguard_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.wireguard.tls.certresolver: "letsencrypt"
          traefik.http.routers.wireguard.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.wireguard.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ wireguard_hostname }}"
          traefik.http.routers.wireguard.middlewares: "{{ wireguard_hostname }}@docker"
          traefik.http.middlewares.wireguard.IPAllowList.sourcerange: "{{ wireguard_traefik_whitelist }}"
          traefik.http.services.wireguard.loadbalancer.server.port: "51821"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"
  when: wireguard_enabled is true

- name: Stop WireGuard
  block:
    - name: Stop WireGuard Docker Container
      community.docker.docker_container:
        name: "{{ wireguard_container_name }}"
        state: absent
  when: wireguard_enabled is false