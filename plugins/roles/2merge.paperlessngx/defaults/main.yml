#
paperlessngx_enabled: false
paperlessngx_available_externally: false
paperlessngx_traefik_whitelist: "{{ lan }}"
paperlessngx_data_directory: "{{ docker_home }}/paperlessngx"

# network
paperlessngx_hostname: "paperless"
paperlessngx_port_http: "3010"

# docker
paperlessngx_container_name: "paperless-ngx"
paperlessngx_memory_limit: "1g"

# homepage
paperlessngx_homepage_group: "Apps"
paperlessngx_homepage_icon: "paperlessngx.png"
paperlessngx_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ paperlessngx_port_http }}"
paperlessngx_homepage_showStats: "false"

# watchtower
paperlessngx_watchtower_monitor_only: "true"