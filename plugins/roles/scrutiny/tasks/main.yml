---
# TDL: There are many notification URIs to setup
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ scrutiny_data_directory }}"
        - "{{ scrutiny_data_directory }}/config"
        - "{{ scrutiny_data_directory }}/influxdb"

    - name: Install smartmontools
      apt:
        name: "smartmontools"
        state: present
      register: result
      until: result is succeeded

    - name: Template {{ ansible_nas_app_name }}
      template:
        src: scrutiny.yaml
        dest: "{{ scrutiny_data_directory }}/config/scrutiny.yaml"
      register: template_config

############# WIP to automate ssd/hdd/nvme device detection

    - name: Filter out boot drive and format for Scrutiny
      set_fact:
        scrutiny_devices_found: "{{ ansible_devices | dict2items | selectattr('value.partitions', 'defined') | rejectattr('key', 'equalto', 'sda') | map(attribute='key') | map('regex_replace', '^(.*)$', '/dev/\\1:/dev/\\1') | list }}"
      # Explanation:
      # - ansible_devices:  Accesses the gathered facts about devices.
      # - dict2items: Converts the dictionary of devices into a list of dictionaries, making it easier to filter.
      # - selectattr('value.partitions', 'defined'):  Filters for devices that have partitions (indicating actual disk devices).
      # - rejectattr('key', 'equalto', 'sda'):  Excludes the boot drive (assuming '/dev/sda' is the boot drive). Adjust if your boot drive is named differently.
      # - map(attribute='key'): Extracts the device name (e.g., 'sdb', 'sdc') from each dictionary in the list.
      # - map('regex_replace', '^(.*)$', '/dev/\\1:/dev/\\1'): Formats each device name into the required '/dev/sdx:/dev/sdx' format using a regular expression.
      # - list:  Ensures the final output is a list.

    - name: Debug the scrutiny_devices_found variable
      debug:
        var: scrutiny_devices_found

###################

    - name: Create {{ ansible_nas_app_name }} Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ scrutiny_container_name }}"
        hostname: "{{ scrutiny_container_name }}"
        image: "{{ scrutiny_image_name }}:{{ scrutiny_image_tag }}"
        pull: true
        cpu_shares: "{{ scrutiny_cpu_shares }}"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        volumes:
          - "{{ scrutiny_data_directory }}/config:/opt/scrutiny/config"
          - "{{ scrutiny_data_directory }}/influxdb:/opt/scrutiny/influxdb"
          - "/run/udev:/run/udev:ro"
          - "/etc/timezone:/etc/timezone:ro"
        ports:
          - "{{ scrutiny_port }}: 8080"
        devices: "{{ scrutiny_devices }}"
        capabilities:
          - SYS_RAWIO
          - SYS_ADMIN # NVMe support
        labels:
          autoheal: "{{ scrutiny_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ scrutiny_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ scrutiny_homepage_group }}"
          homepage.href: "{{ scrutiny_homepage_href }}"
          homepage.icon: "{{ scrutiny_homepage_icon }}"
#         homepage.description: "Hard Drive S.M.A.R.T Monitoring, Historical Trends & Real World Failure Thresholds"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ scrutiny_port }}"
          homepage.server: "my-docker"
          homepage.container: "{{ scrutiny_container_name }}"
          homepage.showStats: "{{ scrutiny_homepage_showStats }}"
          homepage.widget.type: "scrutiny"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ scrutiny_port }}"
          traefik.enable: "{{ scrutiny_available_externally | string }}"
          traefik.http.routers.scrutiny.rule: "Host(`{{ scrutiny_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.scrutiny.tls.certresolver: "letsencrypt"
          traefik.http.routers.scrutiny.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.scrutiny.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ scrutiny_hostname }}"
          traefik.http.routers.scrutiny.middlewares: "{{ scrutiny_hostname }}@docker"
          traefik.http.middlewares.scrutiny.IPAllowList.sourcerange: "{{ scrutiny_traefik_whitelist }}"
          traefik.http.services.scrutiny.loadbalancer.server.port: "8080"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/AnalogJ/scrutiny/releases/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ scrutiny_memory }}"
        restart_policy: unless-stopped
  when: scrutiny_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ scrutiny_container_name }}"
        state: absent
  when: scrutiny_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ scrutiny_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ scrutiny_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: scrutiny_enabled is false and archive_app_data_enabled is true
