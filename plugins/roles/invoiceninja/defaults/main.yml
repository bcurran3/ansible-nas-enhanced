---
ansible_nas_app_name: "Invoice Ninja"

#
invoiceninja_enabled: false
invoiceninja_available_externally: false
invoiceninja_traefik_whitelist: "{{ lan }}"
invoiceninja_data_directory: "{{ docker_home }}/invoiceninja"

# network
invoiceninja_hostname: "invoiceninja"
invoiceninja_port_http: "9009"
invoiceninja_network_name: "invoiceninja"

invoiceninja_app_key: "_insert_generated_key_here_"
invoiceninja_db_password: "topsecret"
invoiceninja_in_user_email: "youremail@domain.tld"
invoiceninja_in_password: "yourpassword"

# uid / gid
invoiceninja_user_id: "1500"
invoiceninja_group_id: "1500"

# docker
invoiceninja_container_name: "invoiceninja-web"
invoiceninja_image_name: "nginx"
invoiceninja_image_tag: "latest"
invoiceninja_cpu_shares: "1024"
invoiceninja_memory: "1g"
invoiceninja_db_container_name: "invoiceninja-db"
invoiceninja_db_image_name: "mariadb"
invoiceninja_db_image_tag: "10.11.6"
invoiceninja_db_cpu_shares: "1024"
invoiceninja_db_memory: "1g"
invoiceninja_backend_container_name: "invoiceninja"
invoiceninja_backend_image_name: "invoiceninja/invoiceninja"
invoiceninja_backend_image_tag: "latest"
invoiceninja_backend_cpu_shares: "1024"
invoiceninja_backend_memory: "1g"

# app
invoiceninja_mail_mailer: "smtp"
invoiceninja_mail_host: "smtp.{{ ansible_nas_domain }}"
invoiceninja_mail_port: "25"
invoiceninja_mail_username: "your@email.com"
invoiceninja_mail_password: "your_email_password"
invoiceninja_mail_encryption: "tls"
invoiceninja_mail_from_address: "your@email.com"
invoiceninja_mail_from_name: "Invoice Ninja"

# autoheal
invoiceninja_autoheal: "false"
invoiceninja_db_autoheal: "false"
invoiceninja_backend_autoheal: "false"

# homepage
invoiceninja_homepage_group: "Apps"
invoiceninja_homepage_icon: "invoiceninja.png"
invoiceninja_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ invoiceninja_port_http }}"
invoiceninja_homepage_showStats: "false"
invoiceninja_db_homepage_group: "DBs"
invoiceninja_db_homepage_icon: "mariadb.png"
invoiceninja_db_homepage_showStats: "false"
invoiceninja_backend_homepage_group: "Apps"
invoiceninja_backend_homepage_icon: "invoiceninja.png"
invoiceninja_backend_homepage_showStats: "false"

# watchtower
invoiceninja_watchtower_monitor_only: "true"
invoiceninja_db_watchtower_monitor_only: "true"
