---
- name: Start MKVToolNix
  block:
    - name: Create MKVToolNix Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ mkvtoolnix_data_directory }}"
        - "{{ mkvtoolnix_data_directory }}/config"

    - name: MKVToolNix Docker Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ mkvtoolnix_container_name }}"
        image: jlesage/mkvtoolnix
        pull: true
        volumes:
          - "{{ mkvtoolnix_data_directory }}/config:/config:rw"
          - "{{ mkvtoolnix_storage_directory }}:/storage:rw"
        ports:
          - "{{ mkvtoolnix_port_http }}:5800"
        dns_servers: "{{ ansible_nas_dns }}"
        hostname: "mkvtoolnix"
        env:
          TZ: "{{ ansible_nas_timezone }}"
          USER_ID: "{{ mkvtoolnix_user_id }}"
          GROUP_ID: "{{ mkvtoolnix_group_id }}"
          APP_NICENESS: "10"
          CLEAN_TMP_DIR: "1"
        restart_policy: unless-stopped
        memory: 1g
        labels:
          com.centurylinklabs.watchtower.monitor-only: "{{ mkvtoolnix_watchtower_monitor_only }}"
          homepage.name: "MKVToolNix"
          homepage.group: "{{ mkvtoolnix_homepage_group }}"
          homepage.icon: "{{ mkvtoolnix_homepage_icon }}"
          homepage.href: "{{ mkvtoolnix_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ mkvtoolnix_port_http }}"
#         homepage.description: "Creating and working with Matroska files"
          homepage.server: "my-docker"
          homepage.container: "{{ mkvtoolnix_container_name }}"
          homepage.showStats: "{{ mkvtoolnix_homepage_showStats }}"
          traefik.enable: "{{ mkvtoolnix_available_externally | string }}"
          traefik.http.routers.mkvtoolnix.rule: "Host(`mkvtoolnix.{{ ansible_nas_domain }}`)"
          traefik.http.routers.mkvtoolnix.tls.certresolver: "letsencrypt"
          traefik.http.routers.mkvtoolnix.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.mkvtoolnix.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ mkvtoolnix_hostname }}"
          traefik.http.routers.mkvtoolnix.middlewares: "{{ mkvtoolnix_hostname }}@docker"
          traefik.http.middlewares.mkvtoolnix.IPAllowList.sourcerange: "{{ mkvtoolnix_traefik_whitelist }}"
          traefik.http.services.mkvtoolnix.loadbalancer.server.port: "5800"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"
  when: amkvtoolnix_enabled is true

- name: Stop MKVToolNix
  block:
    - name: Stop acmenator
      community.docker.docker_container:
        name: "{{ mkvtoolnix_container_name }}"
        state: absent
  when: amkvtoolnix_enabled is false