---
ansible_nas_app_name: "MKVToolNix"

#
mkvtoolnix_enabled: false
mkvtoolnix_available_externally: false
mkvtoolnix_traefik_whitelist: "{{ lan }}"

# network
mkvtoolnix_hostname: "mkvtoolnix"

mkvtoolnix_data_directory: "{{ docker_home }}/mkvtoolnix"
mkvtoolnix_storage_directory: "{{ samba_shares_root }}"

mkvtoolnix_port_http: "5808"

mkvtoolnix_user_id: "0"
mkvtoolnix_group_id: "0"

# docker
mkvtoolnix_container_name: "mkvtoolnix"

# autoheal
mkvtoolnix_autoheal: "false"

# homepage
mkvtoolnix_homepage_group: "Apps"
mkvtoolnix_homepage_icon: "mkvtoolnix.png"
mkvtoolnix_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ mkvtoolnix_port_http }}"
mkvtoolnix_homepage_showStats: "false"

# watchtower
mkvtoolnix_watchtower_monitor_only: "true"