---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Get container state HBBS
      community.docker.docker_container_info:
        name: "{{ rustdesk_hbbs_container_name }}"
      register: result_hbbs

    - name: Get container state HBBR
      community.docker.docker_container_info:
        name: "{{ rustdesk_hbbr_container_name }}"
      register: result_hbbr

    - name: Get container state Client
      community.docker.docker_container_info:
        name: "{{ rustdesk_client_container_name }}"
      register: result_client

    - name: Check {{ ansible_nas_app_name }} is running
      ansible.builtin.assert:
        that:
          - result_hbbs.container['State']['Status'] == "running"
          - result_hbbs.container['State']['Restarting'] == false
          - result_hbbr.container['State']['Status'] == "running"
          - result_hbbr.container['State']['Restarting'] == false
          - result_client.container['State']['Status'] == "running"
          - result_client.container['State']['Restarting'] == false