---
# https://github.com/rcourtman/Pulse
# https://github.com/rcourtman/Pulse/blob/main/docs/CONFIGURATION.md
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
        owner: 1000
        group: 1000
      with_items:
        - "{{ pulse_data_directory }}"
        - "{{ pulse_data_directory }}/config"
        - "{{ pulse_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ pulse_container_name }}"
        hostname: "{{ pulse_container_name }}"
        image: "{{ pulse_image_name }}:{{ pulse_image_tag }}"
        pull: true
        cpu_shares: "{{ pulse_cpu_shares }}"
        volumes:
          - "{{ pulse_data_directory }}/config:/usr/src/app/config"
          - "{{ pulse_data_directory }}/data:/usr/src/app/data"
        ports:
          - "{{ pulse_port }}:7655"
        env:
          PROXMOX_TOKEN_ID: "{{ pulse_env_proxmox_token_id }}"
          PROXMOX_TOKEN_SECRET: "{{ pulse_env_proxmox_token_secret }}"
          PBS_HOST: "{{ pulse_env_pbs_host }}"
          PBS_TOKEN_ID: "{{ pulse_env_proxmox_token_id }}"
          PBS_TOKEN_SECRET: "{{ pulse_env_token_secret }}"
          PBS_ALLOW_SELF_SIGNED_CERTS: "{{ pulse_env_pbs_allow_self_signed_certs }}"
          PBS_PORT: "{{ pulse_env_pbs_port }}"
          TZ: "{{ ansible_nas_timezone }}"
        restart_policy: unless-stopped
        memory: "{{ pulse_memory }}"
        labels:
          autoheal: "{{ pulse_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ pulse_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ pulse_homepage_group }}"
          homepage.icon: "{{ pulse_homepage_icon }}"
          homepage.href: "{{ pulse_homepage_href }}"
          homepage.description: "{{ 'A responsive monitoring application for Proxmox VE that displays real-time metrics across multiple nodes' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ pulse_container_name }}"
          homepage.showStats: "{{ pulse_homepage_showStats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ pulse_port }}"
          traefik.enable: "{{ pulse_available_externally | string }}"
          traefik.http.routers.pulse.rule: "Host(`{{ pulse_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.pulse.tls.certresolver: "letsencrypt"
          traefik.http.routers.pulse.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.pulse.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ pulse_hostname }}"
          traefik.http.routers.pulse.middlewares: "{{ pulse_hostname }}@docker"
          traefik.http.middlewares.pulse.IPAllowList.sourcerange: "{{ pulse_traefik_whitelist }}"
          traefik.http.services.pulse.loadbalancer.server.port: "7655"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/rcourtman/Pulse/releases/tag/$${major}.$${minor}.$${patch}"
  when: pulse_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ pulse_container_name }}"
        state: absent
  when: pulse_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ pulse_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ pulse_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: pulse_enabled is false and archive_app_data_enabled is true
