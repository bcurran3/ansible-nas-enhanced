---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Try and stop and remove Rocket.Chat
      community.docker.docker_container:
        name: "{{ rocketchat_container_name }}"
        state: absent
      register: result

    - name: Check Rocket.Chat is stopped
      ansible.builtin.assert:
        that:
          - not result.changed

    - name: Try and stop and remove Rocket.Chat DB
      community.docker.docker_container:
        name: "{{ rocketchat_db_container_name }}"
        state: absent
      register: result

    - name: Check Rocket.Chat DB is stopped
      ansible.builtin.assert:
        that:
          - not result.changed
