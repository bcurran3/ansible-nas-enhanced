---
- name: Stop Rocket.Chat
  docker_container:
    name: "{{ rocketchat_container_name }}"
    state: absent
  when: rocketchat_enabled is false
  listen:
    - "stop rocketchat"
    - "stop disabled applications"
- name: Stop Rocket.Chat DB
  docker_container:
    name: "{{ rocketchat_db_container_name }}"
    state: absent
  when: rocketchat_enabled is false
  listen:
    - "stop rocketchat"
    - "stop disabled applications"
