---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Try and stop and remove {{ ansible_nas_app_name }} w
      community.docker.docker_container:
        name: "{{ magnetico_container_name }}"
        state: absent
      register: result

    - name: Check {{ ansible_nas_app_name }} w is stopped
      ansible.builtin.assert:
        that:
          - not result.changed

    - name: Try and stop and remove {{ ansible_nas_app_name }} d
      community.docker.docker_container:
        name: "{{ magnetico_container2_name }}"
        state: absent
      register: result

    - name: Check {{ ansible_nas_app_name }} d is stopped
      ansible.builtin.assert:
        that:
          - not result.changed
