---
# need sudo touch credentials to config dir
# add admin:$2y$12$yOtVgiZRJ.l9ecjFYPW11e0N19PNs3jcbxDTund57DRs26..jNGaq for admin/topsecret
- name: Start magnetico
  block:
    - name: Create magnetico Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ magnetico_data_directory }}"
        - "{{ magnetico_data_directory }}/config"
        - "{{ magnetico_data_directory }}/data"

    - name: magneticod Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ magnetico_container2_name }}"
        hostname: "{{ magnetico_container2_name }}"
        image: boramalper/magneticod
        pull: true
        volumes:
          - "{{ magnetico_data_directory }}/config:/root/.config/magneticod"
          - "{{ magnetico_data_directory }}/data:/root/.local/share/magneticod"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        command:
          - "--indexer-addr=0.0.0.0:1212"
        restart_policy: unless-stopped
        memory: 1g
        labels:
          autoheal: "{{ magneticod_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ magnetico_watchtower_monitor_only }}"
          homepage.name: "magneticod"
          homepage.group: "{{ magneticod_homepage_group }}"
          homepage.icon: "{{ magneticod_homepage_icon }}"
          homepage.href: "{{ magneticod_homepage_href }}"
#         homepage.description: "Autonomous (self-hosted) BitTorrent DHT search engine suite."
          homepage.server: "my-docker"
          homepage.container: "{{ magnetico_container2_name }}"
          homepage.showStats: "{{ magneticod_homepage_showStats }}"
          traefik.enable: "false"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"

    - name: magneticow Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ magnetico_container_name }}"
        image: boramalper/magneticow
        pull: true
        links:
          - "{{ magnetico_container2_name }}"
        volumes:
          - "{{ magnetico_data_directory }}/data:/root/.local/share/magneticod/"
          - "{{ magnetico_data_directory }}/config:/root/.config/magneticow"
        ports:
          - "{{ magnetico_port_http }}:8080"
        dns_servers: "{{ ansible_nas_dns }}"
        hostname: "{{ magnetico_container_name }}"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        restart_policy: unless-stopped
        memory: 1g
        labels:
          autoheal: "{{ magneticow_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ magnetico_watchtower_monitor_only }}"
          homepage.name: "magnetico"
          homepage.group: "{{ magnetico_homepage_group }}"
          homepage.icon: "{{ magnetico_homepage_icon }}"
          homepage.href: "{{ magnetico_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ magnetico_port_http }}"
#         homepage.description: "Autonomous (self-hosted) BitTorrent DHT search engine suite."
          homepage.server: "my-docker"
          homepage.container: "{{ magnetico_container_name }}"
          homepage.showStats: "{{ magnetico_homepage_showStats }}"
          traefik.enable: "{{ magnetico_available_externally | string }}"
          traefik.http.routers.magnetico.rule: "Host(`magnetico.{{ ansible_nas_domain }}`)"
          traefik.http.routers.magnetico.tls.certresolver: "letsencrypt"
          traefik.http.routers.magnetico.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.magnetico.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ magnetico_hostname }}"
          traefik.http.routers.magnetico.middlewares: "{{ magnetico_hostname }}@docker"
          traefik.http.middlewares.magnetico.IPAllowList.sourcerange: "{{ magnetico_traefik_whitelist }}"
          traefik.http.services.magnetico.loadbalancer.server.port: "8080"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"
  when: magnetico_enabled is true

- name: Stop magnetico
  block:
    - name: Stop magneticow
      community.docker.docker_container:
        name: "{{ magnetico_container_name }}"
        state: absent
    - name: Stop magneticod
      community.docker.docker_container:
        name: "{{ magnetico_container2_name }}"
        state: absent
  when: magnetico_enabled is false