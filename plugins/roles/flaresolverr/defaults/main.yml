#
flaresolverr_enabled: false
flaresolverr_available_externally: false
flaresolverr_traefik_whitelist: "{{ lan }}"

# network
flaresolverr_hostname: "flaresolverr"
flaresolverr_port_http: "8191"

# docker
flaresolverr_container_name: "flaresolverr"
flaresolverr_memory: "512m"

# homepage
flaresolverr_homepage_group: "Apps"
flaresolverr_homepage_icon: "flaresolverr.png"
flaresolverr_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ flaresolverr_port_http }}"
flaresolverr_homepage_showStats: "false"

# watchtower
flaresolverr_watchtower_monitor_only: "true"