#
shoutcast_enabled: false
shoutcast_available_externally: false
shoutcast_traefik_whitelist: "{{ lan }}"

# network
shoutcast_hostname: "shoutcast"

shoutcast_data_directory: "{{ docker_home }}/shoutcast"

shoutcast_media_directory: "{{ music_root }}"

shoutcast_port_http: "8002"

# docker
shoutcast_container_name: "shoutcast"

# autoheal
shoutcast_autoheal: "false"

# homepage
shoutcast_homepage_group: "Apps"
shoutcast_homepage_icon: "shoutcast.png"
shoutcast_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ shoutcast_port_http }}"
shoutcast_homepage_showStats: "false"

# watchtower
shoutcast_watchtower_monitor_only: "true"