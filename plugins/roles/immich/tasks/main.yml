---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ immich_data_directory }}"
        - "{{ immich_data_directory }}/cache"
        - "{{ immich_upload_directory }}"

    - name: Create {{ ansible_nas_app_name }} Network
      community.docker.docker_network:
        name: "{{ immich_network_name }}"

    - name: Create {{ ansible_nas_app_name }} Machine Learning Container
      community.docker.docker_container:
        name: "{{ immich_machinelearning_container_name }}"
        image: "{{ immich_machinelearning_image }}:{{ immich_machinelearning_tag }}"
        pull: true
        cpu_shares: "{{ immich_machinelearning_cpu_shares }}"
        container_default_behavior: no_defaults
#       extends: # uncomment this section for hardware acceleration - see https://immich.app/docs/features/ml-hardware-acceleration
#       file: hwaccel.ml.yml
#       service: cpu # set to one of [armnn, cuda, openvino, openvino-wsl] for accelerated inference - use the `-wsl` version for WSL2 where applicable
        runtime: "{{ 'nvidia' if nvidia_runtime_enabled | bool else omit }}"
        device_requests: "{{
          [{'driver': 'nvidia', 'count': -1, 'capabilities': ['gpu']}]
          if nvidia_runtime_enabled | bool else omit
        }}"
        volumes:
          - "{{ immich_data_directory }}/cache:/cache"
        networks:
          - name: "{{ immich_network_name }}"
        network_mode: "bridge"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ immich_machinelearning_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "true"
          homepage.group: "{{ immich_machinelearning_homepage_group }}"
          homepage.name: "{{ ansible_nas_app_name }} Machine Learning"
          homepage.icon: "{{ immich_machinelearning_homepage_icon }}"
          homepage.href: "{{ immich_homepage_href }}"
          homepage.description: "{{'Immich Machine Learning' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ immich_machinelearning_container_name }}"
          homepage.showStats: "false"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/immich-app/immich/releases/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ immich_machinelearning_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} PostgreSQL Container
      community.docker.docker_container:
        name: "{{ immich_postgres_container_name }}"
        image: "{{ immich_postgres_image }}:{{ immich_postgres_tag }}"
        pull: true
        cpu_shares: "{{ immich_postgres_cpu_shares }}"
        volumes:
          - "{{ immich_data_directory }}/database:/var/lib/postgresql/data"
          - "/etc/timezone:/etc/timezone:ro" # ignores this and reports UTC
        networks:
          - name: "{{ immich_network_name }}"
        network_mode: "bridge"
        networks_cli_compatible: "yes"
        container_default_behavior: no_defaults
        env:
          POSTGRES_PASSWORD: "{{ immich_db_password }}"
          POSTGRES_USER: "{{ immich_db_username }}"
          POSTGRES_DB: "{{ immich_db_name }}"
          POSTGRES_INITDB_ARGS: '--data-checksums'
          PG_DATA: "/var/lib/postgresql/data"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ immich_postgres_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "true"
          homepage.group: "{{ immich_postgres_homepage_group }}"
          homepage.name: "{{ ansible_nas_app_name }} PostgreSQL"
          homepage.icon: "{{ immich_postgres_homepage_icon }}"
          homepage.href: "{{ immich_homepage_href }}"
          homepage.description: "{{ 'PostgreSQL Database Management System' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ immich_postgres_container_name }}"
          homepage.showStats: "false"
          traefik.enable: "false"
#          wud.tag.include: '^\d+\.\d+\.\d+$$'
#          wud.link.template: ""
        memory: "{{ immich_postgres_memory }}"
        restart_policy: always
#        healthcheck:
#          test: ["CMD-SHELL", "pg_isready -d {{ immich_db_name }} -U {{ immich_db_username }}"]
#          interval: 5m
#          start_interval: 30s
#          start_period: 5m
#          retries: 5
#          timeout: 5s

    - name: Create {{ ansible_nas_app_name }} Redis Container
      community.docker.docker_container:
        name: "{{ immich_redis_container_name }}"
        image: "{{ immich_redis_image }}:{{ immich_redis_tag }}"
        pull: true
        cpu_shares: "{{ immich_redis_cpu_shares }}"
        container_default_behavior: no_defaults
        networks:
          - name: "{{ immich_network_name }}"
        network_mode: "bridge"
        networks_cli_compatible: "yes"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: ["CMD-SHELL", "redis-cli ping || exit 1"]
        labels:
          autoheal: "{{ immich_redis_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ immich_watchtower_monitor_only }}"
          homepage.group: "{{ immich_redis_homepage_group }}"
          homepage.name: "Immich Redis"
          homepage.icon: "{{ immich_redis_homepage_icon }}"
          homepage.href: "{{ immich_homepage_href }}"
          homepage.description: "{{ 'Redis' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ immich_redis_container_name }}"
          homepage.showStats: "{{ immich_redis_homepage_showStats }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/redis/redis/releases/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ immich_redis_memory }}"
        restart_policy: always

    - name: Create {{ ansible_nas_app_name }} Server Container
      community.docker.docker_container:
        name: "{{ immich_server_container_name }}"
        hostname: "{{ immich_server_container_name }}"
        image: "{{ immich_server_image }}:{{ immich_server_tag }}"
        pull: true
        cpu_shares: "{{ immich_server_cpu_shares }}"
        container_default_behavior: no_defaults
        volumes:
          - "{{ immich_upload_directory }}:/usr/src/app/upload"
        networks:
          - name: "{{ immich_network_name }}"
        network_mode: "bridge"
        networks_cli_compatible: "yes"
        ports:
          - "{{ immich_port }}:2283"
        env:
          REDIS_HOSTNAME: "{{ immich_redis_container_name }}"
          DB_HOSTNAME: "{{ immich_postgres_container_name }}"
          DB_USERNAME: "{{ immich_db_username }}"
          DB_PASSWORD: "{{ immich_db_password }}"
          DB_DATABASE_NAME: "{{ immich_db_name }}"
          UPLOAD_LOCATION: "./library"
          TZ: "{{ ansible_nas_timezone }}"
#        links:
#          - "{{ immich_machinelearning_container_name }}"
#          - "{{ immich_postgres_container_name }}"
#          - "{{ immich_redis_container_name }}"
#        healthcheck:
#          disable: "false"
        labels:
          autoheal: "{{ immich_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "true"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ immich_homepage_group }}"
          homepage.icon: "{{ immich_homepage_icon }}"
          homepage.href: "{{ immich_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ immich_port }}"
          homepage.description: "{{ 'High performance self-hosted photo and video management solution' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ immich_server_container_name }}"
          homepage.showStats: "{{ immich_homepage_showStats }}"
          homepage.widget.type: "immich"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ immich_port }}"
          homepage.widget.key: "{{ immich_homepage_widget_key }}"
          homepage.widget.version: "2"
          traefik.enable: "{{ immich_available_externally | string }}"
          traefik.http.routers.immich.rule: "Host(`{{ immich_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.immich.tls.certresolver: "letsencrypt"
          traefik.http.routers.immich.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.immich.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ immich_hostname }}"
          traefik.http.routers.immich.middlewares: "{{ immich_hostname }}@docker"
          traefik.http.middlewares.immich.IPAllowList.sourcerange: "{{ immich_traefik_whitelist }}"
          traefik.http.services.immich.loadbalancer.server.port: "2283"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/immich-app/immich/releases/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ immich_server_memory }}"
        restart_policy: unless-stopped
  when: immich_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Server Container
      community.docker.docker_container:
        name: "{{ immich_server_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} Machine Learning Container
      community.docker.docker_container:
        name: "{{ immich_machinelearning_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} Redis Container
      community.docker.docker_container:
        name: "{{ immich_redis_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} PostgreSQL Container
      community.docker.docker_container:
        name: "{{ immich_postgres_container_name }}"
        state: absent

    - name: Delete {{ ansible_nas_app_name }} Network
      community.docker.docker_network:
        name: "{{ immich_network_name }}"
        state: absent
  when: immich_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ immich_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ immich_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: immich_enabled is false and archive_app_data_enabled is true
