---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ qdirstat_data_directory }}"
        - "{{ qdirstat_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ qdirstat_container_name }}"
        hostname: "{{ qdirstat_container_name }}"
        image: "{{ qdirstat_image_name }}:{{ qdirstat_image_tag }}"
        pull: true
        cpu_shares: "{{ qdirstat_cpu_shares }}"
        volumes:
          - "{{ qdirstat_data_directory }}/config:/config:rw"
          - "{{ qdirstat_storage_directory }}:/storage:ro"
        ports:
          - "{{ qdirstat_port_http }}:5800"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ qdirstat_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ qdirstat_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ qdirstat_homepage_group }}"
          homepage.href: "{{ qdirstat_homepage_href }}"
          homepage.icon: "{{ qdirstat_homepage_icon }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ qdirstat_port_http }}"
          homepage.description: "{{ 'Qt-based directory statistics' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ qdirstat_container_name }}"
          homepage.showStats: "{{ qdirstat_homepage_showStats }}"
          traefik.enable: "{{ qdirstat_available_externally | string }}"
          traefik.http.routers.qdirstat.rule: "Host(`qdirstat.{{ ansible_nas_domain }}`)"
          traefik.http.routers.qdirstat.tls.certresolver: "letsencrypt"
          traefik.http.routers.qdirstat.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.qdirstat.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ qdirstat_hostname }}"
          traefik.http.routers.qdirstat.middlewares: "{{ qdirstat_hostname }}@docker"
          traefik.http.middlewares.qdirstat.IPAllowList.sourcerange: "{{ qdirstat_traefik_whitelist }}"
          traefik.http.services.qdirstat.loadbalancer.server.port: "5800"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/jlesage/docker-qdirstat/releases/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ qdirstat_memory }}"
        restart_policy: unless-stopped
  when: qdirstat_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ qdirstat_container_name }}"
        state: absent
  when: qdirstat_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ qdirstat_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ qdirstat_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: qdirstat_enabled is false and archive_app_data_enabled is true
