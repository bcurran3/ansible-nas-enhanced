#
cleanuperr_enabled: false
cleanuperr_available_externally: false
cleanuperr_traefik_whitelist: "{{ lan }}"
cleanuperr_data_directory: "{{ docker_home }}/cleanuperr"

# network
cleanuperr_hostname: "cleanuperr"

# specs
cleanuperr_memory_limit: "512M"

# docker
cleanuperr_container_name: "cleanuperr"

# homepage
cleanuperr_homepage_group: "Media Management"
cleanuperr_homepage_icon: "cleanuperr.png"
cleanuperr_homepage_showStats: "false"

# watchtower
cleanuperr_watchtower_monitor_only: "true"
