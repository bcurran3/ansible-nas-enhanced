---
### USE VERSION NOW WITH ANSIBLE NAS
- name: Create Paperless-ngx Directories
  file:
    path: "{{ item }}"
    state: directory
  with_items:
    - "{{ paperlessngx_data_directory }}"
    - "{{ paperlessngx_data_directory }}/redis"
    - "{{ paperlessngx_data_directory }}/postgress"
    - "{{ paperlessngx_data_directory }}/data"
    - "{{ paperlessngx_data_directory }}/media"
    - "{{ paperlessngx_data_directory }}/consume"
    - "{{ paperlessngx_data_directory }}/export"

- name: Create Paperless-ngx network
  community.docker.docker_network:
    name: "paperlessngx"

- name: Create Paperless-ngx Redis Docker Container
  docker_container:
    container_default_behavior: no_defaults
    pull: true
    image: docker.io/library/redis:7
    name: paperless-ngx_broker
    hostname: "broker"
    volumes:
      - "{{ paperlessngx_data_directory }}/redis:/data"
    networks:
      - name: "paperlessngx"
    networks_cli_compatible: "yes"
    network_mode: bridge
    restart_policy: unless-stopped
    labels:
      com.centurylinklabs.watchtower.monitor-only: "{{ paperlessngx_watchtower_monitor_only }}"
      traefik.enable: "false"
#     wud.tag.include: '^\d+\.\d+\.\d+$$'
#     wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"

- name: Create Paperless-ngx PostgreSQL Docker Container
  docker_container:
    image: docker.io/library/postgres:15
    name: paperless-ngx_db
    hostname: "db"
    pull: true
    volumes:
      - "{{ paperlessngx_data_directory }}/postgress:/var/lib/postgresql/data"
    networks:
      - name: "paperlessngx"
    networks_cli_compatible: "yes"
    network_mode: bridge
    container_default_behavior: no_defaults
    env:
      POSTGRES_DB: "paperless"
      POSTGRES_USER: "paperless"
      POSTGRES_PASSWORD: "paperless"
    restart_policy: unless-stopped
    labels:
      com.centurylinklabs.watchtower.monitor-only: "{{ paperlessngx_watchtower_monitor_only }}"
      traefik.enable: "false"
#     wud.tag.include: '^\d+\.\d+\.\d+$$'
#     wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"

- name: Create Paperless-ngx Docker Container
  docker_container:
    name: "{{ paperlessngx_container_name }}"
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    pull: true
    container_default_behavior: no_defaults
    links:
      - paperless-ngx_db
      - paperless-ngx_broker
    ports:
      - "{{ paperlessngx_port_http }}:8000"
    volumes:
      - "{{ paperlessngx_data_directory }}/data:/usr/src/paperless/data"
      - "{{ paperlessngx_data_directory }}/media:/usr/src/paperless/media"
      - "{{ paperlessngx_data_directory }}/consume:/usr/src/paperless/consume"
      - "{{ paperlessngx_data_directory }}/export:/usr/src/paperless/export"
    networks:
      - name: "paperlessngx"
    networks_cli_compatible: "yes"
    network_mode: bridge
    env:
      PAPERLESS_REDIS: "redis://broker:6379"
      PAPERLESS_DBHOST: "db"
      PAPERLESS_ADMIN_USER: "admin"
      PAPERLESS_CORS_ALLOWED_HOSTS: "{{ ansible_nas_domain }}"
      ###########
      PAPERLESS_SECRET_KEY: "WNybhkDZT7TfkAu9Yn3RaBCWC68JMHJw"
      ##########
      PAPERLESS_URL: "https://{{ paperlessngx_hostname }}.{{ ansible_nas_domain }}"
      TZ: "{{ ansible_nas_timezone }}"
    restart_policy: unless-stopped
    memory: "{{ paperlessngx_memory_limit }}"
    healthcheck:
      test: ["CMD", "curl", "-fs", "-S", "--max-time", "2", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5
    labels:
      com.centurylinklabs.watchtower.monitor-only: "{{ paperlessngx_watchtower_monitor_only }}"
      traefik.enable: "{{ paperlessngx_available_externally | string }}"
      traefik.http.routers.paperless.rule: "Host(`{{ paperlessngx_hostname }}.{{ ansible_nas_domain }}`)"
      traefik.http.routers.paperless.tls.certresolver: "letsencrypt"
      traefik.http.routers.paperless.tls.domains[0].main: "{{ ansible_nas_domain }}"
      traefik.http.routers.paperless.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
      traefik.http.routers.frontend.middlewares: "{{ paperlessngx_hostname }}"
      traefik.http.routers.paperless.middlewares: "{{ paperlessngx_hostname }}@docker"
      traefik.http.middlewares.paperless.IPAllowList.sourcerange: "{{ paperlessngx_traefik_whitelist }}"
      traefik.http.services.paperless.loadbalancer.server.port: "8000"
