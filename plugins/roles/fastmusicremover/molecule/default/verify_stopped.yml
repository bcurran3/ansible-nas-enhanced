---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Try and stop and remove Fast Music Remover
      community.docker.docker_container:
        name: "{{ fastmusicremover_container_name }}"
        state: absent
      register: result

    - name: Check Fast Music Remover is stopped
      ansible.builtin.assert:
        that:
          - not result.changed
