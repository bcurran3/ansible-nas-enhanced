#
chowdown_enabled: false
chowdown_available_externally: false
chowdown_traefik_whitelist: "{{ lan }}"
chowdown_data_directory: "{{ docker_home }}/chowdown"

# network
chowdown_hostname: "chowdown"
chowdown_port_http: "4000"

# docker
chowdown_container_name: "chowdown"

# homepage
chowdown_homepage_group: "Apps"
chowdown_homepage_icon: "chowdown.png"
chowdown_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ chowdown_port_http }}"
chowdown_homepage_showStats: "false"

# watchtower
chowdown_watchtower_monitor_only: "true"