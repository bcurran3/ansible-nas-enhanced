#
flood_enabled: false
flood_available_externally: false
flood_data_directory: "{{ docker_home }}/flood"
flood_traefik_whitelist: "{{ lan }}"

# network
flood_hostname: "flood"
flood_port_http: "3003"
flood_memory_limit: "512m"

# docker
flood_container_name: "flood"

# homepage
flood_homepage_group: "Apps"
flood_homepage_icon: "flood.png"
flood_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ flood_port_http }}"
flood_homepage_showStats: "false"
flood_homepage_widget_username: "your username"
flood_homepage_widget_password: "your password"

# watchtower
flood_watchtower_monitor_only: "true"