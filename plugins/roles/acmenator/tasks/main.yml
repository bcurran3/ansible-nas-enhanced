---
- name: Start acmenator
  block:
    - name: Create acmenator Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ acmenator_data_directory }}"

    - name: Create acmenator Docker Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ acmenator_container_name }}"
        image: ummecasino/acmenator:latest
        pull: true
        network_mode: "bridge"
        volumes:
          - "{{ traefik_data_directory }}/letsencrypt/acme.json:/traefik.json:ro"
#         - "{{ acmenator_traefik_directory }}/acme.json:/traefik.json:ro"
#         - "/data/docker/traefik/letsencrypt/acme.json:/traefik.json:ro"
          - "{{ acmenator_data_directory }}:/target"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        command: "-input /traefik.json -outdir /target -pem -pkcs -watch"
        restart_policy: unless-stopped
        memory: "{{ acmenator_memory_limit }}"
        labels:
          autoheal: "{{ acmenator_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ acmenator_watchtower_monitor_only }}"
          homepage.group: "{{ acmenator_homepage_group }}"
          homepage.name: "acmenator"
          homepage.icon: "{{ acmenator_homepage_icon }}"
#         homepage.description: "Convert Traefik certs to PEM or p12"
          homepage.server: "my-docker"
          homepage.container: "acmenator"
          homepage.showStats: "{{ acmenator_homepage_showStats }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/ummecasino/acmenator/releases/tag/$${major}.$${minor}.$${patch}"
  when: acmenator_enabled is true

- name: Stop acmenator
  block:
    - name: Stop acmenator
      community.docker.docker_container:
        name: "{{ acmenator_container_name }}"
        state: absent
  when: acmenator_enabled is false
