#
banban_enabled: false
banban_available_externally: false
banban_traefik_whitelist: "{{ lan }}"

# network
banban_port_http: "3028"
banban_hostname: "banban"

banban_data_directory: "{{ docker_home }}/banban"

# docker
banban_container_name: "banban"
banban_memory: "1G"

# autoheal
banban_autoheal: "false"

# homepage
banban_homepage_group: "Apps"
banban_homepage_icon: "banban.png"
banban_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ banban_port_http }}"
banban_homepage_showStats: "false"

# watchtower
banban_watchtower_monitor_only: "true"
