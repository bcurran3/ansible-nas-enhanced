---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ banban_data_directory }}"
        - "{{ banban_data_directory }}/db"
        - "{{ banban_data_directory }}/storage"

    - name: Create {{ ansible_nas_app_name }} Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ banban_container_name }}"
        hostname: "{{ banban_container_name }}"
        image: "{{ banban_image_name }}:{{ banban_image_tag }}"
        pull: true
        cpu_shares: "{{ banban_cpu_shares }}"
        volumes:
          - "{{ banban_data_directory }}/db:/app/prisma/db"
          - "{{ banban_data_directory }}/storage:/app/storage"
        ports:
          - "{{ banban_port_http }}:{{ banban_port_http }}"
        env:
          DATABASE_URL: "file:./db/banban.db"
          PORT: "{{ banban_port_http }}"
          NODE_ENV: "production"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ banban_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ banban_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ banban_homepage_group }}"
          homepage.icon: "{{ banban_homepage_icon }}"
          homepage.href: "{{ banban_homepage_href }}"
    #     homepage.description: "Self hosted Kanban board tool"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ banban_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ banban_container_name }}"
          homepage.showStats: "{{ banban_homepage_showStats }}"
          traefik.enable: "{{ banban_available_externally | string }}"
          traefik.http.routers.banban.rule: "Host(`banban.{{ ansible_nas_domain }}`)"
          traefik.http.routers.banban.tls.certresolver: "letsencrypt"
          traefik.http.routers.banban.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.banban.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ banban_hostname }}"
          traefik.http.routers.banban.middlewares: "{{ banban_hostname }}@docker"
          traefik.http.middlewares.banban.IPAllowList.sourcerange: "{{ banban_traefik_whitelist }}"
          traefik.http.services.banban.loadbalancer.server.port: "{{ banban_port_http }}"
          banban.tag.include: '^\d+\.\d+\.\d+$$'
          banban.link.template: "https://github.com/m0g/banban/releases/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ banban_memory }}"
        restart_policy: unless-stopped
  when: banban_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ banban_container_name }}"
        state: absent
  when: banban_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ banban_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ banban_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: banban_enabled is false and archive_app_data_enabled is true
