---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Try and stop and remove Koillection
      community.docker.docker_container:
        name: "{{ koillection_container_name }}"
        state: absent
      register: result

    - name: Check koillection is stopped
      ansible.builtin.assert:
        that:
          - not result.changed

    - name: Try and stop and remove Koillection DB
      community.docker.docker_container:
        name: "{{ koillection_db_container_name }}"
        state: absent
      register: result

    - name: Check Koillection DB is stopped
      ansible.builtin.assert:
        that:
          - not result.changed
