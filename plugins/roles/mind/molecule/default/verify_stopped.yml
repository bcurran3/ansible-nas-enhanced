---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Try and stop and remove MIND
      community.docker.docker_container:
        name: "{{ mind_container_name }}"
        state: absent
      register: result

    - name: Check MIND is stopped
      ansible.builtin.assert:
        that:
          - not result.changed
