---
- name: Start Tdarr Node
  block:
    - name: Create Tdarr Node Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ tdarr_node_data_directory }}"
        - "{{ tdarr_node_data_directory }}/configs"
        - "{{ tdarr_node_data_directory }}/logs"
        - "{{ tdarr_node_cache_directory }}"
        - "{{ tdarr_node_media_directory }}"

    - name: Create Tdarr Node Docker Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ tdarr_node_container_name }}"
        hostname: "{{ tdarr_node_container_name }}"
        image: ghcr.io/haveagitgat/tdarr_node:latest
        network_mode: "bridge"
        log_options:
          driver: json-file
          options:
            max-file: 10
            max-size: 200k
        pull: true
        volumes:
          - "{{ tdarr_node_data_directory }}/configs:/app/configs"
          - "{{ tdarr_node_data_directory }}/logs:/app/logs"
          - "{{ tdarr_node_cache_directory }}:/temp"
          - "{{ tdarr_node_media_directory }}:/media"
        ports:
          - "{{ tdarr_node_port_http }}:8268"
        cpu_shares: "{{ tdarr_node_cpu_shares }}"
        devices:
          - "/dev/dri/:/dev/dri/"
        env:
          nodeName: "{{ ansible_nas_hostname }} Node"
          serverIP: "192.168.69.15"
          serverPort: "{{ tdarr_node_port_server }}"
          inContainer: "true"
          ffmpegVersion: "6"
          PUID: "{{ tdarr_node_user_id }}"
          PGID: "{{ tdarr_node_group_id }}"
          NVIDIA_DRIVER_CAPABILITIES: "all"
          NVIDIA_VISIBLE_DEVICES: "all"
          gpus: "all"                 # <----- probably wrong
          TZ: "{{ ansible_nas_timezone }}"
        restart_policy: unless-stopped
        memory: "{{ tdarr_node_memory }}"
        labels:
          com.centurylinklabs.watchtower.monitor-only: "{{ tdarr_node_watchtower_monitor_only }}"
          homepage.name: "Tdarr Node"
          homepage.group: "{{ tdarr_node_homepage_group }}"
          homepage.icon: "{{ tdarr_node_homepage_icon }}"
#         homepage.description: "Tdarr Node"
          homepage.server: "my-docker"
          homepage.container: "{{ tdarr_node_container_name }}"
          homepage.showStats: "{{ tdarr_node_homepage_showStats }}"
          traefik.enable: "false"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"
  when: tdarr_node_enabled is true

- name: Stop Tdarr Node
  block:
    - name: Stop Tdarr Node
      community.docker.docker_container:
        name: "{{ tdarr_node_container_name }}"
        state: absent
  when: tdarr_node_enabled is false