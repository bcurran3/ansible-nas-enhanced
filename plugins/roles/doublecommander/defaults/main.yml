---
ansible_nas_app_name: "Double Commander"
#
doublecommander_enabled: false
doublecommander_available_externally: false
doublecommander_traefik_whitelist: "{{ lan }}"
doublecommander_data_directory: "{{ docker_home }}/doublecommander"

# app config
doublecommander_browse_directory: "/"
doublecommander_user_id: "1000"
doublecommander_group_id: "1000"

# network
doublecommander_hostname: "doublecommander"
doublecommander_port_http: "3006"

# docker
doublecommander_container_name: "doublecommander"
doublecommander_image_name: "lscr.io/linuxserver/doublecommander"
doublecommander_image_tag: "latest"
doublecommander_cpu_shares: "1024"
doublecommander_memory: "512m"

# autoheal
doublecommander_autoheal: "false"

# homepage
doublecommander_homepage_group: "Apps"
doublecommander_homepage_icon: "doublecommander.png"
doublecommander_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ doublecommander_port_http }}"
doublecommander_homepage_showStats: "false"

# watchtower
doublecommander_watchtower_monitor_only: "true"