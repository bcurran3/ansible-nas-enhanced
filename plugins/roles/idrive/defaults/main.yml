---
ansible_nas_app_name: "IDrive"

#
idrive_enabled: false
idrive_available_externally: false
idrive_traefik_whitelist: "{{ lan }}"
idrive_data_directory: "{{ docker_home }}/idrive"

# docker
idrive_container_name: "idrive"
idrive_memory: "1g"
idrive_cpu_shares: "1024"
idrive_image_name: "renofischa/idrive" # not up-to-date
idrive_image_tag: "latest"
# SWITCH TO THIS - but need to migrate path diffs
#idrive_image_name: "ghcr.io/snorre-k/idrive-docker"
#idrive_image_tag: "latest"

# autoheal
idrive_autoheal: "false"

# homepage
idrive_homepage_group: "Apps"
idrive_homepage_icon: "https://cdn-icons-png.flaticon.com/512/873/873125.png"
idrive_homepage_showStats: "false"
idrive_homepage_href: "https://www.idrive.com/"

# watchtower
idrive_watchtower_monitor_only: "true"