# https://bitmagnet.io/setup/installation.html
---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ bitmagnet_data_directory }}"
        - "{{ bitmagnet_data_directory }}/config"
        - "{{ bitmagnet_data_directory }}/db"

    - name: Create {{ ansible_nas_app_name }} DB Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ bitmagnet_db_container_name }}"
        hostname: "{{ bitmagnet_db_container_name }}"
        image: "{{ bitmagnet_db_image_name }}:{{ bitmagnet_db_image_tag }}"
        pull: true
        cpu_shares: "{{ bigmagnet_db_cpu_shares }}"
        volumes:
          - "{{ bitmagnet_data_directory }}/db:/var/lib/postgresql/data"
        env:
          POSTGRES_PASSWORD: "bitmagnet"
          POSTGRES_DB: "bitmagnet"
          PGUSER: "postgres"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test:
            - CMD-SHELL
            - pg_isready
          start_period: 20s
          interval: 10s
        labels:
          autoheal: "{{ bitmagnet_db_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ bitmagnet_db_watchtower_monitor_only }}"
          homepage.name: "bitmagnet PostGreSQL"
          homepage.group: "{{ bitmagnet_db_homepage_group }}"
          homepage.icon: "{{ bitmagnet_db_homepage_icon }}"
          homepage.href: "{{ bitmagnet_homepage_href }}"
          homepage.server: "my-docker"
          homepage.container: "{{ bitmagnet_db_container_name }}"
          homepage.showStats: "{{ bitmagnet_db_homepage_showStats }}"
          traefik.enable: "false"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/postgres/postgres/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ bitmagnet_db_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ bitmagnet_container_name }}"
        hostname: "{{ bitmagnet_container_name }}"
        image: "{{ bitmagnet_image_name }}:{{ bitmagnet_image_tag }}"
        pull: true
        cpu_shares: "{{ bitmagnet_cpu_shares }}"
        volumes:
          - "{{ bitmagnet_data_directory }}/config:/root/.config/bitmagnet"
        links:
          - "{{ bitmagnet_db_container_name }}"
        ports:
          - "{{ bitmagnet_port_http }}:3333"
          - "{{ bitmagnet_port_http2 }}:3334"
          - "{{ bitmagnet_port_http2 }}:3334/udp"
        env:
          POSTGRES_HOST: "{{ bitmagnet_db_container_name }}"
          POSTGRES_PASSWORD: "bitmagnet"
          TMDB_API_KEY: "{{ bitmagnet_tmdb_api_key }}"
          TZ: "{{ ansible_nas_timezone }}"
        command: worker run --keys=http_server --keys=queue_server --keys=dht_crawler
        labels:
          autoheal: "{{ bitmagnet_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ bitmagnet_watchtower_monitor_only }}"
          homepage.name: "bitmagnet"
          homepage.group: "{{ bitmagnet_homepage_group }}"
          homepage.icon: "{{ bitmagnet_homepage_icon }}"
          homepage.href: "{{ bitmagnet_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ bitmagnet_port_http }}"
#         homepage.description: "A self-hosted BitTorrent indexer, DHT crawler, content classifier and torrent search engine with web UI, GraphQL API and Servarr stack integration."
          homepage.server: "my-docker"
          homepage.container: "{{ bitmagnet_container_name }}"
          homepage.showStats: "{{ bitmagnet_homepage_showStats }}"
          traefik.enable: "{{ bitmagnet_available_externally | string }}"
          traefik.http.routers.bitmagnet.rule: "Host(`{{ bitmagnet_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.bitmagnet.tls.certresolver: "letsencrypt"
          traefik.http.routers.bitmagnet.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.bitmagnet.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ bitmagnet_hostname }}"
          traefik.http.routers.bitmagnet.middlewares: "{{ bitmagnet_hostname }}@docker"
          traefik.http.middlewares.bitmagnet.IPAllowList.sourcerange: "{{ bitmagnet_traefik_whitelist }}"
          traefik.http.services.bitmagnet.loadbalancer.server.port: "3333"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/bitmagnet-io/bitmagnet/releases/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ bitmagnet_memory }}"
        restart_policy: unless-stopped
  when: bitmagnet_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ bitmagnet_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ bitmagnet_db_container_name }}"
        state: absent
  when: bitmagnet_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ bitmagnet_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ bitmagnet_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: bitmagnet_enabled is false and archive_app_data_enabled is true
