#
netalertx_enabled: false
netalertx_available_externally: false
netalertx_traefik_whitelist: "{{ lan }}"
netalertx_data_directory: "{{ docker_home }}/netalertx"

# network
netalertx_hostname: "netalertx"
netalertx_port_http: "20211"

# docker
netalertx_container_name: "netalertx"
netalertx_memory_limit: "1g"

# autoheal
netalertx_autoheal: "false"

# homepage
netalertx_homepage_group: "Network"
netalertx_homepage_icon: "netalertx.png"
netalertx_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ netalertx_port_http }}"
netalertx_homepage_key: "netalertxsyncapitoken" # optional, only if password is enabled

# watchtower
netalertx_watchtower_monitor_only: "true"