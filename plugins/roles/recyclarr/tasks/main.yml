---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ recyclarr_data_directory }}"
        - "{{ recyclarr_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ recyclarr_container_name }}"
        hostname: "{{ recyclarr_container_name }}"
        image: "{{ recyclarr_image_name }}:{{ recyclarr_image_tag }}"
        pull: true
        cpu_shares: "{{ recyclarr_cpu_shares }}"
        volumes:
          - "{{ recyclarr_data_directory }}/config:/config"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ recyclarr_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ recyclarr_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ recyclarr_homepage_group }}"
          homepage.icon: "{{ recyclarr_homepage_icon }}"
#         homepage.description: "Automatically sync TRaSH Guides to your Sonarr and Radarr instances"
          homepage.server: "my-docker"
          homepage.container: "{{ recyclarr_container_name }}"
          homepage.showStats: "{{ recyclarr_homepage_showStats }}"
          traefik.enable: "false"
          recyclarr.tag.include: '^\d+\.\d+\.\d+$$'
          recyclarr.link.template: https://github.com/recyclarr/recyclarr/releases/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ recyclarr_memory }}"
        restart_policy: unless-stopped
  when: recyclarr_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ recyclarr_container_name }}"
        state: absent
  when: recyclarr_enabled is false
