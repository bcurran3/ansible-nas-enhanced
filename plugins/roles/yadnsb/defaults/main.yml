---
ansible_nas_app_name: "YaDNSb"

yadnsb_enabled: false
yadnsb_available_externally: false
yadnsb_traefik_whitelist: "{{ lan }}"

# directories
yadnsb_data_directory: "{{ docker_home }}/yadnsb"
yadnsb_tv_directory: "{{ tv_root }}"
yadnsb_download_directory: "{{ downloads_root }}"

# docker
yadnsb_container_name: "yadnsb"
yadnsb_image_name: "ghcr.io/altendorfme/yadnsb"
yadnsb_image_tag: "latest"
yadnsb_cpu_shares: "1024"


# network
yadnsb_port: "3025"
yadnsb_hostname: "yadnsb"

# specs
yadnsb_memory: 256m

# autoheal
yadnsb_autoheal: "false"

# homepage
yadnsb_homepage_group: "Apps"
yadnsb_homepage_icon: "sh-yadnsb.png"
yadnsb_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ yadnsb_port }}"
yadnsb_homepage_showStats: "false"

# watchtower
yadnsb_watchtower_monitor_only: "true"
