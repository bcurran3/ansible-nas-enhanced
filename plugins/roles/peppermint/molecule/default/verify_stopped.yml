---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Try and stop and remove Peppermint
      community.docker.docker_container:
        name: "{{ peppermint_container_name }}"
        state: absent
      register: result

    - name: Check Peppermint is stopped
      ansible.builtin.assert:
        that:
          - not result.changed

    - name: Try and stop and remove Peppermint DB
      community.docker.docker_container:
        name: "{{ peppermint_db_container_name }}"
        state: absent
      register: result

    - name: Check Peppermint DB is stopped
      ansible.builtin.assert:
        that:
          - not result.changed