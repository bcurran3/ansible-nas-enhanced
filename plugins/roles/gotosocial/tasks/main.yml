---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "1000"
        group: "1000"
      with_items:
        - "{{ gotosocial_data_directory }}"
        - "{{ gotosocial_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }} Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ gotosocial_container_name }}"
        hostname: "{{ gotosocial_container_name }}"
        image: "{{ gotosocial_image_name }}:{{ gotosocial_image_tag }}"
        pull: true
        cpu_shares: "{{ gotosocial_cpu_shares }}"
        user: 1000:1000
        ports:
          - "{{ gotosocial_port_http }}:8080"
        volumes:
          - "{{ gotosocial_data_directory }}/data:/gotosocial/storage"
        network_mode: bridge
        env:
          GTS_HOST: "{{ gotosocial_hostname }}.{{ ansible_nas_domain }}"
          GTS_DB_TYPE: "sqlite"
          GTS_DB_ADDRESS: "/gotosocial/storage/sqlite.db"
          GTS_LETSENCRYPT_ENABLED: "false"
          GTS_LETSENCRYPT_EMAIL_ADDRESS: ""
          GTS_WAZERO_COMPILATION_CACHE: "/gotosocial/.cache"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ gotosocial_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ gotosocial_watchtower_monitor_only }}"
          homepage.name: "GoToSocial"
          homepage.group: "{{ gotosocial_homepage_group }}"
          homepage.icon: "{{ gotosocial_homepage_icon }}"
          homepage.href: "{{ gotosocial_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ gotosocial_port_http }}"
#         homepage.description: "Fast, fun, small ActivityPub server."
          homepage.server: "my-docker"
          homepage.container: "{{ gotosocial_container_name }}"
          homepage.showStats: "{{ gotosocial_homepage_showStats }}"
          traefik.enable: "{{ gotosocial_available_externally | string }}"
          traefik.http.routers.gotosocial.rule: "Host(`{{ gotosocial_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.gotosocial.tls.certresolver: "letsencrypt"
          traefik.http.routers.gotosocial.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.gotosocial.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ gotosocial_hostname }}"
          traefik.http.routers.gotosocial.middlewares: "{{ gotosocial_hostname }}@docker"
          traefik.http.middlewares.gotosocial.IPAllowList.sourcerange: "{{ gotosocial_traefik_whitelist }}"
          traefik.http.services.gotosocial.loadbalancer.server.port: "8080"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/superseriousbusiness/gotosocial/releases/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ gotosocial_memory }}"
        restart_policy: unless-stopped
  when: gotosocial_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ gotosocial_container_name }}"
        state: absent
  when: gotosocial_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ gotosocial_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ gotosocial_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: gotosocial_enabled is false and archive_app_data_enabled is true
