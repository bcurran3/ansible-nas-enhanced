---
- name: Stop phpBB
  docker_container:
    name: "{{ phpbb_container_name }}"
    state: absent
  when: phpbb_enabled is false
  listen:
    - "stop phpbb"
    - "stop disabled applications"

- name: Stop phpBB MariaDB
  docker_container:
    name: "{{ phpbb_db_container_name }}"
    state: absent
  when: phpbb_enabled is false
  listen:
    - "stop phpbb"
    - "stop disabled applications"
