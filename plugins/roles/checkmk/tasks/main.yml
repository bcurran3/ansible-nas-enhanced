---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ checkmk_data_directory }}"
        - "{{ checkmk_data_directory }}/omd"
        - "{{ checkmk_data_directory }}/omd/sites"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ checkmk_container_name }}"
        hostname: "{{ checkmk_container_name }}"
        image: "{{ checkmk_image_name }}:{{ checkmk_image_tag }}"
        pull: true
        cpu_shares: "{{ checkmk_cpu_shares }}"
        network_mode: "bridge"
        volumes:
          -  "{{ checkmk_data_directory }}/omd/sites:/omd/sites"
          - "/etc/localtime:/etc/localtime:ro"
        ports:
          - "{{ checkmk_port_http }}:5000"
          - "{{ checkmk_port_api }}:8000"
#        dns_servers: "{{ ansible_nas_dns }}"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ checkmk_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ checkmk_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ checkmk_homepage_group }}"
          homepage.icon: "{{ checkmk_homepage_icon }}"
          homepage.href: "{{ checkmk_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ checkmk_port_http }}"
          homepage.description: "{{ 'Best-in-class infrastructure & application monitoring' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ checkmk_container_name }}"
          homepage.showStats: "{{ checkmk_homepage_showStats }}"
          traefik.enable: "{{ checkmk_available_externally | string }}"
          traefik.http.routers.checkmk.rule: "Host(`checkmk.{{ ansible_nas_domain }}`)"
          traefik.http.routers.checkmk.tls.certresolver: "letsencrypt"
          traefik.http.routers.checkmk.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.checkmk.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.middlewares.checkmk.IPAllowList.sourcerange: "{{ checkmk_traefik_whitelist }}"
          traefik.http.services.checkmk.loadbalancer.server.port: "5000"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: ""
        memory: "{{ checkmk_memory }}"
        restart_policy: unless-stopped
  when: checkmk_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ checkmk_container_name }}"
        state: absent
  when: checkmk_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ checkmk_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ checkmk_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: checkmk_enabled is false and archive_app_data_enabled is true
