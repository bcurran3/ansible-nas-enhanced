---
ansible_nas_app_name: "FileBot"
#
filebot_enabled: false
filebot_available_externally: false
filebot_traefik_whitelist: "{{ lan }}"

# network
filebot_hostname: "filebot"
filebot_port_http: ""

filebot_data_directory: "{{ docker_home }}/filebot"
filebot_download_directory: "{{ downloads_root }}"
filebot_movies_directory: "{{ movies_root }}"
filebot_music_directory: "{{ music_root }}"
filebot_tv_directory: "{{ tv_root }}"
filebot_user_id: "999"
filebot_group_id: "1001"

# docker
filebot_container_name: "filebot"
filebot_cpu_shares: "1024"
filebot_image: ""
filebot_image_tag: ""
# ^ there are multiple containers to add

# autoheal
filebot_autoheal: "false"

# homepage
filebot_homepage_group: "Apps"
filebot_homepage_icon: "filebot.png"
filebot_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ filebot_port_http }}"
filebot_homepage_showStats: "false"

# watchtower
filebot_watchtower_monitor_only: "true" # all containers use same setting
