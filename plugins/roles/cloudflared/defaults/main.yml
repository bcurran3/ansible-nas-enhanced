ansible_nas_app_name: "cloudflared"

# specs
cloudflared_enabled: false
cloudflared_memory_limit: "256m"

# docker
cloudflared_container_name: "cloudflared"
cloudflared_cpu_shares: "1024"

# app
cloudflared_token: "put_your_cloudflared_token_here"

# autoheal
cloudfalred_autoheal: "false"

# homepage
cloudflared_homepage_group: "Apps"
cloudflared_homepage_icon: "cloudflare.png"
cloudflared_homepage_showStats: "false"
cloudflared_homepage_widget_accountid: "your_account_id" # https://one.dash.cloudflare.com/<accountid>/home/quick-start
cloudflared_homepage_widget_tunnelid: "your_tunnel_id" # found in tunnels dashboard under the tunnel name
cloudflared_homepage_widget_key: "your cloudflare api token" # # api token with `Account.Cloudflare Tunnel:Read` https://dash.cloudflare.com/profile/api-tokens

# watchtower
cloudflared_watchtower_monitor_only: "true"