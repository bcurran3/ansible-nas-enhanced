---
### WORK IN PROGRESS
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ ssm_data_directory }}"
        - "{{ ssm_data_directory }}/data"
        - "{{ ssm_data_directory }}/db"
        - "{{ ssm_data_directory }}/playbooks"

    - name: Create {{ ansible_nas_app_name }} network
      community.docker.docker_network:
        name: "{{ ssm_network_name }}"

    - name: Create {{ ansible_nas_app_name }} Redis Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ ssm_redis_container_name }}"
        hostname: "{{ ssm_redis_container_name }}"
        image: redis
        pull: true
        networks:
          - name: "{{ ssm_network_name }}"
        networks_cli_compatible: "yes"
        network_mode: "bridge"
        volumes:
          - "{{ ssm_data_directory }}/data:/data"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: ['CMD', 'redis-cli', 'ping']
        restart_policy: unless-stopped
        memory: "{{ ssm_redis_memory_limit }}"
        command: "--save 60 1"
        labels:
          autoheal: "{{ ssm_redis_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ ssm_redis_watchtower_monitor_only }}"
          traefik.enable: "false"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"

    - name: Create {{ ansible_nas_app_name }} DB Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ ssm_db_container_name }}"
        hostname: "{{ ssm_db_container_name }}"
        image: mongo
        pull: true
        networks:
          - name: "{{ ssm_network_name }}"
        networks_cli_compatible: "yes"
        network_mode: "bridge"
        volumes:
          - "{{ ssm_data_directory }}/db:/data/db"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        restart_policy: unless-stopped
        command: "--quiet"
        memory: "{{ ssm_db_memory_limit }}"
        healthcheck:
          test: ['CMD', 'pg_isready', '-U', 'postgres']
        labels:
          autoheal: "{{ ssm_db_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ ssm_db_watchtower_monitor_only }}"
          traefik.enable: "false"

    - name: Create {{ ansible_nas_app_name }} Client Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ ssm_client_container_name }}"
        hostname: "{{ ssm_client_container_name }}"
        image: ghcr.io/squirrelcorporation/squirrelserversmanager-client:latest
        pull: true
        networks:
          - name: "{{ ssm_network_name }}"
        networks_cli_compatible: "yes"
        network_mode: "bridge"
        ports:
          - "{{ ssm_port_http }}: 8000"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        restart_policy: unless-stopped
        memory: "{{ ssm_client_memory_limit }}"
        labels:
          autoheal: "{{ ssm_client_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ ssm_client_watchtower_monitor_only }}"
          traefik.enable: "{{ ssm_available_externally | string }}"
          traefik.http.routers.ssm.rule: "Host(`{{ ssm_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.ssm.tls.certresolver: "letsencrypt"
          traefik.http.routers.ssm.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.ssm.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ ssm_hostname }}"
          traefik.http.routers.ssm.middlewares: "{{ ssm_hostname }}@docker"
          traefik.http.middlewares.ssm.IPAllowList.sourcerange: "{{ ssm_traefik_whitelist }}"
          traefik.http.services.ssm.loadbalancer.server.port: "8000"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"

    - name: Create {{ ansible_nas_app_name }} Server Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ ssm_container_name }}"
        hostname: "{{ ssm_container_name }}"
        image: ghcr.io/squirrelcorporation/squirrelserversmanager-server:latest
        pull: true
        networks:
          - name: "{{ ssm_network_name }}"
        networks_cli_compatible: "yes"
        network_mode: "bridge"
        env:
          #SECRETS
          SECRET: "topsecret"
          SALT: "9876543210abcdef"
          VAULT_PWD: "topsecret"
          #MONGO
          DB_HOST: "{{ ssm_db_container_name }}"
          DB_NAME: "ssm"
          DB_PORT: "27017"
          #redis
          REDIS_HOST: "{{ ssm_redis_container_name }}"
          REDIS_PORT: "6379"
          NODE_ENV: "production"
          TZ: "{{ ansible_nas_timezone }}"
        volumes:
          - "{{ ssm_data_directory }}/playbooks:/playbooks"
        restart_policy: unless-stopped
        memory: "{{ ssm_memory_limit }}"
        labels:
          autoheal: "{{ ssm_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ ssm_watchtower_monitor_only }}"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"
  when: ssm_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Client Container
      community.docker.docker_container:
        name: "{{ ssm_client_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} Server Container
      community.docker.docker_container:
        name: "{{ ssm_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} Redis Container
      community.docker.docker_container:
        name: "{{ ssm_redis_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ ssm_db_container_name }}"
        state: absent

    - name: Remove {{ ansible_nas_app_name }} network
      community.docker.docker_network:
        name: "{{ ssm_network_name }}"
        state: absent
  when: ssm_enabled is false

### WORK IN PROGRESS
# https://github.com/SquirrelCorporation/SquirrelServersManager/blob/master/docker-compose.yml
# https://github.com/SquirrelCorporation/SquirrelServersManager/blob/master/.env
