#
controlr_enabled: false
controlr_available_externally: false
controlr_traefik_whitelist: "{{ lan }}"
controlr_data_directory: "{{ docker_home }}/controlr"

# network
controlr_hostname: "controlr"
controlr_port_http: "5120"

# docker
controlr_container_name: "controlr"
controlr_memory_limit: "1g"
controlr_network_name: "controlr"
controlr_network_gateway: "172.30.0.1"
controlr_network_subnet: "172.30.0.0/16"

# homepage
controlr_homepage_group: "Apps"
controlr_homepage_icon: "controlr.png"
controlr_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ controlr_port_http }}"
controlr_homepage_showStats: "false"

# watchtower
controlr_watchtower_monitor_only: "true"