---
- name: Start Remotely
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ remotely_data_directory }}"
        - "{{ remotely_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ remotely_container_name }}"
        hostname: "{{ remotely_container_name }}"
        image: "{{ remotely_image_name }}:{{ remotely_image_tag }}"
        pull: true
        cpu_shares: "{{ remotely_cpu_shares }}"
        ports:
          - "{{ remotely_port_http }}:5000"
        volumes:
          - "{{ remotely_data_directory }}/data:/app/AppData"
        container_default_behavior: no_defaults
        env:
          ASPNETCORE_ENVIRONMENT: "Production"
          ASPNETCORE_HTTP_PORTS: "5000"
          Remotely_ApplicationOptions__DbProvider: "SQLite"
          Remotely_ConnectionStrings__SQLite: "Data Source=/app/AppData/Remotely.db"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ remotely_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ remotely_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ remotely_homepage_group }}"
          homepage.icon: "{{ remotely_homepage_icon }}"
          homepage.href: "{{ remotely_homepage_href}}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ remotely_port_http }}"
#         homepage.description: "A remote control and remote scripting solution, built with .NET 8, Blazor, and SignalR."
          homepage.server: "my-docker"
          homepage.container: "{{ remotely_container_name }}"
          homepage.showStats: "{{ remotely_homepage_showStats }}"
          traefik.enable: "{{ remotely_available_externally | string }}"
          traefik.http.routers.remotely.rule: "Host(`{{ remotely_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.remotely.tls.certresolver: "letsencrypt"
          traefik.http.routers.remotely.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.remotely.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ remotely_hostname }}"
          traefik.http.routers.remotely.middlewares: "{{ remotely_hostname }}@docker"
          traefik.http.middlewares.remotely.IPAllowList.sourcerange: "{{ remotely_traefik_whitelist }}"
          traefik.http.services.remotely.loadbalancer.server.port: "5000"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://hub.docker.com/r/immybot/remotely/tags/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ remotely_memory }}"
        restart_policy: unless-stopped
  when: remotely_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ remotely_container_name }}"
        state: absent
  when: remotely_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ remotely_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ remotely_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: remotely_enabled is false and archive_app_data_enabled is true
