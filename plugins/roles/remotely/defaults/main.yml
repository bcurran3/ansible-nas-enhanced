---
ansible_nas_app_name: "Remotely"

#
remotely_enabled: false
remotely_available_externally: false
remotely_traefik_whitelist: "{{ lan }}"
remotely_data_directory: "{{ docker_home }}/remotely"

# network
remotely_hostname: "remotely"
remotely_port_http: "5000"

# docker
remotely_container_name: "remotely"
remotely_memory_limit: "1g"
remotely_network_name: "remotely"

# autoheal
remotely_autoheal: "false"

# homepage
remotely_homepage_group: "Apps"
remotely_homepage_icon: "remotely.png"
remotely_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ remotely_port_http }}"
remotely_homepage_showStats: "false"

# watchtower
remotely_watchtower_monitor_only: "true"