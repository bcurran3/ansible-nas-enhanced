---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Try and stop and remove Gramps Web
      community.docker.docker_container:
        name: "{{ grampsweb_container_name }}"
        state: absent
      register: result

    - name: Check Gramps Web is stopped
      ansible.builtin.assert:
        that:
          - not result.changed

    - name: Try and stop and remove Gramps Web Celery
      community.docker.docker_container:
        name: "{{ grampsweb_celery_container_name }}"
        state: absent
      register: result

    - name: Check Gramps Web Celery is stopped
      ansible.builtin.assert:
        that:
          - not result.changed

    - name: Try and stop and remove Gramps Web Redis
      community.docker.docker_container:
        name: "{{ grampsweb_redis_container_name }}"
        state: absent
      register: result

    - name: Check Gramps Web Redis is stopped
      ansible.builtin.assert:
        that:
          - not result.changed
