---
### WORK IN PROGRESS

- name: Check if nvidia-container-runtime executable exists
  ansible.builtin.stat:
    path: /usr/bin/nvidia-container-runtime
  register: nvidia_runtime_executable
  check_mode: false

- name: Check NVIDIA Container Runtime result
  ansible.builtin.debug:
    msg: "NVIDIA Container Runtime executable exists: {{ nvidia_runtime_executable.stat.exists }}"

- name: Install NVIDIA Container Runtime
  block:
    - name: Enable NVIDIA sources 1
      ansible.builtin.shell:
        cmd: "curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | sudo gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg"

    - name: Enable NVIDIA sources 2
      ansible.builtin.shell:
        cmd: "curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | sudo tee /etc/apt/sources.list.d/nvidia-container-toolkit.list"

    - name: Update apt-cache
      ansible.builtin.apt:
        update_cache: yes

    - name: Install nvidia-container-toolkit Package
      ansible.builtin.apt:
        pkg:
        - nvidia-container-toolkit
        - nvidia-container-toolkit-base
        - libnvidia-container-tools
        - libnvidia-container1

    - name: Restart Docker
      service:
        name: docker
        state: restarted
      when: docker_config.changed
      tags:
        - skip_ansible_lint
  when: nvidia_runtime_enabled is true and {{ nvidia_runtime_executable.stat.exists }} is false

