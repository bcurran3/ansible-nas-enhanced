---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ openeats_data_directory }}/openeats-api"
        - "{{ openeats_data_directory }}/static-files"
        - "{{ openeats_data_directory }}/site-media"
        - "{{ openeats_data_directory }}/openeats-web"
        - "{{ openeats_data_directory }}/database"

    - name: Create {{ ansible_nas_app_name }} DB Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ openeats_db_container_name }}"
        image: "{{ openeats_db_image_name }}:{{ openeats_db_image_tag }}"
        pull: true
        cpu_shares: "{{ openeats_db_cpu_shares }}"
        volumes:
          - "{{ openeats_data_directory }}/database:/var/lib/mysql"
        ports:
          - "{{ openeats_port_db }}:3306"
        env:
          MARIADB_ROOT_PASSWORD: "openeatspw"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ openeats_db_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ openeats_db_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }} MariaDB"
          homepage.group: "{{ openeats_db_homepage_group }}"
          homepage.icon: "{{ openeats_db_homepage_icon }}"
#         homepage.description: "The innovative open source database"
          homepage.server: "my-docker"
          homepage.container: "{{ openeats_db_container_name }}"
          homepage.showStats: "{{ openeats_db_homepage_showStats }}"
          traefik.enable: "false"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ openeats_db_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} API Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ openeats_api_container_name }}"
        image: "{{ openeats_api_image_name }}:{{ openeats_api_image_tag }}"
        pull: true
        cpu_shares: "{{ openeats_api_cpu_shares }}"
        links:
          - "{{ openeats_db_container_name }}"
        volumes:
          - "{{ openeats_data_directory }}/openeats-api:/code"
          - "{{ openeats_data_directory }}/static-files:/code/static-files"
          - "{{ openeats_data_directory }}/site-media:/code/site-media"
        ports:
          - "{{ openeats_port_api }}:8000"
        env:
          MARIADB_ROOT_PASSWORD: "openeats"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ openeats_api_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ openeats_api_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }} API"
          homepage.group: "{{ openeats_api_homepage_group }}"
          homepage.icon: "{{ openeats_api_homepage_icon }}"
#         homepage.description: ""
          homepage.server: "my-docker"
          homepage.container: "{{ openeats_api_container_name }}"
          homepage.showStats: "{{ openeats_api_homepage_showStats }}"
          traefik.enable: "false"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ openeats_api_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Web Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ openeats_container_name }}"
        hostname: "{{ openeats_container_name }}"
        image: "{{ openeats_image_name }}:{{ openeats_image_tag }}"
        pull: true
        cpu_shares: "{{ openeats_cpu_shares }}"
        links:
          - "{{ openeats_api_container_name }}"
        volumes:
          - "{{ openeats_data_directory }}/openeats-web:/code"
        ports:
          - "{{ openeats_port_http }}:80"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ openeats_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ openeats_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ openeats_homepage_group }}"
          homepage.icon: "{{ openeats_homepage_icon }}"
          homepage.href: "{{ openeats_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ openeats_port_http }}"
#         homepage.description: "Self Hosted Recipe Management App"
          homepage.server: "my-docker"
          homepage.container: "{{ openeats_container_name }}"
          homepage.showStats: "{{ openeats_homepage_showStats }}"
          traefik.enable: "{{ openeats_available_externally | string }}"
          traefik.http.routers.openeats.rule: "Host(`openeats.{{ ansible_nas_domain }}`)"
          traefik.http.routers.openeats.tls.certresolver: "letsencrypt"
          traefik.http.routers.openeats.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.openeats.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ openeats_hostname }}"
          traefik.http.routers.openeats.middlewares: "{{ openeats_hostname }}@docker"
          traefik.http.middlewares.openeats.IPAllowList.sourcerange: "{{ openeats_traefik_whitelist }}"
          traefik.http.services.openeats.loadbalancer.server.port: "80"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ openeats_memory }}"
        restart_policy: unless-stopped
  when: openeats_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Web Container
      community.docker.docker_container:
        name: "{{ openeats_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} API Container
      community.docker.docker_container:
        name: "{{ openeats_api_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ openeats_db_container_name }}"
        state: absent
  when: openeats_enabled is false