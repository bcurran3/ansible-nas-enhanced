---
- name: Start Focalboard
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
        owner: nobody
        group: nogroup
      with_items:
        - "{{ focalboard_data_directory }}"
        - "{{ focalboard_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ focalboard_container_name }}"
        hostname: "{{ focalboard_container_name }}"
        image: "{{ focalboard_image_name }}:{{ focalboard_image_tag }}"
        pull: true
        cpu_shares: "{{ focalboard_cpu_shares }}"
        ports:
          - "{{ focalboard_port_http }}:8000"
        volumes:
          - "{{ focalboard_data_directory }}/data:/opt/focalboard/data"
        network_mode: bridge
        env:
          VIRTUAL_HOST: "focalboard.local"
          VIRTUAL_PORT: "8000"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ focalboard_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ focalboard_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ focalboard_homepage_group }}"
          homepage.icon: "{{ focalboard_homepage_icon }}"
          homepage.href: "{{ focalboard_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ focalboard_port_http }}"
          homepage.description: "{{ 'an open source, self-hosted alternative to Trello, Notion, and Asana.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ focalboard_container_name }}"
          homepage.showStats: "{{ focalboard_homepage_showStats }}"
          traefik.enable: "{{ focalboard_available_externally | string }}"
          traefik.http.routers.focalboard.rule: "Host(`{{ focalboard_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.focalboard.tls.certresolver: "letsencrypt"
          traefik.http.routers.focalboard.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.focalboard.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ focalboard_hostname }}"
          traefik.http.routers.focalboard.middlewares: "{{ focalboard_hostname }}@docker"
          traefik.http.middlewares.focalboard.IPAllowList.sourcerange: "{{ focalboard_traefik_whitelist }}"
          traefik.http.services.focalboard.loadbalancer.server.port: "8000"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/mattermost-community/focalboard/releases/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ focalboard_memory }}"
        restart_policy: unless-stopped
  when: focalboard_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ focalboard_container_name }}"
        state: absent
  when: focalboard_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ focalboard_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ focalboard_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: focalboard_enabled is false and archive_app_data_enabled is true
