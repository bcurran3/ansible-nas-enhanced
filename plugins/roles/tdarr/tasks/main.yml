---
- name: Start Tdarr Server
  block:
    - name: Create Tdarr Server Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ tdarr_data_directory }}"
        - "{{ tdarr_data_directory }}/server"
        - "{{ tdarr_data_directory }}/configs"
        - "{{ tdarr_data_directory }}/logs"
        - "{{ tdarr_cache_directory }}"
        - "{{ tdarr_media_directory }}"

    - name: Create Tdarr Server Docker Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ tdarr_container_name }}"
        hostname: "{{ tdarr_container_name }}"
        image: ghcr.io/haveagitgat/tdarr
        network_mode: "bridge"
        log_driver: json-file
        log_options:
          max-file: "10"
          max-size: "200k"
        pull: true
        volumes:
          - "{{ tdarr_data_directory }}/server:/app/server"
          - "{{ tdarr_data_directory }}/configs:/app/configs"
          - "{{ tdarr_data_directory }}/logs:/app/logs"
          - "{{ tdarr_cache_directory }}:/temp"
          - "{{ tdarr_media_directory }}:/media"
          - "{{ porn_root }}:/porn"
        ports:
          - "{{ tdarr_port_http }}:8265"
          - "{{ tdarr_port_server }}:8266"
        cpu_shares: "{{ tdarr_cpu_shares }}"
        devices:
          - "/dev/dri/:/dev/dri/"
        env:
          nodeID: "{{ ansible_nas_hostname }}"
          serverIP: "0.0.0.0"
          serverPort: "{{ tdarr_port_server }}"
          webUIPort: "{{ tdarr_port_http }}"
          internalNode: "true"
          inContainer: "true"
          ffmpegVersion: "6"
          nodeName: "MyInternalNode"
          PUID: "{{ tdarr_user_id }}"
          PGID: "{{ tdarr_group_id }}"
          NVIDIA_DRIVER_CAPABILITIES: "all"
          NVIDIA_VISIBLE_DEVICES: "all"
          gpus: "all"
          TZ: "{{ ansible_nas_timezone }}"
        memory: "{{ tdarr_memory }}"
        restart_policy: unless-stopped
        labels:
          autoheal: "{{ tdarr_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ tdarr_watchtower_monitor_only }}"
          homepage.name: "Tdarr Server"
          homepage.group: "{{ tdarr_homepage_group }}"
          homepage.href: "{{ tdarr_homepage_href }}"
          homepage.icon: "{{ tdarr_homepage_icon }}"
#         homepage.description: "Distributed transcode automation using FFmpeg/HandBrake + Audio/Video library analytics + video health checking"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ tdarr_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ tdarr_container_name }}"
          homepage.showStats: "{{ tdarr_homepage_showStats }}"
          homepage.widget.type: "tdarr"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ tdarr_port_http }}"
          homepage.widget.key: "{{ tdarr_homepage_key }}"
          traefik.enable: "{{ tdarr_available_externally | string }}"
          traefik.http.routers.tdarr.rule: "Host(`tdarr.{{ ansible_nas_domain }}`)"
          traefik.http.routers.tdarr.tls.certresolver: "letsencrypt"
          traefik.http.routers.tdarr.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.tdarr.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ tdarr_hostname }}"
          traefik.http.routers.tdarr.middlewares: "{{ tdarr_hostname }}@docker"
          traefik.http.middlewares.tdarr.IPAllowList.sourcerange: "{{ tdarr_traefik_whitelist }}"
          traefik.http.services.tdarr.loadbalancer.server.port: "8265"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/HaveAGitGat/Tdarr/releases/tag/$${major}.$${minor}-Beta"
  when: tdarr_enabled is true

- name: Stop Tdarr Server
  block:
    - name: Stop Tdarr Server
      community.docker.docker_container:
        name: "{{ tdarr_container_name }}"
        state: absent
  when: tdarr_enabled is false