---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directory
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ metube_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ metube_container_name }}"
        hostname: "{{ metube_container_name }}"
        image: "{{ metube_image_name }}:{{ metube_image_tag }}"
        pull: true
        cpu_shares: "{{ metube_cpu_shares }}"
        volumes:
          - "{{ metube_dl_directory }}:/downloads"
        ports:
          - "{{ metube_port_http }}:8081"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ metube_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ metube_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ metube_homepage_group }}"
          homepage.icon: "{{ metube_homepage_icon }}"
          homepage.href: "{{ metube_homepage_href }}"
          homepage.description: "{{ 'Self-hosted YouTube downloader (web UI for youtube-dl / yt-dlp)' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ metube_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ metube_container_name }}"
          homepage.showStats: "{{ metube_homepage_showStats }}"
          traefik.enable: "{{ metube_available_externally | string }}"
          traefik.http.routers.metube.rule: "Host(`metube.{{ ansible_nas_domain }}`)"
          traefik.http.routers.metube.tls.certresolver: "letsencrypt"
          traefik.http.routers.metube.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.metube.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ metube_hostname }}"
          traefik.http.routers.metube.middlewares: "{{ metube_hostname }}@docker"
          traefik.http.middlewares.metube.IPAllowList.sourcerange: "{{ metube_traefik_whitelist }}"
          traefik.http.services.metube.loadbalancer.server.port: "8081"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://hub.docker.com/r/alexta69/metube/tags/$${major}.$${minor}.$${patch}"
        memory: "{{ metube_memory }}"
        restart_policy: unless-stopped
  when: metube_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ metube_container_name }}"
        state: absent
  when: metube_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ metube_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ metube_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: metube_enabled is false and archive_app_data_enabled is true
