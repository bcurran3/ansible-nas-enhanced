---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ proget_data_directory }}/packages"

    - name: Create {{ ansible_nas_app_name }} DB Directories
      file:
        path: "{{ item }}"
        owner: "10001"
        state: directory
      with_items:
        - "{{ proget_data_directory }}/data"
        - "{{ proget_data_directory }}/log"
        - "{{ proget_data_directory }}/secrets"

    - name: Create {{ ansible_nas_app_name }} network
      community.docker.docker_network:
        name: "{{ proget_network_name }}"

    - name: Create {{ ansible_nas_app_name }} DB Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ proget_db_container_name}}"
        hostname: "{{ proget_db_container_name}}"
        image: mcr.microsoft.com/mssql/server:2019-latest
        ports: 1433:1433   # shouldn't be needed
        pull: true
        cpu_shares: "{{ proget_db_cpu_shares }}"
        networks:
          - name: "{{ proget_network_name }}"
        networks_cli_compatible: "yes"
        network_mode: "bridge"
        volumes:
          - "{{ proget_data_directory }}/data:/var/opt/mssql/data"
          - "{{ proget_data_directory }}/log:/var/opt/mssql/log"
          - "{{ proget_data_directory }}/secrets:/var/opt/mssql/secrets"
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "t0ps3cr3t!pw"
          MSSQL_PID: "Express"
          TZ: "{{ ansible_nas_timezone }}"
        restart_policy: unless-stopped
        memory: "{{ proget_db_memory_limit }}"
        labels:
          autoheal: "{{ proget_db_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ proget_db_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }} MSSQL"
          homepage.group: "{{ proget_db_homepage_group }}"
          homepage.icon: "{{ proget_db_homepage_icon }}"
          homepage.href: "{{ proget_db_homepage_href}}"
#         homepage.description: "Microsoft SQL Server"
          homepage.server: "my-docker"
          homepage.container: "{{ proget_db_container_name }}"
          homepage.showStats: "{{ proget_db_homepage_showStats }}"
          traefik.enable: "false"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: ""

    - name: Create {{ ansible_nas_app_name }} Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ proget_container_name }}"
        hostname: "{{ proget_container_name }}"
        image: proget.inedo.com/productimages/inedo/proget
        pull: true
        cpu_shares: "{{ proget_cpu_shares }}"
        networks:
          - name: "{{ proget_network_name }}"
        networks_cli_compatible: "yes"
        network_mode: "bridge"
        links:
          - "{{ proget_db_container_name}}"
        volumes:
          - "{{ proget_data_directory }}/packages:/var/proget/packages"
        ports:
          - "{{ proget_port_http }}:80"
        env:
          PROGET_SQL_CONNECTION_STRING: "Data Source=proget-db; Initial Catalog=ProGet; User ID=sa; Password=t0ps3cr3t!pw"
          # ^ change to the variables
          TZ: "{{ ansible_nas_timezone }}"
        restart_policy: unless-stopped
        labels:
          autoheal: "{{ proget_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ proget_watchtower_monitor_only }}"
          homepage.group: "{{ proget_homepage_group }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.icon: "{{ proget_homepage_icon }}"
          homepage.href: "{{ proget_homepage_href}}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ proget_port_http }}"
#         homepage.description: ""
          homepage.server: "my-docker"
          homepage.container: "{{ proget_container_name }}"
          homepage.showStats: "{{ proget_homepage_showStats }}"
          traefik.enable: "{{ proget_available_externally | string }}"
          traefik.http.routers.proget.rule: "Host(`{{ proget_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.proget.tls.certresolver: "letsencrypt"
          traefik.http.routers.proget.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.proget.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ proget_hostname }}"
          traefik.http.routers.proget.middlewares: "proget@docker"
          traefik.http.middlewares.proget.IPAllowList.sourcerange: "{{ proget_traefik_whitelist }}"
          traefik.http.services.proget.loadbalancer.server.port: "80"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: ""
        memory: "{{ proget_memory_limit }}"
  when: proget_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ proget_container_name }}"
        state: absent
    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ proget_db_container_name }}"
        state: absent
  when: proget_enabled is false

