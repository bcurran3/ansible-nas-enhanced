---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Try and stop and remove ProGet
      community.docker.docker_container:
        name: "{{ proget_container_name }}"
        state: absent
      register: result

    - name: Check ProGet is stopped
      ansible.builtin.assert:
        that:
          - not result.changed

    - name: Try and stop and remove ProGet DB
      community.docker.docker_container:
        name: "{{ proget_db_container_name }}"
        state: absent
      register: result

    - name: Check ProGet DB is stopped
      ansible.builtin.assert:
        that:
          - not result.changed