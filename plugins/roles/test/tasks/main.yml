---
- name: Start {{ ansible_nas_app_name }}
  block:
    - debug:
        msg: "TESTING 1 2 3..."

    - name: Be polite
      debug:
        msg:
          - Hello {{ ansible_nas_user }}
          - Sorry I can't do that Dave.
          - Would you like to play Global Thermonuclear War?

    - debug:
        msg: "WAN whitelist: {{ wan }}"

    - debug:
        msg: "LAN whitelist: {{ lan }}"

    - name: find roles directories
      ansible.builtin.find:
        paths: plugins/
        recurse: no
        file_type: directory
      register: found_directories

# displays:
# skipping: [ansible-nas] => (item=roles/airsonic) and the rest
    - name: Display found roles
      debug:
        msg: "{{ item.path }}"
      loop: "{{ found_directories.files | sort(attribute='path') }}"
      loop_control:
        label: "{{ item.path }}"
      when: not (show_details | default(true))
    
#    - debug: Display found roles
#        msg: "{{ [item.path] }} "
#      with_items: "{{ found_directories.files }}"

#    - name: Print found roles directories
#      ansible.builtin.debug:
#        var: found_directories.files[0].path  # only displays first
#        # this needs a loop for the total # of files found
#      when: found_directories is defined

########## eventually move to it's own role
    - debug:
        msg: "TESTING Discovery and Running of Roles in plugins Directory"

    - name: Find roles in plugins Directory
      ansible.builtin.find:
        paths: plugins/
        file_type: directory
        use_regex: yes
        patterns: "^[a-zA-Z0-9_]+$"
        recurse: no
      register: found_directories

    - set_fact:
        "my_{{ item | basename }}": "{{ item }}"
      with_items: "{{ found_directories.files | map(attribute='path') | list }}"

    - debug:
        msg: "{{ found_directories.files | map(attribute='path') | list }}"

    - name: loop through list roles dirs
      include_role:
        name: "{{ item }}"
      with_items: "{{ found_directories.files | map(attribute='path') | list }}"

# make ansible-nas-pre role to run first; i.e. hello bill
# make ansible-nas-post role to run last; i.e. cleanup

# add to all roles?
# I'd prefer to accumlate them and display at the end in ane-post
    - name: Display message if FreshRSS is Internet accessable.
      debug:
        msg: "FreshRSS is Internet accessable."
      when: freshrss_traefik_whitelist == wan

  when: test_enabled is true
  