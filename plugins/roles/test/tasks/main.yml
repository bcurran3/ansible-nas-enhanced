#      when: found_directories is defined

########## eventually move to it's own role
    - debug:
        msg: "TESTING Discovery and Running of Roles in Apps Directory"

    - name: Gathering Roles in Apps Directory
      ansible.builtin.find:
        paths: apps/
        file_type: directory
        use_regex: yes
        patterns: "^[a-zA-Z0-9_]+$"
        recurse: no
      register: found_directories

    - set_fact:
        "my_{{ item | basename }}": "{{ item }}"
      with_items: "{{ found_directories.files | map(attribute='path') | list }}"

    - debug:
        msg: "{{ found_directories.files | map(attribute='path') | list }}"

    - name: "loop through list roles dirs"
      include_role:
        name: "{{ item }}"
      with_items: "{{ found_directories.files | map(attribute='path') | list }}"

########## eventually move to it's own role
    - debug:
        msg: "TESTING Discovery and Running of docker-compose files"

