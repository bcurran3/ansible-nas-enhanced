    - name: Discover docker-compose directories
      ansible.builtin.find:
        paths: docker-compose/
        recurse: no
        file_type: directory
      register: found_directories

    - name: Display found docker-compose directories
      debug:
        msg: "{{ item.path }}"
      loop: "{{ found_directories.files | sort(attribute='path') }}"
      loop_control:
        label: "{{ item.path }}"
      when: not (show_details | default(true))
