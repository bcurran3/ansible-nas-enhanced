    - debug:
        msg: "TESTING docker data archiving"

    - name: Create TEST Directory
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ docker_home }}/TEST"
        - "{{ docker_home }}/TEST/subdirtest"

    - name: Archive TEST Data Directory
# requires lzma and zip installed
# https://docs.ansible.com/ansible/latest/collections/community/general/archive_module.html
      community.general.archive:
        path: "{{ docker_home }}/{{ ansible_nas_app_name }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
  when: test_enabled is true