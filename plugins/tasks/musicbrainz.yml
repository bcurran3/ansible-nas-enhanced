---
- name: MusicBrainz
  file:
    path: "{{ item }}"
    state: directory
  with_items:
    - "{{ musicbrainz_data_directory }}/config"
    - "{{ musicbrainz_data_directory }}/data"

- name: MusicBrainz Container
  docker_container:
    name: musicbrainz
# For all updates you should pull the latest image, clear all files and folders in /config and /data and reinitiate the database import by (re)starting the docker. We do not officially support upgrading this container in place with existing data sets.
    image: linuxserver/musicbrainz:v-2019-08-08-ls6
    pull: true
    volumes:
      - "{{ musicbrainz_data_directory }}/config:/config:rw"
      - "{{ musicbrainz_data_directory }}/data:/data:rw"
    ports:
      - "{{ musicbrainz_port_http }}:5000"
    env:
      TZ: "{{ ansible_nas_timezone }}"
      PUID: "{{ musicbrainz_user_id }}"
      PGID: "{{ musicbrainz_group_id }}"
      BRAINZCODE: "{{ musicbrainz_brainzcode }}"
      WEBADDRESS: "127.0.0.1"
      NPROC: "{{ musicbrainz_nproc }}"
    restart_policy: unless-stopped
    labels:
      traefik.enable: "{{ musicbrainz_available_externally | string }}"
      traefik.http.middlewares.musicbrainz.IPAllowList.sourcerange: "{{ musicbrainz_traefik_whitelist }}"
      traefik.http.routers.musicbrainz.rule: "Host(`musicbrainz.{{ ansible_nas_domain }}`)"
      traefik.http.routers.musicbrainz.tls.certresolver: "letsencrypt"
      traefik.http.routers.musicbrainz.tls.domains[0].main: "{{ ansible_nas_domain }}"
      traefik.http.routers.musicbrainz.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
      traefik.http.services.musicbrainz.loadbalancer.server.port: "5000"
#      traefik.backend: "musicbrainz"
#      traefik.frontend.rule: "Host:musicbrainz.{{ ansible_nas_domain }}"
#      traefik.enable: "{{ musicbrainz_available_externally }}"
#      traefik.port: "5000"
    memory: 1g
