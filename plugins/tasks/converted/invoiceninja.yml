# LOTS more work needed - see docker compose file

- name: Invoice Ninja Directory
  file:
    path: "{{ item }}"
    state: directory
  with_items:
    - "{{ invoiceninja_data_directory }}/app/data"
    - "{{ invoiceninja_data_directory }}/data/etc"
    - "{{ invoiceninja_data_directory }}/storage"
    - "{{ invoiceninja_data_directory }}/logo"
    - "{{ invoiceninja_data_directory }}/public"

- name: Invoice Ninja Docker Container
  docker_container:
    name: invoiceninja
    image: invoiceninja/invoiceninja:latest
    pull: true
    volumes:
      - "{{ invoiceninja_data_directory }}/data:/app/data:rw"
      - "{{ invoiceninja_data_directory }}/data/etc:/etc/nginx/nginx.conf:ro"
      - "{{ invoiceninja_data_directory }}/storage:/var/www/app/storage"
      - "{{ invoiceninja_data_directory }}/logo:/var/www/app/public/logo"
      - "{{ invoiceninja_data_directory }}/public:/var/www/app/public"
    ports:
      - "{{ invoiceninja_port_http }}:9000"
    env:
      TZ: "{{ ansible_nas_timezone }}"
      APP_ENV: 'production'
      APP_DEBUG: '0'
      APP_URL: 'http://ninja.dev'
      APP_KEY: 'SomeRandomStringSomeRandomString'
      APP_CIPHER: 'AES-256-CBC'
      DB_TYPE: 'mysql'
      DB_STRICT: 'false'
      DB_HOST: 'localhost'
      DB_DATABASE: 'ninja'
      DB_USERNAME: 'ninja'
      DB_PASSWORD: 'ninja'
#      PUID: "{{ invoiceninja_user_id }}"
#      PGID: "{{ invoiceninja_group_id }}"
    restart_policy: unless-stopped
    labels:
      traefik.enable: "{{ invoiceninja_available_externally | string }}"
      traefik.http.middlewares.invoiceninja.IPAllowList.sourcerange: "{{ invoiceninja_traefik_whitelist }}"
      traefik.http.routers.invoiceninja.rule: "Host(`invoiceninja.{{ ansible_nas_domain }}`)"
      traefik.http.routers.invoiceninja.tls.certresolver: "letsencrypt"
      traefik.http.routers.invoiceninja.tls.domains[0].main: "{{ ansible_nas_domain }}"
      traefik.http.routers.invoiceninja.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
      traefik.http.services.invoiceninja.loadbalancer.server.port: "9000"
#      traefik.backend: "invoiceninja"
#      traefik.frontend.rule: "Host:invoiceninja.{{ ansible_nas_domain }}"
#      traefik.enable: "{{ invoiceninja_available_externally }}"
#      traefik.port: "9000"
#      traefik.frontend.headers.SSLRedirect: "true"
    memory: 1g
