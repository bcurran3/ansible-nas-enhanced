- debug:
    msg: "Testing Discovery and Running of Roles in Apps Directory"

- name: Discover Roles in Apps Directory
  find:
    paths: apps/
    file_type: directory
    use_regex: yes
    patterns: "^[a-zA-Z0-9_]+$"
    recurse: no
  register: found_directories

- set_fact:
    "my_{{ item | basename }}": "{{ item }}"
  with_items: "{{ found_directories.files | map(attribute='path') | list }}"

- debug:
    msg: "{{ found_directories.files | map(attribute='path') | list }}"

# THIS WORKS!
- name: "loop through list roles dirs"
  include_role:
    name: "{{ item }}"
  with_items: "{{ found_directories.files | map(attribute='path') | list }}"

- debug:
    msg: "Testing data archiving"

- name: Create TEST Directory
  file:
    path: "{{ item }}"
    state: directory
    owner: nobody
    group: nogroup
  with_items:
    - "{{ docker_home }}/TEST"

- name: Archive TEST Data Directory
  community.general.archive:
    path: "{{ docker_home }}/TEST"
    dest: "{{ docker_home }}"
    format: zip