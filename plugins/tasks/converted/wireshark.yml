- name: Create Wireshark Directories
  file:
    path: "{{ item }}"
  with_items:
    - "{{ wireshark_data_directory }}/config"

- name: Wireshark Docker Container
  docker_container:
    name: wireshark
    image: lscr.io/linuxserver/wireshark
    pull: true
    ports:
#      - "3000:3000"
    volumes:
      - "{{ wireshark_data_directory }}/config:/config:rw"
    network_mode: host
    hostname: "wireshark"
    env:
      TZ: "{{ ansible_nas_timezone }}"
      PUID: "{{ wireshark_user_id }}"
      PGID: "{{ wireshark_group_id }}"
    capabilities:
      - NET_ADMIN
    restart_policy: unless-stopped
    memory: "{{ wireshark_memory_limit }}"
    labels:
      traefik.enable: "{{ wireshark_available_externally | string }}"
      traefik.http.middlewares.wireshark.ipwhitelist.sourcerange: "{{ wireshark_traefik_whitelist }}"
      traefik.http.routers.wireshark.rule: "Host(`wireshark.{{ ansible_nas_domain }}`)"
      traefik.http.routers.wireshark.tls.certresolver: "letsencrypt"
      traefik.http.routers.wireshark.tls.domains[0].main: "{{ ansible_nas_domain }}"
      traefik.http.routers.wireshark.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
      traefik.http.services.wireshark.loadbalancer.server.port: "3000"
#      traefik.backend: "wireshark"
#      traefik.frontend.rule: "Host:wireshark.{{ ansible_nas_domain }}"
#      traefik.enable: "{{ wireshark_available_externally }}"
#      traefik.frontend.whiteList.sourceRange: "{{ wireshark_traefik_whitelist }}"
#      traefik.port: "3000"
