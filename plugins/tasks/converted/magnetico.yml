---
# need sudo touch credentials to config dir
# add admin:$2y$12$yOtVgiZRJ.l9ecjFYPW11e0N19PNs3jcbxDTund57DRs26..jNGaq for admin/topsecret
- name: Create magnetico Directories
  file:
    path: "{{ item }}"
    state: directory
  with_items:
    - "{{ magnetico_data_directory }}"
    - "{{ magnetico_data_directory }}/config"
    - "{{ magnetico_data_directory }}/data"

- name: magneticod Container
  docker_container:
    name: magneticod
    hostname: "magneticod"
    image: boramalper/magneticod
    pull: true
    volumes:
      - "{{ magnetico_data_directory }}/config:/root/.config/magneticod"
      - "{{ magnetico_data_directory }}/data:/root/.local/share/magneticod"
    env:
      TZ: "{{ ansible_nas_timezone }}"
    command:
      - "--indexer-addr=0.0.0.0:1212"
    restart_policy: unless-stopped
    memory: 1g

- name: magneticow Container
  docker_container:
    name: magneticow
    image: boramalper/magneticow
    pull: true
    links:
      - magneticod
    volumes:
      - "{{ magnetico_data_directory }}/data:/root/.local/share/magneticod/"
      - "{{ magnetico_data_directory }}/config:/root/.config/magneticow"
    ports:
      - "{{ magnetico_port_http }}:8080"
    dns_servers: "{{ ansible_nas_dns }}"
    hostname: "magneticow"
    env:
      TZ: "{{ ansible_nas_timezone }}"
    restart_policy: unless-stopped
    memory: 1g
    labels:
      traefik.enable: "{{ magnetico_available_externally | string }}"
      traefik.http.routers.magnetico.rule: "Host(`magnetico.{{ ansible_nas_domain }}`)"
      traefik.http.routers.magnetico.tls.certresolver: "letsencrypt"
      traefik.http.routers.magnetico.tls.domains[0].main: "{{ ansible_nas_domain }}"
      traefik.http.routers.magnetico.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
      traefik.http.routers.frontend.middlewares: "{{ magnetico_hostname }}"
      traefik.http.routers.magnetico.middlewares: "{{ magnetico_hostname }}@docker"
      traefik.http.middlewares.magnetico.IPAllowList.sourcerange: "{{ magnetico_traefik_whitelist }}"
      traefik.http.services.magnetico.loadbalancer.server.port: "8080"

