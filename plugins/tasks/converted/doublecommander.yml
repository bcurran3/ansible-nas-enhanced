---
- name: Create Double Commander Directories
  file:
    path: "{{ item }}"
    state: directory
  with_items:
    - "{{ doublecommander_data_directory }}"
    - "{{ doublecommander_data_directory }}/config"

- name: Create Double Commander Docker Container
  docker_container:
    name: doublecommander
    image: lscr.io/linuxserver/doublecommander:latest
    pull: true
    volumes:
    - "{{ doublecommander_data_directory }}/config:/config"
    - "{{ doublecommander_browse_directory }}:/data"
    ports:
      - "{{ doublecommander_port_http }}:3000"
    env:
      PUID: "{{ doublecommander_user_id }}"
      PGID: "{{ doublecommander_group_id }}"
      TZ: "{{ ansible_nas_timezone }}"
    restart_policy: unless-stopped
    labels:
      traefik.enable: "{{ doublecommander_available_externally | string }}"
      traefik.http.routers.doublecommander.rule: "Host(`doublecommander.{{ ansible_nas_domain }}`)"
      traefik.http.routers.doublecommander.tls.certresolver: "letsencrypt"
      traefik.http.routers.doublecommander.tls.domains[0].main: "{{ ansible_nas_domain }}"
      traefik.http.routers.doublecommander.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
      traefik.http.routers.frontend.middlewares: "{{ doublecommander_hostname }}"
      traefik.http.routers.doublecommander.middlewares: "{{ doublecommander_hostname }}@docker"
      traefik.http.middlewares.doublecommander.IPAllowList.sourcerange: "{{ doublecommander_traefik_whitelist }}"
      traefik.http.services.doublecommander.loadbalancer.server.port: "3000"
    memory: 512m
