---
- name: Create Scrutiny Directories
  file:
    path: "{{ item }}"
    state: directory
  with_items:
    - "{{ scrutiny_data_directory }}"
    - "{{ scrutiny_data_directory }}/config"
    - "{{ scrutiny_data_directory }}/influxdb"

- name: Create Scrutiny Container
  docker_container:
    name: scrutiny
    image: ghcr.io/analogj/scrutiny:master-omnibus
    pull: true
    env:
    volumes:
      - "{{ scrutiny_data_directory }}/config:/opt/scrutiny/config"
      - "{{ scrutiny_data_directory }}/influxdb:/opt/scrutiny/influxdb"
      - "/run/udev:/run/udev:ro"
    ports:
      - "{{ scrutiny_port_http }}: 8080"
      - "{{ scrutiny_influxdb_port_http }}: 8086"
    devices:
      - /dev/sda:/dev/sda
      - /dev/sdb:/dev/sdb
      - /dev/sdc:/dev/sdc
      - /dev/sdd:/dev/sdd
      - /dev/sde:/dev/sde
      - /dev/sdf:/dev/sdf
      - /dev/sdg:/dev/sdg
      - /dev/sdh:/dev/sdh
      - /dev/sdi:/dev/sdi
      - /dev/sdj:/dev/sdj
      - /dev/sdk:/dev/sdk
      - /dev/sdl:/dev/sdl
      - /dev/sdm:/dev/sdm
      - /dev/sdn:/dev/sdn
      - /dev/nvme0n1:/dev/nvme0n1
    capabilities:
      - SYS_RAWIO
      - SYS_ADMIN
    restart_policy: unless-stopped
    memory: 256m
    labels:
      traefik.enable: "{{ scrutiny_available_externally | string }}"
      traefik.http.middlewares.scrutiny.ipwhitelist.sourcerange: "{{ scrutiny_traefik_whitelist }}"
      traefik.http.routers.scrutiny.rule: "Host(`scrutiny.{{ ansible_nas_domain }}`)"
      traefik.http.routers.scrutiny.tls.certresolver: "letsencrypt"
      traefik.http.routers.scrutiny.tls.domains[0].main: "{{ ansible_nas_domain }}"
      traefik.http.routers.scrutiny.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
      traefik.http.services.scrutiny.loadbalancer.server.port: "8080"
