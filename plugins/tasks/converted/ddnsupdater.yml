---
- name: Create DDNS-Updater Directories
  file:
    path: "{{ item }}"
    state: directory
    mode: 0777
  with_items:
    - "{{ ddnsupdater_data_directory }}"
    - "{{ ddnsupdater_data_directory }}/data"

- name: Create DDNS-Updater Docker Container
  docker_container:
    name: ddns-updater
    image: qmcgaw/ddns-updater:latest
    pull: true
    volumes:
      - "{{ ddnsupdater_data_directory }}/data:/updater/data:rw"
    ports:
      - "{{ ddnsupdater_port_http }}:8001"
    env:
      ROOT_URL: "/"
      LISTENING_PORT: "8001"
      LOG_ENCODING: "console"
      LOG_LEVEL: "info"
      NODE_ID: "0"
      HTTP_TIMEOUT: "10s"
      GOTIFY_URL: "https://gotify.mrbillsabode.org/"
      GOTIFY_TOKEN: "ArlnpVGcLLkeJyk"
      BACKUP_PERIOD: "0"
      BACKUP_DIRECTORY: "/updater/data"
      TZ: "{{ ansible_nas_timezone }}"
    restart_policy: unless-stopped
    memory: 256m
    labels:
      traefik.enable: "{{ ddnsupdater_available_externally | string }}"
      traefik.http.middlewares.ddnsupdater.ipwhitelist.sourcerange: "{{ ddnsupdater_traefik_whitelist }}"  # add
      traefik.http.routers.ddnsupdater.rule: "Host(`ddnsupdater.{{ ansible_nas_domain }}`)"
      traefik.http.routers.ddnsupdater.tls.certresolver: "letsencrypt"
      traefik.http.routers.ddnsupdater.tls.domains[0].main: "{{ ansible_nas_domain }}"
      traefik.http.routers.ddnsupdater.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
      traefik.http.services.ddnsupdater.loadbalancer.server.port: "8001"
