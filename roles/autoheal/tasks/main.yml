---
- name: Start {{ autoheal_proper_name }}
  block:
    - name: Create {{ autoheal_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ autoheal_container_name }}"
        hostname: "{{ autoheal_container_name }}"
        image: "{{ autoheal_image_name }}:{{ autoheal_image_tag }}"
        pull: true
        network_mode: "none"
        env:
          AUTOHEAL_CONTAINER_LABEL: "autoheal"
          AUTOHEAL_INTERVAL: "10"
          AUTOHEAL_START_PERIOD: "30"
          AUTOHEAL_DEFAULT_STOP_TIMEOUT: "10"
          AUTOHEAL_ONLY_MONITOR_RUNNING: "true"
          TZ: "{{ ansible_nas_timezone }}"
        volumes:
          - "/etc/localtime:/etc/localtime:ro"
          - "/var/run/docker.sock:/var/run/docker.sock"
        healthcheck:
          test: ["CMD-SHELL", "ps aux | grep autoheal | grep -v grep || exit 1"]
          interval: "{{ autoheal_healthcheck_interval }}"
          timeout: "{{ autoheal_healthcheck_timeout }}"
          retries: "{{ autoheal_healthcheck_retries }}"
          start_period: "{{ autoheal_healthcheck_start_period }}"
        labels:
          autoheal: "false"
          com.centurylinklabs.watchtower.enable: "{{ autoheal_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ autoheal_proper_name }}"
          homepage.group: "{{ autoheal_homepage_group }}"
          homepage.icon: "{{ autoheal_homepage_icon }}"
          homepage.description: "{{ 'Monitor and restart unhealthy docker containers.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ autoheal_container_name }}"
          homepage.showStats: "{{ autoheal_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "false"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/willfarrell/autoheal"
        cpu_shares: "{{ autoheal_cpu_shares }}"
        memory: "{{ autoheal_memory }}"
        memory_swap: "{{ autoheal_memory_swap }}"
        restart_policy: unless-stopped
  when: autoheal_enabled is true

- name: Stop {{ autoheal_proper_name }}
  block:
    - name: Stop {{ autoheal_proper_name }} Container
      community.docker.docker_container:
        name: "{{ autoheal_container_name }}"
        state: absent
  when: autoheal_enabled is false
