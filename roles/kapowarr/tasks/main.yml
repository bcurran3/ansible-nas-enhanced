---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ kapowarr_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ kapowarr_container_name }}"
        hostname: "{{ kapowarr_container_name }}"
        image: "{{ kapowarr_image_name }}:{{ kapowarr_image_tag }}"
        pull: true
        volumes:
          - "{{ kapowarr_comics_directory }}:/comics:rw"
          - "{{ kapowarr_downloads_directory }}:/downloads:rw"
          - "{{ kapowarr_data_directory }}/config:/app/db:rw"
        network_mode: "bridge"
        ports:
          - "{{ kapowarr_port_http }}:8090"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ kapowarr_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ kapowarr_watchtower_monitor_only }}"
          dockflare.enable: "{{ kapowarr_dockflare_tunnel }}"
          dockflare.access.group: "{{ kapowarr_dockflare_access_group }}"
          dockflare.hostname: "{{ kapowarr_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ kapowarr_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ kapowarr_homepage_group }}"
          homepage.icon: "{{ kapowarr_homepage_icon }}"
          homepage.href: "{{ kapowarr_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ kapowarr_port_http }}"
          homepage.description: "{{ 'Kapowarr is a software to build and manage a comic book library, fitting in the *arr suite of software.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ kapowarr_container_name }}"
          homepage.showStats: "{{ kapowarr_homepage_showStats }}"
          traefik.enable: "{{ kapowarr_available_externally | string }}"
          traefik.http.routers.kapowarr.rule: "Host(`{{ kapowarr_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.kapowarr.tls.certresolver: "letsencrypt"
          traefik.http.routers.kapowarr.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.kapowarr.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ kapowarr_hostname }}"
          traefik.http.routers.kapowarr.middlewares: "{{ kapowarr_hostname }}@docker"
          traefik.http.middlewares.kapowarr.IPAllowList.sourcerange: "{{ kapowarr_traefik_whitelist }}"
          traefik.http.services.kapowarr.loadbalancer.server.port: "5656"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/Casvt/Kapowarr/releases/tag/$${major}.$${minor}.$${patch}"
        cpu_shares: "{{ kapowarr_cpu_shares }}"
        memory: "{{ kapowarr_memory }}"
        restart_policy: unless-stopped
  when: kapowarr_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ kapowarr_container_name }}"
        state: absent
  when: kapowarr_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ kapowarr_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ kapowarr_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: kapowarr_enabled is false and archive_app_data_enabled is true
