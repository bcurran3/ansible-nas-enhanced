---
# ANE
ansible_nas_app_name: "Kapowarr"
kapowarr_enabled: false
kapowarr_available_externally: false
kapowarr_traefik_whitelist: "{{ lan }}"

# directories
kapowarr_data_directory: "{{ docker_home }}/kapowarr"
kapowarr_comics_directory: "{{ comics_root }}"
kapowarr_downloads_directory: "{{ downloads_root }}"

# uid / gid
kapowarr_user_id: "1000"
kapowarr_group_id: "1000"

# network
kapowarr_hostname: "kapowarr"
kapowarr_port_http: "5656"

# docker
kapowarr_container_name: "kapowarr"
kapowarr_image_name: "mrcas/kapowarr"
kapowarr_image_tag: "latest"
kapowarr_cpu_shares: "1024"
kapowarr_memory: "1g"

# autoheal
kapowarr_autoheal: "false"

# dockflare
kapowarr_dockflare_tunnel: "false"
kapowarr_dockflare_access_group: ""

# homepage
kapowarr_homepage_group: "Apps"
kapowarr_homepage_icon: "kapowarr.png"
kapowarr_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ kapowarr_port_http }}"
kapowarr_homepage_showstats: "false"

# watchtower
kapowarr_watchtower_enable: "false"