---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ vertd_container_name }}"
        hostname: "{{ vertd_container_name }}"
        image: "{{ vertd_image_name }}:{{ vertd_image_tag }}"
        pull: true
        ports:
          - "{{ vertd_port_http }}:24153"
        runtime: "{{ 'nvidia' if nvidia_runtime_enabled | bool else omit }}"
        device_requests: "{{
          [{'driver': 'nvidia', 'count': -1, 'capabilities': ['gpu']}]
          if nvidia_runtime_enabled | bool else omit
        }}"
        env:
          WEBHOOK_URL: "{{ vertd_env_webhook_url }}"
          WEBHOOK_PINGS: "{{ vertd_env_webhook_pings }}"
          ADMIN_PASSWORD: "{{ vertd_env_admin_password }}"
          PUBLIC_URL: "{{ vertd_env_public_url }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ vertd_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ vertd_watchtower_enable }}"
          dockflare.enable: "{{ vertd_dockflare_tunnel }}"
          dockflare.access.group: "{{ vertd_dockflare_access_group }}"
          dockflare.hostname: "{{ vertd_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ vertd_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ vertd_homepage_group }}"
          homepage.icon: "{{ vertd_homepage_icon }}"
          homepage.href: "{{ vertd_homepage_href }}"
          homepage.description: "{{ 'VERT''s solution to crappy video conversion services.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ vertd_container_name }}"
          homepage.showStats: "{{ vertd_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ vertd_port_http }}"
          traefik.enable: "{{ vertd_available_externally | string }}"
          traefik.http.routers.vertd.rule: "Host(`{{ vertd_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.vertd.tls.certresolver: "letsencrypt"
          traefik.http.routers.vertd.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.vertd.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ vertd_hostname }}"
          traefik.http.routers.vertd.middlewares: "{{ vertd_hostname }}@docker"
          traefik.http.middlewares.vertd.IPAllowList.sourcerange: "{{ vertd_traefik_whitelist }}"
          traefik.http.services.vertd.loadbalancer.server.port: "24153"
          wud.tag.include: '^v\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/vert-sh/vertd/pkgs/container/vertd"
        cpu_shares: "{{ vertd_cpu_shares }}"
        memory: "{{ vertd_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (vertd_port_http | string)] +
                (['https://' + vertd_hostname + '.' + ansible_nas_domain] if (vertd_available_externally is true or vertd_dockflare_tunnel is true) else [])
              }}
  when: vertd_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ vertd_container_name }}"
        state: absent
  when: vertd_enabled is false
