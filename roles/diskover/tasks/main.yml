---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ diskover_data_directory }}/"
        - "{{ diskover_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Elasticsearch Directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "1000"
        group: "0"
      with_items:
        - "{{ diskover_data_directory }}/elasticsearch"
        - "{{ diskover_data_directory }}/elasticsearch/data"

    - name: Create {{ ansible_nas_app_name }} Network
      community.docker.docker_network:
        name: "{{ diskover_network_name }}"

    - name: Create {{ ansible_nas_app_name }} Elasticsearch Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ diskover_elasticsearch_container_name }}"
        hostname: "{{ diskover_elasticsearch_hostname }}"
        image: "{{ diskover_elasticsearch_image_name }}:{{ diskover_elasticsearch_image_tag }}"
        pull: true
        networks:
          - name: "{{ diskover_network_name }}"
        networks_cli_compatible: "yes"
        network_mode: "bridge"
        volumes:
          - "{{ diskover_data_directory }}/elasticsearch/data:/usr/share/elasticsearch/data:rw"
          - "/etc/timezone:/etc/timezone:ro"
        ports:
          - "{{ diskover_elasticsearch_port_http }}:9200"
        env:
          discovery.type: 'single-node'
          xpack.security.enabled: 'true'
          bootstrap.memory_lock: 'true'
          ES_JAVA_OPTS: '-Xms1g -Xmx1g'
          ELASTIC_PASSWORD: "topsecret"
        ulimits:
          - 'memlock:-1:-1'
        labels:
          autoheal: "{{ diskover_elasticsearch_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ diskover_elasticsearch_watchtower_enable }}"
          dockflare.enable: "{{ diskover_dockflare_tunnel }}"
          dockflare.access.group: "{{ diskover_dockflare_access_group }}"
          dockflare.hostname: "{{ diskover_elasticsearch_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ diskover_elasticsearch_port_http }}"
          homepage.group: "{{ diskover_elasticsearch_homepage_group }}"
          homepage.name: "Elasticsearch"
          homepage.icon: "{{ diskover_elasticsearch_homepage_icon }}"
          homepage.href: "{{ diskover_elasticsearch_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ diskover_elasticsearch_port_http }}"
          homepage.description: "{{ 'Free and Open Source, Distributed, RESTful Search Engine' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ diskover_elasticsearch_container_name }}"
          homepage.showStats: "{{ diskover_elasticsearch_homepage_showstats }}"
          traefik.enable: "{{ diskover_available_externally | string }}"
          traefik.http.routers.elasticsearch.rule: "Host(`{{ diskover_elasticsearch_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.elasticsearch.tls.certresolver: "letsencrypt"
          traefik.http.routers.elasticsearch.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.elasticsearch.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ diskover_elasticsearch_hostname }}"
          traefik.http.routers.elasticsearch.middlewares: "{{ diskover_elasticsearch_hostname }}@docker"
          traefik.http.middlewares.elasticsearch.IPAllowList.sourcerange: "{{ diskover_traefik_whitelist }}"
          traefik.http.services.elasticsearch.loadbalancer.server.port: "9200"
          wud.tag.transform.type: "semver"
          wud.watch.registry: "https://public.ecr.aws"
          wud.link.template: "https://gallery.ecr.aws/elastic/elasticsearch"
        cpu_shares: "{{ diskover_elasticsearch_cpu_shares }}"
        memory: "{{ diskover_elasticsearch_memory }}"

    - name: Access {{ ansible_nas_app_name }} Elasticsearch at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (diskover_elasticsearch_port_http | string)] +
                (['https://' + diskover_hostname + '.' + ansible_nas_domain] if (diskover_available_externally is true or diskover_dockflare_tunnel is true) else [])
              }}
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Elasticsearch-helper Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ diskover_elasticsearch_helper_container_name }}"
        hostname: "{{ diskover_elasticsearch_helper_container_name }}"
        image: "{{ diskover_elasticsearch_helper_image_name }}:{{ diskover_elasticsearch_helper_image_tag }}"
        pull: true
        networks:
          - name: "{{ diskover_network_name }}"
        networks_cli_compatible: "yes"
        network_mode: "bridge"
        command: sh -c "sysctl -w vm.max_map_count=262144"
        privileged: true
        labels:
          autoheal: "false"
          com.centurylinklabs.watchtower.enable: "{{ diskover_elasticsearch_watchtower_enable }}"
          dockflare.enable: "false"
          traefik.enable: "false"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ diskover_container_name }}"
        hostname: "{{ diskover_container_name }}"
        image: "{{ diskover_image_name }}:{{ diskover_image_tag }}"
        pull: true
        links:
          - "{{ diskover_elasticsearch_container_name }}"
        networks:
          - name: "{{ diskover_network_name }}"
        networks_cli_compatible: "yes"
        network_mode: "bridge"
        volumes:
          - "{{ samba_shares_root }}:/data:ro"
          - "{{ samba_shares_other_root }}:/data2:ro"
          - "{{ diskover_data_directory }}/config:/config"
        env:
          DOCKER_MODS: "{{ diskover_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ diskover_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ diskover_env_docker_mods_install_pip_packages}}"
          ES_USER: "elastic"
          ES_PORT: "9200"
          ES_PASS: "topsecret"
          ES_HOST: "{{ diskover_elasticsearch_container_name }}"
          PUID: "1000"
          PGID: "1000"
          TZ: "{{ ansible_nas_timezone }}"
        ports:
          - "{{ diskover_port_http }}:80"
        labels:
          autoheal: "{{ diskover_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ diskover_watchtower_enable }}"
          dockflare.enable: "{{ diskover_dockflare_tunnel }}"
          dockflare.access.group: "{{ diskover_dockflare_access_group }}"
          dockflare.hostname: "{{ diskover_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ diskover_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ diskover_homepage_group }}"
          homepage.href: "{{ diskover_homepage_href }}"
          homepage.icon: "{{ diskover_homepage_icon }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ diskover_port_http }}"
          homepage.description: "{{ 'Open source file indexer, file search engine and data management and analytics powered by Elasticsearch' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ diskover_container_name }}"
          homepage.showStats: "{{ diskover_homepage_showstats }}"
          traefik.enable: "{{ diskover_available_externally | string }}"
          traefik.http.routers.diskover.rule: "Host(`{{ diskover_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.diskover.tls.certresolver: "letsencrypt"
          traefik.http.routers.diskover.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.diskover.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ diskover_hostname }}"
          traefik.http.routers.diskover.middlewares: "{{ diskover_hostname }}@docker"
          traefik.http.middlewares.diskover.IPAllowList.sourcerange: "{{ diskover_traefik_whitelist }}"
          traefik.http.services.diskover.loadbalancer.server.port: "80"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://lscr.io/linuxserver/diskover"
        cpu_shares: "{{ diskover_cpu_shares }}"
        memory: "{{ diskover_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (diskover_port_http | string)] +
                (['https://' + diskover_hostname + '.' + ansible_nas_domain] if (diskover_available_externally is true or diskover_dockflare_tunnel is true) else [])
              }}
  when: diskover_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ diskover_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} Elasticsearch HelperContainer
      community.docker.docker_container:
        name: "elasticsearch-helper"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} Elasticsearch Container
      community.docker.docker_container:
        name: "{{ diskover_elasticsearch_container_name }}"
        state: absent

    - name: Delete {{ ansible_nas_app_name }} Network
      community.docker.docker_network:
        name: "{{ diskover_network_name }}"
        state: absent
  when: diskover_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ diskover_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ diskover_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: diskover_enabled is false and archive_app_data_enabled is true
