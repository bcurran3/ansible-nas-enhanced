---
# ANE
ansible_nas_app_name: "Readarr"
readarr_enabled: false
readarr_traefik_enabled: false
readarr_traefik_whitelist: "{{ lan }}"

# directories
readarr_data_directory: "{{ docker_home }}/readarr"
readarr_download_directory: "{{ downloads_root }}"
readarr_books_directory: "{{ books_root }}"

# docker
# linuxserver deprecated due to lack of development and removed images from their repo
#https://docs.linuxserver.io/deprecated_images/docker-readarr/
readarr_container_name: "readarr"
readarr_image_name: "linuxserver/readarr"
readarr_image_version: "0.4.19-nightly"

# uid / gid
readarr_user_id: "0"
readarr_group_id: "0"

# network
readarr_hostname: "readarr"
readarr_port_http: "8787"

# specs
readarr_cpu_shares: 1024
readarr_memory: "1G"

# autoheal
readarr_autoheal_enabled: false

# dockflare
readarr_dockflare_enabled: false
readarr_dockflare_access_group: ""

# homepage
readarr_homepage_group: "Media Management"
readarr_homepage_icon: "readarr.png"
readarr_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ readarr_port_http }}"
readarr_homepage_showstats: false
readarr_homepage_widget_key: ""

# linuxserver.io docker mods
readarr_env_docker_mods: ""
readarr_env_docker_mods_install_packages: ""
readarr_env_docker_mods_install_pip_packages: ""

# theme.park themes
# https://docs.theme-park.dev/themes/readarr/
readarr_env_docker_mods_tp_theme: ""
readarr_env_docker_mods_community_theme: ""
readarr_env_docker_mods_domain: ""
readarr_env_docker_mods_addon: ""

# repliqate
readarr_repliqate_enabled: false
readarr_repliqate_engine: "restic"
readarr_repliqate_schedule: "@daily 3am"
readarr_repliqate_backup_id: "{{ readarr_container_name }}"
readarr_repliqate_retention: "30d"

# tinyauth
readarr_tinyauth_enabled: false

# watchtower
readarr_watchtower_enabled: false