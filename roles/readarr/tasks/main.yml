---
  # NOTE: deprecated / retired
  # https://github.com/linuxserver/docker-readarr
  # https://github.com/Readarr/Readarr
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ readarr_data_directory }}"
        - "{{ readarr_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ readarr_container_name }}"
        hostname: "{{ readarr_container_name }}"
        image: "{{ readarr_image_name }}:{{ readarr_image_version }}"
        pull: true
        volumes:
          - "{{ readarr_data_directory }}/config:/config:rw"
          - "{{ books_root }}:/books:rw"
          - "{{ readarr_download_directory }}:/downloads:rw"
        env:
          DOCKER_MODS: "{{ readarr_env_docker_mods }}"
          PUID: "{{ readarr_user_id }}"
          PGID: "{{ readarr_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        ports:
          - "{{ readarr_port }}:8787"
        labels:
          autoheal: "{{ readarr_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ readarr_watchtower_enable }}"
          dockflare.enable: "{{ readarr_dockflare_tunnel }}"
          dockflare.access.group: "{{ readarr_dockflare_access_group }}"
          dockflare.hostname: "{{ readarr_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ readarr_port }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ readarr_homepage_group }}"
          homepage.icon: "{{ readarr_homepage_icon }}"
          homepage.href: "{{ readarr_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ readarr_port }}"
          homepage.description: "{{ 'Book Manager and Automation (Sonarr for Ebooks)' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ readarr_container_name }}"
          homepage.showStats: "{{ readarr_homepage_showstats }}"
          homepage.widget.type: "readarr"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ readarr_port }}"
          homepage.widget.key: "{{ readarr_homepage_widget_key }}"
          traefik.enable: "{{ readarr_available_externally | string }}"
          traefik.http.routers.readarr.rule: "Host(`{{ readarr_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.readarr.tls.certresolver: "letsencrypt"
          traefik.http.routers.readarr.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.readarr.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ readarr_hostname }}"
          traefik.http.routers.readarr.middlewares: "{{ readarr_hostname }}@docker"
          traefik.http.middlewares.readarr.IPAllowList.sourcerange: "{{ readarr_traefik_whitelist }}"
          traefik.http.services.readarr.loadbalancer.server.port: "8787"
          wud.watch.digest: "true"
          wud.link.template: "https://lscr.io/linuxserver/readarr"
        cpu_shares: "{{ readarr_cpu_shares }}"
        memory: "{{ readarr_memory }}"
        restart_policy: unless-stopped
  when: readarr_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "readarr"
        state: absent
  when: readarr_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ readarr_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ readarr_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: readarr_enabled is false and archive_app_data_enabled is true
