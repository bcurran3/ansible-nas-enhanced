---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ medialytics_container_name }}"
        hostname: "{{ medialytics_container_name }}"
        image: "{{ medialytics_image_name }}:{{ medialytics_image_tag }}"
        pull: true
        ports:
          - "{{ medialytics_port_http }}:80"
        network_mode: bridge
        env:
          SERVER_IP: "{{ medialytics_env_server_ip }}"
          SERVER_TOKEN: "{{ medialytics_env_server_token }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ medialytics_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ medialytics_watchtower_enable }}"
          dockflare.enable: "{{ medialytics_dockflare_tunnel }}"
          dockflare.access.group: "{{ medialytics_dockflare_access_group }}"
          dockflare.hostname: "{{ medialytics_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ medialytics_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ medialytics_homepage_group }}"
          homepage.icon: "{{ medialytics_homepage_icon }}"
          homepage.href: "{{ medialytics_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ medialytics_port_http }}"
          homepage.description: "{{ 'A basic, free tool that shows information about Plex Media Server content' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ medialytics_container_name }}"
          homepage.showStats: "{{ medialytics_homepage_showstats }}"
          traefik.enable: "{{ medialytics_available_externally | string }}"
          traefik.http.routers.medialytics.rule: "Host(`{{ medialytics_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.medialytics.tls.certresolver: "letsencrypt"
          traefik.http.routers.medialytics.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.medialytics.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ medialytics_hostname }}"
          traefik.http.routers.medialytics.middlewares: "{{ medialytics_hostname }}@docker"
          traefik.http.middlewares.medialytics.IPAllowList.sourcerange: "{{ medialytics_traefik_whitelist }}"
          traefik.http.services.medialytics.loadbalancer.server.port: "80"
          wud.tag.include: '^v?\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/drewpeifer/Medialytics/releases"
        cpu_shares: "{{ medialytics_cpu_shares }}"
        memory: "{{ medialytics_memory_limit }}"
        restart_policy: unless-stopped
  when: medialytics_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ medialytics_container_name }}"
        state: absent
  when: medialytics_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ medialytics_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ medialytics_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: medialytics_enabled is false and archive_app_data_enabled is true
