---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ medialytics_container_name }}"
        hostname: "{{ medialytics_container_name }}"
        image: "{{ medialytics_image_name }}:{{ medialytics_image_tag }}"
        pull: true
        ports:
          - "{{ medialytics_port_http }}:80"
        network_mode: bridge
        env:
          SERVER_IP: "{{ medialytics_env_server_ip }}"
          SERVER_TOKEN: "{{ medialytics_env_server_token }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ medialytics_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ medialytics_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ medialytics_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ medialytics_dockflare_access_group }}"
          dockflare.hostname: "{{ medialytics_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ medialytics_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ medialytics_homepage_group }}"
          homepage.icon: "{{ medialytics_homepage_icon }}"
          homepage.href: "{{ medialytics_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ medialytics_port_http }}"
          homepage.description: "{{ 'A free analytics tool for Plex servers' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ medialytics_container_name }}"
          homepage.showStats: "{{ medialytics_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ medialytics_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ medialytics_repliqate_engine }}"
          repliqate.schedule: "{{ medialytics_repliqate_schedule }}"
          repliqate.backup_id: "{{ medialytics_repliqate_backup_id }}"
          repliqate.retention: "{{ medialytics_repliqate_retention }}"
          traefik.enable: "{{ medialytics_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.medialytics.rule: "Host(`{{ medialytics_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.medialytics.tls.certresolver: "letsencrypt"
          traefik.http.routers.medialytics.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.medialytics.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.medialytics.middlewares: "medialytics@docker{{ ',tinyauth-auth@docker' if medialytics_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.medialytics.IPAllowList.sourcerange: "{{ medialytics_traefik_whitelist }}"
          traefik.http.services.medialytics.loadbalancer.server.port: "80"
          wud.tag.include: '^v?\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/drewpeifer/Medialytics/releases"
        cpu_shares: "{{ medialytics_cpu_shares }}"
        memory: "{{ medialytics_memory }}"
        memory_swap: "{{ medialytics_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (medialytics_port_http | string)] +
                (['https://' + medialytics_hostname + '.' + ansible_nas_domain] if (medialytics_traefik_enabled is true or medialytics_dockflare_enabled is true) else [])
              }}
  when: medialytics_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ medialytics_container_name }}"
        state: absent
  when: medialytics_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ medialytics_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - medialytics_enabled is false