---
# ANE
ansible_nas_app_name: "Medialytics"
medialytics_enabled: false
medialytics_available_externally: false
medialytics_traefik_whitelist: "{{ lan }}"
medialytics_data_directory: "{{ docker_home }}/medialytics"

# app
medialytics_env_server_ip: "xxx.xxx.xxx.xxx" # public ip here
medialytics_env_server_token: "insert_your_token_here"

# network
medialytics_hostname: "medialytics"
medialytics_port_http: 3044

# docker
medialytics_container_name: "medialytics"
medialytics_image_name: "ghcr.io/drewpeifer/medialytics"
medialytics_image_tag: "latest"
medialytics_cpu_shares: 1024
medialytics_memory_limit: "1g"

# autoheal
medialytics_autoheal: "false"

# dockflare
medialytics_dockflare_tunnel: "false"
medialytics_dockflare_access_group: ""

# homepage
medialytics_homepage_group: "Apps"
medialytics_homepage_icon: "medialytics.png"
medialytics_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ medialytics_port_http }}"
medialytics_homepage_showstats: "false"

# repliqate
medialytics_repliqate_enabled: "false"
medialytics_repliqate_engine: "restic"
medialytics_repliqate_schedule: "@daily 3am"
medialytics_repliqate_backup_id: "{{ medialytics_container_name }}"
medialytics_repliqate_retention: "30d"

# watchtower
medialytics_watchtower_enable: "false"
