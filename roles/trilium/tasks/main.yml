---
- name: Start {{ trilium_proper_name }}
  block:
    - name: Create {{ trilium_proper_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ trilium_data_directory }}"
        - "{{ trilium_data_directory }}/data"

    - name: Set {{ trilium_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        trilium_homepage_href: "https://{{ trilium_hostname }}.{{ ansible_nas_domain }}"
      when: trilium_traefik_enabled | bool or trilium_dockflare_enabled | bool

    - name: Create {{ trilium_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ trilium_container_name }}"
        hostname: "{{ trilium_container_name }}"
        image: "{{ trilium_image_name }}:{{ trilium_image_tag }}"
        pull: true
        volumes:
          - "{{ trilium_data_directory }}/data:/home/node/trilium-data"
          - /etc/timezone:/etc/timezone:ro
          - /etc/localtime:/etc/localtime:ro
        ports:
          - "{{ trilium_port_http }}:8080"
        env:
          USER_UID: "{{ trilium_env_user_uid }}"
          USER_GID: "{{ trilium_env_user_gid }}"
          TRILIUM_DATA_DIR: "/home/node/trilium-data"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ trilium_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ trilium_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ trilium_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ trilium_dockflare_access_group }}"
          dockflare.hostname: "{{ trilium_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ trilium_port_http }}"
          homepage.name: "{{ trilium_proper_name }}"
          homepage.group: "{{ trilium_homepage_group }}"
          homepage.icon: "{{ trilium_homepage_icon }}"
          homepage.href: "{{ trilium_homepage_href }}"
          homepage.description: "{{ 'Build your personal knowledge base' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ trilium_container_name }}"
          homepage.showStats: "{{ trilium_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ trilium_port_http }}"
          homepage.widget.type: "trilium"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ trilium_port_http }}"
          homepage.widget.key: "{{ trilium_homepage_widget_key }}"
          repliqate.enabled: "{{ trilium_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ trilium_repliqate_engine }}"
          repliqate.schedule: "{{ trilium_repliqate_schedule }}"
          repliqate.backup_id: "{{ trilium_repliqate_backup_id }}"
          repliqate.retention: "{{ trilium_repliqate_retention }}"
          traefik.enable: "{{ trilium_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.trilium.rule: "Host(`{{ trilium_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.trilium.tls.certresolver: "letsencrypt"
          traefik.http.routers.trilium.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.trilium.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.trilium.middlewares: "trilium@docker{{ ',tinyauth-auth@docker' if trilium_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.trilium.IPAllowList.sourcerange: "{{ trilium_traefik_whitelist }}"
          traefik.http.services.trilium.loadbalancer.server.port: "8080"
          wud.tag.include: '^v\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/TriliumNext/Trilium/pkgs/container/trilium"
        cpu_shares: "{{ trilium_cpu_shares }}"
        memory: "{{ trilium_memory }}"
        memory_swap: "{{ trilium_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ trilium_proper_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (trilium_port_http | string)] +
                (['https://' + trilium_hostname + '.' + ansible_nas_domain] if (trilium_traefik_enabled is true or trilium_dockflare_enabled is true) else [])
              }}
  when: trilium_enabled is true

- name: Stop {{ trilium_proper_name }}
  block:
    - name: Stop {{ trilium_proper_name }} Container
      community.docker.docker_container:
        name: "{{ trilium_container_name }}"
        state: absent
  when: trilium_enabled is false

- name: Data Archive {{ trilium_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ trilium_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - trilium_enabled is false