---
# ANE
ansible_nas_app_name: "Trilium Notes"
trilium_enabled: false
trilium_available_externally: false
trilium_traefik_whitelist: "{{ lan }}"

# directories
trilium_data_directory: "{{ docker_home }}/trilium"

# docker
trilium_container_name: "trilium"
trilium_image_name: "ghcr.io/triliumnext/trilium"
trilium_image_tag: "latest"

# network
trilium_port_http: "8082"
trilium_hostname: "trilium"

# specs
trilium_cpu_shares: "1024"
trilium_memory: 1g

# app
trilium_env_user_uid: "0"  # saved data
trilium_env_user_gid: "0"  # saved data

# autoheal
trilium_autoheal: "false"

# dockflare
trilium_dockflare_tunnel: "false"
trilium_dockflare_access_group: ""

# homepage
trilium_homepage_group: "Apps"
trilium_homepage_icon: "sh-trilium-notes.png"
trilium_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ trilium_port_http }}"
trilium_homepage_showstats: "false"

# repliqate
trilium_repliqate_enabled: "false"
trilium_repliqate_engine: "restic"
trilium_repliqate_schedule: "@daily 3am"
trilium_repliqate_backup_id: "{{ trilium_container_name }}"
trilium_repliqate_retention: "30d"

# watchtower
trilium_watchtower_enable: "false"
