---
# ANE
pytivo_proper_name: "pyTivo"
pytivo_enabled: false
pytivo_traefik_enabled: false
pytivo_traefik_whitelist: "{{ lan }}"

# directories
pytivo_data_directory: "{{ docker_home }}/pytivo"
pytivo_movies_directory: "{{ movies_root }}"
pytivo_tv_directory: "{{ tv_root }}"
pytivo_photos_directory: "{{ photos_root }}"
pytivo_music_directory: "{{ music_root }}"
pytivo_podcasts_directory: "{{ podcasts_root }}"

# uid / gid
pytivo_user_id: "0"
pytivo_group_id: "0"

# network
pytivo_hostname: "pytivo"
pytivo_port_http: "9032"

# docker
pytivo_container_name: "pytivo"
pytivo_image_name: "pinion/docker-pytivo"
pytivo_image_version: "latest"

# specs
pytivo_cpu_shares: 1024
pytivo_memory: "1G"
pytivo_memory_swap: -1

# autoheal
pytivo_autoheal_enabled: false

# dockflare
pytivo_dockflare_enabled: false
pytivo_dockflare_access_group: ""

# homepage
pytivo_homepage_group: "Apps"
pytivo_homepage_icon: "pytivo.png"
pytivo_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:9032"
pytivo_homepage_showstats: false

# repliqate
pytivo_repliqate_enabled: false
pytivo_repliqate_engine: "restic"
pytivo_repliqate_schedule: "@daily 3am"
pytivo_repliqate_backup_id: "{{ pytivo_container_name }}"
pytivo_repliqate_retention: "30d"

# tinyauth
pytivo_tinyauth_enabled: false

# watchtower
pytivo_watchtower_enabled: false