---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: 0777
      with_items:
        - "{{ pytivo_data_directory }}"
        - "{{ pytivo_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ pytivo_container_name }}"
        hostname: "{{ pytivo_container_name }}"
        image: "{{ pytivo_image_name }}:{{ pytivo_image_version }}"
        pull: true
        volumes:
          - "/etc/localtime:/etc/localtime:ro"
          - "{{ pytivo_data_directory }}/config:/config:rw"
          - "{{ pytivo_movies_directory }}:/movies:ro"
          - "{{ pytivo_tv_directory }}:/tv:ro"
          - "{{ pytivo_photos_directory }}:/photos:ro"
          - "{{ pytivo_music_directory }}:/music:ro"
          - "{{ pytivo_podcasts_directory }}:/podcasts:ro"
        ports:
          - "9032:9032"
          - "2190:2190/udp"
        env:
          TZ: "{{ ansible_nas_timezone }}"
          PUID: "{{ pytivo_user_id }}"
          PGID: "{{ pytivo_group_id }}"
        restart_policy: unless-stopped
        cpu_shares: "{{ pytivo_cpu_shares }}"
        memory: "{{ pytivo_memory }}"
        labels:
          autoheal: "{{ pytivo_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ pytivo_watchtower_monitor_only }}"
          traefik.enable: "{{ pytivo_available_externally | string }}"
          traefik.http.routers.pytivo.rule: "Host(`{{ pytivo_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.pytivo.tls.certresolver: "letsencrypt"
          traefik.http.routers.pytivo.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.pytivo.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.services.pytivo.loadbalancer.server.port: "9032"
  when: pytivo_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ pytivo_container_name }}"
        state: absent
  when: pytivo_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ pytivo_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ pytivo_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: pytivo_enabled is false and archive_app_data_enabled is true
