---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ gamevault_data_directory }}"
        - "{{ gamevault_data_directory }}/config"
        - "{{ gamevault_data_directory }}/db"
        - "{{ gamevault_data_directory }}/files"
        - "{{ gamevault_data_directory }}/media"
        - "{{ gamevault_data_directory }}/plugins"
        - "{{ gamevault_games_directory }}"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        gamevault_homepage_href: "https://{{ gamevault_hostname }}.{{ ansible_nas_domain }}"
      when: gamevault_traefik_enabled | bool or gamevault_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ gamevault_db_container_name }}"
        hostname: "{{ gamevault_db_container_name }}"
        image: "{{ gamevault_db_image_name }}:{{ gamevault_db_image_tag }}"
        pull: true
        volumes:
          - "{{ gamevault_data_directory }}/db:/var/lib/postgresql/data"
        env:
          POSTGRES_USER: "gamevault"
          POSTGRES_PASSWORD: "gamevault"
          POSTGRES_DB: "gamevault"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: ["CMD-SHELL", "pg_isready -U gamevault"]
          interval: 10s
          timeout: 5s
          retries: 5
          start_period: 30s
        labels:
          autoheal: "{{ gamevault_db_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ gamevault_db_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} PostgreSQL"
          homepage.group: "{{ gamevault_db_homepage_group }}"
          homepage.icon: "{{ gamevault_db_homepage_icon }}"
          homepage.href: "{{ gamevault_db_homepage_href }}"
          homepage.description: "{{ 'PostgreSQL Database Management System' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ gamevault_db_container_name }}"
          homepage.showStats: "{{ gamevault_db_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ gamevault_db_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ gamevault_db_repliqate_engine }}"
          repliqate.schedule: "{{ gamevault_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ gamevault_db_repliqate_backup_id }}"
          repliqate.retention: "{{ gamevault_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^v\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/Phalcode/GameVault-Backend/pkgs/container/gamevault-backend"
        cpu_shares: "{{ gamevault_db_cpu_shares }}"
        memory: "{{ gamevault_db_memory }}"
        memory_swap: "{{ gamevault_db_memory_swap }}"
        restart_policy: unless-stopped
      register: gamevault_db_status

    - name: Verify {{ ansible_nas_app_name }} DB is healthy
      community.docker.docker_container_info:
        name: "{{ gamevault_db_container_name }}"
      register: db_info
      until: "db_info.container.State.Health.Status == 'healthy'"
      retries: 30
      delay: 5

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ gamevault_container_name }}"
        hostname: "{{ gamevault_container_name }}"
        image: "{{ gamevault_image_name }}:{{ gamevault_image_tag }}"
        pull: true
        links:
         - "{{ gamevault_db_container_name }}"
        volumes:
          - "{{ gamevault_data_directory }}/config:/config"
          - "{{ gamevault_data_directory }}/media:/media"
          - "{{ gamevault_data_directory }}/plugins:/plugins"
          - "{{ gamevault_games_directory }}:/files"
        ports:
          - "{{ gamevault_port_http }}:8080"
        env:
          DB_HOST: "{{ gamevault_db_container_name }}"
          DB_USERNAME: "gamevault"
          DB_PASSWORD: "gamevault"
          METADATA_IGDB_CLIENT_ID: "{{ gamevault_metadata_igdb_client_id }}"
          METADATA_IGDB_CLIENT_SECRET: "{{ gamevault_metadata_igdb_client_secret }}"
#         SERVER_ADMIN_USERNAME: "admin"
#         SERVER_ADMIN_PASSWORD: "{{ gamevault_server_admin_password }}"
          RAWG_API_KEY: "{{ gamevault_rawg_api_key }}"
          PUID: "{{ gamevault_puid }}"
          PGID: "{{ gamevault_pgid }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ gamevault_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ gamevault_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ gamevault_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ gamevault_dockflare_access_group }}"
          dockflare.hostname: "{{ gamevault_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ gamevault_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ gamevault_homepage_group }}"
          homepage.icon: "{{ gamevault_homepage_icon }}"
          homepage.href: "{{ gamevault_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ gamevault_port_http }}"
          homepage.description: "{{ 'the self-hosted gaming platform for drm-free games' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ gamevault_container_name }}"
          homepage.showStats: "{{ gamevault_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ gamevault_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ gamevault_repliqate_engine }}"
          repliqate.schedule: "{{ gamevault_repliqate_schedule }}"
          repliqate.backup_id: "{{ gamevault_repliqate_backup_id }}"
          repliqate.retention: "{{ gamevault_repliqate_retention }}"
          traefik.enable: "{{ gamevault_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.gamevault.rule: "Host(`{{ gamevault_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.gamevault.tls.certresolver: "letsencrypt"
          traefik.http.routers.gamevault.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.gamevault.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.gamevault.middlewares: "gamevault@docker{{ ',tinyauth-auth@docker' if gamevault_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.gamevault.IPAllowList.sourcerange: "{{ gamevault_traefik_whitelist }}"
          traefik.http.services.gamevault.loadbalancer.server.port: "8080"
          wud.tag.include: '^v?\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/phalcode/gamevault-backend"
        cpu_shares: "{{ gamevault_cpu_shares }}"
        memory: "{{ gamevault_memory }}"
        memory_swap: "{{ gamevault_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (gamevault_port_http | string)] +
                (['https://' + gamevault_hostname + '.' + ansible_nas_domain] if (gamevault_traefik_enabled is true or gamevault_dockflare_enabled is true) else [])
              }}
  when: gamevault_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ gamevault_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ gamevault_db_container_name }}"
        state: absent
  when: gamevault_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ gamevault_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - gamevault_enabled is false