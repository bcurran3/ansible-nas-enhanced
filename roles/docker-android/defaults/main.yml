---
# ANE
docker_android_proper_name: "Docker-Android"
docker_android_enabled: false
docker_android_traefik_enabled: false
docker_android_traefik_whitelist: "{{ lan }}"

# directories
docker_android_data_directory: "{{ docker_home }}/docker-android"

# docker
docker_android_container_name: "docker-android"
docker_android_image_name: "budtmo/docker-android"
docker_android_image_tag: "emulator_14.0" # https://github.com/budtmo/docker-android

# network
docker_android_port_http: "6080"
docker_android_hostname: "dockerandroid"

# specs
docker_android_cpu_shares: 1024
docker_android_memory: "8G"
docker_android_memory_swap: -1

# app
docker_android_env_emulator_device: "Samsung Galaxy S10" # https://github.com/budtmo/docker-android

# autoheal
docker_android_autoheal_enabled: false

# dockflare
docker_android_dockflare_enabled: false
docker_android_dockflare_access_group: ""

# homepage
docker_android_homepage_group: "Apps"
docker_android_homepage_icon: "android.png"
docker_android_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ docker_android_port_http }}"
docker_android_homepage_showstats: false

# repliqate
docker_android_repliqate_enabled: false
docker_android_repliqate_engine: "restic"
docker_android_repliqate_schedule: "@daily 3am"
docker_android_repliqate_backup_id: "{{ docker_android_container_name }}"
docker_android_repliqate_retention: "30d"

# tinyauth
docker_android_tinyauth_enabled: false

# watchtower
docker_android_watchtower_enabled: false
