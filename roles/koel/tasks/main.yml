---
# WORK IN PROGRESS
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ koel_data_directory }}"
        - "{{ koel_data_directory }}/db"
        - "{{ koel_data_directory }}/index"
        - "{{ koel_data_directory }}/storage"
        - "{{ koel_data_directory }}/sql"

##############################################
# this needs an initialization
# https://github.com/koel/docker?tab=readme-ov-file

# docker exec --user www-data -it "{{ koel_container_name }}" bash
# php artisan koel:init --no-assets
# docker exec -it "{{ koel_container_name }}" php artisan koel:admin:change-password

##############################################

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ koel_db_container_name }}"
        hostname: "{{ koel_db_container_name }}"
        image: "{{ koel_db_image_name }}:{{ koel_db_image_tag }}"
        pull: true
        volumes:
          - "{{ koel_data_directory }}/db:/var/lib/mysql"
        env:
          MYSQL_ROOT_PASSWORD: "{{ koel_db_env_mysql_root_password }}"
          MYSQL_DATABASE: "{{ koel_env_db_database }}"
          MYSQL_USER: "{{ koel_env_db_username }}"
          MYSQL_PASSWORD: "{{ koel_env_db_password }}"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
              test:
                - CMD
                - /usr/local/bin/healthcheck.sh
                - --su-mysql
                - --connect
                - --innodb_initialized
              interval: "30s"
              timeout: "10s"
              retries: "3"
              start_period: "30s"
        labels:
          autoheal: "{{ koel_db_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ koel_db_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} MariaDB"
          homepage.group: "{{ koel_db_homepage_group }}"
          homepage.icon: "{{ koel_db_homepage_icon }}"
          homepage.href: "{{ koel_homepage_href }}"
          homepage.description: "{{ 'MariaDB Server is a high performing open source relational database, forked from MySQL.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ koel_db_container_name }}"
          homepage.showStats: "{{ koel_db_homepage_showstats }}"
          repliqate.enabled: "{{ koel_db_repliqate_enabled }}"
          repliqate.engine: "{{ koel_db_repliqate_engine }}"
          repliqate.schedule: "{{ koel_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ koel_db_repliqate_backup_id }}"
          repliqate.retention: "{{ koel_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/mariadb"
        cpu_shares: "{{ koel_db_cpu_shares }}"
        memory: "{{ koel_db_memory }}"
        memory_swap: "{{ koel_db_memory_swap }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ koel_container_name }}"
        hostname: "{{ koel_container_name }}"
        image: "{{ koel_image_name }}:{{ koel_image_tag }}"
        pull: true
        volumes:
          - "{{ koel_data_directory }}/index:/var/www/html/storage/search-indexes"
          - "{{ koel_data_directory }}/storage:/var/www/html/public/img/storage"
          - "{{ koel_data_directory }}/sql:/docker-entrypoint-initdb.d"
          - "{{ koel_music_directory }}:/music:rw"
        ports:
          - "{{ koel_port_http }}:80"
        env:
######### TEST ##########
          APP_KEY: "base64:4iWpqeVBcYI2O1rXhxGhFxc0gAPgwrfajeJYD8apUJc="
          MEDIA_PATH: "/music"
          MEMORY_LIMIT: "{{ koel_memory }}"
          LASTFM_API_KEY: ""
          LASTFM_API_SECRET: ""
          SPOTIFY_CLIENT_ID: ""
          SPOTIFY_CLIENT_SECRET: ""
######### TEST ##########
          DB_CONNECTION: "{{ koel_env_db_connection }}"
          DB_HOST: "{{ koel_db_container_name }}"
          DB_USERNAME: "{{ koel_env_db_username }}"
          DB_PASSWORD: "{{ koel_env_db_password }}"
          DB_DATABASE: "{{ koel_env_db_database }}"
          TZ: "{{ ansible_nas_timezone }}"
        links:
          - "{{ koel_db_container_name }}"
        labels:
          autoheal: "{{ koel_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ koel_watchtower_enable }}"
          dockflare.enable: "{{ koel_dockflare_tunnel }}"
          dockflare.access.group: "{{ koel_dockflare_access_group }}"
          dockflare.hostname: "{{ koel_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ koel_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ koel_homepage_group }}"
          homepage.icon: "{{ koel_homepage_icon }}"
          homepage.href: "{{ koel_homepage_href }}"
          homepage.description: "{{ 'Open-source music streaming software' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ koel_container_name }}"
          homepage.showStats: "{{ koel_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ koel_port_http }}"
          repliqate.enabled: "{{ koel_repliqate_enabled }}"
          repliqate.engine: "{{ koel_repliqate_engine }}"
          repliqate.schedule: "{{ koel_repliqate_schedule }}"
          repliqate.backup_id: "{{ koel_repliqate_backup_id }}"
          repliqate.retention: "{{ koel_repliqate_retention }}"
          traefik.enable: "{{ koel_available_externally | string }}"
          traefik.http.routers.koel.rule: "Host(`{{ koel_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.koel.tls.certresolver: "letsencrypt"
          traefik.http.routers.koel.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.koel.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.koel.middlewares: "koel@docker{{ ',tinyauth-auth@docker' if koel_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.koel.IPAllowList.sourcerange: "{{ koel_traefik_whitelist }}"
          traefik.http.services.koel.loadbalancer.server.port: "80"
          wud.tag.include: '^v\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/phanan/koel"
        cpu_shares: "{{ koel_cpu_shares }}"
        memory: "{{ koel_memory }}"
        memory_swap: "{{ koel_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (koel_port_http | string)] +
                (['https://' + koel_hostname + '.' + ansible_nas_domain] if (koel_available_externally is true or koel_dockflare_tunnel is true) else [])
              }}
  when: koel_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ koel_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ koel_db_container_name }}"
        state: absent
  when: koel_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ koel_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - koel_enabled is false