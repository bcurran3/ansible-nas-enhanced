---
# WORK IN PROGRESS
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ koel_data_directory }}"
        - "{{ koel_data_directory }}/db"
        - "{{ koel_data_directory }}/index"
        - "{{ koel_data_directory }}/storage"
        - "{{ koel_data_directory }}/sql"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        koel_env_app_url: "https://{{ koel_hostname }}.{{ ansible_nas_domain }}"
        koel_env_force_https: "true"
        koel_homepage_href: "https://{{ koel_hostname }}.{{ ansible_nas_domain }}"
      when: koel_traefik_enabled | bool or koel_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ koel_db_container_name }}"
        hostname: "{{ koel_db_container_name }}"
        image: "{{ koel_db_image_name }}:{{ koel_db_image_tag }}"
        pull: true
        volumes:
          - "{{ koel_data_directory }}/db:/var/lib/mysql"
        env:
          MYSQL_ROOT_PASSWORD: "{{ koel_env_db_mysql_root_password }}"
          MYSQL_DATABASE: "{{ koel_env_db_database }}"
          MYSQL_USER: "{{ koel_env_db_username }}"
          MYSQL_PASSWORD: "{{ koel_env_db_password }}"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
              test:
                - CMD
                - /usr/local/bin/healthcheck.sh
                - --su-mysql
                - --connect
                - --innodb_initialized
              interval: "30s"
              timeout: "10s"
              retries: "3"
              start_period: "30s"
        labels:
          autoheal: "{{ koel_db_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ koel_db_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} MariaDB"
          homepage.group: "{{ koel_db_homepage_group }}"
          homepage.icon: "{{ koel_db_homepage_icon }}"
          homepage.href: "{{ koel_homepage_href }}"
          homepage.description: "{{ 'MariaDB Server is a high performing open source relational database, forked from MySQL.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ koel_db_container_name }}"
          homepage.showStats: "{{ koel_db_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ koel_db_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ koel_db_repliqate_engine }}"
          repliqate.schedule: "{{ koel_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ koel_db_repliqate_backup_id }}"
          repliqate.retention: "{{ koel_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/mariadb"
        cpu_shares: "{{ koel_db_cpu_shares }}"
        memory: "{{ koel_db_memory }}"
        memory_swap: "{{ koel_db_memory_swap }}"
        restart_policy: unless-stopped

    - name: Verify {{ ansible_nas_app_name }} DB is healthy
      community.docker.docker_container_info:
        name: "{{ koel_db_container_name }}"
      register: db_info
      until: "db_info.container.State.Health.Status == 'healthy'"
      retries: 30
      delay: 5

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ koel_container_name }}"
        hostname: "{{ koel_container_name }}"
        image: "{{ koel_image_name }}:{{ koel_image_tag }}"
        pull: true
        volumes:
          - "{{ koel_data_directory }}/index:/var/www/html/storage/search-indexes"
          - "{{ koel_data_directory }}/storage:/var/www/html/public/img/storage"
          - "{{ koel_data_directory }}/sql:/docker-entrypoint-initdb.d"
          - "{{ koel_music_directory }}:/music:rw"
        ports:
          - "{{ koel_port_http }}:80"
        env:
#          ADMIN_EMAIL: "{{ koel_env_admin_email }}"
#          ADMIN_NAME: "{{ koel_env_admin_name }}"
#          ADMIN_PASSWORD: "{{ koel_env_admin_password }}"
          APP_NAME: "Koel"
          APP_ENV: "production"
          APP_DEBUG: "true"
          APP_URL: "{{ koel_env_app_url }}"
          APP_KEY: "{{ koel_env_app_key }}"
          DB_CONNECTION: "{{ koel_env_db_connection }}"
          DB_HOST: "{{ koel_db_container_name }}"
          DB_PORT: "3306"
          DB_DATABASE: "{{ koel_env_db_database }}"
          DB_USERNAME: "{{ koel_env_db_username }}"
          DB_PASSWORD: "{{ koel_env_db_password }}"
          FORCE_HTTPS: "{{ koel_env_force_https }}"
          TRUSTED_HOSTS: "localhost,{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }},{{ koel_hostname }}.{{ ansible_nas_domain }}"
          MEDIA_PATH: "{{ koel_env_media_path }}"
          MEMORY_LIMIT: "{{ koel_env_memory_limit }}"
          LASTFM_API_KEY: "{{ koel_env_lastfm_api_key }}"
          LASTFM_API_SECRET: "{{ koel_env_lastfm_api_secret }}"
          SPOTIFY_CLIENT_ID: "{{ koel_env_spotify_client_id }}"
          SPOTIFY_CLIENT_SECRET: "{{ koel_env_spotify_client_secret }}"
          STORAGE_DRIVER: "{{ koel_env_storage_driver }}"
          STREAMING_METHOD: "{{ koel_env_streaming_method }}"
          MAIL_FROM_ADDRESS: "{{ koel_env_mail_from_address }}"
          MAIL_FROM_NAME: "{{ koel_env_mail_from_name }}"
          MAIL_MAILER: "{{ koel_env_mail_mailer }}"
          MAIL_HOST: "{{ koel_env_mail_host }}"
          MAIL_PORT: "{{ koel_env_mail_port }}"
          MAIL_USERNAME: "{{ koel_env_mail_username }}"
          MAIL_PASSWORD: "{{ koel_env_mail_password }}"
          MAIL_ENCRYPTION: "{{ koel_env_mail_encryption }}"
          TZ: "{{ ansible_nas_timezone }}"
        links:
          - "{{ koel_db_container_name }}"
        labels:
          autoheal: "{{ koel_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ koel_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ koel_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ koel_dockflare_access_group }}"
          dockflare.hostname: "{{ koel_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ koel_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ koel_homepage_group }}"
          homepage.icon: "{{ koel_homepage_icon }}"
          homepage.href: "{{ koel_homepage_href }}"
          homepage.description: "{{ 'Open-source music streaming software' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ koel_container_name }}"
          homepage.showStats: "{{ koel_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ koel_port_http }}"
          repliqate.enabled: "{{ koel_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ koel_repliqate_engine }}"
          repliqate.schedule: "{{ koel_repliqate_schedule }}"
          repliqate.backup_id: "{{ koel_repliqate_backup_id }}"
          repliqate.retention: "{{ koel_repliqate_retention }}"
          traefik.enable: "{{ koel_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.koel.rule: "Host(`{{ koel_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.koel.tls.certresolver: "letsencrypt"
          traefik.http.routers.koel.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.koel.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.koel.middlewares: "koel@docker{{ ',tinyauth-auth@docker' if koel_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.koel.IPAllowList.sourcerange: "{{ koel_traefik_whitelist }}"
          traefik.http.services.koel.loadbalancer.server.port: "80"
          wud.tag.include: '^v\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/phanan/koel"
        cpu_shares: "{{ koel_cpu_shares }}"
        memory: "{{ koel_memory }}"
        memory_swap: "{{ koel_memory_swap }}"
        restart_policy: unless-stopped

    - name: Check {{ ansible_nas_app_name }} DB initialization
      stat:
        path: "{{ koel_data_directory }}/db/.init_done"
      register: koel_initialized

    - name: Run {{ ansible_nas_app_name }} DB migration
      community.docker.docker_container_exec:
        container: "{{ koel_container_name }}"
        command: php artisan migrate --force
        chdir: /var/www/html
      register: koel_migration_output
      when: not koel_initialized.stat.exists

    - name: Seed {{ ansible_nas_app_name }} DB
      community.docker.docker_container_exec:
        container: "{{ koel_container_name }}"
        command: php artisan db:seed --force
        chdir: /var/www/html
      register: koel_seed_output
      ignore_errors: true
      when: not koel_initialized.stat.exists

    - name: Mark {{ ansible_nas_app_name }} as initialized
      file:
        path: "{{ koel_data_directory }}/db/.init_done"
        state: touch
      when: 
        - not koel_initialized.stat.exists
        - koel_migration_output is succeeded

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (koel_port_http | string)] +
                (['https://' + koel_hostname + '.' + ansible_nas_domain] if (koel_traefik_enabled is true or koel_dockflare_enabled is true) else [])
              }}
  when: koel_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ koel_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ koel_db_container_name }}"
        state: absent
  when: koel_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ koel_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - koel_enabled is false