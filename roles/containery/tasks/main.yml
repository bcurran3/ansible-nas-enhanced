---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ containery_data_directory }}"
        - "{{ containery_data_directory }}/data"
        - "{{ containery_data_directory }}/static"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ containery_container_name }}"
        hostname: "{{ containery_container_name }}"
        image: "{{ containery_image_name }}:{{ containery_image_tag }}"
        pull: true
        volumes:
          - "{{ containery_data_directory }}/data:/containery_data"
          - "{{ containery_data_directory }}/static:/containery/app/static/dist"
          - "/var/run/docker.sock:/var/run/docker.sock:ro"
        ports:
          - "{{ containery_port }}:5000"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ containery_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ containery_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ containery_homepage_group }}"
          homepage.icon: "{{ containery_homepage_icon }}"
          homepage.href: "{{ containery_homepage_href }}"
          homepage.description: "{{ 'Powerfull, fast and lightweight container managment web application' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ containery_container_name }}"
          homepage.showStats: "{{ containery_homepage_showStats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ containery_port }}"
          traefik.enable: "{{ containery_available_externally | string }}"
          traefik.http.routers.containery.rule: "Host(`{{ containery_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.containery.tls.certresolver: "letsencrypt"
          traefik.http.routers.containery.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.containery.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ containery_hostname }}"
          traefik.http.routers.containery.middlewares: "{{ containery_hostname }}@docker"
          traefik.http.middlewares.containery.IPAllowList.sourcerange: "{{ containery_traefik_whitelist }}"
          traefik.http.services.containery.loadbalancer.server.port: "5000"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/danylo829/containery/releases/tag/$${major}.$${minor}.$${patch}"
        cpu_shares: "{{ containery_cpu_shares }}"
        memory: "{{ containery_memory }}"
        restart_policy: unless-stopped
  when: containery_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ containery_container_name }}"
        state: absent
  when: containery_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ containery_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ containery_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: containery_enabled is false and archive_app_data_enabled is true
