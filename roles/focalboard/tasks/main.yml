---
- name: Start Focalboard
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: nobody
        group: nogroup
      with_items:
        - "{{ focalboard_data_directory }}"
        - "{{ focalboard_data_directory }}/data"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        focalboard_homepage_href: "https://{{ focalboard_hostname }}.{{ ansible_nas_domain }}"
      when: focalboard_traefik_enabled | bool or focalboard_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ focalboard_container_name }}"
        hostname: "{{ focalboard_container_name }}"
        image: "{{ focalboard_image_name }}:{{ focalboard_image_tag }}"
        pull: true
        ports:
          - "{{ focalboard_port_http }}:8000"
        volumes:
          - "{{ focalboard_data_directory }}/data:/opt/focalboard/data"
        network_mode: bridge
        env:
          VIRTUAL_HOST: "focalboard.local"
          VIRTUAL_PORT: "8000"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ focalboard_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ focalboard_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ focalboard_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ focalboard_dockflare_access_group }}"
          dockflare.hostname: "{{ focalboard_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ focalboard_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ focalboard_homepage_group }}"
          homepage.icon: "{{ focalboard_homepage_icon }}"
          homepage.href: "{{ focalboard_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ focalboard_port_http }}"
          homepage.description: "{{ 'an open source, self-hosted alternative to Trello, Notion, and Asana.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ focalboard_container_name }}"
          homepage.showStats: "{{ focalboard_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ focalboard_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ focalboard_repliqate_engine }}"
          repliqate.schedule: "{{ focalboard_repliqate_schedule }}"
          repliqate.backup_id: "{{ focalboard_repliqate_backup_id }}"
          repliqate.retention: "{{ focalboard_repliqate_retention }}"
          traefik.enable: "{{ focalboard_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.focalboard.rule: "Host(`{{ focalboard_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.focalboard.tls.certresolver: "letsencrypt"
          traefik.http.routers.focalboard.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.focalboard.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.focalboard.middlewares: "focalboard@docker{{ ',tinyauth-auth@docker' if focalboard_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.focalboard.IPAllowList.sourcerange: "{{ focalboard_traefik_whitelist }}"
          traefik.http.services.focalboard.loadbalancer.server.port: "8000"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/mattermost/focalboard"
        cpu_shares: "{{ focalboard_cpu_shares }}"
        memory: "{{ focalboard_memory }}"
        memory_swap: "{{ focalboard_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (focalboard_port_http | string)] +
                (['https://' + focalboard_hostname + '.' + ansible_nas_domain] if (focalboard_traefik_enabled is true or focalboard_dockflare_enabled is true) else [])
              }}
  when: focalboard_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ focalboard_container_name }}"
        state: absent
  when: focalboard_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ focalboard_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - focalboard_enabled is false