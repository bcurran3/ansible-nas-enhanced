---
# ANE
tududi_proper_name: "tududi"
tududi_enabled: false
tududi_traefik_enabled: false
tududi_traefik_whitelist: "{{ lan }}"

# directories
tududi_data_directory: "{{ docker_home }}/tududi"

# docker
tududi_container_name: "tududi"
tududi_image_name: "devname/tududi" # use ghcr.io or lscr.io when available
tududi_image_tag: "latest"

# uid / gid
tududi_user_id: "0"
tududi_group_id: "0"

# network
tududi_hostname: "tududi"
#tududi_network_name: "tududi"
tududi_port_http: "8989"

# specs
tududi_cpu_shares: 1024
tududi_memory: "1G"
tududi_memory_swap: -1

# autoheal
tududi_autoheal_enabled: false

# dockflare
tududi_dockflare_enabled: false
tududi_dockflare_access_group: ""

# healthcheck
tududi_healthcheck_test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
tududi_healthcheck_interval: 1m
tududi_healthcheck_timeout: 10s
tududi_healthcheck_retries: 3
tududi_healthcheck_start_period: 30s

# homepage
tududi_homepage_description: "tududi short description"
tududi_homepage_group: "Apps"
tududi_homepage_icon: "tududi.png"
tududi_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ tududi_port_http }}"
tududi_homepage_showstats: false

# linuxserver.io docker mods for linuxserver.io images
#tududi_env_docker_mods: ""
#tududi_env_docker_mods_install_packages: ""
#tududi_env_docker_mods_install_pip_packages: ""

# repliqate
tududi_repliqate_enabled: false
tududi_repliqate_engine: "restic"
tududi_repliqate_schedule: "@daily 3am"
tududi_repliqate_backup_id: "{{ tududi_container_name }}"
tududi_repliqate_retention: "30d"

# tinyauth
tududi_tinyauth_enabled: false

# watchtower
tududi_watchtower_enabled: false

# wud
# Docker Hub example. Please edit.
tududi_wud_tag_include: '^\d+\.\d+$'
tududi_wud_tag_transform_type: "semver"
tududi_wud_link_template: "https://hub.docker.com/r/devname/tududi"
### Github example
#tududi_wud_tag_include: '^\d+\.\d+\.\d+$'
#tududi_wud_tag_transform_type: "semver"
#tududi_wud_link_template: "https://github.com/devname/tududi/pkgs/container/tududi"
### Linuxserver.io example
#tududi_wud_tag_include: '^\d+\.\d+\.\d+.*$'
#tududi_wud_tag_transform_type: "semver"
#tududi_wud_link_template: "https://lscr.io/linuxserver/tududi"

