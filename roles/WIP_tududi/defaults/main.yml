tududi_redis_repliqate_engine: "restic"
tududi_redis_repliqate_schedule: "@daily 3am"
tududi_redis_repliqate_backup_id: "{{ tududi_redis_container_name }}"
tududi_redis_repliqate_retention: "30d"

# watchtower
tududi_redis_watchtower_enabled: false

# wud
tududi_redis_wud_tag_include: '^\d+\.\d+\.\d+.*$'
#tududi_redis_wud_tag_include: "^v?\\d+-alpine$"
tududi_redis_wud_tag_transform_type: "semver"
tududi_redis_wud_link_template: "https://hub.docker.com/_/redis"