# docker
tududi_redis_container_name: "tududi-redis"
tududi_redis_image_name: "redis"
tududi_redis_image_tag: "latest"

# specs
tududi_redis_cpu_shares: 1024
tududi_redis_memory: "128M"
tududi_redis_memory_swap: "{{ tududi_redis_memory }}"

# autoheal
tududi_redis_autoheal_enabled: false

# healthcheck
tududi_redis_healthcheck_test: ["CMD-SHELL", "redis-cli -a topsecret ping | grep PONG || exit 1"]
tududi_redis_healthcheck_interval: 10s
tududi_redis_healthcheck_timeout: 5s
tududi_redis_healthcheck_retries: 3
tududi_redis_healthcheck_start_period: 10s

# homepage
tududi_redis_homepage_description: "The Real-time Data Platform"
tududi_redis_homepage_group: "DBs"
tududi_redis_homepage_icon: "redis.png"
tududi_redis_homepage_href: "{{ tududi_homepage_href }}"
tududi_redis_homepage_showstats: false

# repliqate
