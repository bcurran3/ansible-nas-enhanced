# docker
tududi_db_container_name: "tududi-db"
tududi_db_image_name: "mariadb"
tududi_db_image_tag: "latest"

# specs
tududi_db_cpu_shares: 1024
tududi_db_memory: "1G"
tududi_db_memory_swap: "{{ tududi_db_memory }}"

# autoheal
tududi_db_autoheal_enabled: false

# healthcheck
tududi_db_healthcheck_test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u", "tududi", "-p{{ tududi_db_password }}"]
tududi_db_healthcheck_interval: 10s
tududi_db_healthcheck_timeout: 5s
tududi_db_healthcheck_retries: 5
tududi_db_healthcheck_start_period: 30s

# homepage
tududi_db_homepage_description: "MariaDB Server is a high performing open source relational database, forked from MySQL."
tududi_db_homepage_group: "DBs"
tududi_db_homepage_icon: "mariadb.png"
tududi_db_homepage_href: "{{ tududi_homepage_href }}"
tududi_db_homepage_showstats: false

# repliqate
tududi_db_repliqate_enabled: false
tududi_db_repliqate_engine: "restic"
tududi_db_repliqate_schedule: "@daily 3am"
tududi_db_repliqate_backup_id: "{{ tududi_db_container_name }}"
tududi_db_repliqate_retention: "30d"

# watchtower
tududi_db_watchtower_enabled: false

# wud
tududi_db_wud_tag_include: '^\d+\.\d+\.\d+.*$'
tududi_db_wud_tag_transform_type: "semver"
tududi_db_wud_link_template: "https://hub.docker.com/_/mariadb"

