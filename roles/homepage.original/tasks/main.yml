---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ homepage_data_directory }}"
        - "{{ homepage_data_directory }}/images"

    - name: Copy {{ ansible_nas_app_name }} template config files
      ansible.builtin.template:
        src: "{{ item }}"
        dest: "{{ homepage_data_directory }}/{{ item }}"
      with_items:
        - bookmarks.yaml
        - docker.yaml
        - settings.yaml
        - services.yaml
        - widgets.yaml
      register: homepage_config

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ homepage_container_name }}"
        hostname: "{{ homepage_container_name }}"
        image: "{{ homepage_image_name }}:{{ homepage_image_tag }}"
        pull: true
        volumes:
          - "{{ homepage_data_directory }}:/app/config"
          - "{{ homepage_data_directory }}/images:/app/public/images"
          - "/var/run/docker.sock:/var/run/docker.sock"
        env:
          HOMEPAGE_ALLOWED_HOSTS: "{{ homepage_allowed_hosts }}"
          TZ: "{{ ansible_nas_timezone }}"
        ports:
          - "{{ homepage_port }}:3000"
        restart: "{{ homepage_config is changed }}"
        labels:
          autoheal: "{{ homepage_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ homepage_watchtower_enable }}"
          traefik.enable: "{{ homepage_available_externally | string }}"
          traefik.http.routers.homepage.rule: "Host(`{{ homepage_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.homepage.tls.certresolver: "letsencrypt"
          traefik.http.routers.homepage.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.homepage.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ homepage_hostname }}"
          traefik.http.routers.jackett.middlewares: "{{ homepage_hostname }}@docker"
          traefik.http.middlewares.jackett.IPAllowList.sourcerange: "{{ homepage_traefik_whitelist }}"
          traefik.http.services.homepage.loadbalancer.server.port: "3000"
          wud.tag.include: '^v?\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/gethomepage/homepage/releases"
        cpu_shares: "{{ homepage_cpu_shares }}"
        memory: "{{ homepage_memory }}"
        restart_policy: unless-stopped
  when: homepage_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ homepage_container_name }}"
        state: absent
  when: homepage_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ homepage_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ homepage_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: homepage_enabled is false and archive_app_data_enabled is true
