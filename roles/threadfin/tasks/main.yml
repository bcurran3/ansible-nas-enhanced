---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ threadfin_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ threadfin_container_name }}"
        image: "{{ threadfin_image_name }}:{{ threadfin_image_version }}"
        pull: true
        ports:
          - "{{ threadfin_port }}:34400"
        volumes:
          - "{{ threadfin_data_directory }}:/home/threadfin/conf"
        restart_policy: unless-stopped
        cpu_shares: "{{ threadfin_cpu_shares }}"
        memory: "{{ threadfin_memory }}"
        labels:
          autoheal: "{{ threadfin_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ threadfin_watchtower_monitor_only }}"
          homepage.group: Media
          homepage.name: Threadfin
          homepage.icon: xteve
          homepage.href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ threadfin_port }}"
          homepage.description: IPTV bridge
          homepage.widget.type: xteve
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ threadfin_port }}"
  when: threadfin_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ threadfin_container_name }}"
        state: absent
  when: threadfin_enabled is false
