---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ threadfin_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ threadfin_container_name }}"
        image: "{{ threadfin_image_name }}:{{ threadfin_image_version }}"
        pull: true
        ports:
          - "{{ threadfin_port }}:34400"
        volumes:
          - "{{ threadfin_data_directory }}:/home/threadfin/conf"
        restart_policy: unless-stopped
        cpu_shares: "{{ threadfin_cpu_shares }}"
        memory: "{{ threadfin_memory }}"
        labels:
          autoheal: "{{ threadfin_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ threadfin_watchtower_monitor_only }}"
          homepage.group: Media
          homepage.name: Threadfin
          homepage.icon: xteve
          homepage.href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ threadfin_port }}"
          homepage.description: "{{ 'IPTV bridge' if homepage_show_description else omit }}"
          homepage.widget.type: xteve
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ threadfin_port }}"
  when: threadfin_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ threadfin_container_name }}"
        state: absent
  when: threadfin_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ threadfin_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ threadfin_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: threadfin_enabled is false and archive_app_data_enabled is true
