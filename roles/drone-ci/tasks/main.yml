---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Check for Gitea installation
      ansible.builtin.debug:
        msg: "Drone-CI requires Gitea enabled and running for authentication, please set that up first. Skipping..."
      when: gitea_enabled is true

    - name: Check for Gitea config
      ansible.builtin.debug:
        msg: "Missing Gitea Oauth2 config! Read https://docs.drone.io/server/provider/gitea/ and set drone_ci_gitea_client_id and drone_ci_gitea_client_secret. Skipping..."
      when: drone_ci_gitea_client_id == "notset"

    - name: Continue {{ ansible_nas_app_name }}
      block:
        - name: Create {{ ansible_nas_app_name }} Directories
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
          with_items:
            - "{{ drone_ci_data_directory }}"

        - name: Create {{ ansible_nas_app_name }} Container
          community.docker.docker_container:
            container_default_behavior: "compatibility"
            name: "{{ drone_ci_container_name }}"
            hostname: "{{ drone_ci_container_name }}"
            image: "{{ drone_ci_image_name }}:{{ drone_ci_image_tag }}"
            pull: true
            volumes:
              - "{{ drone_ci_data_directory }}:/var/lib/drone:rw"
            ports:
              - "{{ drone_ci_port_http }}:80"
            env:
              DRONE_USER_CREATE: "username:{{ drone_ci_admin_user }},admin:true"
              DRONE_SERVER_HOST: "{{ drone_ci_address }}"
              DRONE_RPC_SECRET: "{{ drone_ci_agent_secret }}"
              DRONE_GITEA_SERVER: "{{ drone_ci_gitea_url }}"
              DRONE_GITEA_CLIENT_ID: "{{ drone_ci_gitea_client_id }}"
              DRONE_GITEA_CLIENT_SECRET: "{{ drone_ci_gitea_client_secret }}"
              DRONE_LOGS_DEBUG: "{{ drone_ci_debug_logging | string }}"
              DRONE_SERVER_PROTO: "http"
            labels:
              autoheal: "{{ drone_ci_autoheal | string }}"
              com.centurylinklabs.watchtower.enable: "{{ drone_ci_watchtower_enabled | string }}"
              dockflare.enable: "{{ drone_ci_dockflare_enabled | string }}"
              dockflare.access.group: "{{ drone_ci_dockflare_access_group }}"
              dockflare.hostname: "{{ drone_ci_hostname }}.{{ ansible_nas_domain }}"
              dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ drone_ci_port_http }}"
              homepage.name: "{{ ansible_nas_app_name }}"
              homepage.group: "{{ drone_ci_homepage_group }}"
              homepage.icon: "{{ drone_ci_homepage_icon }}"
              homepage.href: "{{ drone_ci_homepage_href }}"
              homepage.description: "{{ 'drone_ci description' if homepage_show_description else omit }}"
              homepage.server: "my-docker"
              homepage.container: "{{ drone_ci_container_name }}"
              homepage.showStats: "{{ drone_ci_homepage_showstats | string }}"
              homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ drone_ci_port }}"
              repliqate.enabled: "{{ drone_ci_repliqate_enabled | string }}"
              repliqate.engine: "{{ drone_ci_repliqate_engine }}"
              repliqate.schedule: "{{ drone_ci_repliqate_schedule }}"
              repliqate.backup_id: "{{ drone_ci_repliqate_backup_id }}"
              repliqate.retention: "{{ drone_ci_repliqate_retention }}"
              traefik.enable: "{{ drone_ci_available_externally | string }}"
              traefik.http.routers.droneci.rule: "Host(`{{ drone_ci_hostname }}.{{ ansible_nas_domain }}`)"
              traefik.http.routers.droneci.tls.certresolver: "letsencrypt"
              traefik.http.routers.droneci.tls.domains[0].main: "{{ ansible_nas_domain }}"
              traefik.http.routers.droneci.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
              traefik.http.routers.droneci.middlewares: "droneci@docker{{ ',tinyauth-auth@docker' if drone_ci_tinyauth_enabled | bool else '' }}"
              traefik.http.middlewares.droneci.IPAllowList.sourcerange: "{{ drone_ci_traefik_whitelist }}"
              traefik.http.services.drone_ci.loadbalancer.server.port: "80"
              wud.tag.include: '^\d+\.\d+\.\d+.*$'
              wud.tag.transform.type: "semver"
              wud.link.template: "https://hub.docker.com/r/drone/drone"
            cpu_shares: "{{ drone_ci_cpu_shares }}"
            memory: "{{ drone_ci_memory }}"
            memory_swap: "{{ drone_ci_memory_swap }}"
            restart_policy: unless-stopped

        - name: Access {{ ansible_nas_app_name }} at
          ansible.builtin.debug:
            msg: >-
                  {{
                    ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (drone_ci_port_http | string)] +
                    (['https://' + drone_ci_hostname + '.' + ansible_nas_domain] if (drone_ci_available_externally is true or drone_ci_dockflare_enabled is true) else [])
                  }}

        - name: Create {{ ansible_nas_app_name }} Runner Container
          community.docker.docker_container:
            container_default_behavior: "compatibility"
            name: "{{ drone_ci_runner_container_name }}"
            hostname: "{{ drone_ci_runner_container_name }}"
            image: "{{ drone_ci_runner_image_name }}:{{ drone_ci_runner_image_tag }}"
            pull: true
            volumes:
              - "/var/run/docker.sock:/var/run/docker.sock:rw"
            ports:
              - "{{ drone_ci_runner_port_http }}:3000"
            env:
              DRONE_RPC_HOST: "{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ drone_ci_port_http }}"
              DRONE_RPC_SECRET: "{{ drone_ci_agent_secret }}"
              DRONE_RPC_PROTO: "http"
              DRONE_RUNNER_CAPACITY: "{{ drone_ci_runner_capacity | string }}"
              DRONE_RUNNER_NAME: "{{ drone_ci_runner_name }}"
            labels:
              autoheal: "{{ drone_ci_runner_autoheal | string }}"
              com.centurylinklabs.watchtower.enable: "{{ drone_ci_runner_watchtower_enabled | string }}"
              homepage.name: "{{ ansible_nas_app_name }}"
              homepage.group: "{{ drone_ci_runner_homepage_group }}"
              homepage.icon: "{{ drone_ci_runner_homepage_icon }}"
              homepage.href: "{{ drone_ci_runner_homepage_href }}"
              homepage.description: "{{ 'drone_ci_runner description' if homepage_show_description else omit }}"
              homepage.server: "my-docker"
              homepage.container: "{{ drone_ci_runner_container_name }}"
              homepage.showStats: "{{ drone_ci_runner_homepage_showstats | string }}"
              homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ drone_ci_runner_port }}"
              traefik.enable: "false"
              wud.tag.include: '^\d+\.\d+\.\d+.*$'
              wud.tag.transform.type: "semver"
              wud.link.template: "https://hub.docker.com/r/drone/drone-runner-docker"
            cpu_shares: "{{ drone_ci_runner_cpu_shares }}"
            memory: "{{ drone_ci_runner_memory }}"
            memory_swap: "{{ drone_ci_runner_memory_swap }}"
            restart_policy: unless-stopped

        - name: Add webhook allowed hosts to Gitea
          ansible.builtin.blockinfile:
            path: "{{ gitea_data_directory }}/gitea/gitea/conf/app.ini"
            block: |
              [webhook]
              ALLOWED_HOST_LIST=private
              SKIP_TLS_VERIFY=true
          notify: restart gitea
      when:
        - gitea_enabled is true
        - drone_ci_gitea_client_id != "notset"
  when: drone_ci_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ drone_ci_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} Runner Container
      community.docker.docker_container:
        name: "{{ drone_ci_runner_container_name }}"
        state: absent
  when: drone_ci_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ drone_ci_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - drone_ci_enabled is false