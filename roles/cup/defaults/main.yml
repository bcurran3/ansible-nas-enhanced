---
# ANE
ansible_nas_app_name: "Cup"
cup_enabled: false
cup_available_externally: false
cup_traefik_whitelist: "{{ lan }}"
cup_data_directory: "{{ docker_home }}/cup"

# network
cup_hostname: "cup"
cup_port_http: "3017"

# docker
cup_container_name: "cup"
cup_image_name: "ghcr.io/sergi0g/cup"
cup_image_tag: "latest"
cup_cpu_shares: "1024"
cup_memory: "1g"

# autoheal
cup_autoheal: "false"

# dockflare
cup_dockflare_tunnel: "false"
cup_dockflare_access_group: ""

# homepage
cup_homepage_group: "Apps"
cup_homepage_icon: "https://raw.githubusercontent.com/sergi0g/cup/refs/heads/main/web/public/apple-touch-icon.png"
cup_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ cup_port_http }}"
cup_homepage_showstats: "false"
cup_homepage_widget_url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ cup_port_http }}/api/v3/json"

# repliqate
cup_repliqate_enabled: "false"
cup_repliqate_engine: "restic"
cup_repliqate_schedule: "@daily 3am"
cup_repliqate_backup_id: "{{ cup_container_name }}"
cup_repliqate_retention: "30d"

# watchtower
cup_watchtower_enable: "false"