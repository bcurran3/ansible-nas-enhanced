---
# ANE
jellyfin_proper_name: "Jellyfin"
jellyfin_enabled: false
jellyfin_traefik_enabled: false
jellyfin_traefik_whitelist: "{{ lan }}"

# directories
jellyfin_data_directory: "{{ docker_home }}/jellyfin"
jellyfin_anime_directory: "{{ anime_root }}"
jellyfin_audiobooks_directory: "{{ audiobooks_root }}"
jellyfin_books_directory: "{{ books_root }}"
jellyfin_movies_directory: "{{ movies_root }}"
jellyfin_music_directory: "{{ music_root }}"
jellyfin_photos_directory: "{{ photos_root }}"
jellyfin_podcasts_directory: "{{ podcasts_root }}"
jellyfin_porn_directory: "{{ porn_root }}"
jellyfin_tv_directory: "{{ tv_root }}"

# media permissions (change to "ro" for ready only)
jellyfin_anime_permissions: "rw"
jellyfin_audiobooks_permissions: "rw"
jellyfin_books_permissions: "rw"
jellyfin_movies_permissions: "rw"
jellyfin_music_permissions: "rw"
jellyfin_photos_permissions: "rw"
jellyfin_podcasts_permissions: "rw"
jellyfin_porn_permissions: "rw"
jellyfin_tv_permissions: "rw"

# uid / gid
jellyfin_user_id: "0"
jellyfin_group_id: "0"

# network
jellyfin_hostname: "jellyfin"
jellyfin_port_http: "8896"

# docker
jellyfin_container_name: "jellyfin"
jellyfin_image_name: "lscr.io/linuxserver/jellyfin"
jellyfin_image_version: "latest"

# specs
jellyfin_cpu_shares: 1024
# Minimum (Direct Play Only): 2 GB – 4 GB (functional, but risky during scans).
# Recommended (Standard): 8 GB (Smooth performance for 1080p transcoding & background tasks).
# Performance (4K Transcoding / Large Libraries): 16 GB+.
jellyfin_memory: "8G"
jellyfin_memory_swap: -1

# autoheal
jellyfin_autoheal_enabled: false

# dockflare
jellyfin_dockflare_enabled: false
jellyfin_dockflare_access_group: ""

# healthcheck
jellyfin_healthcheck_test: ["CMD-SHELL", "curl -f http://127.0.0.1:8096/health || exit 1"]
jellyfin_healthcheck_interval: 1m
jellyfin_healthcheck_timeout: 10s
jellyfin_healthcheck_retries: 3
jellyfin_healthcheck_start_period: 2m

# homepage 
jellyfin_homepage_group: "Media Servers"
jellyfin_homepage_icon: "jellyfin.png"
jellyfin_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ jellyfin_port_http }}"
jellyfin_homepage_showstats: false
jellyfin_homepage_widget_key: ""

# linuxserver.io docker mods
# https://mods.linuxserver.io/?mod=jellyfin
jellyfin_env_docker_mods: ""

# theme.park themes
# https://docs.theme-park.dev/themes/jellyfin/
jellyfin_env_docker_mods_tp_theme: ""
jellyfin_env_docker_mods_tp_community_theme: ""
jellyfin_env_docker_mods_tp_domain: ""
jellyfin_env_docker_mods_tp_addon: ""
jellyfin_env_docker_mods_install_packages: ""
jellyfin_env_docker_mods_install_pip_packages: ""

# repliqate
jellyfin_repliqate_enabled: false
jellyfin_repliqate_engine: "restic"
jellyfin_repliqate_schedule: "@daily 3am"
jellyfin_repliqate_backup_id: "{{ jellyfin_container_name }}"
jellyfin_repliqate_retention: "30d"

# tinyauth
jellyfin_tinyauth_enabled: false

# watchtower
jellyfin_watchtower_enabled: false