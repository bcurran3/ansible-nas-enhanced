---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ jellyfin_data_directory }}"
        - "{{ jellyfin_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ jellyfin_container_name }}"
        hostname: "{{ jellyfin_container_name }}"
        image: "{{ jellyfin_image_name }}:{{ jellyfin_image_version }}"
        pull: true
        runtime: "{{ 'nvidia' if nvidia_runtime_enabled | bool else omit }}"
        device_requests: "{{
          [{'driver': 'nvidia', 'count': -1, 'capabilities': ['gpu']}]
          if nvidia_runtime_enabled | bool else omit
        }}"
        devices: >-
                  {{
                    (jellyfin_devices | default([])) + ['/dev/dri:/dev/dri']
                    if intel_igpu_enabled | default(false) | bool
                    else (jellyfin_devices | default(omit))
                  }}
        volumes:
          - "{{ jellyfin_data_directory }}/config:/config:rw"
          - "{{ jellyfin_anime_directory }}:/anime:{{ jellyfin_anime_permissions }}"
          - "{{ jellyfin_audiobooks_directory }}:/audiobooks:{{ jellyfin_audiobooks_permissions }}"
          - "{{ jellyfin_books_directory }}:/books:{{ jellyfin_books_permissions }}"
          - "{{ jellyfin_movies_directory }}:/movies:{{ jellyfin_movies_permissions }}"
          - "{{ jellyfin_music_directory }}:/music:{{ jellyfin_music_permissions }}"
          - "{{ jellyfin_photos_directory }}:/photos:{{ jellyfin_photos_permissions }}"
          - "{{ jellyfin_podcasts_directory }}:/podcasts:{{ jellyfin_podcasts_permissions }}"
          - "{{ jellyfin_porn_directory }}:/porn:{{ jellyfin_porn_permissions }}"
          - "{{ jellyfin_tv_directory }}:/tv:{{ jellyfin_tv_permissions }}"
        ports:
          - "{{ jellyfin_port_http }}:8096"
        env:
          DOCKER_MODS: "{{ jellyfin_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ jellyfin_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ jellyfin_env_docker_mods_install_pip_packages}}"
          TP_DOMAIN: "{{ jellyfin_env_docker_mods_tp_domain }}"
          TP_THEME: "{{ jellyfin_env_docker_mods_tp_theme }}"
          TP_COMMUNITY_THEME: "{{ jellyfin_env_docker_mods_tp_community_theme }}"
          TP_ADDON: "{{ jellyfin_env_docker_mods_tp_addon }}"
          PUID: "{{ jellyfin_user_id }}"
          PGID: "{{ jellyfin_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ jellyfin_autoheal | string }}"
          com.centurylinklabs.watchtower.enable: "{{ jellyfin_watchtower_enabled | string }}"
          dockflare.enable: "{{ jellyfin_dockflare_enabled | string }}"
          dockflare.access.group: "{{ jellyfin_dockflare_access_group }}"
          dockflare.hostname: "{{ jellyfin_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ jellyfin_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ jellyfin_homepage_group }}"
          homepage.icon: "{{ jellyfin_homepage_icon }}"
          homepage.href: "{{ jellyfin_homepage_href}}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ jellyfin_port_http }}"
          homepage.showStats: "{{ jellyfin_homepage_showstats | string }}"
          homepage.description: "{{ 'Media server' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ jellyfin_container_name }}"
          homepage.widget.type: "jellyfin"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ jellyfin_port_http }}"
          homepage.widget.key: "{{ jellyfin_homepage_widget_key }}"
          homepage.widget.enableBlocks: "true"
          homepage.widget.enableNowPlaying: "true"
          repliqate.enabled: "{{ jellyfin_repliqate_enabled | string }}"
          repliqate.engine: "{{ jellyfin_repliqate_engine }}"
          repliqate.schedule: "{{ jellyfin_repliqate_schedule }}"
          repliqate.backup_id: "{{ jellyfin_repliqate_backup_id }}"
          repliqate.retention: "{{ jellyfin_repliqate_retention }}"
          traefik.enable: "{{ jellyfin_available_externally | string }}"
          traefik.http.routers.jellyfin.rule: "Host(`{{ jellyfin_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.jellyfin.tls.certresolver: "letsencrypt"
          traefik.http.routers.jellyfin.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.jellyfin.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.jellyfin.middlewares: "jellyfin@docker{{ ',tinyauth-auth@docker' if jellyfin_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.jellyfin.IPAllowList.sourcerange: "{{ jellyfin_traefik_whitelist }}"
          traefik.http.services.jellyfin.loadbalancer.server.port: "8096"
          wud.tag.include: '^version-\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "lscr.io/linuxserver/jellyfin"
        cpu_shares: "{{ jellyfin_cpu_shares }}"
        memory: "{{ jellyfin_memory }}"
        memory_swap: "{{ jellyfin_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (jellyfin_port_http | string)] +
                (['https://' + jellyfin_hostname + '.' + ansible_nas_domain] if (jellyfin_available_externally is true or jellyfin_dockflare_enabled is true) else [])
              }}
  when: jellyfin_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ jellyfin_container_name }}"
        state: absent
  when: jellyfin_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ jellyfin_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - jellyfin_enabled is false