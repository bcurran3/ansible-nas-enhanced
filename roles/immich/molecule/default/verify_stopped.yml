---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Try and stop and remove {{ immich_proper_name }}
      community.docker.docker_container:
        name: "{{ immich_server_container_name }}"
        state: absent
      register: result

    - name: Try and stop and remove {{ immich_proper_name }} DB
      community.docker.docker_container:
        name: "{{ immich_db_container_name }}"
        state: absent
      register: result_db

    - name: Try and stop and remove {{ immich_proper_name }} Machine Learning
      community.docker.docker_container:
        name: "{{ immich_machinelearning_container_name }}"
        state: absent
      register: result_ml

    - name: Try and stop and remove {{ immich_proper_name }} Redis
      community.docker.docker_container:
        name: "{{ immich_redis_container_name }}"
        state: absent
      register: result_redis

    - name: Check {{ immich_proper_name }} is stopped
      ansible.builtin.assert:
        that:
          - not result.changed
          - not result_db.changed
          - not result_ml.changed
          - not result_redis.changed
