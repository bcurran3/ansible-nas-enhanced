---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ immich_data_directory }}"
        - "{{ immich_data_directory }}/cache"
        - "{{ immich_upload_directory }}"

    - name: Create {{ ansible_nas_app_name }} Network
      community.docker.docker_network:
        name: "{{ immich_network_name }}"

    - name: Create {{ ansible_nas_app_name }} Machine Learning Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ immich_ml_container_name }}"
        hostname: "{{ immich_ml_container_name }}"
        image: "{{ immich_ml_image }}:{{ immich_ml_tag }}"
        pull: true
        runtime: "{{ 'nvidia' if nvidia_runtime_enabled | bool else omit }}"
        device_requests: "{{
          [{'driver': 'nvidia', 'count': -1, 'capabilities': ['gpu']}]
          if nvidia_runtime_enabled | bool else omit
        }}"
        devices: >-
                  {{
                    (immich_devices | default([])) + ['/dev/dri:/dev/dri']
                    if intel_igpu_enabled | default(false) | bool
                    else (immich_devices | default(omit))
                  }}
        volumes:
          - "{{ immich_data_directory }}/cache:/cache"
        networks:
          - name: "{{ immich_network_name }}"
        network_mode: "bridge"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ immich_ml_autoheal }}"
          com.centurylinklabs.watchtower.enable: "true"
          dockflare.enable: "false"
          homepage.group: "{{ immich_ml_homepage_group }}"
          homepage.name: "{{ ansible_nas_app_name }} Machine Learning"
          homepage.icon: "{{ immich_ml_homepage_icon }}"
          homepage.href: "{{ immich_homepage_href }}"
          homepage.description: "{{'Immich Machine Learning' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ immich_ml_container_name }}"
          homepage.showStats: "false"
          repliqate.enabled: "{{ immich_ml_repliqate_enabled }}"
          repliqate.engine: "{{ immich_ml_repliqate_engine }}"
          repliqate.schedule: "{{ immich_ml_repliqate_schedule }}"
          repliqate.backup_id: "{{ immich_ml_repliqate_backup_id }}"
          repliqate.retention: "{{ immich_ml_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^v?\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/immich-app/immich/releases"
        cpu_shares: "{{ immich_ml_cpu_shares }}"
        memory: "{{ immich_ml_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ immich_db_container_name }}"
        hostname: "{{ immich_db_container_name }}"
        image: "{{ immich_db_image }}:{{ immich_db_tag }}"
        pull: true
        volumes:
          - "{{ immich_data_directory }}/database:/var/lib/postgresql/data"
        networks:
          - name: "{{ immich_network_name }}"
        network_mode: "bridge"
        networks_cli_compatible: "yes"
        env:
          DB_STORAGE_TYPE: "{{ immich_db_storage_type }}"
          POSTGRES_PASSWORD: "{{ immich_db_password }}"
          POSTGRES_USER: "{{ immich_db_username }}"
          POSTGRES_DB: "{{ immich_db_name }}"
          POSTGRES_INITDB_ARGS: '--data-checksums'
          PG_DATA: "/var/lib/postgresql/data"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: ["CMD-SHELL", "pg_isready -d {{ immich_db_name }} -U {{ immich_db_username }}"]
          interval: 5m
          start_interval: 30s
          start_period: 5m
          retries: 5
          timeout: 5s
        labels:
          autoheal: "{{ immich_db_autoheal }}"
          com.centurylinklabs.watchtower.enable: "true"
          dockflare.enable: "false"
          homepage.group: "{{ immich_db_homepage_group }}"
          homepage.name: "{{ ansible_nas_app_name }} PostgreSQL"
          homepage.icon: "{{ immich_db_homepage_icon }}"
          homepage.href: "{{ immich_homepage_href }}"
          homepage.description: "{{ 'PostgreSQL Database Management System' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ immich_db_container_name }}"
          homepage.showStats: "false"
          repliqate.enabled: "{{ immich_db_repliqate_enabled }}"
          repliqate.engine: "{{ immich_db_repliqate_engine }}"
          repliqate.schedule: "{{ immich_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ immich_db_repliqate_backup_id }}"
          repliqate.retention: "{{ immich_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/immich-app/immich/releases"
        cpu_shares: "{{ immich_db_cpu_shares }}"
        memory: "{{ immich_db_memory }}"
        restart_policy: always
        shm_size: 128MB

    - name: Create {{ ansible_nas_app_name }} Redis Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ immich_redis_container_name }}"
        hostname: "{{ immich_redis_container_name }}"
        image: "{{ immich_redis_image }}:{{ immich_redis_tag }}"
        pull: true
        networks:
          - name: "{{ immich_network_name }}"
        network_mode: "bridge"
        networks_cli_compatible: "yes"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: ["CMD-SHELL", "redis-cli ping || exit 1"]
        labels:
          autoheal: "{{ immich_redis_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ immich_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.group: "{{ immich_redis_homepage_group }}"
          homepage.name: "Immich Redis"
          homepage.icon: "{{ immich_redis_homepage_icon }}"
          homepage.href: "{{ immich_homepage_href }}"
          homepage.description: "{{ 'Redis' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ immich_redis_container_name }}"
          homepage.showStats: "{{ immich_redis_homepage_showstats }}"
          repliqate.enabled: "false"
          traefik.enable: "false"
          wud.tag.include: '^6\.2\.\d+-alpine$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/redis"
        cpu_shares: "{{ immich_redis_cpu_shares }}"
        memory: "{{ immich_redis_memory }}"
        restart_policy: always

    - name: Create {{ ansible_nas_app_name }} Server Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ immich_server_container_name }}"
        hostname: "{{ immich_server_container_name }}"
        image: "{{ immich_server_image }}:{{ immich_server_tag }}"
        pull: true
        volumes:
          - "{{ immich_upload_directory }}:/data" #v1.137.0
          - "/etc/localtime:/etc/localtime:ro"
        networks:
          - name: "{{ immich_network_name }}"
        network_mode: "bridge"
        networks_cli_compatible: "yes"
        ports:
          - "{{ immich_port_http }}:2283"
        env:
          REDIS_HOSTNAME: "{{ immich_redis_container_name }}"
          DB_HOSTNAME: "{{ immich_db_container_name }}"
          DB_USERNAME: "{{ immich_db_username }}"
          DB_PASSWORD: "{{ immich_db_password }}"
          DB_DATABASE_NAME: "{{ immich_db_name }}"
          IMMICH_IGNORE_MOUNT_CHECK_ERRORS: "{{ immich_ignore_mount_check_errors }}"
          UPLOAD_LOCATION: "./library"
          TZ: "{{ ansible_nas_timezone }}"
        links:
          - "{{ immich_db_container_name }}"
          - "{{ immich_redis_container_name }}"
#       healthcheck:
#         disable: "false"
        labels:
          autoheal: "{{ immich_autoheal }}"
          com.centurylinklabs.watchtower.enable: "true"
          dockflare.enable: "{{ immich_dockflare_tunnel }}"
          dockflare.access.group: "{{ immich_dockflare_access_group }}"
          dockflare.hostname: "{{ immich_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ immich_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ immich_homepage_group }}"
          homepage.icon: "{{ immich_homepage_icon }}"
          homepage.href: "{{ immich_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ immich_port_http }}"
          homepage.description: "{{ 'High performance self-hosted photo and video management solution' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ immich_server_container_name }}"
          homepage.showStats: "{{ immich_homepage_showstats }}"
          homepage.widget.type: "immich"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ immich_port_http }}"
          homepage.widget.key: "{{ immich_homepage_widget_key }}"
          homepage.widget.version: "2"
          repliqate.enabled: "{{ immich_server_repliqate_enabled }}"
          repliqate.engine: "{{ immich_server_repliqate_engine }}"
          repliqate.schedule: "{{ immich_server_repliqate_schedule }}"
          repliqate.backup_id: "{{ immich_server_repliqate_backup_id }}"
          repliqate.retention: "{{ immich_server_repliqate_retention }}"
          traefik.enable: "{{ immich_available_externally | string }}"
          traefik.http.routers.immich.rule: "Host(`{{ immich_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.immich.tls.certresolver: "letsencrypt"
          traefik.http.routers.immich.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.immich.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ immich_hostname }}"
          traefik.http.routers.immich.middlewares: "{{ immich_hostname }}@docker"
          traefik.http.middlewares.immich.IPAllowList.sourcerange: "{{ immich_traefik_whitelist }}"
          traefik.http.services.immich.loadbalancer.server.port: "2283"
          wud.tag.include: '^v?\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/immich-app/immich/releases"
        cpu_shares: "{{ immich_server_cpu_shares }}"
        memory: "{{ immich_server_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (immich_port_http | string)] +
                (['https://' + immich_hostname + '.' + ansible_nas_domain] if (immich_available_externally is true or immich_dockflare_tunnel is true) else [])
              }}
  when: immich_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Server Container
      community.docker.docker_container:
        name: "{{ immich_server_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} Machine Learning Container
      community.docker.docker_container:
        name: "{{ immich_ml_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} Redis Container
      community.docker.docker_container:
        name: "{{ immich_redis_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} PostgreSQL Container
      community.docker.docker_container:
        name: "{{ immich_db_container_name }}"
        state: absent

    - name: Delete {{ ansible_nas_app_name }} Network
      community.docker.docker_network:
        name: "{{ immich_network_name }}"
        state: absent
  when: immich_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ immich_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ immich_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: immich_enabled is false and archive_app_data_enabled is true
