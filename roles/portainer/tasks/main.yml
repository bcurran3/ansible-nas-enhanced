---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Check for Deprecated IP Whitelist setting
      ansible.builtin.fail:
        msg: "Use portainer_ip_allowlist instead of portainer_ip_whitelist! Read https://traefik.io/blog/announcing-traefik-proxy-v2-11/ for more information."
      when: portainer_ip_whitelist is defined

    - name: Check for old config dir
      stat: 
        path: "{{ portainer_data_directory }}/config"
      register: old_config

    - name: Move config dir to data dir
      command: mv "{{ portainer_data_directory }}/config" "{{ portainer_data_directory }}/data"
      when: old_config.stat.exists

    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ portainer_data_directory }}"
        - "{{ portainer_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ portainer_container_name }}"
        hostname: "{{ portainer_container_name }}"
        image: "{{ portainer_image_name }}:{{ portainer_image_version }}"
        pull: true
        volumes:
          - "{{ portainer_data_directory }}/data:/data:rw"
          - "/var/run/docker.sock:/var/run/docker.sock:ro"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        ports:
          - "{{ portainer_port }}:9000"
        labels:
          autoheal: "{{ portainer_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ portainer_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ portainer_homepage_group }}"
          homepage.href: "{{ portainer_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ portainer_port }}"
          homepage.icon: "{{ portainer_homepage_icon }}"
          homepage.description: "{{ 'Making Docker and Kubernetes management easy.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ portainer_container_name }}"
          homepage.showStats: "{{ portainer_homepage_showStats }}"
          homepage.widget.type: "portainer"
          homepage.widget.env: "2"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ portainer_port }}"
          homepage.widget.key: "{{ portainer_homepage_widget_key }}"
          traefik.enable: "{{ portainer_available_externally | string }}"
          traefik.http.routers.portainer.rule: "Host(`{{ portainer_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.portainer.tls.certresolver: "letsencrypt"
          traefik.http.routers.portainer.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.portainer.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ portainer_hostname }}"
          traefik.http.routers.portainer.middlewares: "{{ portainer_hostname }}@docker"
          traefik.http.middlewares.portainer.IPAllowList.sourcerange: "{{ portainer_traefik_whitelist }}"
          traefik.http.services.portainer.loadbalancer.server.port: "9000"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://hub.docker.com/r/portainer/portainer-ce/tags/tag/$${major}.$${minor}.$${patch}"
        cpu_shares: "{{ portainer_cpu_shares }}"
        memory: "{{ portainer_memory }}"
        restart_policy: unless-stopped
  when: portainer_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ portainer_container_name }}"
        state: absent
  when: portainer_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ portainer_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ portainer_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: portainer_enabled is false and archive_app_data_enabled is true
