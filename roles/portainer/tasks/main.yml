---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ portainer_data_directory }}"
        - "{{ portainer_data_directory }}/data"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        portainer_homepage_href: "https://{{ portainer_hostname }}.{{ ansible_nas_domain }}"
      when: portainer_traefik_enabled | bool or portainer_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ portainer_container_name }}"
        hostname: "{{ portainer_container_name }}"
        image: "{{ portainer_image_name }}:{{ portainer_image_version }}"
        pull: true
        ports:
          - "{{ portainer_port_http }}:9000"
        volumes:
          - "{{ portainer_data_directory }}/data:/data:rw"
          - "/var/run/docker.sock:/var/run/docker.sock:ro"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck: {}
        labels:
          autoheal: "{{ portainer_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ portainer_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ portainer_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ portainer_dockflare_access_group }}"
          dockflare.hostname: "{{ portainer_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ portainer_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ portainer_homepage_group }}"
          homepage.href: "{{ portainer_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ portainer_port_http }}"
          homepage.icon: "{{ portainer_homepage_icon }}"
          homepage.description: "{{ 'Making Docker and Kubernetes management easy.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ portainer_container_name }}"
          homepage.showStats: "{{ portainer_homepage_showstats | ternary('true', 'false') }}"
          homepage.widget.type: "portainer"
          homepage.widget.env: "2"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ portainer_port_http }}"
          homepage.widget.key: "{{ portainer_homepage_widget_key }}"
          repliqate.enabled: "{{ portainer_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ portainer_repliqate_engine }}"
          repliqate.schedule: "{{ portainer_repliqate_schedule }}"
          repliqate.backup_id: "{{ portainer_repliqate_backup_id }}"
          repliqate.retention: "{{ portainer_repliqate_retention }}"
          traefik.enable: "{{ portainer_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.portainer.rule: "Host(`{{ portainer_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.portainer.tls.certresolver: "letsencrypt"
          traefik.http.routers.portainer.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.portainer.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.portainer.middlewares: "{{ portainer_hostname }}@docker{{ ',tinyauth-auth@docker' if portainer_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.portainer.IPAllowList.sourcerange: "{{ portainer_traefik_whitelist }}"
          traefik.http.services.portainer.loadbalancer.server.port: "9000"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/portainer/portainer-ce"
        cpu_shares: "{{ portainer_cpu_shares }}"
        memory: "{{ portainer_memory }}"
        memory_swap: "{{ portainer_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (portainer_port_http | string)] +
                (['https://' + portainer_hostname + '.' + ansible_nas_domain] if (portainer_traefik_enabled is true or portainer_dockflare_enabled is true) else [])
              }}
  when: portainer_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ portainer_container_name }}"
        state: absent
  when: portainer_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ portainer_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - portainer_enabled is false