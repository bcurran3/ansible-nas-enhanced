---
# ANE
ansible_nas_app_name: "Portainer"
portainer_enabled: false
portainer_available_externally: false
portainer_traefik_whitelist: "{{ lan }}"

# directories
portainer_data_directory: "{{ docker_home }}/portainer"

# network
portainer_port_http: "9000"
portainer_hostname: "portainer"
portainer_ip_allowlist: "0.0.0.0/0"

# docker
portainer_container_name: "portainer"
portainer_image_name: "portainer/portainer-ce"
portainer_image_version: "lts"

# specs
portainer_cpu_shares: 1024
portainer_memory: "1G"
portainer_memory_swap: -1

# autoheal
portainer_autoheal: "false"

# dockflare
portainer_dockflare_tunnel: "false"
portainer_dockflare_access_group: ""

# homepage
portainer_homepage_group: "Apps"
portainer_homepage_icon: "portainer.png"
portainer_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ portainer_port_http }}"
portainer_homepage_showstats: "false"
portainer_homepage_widget_key: "" # override in group vars

# repliqate
portainer_repliqate_enabled: "false"
portainer_repliqate_engine: "restic"
portainer_repliqate_schedule: "@daily 3am"
portainer_repliqate_backup_id: "{{ portainer_container_name }}"
portainer_repliqate_retention: "30d"

# tinyauth
portainer_tinyauth_enabled: false

# watchtower
portainer_watchtower_enable: "false"