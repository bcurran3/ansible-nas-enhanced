---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ hello_world_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ hello_world_container_name }}"
        hostname: "{{ hello_world_container_name }}"
        image: "{{ hello_world_image_name }}:{{ hello_world_image_tag }}"
        pull: true
        volumes:
          - "{{ hello_world_data_directory }}:/hello_world:rw"
        ports:
          - "{{ hello_world_port_http }}:8000"
        labels:
          autoheal: "{{ hello_world_autoheal | string }}"
          com.centurylinklabs.watchtower.enable: "{{ hello_world_watchtower_enabled| string }}"
          dockflare.enable: "{{ hello_world_dockflare_enabled | string }}"
          dockflare.access.group: "{{ hello_world_dockflare_access_group }}"
          dockflare.hostname: "{{ hello_world_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ hello_world_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ hello_world_homepage_group }}"
          homepage.icon: "{{ hello_world_homepage_icon }}"
          homepage.href: "{{ hello_world_homepage_href }}"
          homepage.description: "{{ 'hello_world description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ hello_world_container_name }}"
          homepage.showStats: "{{ hello_world_homepage_showstats | string }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ hello_world_port_http }}"
          repliqate.enabled: "false"
          traefik.enable: "{{ hello_world_available_externally | string }}"
          traefik.http.routers.helloworld.rule: "Host(`{{ hello_world_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.helloworld.tls.certresolver: "letsencrypt"
          traefik.http.routers.helloworld.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.helloworld.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.helloworld.middlewares: "helloworld@docker{{ ',tinyauth-auth@docker' if hello_world_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.helloworld.IPAllowList.sourcerange: "{{ hello_world_traefik_whitelist }}"
          traefik.http.services.hello_world.loadbalancer.server.port: "8000"
          wud.watch.digest: "true"
          wud.link.template: "https://hub.docker.com/r/crccheck/hello-world"
        cpu_shares: "{{ hello_world_cpu_shares }}"
        memory: "{{ hello_world_memory }}"
        memory_swap: "{{ hello_world_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (hello_world_port_http | string)] +
                (['https://' + hello_world_hostname + '.' + ansible_nas_domain] if (hello_world_available_externally is true or hello_world_dockflare_enabled is true) else [])
              }}
  when: hello_world_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ hello_world_container_name }}"
        state: absent
  when: hello_world_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ hello_world_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - hello_world_enabled is false