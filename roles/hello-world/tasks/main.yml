---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ hello_world_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ hello_world_container_name }}"
        hostname: "{{ hello_world_container_name }}"
        image: "{{ hello_world_image_name }}:{{ hello_world_image_tag }}"
        pull: true
        volumes:
          - "{{ hello_world_data_directory }}:/hello_world:rw"
        ports:
          - "{{ hello_world_port_http }}:8000"
        labels:
          autoheal: "{{ hello_world_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ hello_world_watchtower_enable }}"
          dockflare.enable: "{{ hello_world_dockflare_tunnel }}"
          dockflare.access.group: "{{ hello_world_dockflare_access_group }}"
          dockflare.hostname: "{{ hello_world_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ hello_world_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ hello_world_homepage_group }}"
          homepage.icon: "{{ hello_world_homepage_icon }}"
          homepage.href: "{{ hello_world_homepage_href }}"
          homepage.description: "{{ 'hello_world description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ hello_world_container_name }}"
          homepage.showStats: "{{ hello_world_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ hello_world_port_http }}"
          traefik.enable: "{{ hello_world_available_externally | string }}"
          traefik.http.routers.hello_world.rule: "Host(`{{ hello_world_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.hello_world.tls.certresolver: "letsencrypt"
          traefik.http.routers.hello_world.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.hello_world.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ hello_world_hostname }}"
          traefik.http.routers.hello_world.middlewares: "{{ hello_world_hostname }}@docker"
          traefik.http.middlewares.hello_world.IPAllowList.sourcerange: "{{ hello_world_traefik_whitelist }}"
          traefik.http.services.hello_world.loadbalancer.server.port: "8000"
          wud.watch.digest: "true"
          wud.link.template: "https://hub.docker.com/r/crccheck/hello-world"
        cpu_shares: "{{ hello_world_cpu_shares }}"
        memory: "{{ hello_world_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (hello_world_port_http | string)] +
                (['https://' + hello_world_hostname + '.' + ansible_nas_domain] if (hello_world_available_externally is true or hello_world_dockflare_tunnel is true) else [])
              }}
  when: hello_world_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ hello_world_container_name }}"
        state: absent
  when: hello_world_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ hello_world_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ hello_world_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: hello_world_enabled is false and archive_app_data_enabled is true
