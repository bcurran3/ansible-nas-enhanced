---
ansible_nas_app_name: "NZBGet"

nzbget_enabled: false
nzbget_available_externally: false
nzbget_traefik_whitelist: "{{ lan }}"

# directories
nzbget_data_directory: "{{ docker_home }}/nzbget"
nzbget_download_directory: "{{ downloads_root }}"

# uid / gid
nzbget_user_id: "0"
nzbget_group_id: "0"

# network
nzbget_port: "6789"
nzbget_hostname: "nzbget"

# docker
nzbget_container_name: "nzbget"
nzbget_image_name: "linuxserver/nzbget"
nzbget_image_version: "latest"
nzbget_cpu_shares: 1024

# specs
nzbget_memory: "1g"

# autoheal
nzbget_autoheal: "false"

# watchtower
nzbget_watchtower_monitor_only: "true"