---
# ANE
ansible_nas_app_name: "NZBGet"
nzbget_enabled: false
nzbget_traefik_enabled: false
nzbget_traefik_whitelist: "{{ lan }}"

# directories
nzbget_data_directory: "{{ docker_home }}/nzbget"
nzbget_download_directory: "{{ downloads_root }}"

# uid / gid
nzbget_user_id: "0"
nzbget_group_id: "0"

# network
nzbget_port_http: "6789"
nzbget_hostname: "nzbget"

# docker
nzbget_container_name: "nzbget"
nzbget_image_name: "lscr.io/linuxserver/nzbget"
nzbget_image_version: "latest"

# specs
nzbget_cpu_shares: 1024
nzbget_memory: "1G"
nzbget_memory_swap: -1

# autoheal
nzbget_autoheal_enabled: false

# dockflare
nzbget_dockflare_enabled: false
nzbget_dockflare_access_group: ""

# homepage
nzbget_homepage_group: "Apps"
nzbget_homepage_icon: "nzbget.png"
nzbget_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ nzbget_port_http }}"
nzbget_homepage_showstats: false
nzbget_homepage_widget_username: ""
nzbget_homepage_widget_password: ""

# linuxserver.io docker mods
nzbget_env_docker_mods: ""
nzbget_env_docker_mods_install_packages: ""
nzbget_env_docker_mods_install_pip_packages: ""

# theme.park themes
# https://docs.theme-park.dev/themes/nzbget/
nzbget_env_docker_mods_tp_theme: ""
nzbget_env_docker_mods_tp_community_theme: ""
nzbget_env_docker_mods_tp_domain: ""
nzbget_env_docker_mods_tp_addon: ""

# repliqate
nzbget_repliqate_enabled: false
nzbget_repliqate_engine: "restic"
nzbget_repliqate_schedule: "@daily 3am"
nzbget_repliqate_backup_id: "{{ nzbget_container_name }}"
nzbget_repliqate_retention: "30d"

# tinyauth
nzbget_tinyauth_enabled: false

# watchtower
nzbget_watchtower_enabled: false