---
# ANE
ansible_nas_app_name: "Proxmox"
proxmox_stack_enabled: false
proxmox_stack_traefik_enabled: false
proxmox_stack_traefik_whitelist: "{{ lan }}"
proxmox_stack_pve1_enabled: true
proxmox_stack_pve2_enabled: true
proxmox_stack_pve3_enabled: true
proxmox_stack_pdm_enabled: true

# directories
proxmox_stack_data_directory: "{{ docker_home }}/proxmox-stack"

# docker
proxmox_stack_pve_image_name: "ghcr.io/longqt-sea/proxmox-ve"
proxmox_stack_pve_image_tag: "latest"
proxmox_stack_pve1_container_name: "pve1"
proxmox_stack_pve2_container_name: "pve2"
proxmox_stack_pve3_container_name: "pve3"
proxmox_stack_pdm_container_name: "pdm"
proxmox_stack_pdm_image_name: "ghcr.io/longqt-sea/proxmox-datacenter-manager"
proxmox_stack_pdm_image_tag: "latest"

# network
proxmox_stack_network_name: "proxmox"
proxmox_stack_pve1_hostname: "pve1"
proxmox_stack_pve1_port_http: "3091"
proxmox_stack_pve1_port_ssh: "2222"
proxmox_stack_pve1_port_spice: "3095"
proxmox_stack_pve2_hostname: "pve2"
proxmox_stack_pve2_port_http: "3092"
proxmox_stack_pve2_port_ssh: "2223"
proxmox_stack_pve2_port_spice: "3096"
proxmox_stack_pve3_hostname: "pve3"
proxmox_stack_pve3_port_http: "3093"
proxmox_stack_pve3_port_ssh: "2224"
proxmox_stack_pve3_port_spice: "3097"
proxmox_stack_pdm_hostname: "pdm"
proxmox_stack_pdm_port_http: "3094"
proxmox_stack_pdm_port_ssh: "2225"

# specs
proxmox_stack_pve1_cpu_shares: 1024
proxmox_stack_pve1_memory: "4G"
proxmox_stack_pve1_memory_swap: -1
proxmox_stack_pve2_cpu_shares: 1024
proxmox_stack_pve2_memory: "4G"
proxmox_stack_pve2_memory_swap: -1
proxmox_stack_pve3_cpu_shares: 1024
proxmox_stack_pve3_memory: "4G"
proxmox_stack_pve3_memory_swap: -1
proxmox_stack_pdm_cpu_shares: 1024
proxmox_stack_pdm_memory: "2G"
proxmox_stack_pdm_memory_swap: -1

# app
proxmox_stack_root_password: "{{ ansible_nas_app_admin_password }}"

# autoheal
proxmox_stack_autoheal_enabled: false

# dockflare
proxmox_stack_dockflare_enabled: false
proxmox_stack_dockflare_access_group: ""

# homepage
proxmox_stack_homepage_showstats: false
proxmox_stack_pve1_homepage_group: "Apps"
proxmox_stack_pve1_homepage_icon: "proxmox.png"
proxmox_stack_pve1_homepage_href: "https://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ proxmox_stack_pve1_port_http }}"
proxmox_stack_pve2_homepage_group: "Apps"
proxmox_stack_pve2_homepage_icon: "proxmox.png"
proxmox_stack_pve2_homepage_href: "https://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ proxmox_stack_pve2_port_http }}"
proxmox_stack_pve3_homepage_group: "Apps"
proxmox_stack_pve3_homepage_icon: "proxmox.png"
proxmox_stack_pve3_homepage_href: "https://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ proxmox_stack_pve3_port_http }}"
proxmox_stack_pdm_homepage_group: "Apps"
proxmox_stack_pdm_homepage_icon: "proxmox.png"
proxmox_stack_pdm_homepage_href: "https://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ proxmox_stack_pdm_port_http }}"

# repliqate
proxmox_stack_repliqate_enabled: false
proxmox_stack_repliqate_engine: "restic"
proxmox_stack_repliqate_schedule: "@daily 3am"
proxmox_stack_repliqate_backup_id: "ProxmoxVE"
proxmox_stack_repliqate_retention: "30d"

# tinyauth
proxmox_stack_tinyauth_enabled: false

# watchtower
proxmox_stack_watchtower_enabled: false
