---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Try and stop and remove {{ proxmox_stack_proper_name }} VE Node 1
      community.docker.docker_container:
        name: "{{ proxmox_stack_pve1_container_name }}"
        state: absent
      register: result_pve1

    - name: Try and stop and remove {{ proxmox_stack_proper_name }} VE Node 2
      community.docker.docker_container:
        name: "{{ proxmox_stack_pve2_container_name }}"
        state: absent
      register: result_pve2

    - name: Try and stop and remove {{ proxmox_stack_proper_name }} VE Node 3
      community.docker.docker_container:
        name: "{{ proxmox_stack_pve3_container_name }}"
        state: absent
      register: result_pve3

    - name: Try and stop and remove {{ proxmox_stack_proper_name }} DC Manager
      community.docker.docker_container:
        name: "{{ proxmox_stack_pdm_container_name }}"
        state: absent
      register: result_pdm

    - name: Check if {{ proxmox_stack_proper_name }} is stopped
      ansible.builtin.assert:
        that:
          - not result_pve1.changed
          - not result_pve2.changed
          - not result_pve3.changed
          - not result_pdm.changed
