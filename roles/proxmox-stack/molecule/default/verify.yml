---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Get {{ proxmox_stack_proper_name }} container state
      community.docker.docker_container:
        name: "{{ proxmox_stack_pve1_container_name }}"
      register: result_pve1

    - name: Get {{ proxmox_stack_proper_name }} container state
      community.docker.docker_container:
        name: "{{ proxmox_stack_pve2_container_name }}"
      register: result_pve2

    - name: Get {{ proxmox_stack_proper_name }} container state
      community.docker.docker_container:
        name: "{{ proxmox_stack_pve3_container_name }}"
      register: result_pve3

    - name: Get {{ proxmox_stack_proper_name }} container state
      community.docker.docker_container:
        name: "{{ proxmox_stack_pdm_container_name }}"
      register: result_pdm

    - name: Check if {{ proxmox_stack_proper_name }} containers are running
      ansible.builtin.assert:
        that:
          - result_pve1.container['State']['Status'] == "running"
          - result_pve1.container['State']['Restarting'] == false
          - result_pve2.container['State']['Status'] == "running"
          - result_pve2.container['State']['Restarting'] == false
          - result_pve3.container['State']['Status'] == "running"
          - result_pve3.container['State']['Restarting'] == false
          - result_pdm.container['State']['Status'] == "running"
          - result_pdm.container['State']['Restarting'] == false
