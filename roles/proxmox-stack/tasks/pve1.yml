---
- name: Start {{ ansible_nas_app_name }} VE Node 1
  block:
    - name: Set {{ ansible_nas_app_name }} VE Node 1 FQDN var overrides
      ansible.builtin.set_fact:
        proxmox_stack_pve1_homepage_href: "https://{{ proxmox_stack_pve1_hostname }}.{{ ansible_nas_domain }}"
      when: proxmox_stack_traefik_enabled | bool or proxmox_stack_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} VE Node 1 Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ proxmox_stack_pve1_container_name }}"
        hostname: "{{ proxmox_stack_pve1_container_name }}"
        image: "{{ proxmox_stack_pve_image_name }}:{{ proxmox_stack_pve_image_tag }}"
        pull: true
        networks:
          - name: "{{ proxmox_stack_network_name }}"
        network_mode: "{{ proxmox_stack_network_name }}"
        networks_cli_compatible: "yes"
        volumes:
          - "/usr/lib/modules:/usr/lib/modules:ro"
          - "/sys/kernel/security:/sys/kernel/security"
          - "{{ proxmox_stack_data_directory }}/backup:/var/lib/vz/dump"
          - "{{ proxmox_stack_data_directory }}/iso:/var/lib/vz/template/iso"
        ports:
          - "{{ proxmox_stack_pve1_port_http }}:8006"
          - "{{ proxmox_stack_pve1_port_ssh }}:22"
          - "{{ proxmox_stack_pve1_port_spice }}:3128"
        env:
          PASSWORD: "{{ proxmox_stack_root_password }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ proxmox_stack_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ proxmox_stack_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ proxmox_stack_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ proxmox_stack_dockflare_access_group }}"
          dockflare.hostname: "{{ proxmox_stack_pve1_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "https://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ proxmox_stack_pve1_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }} VE Node 1"
          homepage.group: "{{ proxmox_stack_pve1_homepage_group }}"
          homepage.icon: "{{ proxmox_stack_pve1_homepage_icon }}"
          homepage.href: "{{ proxmox_stack_pve1_homepage_href }}"
          homepage.description: "{{ 'pve description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ proxmox_stack_pve1_container_name }}"
          homepage.showStats: "{{ proxmox_stack_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "https://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ proxmox_stack_pve1_port_http }}"
          repliqate.enabled: "{{ proxmox_stack_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ proxmox_stack_repliqate_engine }}"
          repliqate.schedule: "{{ proxmox_stack_repliqate_schedule }}"
          repliqate.backup_id: "{{ proxmox_stack_repliqate_backup_id }}"
          repliqate.retention: "{{ proxmox_stack_repliqate_retention }}"
          traefik.enable: "{{ proxmox_stack_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.pve1.rule: "Host(`{{ proxmox_stack_pve1_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.pve1.tls.certresolver: "letsencrypt"
          traefik.http.routers.pve1.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.pve1.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.pve1.middlewares: "pve1@docker{{ ',tinyauth-auth@docker' if proxmox_stack_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.pve1.IPAllowList.sourcerange: "{{ proxmox_stack_traefik_whitelist }}"
          traefik.http.services.pve1.loadbalancer.server.scheme: "https"
          traefik.http.services.pve1.loadbalancer.serverstransport: "insecureTransport@file"
          traefik.http.services.pve1.loadbalancer.server.port: "8006"
          wud.tag.include: "^latest$"
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/LongQT-sea/containerized-proxmox/releases"
        capabilities:
          - ALL
        cgroupns_mode: private
        cpu_shares: "{{ proxmox_stack_pve1_cpu_shares }}"
        device_cgroup_rules:
          - "a *:* rwm"
        memory: "{{ proxmox_stack_pve1_memory }}"
        memory_swap: "{{ proxmox_stack_pve1_memory_swap }}"
        privileged: true
        security_opts:
          - seccomp=unconfined
          - apparmor=unconfined
        tty: true
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} VE Node 1 at
      ansible.builtin.debug:
        msg: >-
              {{
                ['https://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (proxmox_stack_pve1_port_http | string)] +
                (['https://' + proxmox_stack_pve1_hostname + '.' + ansible_nas_domain] if (proxmox_stack_traefik_enabled is true or proxmox_stack_dockflare_enabled is true) else [])
              }}
  when: 
    - proxmox_stack_pve1_enabled is true
    - proxmox_stack_enabled is true

- name: Stop {{ ansible_nas_app_name }}  VE Node 1
  block:
    - name: Stop {{ ansible_nas_app_name }} VE Node 1 Container
      community.docker.docker_container:
        name: "{{ proxmox_stack_pve1_container_name }}"
        state: absent
  when: proxmox_stack_pve1_enabled is false or proxmox_stack_enabled is false
