---
# ANE
ansible_nas_app_name: "Homarr"
homarr_enabled: false
homarr_available_externally: true
homarr_traefik_whitelist: "{{ lan }}"
homarr_data_directory: "{{ docker_home }}/homarr"

homarr_secret_encryption_key: "create using openssl rand -hex 32"

# network
homarr_hostname: "homarr"
homarr_port_http: "7575"

# docker
homarr_container_name: "homarr"
homarr_image_name: "ghcr.io/homarr-labs/homarr"
homarr_image_tag: "latest"
homarr_cpu_shares: "1024"
homarr_memory: "512m"

# autoheal
homarr_autoheal: "false"

# dockflare
homarr_dockflare_tunnel: "false"
homarr_dockflare_access_group: ""

# homepage
homarr_homepage_group: "Apps"
homarr_homepage_icon: "homarr.png"
homarr_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ homarr_port_http }}"
homarr_homepage_showstats: "false"

# repliqate
homarr_repliqate_enabled: "false"
homarr_repliqate_engine: "restic"
homarr_repliqate_schedule: "@daily 3am"
homarr_repliqate_backup_id: "{{ homarr_container_name }}"
homarr_repliqate_retention: "30d"

# watchtower
homarr_watchtower_enable: "false"