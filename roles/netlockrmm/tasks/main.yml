---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Check if {{ netlockrmm_hostname }}.{{ ansible_nas_domain }} resolves
      ansible.builtin.shell: dig +short {{ netlockrmm_hostname }}.{{ ansible_nas_domain }}
      register: dns_check
      changed_when: false

    - name: Set DNS status fact
      set_fact:
        dns_exists: "{{ dns_check.stdout | length > 0 }}"

    - name: Report DNS and Access Status
      ansible.builtin.debug:
        msg: >-
          {{
            "DNS record found!"
            if dns_exists
            else
            "DNS record not found. External access to be configured."
            if (netlockrmm_traefik_enabled | bool or netlockrmm_dockflare_enabled | bool)
            else
            "DNS record not found. External access not configured. Skipping container creation."
          }}

    - name: Continue {{ ansible_nas_app_name }}
      block:
        - name: Create {{ ansible_nas_app_name }} Directories
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
          with_items:
            - "{{ netlockrmm_data_directory }}"
            - "{{ netlockrmm_data_directory }}/db"
            - "{{ netlockrmm_data_directory }}/server"
            - "{{ netlockrmm_data_directory }}/server/files"
            - "{{ netlockrmm_data_directory }}/server/internal"
            - "{{ netlockrmm_data_directory }}/server/logs"
            - "{{ netlockrmm_data_directory }}/web"
            - "{{ netlockrmm_data_directory }}/web/internal"
            - "{{ netlockrmm_data_directory }}/web/logs"

        - name: Template {{ ansible_nas_app_name }} Server Config
          ansible.builtin.template:
            src: server/appsettings.json
            dest: "{{ netlockrmm_data_directory }}/server/appsettings.json"
          register: netlockrmm_server_config

        - name: Template {{ ansible_nas_app_name }} Web UI Config
          ansible.builtin.template:
            src: web/appsettings.json
            dest: "{{ netlockrmm_data_directory }}/web/appsettings.json"
          register: netlockrmm_web_config

        - name: Create {{ ansible_nas_app_name }} DB Container
          community.docker.docker_container:
            container_default_behavior: "compatibility"
            name: "{{ netlockrmm_db_container_name }}"
            hostname: "{{ netlockrmm_db_container_name }}"
            image: "{{ netlockrmm_db_image_name }}:{{ netlockrmm_db_image_tag }}"
            pull: true
            command: "--skip-log-bin --innodb_buffer_pool_size=1G --innodb_log_file_size=256M --innodb_flush_log_at_trx_commit=2 --max_connections=200"
            volumes:
              - "{{ netlockrmm_data_directory }}/db:/var/lib/mysql"
              - "/etc/localtime:/etc/localtime:ro"
            env:
              MYSQL_ROOT_PASSWORD: "{{ netlockrmm_db_mysql_root_password }}"
              MYSQL_DATABASE: "{{ netlockrmm_db_msql_database }}"
              TZ: "{{ ansible_nas_timezone }}"
            labels:
              autoheal: "{{ netlockrmm_db_autoheal_enabled | ternary('true', 'false') }}"
              com.centurylinklabs.watchtower.enable: "{{ netlockrmm_db_watchtower_enabled | ternary('true', 'false') }}"
              dockflare.enable: "false"
              homepage.name: "{{ ansible_nas_app_name }} MySQL"
              homepage.group: "{{ netlockrmm_db_homepage_group }}"
              homepage.icon: "{{ netlockrmm_db_homepage_icon }}"
              homepage.href: "{{ netlockrmm_db_homepage_href }}"
              homepage.description: "{{ 'MySQL Server, the world''s most popular open source database' if homepage_show_description else omit }}"
              homepage.server: "my-docker"
              homepage.container: "{{ netlockrmm_db_container_name }}"
              homepage.showStats: "{{ netlockrmm_db_homepage_showstats | ternary('true', 'false') }}"
              repliqate.enabled: "{{ netlockrmm_db_repliqate_enabled | ternary('true', 'false') }}"
              repliqate.engine: "{{ netlockrmm_db_repliqate_engine }}"
              repliqate.schedule: "{{ netlockrmm_db_repliqate_schedule }}"
              repliqate.backup_id: "{{ netlockrmm_db_repliqate_backup_id }}"
              repliqate.retention: "{{ netlockrmm_db_repliqate_retention }}"
              traefik.enable: "false"
              wud.tag.include: '^\d+\.\d+\.\d+.*$'
              wud.tag.transform.type: "semver"
              wud.link.template: "https://hub.docker.com/_/mysql"
            cpu_shares: "{{ netlockrmm_db_cpu_shares }}"
            memory: "{{ netlockrmm_db_memory }}"
            memory_swap: "{{ netlockrmm_db_memory_swap }}"
            restart_policy: unless-stopped

        - name: Create {{ ansible_nas_app_name }} Web UI Container
          community.docker.docker_container:
            container_default_behavior: "compatibility"
            name: "{{ netlockrmm_web_container_name }}"
            hostname: "{{ netlockrmm_web_container_name }}"
            image: "{{ netlockrmm_web_image_name }}:{{ netlockrmm_web_image_tag }}"
            pull: true
            volumes:
              - "{{ netlockrmm_data_directory }}/web/appsettings.json:/app/appsettings.json"
              - "{{ netlockrmm_data_directory }}/web/internal:/app/internal"
              - "{{ netlockrmm_data_directory }}/web/logs:/var/0x101 Cyber Security/NetLock RMM/Web Console/"
              - "{{ netlockrmm_certs_directory }}:/app/certificates"
              - "/etc/localtime:/etc/localtime:ro"
            ports:
              - "{{ netlockrmm_port_http }}:80"
            env:
              TZ: "{{ ansible_nas_timezone }}"
            links:
              - "{{ netlockrmm_db_container_name }}"
            labels:
              autoheal: "{{ netlockrmm_web_autoheal_enabled | ternary('true', 'false') }}"
              com.centurylinklabs.watchtower.enable: "{{ netlockrmm_web_watchtower_enabled | ternary('true', 'false') }}"
              dockflare.enable: "{{ netlockrmm_dockflare_enabled | ternary('true', 'false') }}"
              dockflare.access.group: "{{ netlockrmm_dockflare_access_group }}"
              dockflare.hostname: "{{ netlockrmm_hostname }}.{{ ansible_nas_domain }}"
              dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ netlockrmm_port_http }}"
              homepage.name: "{{ ansible_nas_app_name }} Web UI"
              homepage.group: "{{ netlockrmm_web_homepage_group }}"
              homepage.icon: "{{ netlockrmm_web_homepage_icon }}"
              homepage.href: "{{ netlockrmm_web_homepage_href }}"
              homepage.description: "{{ 'netlockrmm web description' if homepage_show_description else omit }}"
              homepage.server: "my-docker"
              homepage.container: "{{ netlockrmm_web_container_name }}"
              homepage.showStats: "{{ netlockrmm_web_homepage_showstats | ternary('true', 'false') }}"
              homepage.siteMonitor: "https://{{ netlockrmm_hostname }}.{{ ansible_nas_domain }}"
              repliqate.enabled: "{{ netlockrmm_web_repliqate_enabled | ternary('true', 'false') }}"
              repliqate.engine: "{{ netlockrmm_web_repliqate_engine }}"
              repliqate.schedule: "{{ netlockrmm_web_repliqate_schedule }}"
              repliqate.backup_id: "{{ netlockrmm_web_repliqate_backup_id }}"
              repliqate.retention: "{{ netlockrmm_web_repliqate_retention }}"
              traefik.enable: "{{ netlockrmm_traefik_enabled | ternary('true', 'false') }}"
              traefik.http.routers.netlockrmm.rule: "Host(`{{ netlockrmm_hostname }}.{{ ansible_nas_domain }}`)"
              traefik.http.routers.netlockrmm.tls.certresolver: "letsencrypt"
              traefik.http.routers.netlockrmm.tls.domains[0].main: "{{ ansible_nas_domain }}"
              traefik.http.routers.netlockrmm.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
              traefik.http.routers.netlockrmm.middlewares: "netlockrmm@docker{{ ',tinyauth-auth@docker' if netlockrmm_tinyauth_enabled | bool else '' }}"
              traefik.http.middlewares.netlockrmm.IPAllowList.sourcerange: "{{ netlockrmm_traefik_whitelist }}"
              traefik.http.services.netlockrmm.loadbalancer.server.port: "80"
              wud.tag.include: "^v?\\d+\\.\\d+\\.\\d+.*$"
              wud.tag.transform.type: "semver"
              wud.link.template: "https://hub.docker.com/r/nicomak101/netlock-rmm-web-console"
            cpu_shares: "{{ netlockrmm_cpu_shares }}"
            memory: "{{ netlockrmm_memory }}"
            memory_swap: "{{ netlockrmm_web_memory_swap }}"
            recreate: "{{ netlockrmm_web_config is changed }}"
            restart_policy: unless-stopped

        - name: Create {{ ansible_nas_app_name }} Server Container
          community.docker.docker_container:
            container_default_behavior: "compatibility"
            name: "{{ netlockrmm_container_name }}"
            hostname: "{{ netlockrmm_container_name }}"
            image: "{{ netlockrmm_image_name }}:{{ netlockrmm_image_tag }}"
            pull: true
            volumes:
              - "{{ netlockrmm_data_directory }}/server/appsettings.json:/app/appsettings.json"
              - "{{ netlockrmm_data_directory }}/server/internal:/app/internal"
              - "{{ netlockrmm_data_directory }}/server/files:/app/www/private/files"
              - "{{ netlockrmm_data_directory }}/server/logs:/var/0x101 Cyber Security/NetLock RMM/Server/"
              - "{{ netlockrmm_certs_directory }}:/app/certificates"
              - "/etc/localtime:/etc/localtime:ro"
            ports:
              - "{{ netlockrmm_server_port_http }}:7080"
              - "7081:7081"
            env:
              TZ: "{{ ansible_nas_timezone }}"
            links:
              - "{{ netlockrmm_db_container_name }}"
            labels:
              autoheal: "{{ netlockrmm_autoheal_enabled | ternary('true', 'false') }}"
              com.centurylinklabs.watchtower.enable: "{{ netlockrmm_watchtower_enabled | ternary('true', 'false') }}"
              dockflare.enable: "{{ netlockrmm_dockflare_enabled | ternary('true', 'false') }}"
              dockflare.access.group: "{{ netlockrmm_dockflare_access_group }}"
              dockflare.hostname: "{{ netlockrmm_hostname }}.{{ ansible_nas_domain }}"
              dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ netlockrmm_server_port_http }}"
              homepage.name: "{{ ansible_nas_app_name }}"
              homepage.group: "{{ netlockrmm_homepage_group }}"
              homepage.icon: "{{ netlockrmm_homepage_icon }}"
              homepage.href: "{{ netlockrmm_homepage_href }}"
              homepage.description: "{{ 'netlockrmm description' if homepage_show_description else omit }}"
              homepage.server: "my-docker"
              homepage.container: "{{ netlockrmm_container_name }}"
              homepage.showStats: "{{ netlockrmm_homepage_showstats | ternary('true', 'false') }}"
              repliqate.enabled: "{{ netlockrmm_repliqate_enabled | ternary('true', 'false') }}"
              repliqate.engine: "{{ netlockrmm_repliqate_engine }}"
              repliqate.schedule: "{{ netlockrmm_repliqate_schedule }}"
              repliqate.backup_id: "{{ netlockrmm_repliqate_backup_id }}"
              repliqate.retention: "{{ netlockrmm_repliqate_retention }}"
              traefik.enable: "{{ netlockrmm_traefik_enabled | ternary('true', 'false') }}"
              traefik.http.routers.netlockrmmserver.rule: "Host(`{{ netlockrmm_server_hostname }}.{{ ansible_nas_domain }}`)"
              traefik.http.routers.netlockrmmserver.tls.certresolver: "letsencrypt"
              traefik.http.routers.netlockrmmserver.tls.domains[0].main: "{{ ansible_nas_domain }}"
              traefik.http.routers.netlockrmmserver.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
              traefik.http.routers.netlockrmmserver.middlewares: "netlockrmmserver@docker"
              traefik.http.middlewares.netlockrmmserver.IPAllowList.sourcerange: "{{ netlockrmm_traefik_whitelist }}"
              traefik.http.services.netlockrmmserver.loadbalancer.server.port: "7080"
              wud.tag.include: "^v?\\d+\\.\\d+\\.\\d+.*$"
              wud.tag.transform.type: "semver"
              wud.link.template: "https://hub.docker.com/r/nicomak101/netlock-rmm-server"
            cpu_shares: "{{ netlockrmm_cpu_shares }}"
            memory: "{{ netlockrmm_memory }}"
            memory_swap: "{{ netlockrmm_memory_swap }}"
            recreate: "{{ netlockrmm_server_config is changed }}"
            restart_policy: unless-stopped

        - name: Access {{ ansible_nas_app_name }} at
          ansible.builtin.debug:
            msg: >-
                  {{
                    (['https://' + netlockrmm_hostname + '.' + ansible_nas_domain] if (netlockrmm_traefik_enabled is true or netlockrmm_dockflare_enabled is true) else [])
                  }}
      when:
        - dns_exists
        - (netlockrmm_dockflare_enabled | bool or netlockrmm_traefik_enabled | bool)
  when: netlockrmm_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Web UI Container
      community.docker.docker_container:
        name: "{{ netlockrmm_web_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ netlockrmm_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ netlockrmm_db_container_name }}"
        state: absent
  when: netlockrmm_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ netlockrmm_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - netlockrmm_enabled is false
