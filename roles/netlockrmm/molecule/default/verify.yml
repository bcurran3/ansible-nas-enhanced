---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Get {{ netlockrmm_proper_name }} container state
      community.docker.docker_container:
        name: "{{ netlockrmm_container_name }}"
      register: result

    - name: Get {{ netlockrmm_proper_name }} DB container state
      community.docker.docker_container:
        name: "{{ netlockrmm_db_container_name }}"
      register: result_db

    - name: Get {{ netlockrmm_proper_name }} Web UI container state
      community.docker.docker_container:
        name: "{{ netlockrmm_web_container_name }}"
      register: result_web

    - name: Check if {{ netlockrmm_proper_name }} containers are running
      ansible.builtin.assert:
        that:
          - result.container['State']['Status'] == "running"
          - result.container['State']['Restarting'] == false
          - result_db.container['State']['Status'] == "running"
          - result_db.container['State']['Restarting'] == false
          - result_web.container['State']['Status'] == "running"
          - result_web.container['State']['Restarting'] == false