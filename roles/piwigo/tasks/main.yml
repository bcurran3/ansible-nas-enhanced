---
- name: Start {{ piwigo_proper_name }}
  block:
    - name: Create {{ piwigo_proper_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ piwigo_data_directory }}"
        - "{{ piwigo_data_directory }}/config"
        - "{{ piwigo_data_directory }}/db"
        - "{{ piwigo_photos }}"

    - name: Set {{ piwigo_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        piwigo_homepage_href: "https://{{ piwigo_hostname }}.{{ ansible_nas_domain }}"
      when: piwigo_traefik_enabled | bool or piwigo_dockflare_enabled | bool

    - name: Create {{ piwigo_proper_name }} network
      community.docker.docker_network:
        name: "{{ piwigo_network_name }}"

    - name: Create {{ piwigo_proper_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ piwigo_db_container_name }}"
        hostname: "{{ piwigo_db_container_name }}"
        image: "{{ piwigo_db_image_name }}:{{ piwigo_db_image_version }}"
        pull: true
        networks:
          - name: "{{ piwigo_network_name }}"
        network_mode: "{{ piwigo_network_name }}"
        volumes:
          - "{{ piwigo_data_directory }}/db:/var/lib/mysql:rw"
        env:
          MYSQL_DATABASE: "piwigo"
          MYSQL_USER: "{{ piwigo_db_user }}"
          MYSQL_PASSWORD: "{{ piwigo_db_password }}"
          MYSQL_ROOT_PASSWORD: "{{ piwigo_db_root_password }}"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
          interval: 10s
          timeout: 5s
          retries: 5
        labels:
          autoheal: "{{ piwigo_db_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ piwigo_db_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ piwigo_proper_name }} MySQL"
          homepage.group: "{{ piwigo_db_homepage_group }}"
          homepage.icon: "{{ piwigo_db_homepage_icon }}"
          homepage.href: "{{ piwigo_homepage_href }}"
          homepage.description: "{{ 'MySQL Server, the world''s most popular open source database' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ piwigo_db_container_name }}"
          homepage.showStats: "{{ piwigo_db_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ piwigo_db_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ piwigo_db_repliqate_engine }}"
          repliqate.schedule: "{{ piwigo_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ piwigo_db_repliqate_backup_id }}"
          repliqate.retention: "{{ piwigo_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/mysql"
        cpu_shares: "{{ piwigo_db_cpu_shares }}"
        memory: "{{ piwigo_db_memory }}"
        memory_swap: "{{ piwigo_db_memory_swap }}"
        restart_policy: unless-stopped

    - name: Wait for {{ piwigo_proper_name }} DB to become healthy
      community.docker.docker_container_info:
        name: "{{ piwigo_db_container_name }}"
      register: db_info
      until: "db_info.container.State.Health.Status == 'healthy'"
      retries: 30
      delay: 5

    - name: Create {{ piwigo_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ piwigo_container_name }}"
        hostname: "{{ piwigo_container_name }}"
        image: "{{ piwigo_image_name }}:{{ piwigo_image_version }}"
        pull: true
        networks:
          - name: "{{ piwigo_network_name }}"
        network_mode: "{{ piwigo_network_name }}"
        volumes:
          - "{{ piwigo_data_directory }}/config:/config:rw"
          - "{{ piwigo_photos }}:/gallery:rw"
        ports:
          - "{{ piwigo_port_http }}:80"
        env:
          DOCKER_MODS: "{{ piwigo_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ piwigo_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ piwigo_env_docker_mods_install_pip_packages}}"
          PUID: "{{ piwigo_user_id }}"
          PGID: "{{ piwigo_group_id }}"
          VERSION: "{{ piwigo_version }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ piwigo_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ piwigo_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ piwigo_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ piwigo_dockflare_access_group }}"
          dockflare.hostname: "{{ piwigo_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ piwigo_port_http }}"
          homepage.name: "{{ piwigo_proper_name }}"
          homepage.group: "{{ piwigo_homepage_group }}"
          homepage.icon: "{{ piwigo_homepage_icon }}"
          homepage.href: "{{ piwigo_homepage_href }}"
          homepage.description: "{{ 'Photos client' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ piwigo_container_name }}"
          homepage.showStats: "{{ piwigo_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ piwigo_port_http }}"
          repliqate.enabled: "{{ piwigo_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ piwigo_repliqate_engine }}"
          repliqate.schedule: "{{ piwigo_repliqate_schedule }}"
          repliqate.backup_id: "{{ piwigo_repliqate_backup_id }}"
          repliqate.retention: "{{ piwigo_repliqate_retention }}"
          traefik.enable: "{{ piwigo_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.piwigo.rule: "Host(`{{ piwigo_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.piwigo.tls.certresolver: "letsencrypt"
          traefik.http.routers.piwigo.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.piwigo.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.piwigo.middlewares: "piwigo@docker{{ ',tinyauth-auth@docker' if piwigo_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.piwigo.IPAllowList.sourcerange: "{{ piwigo_traefik_whitelist }}"
          traefik.http.services.piwigo.loadbalancer.server.port: "80"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://lscr.io/linuxserver/piwigo"
        cpu_shares: "{{ piwigo_cpu_shares }}"
        memory: "{{ piwigo_memory }}"
        memory_swap: "{{ piwigo_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ piwigo_proper_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (piwigo_port_http | string)] +
                (['https://' + piwigo_hostname + '.' + ansible_nas_domain] if (piwigo_traefik_enabled is true or piwigo_dockflare_enabled is true) else [])
              }}
  when: piwigo_enabled is true

- name: Stop {{ piwigo_proper_name }}
  block:
    - name: Stop {{ piwigo_proper_name }} Container
      community.docker.docker_container:
        name: "{{ piwigo_container_name }}"
        state: absent

    - name: Stop {{ piwigo_proper_name }} DB Container
      community.docker.docker_container:
        name: "{{ piwigo_db_container_name }}"
        state: absent
  when: piwigo_enabled is false

- name: Data Archive {{ piwigo_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ piwigo_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - piwigo_enabled is false