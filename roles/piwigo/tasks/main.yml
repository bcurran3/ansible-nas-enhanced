---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ piwigo_data_directory }}"
        - "{{ piwigo_data_directory }}/config"
        - "{{ piwigo_data_directory }}/db"
        - "{{ piwigo_photos }}"

    - name: Create {{ ansible_nas_app_name }} network
      community.docker.docker_network:
        name: "{{ piwigo_network_name }}"

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ piwigo_db_container_name }}"
        hostname: "{{ piwigo_db_container_name }}"
        image: "{{ piwigo_db_image_name }}:{{ piwigo_db_image_version }}"
        pull: true
        cpu_shares: "{{ piwigo_db_cpu_shares }}"
        volumes:
          - "{{ piwigo_data_directory }}/db:/var/lib/mysql:rw"
        env:
          MYSQL_DATABASE: "piwigo"
          MYSQL_USER: "{{ piwigo_mysql_user }}"
          MYSQL_PASSWORD: "{{ piwigo_mysql_password }}"
          MYSQL_ROOT_PASSWORD: "{{ piwigo_mysql_root_password }}"
        restart_policy: unless-stopped
        memory: "{{ piwigo_mysql_memory }}"
        networks:
          - name: "{{ piwigo_network_name }}"
        network_mode: "{{ piwigo_network_name }}"
        labels:
          autoheal: "{{ piwigo_db_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ piwigo_db_watchtower_monitor_only }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ piwigo_container_name }}"
        hostname: "{{ piwigo_container_name }}"
        image: "{{ piwigo_image_name }}:{{ piwigo_image_version }}"
        pull: true
        cpu_shares: "{{ piwigo_cpu_shares }}"
        volumes:
          - "{{ piwigo_data_directory }}/config:/config:rw"
          - "{{ piwigo_photos }}:/gallery:rw"
        ports:
          - "{{ piwigo_port }}:80"
        env:
          TZ: "{{ ansible_nas_timezone }}"
          PUID: "{{ piwigo_user_id }}"
          PGID: "{{ piwigo_group_id }}"
          VERSION: "{{ piwigo_version }}"
        restart_policy: unless-stopped
        memory: "{{ piwigo_memory }}"
        networks:
          - name: "{{ piwigo_network_name }}"
        network_mode: "{{ piwigo_network_name }}"
        labels:
          autoheal: "{{ piwigo_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ piwigo_watchtower_monitor_only }}"
          traefik.enable: "{{ piwigo_available_externally | string }}"
          traefik.http.routers.piwigo.rule: "Host(`{{ piwigo_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.piwigo.tls.certresolver: "letsencrypt"
          traefik.http.routers.piwigo.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.piwigo.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.services.piwigo.loadbalancer.server.port: "80"
          homepage.group: Photos
          homepage.name: Piwigo
          homepage.icon: piwigo.png
          homepage.href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ piwigo_port }}"
          homepage.description: Photos client
  when: piwigo_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ piwigo_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ piwigo_db_container_name }}"
        state: absent
  when: piwigo_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ piwigo_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ piwigo_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: piwigo_enabled is false and archive_app_data_enabled is true
