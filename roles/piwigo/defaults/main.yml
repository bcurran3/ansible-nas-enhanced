---
# ANE
ansible_nas_app_name: "Piwigo"
piwigo_enabled: false
piwigo_available_externally: false
piwigo_traefik_whitelist: "{{ lan }}"

# directories
piwigo_data_directory: "{{ docker_home }}/piwigo"
piwigo_photos: "{{ photos_root }}/piwigo"

# uid / gid
piwigo_user_id: "1000"
piwigo_group_id: "1000"
piwigo_mysql_user: "piwigo"
piwigo_mysql_password: "piwigo"
piwigo_mysql_root_password: "piwigo"

# media permissions
piwigo_photos_permission: "rw"

# network
piwigo_hostname: "piwigo"
piwigo_network_name: "piwigo"
piwigo_port: "16923"

# docker
piwigo_container_name: "piwigo"
piwigo_image_name: "lscr.io/linuxserver/piwigo"
piwigo_image_version: "latest"
piwigo_db_container_name: "piwigo-db"
piwigo_db_image_name: "mysql"
piwigo_db_image_version: "5.7"

# specs
piwigo_cpu_shares: 1024
piwigo_memory: "1g"
piwigo_mysql_cpu_shares: 1024
piwigo_mysql_memory: "1g"

piwigo_version: "docker"

# autoheal
piwigo_autoheal: "false"
piwigo_db_autoheal: "false"

# dockflare
piwigo_dockflare_tunnel: "false"
piwigo_dockflare_access_group: ""

# homepage
piwigo_homepage_group: "Apps"
piwigo_homepage_icon: "piwigo.png"
piwigo_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ piwigo_port }}"
piwigo_homepage_showstats: "false"
piwigo_db_homepage_group: "DBs"
piwigo_db_homepage_icon: "mysql.png"
piwigo_db_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ piwigo_port }}"
piwigo_db_homepage_showstats: "false"

# linuxserver.io docker mods
piwigo_env_docker_mods: ""
piwigo_env_docker_mods_install_packages: ""
piwigo_env_docker_mods_install_pip_packages: ""

# watchtower
piwigo_watchtower_enable: "false"
piwigo_db_watchtower_enable: "false"