---
# ANE
ansible_nas_app_name: "Dockge"
dockge_enabled: false
dockge_available_externally: false
dockge_traefik_whitelist: "{{ lan }}"

# directories
dockge_data_directory: "{{ docker_home }}/dockge"

# docker
dockge_container_name: "dockge"
dockge_image_name: "louislam/dockge"
dockge_image_tag: "latest"

# network
dockge_port_http: "5001"
dockge_hostname: "dockge"

# specs
dockge_cpu_shares: 1024
dockge_memory: "512M"

# autoheal
dockge_autoheal: "false"

# dockflare
dockge_dockflare_tunnel: "false"
dockge_dockflare_access_group: ""

# homepage
dockge_homepage_group: "Apps"
dockge_homepage_icon: "dockge.png"
dockge_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ dockge_port_http }}"
dockge_homepage_showstats: "false"

# repliqate
dockge_repliqate_enabled: "false"
dockge_repliqate_engine: "restic"
dockge_repliqate_schedule: "@daily 3am"
dockge_repliqate_backup_id: "{{ dockge_container_name }}"
dockge_repliqate_retention: "30d"

# tinyauth
dockge_tinyauth_enabled: false

# watchtower
dockge_watchtower_enable: "false"
