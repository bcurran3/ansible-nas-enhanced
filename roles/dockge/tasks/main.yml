---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ dockge_data_directory }}"
        - "{{ dockge_data_directory }}/data"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        dockge_homepage_href: "https://{{ dockge_hostname }}.{{ ansible_nas_domain }}"
      when: dockge_traefik_enabled | bool or dockge_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ dockge_container_name }}"
        hostname: "{{ dockge_container_name }}"
        image: "{{ dockge_image_name }}:{{ dockge_image_tag }}"
        pull: true
        volumes:
          - "{{ dockge_data_directory }}/data:/app/data"
          - "{{ docker_compose_data_directory }}:/opt/stacks"
          - "/var/run/docker.sock:/var/run/docker.sock"
        # If you want to use private registries, you need to share the auth file with Dockge:
        # - /root/.docker/:/root/.docker
        ports:
          - "{{ dockge_port_http }}:5001"
        env:
          DOCKGE_STACKS_DIR: "/opt/stacks"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ dockge_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ dockge_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ dockge_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ dockge_dockflare_access_group }}"
          dockflare.hostname: "{{ dockge_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ dockge_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ dockge_homepage_group }}"
          homepage.icon: "{{ dockge_homepage_icon }}"
          homepage.href: "{{ dockge_homepage_href }}"
          homepage.description: "{{ 'A fancy, easy-to-use and reactive self-hosted docker compose.yaml stack-oriented manager' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ dockge_container_name }}"
          homepage.showStats: "{{ dockge_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ dockge_port_http }}"
          repliqate.enabled: "{{ dockge_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ dockge_repliqate_engine }}"
          repliqate.schedule: "{{ dockge_repliqate_schedule }}"
          repliqate.backup_id: "{{ dockge_repliqate_backup_id }}"
          repliqate.retention: "{{ dockge_repliqate_retention }}"
          traefik.enable: "{{ dockge_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.dockge.rule: "Host(`{{ dockge_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.dockge.tls.certresolver: "letsencrypt"
          traefik.http.routers.dockge.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.dockge.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.dockge.middlewares: "dockge@docker{{ ',tinyauth-auth@docker' if dockge_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.dockge.IPAllowList.sourcerange: "{{ dockge_traefik_whitelist }}"
          traefik.http.services.dockge.loadbalancer.server.port: "5001"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/louislam/dockge"
        cpu_shares: "{{ dockge_cpu_shares }}"
        memory: "{{ dockge_memory }}"
        memory_swap: "{{ dockge_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (dockge_port_http | string)] +
                (['https://' + dockge_hostname + '.' + ansible_nas_domain] if (dockge_traefik_enabled is true or dockge_dockflare_enabled is true) else [])
              }}
  when: dockge_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ dockge_container_name }}"
        state: absent
  when: dockge_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ dockge_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - dockge_enabled is false