---
# ANE
ansible_nas_app_name: "OpenEMR"
openemr_enabled: false
openemr_available_externally: false
openemr_traefik_whitelist: "{{ lan }}"
openemr_data_directory: "{{ docker_home }}/openemr"

# network
openemr_hostname: "openemr"
openemr_port_http: "3016"
openemr_network_name: "openemr"

# uid / gid
openemr_db_user_id: "1000"
openemr_db_group_id: "1000"

# docker
openemr_container_name: "openemr"
openemr_image_name: "openemr/openemr"
openemr_image_tag: "7.0.3"
openemr_db_container_name: "openemr-db"
openemr_db_image_name: "lscr.io/linuxserver/mariadb"
openemr_db_image_tag: "latest"

# specs
openemr_cpu_shares: 1024
openemr_memory: "1G"
openemr_db_cpu_shares: 1024
openemr_db_memory: "1G"

# app
openemr_admin_password: "{{ ansible_nas_app_admin_password }}"
openemr_env_mysql_root_pass: "KfGuj4xWHO119hqx0uUoUUFX1wB5Xq8Y"
openemr_env_mysql_user: "openemr"
openemr_env_mysql_pass: "openemr"
openemr_env_mysql_database: "openemr"
openemr_env_oe_user: "admin"
openemr_env_oe_pass: "{{ openemr_admin_password }}"
openemr_env_openemr__environment: "prod"
openemr_db_env_allow_empty_password: "no"
openemr_db_env_mysql_root_password: "topsecret"

# autoheal
openemr_autoheal: "false"
openemr_db_autoheal: "false"

# dockflare
openemr_dockflare_tunnel: "false"
openemr_dockflare_access_group: ""

# homepage
openemr_homepage_group: "Apps"
openemr_homepage_icon: "openemr.png"
openemr_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ openemr_port_http }}"
openemr_homepage_showstats: "false"
openemr_db_homepage_group: "DBs"
openemr_db_homepage_icon: "mariadb.png"
openemr_db_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ openemr_port_http }}"
openemr_db_homepage_showstats: "false"

# linuxserver.io docker mods
openemr_db_env_docker_mods: ""
openemr_db_env_docker_mods_install_packages: ""
openemr_db_env_docker_mods_install_pip_packages: ""

# repliqate
openemr_repliqate_enabled: "false"
openemr_repliqate_engine: "restic"
openemr_repliqate_schedule: "@daily 3am"
openemr_repliqate_backup_id: "{{ openemr_container_name }}"
openemr_repliqate_retention: "30d"
openemr_db_repliqate_enabled: "false"
openemr_db_repliqate_engine: "restic"
openemr_db_repliqate_schedule: "@daily 3am"
openemr_db_repliqate_backup_id: "{{ openemr_container_name }}"
openemr_db_repliqate_retention: "30d"

# watchtower
openemr_watchtower_enable: "false"
openemr_db_watchtower_enable: "false"