---
# ANE
ansible_nas_app_name: "Spoolman"
spoolman_enabled: false
spoolman_available_externally: false
spoolman_traefik_whitelist: "{{ lan }}"

# directories
spoolman_data_directory: "{{ docker_home }}/spoolman"

# docker
spoolman_container_name: "spoolman"
spoolman_image_name: "ghcr.io/donkie/spoolman"
spoolman_image_tag: "latest"

# network
spoolman_hostname: "spoolman"
spoolman_port: "7912"

# specs
spoolman_cpu_shares: "1024"
spoolman_memory: 1g

# autoheal
spoolman_autoheal: "false"

# dockflare
spoolman_dockflare_tunnel: "false"
spoolman_dockflare_access_group: ""

# homepage
spoolman_homepage_group: "Apps"
spoolman_homepage_icon: "sh-spoolman.png"
spoolman_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ spoolman_port }}"
spoolman_homepage_showstats: "false"

# repliqate
spoolman_repliqate_enabled: "false"
spoolman_repliqate_engine: "restic"
spoolman_repliqate_schedule: "@daily 3am"
spoolman_repliqate_backup_id: "spoolman"
spoolman_repliqate_retention: "30d"

# watchtower
spoolman_watchtower_enable: "false"
