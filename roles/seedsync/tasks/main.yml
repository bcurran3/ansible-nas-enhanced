---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: 1000
        group: 1000
      with_items:
        - "{{ seedsync_data_directory }}"
        - "{{ seedsync_data_directory }}/config"
        - "{{ seedsync_data_directory }}/downloads"
        - "{{ seedsync_ssh_directory }}"

    - name: Generate SSH key with passphrase
      community.crypto.openssh_keypair:
        path: "{{ seedsync_ssh_directory }}/id_rsa"
        type: rsa
        size: 4096
        passphrase: "{{ ansible_nas_app_admin_password }}"
        state: present

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ seedsync_container_name }}"
        hostname: "{{ seedsync_container_name }}"
        image: "{{ seedsync_image_name }}:{{ seedsync_image_tag }}"
        pull: true
        ports:
          - "{{ seedsync_port_http }}:8800"
        volumes:
          - "{{ seedsync_data_directory }}/config:/config"
          - "{{ seedsync_data_directory }}/downloads:/downloads"
        network_mode: bridge
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ seedsync_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ seedsync_watchtower_enable }}"
          dockflare.enable: "{{ seedsync_dockflare_tunnel }}"
          dockflare.access.group: "{{ seedsync_dockflare_access_group }}"
          dockflare.hostname: "{{ seedsync_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ seedsync_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ seedsync_homepage_group }}"
          homepage.icon: "{{ seedsync_homepage_icon }}"
          homepage.href: "{{ seedsync_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ seedsync_port_http }}"
          homepage.description: "{{ 'Sync your seedbox. Fast. And more.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ seedsync_container_name }}"
          homepage.showStats: "{{ seedsync_homepage_showstats }}"
          repliqate.enabled: "{{ seedsync_repliqate_enabled }}"
          repliqate.engine: "{{ seedsync_repliqate_engine }}"
          repliqate.schedule: "{{ seedsync_repliqate_schedule }}"
          repliqate.backup_id: "{{ seedsync_repliqate_backup_id }}"
          repliqate.retention: "{{ seedsync_repliqate_retention }}"
          traefik.enable: "{{ seedsync_available_externally | string }}"
          traefik.http.routers.seedsync.rule: "Host(`{{ seedsync_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.seedsync.tls.certresolver: "letsencrypt"
          traefik.http.routers.seedsync.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.seedsync.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.seedsync.middlewares: "seedsync@docker{{ ',tinyauth-auth@docker' if seedsync_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.seedsync.IPAllowList.sourcerange: "{{ seedsync_traefik_whitelist }}"
          traefik.http.services.seedsync.loadbalancer.server.port: "8800"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/ipsingh06/seedsync"
        cpu_shares: "{{ seedsync_cpu_shares }}"
        memory: "{{ seedsync_memory }}"
        memory_swap: "{{ seedsync_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (seedsync_port_http | string)] +
                (['https://' + seedsync_hostname + '.' + ansible_nas_domain] if (seedsync_available_externally is true or seedsync_dockflare_tunnel is true) else [])
              }}
  when: seedsync_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ seedsync_container_name }}"
        state: absent
  when: seedsync_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ seedsync_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - seedsync_enabled is false