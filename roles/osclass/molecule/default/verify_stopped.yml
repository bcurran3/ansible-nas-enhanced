---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Try and stop and remove {{ ansible_nas_app_name }}
      community.docker.docker_container:
        name: "{{ osclass_container_name }}"
        state: absent
      register: result

    - name: Try and stop and remove {{ ansible_nas_app_name }} db
      community.docker.docker_container:
        name: "{{ osclass_db_container_name }}"
        state: absent
      register: result_db

    - name: Check {{ ansible_nas_app_name }} is stopped
      ansible.builtin.assert:
        that:
          - not result.changed
          - not result_db.changed
