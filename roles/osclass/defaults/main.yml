---
# ANE
osclass_proper_name: "OsClass"
osclass_enabled: false
osclass_traefik_enabled: false
osclass_traefik_whitelist: "{{ lan }}"
osclass_data_directory: "{{ docker_home }}/osclass"

# network
osclass_hostname: "classifieds"
osclass_port_http: "9016"
osclass_db_hostname: "osclass-db"

# docker
osclass_container_name: "osclass"
# Legacy Bitnami image (no longer updated)
osclass_image_name: "bitnamilegacy/osclass-archived"
#osclass_image_name: "fatima517/osclass"
osclass_image_tag: "latest"
osclass_db_container_name: "osclass-db"
# would like to migrate to lscr.io/linuxserver/mariadb https://docs.linuxserver.io/images/docker-mariadb/
#osclass_db_image_name: "lscr.io/linuxserver/mariadb"
osclass_db_image_name: "bitnami/mariadb"
osclass_db_image_tag: "latest"

# specs
osclass_cpu_shares: 1024
osclass_memory: "1G"
osclass_memory_swap: -1
osclass_db_cpu_shares: 1024
osclass_db_memory: "1G"
osclass_db_memory_swap: "{{ osclass_db_memory }}"

# app
osclass_env_osclass_admin_username: "admin"
osclass_env_osclass_admin_password: "{{ ansible_nas_app_admin_password }}"
osclass_env_osclass_email: ""
osclass_env_osclass_smtp_host: ""
osclass_env_osclass_smtp_port: ""
osclass_env_osclass_smtp_user: ""
osclass_env_osclass_smtp_password: ""
osclass_db_env_mysql_root_password: "topsecretroot"
osclass_db_env_mysql_database: "osclass_db"
osclass_db_env_mysql_user: "osclass"
osclass_db_env_mysql_password: "topsecret"
osclass_db_env_puid: "1000"
osclass_db_env_pgid: "1000"

# autoheal
osclass_autoheal_enabled: false
osclass_db_autoheal_enabled: false

# dockflare
osclass_dockflare_enabled: false
osclass_dockflare_access_group: ""

# healthcheck
osclass_db_healthcheck_test: ["CMD-SHELL", "mariadb-admin ping -u root -p{{ osclass_db_env_mysql_root_password }} || exit 1"]
osclass_db_healthcheck_interval: 30s
osclass_db_healthcheck_timeout: 10s
osclass_db_healthcheck_retries: 5
osclass_db_healthcheck_start_period: 60s
osclass_healthcheck_test: ["CMD-SHELL", "pgrep -f apache2 || pgrep -f httpd || exit 1"]
osclass_healthcheck_interval: 1m
osclass_healthcheck_timeout: 10s
osclass_healthcheck_retries: 3
osclass_healthcheck_start_period: 90s

# homepage
osclass_homepage_group: "Apps"
osclass_homepage_icon: "https://upload.wikimedia.org/wikipedia/commons/a/a8/Osclass.png"
osclass_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ osclass_port_http }}"
osclass_homepage_showstats: false
osclass_db_homepage_group: "DBs"
osclass_db_homepage_icon: "mariadb.png"
osclass_db_homepage_href: "{{ osclass_homepage_href }}"
osclass_db_homepage_showstats: false

# linuxserver.io docker mods
osclass_db_env_docker_mods: ""
osclass_db_env_docker_mods_install_packages: ""
osclass_db_env_docker_mods_install_pip_packages: ""

# repliqate
osclass_repliqate_enabled: false
osclass_repliqate_engine: "restic"
osclass_repliqate_schedule: "@daily 3am"
osclass_repliqate_backup_id: "{{ osclass_container_name }}"
osclass_repliqate_retention: "30d"
osclass_db_repliqate_enabled: false
osclass_db_repliqate_engine: "restic"
osclass_db_repliqate_schedule: "@daily 3am"
osclass_db_repliqate_backup_id: "{{ osclass_container_name }}"
osclass_db_repliqate_retention: "30d"

# tinyauth
osclass_tinyauth_enabled: false

# watchtower
osclass_watchtower_enabled: false
osclass_db_watchtower_enabled: false

# wud
osclass_wud_tag_include: "^latest$"
osclass_wud_watch_digest: "true"
osclass_wud_link_template: "https://hub.docker.com/r/bitnamilegacy/osclass-archived"
osclass_db_wud_tag_include: "^\\d+\\.\\d+\\.\\d+-debian-\\d+-r\\d+$"
osclass_db_wud_tag_transform_type: "semver"
osclass_db_wud_link_template: "https://hub.docker.com/r/bitnami/mariadb"