---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "1001"
      with_items:
        - "{{ osclass_data_directory }}"
        - "{{ osclass_data_directory }}/data"
        - "{{ osclass_data_directory }}/db"

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ osclass_db_container_name }}"
        hostname: "{{ osclass_db_container_name }}"
        image: "{{ osclass_db_image_name }}:{{ osclass_db_image_tag }}"
        pull: true
        network_mode: "bridge"
        networks_cli_compatible: "yes"
        volumes:
          - "{{ osclass_data_directory }}/db:/bitnami/mariadb"
        ##### linuxserver/mariadb
#         - "{{ osclass_data_directory }}/db:/config"
        ##### linuxserver/mariadb
        env:
          ALLOW_EMPTY_PASSWORD: "no"
          MARIADB_ROOT_PASSWORD: "{{ osclass_db_env_mysql_root_password }}"
          MARIADB_DATABASE: "{{ osclass_db_env_mysql_database }}"
          MARIADB_USER: "{{ osclass_db_env_mysql_user }}"
          MARIADB_PASSWORD: "{{ osclass_db_env_mysql_password }}"
        ##### linuxserver/mariadb
#          DOCKER_MODS: "{{ osclass_db_env_docker_mods }}"
#          INSTALL_PACKAGES: "{{ osclass_db_env_docker_mods_install_packages }}"
#          INSTALL_PIP_PACKAGES: "{{ osclass_db_env_docker_mods_install_pip_packages}}"
#          MYSQL_ROOT_PASSWORD: "{{ osclass_db_env_mysql_root_password }}"
#          MYSQL_DATABASE: "{{ osclass_db_env_mysql_database }}"
#          MYSQL_USER: "{{ osclass_db_env_mysql_user }}"
#          MYSQL_PASSWORD: "{{ osclass_db_env_mysql_password }}"
#          PUID: "{{ osclass_db_env_puid }}"
#          PGID: "{{ osclass_db_env_pgid }}"
        ##### linuxserver/mariadb
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ osclass_db_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ osclass_db_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} MariaDB"
          homepage.group: "{{ osclass_db_homepage_group }}"
          homepage.icon: "{{ osclass_db_homepage_icon }}"
          homepage.href: "{{ osclass_homepage_href }}"
          homepage.description: "{{ 'MariaDB Server is a high performing open source relational database, forked from MySQL.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ osclass_db_container_name }}"
          homepage.showStats: "{{ osclass_db_homepage_showstats }}"
          repliqate.enabled: "{{ osclass_db_repliqate_enabled }}"
          repliqate.engine: "{{ osclass_db_repliqate_engine }}"
          repliqate.schedule: "{{ osclass_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ osclass_db_repliqate_backup_id }}"
          repliqate.retention: "{{ osclass_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/bitnami/mariadb"
        cpu_shares: "{{ osclass_db_cpu_shares }}"
        memory: "{{ osclass_db_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ osclass_container_name }}"
        hostname: "{{ osclass_container_name }}"
        image: "{{ osclass_image_name }}:{{ osclass_image_tag }}"
        pull: true
        network_mode: "bridge"
        networks_cli_compatible: "yes"
        volumes:
          - "{{ osclass_data_directory }}/data:/bitnami/osclass"
        ports:
          - "{{ osclass_port_http }}:8080"
        env:
          ALLOW_EMPTY_PASSWORD: "no"
          OSCLASS_DATABASE_USER: "{{ osclass_db_env_mysql_user }}"
          OSCLASS_DATABASE_PASSWORD: "{{ osclass_db_env_mysql_password }}"
          OSCLASS_DATABASE_NAME: "{{ osclass_db_env_mysql_database }}"
          OSCLASS_DATABASE_HOST: "{{ osclass_db_container_name }}"
          OSCLASS_DATABASE_PORT_NUMBER: "3306"
          OSCLASS_EMAIL: "{{ osclass_env_osclass_email }}"
          OSCLASS_SMTP_HOST: "{{ osclass_env_osclass_smtp_host }}"
          OSCLASS_SMTP_PORT: "{{ osclass_env_osclass_smtp_port }}"
          OSCLASS_SMTP_USER: "{{ osclass_env_osclass_smtp_user }}"
          OSCLASS_SMTP_PASSWORD: " {{ osclass_env_osclass_smtp_password }}"
          OSCLASS_USERNAME: "{{ osclass_env_osclass_admin_username }}"
          OSCLASS_PASSWORD: "{{ osclass_env_osclass_admin_password }}"
          OSCLASS_WEB_TITLE: "{{ osclass_hostname }}.{{ ansible_nas_domain }}"
          TZ: "{{ ansible_nas_timezone }}"
        links:
          - "{{ osclass_db_container_name }}"
        labels:
          autoheal: "{{ osclass_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ osclass_watchtower_enable }}"
          dockflare.enable: "{{ osclass_dockflare_tunnel }}"
          dockflare.access.group: "{{ osclass_dockflare_access_group }}"
          dockflare.hostname: "{{ osclass_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ osclass_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ osclass_homepage_group }}"
          homepage.icon: "{{ osclass_homepage_icon }}"
          homepage.href: "{{ osclass_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ osclass_port_http }}"
          homepage.description: "{{ 'Best free classifieds script created in PHP for classifieds CMS' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ osclass_container_name }}"
          homepage.showStats: "{{ osclass_homepage_showstats }}"
          repliqate.enabled: "{{ osclass_repliqate_enabled }}"
          repliqate.engine: "{{ osclass_repliqate_engine }}"
          repliqate.schedule: "{{ osclass_repliqate_schedule }}"
          repliqate.backup_id: "{{ osclass_repliqate_backup_id }}"
          repliqate.retention: "{{ osclass_repliqate_retention }}"
          traefik.enable: "{{ osclass_available_externally | string }}"
#         traefik.http.routers.osclass.rule: "Host(`{{ osclass_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.osclass.rule: "Host(`classifieds.{{ ansible_nas_domain }}`)"
          traefik.http.routers.osclass.tls.certresolver: "letsencrypt"
          traefik.http.routers.osclass.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.osclass.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ osclass_hostname }}"
          traefik.http.routers.osclass.middlewares: "osclass@docker"
          traefik.http.middlewares.osclass.IPAllowList.sourcerange: "{{ osclass_traefik_whitelist }}"
          traefik.http.services.osclass.loadbalancer.server.port: "8080"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/bitnamilegacy/osclass-archived"
        cpu_shares: "{{ osclass_cpu_shares }}"
        memory: "{{ osclass_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (osclass_port_http | string)] +
                (['https://' + osclass_hostname + '.' + ansible_nas_domain] if (osclass_available_externally is true or osclass_dockflare_tunnel is true) else [])
              }}
  when: osclass_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ osclass_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ osclass_db_container_name }}"
        state: absent
  when: osclass_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ osclass_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - osclass_enabled is false

# NOTE:
# Would like to move this from Bitnami's mariadb to linuxserver's mariadb
