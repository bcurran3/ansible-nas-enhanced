---
ansible_nas_app_name: "Deluge"

deluge_enabled: false
deluge_available_externally: false
deluge_traefik_whitelist: "{{ lan }}"

# directories
deluge_data_directory: "{{ docker_home }}/deluge"
deluge_download_directory: "{{ downloads_root }}"
deluge_watch_directory: "{{ torrents_root }}"

# uid / gid
deluge_user_id: "0"
deluge_group_id: "0"

# error logging
deluge_log_level: "error"

# network
deluge_port: "8112"
deluge_hostname: "deluge"

deluge_timezone: "{{ ansible_nas_timezone }}"

# specs
deluge_memory: 1g

# docker
deluge_container_name: deluge
deluge_cpu_shares: 1024
deluge_image_name: "linuxserver/deluge"
deluge_image_tag: "latest"

# autoheal
deluge_autoheal: "false"

# watchtower
deluge_watchtower_monitor_only: "true"