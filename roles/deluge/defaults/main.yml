---
# ANE
ansible_nas_app_name: "Deluge"
deluge_enabled: false
deluge_available_externally: false
deluge_traefik_whitelist: "{{ lan }}"

# directories
deluge_data_directory: "{{ docker_home }}/deluge"
deluge_download_directory: "{{ downloads_root }}"
deluge_watch_directory: "{{ torrents_root }}"

# uid / gid
deluge_user_id: "0"
deluge_group_id: "0"

# error logging
deluge_log_level: "error"

# network
deluge_port: "8112"
deluge_hostname: "deluge"

# specs
deluge_memory: 1g

# docker
deluge_container_name: deluge
deluge_cpu_shares: 1024
deluge_image_name: "lscr.io/linuxserver/deluge"
deluge_image_tag: "latest"

# autoheal
deluge_autoheal: "false"

# dockflare
deluge_dockflare_tunnel: "false"
deluge_dockflare_access_group: ""

# homepage
deluge_homepage_group: "Apps"
deluge_homepage_icon: "deluge.png"
deluge_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ deluge_port }}"
deluge_homepage_showstats: "false"

# linuxserver.io docker mods
deluge_env_docker_mods: ""

# theme.park themes
# https://docs.theme-park.dev/themes/deluge/
deluge_env_docker_mods_tp_theme: ""
deluge_env_docker_mods_tp_community_theme: ""
deluge_env_docker_mods_tp_domain: ""
deluge_env_docker_mods_tp_addon: ""

# watchtower
deluge_watchtower_enable: "false"