---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ deluge_data_directory }}"
        - "{{ deluge_data_directory }}/config"
        - "{{ deluge_download_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ deluge_container_name }}"
        hostname: "{{ deluge_container_name }}"
        image: "{{ deluge_image_name }}:{{ deluge_image_tag }}"
        pull: true
        volumes:
          - "{{ deluge_data_directory }}/config:/config:rw"
          - "{{ deluge_download_directory }}:/downloads:rw"
        ports:
          - "{{ deluge_port }}:8112"
        env:
          TZ: "{{ deluge_timezone }}"
          PUID: "{{ deluge_user_id }}"
          PGID: "{{ deluge_group_id }}"
        labels:
          autoheal: "{{ deluge_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ deluge_watchtower_monitor_only }}"
          dockflare.enable: "{{ deluge_dockflare_tunnel }}"
          dockflare.access.group: "{{ deluge_dockflare_access_group }}"
          dockflare.hostname: "{{ deluge_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ deluge_port }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ deluge_homepage_group }}"
          homepage.icon: "{{ deluge_homepage_icon }}"
          homepage.href: "{{ deluge_homepage_href }}"
          homepage.description: "{{ 'BitTorrent client' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ deluge_container_name }}"
          homepage.showStats: "{{ deluge_homepage_showStats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ deluge_port }}"
          homepage.widget.type: "deluge"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ deluge_port }}"
          traefik.enable: "{{ deluge_available_externally | string }}"
          traefik.http.routers.deluge.rule: "Host(`{{ deluge_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.deluge.tls.certresolver: "letsencrypt"
          traefik.http.routers.deluge.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.deluge.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ deluge_hostname }}"
          traefik.http.routers.deluge.middlewares: "{{ deluge_hostname }}@docker"
          traefik.http.middlewares.deluge.IPAllowList.sourcerange: "{{ deluge_traefik_whitelist }}"
          traefik.http.services.deluge.loadbalancer.server.port: "8112"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/linuxserver/docker-deluge/releases/tag/{{tag}}"
        cpu_shares: "{{ deluge_cpu_shares }}"
        restart_policy: unless-stopped
        memory: "{{ deluge_memory }}"
  when: deluge_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ deluge_container_name }}"
        state: absent
  when: deluge_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ deluge_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ deluge_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: deluge_enabled is false and archive_app_data_enabled is true
