---
# ANE
ansible_nas_app_name: "Dashy"
dashy_enabled: false
dashy_available_externally: false
dashy_traefik_whitelist: "{{ lan }}"

# directories
dashy_data_directory: "{{ docker_home }}/dashy"

# network
dashy_port_http: "9008"
dashy_hostname: "dashy"

# specs
dashy_memory: "1G"

# docker
dashy_container_name: "dashy"
dashy_cpu_shares: 1024
dashy_image_name: "ghcr.io/lissy93/dashy"
dashy_image_tag: "latest"

# autoheal
dashy_autoheal: "false"

# dockflare
dashy_dockflare_tunnel: "false"
dashy_dockflare_access_group: ""

# homepage
dashy_homepage_group: "Apps"
dashy_homepage_icon: "dashy.png"
dashy_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ dashy_port_http }}"
dashy_homepage_showstats: "false"

# repliqate
dashy_repliqate_enabled: "false"
dashy_repliqate_engine: "restic"
dashy_repliqate_schedule: "@daily 3am"
dashy_repliqate_backup_id: "{{ dashy_container_name }}"
dashy_repliqate_retention: "30d"

# tinyauth
dashy_tinyauth_enabled: false

# watchtower
dashy_watchtower_enable: "false"