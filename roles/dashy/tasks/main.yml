---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create Dashy Directory
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ dashy_data_directory }}"

    - name: Copy {{ ansible_nas_app_name }} base config
      ansible.builtin.copy:
        src: conf.yml
        dest: "{{ dashy_data_directory }}/conf.yml"
        force: no

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        dashy_homepage_href: "https://{{ dashy_hostname }}.{{ ansible_nas_domain }}"
      when: dashy_traefik_enabled | bool or dashy_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ dashy_container_name }}"
        hostname: "{{ dashy_container_name }}"
        image: "{{ dashy_image_name }}:{{ dashy_image_tag }}"
        pull: true
        ports:
          - "{{ dashy_port_http }}:80"
        volumes:
          - "{{ dashy_data_directory }}/conf.yml:/app/public/conf.yml:rw"
        labels:
          autoheal: "{{ dashy_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ dashy_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ dashy_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ dashy_dockflare_access_group }}"
          dockflare.hostname: "{{ dashy_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ dashy_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ dashy_homepage_group }}"
          homepage.icon: "{{ dashy_homepage_icon }}"
          homepage.href: "{{ dashy_homepage_href }}"
          homepage.description: "{{ 'dashy description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ dashy_container_name }}"
          homepage.showStats: "{{ dashy_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ dashy_port_http }}"
          repliqate.enabled: "{{ dashy_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ dashy_repliqate_engine }}"
          repliqate.schedule: "{{ dashy_repliqate_schedule }}"
          repliqate.backup_id: "{{ dashy_repliqate_backup_id }}"
          repliqate.retention: "{{ dashy_repliqate_retention }}"
          traefik.enable: "{{ dashy_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.dashy.rule: "Host(`{{ dashy_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.dashy.tls.certresolver: "letsencrypt"
          traefik.http.routers.dashy.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.dashy.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.dashy.middlewares: "dashy@docker{{ ',tinyauth-auth@docker' if dashy_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.dashy.IPAllowList.sourcerange: "{{ dashy_traefik_whitelist }}"
          traefik.http.services.dashy.loadbalancer.server.port: "80"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/Lissy93/dashy/pkgs/container/dashy"
        cpu_shares: "{{ dashy_cpu_shares }}"
        memory: "{{ dashy_memory }}"
        memory_swap: "{{ dashy_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (dashy_port_http | string)] +
                (['https://' + dashy_hostname + '.' + ansible_nas_domain] if (dashy_traefik_enabled is true or dashy_dockflare_enabled is true) else [])
              }}
  when: dashy_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ dashy_container_name }}"
        state: absent
  when: dashy_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ dashy_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - dashy_enabled is false