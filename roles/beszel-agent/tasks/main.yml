---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ beszel_agent_container_name }}"
        hostname: "{{ beszel_agent_container_name }}"
        image: "{{ beszel_agent_image_name }}:{{ beszel_agent_image_tag }}"
        pull: true
        volumes:
          - "/var/run/docker.sock:/var/run/docker.sock:ro"
#           monitor other disks / partitions by mounting a folder in /extra-filesystems
#         - /mnt/disk/.beszel:/extra-filesystems/sda1:ro
        network_mode: host
        env:
          PORT: "{{ beszel_agent_port_http }}"
          KEY: "{{ beszel_agent_key }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ beszel_agent_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ beszel_agent_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ beszel_agent_homepage_group }}"
          homepage.icon: "{{ beszel_agent_homepage_icon }}"
          homepage.href: "{{ beszel_agent_homepage_href }}"
          homepage.description: "{{ 'Lightweight server monitoring hub with historical data, docker stats, and alerts.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ beszel_agent_container_name }}"
          homepage.showStats: "{{ beszel_agent_homepage_showstats }}"
          repliqate.enabled: "false"
          traefik.enable: "false"
          wud.tag.include: "^v\\d+\\.\\d+\\.\\d+$"
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/henrygd/beszel/pkgs/container/beszel-agent"
        cpu_shares: "{{ beszel_agent_cpu_shares }}"
        memory: "{{ beszel_agent_memory }}"
        restart_policy: unless-stopped
  when: beszel_agent_enabled is true
