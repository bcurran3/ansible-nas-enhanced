---
# ANE
ansible_nas_app_name: "Beszel Agent"
beszel_agent_enabled: false
beszel_agent_available_externally: false
beszel_agent_traefik_whitelist: "{{ lan }}"

# network
beszel_agent_hostname: "beszel-agent"
beszel_agent_port_http: 45876

# app
beszel_agent_key: "ssh-ed25519 YOUR_PUBLIC_KEY"

# docker
beszel_agent_container_name: "beszel-agent"
beszel_agent_image_name: "ghcr.io/henrygd/beszel/beszel-agent"
beszel_agent_image_tag: "latest"
beszel_agent_cpu_shares: "1024"
beszel_agent_memory: "1G"

# autoheal
beszel_agent_autoheal: "false"

# homepage
beszel_agent_homepage_group: "Apps"
beszel_agent_homepage_icon: "beszel"
beszel_agent_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ beszel_port_http }}"
beszel_agent_homepage_showstats: "false"

# watchtower
beszel_agent_watchtower_enable: "false"