---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ cosmos_server_data_directory }}"
        - "{{ cosmos_server_data_directory }}/config"
        - "{{ cosmos_server_data_directory }}/host"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        cosmos_server_homepage_href: "https://{{ cosmos_server_hostname }}.{{ ansible_nas_domain }}"
      when: cosmos_server_traefik_enabled | bool or cosmos_server_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ cosmos_server_container_name }}"
        hostname: "{{ cosmos_server_container_name }}"
        image: "{{ cosmos_server_image_name }}:{{ cosmos_server_image_tag }}"
        pull: true
        volumes:
          - "{{ cosmos_server_data_directory }}/config:/config"
          - "{{ cosmos_server_data_directory }}/host:/mnt/host"
          - "/var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket"
          - "/var/run/docker.sock:/var/run/docker.sock"
        ports:
          - "{{ cosmos_server_port_http }}:7200"
          - "{{ cosmos_server_port_http2 }}:80"
          - "{{ cosmos_server_port_https }}:443"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ cosmos_server_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ cosmos_server_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ cosmos_server_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ cosmos_server_dockflare_access_group }}"
          dockflare.hostname: "{{ cosmos_server_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ cosmos_server_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ cosmos_server_homepage_group }}"
          homepage.icon: "{{ cosmos_server_homepage_icon }}"
          homepage.href: "{{ cosmos_server_homepage_href }}"
          homepage.description: "{{ 'Cosmos is the most secure and easy way to self-host a Home Server.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ cosmos_server_container_name }}"
          homepage.showStats: "{{ cosmos_server_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ cosmos_server_port_http }}"
          repliqate.enabled: "{{ cosmos_server_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ cosmos_server_repliqate_engine }}"
          repliqate.schedule: "{{ cosmos_server_repliqate_schedule }}"
          repliqate.backup_id: "{{ cosmos_server_repliqate_backup_id }}"
          repliqate.retention: "{{ cosmos_server_repliqate_retention }}"
          traefik.enable: "{{ cosmos_server_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.cosmosserver.rule: "Host(`{{ cosmos_server_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.cosmosserver.tls.certresolver: "letsencrypt"
          traefik.http.routers.cosmosserver.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.cosmosserver.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.cosmosserver.middlewares: "cosmosserver@docker{{ ',tinyauth-auth@docker' if cosmos_server_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.cosmosserver.IPAllowList.sourcerange: "{{ cosmos_server_traefik_whitelist }}"
          traefik.http.services.cosmosserver.loadbalancer.server.port: "80"
          wud.tag.include: "^latest$"
          wud.watch.digest: "true"
          wud.link.template: "https://hub.docker.com/r/azukaar/cosmos-server"
        cpu_shares: "{{ cosmos_server_cpu_shares }}"
        memory: "{{ cosmos_server_memory }}"
        memory_swap: "{{ cosmos_server_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (cosmos_server_port_http | string)] +
                (['https://' + cosmos_server_hostname + '.' + ansible_nas_domain] if (cosmos_server_traefik_enabled is true or cosmos_server_dockflare_enabled is true) else [])
              }}
  when: cosmos_server_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ cosmos_server_container_name }}"
        state: absent
  when: cosmos_server_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ cosmos_server_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - cosmos_server_enabled is false
