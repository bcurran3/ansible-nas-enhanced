---
- name: Start {{ chatpadai_proper_name }}
  block:
    - name: Set {{ chatpadai_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        hatpadai_homepage_href: "https://{{ hatpadai_hostname }}.{{ ansible_nas_domain }}"
      when: hatpadai_traefik_enabled | bool or hatpadai_dockflare_enabled | bool

    - name: Create {{ chatpadai_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ chatpadai_container_name }}"
        hostname: "{{ chatpadai_container_name }}"
        image: "{{ chatpadai_image_name }}:{{ chatpadai_image_tag }}"
        pull: true
        network_mode: bridge
        env:
          TZ: "{{ ansible_nas_timezone }}"
        ports:
          - "{{ chatpadai_port_http }}: 80"
        labels:
          autoheal: "{{ chatpadai_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ chatpadai_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ chatpadai_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ chatpadai_dockflare_access_group }}"
          dockflare.hostname: "{{ chatpadai_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ chatpadai_port_http }}"
          homepage.name: "{{ chatpadai_proper_name }}"
          homepage.group: "{{ chatpadai_homepage_group }}"
          homepage.icon: "{{ chatpadai_homepage_icon }}"
          homepage.href: "{{ chatpadai_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ chatpadai_port_http }}"
          homepage.description: "{{ 'Not just another ChatGPT user-interface!' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ chatpadai_container_name }}"
          homepage.showStats: "{{ chatpadai_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "false"
          traefik.enable: "{{ chatpadai_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.chatpadai.rule: "Host(`{{ chatpadai_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.chatpadai.tls.certresolver: "letsencrypt"
          traefik.http.routers.chatpadai.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.chatpadai.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.chatpadai.middlewares: "chatpadai@docker{{ ',tinyauth-auth@docker' if chatpadai_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.chatpadai.IPAllowList.sourcerange: "{{ chatpadai_traefik_whitelist }}"
          traefik.http.services.chatpad.loadbalancer.server.port: "80"
          wud.watch.digest: "true"
          wud.link.template: "https://github.com/deiucanta/chatpad"
        cpu_shares: "{{ chatpadai_cpu_shares }}"
        memory: "{{ chatpadai_memory }}"
        memory_swap: "{{ chatpadai_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ chatpadai_proper_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (chatpadai_port_http | string)] +
                (['https://' + chatpadai_hostname + '.' + ansible_nas_domain] if (chatpadai_traefik_enabled is true or chatpadai_dockflare_enabled is true) else [])
              }}
  when: chatpadai_enabled is true

- name: Stop {{ chatpadai_proper_name }}
  block:
    - name: Stop {{ chatpadai_proper_name }} Container
      community.docker.docker_container:
        name: "{{ chatpadai_container_name }}"
        state: absent
  when: chatpadai_enabled is false
