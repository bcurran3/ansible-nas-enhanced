---
ansible_nas_app_name: "Ombi"

ombi_enabled: false
ombi_available_externally: false
ombi_traefik_whitelist: "{{ lan }}"

# directories
ombi_config_directory: "{{ docker_home }}/ombi/config"

# network
ombi_port: "3579"
ombi_hostname: "ombi"

# docker
ombi_container_name: "ombi"
ombi_image_name: "linuxserver/ombi"
ombi_image_version: "latest"
ombi_cpu_shares: 1024

ombi_user_id: "0"
ombi_group_id: "0"

# specs
ombi_memory: 1g

# autoheal
ombi_autoheal: "false"

# watchtower
ombi_watchtower_monitor_only: "true"