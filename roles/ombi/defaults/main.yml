---
# ANE
ansible_nas_app_name: "Ombi"
ombi_enabled: false
ombi_traefik_enabled: false
ombi_traefik_whitelist: "{{ lan }}"

# directories
ombi_data_directory: "{{ docker_home }}/ombi"

# network
ombi_port_http: "3579"
ombi_hostname: "ombi"

# docker
ombi_container_name: "ombi"
ombi_image_name: "lscr.io/linuxserver/ombi"
ombi_image_version: "latest"

ombi_user_id: "0"
ombi_group_id: "0"

# specs
ombi_cpu_shares: 1024
ombi_memory: "1G"
ombi_memory_swap: -1

# autoheal
ombi_autoheal_enabled: false

# dockflare
ombi_dockflare_enabled: false
ombi_dockflare_access_group: ""

# homepage
ombi_homepage_group: "Apps"
ombi_homepage_icon: "ombi.png"
ombi_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ ombi_port_http }}"
ombi_homepage_showstats: false
ombi_homepage_widget_key: ""

# linuxserver.io docker mods
ombi_env_docker_mods: ""
ombi_env_docker_mods_install_packages: ""
ombi_env_docker_mods_install_pip_packages: ""

# theme.park themes
# https://docs.theme-park.dev/themes/ombi/
ombi_env_docker_mods_tp_theme: ""
ombi_env_docker_mods_tp_community_theme: ""
ombi_env_docker_mods_tp_domain: ""
ombi_env_docker_mods_tp_addon: ""

# repliqate
ombi_repliqate_enabled: false
ombi_repliqate_engine: "restic"
ombi_repliqate_schedule: "@daily 3am"
ombi_repliqate_backup_id: "{{ ombi_container_name }}"
ombi_repliqate_retention: "30d"

# tinyauth
ombi_tinyauth_enabled: false

# watchtower
ombi_watchtower_enabled: false