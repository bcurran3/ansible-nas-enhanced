---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Get {{ vikunja_proper_name }} container state
      community.docker.docker_container:
        name: "{{ vikunja_container_name }}"
      register: result

    - name: Get {{ vikunja_proper_name }} DB container state
      community.docker.docker_container:
        name: "{{ vikunja_db_container_name }}"
      register: result_db

    - name: Check if {{ vikunja_proper_name }} container is running
      ansible.builtin.assert:
        that:
          - result.container['State']['Status'] == "running"
          - result.container['State']['Restarting'] == false
          - result_db.container['State']['Status'] == "running"
          - result_db.container['State']['Restarting'] == false
