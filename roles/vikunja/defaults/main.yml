---
# ANE
ansible_nas_app_name: "Vikunja"
vikunja_enabled: false
vikunja_available_externally: false
vikunja_traefik_whitelist: "{{ lan }}"

# directories
vikunja_data_directory: "{{ docker_home }}/vikunja"

# docker
vikunja_container_name: "vikunja"
vikunja_image_name: "vikunja/vikunja"
vikunja_image_tag: "latest"
vikunja_db_container_name: "vikunja-db"
vikunja_db_image_name: "postgres"
vikunja_db_image_tag: "18"

# network
vikunja_port_http: "3456"
vikunja_hostname: "vikunja"

# specs
vikunja_cpu_shares: 1024
vikunja_memory: "1G"
vikunja_memory_swap: -1
vikunja_db_cpu_shares: 1024
vikunja_db_memory: "1G"
vikunja_db_memory_swap: "{{ vikunja_db_memory }}"

# app
# https://vikunja.io/docs/config-options/
vikunja_env_vikunja_service_publicurl: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ vikunja_port_http }}"
#vikunja_env_vikunja_service_publicurl: "https://{{ vikunja_hostname }}.{{ ansible_nas_domain }}"
vikunja_env_vikunja_cors_enable: "true"
vikunja_env_vikunja_cors_origins: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ vikunja_port_http }},https://{{ vikunja_hostname }}.{{ ansible_nas_domain }},http://127.0.0.1:*,http://localhost:*"
vikunja_env_vikunja_database_password: "topsecret"
vikunja_env_vikunja_database_user: "vikunja"
vikunja_env_vikunja_database_database: "vikunja_db"
vikunja_env_vikunja_service_jwtsecret: "rILJ52pIPwgguxb3GHPkzHT6X4rcwblbi6wx6INau2g"
vikunja_env_vikunja_mailer_host: "" # SMTP host
vikunja_env_vikunja_mailer_port: "587" # SMTP port 587, 25
vikunja_env_vikunja_mailer_authtype: "plain" # plain, login, cram-md5
vikunja_env_vikunja_mailer_username: "" # SMTP username
vikunja_env_vikunja_mailer_password: "" # SMTP password
vikunja_env_vikunja_mailer_skiptlsverify: "false" # fale, true
vikunja_env_vikunja_mailer_fromemail: "Vikunja@{{ ansible_nas_domain }}" # default from address when sending emails
vikunja_env_vikunja_mailer_queuelength: "100" # length of the mail queue
vikunja_env_vikunja_mailer_queuetimeout: "30" # timeout in seconds after which the current open connection to the mailserver will be closed
vikunja_env_vikunja_mailer_forcessl: "false" # Vikunja will try to connect with starttls, use this option to force it to use ssl

# autoheal
vikunja_autoheal: "false"
vikunja_db_autoheal: "false"

# dockflare
vikunja_dockflare_tunnel: false
vikunja_dockflare_access_group: ""

# homepage
vikunja_homepage_group: "Apps"
vikunja_homepage_icon: "vikunja.png"
vikunja_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ vikunja_port_http }}"
vikunja_homepage_showstats: "false"
vikunja_db_homepage_group: "DBs"
vikunja_db_homepage_icon: "postgres.png"
vikunja_db_homepage_href: "{{ vikunja_homepage_href }}"
vikunja_db_homepage_showstats: "false"

# repliqate
vikunja_repliqate_enabled: false
vikunja_repliqate_engine: "restic"
vikunja_repliqate_schedule: "@daily 3am"
vikunja_repliqate_backup_id: "{{ vikunja_container_name }}"
vikunja_repliqate_retention: "30d"
vikunja_db_repliqate_enabled: "false"
vikunja_db_repliqate_engine: "restic"
vikunja_db_repliqate_schedule: "@daily 3am"
vikunja_db_repliqate_backup_id: "{{ vikunja_db_container_name }}"
vikunja_db_repliqate_retention: "30d"

# tinyauth
vikunja_tinyauth_enabled: false

# watchtower
vikunja_watchtower_enable: false
vikunja_db_watchtower_enable: "false"
