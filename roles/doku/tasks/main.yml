---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        doku_homepage_href: "https://{{ doku_hostname }}.{{ ansible_nas_domain }}"
      when: doku_traefik_enabled | bool or doku_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ doku_container_name }}"
        hostname: "{{ doku_container_name }}"
        image: "{{ doku_image_name }}:{{ doku_image_version }}"
        pull: true
        volumes:
          - "/:/host:ro"
          - "/var/run/docker.sock:/var/run/docker.sock:ro"
        ports:
          - "{{ doku_port_http }}:{{ doku_port_http }}"
        env:
          DOKU_HOST_ROOT: "{{ doku_env_doku_host_root }}"
          PORT: "{{ doku_port_http }}"
          SCAN_INTERVAL: "{{ doku_env_scan_interval }}"
          SCAN_LOGFILE_INTERVAL: "{{ doku_env_scan_logfile_interval }}"
          SCAN_BINDMOUNTS_INTERVAL: "{{ doku_env_scan_bindmounts_interval }}"
          BINDMOUNT_IGNORE_PATTERNS: "{{ doku_env_bindmount_ignore_patterns }}"
          SCAN_OVERLAY2_INTERVAL: "{{ doku_env_scan_overlay2_interval }}"
          DISABLE_OVERLAY2_SCAN: "{{ doku_env_disable_overlay2_scan }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ doku_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ doku_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ doku_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ doku_dockflare_access_group }}"
          dockflare.hostname: "{{ doku_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ doku_port_http }}"
          homepage.group: "{{ doku_homepage_group }}"
          homepage.name: "{{ doku_homepage_name}} "
          homepage.icon: "{{ doku_homepage_icon }}"
          homepage.href: "{{ doku_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ doku_port_http }}"
          homepage.description: "{{ 'Docker disk space usage' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ doku_container_name }}"
          homepage.showStats: "{{ doku_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "false"
          traefik.enable: "{{ doku_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.doku.rule: "Host(`{{ doku_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.doku.tls.certresolver: "letsencrypt"
          traefik.http.routers.doku.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.doku.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.doku.middlewares: "doku@docker{{ ',tinyauth-auth@docker' if doku_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.doku.IPAllowList.sourcerange: "{{ doku_traefik_whitelist }}"
          traefik.http.services.doku.loadbalancer.server.port: "{{ doku_port_http }}"
          wud.tag.include: '^v\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/amerkurev/doku/pkgs/container/doku"
        cpu_shares: "{{ doku_cpu_shares }}"
        memory: "{{ doku_memory }}"
        memory_swap: "{{ doku_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (doku_port_http | string)] +
                (['https://' + doku_hostname + '.' + ansible_nas_domain] if (doku_traefik_enabled is true or doku_dockflare_enabled is true) else [])
              }}
  when: doku_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ doku_container_name }}"
        state: absent
  when: doku_enabled is false
