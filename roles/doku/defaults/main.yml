---
# ANE
ansible_nas_app_name: "Doku"
doku_enabled: false
doku_traefik_enabled: false
doku_traefik_whitelist: "{{ lan }}"

# docker
doku_container_name: "doku"
doku_image_name: "ghcr.io/amerkurev/doku"
doku_image_version: "latest"

# network
doku_hostname: "doku"
doku_port_http: "3067"

# specs
doku_cpu_shares: 1024
doku_memory: "512MB"
doku_memory_swap: -1

# autoheal
doku_autoheal_enabled: false

# dockflare
doku_dockflare_enabled: false
doku_dockflare_access_group: ""

# homepage
doku_homepage_group: "Apps"
doku_homepage_name: "Doku"
doku_homepage_icon: "mdi-harddisk"
doku_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ doku_port_http }}"
doku_homepage_showstats: false

# tinyauth
doku_tinyauth_enabled: false

# watchtower
doku_watchtower_enabled: false
