---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ get_iplayer_config_directory }}"
        - "{{ get_iplayer_download_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ get_iplayer_container_name }}"
        image: "{{ get_iplayer_image_name }}:{{ get_iplayer_image_version }}"
        pull: true
        cpu_shares: "{{ get_iplayer_cpu_shares }}"
        volumes:
          - "{{ get_iplayer_config_directory }}:/root/.get_iplayer:rw"
          - "{{ get_iplayer_download_directory }}:/root/output:rw"
        ports:
          - "{{ get_iplayer_port }}:8181"
        restart_policy: unless-stopped
        memory: "{{ get_iplayer_memory }}"
        labels:
          autoheal: "{{ get_iplayer_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ get_iplayer_watchtower_monitor_only }}"
  when: get_iplayer_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ get_iplayer_container_name }}"
        state: absent
  when: get_iplayer_enabled is false
