---
# ANE
ansible_nas_app_name: "get_iplayer"
get_iplayer_enabled: false

# directories
get_iplayer_data_directory: "{{ docker_home }}/get_iplayer"
get_iplayer_download_directory: "{{ tv_root }}/iplayer_downloads"

# network
get_iplayer_port: "8182"

# docker
get_iplayer_container_name: "get_iplayer"
get_iplayer_image_name: "kolonuk/get_iplayer"
get_iplayer_image_version: "latest"
get_iplayer_cpu_shares: 1024

# specs
get_iplayer_memory: "1G"

# autoheal
get_iplayer_autoheal: "false"

# homepage
get_iplayer_homepage_group: "Misc"
get_iplayer_homepage_icon: "get_iplayer.png"
get_iplayer_homepage_showstats: "false"

# repliqate
get_iplayer_repliqate_enabled: "false"
get_iplayer_repliqate_engine: "restic"
get_iplayer_repliqate_schedule: "@daily 3am"
get_iplayer_repliqate_backup_id: "{{ get_iplayer_container_name }}"
get_iplayer_repliqate_retention: "30d"

# watchtower
get_iplayer_watchtower_enable: "false"