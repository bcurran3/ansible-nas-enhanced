---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directory
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ chowdown_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ chowdown_container_name }}"
        hostname: "{{ chowdown_container_name }}"
        image: "{{ chowdown_image_name }}:{{ chowdown_image_tag }}"
        pull: true
        cpu_shares: "{{ chowdown_cpu_shares }}"
        network_mode: "bridge"
        volumes:
          - "{{ chowdown_data_directory }}/config:/config:rw"
        ports:
          - "{{ chowdown_port_http }}:4000"
        env:
          TZ: "{{ ansible_nas_timezone }}"
#         PUID: "{{ chowdown_user_id }}"
#         PGID: "{{ chowdown_group_id }}"
        labels:
          autoheal: "{{ chowdown_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ chowdown_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ chowdown_homepage_group }}"
          homepage.icon: "{{ chowdown_homepage_icon }}"
          homepage.href: "{{ chowdown_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ chowdown_port_http }}"
          homepage.description: "{{ 'Simple recipes in Markdown format' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ chowdown_container_name }}"
          homepage.showStats: "{{ chowdown_homepage_showStats }}"
          traefik.http.routers.chowdown.rule: "Host(`chowdown.{{ ansible_nas_domain }}`)"
          traefik.http.routers.chowdown.tls.certresolver: "letsencrypt"
          traefik.http.routers.chowdown.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.chowdown.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.middlewares.chowdown.IPAllowList.sourcerange: "{{ chowdown_traefik_whitelist }}"
          traefik.http.services.chowdown.loadbalancer.server.port: "4000"
          traefik.frontend.rule: "Host:chowdown.{{ ansible_nas_domain }}"
          traefik.enable: "{{ chowdown_available_externally | string }}"
          traefik.port: "4000"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/GregYankovoy/docker-chowdown/releases/tag/$${major}.$${minor}.$${patch}"
#         ^ no releases or tags available
        memory: "{{ chowdown_memory }}"
        restart_policy: unless-stopped
  when: chowdown_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ chowdown_container_name }}"
        state: absent
  when: chowdown_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ chowdown_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ chowdown_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: chowdown_enabled is false and archive_app_data_enabled is true
