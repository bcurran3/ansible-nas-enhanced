---
# ANE
ansible_nas_app_name: "Chowdown"
chowdown_enabled: false
chowdown_traefik_enabled: false
chowdown_traefik_whitelist: "{{ lan }}"
chowdown_data_directory: "{{ docker_home }}/chowdown"

# network
chowdown_hostname: "chowdown"
chowdown_port_http: "4000"

# docker
chowdown_container_name: "chowdown"
chowdown_image_name: "gregyankovoy/chowdown"
chowdown_image_tag: "latest"

# specs
chowdown_cpu_shares: 1024
chowdown_memory: "1G"
chowdown_memory_swap: -1

# autoheal
chowdown_autoheal_enabled: false

# dockflare
chowdown_dockflare_enabled: false
chowdown_dockflare_access_group: ""

# homepage
chowdown_homepage_group: "Apps"
chowdown_homepage_icon: "chowdown.png"
chowdown_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ chowdown_port_http }}"
chowdown_homepage_showstats: false

# repliqate
chowdown_repliqate_enabled: false
chowdown_repliqate_engine: "restic"
chowdown_repliqate_schedule: "@daily 3am"
chowdown_repliqate_backup_id: "{{ chowdown_container_name }}"
chowdown_repliqate_retention: "30d"

# tinyauth
chowdown_tinyauth_enabled: false

# watchtower
chowdown_watchtower_enabled: false