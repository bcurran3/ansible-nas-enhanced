---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ uptime_kuma_data_directory }}"
        - "{{ uptime_kuma_data_directory }}/data"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        uptime_kuma_homepage_href: "https://{{ uptime_kuma_hostname }}.{{ ansible_nas_domain }}"
      when: uptime_kuma_traefik_enabled | bool or uptime_kuma_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ uptime_kuma_container_name }}"
        hostname: "{{ uptime_kuma_container_name }}"
        image: "{{ uptime_kuma_image_name }}:{{ uptime_kuma_image_tag }}"
        pull: true
        volumes:
          - "{{ uptime_kuma_data_directory }}/data:/app/data"
          - "/var/run/docker.sock:/var/run/docker.sock"
        ports:
          - "{{ uptime_kuma_port_http }}:3001"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ uptime_kuma_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ uptime_kuma_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ uptime_kuma_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ uptime_kuma_dockflare_access_group }}"
          dockflare.hostname: "{{ uptime_kuma_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ uptime_kuma_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ uptime_kuma_homepage_group }}"
          homepage.href: "{{ uptime_kuma_homepage_href }}"
          homepage.icon: "{{ uptime_kuma_homepage_icon }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ uptime_kuma_port_http }}"
          homepage.description: "{{ 'A fancy self-hosted monitoring tool' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ uptime_kuma_container_name }}"
          homepage.showStats: "{{ uptime_kuma_homepage_showstats | ternary('true', 'false') }}"
          homepage.widget.type: "uptimekuma"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ uptime_kuma_port_http }}"
          homepage.widget.slug: "{{ uptime_kuma_homepage_widget_slug }}"
          repliqate.enabled: "{{ uptime_kuma_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ uptime_kuma_repliqate_engine }}"
          repliqate.schedule: "{{ uptime_kuma_repliqate_schedule }}"
          repliqate.backup_id: "{{ uptime_kuma_repliqate_backup_id }}"
          repliqate.retention: "{{ uptime_kuma_repliqate_retention }}"
          traefik.enable: "{{ uptime_kuma_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.uptimekuma.rule: "Host(`{{ uptime_kuma_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.uptimekuma.tls.certresolver: "letsencrypt"
          traefik.http.routers.uptimekuma.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.uptimekuma.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.uptimekuma.middlewares: "uptimekuma@docker{{ ',tinyauth-auth@docker' if uptime_kuma_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.uptimekuma.IPAllowList.sourcerange: "{{ uptime_kuma_traefik_whitelist }}"
          traefik.http.services.uptimekuma.loadbalancer.server.port: "3001"
          wud.tag.include: "^\\d+$"
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/louislam/uptime-kuma/releases"
        cpu_shares: "{{ uptime_kuma_cpu_shares }}"
        memory: "{{ uptime_kuma_memory }}"
        memory_swap: "{{ uptime_kuma_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (uptime_kuma_port_http | string)] +
                (['https://' + uptime_kuma_hostname + '.' + ansible_nas_domain] if (uptime_kuma_traefik_enabled is true or uptime_kuma_dockflare_enabled is true) else [])
              }}
  when: uptime_kuma_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ uptime_kuma_container_name }}"
        state: absent
  when: uptime_kuma_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ uptime_kuma_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - uptime_kuma_enabled is false