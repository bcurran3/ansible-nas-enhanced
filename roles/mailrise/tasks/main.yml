---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ mailrise_data_directory }}"

    - name: Copy {{ ansible_nas_app_name }} Template mailrise.conf
      ansible.builtin.template:
        src: mailrise.conf
        dest: "{{ mailrise_data_directory }}/mailrise.conf"
      register: template_config

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ mailrise_container_name }}"
        hostname: "{{ mailrise_container_name }}"
        image: "{{ mailrise_image_name }}:{{ mailrise_image_tag }}"
        pull: true
        network_mode: bridge
        ports:
          - "{{ mailrise_port_http }}:8025"
        volumes:
          - "{{ mailrise_data_directory }}/mailrise.conf:/etc/mailrise.conf:ro"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ mailrise_autoheal | string }}"
          com.centurylinklabs.watchtower.enable: "{{ mailrise_watchtower_enabled | string }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ mailrise_homepage_group }}"
          homepage.icon: "{{ mailrise_homepage_icon }}"
          homepage.description: "{{ 'An SMTP gateway for Apprise notifications.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ mailrise_container_name }}"
          homepage.showStats: "{{ mailrise_homepage_showstats | string }}"
          repliqate.enabled: "false"
          traefik.enable: "true"
          traefik.docker.network: "bridge"
          traefik.tcp.routers.mailrise.rule: "HostSNI(`{{ mailrise_hostname }}.{{ ansible_nas_domain }}`) || HostSNI(`*`)"
          traefik.tcp.routers.mailrise.tls: "true"
          traefik.tcp.routers.mailrise.tls.certresolver: "letsencrypt"
          traefik.tcp.routers.mailrise.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.tcp.routers.mailrise.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.tcp.routers.mailrise.entrypoints: "mailsecure"
          traefik.tcp.routers.mailrise.service: "mailrise-svc"
          traefik.tcp.services.mailrise-svc.loadbalancer.server.port: "8025"
          wud.tag.include: ^\d+\.\d+\.\d+$
          wud.link.template: https://github.com/YoRyan/mailrise/releases/tag/v${major}.${minor}.${patch}
        cpu_shares: "{{ mailrise_cpu_shares }}"
        memory: "{{ mailrise_memory }}"
        memory_swap: "{{ mailrise_memory_swap }}"
        restart_policy: unless-stopped
  when: mailrise_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ mailrise_container_name }}"
        state: absent
  when: mailrise_enabled is false
