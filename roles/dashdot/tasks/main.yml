---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ dashdot_container_name }}"
        hostname: "{{ dashdot_container_name }}"
        image: "{{ dashdot_image_name }}:{{ dashdot_image_tag }}"
        pull: true
        ports:
          - "{{ dashdot_port_http }}:3001"
        privileged: true
        volumes:
          - "/:/mnt/host:ro"
        network_mode: bridge
        labels:
          autoheal: "{{ dashdot_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ dashdot_watchtower_monitor_only }}"
          dockflare.enable: "{{ dashdot_dockflare_tunnel }}"
          dockflare.access.group: "{{ dashdot_dockflare_access_group }}"
          dockflare.hostname: "{{ dashdot_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ dashdot_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ dashdot_homepage_group }}"
          homepage.icon: "{{ dashdot_homepage_icon }}"
          homepage.href: "{{ dashdot_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ dashdot_port_http }}"
          homepage.description: "{{ 'A simple, modern server dashboard, primarily used by smaller private servers' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ dashdot_container_name }}"
          homepage.showStats: "{{ dashdot_homepage_showStats }}"
          traefik.enable: "{{ dashdot_available_externally | string }}"
          traefik.http.routers.dashdot.rule: "Host(`{{ dashdot_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.dashdot.tls.certresolver: "letsencrypt"
          traefik.http.routers.dashdot.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.dashdot.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ dashdot_hostname }}"
          traefik.http.routers.dashdot.middlewares: "{{ dashdot_hostname }}@docker"
          traefik.http.middlewares.dashdot.IPAllowList.sourcerange: "{{ dashdot_traefik_whitelist }}"
          traefik.http.services.dashdot.loadbalancer.server.port: "3001"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/mauricenino/dashdot"
        cpu_shares: "{{ dashdot_cpu_shares }}"
        memory: "{{ dashdot_memory }}"
        restart_policy: unless-stopped
  when: dashdot_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ dashdot_container_name }}"
        state: absent
  when: dashdot_enabled is false
