---
# ANE
dashdot_proper_name: "dash."
dashdot_enabled: false
dashdot_traefik_enabled: false
dashdot_traefik_whitelist: "{{ lan }}"

# directories
dashdot_host_directory: "/"

# network
dashdot_hostname: "dashdot"
dashdot_port_http: "3022"

# docker
dashdot_container_name: "dashdot"
dashdot_image_name: "ghcr.io/mauricenino/dashdot"
dashdot_image_tag: "latest"

# specs
dashdot_cpu_shares: 1024
dashdot_memory: "512M"
dashdot_memory_swap: -1

# autoheal
dashdot_autoheal_enabled: false

# dockflare
dashdot_dockflare_enabled: false
dashdot_dockflare_access_group: ""

# homepage
dashdot_homepage_group: "Apps"
dashdot_homepage_icon: "dashdot.png"
dashdot_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ dashdot_port_http }}"
dashdot_homepage_showstats: false

# tinyauth
dashdot_tinyauth_enabled: false

# watchtower
dashdot_watchtower_enabled: false