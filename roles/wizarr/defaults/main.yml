---
# ANE
ansible_nas_app_name: "Wizarr"
wizarr_enabled: false
wizarr_available_externally: false
wizarr_traefik_whitelist: "{{ lan }}"

# directories
wizarr_data_directory: "{{ docker_home }}/wizarr"

# docker
wizarr_container_name: "wizarr"
wizarr_image_name: "ghcr.io/wizarrrr/wizarr"
wizarr_image_tag: "latest"

# uid / gid
wizarr_user_id: "1000"
wizarr_group_id: "1000"

# network
wizarr_port: "5690"
wizarr_hostname: "wizarr"

# specs
wizarr_cpu_shares: "1024"
wizarr_memory: 1g

# app
wizarr_env_disable_builtin_auth: "false"

# autoheal
wizarr_autoheal: "false"

# dockflare
wizarr_dockflare_tunnel: "false"
wizarr_dockflare_access_group: ""

# homepage
wizarr_homepage_group: "Apps"
wizarr_homepage_icon: "wizarr.png"
wizarr_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ wizarr_port }}"
wizarr_homepage_showStats: "false"

# watchtower
wizarr_watchtower_monitor_only: "true"
