---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ emby_data_directory }}"
        - "{{ emby_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ emby_container_name }}"
        hostname: "{{ emby_container_name }}"
        image: "{{ emby_image }}:{{ emby_image_tag }}"
        pull: true
        volumes:
          - "{{ emby_data_directory }}/config:/config:rw"
          - "{{ emby_movies_directory }}:/movies:{{ emby_movies_permissions }}"
          - "{{ emby_tv_directory }}:/tv:{{ emby_tv_permissions }}"
          - "{{ emby_anime_directory }}:/anime:{{ emby_anime_permissions }}"
          # should add porn support
        ports:
          - "{{ emby_port_http }}:8096"
          - "{{ emby_port_https }}:8920"
        runtime: "{{ 'nvidia' if nvidia_runtime_enabled | bool else omit }}"
        device_requests: "{{
          [{'driver': 'nvidia', 'count': -1, 'capabilities': ['gpu']}]
          if nvidia_runtime_enabled | bool else omit
        }}"
        devices: "{{ emby_devices | default(omit) }}"
        env:
          TZ: "{{ ansible_nas_timezone }}"
          PUID: "{{ emby_user_id }}"
          PGID: "{{ emby_group_id }}"
        labels:
          autoheal: "{{ emby_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ emby_watchtower_monitor_only }}"
          dockflare.enable: "{{ emby_dockflare_tunnel }}"
          dockflare.access.group: "{{ emby_dockflare_access_group }}"
          dockflare.hostname: "{{ emby_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ emby_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ emby_homepage_group }}"
          homepage.icon: "{{ emby_homepage_icon }}"
          homepage.href: "{{ emby_homepage_href }}"
          homepage.description: "{{ 'emby description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ emby_container_name }}"
          homepage.showStats: "{{ emby_homepage_showStats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ emby_port_http }}"
          traefik.enable: "{{ emby_available_externally | string }}"
          traefik.http.routers.emby.rule: "Host(`{{ emby_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.emby.tls.certresolver: "letsencrypt"
          traefik.http.routers.emby.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.emby.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ emby_hostname }}"
          traefik.http.routers.emby.middlewares: "{{ emby_hostname }}@docker"
          traefik.http.middlewares.emby.IPAllowList.sourcerange: "{{ emby_traefik_whitelist }}"
          traefik.http.services.emby.loadbalancer.server.port: "8096"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/emby/embyserver"
        cpu_shares: "{{ emby_cpu_shares }}"
        memory: "{{ emby_memory }}"
        restart_policy: unless-stopped
  when: emby_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ emby_container_name }}"
        state: absent
  when: emby_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ emby_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ emby_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: emby_enabled is false and archive_app_data_enabled is true
