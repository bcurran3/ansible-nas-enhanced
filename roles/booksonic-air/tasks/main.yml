---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: 0755
      with_items:
        - "{{ booksonic_air_data_directory }}/data"
        - "{{ booksonic_air_data_directory }}/playlists"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ booksonic_air_container_name }}"
        hostname: "{{ booksonic_air_container_name }}"
        image: "{{ booksonic_air_image_name }}:{{ booksonic_air_image_tag }}"
        pull: true
        volumes:
          - "{{ booksonic_air_data_directory }}/data:/booksonic_air/data:rw"
          - "{{ booksonic_air_data_directory }}/playlists:/booksonic_air/playlists:rw"
          - "{{ booksonic_air_audiobooks_directory }}:/booksonic_air/audiobooks:rw"
          - "{{ booksonic_air_podcasts_directory }}:/booksonic_air/podcasts:rw"
        ports:
          - "{{ booksonic_air_port_http }}:4040"
        env:
          DOCKER_MODS: "{{ booksonic_air_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ booksonic_air_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ booksonic_air_env_docker_mods_install_pip_packages}}"
          PUID: "{{ booksonic_air_user_id }}"
          PGID: "{{ booksonic_air_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ booksonic_air_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ booksonic_air_watchtower_enable }}"
          dockflare.enable: "{{ booksonic_air_dockflare_tunnel }}"
          dockflare.access.group: "{{ booksonic_air_dockflare_access_group }}"
          dockflare.hostname: "{{ booksonic_air_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ booksonic_air_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ booksonic_air_homepage_group }}"
          homepage.icon: "{{ booksonic_air_homepage_icon }}"
          homepage.href: "{{ booksonic_air_homepage_href }}"
          homepage.description: "{{ 'booksonic_air description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ booksonic_air_container_name }}"
          homepage.showStats: "{{ booksonic_air_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ booksonic_air_port_http }}"
          repliqate.enabled: "{{ booksonic_air_repliqate_enabled }}"
          repliqate.engine: "{{ booksonic_air_repliqate_engine }}"
          repliqate.schedule: "{{ booksonic_air_repliqate_schedule }}"
          repliqate.backup_id: "{{ booksonic_air_repliqate_backup_id }}"
          repliqate.retention: "{{ booksonic_air_repliqate_retention }}"
          traefik.enable: "{{ booksonic_air_available_externally | string }}"
          traefik.http.routers.booksonic_air.rule: "Host(`{{ booksonic_air_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.booksonic_air.tls.certresolver: "letsencrypt"
          traefik.http.routers.booksonic_air.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.booksonic_air.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ booksonic_air_hostname }}"
          traefik.http.routers.booksonic_air.middlewares: "{{ booksonic_air_hostname }}@docker"
          traefik.http.middlewares.booksonic_air.IPAllowList.sourcerange: "{{ booksonic_air_traefik_whitelist }}"
          traefik.http.services.booksonic_air.loadbalancer.server.port: "4040"
          wud.watch.digest: "true"
          wud.tag.include: ^latest$
          wud.link.template: https://github.com/linuxserver/docker-booksonic-air/releases
        cpu_shares: "{{ booksonic_air_cpu_shares }}"
        memory: "{{ booksonic_air_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (booksonic_air_port_http | string)] +
                (['https://' + booksonic_air_hostname + '.' + ansible_nas_domain] if (booksonic_air_available_externally is true or booksonic_air_dockflare_tunnel is true) else [])
              }}
  when: booksonic_air_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ booksonic_air_container_name }}"
        state: absent
  when: booksonic_air_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ booksonic_air_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - booksonic_air_enabled is false