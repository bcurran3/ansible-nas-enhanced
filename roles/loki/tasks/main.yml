---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Check for Minio installation
      ansible.builtin.fail:
        msg: "Loki requires Minio enabled and running for storage, please set that up first."
      when: minio_enabled is false

    - name: Check for Grafana installation
      ansible.builtin.fail:
        msg: "Loki requires Grafana enabled and running for visualisation, please set that up first."
      when: grafana_enabled is false

    - name: Include Stats variables
      ansible.builtin.include_vars: ../../stats/defaults/main.yml

    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ loki_data_directory }}"

    - name: Create Minio buckets for {{ ansible_nas_app_name }}
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ minio_data_directory }}/data/loki-data"
        - "{{ minio_data_directory }}/data/loki-ruler"

    - name: Copy {{ ansible_nas_app_name }} config
      ansible.builtin.template:
        src: config.yml
        dest: "{{ loki_data_directory }}/config.yml"
      register: loki_config

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ loki_container_name }}"
        hostname: "{{ loki_container_name }}"
        image: "{{ loki_image_name }}:{{ loki_image_version }}"
        pull: true
        command: "-config.file=/etc/loki/config.yml"
        ports:
          - "{{ loki_port_http }}:3100"
          - 7946
          - 9095
        volumes:
          - "{{ loki_data_directory }}/config.yml:/etc/loki/config.yml"
        labels:
          autoheal: "{{ loki_autoheal | string }}"
          com.centurylinklabs.watchtower.enable: "{{ loki_watchtower_enabled | string }}"
          dockflare.enable: "{{ loki_dockflare_enabled | string }}"
          dockflare.access.group: "{{ loki_dockflare_access_group }}"
          dockflare.hostname: "{{ loki_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ loki_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ loki_homepage_group }}"
          homepage.icon: "{{ loki_homepage_icon }}"
          homepage.href: "{{ loki_homepage_href }}"
          homepage.description: "{{ 'loki description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ loki_container_name }}"
          homepage.showStats: "{{ loki_homepage_showstats | string }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ loki_port }}"
          prometheus.io/scrape: "true"
          prometheus.io/port: "3100"
          prometheus.io/path: "/metrics"
          repliqate.enabled: "{{ loki_repliqate_enabled | string }}"
          repliqate.engine: "{{ loki_repliqate_engine }}"
          repliqate.schedule: "{{ loki_repliqate_schedule }}"
          repliqate.backup_id: "{{ loki_repliqate_backup_id }}"
          repliqate.retention: "{{ loki_repliqate_retention }}"
          traefik.enable: "{{ loki_available_externally | string }}"
          traefik.http.routers.loki.rule: "Host(`{{ loki_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.loki.tls.certresolver: "letsencrypt"
          traefik.http.routers.loki.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.loki.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.loki.middlewares: "loki@docker{{ ',tinyauth-auth@docker' if loki_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.loki.IPAllowList.sourcerange: "{{ loki_traefik_whitelist }}"
          traefik.http.services.loki.loadbalancer.server.port: "3100"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/grafana/loki"
        cpu_shares: "{{ loki_cpu_shares }}"
        memory: "{{ loki_memory }}"
        memory_swap: "{{ loki_memory_swap }}"
        restart: "{{ loki_config is changed }}"
        restart_policy: unless-stopped

    - name: Template Grafana {{ ansible_nas_app_name }} data source
      ansible.builtin.template:
        src: grafana-datasource.yml
        dest: "{{ stats_grafana_data_directory }}/provisioning/datasources/loki.yml"
        owner: "472"
      notify: restart grafana

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (loki_port_http | string)] +
                (['https://' + loki_hostname + '.' + ansible_nas_domain] if (loki_available_externally is true or loki_dockflare_enabled is true) else [])
              }}
  when: loki_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ loki_container_name }}"
        state: absent
  when: loki_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ loki_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - loki_enabled is false