---
ansible_nas_app_name: "Tdarr v1"

# enable or disable the application
tdarr1_enabled: false
tdarr1_available_externally: false
tdarr1_traefik_whitelist: "{{ lan }}"

# directories
tdarr1_data_directory: "{{ docker_home }}/tdarr"
tdarr1_db_directory: "{{ docker_home }}/tdarr/db"
tdarr1_cache_directory: "{{ docker_home }}/tdarr/cache"
tdarr1_media_directory: "{{ samba_shares_root }}"

# uid / gid
tdarr1_user_id: "0"
tdarr1_group_id: "1001"

# network
tdarr1_hostname: "tdarr"
tdarr1_port_http: "8265"

# specs
tdarr1_cpu_shares: 1024
tdarr1_memory: "2g"

# autoheal
tdarr1_autoheal: "false"

# watchtower
tdarr1_watchtower_monitor_only: "true"