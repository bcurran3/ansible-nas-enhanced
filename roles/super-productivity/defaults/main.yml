---
# ANE
super_productivity_proper_name: "super-productivity"
super_productivity_enabled: false
super_productivity_traefik_enabled: false
super_productivity_traefik_whitelist: "{{ lan }}"

# directories
super_productivity_data_directory: "{{ docker_home }}/super-productivity"

# docker
super_productivity_container_name: "super-productivity"
super_productivity_image_name: "johannesjo/super-productivity"
super_productivity_image_tag: "latest"
super_productivity_db_container_name: "super-productivity-db"
super_productivity_db_image_name: "postgres"
#super_productivity_db_image_tag: "15-alpine"
super_productivity_db_image_tag: "17-alpine"
super_productivity_supersync_container_name: "super-productivity-supersync"
super_productivity_supersync_image_name: "super-productivity-supersync"
super_productivity_supersync_image_tag: "latest"
super_productivity_webdav_container_name: "super-productivity-webdav"
super_productivity_webdav_image_name: "hacdias/webdav"
super_productivity_webdav_image_tag: "latest"

# network
super_productivity_hostname: "superproductivity"
super_productivity_port_http: "4004"
super_productivity_supersync_port_http: "4005"
super_productivity_webdav_hostname: "superproductivitywebdav"
super_productivity_webdav_port_http: "2345"

# specs
super_productivity_cpu_shares: 1024
super_productivity_memory: "1G"
super_productivity_memory_swap: -1
super_productivity_db_cpu_shares: 1024
super_productivity_db_memory: "1G"
super_productivity_db_memory_swap: "{{ super_productivity_db_memory }}"

# app
super_productivity_env_webdav_username: "{{ ansible_nas_user }}"
super_productivity_env_webdav_sync_folder_path: "/"
super_productivity_env_sync_interval: "15"
super_productivity_env_is_compression_enabled: "true"
super_productivity_env_is_encryption_enabled: "false"
super_productivity_db_env_postgres_user: "superproductivity"
super_productivity_db_env_postgres_password: "topsecret"
super_productivity_db_env_postgres_db: "superproductivity_db"
super_productivity_supersync_env_node_env: "development"
super_productivity_supersync_env_test_mode: "true"
super_productivity_supersync_env_test_mode_confirm: "yes-i-understand-the-risks"
super_productivity_supersync_env_jwt_secret: "iRP3uNQ3Wcn4HfIN0L04O4piRoTsOLUUClcNNlYLxZg"
super_productivity_supersync_env_cors_origins: "*"
super_productivity_supersync_env_data_dir: "/data"

# autoheal
super_productivity_autoheal_enabled: false
super_productivity_db_autoheal_enabled: false
super_productivity_supersync_autoheal_enabled: false
super_productivity_webdav_autoheal_enabled: false

# dockflare
super_productivity_dockflare_enabled: false
super_productivity_dockflare_access_group: ""

# healthcheck
super_productivity_healthcheck_test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
super_productivity_healthcheck_interval: 30s
super_productivity_healthcheck_timeout: 10s
super_productivity_healthcheck_retries: 3
super_productivity_healthcheck_start_period: 20s
super_productivity_db_healthcheck_test: ["CMD-SHELL", "pg_isready -U super-productivity -d super-productivity -h 127.0.0.1"]
super_productivity_db_healthcheck_interval: 10s
super_productivity_db_healthcheck_timeout: 5s
super_productivity_db_healthcheck_retries: 5
super_productivity_db_healthcheck_start_period: 30s
super_productivity_supersync_healthcheck_test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:1900/health"]
super_productivity_supersync_healthcheck_interval: 5s
super_productivity_supersync_healthcheck_timeout: 5s
super_productivity_supersync_healthcheck_retries: 3
super_productivity_supersync_healthcheck_start_period: 10s
super_productivity_webdav_healthcheck_test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:2345/"]
super_productivity_webdav_healthcheck_interval: 10s
super_productivity_webdav_healthcheck_timeout: 5s
super_productivity_webdav_healthcheck_retries: 3
super_productivity_webdav_healthcheck_start_period: 10s

# homepage
super_productivity_homepage_description: "advanced todo list app with timeboxing & time tracking capabilities"
super_productivity_homepage_group: "Apps"
super_productivity_homepage_icon: "sh-super-productivity.png"
super_productivity_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ super_productivity_port_http }}"
super_productivity_homepage_showstats: false
super_productivity_db_homepage_description: "PostgreSQL Database Management System"
super_productivity_db_homepage_group: "DBs"
super_productivity_db_homepage_icon: "postgres.png"
super_productivity_db_homepage_href: "{{ super_productivity_homepage_href }}"
super_productivity_db_homepage_showstats: false
super_productivity_supersync_homepage_description: "SuperSync server for E2E testing"
super_productivity_supersync_homepage_group: "Apps"
super_productivity_supersync_homepage_icon: "supersync.png"
super_productivity_supersync_homepage_href: "{{ super_productivity_homepage_href }}"
super_productivity_supersync_homepage_showstats: false
super_productivity_webdav_homepage_description: "WebDAV sync server"
super_productivity_webdav_homepage_group: "Apps"
super_productivity_webdav_homepage_icon: "sh-super-productivity.png"
super_productivity_webdav_homepage_href: "{{ super_productivity_homepage_href }}"
super_productivity_webdav_homepage_showstats: false

# repliqate
super_productivity_repliqate_enabled: false
super_productivity_repliqate_engine: "restic"
super_productivity_repliqate_schedule: "@daily 3am"
super_productivity_repliqate_backup_id: "{{ super_productivity_container_name }}"
super_productivity_repliqate_retention: "30d"
super_productivity_db_repliqate_enabled: false
super_productivity_db_repliqate_engine: "restic"
super_productivity_db_repliqate_schedule: "@daily 3am"
super_productivity_db_repliqate_backup_id: "{{ super_productivity_db_container_name }}"
super_productivity_db_repliqate_retention: "30d"
super_productivity_supersync_repliqate_enabled: false
super_productivity_supersync_repliqate_engine: "restic"
super_productivity_supersync_repliqate_schedule: "@daily 3am"
super_productivity_supersync_repliqate_backup_id: "{{ super_productivity_supersync_container_name }}"
super_productivity_supersync_repliqate_retention: "30d"
super_productivity_webdav_repliqate_enabled: false
super_productivity_webdav_repliqate_engine: "restic"
super_productivity_webdav_repliqate_schedule: "@daily 3am"
super_productivity_webdav_repliqate_backup_id: "{{ super_productivity_container_name }}"
super_productivity_webdav_repliqate_retention: "30d"

# tinyauth
super_productivity_tinyauth_enabled: false
super_productivity_supersync_tinyauth_enabled: false
super_productivity_webdav_tinyauth_enabled: false

# watchtower
super_productivity_watchtower_enabled: false
super_productivity_db_watchtower_enabled: false
super_productivity_supersync_watchtower_enabled: false
super_productivity_webdav_watchtower_enabled: false

# wud
super_productivity_wud_tag_include: '^\d+\.\d+$'
super_productivity_wud_tag_transform_type: "semver"
super_productivity_wud_link_template: "https://hub.docker.com/r/devname/super-productivity"
super_productivity_db_wud_tag_include: '^\d+\.\d+.*$'
super_productivity_db_wud_tag_transform_type: "semver"
super_productivity_db_wud_link_template: "https://hub.docker.com/_/postgres"
super_productivity_supersync_wud_tag_include: '^\d+\.\d+.*$'
super_productivity_supersync_wud_tag_transform_type: "semver"
super_productivity_supersync_wud_link_template: "https://hub.docker.com/r/super-productivity/super-sync-server"
super_productivity_webdav_wud_tag_include: '^\d+\.\d+.*$'
super_productivity_webdav_wud_tag_transform_type: "semver"
super_productivity_webdav_wud_link_template: "https://hub.docker.com/r/hacdias/webdav"
