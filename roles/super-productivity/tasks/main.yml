- name: Start {{ super_productivity_proper_name }}
  block:
    - name: Create {{ super_productivity_proper_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ super_productivity_data_directory }}"
        - "{{ super_productivity_data_directory }}/db"
        - "{{ super_productivity_data_directory }}/webdav"

    - name: Set {{ super_productivity_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        super_productivity_homepage_href: "https://{{ super_productivity_hostname }}.{{ ansible_nas_domain }}"
      when: super_productivity_traefik_enabled | bool or super_productivity_dockflare_enabled | bool

    - name: Copy {{ ansible_nas_app_name }} Template webdav.yaml
      ansible.builtin.template:
        src: webdav.yaml
        dest: "{{ super_productivity_data_directory }}/webdav.yaml"
        mode: '0644'
      register: template_webdav_yaml

