    - name: Create {{ super_productivity_proper_name }} WebDAV Container
      community.docker.docker_container:
        name: "{{ super_productivity_webdav_container_name }}"
        image: "{{ super_productivity_webdav_image_name }}:{{ super_productivity_webdav_image_tag }}"
        ports: ["{{ super_productivity_webdav_port_http }}:2345"]
        volumes:
          - "{{ super_productivity_data_directory }}/webdav.yaml:/config.yml:ro"
          - "{{ super_productivity_data_directory }}/webdav:/data"
        healthcheck:
          test: "{{ super_productivity_webdav_healthcheck_test }}"
          interval: "{{ super_productivity_webdav_healthcheck_interval }}"
          timeout: "{{ super_productivity_webdav_healthcheck_timeout }}"
          retries: "{{ super_productivity_webdav_healthcheck_retries }}"
          start_period: "{{ super_productivity_webdav_healthcheck_start_period }}"
        labels:
          autoheal: "{{ super_productivity_webdav_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ super_productivity_webdav_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          repliqate.enabled: "{{ super_productivity_webdav_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ super_productivity_webdav_repliqate_engine }}"
          repliqate.schedule: "{{ super_productivity_webdav_repliqate_schedule }}"
          repliqate.backup_id: "{{ super_productivity_webdav_repliqate_backup_id }}"
          repliqate.retention: "{{ super_productivity_webdav_repliqate_retention }}"
          traefik.enable: "{{ super_productivity_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.super-productivity-webdav.rule: "Host(`{{ super_productivity_webdav_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.super-productivity-webdav.tls.certresolver: "letsencrypt"
          traefik.http.routers.super-productivity-webdav.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.super-productivity-webdav.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.super-productivity-webdav.middlewares: "super-productivity-webdav@docker{{ ',tinyauth-auth@docker' if super_productivity_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.super-productivity.IPAllowList.sourcerange: "{{ super_productivity_traefik_whitelist }}"
          traefik.http.services.super-productivity-webdav.loadbalancer.server.port: "2345"
          wud.tag.include: "{{ super_productivity_webdav_wud_tag_include }}"
          wud.tag.transform.type: "{{ super_productivity_webdav_wud_tag_transform_type }}"
          wud.link.template: "{{ super_productivity_webdav_wud_link_template }}"
          homepage.name: "{{ super_productivity_proper_name }} WebDAV"
          homepage.group: "{{ super_productivity_webdav_homepage_group }}"
        restart_policy: unless-stopped

    - name: Create {{ super_productivity_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ super_productivity_container_name }}"
        hostname: "{{ super_productivity_container_name }}"
        image: "{{ super_productivity_image_name }}:{{ super_productivity_image_tag }}"
        pull: true
        volumes:
          - "{{ super_productivity_data_directory }}/config:/config"
        ports:
          - "{{ super_productivity_port_http }}:80"
        env:
          WEBDAV_BASE_URL: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ super_productivity_webdav_port_http }}/"
          WEBDAV_USERNAME: "{{ super_productivity_env_webdav_username }}"
          WEBDAV_SYNC_FOLDER_PATH: "{{ super_productivity_env_webdav_sync_folder_path }}"
          SYNC_INTERVAL: "{{ super_productivity_env_sync_interval }}"
          IS_COMPRESSION_ENABLED: "{{ super_productivity_env_is_compression_enabled }}"
          IS_ENCRYPTION_ENABLED: "{{ super_productivity_env_is_encryption_enabled }}"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: "{{ super_productivity_healthcheck_test }}"
          interval: "{{ super_productivity_healthcheck_interval }}"
          timeout: "{{ super_productivity_healthcheck_timeout }}"
          retries: "{{ super_productivity_healthcheck_retries }}"
          start_period: "{{ super_productivity_healthcheck_start_period }}"
        labels:
          autoheal: "{{ super_productivity_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ super_productivity_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ super_productivity_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ super_productivity_dockflare_access_group }}"
          dockflare.hostname: "{{ super_productivity_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ super_productivity_port_http }}"
          homepage.name: "{{ super_productivity_proper_name }}"
          homepage.group: "{{ super_productivity_homepage_group }}"
          homepage.icon: "{{ super_productivity_homepage_icon }}"
          homepage.href: "{{ super_productivity_homepage_href }}"
          homepage.description: "{{ super_productivity_homepage_description if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ super_productivity_container_name }}"
          homepage.showStats: "{{ super_productivity_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ super_productivity_port_http }}"
          repliqate.enabled: "{{ super_productivity_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ super_productivity_repliqate_engine }}"
          repliqate.schedule: "{{ super_productivity_repliqate_schedule }}"
          repliqate.backup_id: "{{ super_productivity_repliqate_backup_id }}"
          repliqate.retention: "{{ super_productivity_repliqate_retention }}"
          traefik.enable: "{{ super_productivity_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.super-productivity.rule: "Host(`{{ super_productivity_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.super-productivity.tls.certresolver: "letsencrypt"
          traefik.http.routers.super-productivity.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.super-productivity.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.super-productivity.middlewares: "super-productivity@docker{{ ',tinyauth-auth@docker' if super_productivity_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.super-productivity.IPAllowList.sourcerange: "{{ super_productivity_traefik_whitelist }}"
          traefik.http.services.super-productivity.loadbalancer.server.port: "80"
          wud.tag.include: "{{ super_productivity_wud_tag_include }}"
          wud.tag.transform.type: "{{ super_productivity_wud_tag_transform_type }}"
          wud.link.template: "{{ super_productivity_wud_link_template }}"
        cpu_shares: "{{ super_productivity_cpu_shares }}"
        memory: "{{ super_productivity_memory }}"
        memory_swap: "{{ super_productivity_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ super_productivity_proper_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (super_productivity_port_http | string)] +
                (['https://' + super_productivity_hostname + '.' + ansible_nas_domain] if (super_productivity_traefik_enabled is true or super_productivity_dockflare_enabled is true) else [])
              }}
  when: super_productivity_enabled is true

- name: Stop {{ super_productivity_proper_name }}
  block:
    - name: Stop {{ super_productivity_proper_name }} WEBDAV Container
      community.docker.docker_container:
        name: "{{ super_productivity_webdav_container_name }}"
        state: absent

    - name: Stop {{ super_productivity_proper_name }} SuperSync Container
      community.docker.docker_container:
        name: "{{ super_productivity_supersync_container_name }}"
        state: absent

    - name: Stop {{ super_productivity_proper_name }} DB Container
      community.docker.docker_container:
        name: "{{ super_productivity_db_container_name }}"
        state: absent

    - name: Stop {{ super_productivity_proper_name }} Container
      community.docker.docker_container:
        name: "{{ super_productivity_container_name }}"
        state: absent
  when: super_productivity_enabled is false

- name: Data Archive {{ super_productivity_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ super_productivity_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - super_productivity_enabled is false