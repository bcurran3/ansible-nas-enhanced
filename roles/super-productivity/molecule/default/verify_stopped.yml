---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Try and stop and remove {{ super_productivity_proper_name }}
      community.docker.docker_container:
        name: "{{ super_productivity_container_name }}"
        state: absent
      register: result

    - name: Try and stop and remove {{ super_productivity_proper_name }} SuperSync
      community.docker.docker_container:
        name: "{{ super_productivity_supersync_container_name }}"
        state: absent
      register: result_supersync

    - name: Try and stop and remove {{ super_productivity_proper_name }} WebDAV
      community.docker.docker_container:
        name: "{{ super_productivity_webdav_container_name }}"
        state: absent
      register: result_webdav

    - name: Try and stop and remove {{ super_productivity_proper_name }} DB
      community.docker.docker_container:
        name: "{{ super_productivity_db_container_name }}"
        state: absent
      register: result_db

    - name: Check if {{ super_productivity_proper_name }} is stopped
      ansible.builtin.assert:
        that:
          - not result.changed
          - not result_db.changed
          - not result_supersync.changed
          - not result_webdav.changed
