---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ pinchflat_data_directory }}"
        - "{{ pinchflat_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ pinchflat_container_name }}"
        hostname: "{{ pinchflat_container_name }}"
        image: "{{ pinchflat_image_name }}:{{ pinchflat_image_tag }}"
        pull: true
        volumes:
          - "{{ pinchflat_data_directory }}/config:/config"
          - "{{ pinchflat_dl_video_directory }}:/downloads"
        ports:
          - "{{ pinchflat_port_http }}:8945"
        env:
          PUID: "{{ pinchflat_user_id }}"
          PGID: "{{ pinchflat_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ pinchflat_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ pinchflat_watchtower_enable }}"
          dockflare.enable: "{{ pinchflat_dockflare_tunnel }}"
          dockflare.access.group: "{{ pinchflat_dockflare_access_group }}"
          dockflare.hostname: "{{ pinchflat_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ pinchflat_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ pinchflat_homepage_group }}"
          homepage.icon: "{{ pinchflat_homepage_icon }}"
          homepage.href: "{{ pinchflat_homepage_href }}"
          homepage.description: "{{ 'Your next YouTube media manager' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ pinchflat_container_name }}"
          homepage.showStats: "{{ pinchflat_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ pinchflat_port_http }}"
          repliqate.enabled: "{{ pinchflat_repliqate_enabled }}"
          repliqate.engine: "{{ pinchflat_repliqate_engine }}"
          repliqate.schedule: "{{ pinchflat_repliqate_schedule }}"
          repliqate.backup_id: "{{ pinchflat_repliqate_backup_id }}"
          repliqate.retention: "{{ pinchflat_repliqate_retention }}"
          traefik.enable: "{{ pinchflat_available_externally | string }}"
          traefik.http.routers.pinchflat.rule: "Host(`{{ pinchflat_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.pinchflat.tls.certresolver: "letsencrypt"
          traefik.http.routers.pinchflat.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.pinchflat.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ pinchflat_hostname }}"
          traefik.http.routers.pinchflat.middlewares: "{{ pinchflat_hostname }}@docker"
          traefik.http.middlewares.pinchflat.IPAllowList.sourcerange: "{{ pinchflat_traefik_whitelist }}"
          traefik.http.services.pinchflat.loadbalancer.server.port: "80"
          wud.tag.include: '^v\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/kieraneglin/pinchflat/pkgs/container/pinchflat"
        cpu_shares: "{{ pinchflat_cpu_shares }}"
        memory: "{{ pinchflat_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (pinchflat_port_http | string)] +
                (['https://' + pinchflat_hostname + '.' + ansible_nas_domain] if (pinchflat_available_externally is true or pinchflat_dockflare_tunnel is true) else [])
              }}
  when: pinchflat_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ pinchflat_container_name }}"
        state: absent
  when: pinchflat_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ pinchflat_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ pinchflat_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: pinchflat_enabled is false and archive_app_data_enabled is true
