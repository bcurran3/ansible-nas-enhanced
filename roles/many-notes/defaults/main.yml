---
# ANE
ansible_nas_app_name: "Many Notes"
many_notes_enabled: false
many_notes_traefik_enabled: false
many_notes_traefik_whitelist: "{{ lan }}"

# directories
#many_notes_data_directory: "{{ docker_home }}/many_notes"

# docker
many_notes_container_name: "many-notes"
many_notes_image_name: "brufdev/many-notes"
many_notes_image_tag: "latest"

# network
many_notes_hostname: "manynotes"
many_notes_port_http: "3085"

# specs
many_notes_cpu_shares: 1024
many_notes_memory: "1G"
many_notes_memory_swap: -1

# app
many_notes_env_app_url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ many_notes_port_http }}"

# autoheal
many_notes_autoheal_enabled: false

# dockflare
many_notes_dockflare_enabled: false
many_notes_dockflare_access_group: ""

# homepage
many_notes_homepage_group: "Apps"
many_notes_homepage_icon: "sh-many-notes.png"
many_notes_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ many_notes_port_http }}"
many_notes_homepage_showstats: false

# repliqate
many_notes_repliqate_enabled: false
many_notes_repliqate_engine: "restic"
many_notes_repliqate_schedule: "@daily 3am"
many_notes_repliqate_backup_id: "{{ many_notes_container_name }}"
many_notes_repliqate_retention: "30d"

# tinyauth
many_notes_tinyauth_enabled: false

# watchtower
many_notes_watchtower_enabled: false
