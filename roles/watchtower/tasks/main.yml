---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ watchtower_container_name }}"
        hostname: "{{ watchtower_container_name }}"
        image: "{{ watchtower_image_name }}:{{ watchtower_image_version }}"
        pull: true
        ports:
            - "{{ watchtower_port }}:8080"                             # added
        volumes:
          - "/var/run/docker.sock:/var/run/docker.sock"
        env:
          TZ: "{{ ansible_nas_timezone }}"
          WATCHTOWER_CLEANUP: "{{ watchtower_cleanup }}"
          WATCHTOWER_LABEL_ENABLE: "true"
          WATCHTOWER_LABEL_TAKE_PRECEDENCE: "true"
          WATCHTOWER_REMOVE_VOLUMES: "{{ watchtower_remove_volumes }}"
          WATCHTOWER_DEBUG: "{{ watchtower_debug }}"
          WATCHTOWER_HTTP_API_TOKEN: "{{ watchtower_api_token }}"           # added
          WATCHTOWER_HTTP_API_METRICS: "true"              # added
          WATCHTOWER_HTTP_API_PERIODIC_POLLS: "true"       # added
          WATCHTOWER_INCLUDE_STOPPED: "{{ watchtower_include_stopped }}"
          WATCHTOWER_REVIVE_STOPPED: "{{ watchtower_revive_stopped }}"
#         WATCHTOWER_POLL_INTERVAL: "{{ watchtower_poll_interval }}"
          WATCHTOWER_MONITOR_ONLY: "{{ watchtower_monitor_only }}"
          WATCHTOWER_NO_RESTART: "{{ watchtower_no_restart }}"
          WATCHTOWER_NO_PULL: "{{ watchtower_no_pull }}"
          WATCHTOWER_SCHEDULE: "{{ watchtower_schedule }}"
          WATCHTOWER_TIMEOUT: "{{ watchtower_timeout }}"
          WATCHTOWER_NOTIFICATIONS: "{{ watchtower_notifications }}"
          WATCHTOWER_NOTIFICATION_EMAIL_FROM: "{{ watchtower_notification_email_from }}"
          WATCHTOWER_NOTIFICATION_EMAIL_TO: "{{ watchtower_notification_email_to }}"
          WATCHTOWER_NOTIFICATION_EMAIL_SERVER: "{{ watchtower_notification_email_server }}"
          WATCHTOWER_NOTIFICATION_EMAIL_SERVER_TLS_SKIP_VERIFY: "{{ watchtower_notification_email_server_tls_skip_verify }}"
          WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PORT: "{{ watchtower_notification_email_server_port }}"
          WATCHTOWER_NOTIFICATION_EMAIL_SERVER_USER: "{{ watchtower_notification_email_server_user }}"
          WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PASSWORD: "{{ watchtower_notification_email_server_password }}"
          WATCHTOWER_NOTIFICATION_EMAIL_DELAY: "{{ watchtower_notification_email_delay }}"
          WATCHTOWER_NOTIFICATION_GOTIFY_URL: "{{ watchtower_notification_gotify_url }}"
          WATCHTOWER_NOTIFICATION_GOTIFY_TOKEN: "{{ watchtower_notification_gotify_token }}"
          WATCHTOWER_NOTIFICATION_MSTEAMS_HOOK_URL: "{{ watchtower_notifications_msteams_hook_url }}"
          WATCHTOWER_NOTIFICATION_MSTEAMS_USE_LOG_DATA: "{{ watchtower_notifications_msteams_use_log_data }}"
          WATCHTOWER_NOTIFICATION_SLACK_HOOK_URL: "{{ watchtower_notifications_slack_hook_url }}"
          WATCHTOWER_NOTIFICATION_SLACK_IDENTIFIER: "{{ watchtower_notifications_slack_identifier }}"
          WATCHTOWER_NOTIFICATION_SLACK_CHANNEL: "{{ watchtower_notifications_slack_channel }}"
          WATCHTOWER_NOTIFICATION_SLACK_ICON_EMOJI: "{{ watchtower_notifications_slack_icon_emoji }}"
          WATCHTOWER_NOTIFICATION_SLACK_ICON_URL: "{{ watchtower_notifications_slack_icon_url }}"
        command: "{{ watchtower_command }}"
        labels:
          autoheal: "{{ watchtower_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ watchtower_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ watchtower_homepage_group }}"
          homepage.icon: "{{ watchtower_homepage_icon }}"
#         homepage.href: "{{ watchtower_homepage_href }}"
#         homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ watchtower_port }}"
          homepage.description: "{{ 'A process for automating Docker container base image updates.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ watchtower_container_name }}"
          homepage.showStats: "{{ watchtower_homepage_showStats }}"
          homepage.widget.type: "watchtower"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ watchtower_port }}"
          homepage.widget.key: "{{ watchtower_api_token }}"
          traefik.enable: "{{ watchtower_available_externally | string }}"
          traefik.http.routers.watchtower.rule: "Host(`{{ watchtower_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.watchtower.tls.certresolver: "letsencrypt"
          traefik.http.routers.watchtower.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.watchtower.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ watchtower_hostname }}"
          traefik.http.routers.watchtower.middlewares: "{{ watchtower_hostname }}@docker"
          traefik.http.middlewares.watchtower.IPAllowList.sourcerange: "{{ watchtower_traefik_whitelist }}"
          traefik.http.services.watchtower.loadbalancer.server.port: "8080"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/containrrr/watchtower/releases/tag/$${major}.$${minor}.$${patch}"
        cpu_shares: "{{ watchtower_cpu_shares }}"
        memory: "{{ watchtower_memory }}"
        restart_policy: unless-stopped
  when: watchtower_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ watchtower_container_name }}"
        state: absent
  when: watchtower_enabled is false
