---
# ANE
ansible_nas_app_name: "OpenEats"
openeats_enabled: false
openeats_traefik_enabled: false
openeats_traefik_whitelist: "{{ lan }}"

openeats_data_directory: "{{ docker_home }}/openeats"

# network
openeats_hostname: "openeats"
openeats_port_http: "5807"
openeats_port_api: "8000"

# docker
openeats_api_container_name: "openeats-api"
openeats_api_image_name: "openeats/openeats-api"
openeats_api_image_tag: "latest"
openeats_db_container_name: "openeats-db"
openeats_db_image_name: "mariadb"
openeats_db_image_tag: "5.5.64"
openeats_nginx_container_name: "openeats-nginx"
openeats_nginx_image_name: "openeats/openeats-nginx"
openeats_nginx_image_tag: "latest"
openeats_web_container_name: "openeats-web"
openeats_web_image_name: "openeats/openeats-web"
openeats_web_image_tag: "latest"

# specs
openeats_api_cpu_shares: 1024
openeats_api_memory: "1G"
openeats_api_memory_swap: -1
openeats_db_cpu_shares: 1024
openeats_db_memory: "1G"
openeats_db_memory_swap: "{{ openeats_db_memory }}"
openeats_nginx_cpu_shares: 1024
openeats_nginx_memory: "1G"
openeats_nginx_memory_swap: -1
openeats_web_cpu_shares: 1024
openeats_web_memory: "1G"
openeats_web_memory_swap: -1

# app
openeats_db_env_mariadb_root_password: "openeatspw"
openeats_db_env_mysql_host: "{{ openeats_db_container_name }}"
openeats_db_env_mysql_database: "openeats_db"
openeats_db_env_mysql_user: "openeats"
openeats_db_env_mysql_password: "topsecret"
openeats_api_env_api_url: "0.0.0.0:{{ openeats_port_api }}"
openeats_api_env_django_secret_key: '7dxxz32pws-t%u!ao3me*l5u#abwhf85ykapm^f9_ow+9p()ke'
openeats_api_env_django_settings_module: "base.settings"
openeats_api_env_django_debug: "False"
openeats_api_env_allowed_host: '*' # "{{ openeats_hostname }}.{{ ansible_nas_domain }}"
openeats_api_env_http_x_forwarded_proto: "false"  # If you are serving content behind an HTTPS proxy, Set this to `true`.
openeats_env_node_env: "production"
openeats_env_node_url: "{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ openeats_port_http }}"
openeats_env_node_api_url: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ openeats_port_http }}"
openeats_env_node_locale: "en"

# autoheal
openeats_api_autoheal_enabled: false
openeats_db_autoheal_enabled: false
openeats_nginx_autoheal_enabled: false
openeats_web_autoheal_enabled: false

# dockflare
openeats_dockflare_enabled: false
openeats_dockflare_access_group: ""

# homepage
openeats_api_homepage_group: "Misc"
openeats_api_homepage_icon: "openeats.png"
openeats_api_homepage_href: "{{ openeats_web_homepage_href }}"
openeats_api_homepage_showstats: false
openeats_db_homepage_group: "DBs"
openeats_db_homepage_icon: "mariadb.png"
openeats_db_homepage_href: "{{ openeats_web_homepage_href }}"
openeats_db_homepage_showstats: false
openeats_nginx_homepage_group: "Apps"
openeats_nginx_homepage_icon: "openeats.png"
openeats_nginx_homepage_href: "{{ openeats_web_homepage_href }}"
openeats_nginx_homepage_showstats: false
openeats_web_homepage_group: "Misc"
openeats_web_homepage_icon: "openeats.png"
openeats_web_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ openeats_port_http }}"
openeats_web_homepage_showstats: false

# repliqate
openeats_api_repliqate_enabled: false
openeats_api_repliqate_engine: "restic"
openeats_api_repliqate_schedule: "@daily 3am"
openeats_api_repliqate_backup_id: "{{ openeats_api_container_name }}"
openeats_api_repliqate_retention: "30d"
openeats_db_repliqate_enabled: false
openeats_db_repliqate_engine: "restic"
openeats_db_repliqate_schedule: "@daily 3am"
openeats_db_repliqate_backup_id: "{{ openeats_db_container_name }}"
openeats_db_repliqate_retention: "30d"
openeats_nginx_repliqate_enabled: false
openeats_nginx_repliqate_engine: "restic"
openeats_nginx_repliqate_schedule: "@daily 3am"
openeats_nginx_repliqate_backup_id: "{{ openeats_nginx_container_name }}"
openeats_nginx_repliqate_retention: "30d"
openeats_web_repliqate_enabled: false
openeats_web_repliqate_engine: "restic"
openeats_web_repliqate_schedule: "@daily 3am"
openeats_web_repliqate_backup_id: "{{ openeats_web_container_name }}"
openeats_web_repliqate_retention: "30d"

# tinyauth
openeats_tinyauth_enabled: false

# watchtower
openeats_api_watchtower_enabled: false
openeats_db_watchtower_enabled: false
openeats_nginx_watchtower_enabled: false
openeats_web_watchtower_enabled: false
