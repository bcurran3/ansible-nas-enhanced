---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Try and stop and remove {{ openeats_proper_name }} API
      community.docker.docker_container:
        name: "{{ openeats_api_container_name }}"
        state: absent
      register: result_api

    - name: Try and stop and remove {{ openeats_proper_name }} DB
      community.docker.docker_container:
        name: "{{ openeats_db_container_name }}"
        state: absent
      register: result_db

    - name: Try and stop and remove {{ openeats_proper_name }} Nginx
      community.docker.docker_container:
        name: "{{ openeats_nginx_container_name }}"
        state: absent
      register: result_nginx

    - name: Try and stop and remove {{ openeats_proper_name }} Web UI
      community.docker.docker_container:
        name: "{{ openeats_web_container_name }}"
        state: absent
      register: result_web

    - name: Check {{ openeats_proper_name }} is stopped
      ansible.builtin.assert:
        that:
          - not result_api.changed
          - not result_db.changed
          - not result_nginx.changed
          - not result_web.changed
