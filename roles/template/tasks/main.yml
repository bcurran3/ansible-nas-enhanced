    - name: Create {{ appname_proper_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ appname_db_container_name }}"
        hostname: "{{ appname_db_container_name }}"
        image: "{{ appname_db_image_name }}:{{ appname_db_image_tag }}"
        pull: true
        volumes:
          - "{{ appname_data_directory }}/db:/var/lib/mysql"
        env:
          PUID: "1000"
          PGID: "1000"
          MYSQL_ROOT_PASSWORD: "topsecretroot"
          MYSQL_DATABASE: "appname"
          MYSQL_USER: "appname"
          MYSQL_PASSWORD: "{{ appname_db_password }}"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
              test:
                - CMD
                - /usr/local/bin/healthcheck.sh
                - --su-mysql
                - --connect
                - --innodb_initialized
              interval: "30s"
              timeout: "10s"
              retries: "3"
              start_period: "30s"
        labels:
          autoheal: "{{ appname_db_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ appname_db_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ appname_proper_name }} MariaDB"
          homepage.group: "{{ appname_db_homepage_group }}"
          homepage.icon: "{{ appname_db_homepage_icon }}"
          homepage.href: "{{ appname_db_homepage_href }}"
          homepage.description: "{{ appname_db_homepage_description if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ appname_db_container_name }}"
          homepage.showStats: "{{ appname_db_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ appname_db_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ appname_db_repliqate_engine }}"
          repliqate.schedule: "{{ appname_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ appname_db_repliqate_backup_id }}"
          repliqate.retention: "{{ appname_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: "{{ appname_db_wud_tag_include }}"
          wud.tag.transform.type: "{{ appname_db_wud_tag_transform_type }}"
          wud.link.template: "{{ appname_db_wud_link_template }}"
        cpu_shares: "{{ appname_db_cpu_shares }}"
        memory: "{{ appname_db_memory }}"
        memory_swap: "{{ appname_db_memory_swap }}"
        restart_policy: unless-stopped

    - name: Verify {{ appname_proper_name }} DB is healthy
      community.docker.docker_container_info:
        name: "{{ appname_db_container_name }}"
      register: db_info
      until: "db_info.container.State.Health.Status == 'healthy'"
      retries: 30
      delay: 5

