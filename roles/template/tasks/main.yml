    - name: Create {{ ansible_nas_app_name }} Redis Container
      docker_container:
        container_default_behavior: "compatibility"
        name: "{{ appname_redis_container_name }}"
        hostname: "{{ appname_redis_container_name }}"
        image: "{{ appname_redis_image_name }}:{{ appname_redis_image_version }}"
        pull: true
        cpu_shares: "{{ appname_redis_cpu_shares }}"
        networks:
          - name: "{{ appname_network_name }}"
        network_mode: "{{ appname_network_name }}"
        networks_cli_compatible: "yes"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        restart_policy: unless-stopped
        memory: "{{ appname_redis_memory }}"
        command: "redis-server --requirepass topsecret"
        labels:
          autoheal: "{{ appname_redis_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ appname_redis_watchtower_monitor_only }}"
          homepage.group: "{{ appname_redis_homepage_group }}"
          homepage.name: "appname Redis"
          homepage.icon: "{{ appname_redis_homepage_icon }}"
          homepage.href: "{{ appname_homepage_href }}"
#         homepage.description: "Redis"
          homepage.server: "my-docker"
          homepage.container: "{{ appname_redis_container_name }}"
          homepage.showStats: "{{ appname_redis_homepage_showStats }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/redis/redis/releases/tag/$${major}.$${minor}.$${patch}"
