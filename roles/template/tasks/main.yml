---
- name: Start {{ appname_proper_name }}
  block:
    - name: Create {{ appname_proper_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ appname_data_directory }}"
        - "{{ appname_data_directory }}/config"
#       - "{{ appname_data_directory }}/db"

#    - name: Create {{ appname_proper_name }} Volumes
#      community.docker.docker_volume:
#        name: "{{ item }}"
#      loop:
#        - appname_volume1

    - name: Set {{ appname_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        appname_homepage_href: "https://{{ appname_hostname }}.{{ ansible_nas_domain }}"
      when: appname_traefik_enabled | bool or appname_dockflare_enabled | bool

    - name: Create {{ appname_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ appname_container_name }}"
        hostname: "{{ appname_container_name }}"
        image: "{{ appname_image_name }}:{{ appname_image_tag }}"
        pull: true
        volumes:
          - "{{ appname_data_directory }}/config:/config"
        ports:
          - "{{ appname_port_http }}:80"
        env:
#         DOCKER_MODS: "{{ appname_env_docker_mods }}" # linuxserver.io images
#         INSTALL_PACKAGES: "{{ appname_env_docker_mods_install_packages }}"
#         INSTALL_PIP_PACKAGES: "{{ appname_env_docker_mods_install_pip_packages}}"
          PUID: "{{ appname_user_id }}"
          PGID: "{{ appname_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ appname_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ appname_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ appname_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ appname_dockflare_access_group }}"
          dockflare.hostname: "{{ appname_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ appname_port_http }}"
#         dockflare.access.policy: "authenticate"
#         dockflare.access.allowed_idps: "YOUR_IDP_UUID_HERE"
          homepage.name: "{{ appname_proper_name }}"
          homepage.group: "{{ appname_homepage_group }}"
          homepage.icon: "{{ appname_homepage_icon }}"
          homepage.href: "{{ appname_homepage_href }}"
          homepage.description: "{{ appname_homepage_description if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ appname_container_name }}"
          homepage.showStats: "{{ appname_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ appname_port_http }}"
          repliqate.enabled: "{{ appname_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ appname_repliqate_engine }}"
          repliqate.schedule: "{{ appname_repliqate_schedule }}"
          repliqate.backup_id: "{{ appname_repliqate_backup_id }}"
          repliqate.retention: "{{ appname_repliqate_retention }}"
          traefik.enable: "{{ appname_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.appname.rule: "Host(`{{ appname_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.appname.tls.certresolver: "letsencrypt"
          traefik.http.routers.appname.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.appname.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.appname.middlewares: "appname@docker{{ ',tinyauth-auth@docker' if appname_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.appname.IPAllowList.sourcerange: "{{ appname_traefik_whitelist }}"
          traefik.http.services.appname.loadbalancer.server.port: "80"
          wud.tag.include: "{{ appname_wud_tag_include }}"
          wud.tag.transform.type: "{{ appname_wud_tag_transform_type }}"
          wud.link.template: "{{ appname_wud_link_template }}"
        cpu_shares: "{{ appname_cpu_shares }}"
        memory: "{{ appname_memory }}"
        memory_swap: "{{ appname_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ appname_proper_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (appname_port_http | string)] +
                (['https://' + appname_hostname + '.' + ansible_nas_domain] if (appname_traefik_enabled is true or appname_dockflare_enabled is true) else [])
              }}
  when: appname_enabled is true

- name: Stop {{ appname_proper_name }}
  block:
    - name: Stop {{ appname_proper_name }} Container
      community.docker.docker_container:
        name: "{{ appname_container_name }}"
        state: absent
  when: appname_enabled is false

- name: Data Archive {{ appname_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ appname_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - appname_enabled is false

