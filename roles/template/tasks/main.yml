    - name: Create {{ ansible_nas_app_name }} MySQL Container
      community.docker.docker_container:
        name: "{{ appname_db_container_name }}"
        hostname: "{{ appname_db_container_name }}"
        image: "{{ appname_db_image_name }}:{{ appname_db_image_version }}"
        networks:
          - name: "{{ appname_network_name }}"
        network_mode: "{{ appname_network_name }}"
        pull: true
        cpu_shares: "{{ appname_db_cpu_shares }}"
        volumes:
          - "{{ appname_data_directory }}/mysql/mysql:/var/lib/mysql"
          - "{{ appname_data_directory }}/mysql/my.cnf:/etc/my.cnf"
        env:
          MYSQL_DATABASE: "appname"
          MYSQL_USER: "{{ appname_sql_user }}"
          MYSQL_PASSWORD: "{{ appname_sql_password }}"
          MYSQL_ROOT_PASSWORD: "{{ appname_sql_root_password }}"
          TZ: "{{ ansible_nas_timezone }}"
        restart_policy: unless-stopped
        memory: "{{ appname_db_memory }}"
        labels:
          autoheal: "{{ appname_db_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ appname_db_watchtower_monitor_only }}"
          homepage.group: "{{ appname_db_homepage_group }}"
          homepage.name: "appname MySQL"
          homepage.icon: "{{ appname_db_homepage_icon }}"
          homepage.href: "{{ appname_homepage_href }}"
#         homepage.description: "MySQL"
          homepage.server: "my-docker"
          homepage.container: "{{ appname_db_container_name }}"
          homepage.showStats: "{{ appname_db_homepage_showStats }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/mysql/mysql-server/releases/tag/$${major}.$${minor}.$${patch}"

