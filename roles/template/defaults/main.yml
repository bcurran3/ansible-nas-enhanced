# docker
appname_db_container_name: "appname-db"
appname_db_image_name: "mariadb"
appname_db_image_tag: "latest"

# specs
appname_db_cpu_shares: 1024
appname_db_memory: "1G"
appname_db_memory_swap: "{{ appname_db_memory }}"

# autoheal
appname_db_autoheal_enabled: false

# healthcheck
appname_db_healthcheck_test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u", "appname", "-p{{ appname_db_password }}"]
appname_db_healthcheck_interval: 10s
appname_db_healthcheck_timeout: 5s
appname_db_healthcheck_retries: 5
appname_db_healthcheck_start_period: 30s

# homepage
appname_db_homepage_description: "MariaDB Server is a high performing open source relational database, forked from MySQL."
appname_db_homepage_group: "DBs"
appname_db_homepage_icon: "mariadb.png"
appname_db_homepage_href: "{{ appname_homepage_href }}"
appname_db_homepage_showstats: false

# repliqate
appname_db_repliqate_enabled: false
appname_db_repliqate_engine: "restic"
appname_db_repliqate_schedule: "@daily 3am"
appname_db_repliqate_backup_id: "{{ appname_db_container_name }}"
appname_db_repliqate_retention: "30d"

# watchtower
appname_db_watchtower_enabled: false

# wud
appname_db_wud_tag_include: '^\d+\.\d+\.\d+.*$'
appname_db_wud_tag_transform_type: "semver"
appname_db_wud_link_template: "https://hub.docker.com/_/mariadb"

