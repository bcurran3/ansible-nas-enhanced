appname_redis_repliqate_engine: "restic"
appname_redis_repliqate_schedule: "@daily 3am"
appname_redis_repliqate_backup_id: "{{ appname_redis_container_name }}"
appname_redis_repliqate_retention: "30d"

# watchtower
