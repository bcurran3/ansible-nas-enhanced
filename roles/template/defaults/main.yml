---
# ANE
ansible_nas_app_name: "appname"
appname_enabled: false
appname_traefik_enabled: false
appname_traefik_whitelist: "{{ lan }}"

# directories
appname_data_directory: "{{ docker_home }}/appname"

# docker
appname_container_name: "appname"
appname_image_name: "appdev/appname" # use ghcr.io or lscr.io when available
appname_image_tag: "latest"

# uid / gid
appname_user_id: "0"
appname_group_id: "0"

# network
appname_hostname: "appname"
#appname_network_name: "appname"
appname_port_http: "8989"

# specs
appname_cpu_shares: 1024
appname_memory: "1G"
appname_memory_swap: -1

# autoheal
appname_autoheal_enabled: false

# dockflare
appname_dockflare_enabled: false
appname_dockflare_access_group: ""

# homepage
appname_homepage_group: "Apps"
appname_homepage_icon: "appname.png"
appname_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ appname_port_http }}"
appname_homepage_showstats: false

# linuxserver.io docker mods for linuxserver.io images
#appname_env_docker_mods: ""
#appname_env_docker_mods_install_packages: ""
#appname_env_docker_mods_install_pip_packages: ""

# repliqate
appname_repliqate_enabled: false
appname_repliqate_engine: "restic"
appname_repliqate_schedule: "@daily 3am"
appname_repliqate_backup_id: "{{ appname_container_name }}"
appname_repliqate_retention: "30d"

# tinyauth
appname_tinyauth_enabled: false

# watchtower
appname_watchtower_enabled: false


