---
appname_enabled: false
appname_available_externally: false
appname_traefik_whitelist: "{{ lan }}"

# directories
appname_data_directory: "{{ docker_home }}/appname"
appname_tv_directory: "{{ tv_root }}"
appname_download_directory: "{{ downloads_root }}"

# docker
appname_container_name: "appname"
appname_image_name: "appdev/appname"
appname_image_version: "latest"

# uid / gid
appname_user_id: "0"
appname_group_id: "0"

# network
appname_port: "8989"
appname_hostname: "appname"

# specs
appname_memory: 1g

# homepage
appname_homepage_group: "Apps"
appname_homepage_icon: "appname.png"
appname_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ appname_port }}"
appname_homepage_showStats: "false"

# watchtower
appname_watchtower_monitor_only: "true"