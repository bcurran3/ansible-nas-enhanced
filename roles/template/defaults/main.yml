# docker
appname_redis_container_name: "appname-redis"
appname_redis_image_name: "redis"
appname_redis_image_tag: "latest"

# specs
appname_redis_cpu_shares: 1024
appname_redis_memory: "128M"
appname_redis_memory_swap: "{{ appname_redis_memory }}"

# autoheal
appname_redis_autoheal_enabled: false

# healthcheck
appname_redis_healthcheck_test: ["CMD-SHELL", "redis-cli -a topsecret ping | grep PONG || exit 1"]
appname_redis_healthcheck_interval: 10s
appname_redis_healthcheck_timeout: 5s
appname_redis_healthcheck_retries: 3
appname_redis_healthcheck_start_period: 10s

# homepage
