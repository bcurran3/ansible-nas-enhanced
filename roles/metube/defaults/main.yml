---
# ANE
ansible_nas_app_name: "MeTube"
metube_enabled: false
metube_available_externally: false
metube_traefik_whitelist: "{{ lan }}"

# directories
metube_download_directory: "{{ downloads_root }}/youtube/video"

# network
metube_port_http: "3019"
metube_hostname: "metube"

# docker
metube_container_name: "metube"
metube_image_name: "ghcr.io/alexta69/metube"
metube_image_tag: "latest"

# specs
metube_cpu_shares: 1024
metube_memory: "1G"
metube_memory_swap: -1

# autoheal
metube_autoheal: "false"

# dockflare
metube_dockflare_tunnel: "false"
metube_dockflare_access_group: ""

# homepage
metube_homepage_group: "Download Tools"
metube_homepage_icon: "metube.png"
metube_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ metube_port_http }}"
metube_homepage_showstats: "false"

# tinyauth
metube_tinyauth_enabled: false

# watchtower
metube_watchtower_enable: "false"