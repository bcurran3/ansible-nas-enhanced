---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directory
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ metube_download_directory }}"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        metube_homepage_href: "https://{{ metube_hostname }}.{{ ansible_nas_domain }}"
      when: metube_traefik_enabled | bool or metube_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ metube_container_name }}"
        hostname: "{{ metube_container_name }}"
        image: "{{ metube_image_name }}:{{ metube_image_tag }}"
        pull: true
        volumes:
          - "{{ metube_download_directory }}:/downloads"
        ports:
          - "{{ metube_port_http }}:8081"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ metube_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ metube_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ metube_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ metube_dockflare_access_group }}"
          dockflare.hostname: "{{ metube_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ metube_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ metube_homepage_group }}"
          homepage.icon: "{{ metube_homepage_icon }}"
          homepage.href: "{{ metube_homepage_href }}"
          homepage.description: "{{ 'Self-hosted YouTube downloader (web UI for youtube-dl / yt-dlp)' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ metube_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ metube_container_name }}"
          homepage.showStats: "{{ metube_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "false"
          traefik.enable: "{{ metube_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.metube.rule: "Host(`metube.{{ ansible_nas_domain }}`)"
          traefik.http.routers.metube.tls.certresolver: "letsencrypt"
          traefik.http.routers.metube.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.metube.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.metube.middlewares: "{{ metube_hostname }}@docker{{ ',tinyauth-auth@docker' if metube_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.metube.IPAllowList.sourcerange: "{{ metube_traefik_whitelist }}"
          traefik.http.services.metube.loadbalancer.server.port: "8081"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/alexta69/metube/releases"
        cpu_shares: "{{ metube_cpu_shares }}"
        memory: "{{ metube_memory }}"
        memory_swap: "{{ metube_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (metube_port_http | string)] +
                (['https://' + metube_hostname + '.' + ansible_nas_domain] if (metube_traefik_enabled is true or metube_dockflare_enabled is true) else [])
              }}
  when: metube_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ metube_container_name }}"
        state: absent
  when: metube_enabled is false
