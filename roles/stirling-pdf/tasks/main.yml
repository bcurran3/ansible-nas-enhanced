---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ stirling_pdf_data_directory }}"
        - "{{ stirling_pdf_data_directory }}/configs"
        - "{{ stirling_pdf_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ stirling_pdf_container_name }}"
        hostname: "{{ stirling_pdf_container_name }}"
        image: "{{ stirling_pdf_image_name }}:{{ stirling_pdf_image_tag }}"
        pull: true
        volumes:
          - "{{ stirling_pdf_data_directory }}/configs:/configs"
          - "{{ stirling_pdf_data_directory }}/data:/usr/share/tessdata"
        ports:
          - "{{ stirling_pdf_port_http }}:8080"
        env:
          DOCKER_ENABLE_SECURITY: "false"
          INSTALL_BOOK_AND_ADVANCED_HTML_OPS: "false"
          LANGS: "en_US"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ stirling_pdf_autoheal | string }}"
          com.centurylinklabs.watchtower.enable: "{{ stirling_pdf_watchtower_enabled | string }}"
          dockflare.enable: "{{ stirling_pdf_dockflare_enabled | string }}"
          dockflare.access.group: "{{ stirling_pdf_dockflare_access_group }}"
          dockflare.hostname: "{{ stirling_pdf_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ stirling_pdf_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ stirling_pdf_homepage_group }}"
          homepage.icon: "{{ stirling_pdf_homepage_icon }}"
          homepage.href: "{{ stirling_pdf_homepage_href }}"
          homepage.description: "{{ 'Web-based PDF editor' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ stirling_pdf_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ stirling_pdf_container_name }}"
          homepage.showStats: "{{ stirling_pdf_homepage_showstats | string }}"
          repliqate.enabled: "{{ stirling_pdf_repliqate_enabled | string }}"
          repliqate.engine: "{{ stirling_pdf_repliqate_engine }}"
          repliqate.schedule: "{{ stirling_pdf_repliqate_schedule }}"
          repliqate.backup_id: "{{ stirling_pdf_repliqate_backup_id }}"
          repliqate.retention: "{{ stirling_pdf_repliqate_retention }}"
          traefik.enable: "{{ stirling_pdf_available_externally | string }}"
          traefik.http.routers.stirlingpdf.rule: "Host(`{{ stirling_pdf_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.stirlingpdf.tls.certresolver: "letsencrypt"
          traefik.http.routers.stirlingpdf.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.stirlingpdf.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.stirlingpdf.middlewares: "stirlingpdf@docker{{ ',tinyauth-auth@docker' if stirling_pdf_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.stirlingpdf.IPAllowList.sourcerange: "{{ stirling_pdf_traefik_whitelist }}"
          traefik.http.services.stirling_pdf.loadbalancer.server.port: "8080"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/Stirling-Tools/Stirling-PDF/pkgs/container/stirling-pdf"
        cpu_shares: "{{ stirling_pdf_cpu_shares }}"
        memory: "{{ stirling_pdf_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (stirling_pdf_port_http | string)] +
                (['https://' + stirling_pdf_hostname + '.' + ansible_nas_domain] if (stirling_pdf_available_externally is true or stirling_pdf_dockflare_enabled is true) else [])
              }}
  when: stirling_pdf_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ stirling_pdf_container_name }}"
        state: absent
  when: stirling_pdf_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ stirling_pdf_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - stirling_pdf_enabled is false