---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ stirling_pdf_data_directory }}"
        - "{{ stirling_pdf_data_directory }}/extraConfigs"
        - "{{ stirling_pdf_data_directory }}/trainingData"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ stirling_pdf_container_name }}"
        hostname: "{{ stirling_pdf_container_name }}"
        image: "{{ stirling_pdf_image_name }}:{{ stirling_pdf_image_tag }}"
        pull: true
        volumes:
          - "{{ stirling_pdf_data_directory }}/extraConfigs:/configs"
          - "{{ stirling_pdf_data_directory }}/trainingData:/usr/share/tessdata"
        ports:
          - "{{ stirling_pdf_port_http }}:8080"
        env:
          DOCKER_ENABLE_SECURITY: "false"
          INSTALL_BOOK_AND_ADVANCED_HTML_OPS: "false"
          LANGS: "en_US"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ stirling_pdf_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ stirling_pdf_watchtower_monitor_only }}"
          dockflare.enable: "{{ stirling_pdf_dockflare_tunnel }}"
          dockflare.access.group: "{{ stirling_pdf_dockflare_access_group }}"
          dockflare.hostname: "{{ stirling_pdf_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ stirling_pdf_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ stirling_pdf_homepage_group }}"
          homepage.icon: "{{ stirling_pdf_homepage_icon }}"
          homepage.href: "{{ stirling_pdf_homepage_href }}"
          homepage.description: "{{ '#1 Locally hosted web application that allows you to perform various operations on PDF files' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ stirling_pdf_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ stirling_pdf_container_name }}"
          homepage.showStats: "{[ stirling_pdf_homepage_showStats ]}"
          homepage.widget.type: "stirling-pdf"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ stirling_pdf_port_http }}"
          traefik.enable: "{{ stirling_pdf_available_externally | string }}"
          traefik.http.routers.stirling_pdf.rule: "Host(`{{ stirling_pdf_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.stirling_pdf.tls.certresolver: "letsencrypt"
          traefik.http.routers.stirling_pdf.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.stirling_pdf.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ stirling_pdf_hostname }}"
          traefik.http.routers.stirling_pdf.middlewares: "stirling_pdf@docker"
          traefik.http.middlewares.stirling_pdf.IPAllowList.sourcerange: "{{ stirling_pdf_traefik_whitelist }}"
          traefik.http.services.stirling_pdf.loadbalancer.server.port: "8080"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/Stirling-Tools/Stirling-PDF/releases/tag/$${major}.$${minor}.$${patch}"
        cpu_shares: "{{ stirling_pdf_cpu_shares }}"
        memory: "{{ stirling_pdf_memory }}"
        restart_policy: unless-stopped
  when: stirling_pdf_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ stirling_pdf_container_name }}"
        state: absent
  when: stirling_pdf_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ stirling_pdf_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ stirling_pdf_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: stirling_pdf_enabled is false and archive_app_data_enabled is true
