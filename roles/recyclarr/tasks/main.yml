---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ recyclarr_data_directory }}"
        - "{{ recyclarr_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ recyclarr_container_name }}"
        hostname: "{{ recyclarr_container_name }}"
        image: "{{ recyclarr_image_name }}:{{ recyclarr_image_tag }}"
        pull: true
        volumes:
          - "{{ recyclarr_data_directory }}/config:/config"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ recyclarr_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ recyclarr_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ recyclarr_homepage_group }}"
          homepage.icon: "{{ recyclarr_homepage_icon }}"
          homepage.description: "{{ 'Automatically sync TRaSH Guides to your Sonarr and Radarr instances' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ recyclarr_container_name }}"
          homepage.showStats: "{{ recyclarr_homepage_showstats }}"
          repliqate.enabled: "{{ recyclarr_repliqate_enabled }}"
          repliqate.engine: "{{ recyclarr_repliqate_engine }}"
          repliqate.schedule: "{{ recyclarr_repliqate_schedule }}"
          repliqate.backup_id: "{{ recyclarr_repliqate_backup_id }}"
          repliqate.retention: "{{ recyclarr_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/recyclarr/recyclarr/pkgs/container/recyclarr"
        cpu_shares: "{{ recyclarr_cpu_shares }}"
        memory: "{{ recyclarr_memory }}"
        restart_policy: unless-stopped
  when: recyclarr_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ recyclarr_container_name }}"
        state: absent
  when: recyclarr_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ recyclarr_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ recyclarr_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: recyclarr_enabled is false and archive_app_data_enabled is true
