---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ dumbassets_data_directory }}"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        dumbassets_base_url: "https://{{ dumbassets_hostname }}.{{ ansible_nas_domain }}"
        dumbassets_homepage_href: "https://{{ dumbassets_hostname }}.{{ ansible_nas_domain }}"
      when: dumbassets_traefik_enabled | bool or dumbassets_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ dumbassets_container_name }}"
        hostname: "{{ dumbassets_container_name }}"
        image: "{{ dumbassets_image_name }}:{{ dumbassets_image_tag }}"
        pull: true
        volumes:
          - "{{ dumbassets_data_directory }}:/app/data"
        ports:
          - "{{ dumbassets_port_http }}:3000"
        env:
          NODE_ENV: "{{ dumbassets_node_env }}"
          DEBUG: "{{ dumbassets_debug }}"
          SITE_TITLE: "{{ dumbassets_site_title }}"
          BASE_URL: "{{ dumbassets_base_url }}"
          DUMBASSETS_PIN: "{{ dumbassets_pin }}"
          ALLOWED_ORIGINS: "{{ dumbassets_allowed_origins }}"
          DEMO_MODE: "{{ dumbassets_demo_mode }}"
          APPRISE_URL: "{{ dumbassets_apprise_url }}"
          CURRENCY_CODE: "{{ dumbassets_currency_code}}"
          CURRENCY_LOCALE: "{{ dumbassets_locale }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ dumbassets_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ dumbassets_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ dumbassets_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ dumbassets_dockflare_access_group }}"
          dockflare.hostname: "{{ dumbassets_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ dumbassets_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ dumbassets_homepage_group }}"
          homepage.icon: "{{ dumbassets_homepage_icon }}"
          homepage.href: "{{ dumbassets_homepage_href }}"
          homepage.description: "{{ 'A Stupid Simple Asset Tracker' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ dumbassets_container_name }}"
          homepage.showStats: "{{ dumbassets_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ dumbassets_port_http }}"
          repliqate.enabled: "{{ dumbassets_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ dumbassets_repliqate_engine }}"
          repliqate.schedule: "{{ dumbassets_repliqate_schedule }}"
          repliqate.backup_id: "{{ dumbassets_repliqate_backup_id }}"
          repliqate.retention: "{{ dumbassets_repliqate_retention }}"
          traefik.enable: "{{ dumbassets_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.dumbassets.rule: "Host(`{{ dumbassets_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.dumbassets.tls.certresolver: "letsencrypt"
          traefik.http.routers.dumbassets.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.dumbassets.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.dumbassets.middlewares: "dumbassets@docker{{ ',tinyauth-auth@docker' if dumbassets_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.dumbassets.IPAllowList.sourcerange: "{{ dumbassets_traefik_whitelist }}"
          traefik.http.services.dumbassets.loadbalancer.server.port: "3000"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/dumbwareio/dumbassets"
        cpu_shares: "{{ dumbassets_cpu_shares }}"
        memory: "{{ dumbassets_memory }}"
        memory_swap: "{{ dumbassets_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (dumbassets_port_http | string)] +
                (['https://' + dumbassets_hostname + '.' + ansible_nas_domain] if (dumbassets_traefik_enabled is true or dumbassets_dockflare_enabled is true) else [])
              }}
  when: dumbassets_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ dumbassets_container_name }}"
        state: absent
  when: dumbassets_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ dumbassets_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - dumbassets_enabled is false