---
- name: Start {{ vfd_proper_name }}
  block:
    - name: Create {{ vfd_proper_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ vfd_data_directory }}"
        - "{{ vfd_data_directory }}/data"

    - name: Set {{ vfd_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        vfd_homepage_href: "https://{{ vfd_hostname }}.{{ ansible_nas_domain }}"
      when: vfd_traefik_enabled | bool or vfd_dockflare_enabled | bool

    - name: Create {{ vfd_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ vfd_container_name }}"
        hostname: "{{ vfd_container_name }}"
        image: "{{ vfd_image_name }}:{{ vfd_image_tag }}"
        pull: true
        volumes:
          - "{{ vfd_data_directory }}/data:/app/data"
        ports:
          - "{{ vfd_port_http }}:{{ vfd_port_http }}"
        env:
          VFD_DATABASE: "/app/data/vfd.sqlite"
          VFD_SCRAPPER_START_DATES: "{{ vfd_scrapper_start_dates }}"
          VFD_SCRAPPER_END_DATES: "{{ vfd_scapper_end_dates }}"
          VFD_SCRAPPER_DEPARTURE_AIRPORTS: "{{ vfd_scapper_departure_airports }}"
          VFD_SCRAPPER_ARRIVAL_AIRPORTS: "{{ vfd_scapper_arrival_airports }}"
          VFD_SCRAPPER_INTERVAL: "{{ vfd_scrapper_interval }}"
          VFD_SCRAPPER_NOTIFICATION_URLS: "{{ vfd_scrapper_notification_urls }}"
          VFD_SCRAPPER_VERBOSE: "{{ vfd_scrapper_verbose }}"
          VFD_DASHBOARD_HOST: "0.0.0.0"
          VFD_DASHBOARD_PORT: "{{ vfd_port_http }}"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: "{{ vfd_healthcheck_test }}"
          interval: "{{ vfd_healthcheck_interval }}"
          timeout: "{{ vfd_healthcheck_timeout }}"
          retries: "{{ vfd_healthcheck_retries }}"
          start_period: "{{ vfd_healthcheck_start_period }}"
        labels:
          autoheal: "{{ vfd_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ vfd_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ vfd_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ vfd_dockflare_access_group }}"
          dockflare.hostname: "{{ vfd_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ vfd_port_http }}"
          homepage.name: "{{ vfd_proper_name }}"
          homepage.group: "{{ vfd_homepage_group }}"
          homepage.href: "{{ vfd_homepage_href }}"
          homepage.icon: "{{ vfd_homepage_icon }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ vfd_port_http }}"
          homepage.description: "{{ 'A small flight price tracking script' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ vfd_container_name }}"
          homepage.showStats: "{{ vfd_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ vfd_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ vfd_repliqate_engine }}"
          repliqate.schedule: "{{ vfd_repliqate_schedule }}"
          repliqate.backup_id: "{{ vfd_repliqate_backup_id }}"
          repliqate.retention: "{{ vfd_repliqate_retention }}"
          traefik.enable: "{{ vfd_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.vfd.rule: "Host(`{{ vfd_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.vfd.tls.certresolver: "letsencrypt"
          traefik.http.routers.vfd.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.vfd.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.vfd.middlewares: "vfd@docker{{ ',tinyauth-auth@docker' if vfd_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.vfd.IPAllowList.sourcerange: "{{ vfd_traefik_whitelist }}"
          traefik.http.services.vfd.loadbalancer.server.port: "{{ vfd_port_http }}"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/kiinami/vfd/pkgs/container/vfd"
        cpu_shares: "{{ vfd_cpu_shares }}"
        memory: "{{ vfd_memory }}"
        memory_swap: "{{ vfd_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ vfd_proper_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (vfd_port_http | string)] +
                (['https://' + vfd_hostname + '.' + ansible_nas_domain] if (vfd_traefik_enabled is true or vfd_dockflare_enabled is true) else [])
              }}
  when: vfd_enabled is true

- name: Stop {{ vfd_proper_name }}
  block:
    - name: Stop {{ vfd_proper_name }} Container
      community.docker.docker_container:
        name: "{{ vfd_container_name }}"
        state: absent
  when: vfd_enabled is false

- name: Data Archive {{ vfd_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ vfd_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - vfd_enabled is false