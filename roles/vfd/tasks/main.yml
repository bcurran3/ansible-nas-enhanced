---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ vfd_data_directory }}"
        - "{{ vfd_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ vfd_container_name }}"
        hostname: "{{ vfd_container_name }}"
        image: "{{ vfd_image_name }}:{{ vfd_image_tag }}"
        pull: true
        volumes:
          - "{{ vfd_data_directory }}/data:/app/data"
        ports:
          - "{{ vfd_port_http }}:{{ vfd_port_http }}"
        env:
          VFD_DATABASE: "/app/data/vfd.sqlite"
          VFD_SCRAPPER_START_DATES: "{{ vfd_scrapper_start_dates }}"
          VFD_SCRAPPER_END_DATES: "{{ vfd_scapper_end_dates }}"
          VFD_SCRAPPER_DEPARTURE_AIRPORTS: "{{ vfd_scapper_departure_airports }}"
          VFD_SCRAPPER_ARRIVAL_AIRPORTS: "{{ vfd_scapper_arrival_airports }}"
          VFD_SCRAPPER_INTERVAL: "{{ vfd_scrapper_interval }}"
          VFD_SCRAPPER_NOTIFICATION_URLS: "{{ vfd_scrapper_notification_urls }}"
          VFD_SCRAPPER_VERBOSE: "{{ vfd_scrapper_verbose }}"
          VFD_DASHBOARD_HOST: "0.0.0.0"
          VFD_DASHBOARD_PORT: "{{ vfd_port_http }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ vfd_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ vfd_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ vfd_homepage_group }}"
          homepage.href: "{{ vfd_homepage_href }}"
          homepage.icon: "{{ vfd_homepage_icon }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ vfd_port_http }}"
          homepage.description: "{{ 'VFD is a small service that tracks the price of flights on Google Flights, stores the historical data, allows you to view it in a simple web interface, and sends notifications when there is a new best price.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ vfd_container_name }}"
          homepage.showStats: "{{ vfd_homepage_showStats }}"
          traefik.enable: "{{ vfd_available_externally | string }}"
          traefik.http.routers.vfd.rule: "Host(`{{ vfd_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.vfd.tls.certresolver: "letsencrypt"
          traefik.http.routers.vfd.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.vfd.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ vfd_hostname }}"
          traefik.http.routers.vfd.middlewares: "{{ vfd_hostname }}@docker"
          traefik.http.middlewares.vfd.IPAllowList.sourcerange: "{{ vfd_traefik_whitelist }}"
          traefik.http.services.vfd.loadbalancer.server.port: "{{ vfd_port_http }}"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/kiinami/vfd/releases/tag/$${major}.$${minor}.$${patch}"
        cpu_shares: "{{ vfd_cpu_shares }}"
        memory: "{{ vfd_memory }}"
        restart_policy: unless-stopped
  when: vfd_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ vfd_container_name }}"
        state: absent
  when: vfd_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ vfd_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ vfd_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: vfd_enabled is false and archive_app_data_enabled is true
