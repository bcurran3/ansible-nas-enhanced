---
# ANE
ansible_nas_app_name: "VFD"
vfd_enabled: false
vfd_traefik_enabled: false
vfd_traefik_whitelist: "{{ lan }}"

# directories
vfd_data_directory: "{{ docker_home }}/vfd"

# network
vfd_hostname: "vfd"
vfd_port_http: "4242"

# docker
vfd_container_name: "vfd"
vfd_image_name: "ghcr.io/kiinami/vfd"
vfd_image_tag: "latest"

# specs
vfd_cpu_shares: 1024
vfd_memory: "1G"
vfd_memory_swap: -1

# settings
# Comma separated list of start dates (in YYYY-MM-DD format)
vfd_scrapper_start_dates: "2025-01-01"
# Comma separated list of end dates (in YYYY-MM-DD format)
vfd_scapper_end_dates: "2025-12-31"
# Comma separated list of departure airports (in three-letter code format)
vfd_scapper_departure_airports: "LAX"
# Comma separated list of arrival airports (in three-letter code format)
vfd_scapper_arrival_airports: "JFK"
# (optional) Interval in seconds between each request to the API to avoid being banned. Default is 60 seconds. Set it to 0 to disable the interval.
vfd_scrapper_interval: "60"
# Apprise notification URLs (comma separated) (for more info, check https://github.com/caronc/apprise?tab=readme-ov-file#supported-notifications)
vfd_scrapper_notification_urls: ""
# Enable verbose logging
vfd_scrapper_verbose: "true"

# autoheal
vfd_autoheal_enabled: false

# dockflare
vfd_dockflare_enabled: false
vfd_dockflare_access_group: ""

# homepage
vfd_homepage_group: "Apps"
vfd_homepage_icon: "mdi-airplane"
vfd_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ vfd_port_http }}"
vfd_homepage_showstats: false

# repliqate
vfd_repliqate_enabled: false
vfd_repliqate_engine: "restic"
vfd_repliqate_schedule: "@daily 3am"
vfd_repliqate_backup_id: "{{ vfd_container_name }}"
vfd_repliqate_retention: "30d"

# tinyauth
vfd_tinyauth_enabled: false

# watchtower
vfd_watchtower_enabled: false
