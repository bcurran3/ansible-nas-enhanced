---
# ANE
ansible_nas_app_name: "ddns-route53"
route53_enabled: false
route53_data_directory: "{{ docker_home }}/route53_ddns"

# AWS access credentials
route53_key_id: "{{ mandatory }}"
route53_secret_key: "{{ mandatory }}"

# Managed DNS zone ID
route53_hosted_zone_id: "{{ mandatory }}"

# The hostname to update
route53_host: "*.{{ ansible_nas_domain }}"

# The Time-To-Live for the DNS entry
route53_ttl: 600

# The CRON string schedule for checking and updating
route53_schedule: "*/30 * * * *"

# Container
route53_cpu_shares: 1024
route53_memory: "512M"

route53_container_name: "route53-ddns"
route53_image_name: "ghcr.io/crazy-max/ddns-route53"
route53_image_version: "latest"

# autoheal
route53_autoheal: "false"

# homepage
route53_homepage_group: "Apps"
route53_homepage_icon: "route53.png"
route53_homepage_showstats: "false"

# watchtower
route53_watchtower_enable: "false"