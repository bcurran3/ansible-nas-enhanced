---
# ANE
ansible_nas_app_name: "Koillection"
koillection_enabled: false
koillection_available_externally: "false"
koillection_traefik_whitelist: "{{ lan }}"

# network
koillection_port_http: "3030"
koillection_hostname: "koillection"
koillection_data_directory: "{{ docker_home }}/koillection"

# docker
koillection_container_name: "koillection"
koillection_image_name: "koillection/koillection"
koillection_image_tag: "latest"
koillection_db_container_name: "koillection-db"
koillection_db_image_name: "postgres"
koillection_db_image_tag: "16-alpine"

# specs
koillection_cpu_shares: 1024
koillection_memory: "1G"
koillection_memory_swap: -1
koillection_db_cpu_shares: 1024
koillection_db_memory: "1G"
koillection_db_memory_swap: "{{ koillection_db_memory }}"

# app
koillection_app_secret: "topsecret"

# autoheal
koillection_autoheal: "false"
koillection_db_autoheal: "false"

# dockflare
koillection_dockflare_tunnel: "false"
koillection_dockflare_access_group: ""

# homepage
koillection_homepage_group: "Apps"
koillection_homepage_icon: "koillection.png"
koillection_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ koillection_port_http }}"
koillection_homepage_showstats: "false"
koillection_db_homepage_group: "DBs"
koillection_db_homepage_icon: "postgres.png"
koillection_db_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ koillection_port_http }}"
koillection_db_homepage_showstats: "false"

# repliqate
koillection_repliqate_enabled: "false"
koillection_repliqate_engine: "restic"
koillection_repliqate_schedule: "@daily 3am"
koillection_repliqate_backup_id: "{{ koillection_container_name }}"
koillection_repliqate_retention: "30d"
koillection_db_repliqate_enabled: "false"
koillection_db_repliqate_engine: "restic"
koillection_db_repliqate_schedule: "@daily 3am"
koillection_db_repliqate_backup_id: "{{ koillection_db_container_name }}"
koillection_db_repliqate_retention: "30d"

# tinyauth
koillection_tinyauth_enabled: false

# watchtower
koillection_watchtower_enable: "false"
koillection_db_watchtower_enable: "false"
