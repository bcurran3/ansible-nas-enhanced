---
# ANE
ansible_nas_app_name: "Hammond"
hammond_enabled: false
hammond_traefik_enabled: false
hammond_traefik_whitelist: "{{ lan }}"

# network
hammond_port_http: "3041"
hammond_hostname: "hammond"

hammond_data_directory: "{{ docker_home }}/hammond"

# docker
hammond_container_name: "hammond"
hammond_image_name: "ghcr.io/alfhou/hammond"
hammond_image_tag: "latest"

# specs
hammond_cpu_shares: 1024
hammond_memory: "1G"
hammond_memory_swap: -1

# app
hammond_secret: "76djyx0bkHqeBTqA6NFpWIefcPtqORfK"

# autoheal
hammond_autoheal_enabled: false

# dockflare
hammond_dockflare_enabled: false
hammond_dockflare_access_group: ""

# homepage
hammond_homepage_group: "Apps"
hammond_homepage_icon: "hammond-light.png" # hammond.png for dark icon
hammond_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ hammond_port_http }}"
hammond_homepage_showstats: false

# repliqate
hammond_repliqate_enabled: false
hammond_repliqate_engine: "restic"
hammond_repliqate_schedule: "@daily 3am"
hammond_repliqate_backup_id: "{{ hammond_container_name }}"
hammond_repliqate_retention: "30d"

# tinyauth
hammond_tinyauth_enabled: false

# watchtower
hammond_watchtower_enabled: false
