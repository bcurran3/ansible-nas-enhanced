---
# ANE
ansible_nas_app_name: "stats stack"
stats_enabled: false
stats_grafana_traefik_enabled: false
stats_grafana_traefik_whitelist: "{{ lan }}"
stats_internet_speed_test_enabled: false
stats_prometheus_traefik_enabled: false
stats_prometheus_traefik_whitelist: "{{ lan }}"

# directories
stats_telegraf_config_directory: "{{ docker_home }}/stats/telegraf/config"
stats_prometheus_data_directory: "{{ docker_home }}/stats/prometheus/data"
stats_prometheus_config_directory: "{{ docker_home }}/stats/prometheus/config"
stats_grafana_data_directory: "{{ docker_home }}/stats/grafana/data"
stats_grafana_config_directory: "{{ docker_home }}/stats/grafana/config"

# network
stats_grafana_port: "3002"
stats_grafana_hostname: "grafana"
stats_hddtemp_port: "7634"
stats_prometheus_port: "9090"
stats_prometheus_smartctl_port: "9902"
stats_prometheus_hostname: "prometheus"
stats_speedtest_exporter_port: "9798"
stats_telegraf_port: "9273"
stats_telegraf_influxdb_port: "8086"

# docker:
stats_grafana_container_name: "stats-grafana"
stats_grafana_image_name: "grafana/grafana"
stats_grafana_image_version: "latest"
stats_hddtemp_container_name: "stats-hddtemp"
stats_hddtemp_docker_image_name: "modem7/hddtemp-docker"
stats_hddtemp_docker_image_tag: "latest"
stats_prometheus_container_name: "stats-prometheus"
stats_prometheus_image_name: "prom/prometheus"
stats_prometheus_image_version: "latest"
stats_smartctl_container_name: "stats-smartctl"
stats_smartctl_docker_image_name: "matusnovak/prometheus-smartctl"
stats_smartctl_docker_image_version: "latest"
stats_speedtest_container_name: "stats-speedtest"
stats_speedtest_docker_image_name: "miguelndecarvalho/speedtest-exporter"
stats_speedtest_docker_image_version: "latest"
stats_telegraf_container_name: "stats-telegraf"
stats_telegraf_image_name: "telegraf"
stats_telegraf_image_version: "latest"

# specs
stats_grafana_cpu_shares: 1024
stats_grafana_memory: "1G"
stats_grafana_memory_swap: -1
stats_hddtemp_cpu_shares: 1024
stats_hddtemp_memory: "128M"
stats_hddtemp_memory_swap: -1
stats_prometheus_cpu_shares: 1024
stats_prometheus_memory: "1G"
stats_prometheus_memory_swap: -1
stats_prometheus_smartctl_cpu_shares: 1024
stats_prometheus_smartctl_memory: "1G"
stats_prometheus_smartctl_memory_swap: -1
stats_speedtest_exporter_cpu_shares: 1024
stats_speedtest_exporter_memory: "256M"
stats_speedtest_exporter_memory_swap: -1
stats_telegraf_cpu_shares: 1024
stats_telegraf_memory: "1G"
stats_telegraf_memory_swap: -1

# config
stats_collection_interval: 15s
stats_prometheus_retention_time: 365d
stats_prometheus_retention_size: 30GB
stats_speedtest_collection_interval: 1h
watchtower_collection_interval: 5s

# uncomment to scrape more hosts
# stats_prometheus_additional_hosts:
#  - 192.168.1.1:9100

# uncomment to scrape metrics from HomeAssistant. You'll need to create a long lived access token.
# stats_hass_long_lived_access_token: addfasdfasdf

# autoheal
stats_grafana_autoheal_enabled: false
stats_hddtemp_autoheal_enabled: false
stats_prometheus_autoheal_enabled: false
stats_smartctl_autoheal_enabled: false
stats_speedtest_autoheal_enabled: false
stats_telegraf_autoheal_enabled: false

# dockflare
stats_grafana_dockflare_enabled: false
stats_grafana_dockflare_access_group: ""
stats_prometheus_dockflare_enabled: false
stats_prometheus_dockflare_access_group: ""

# healthcheck
stats_grafana_healthcheck_interval: 30s
stats_grafana_healthcheck_timeout: 10s
stats_grafana_healthcheck_retries: 3
stats_grafana_healthcheck_start_period: 30s
stats_hddtemp_healthcheck_test: ["CMD-SHELL", "nc -z 127.0.0.1 7634 || exit 1"]
stats_hddtemp_healthcheck_interval: 30s
stats_hddtemp_healthcheck_timeout: 5s
stats_hddtemp_healthcheck_retries: 3
stats_hddtemp_healthcheck_start_period: 10s
stats_prometheus_healthcheck_test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:9090/-/healthy || exit 1"]
stats_prometheus_healthcheck_interval: 30s
stats_prometheus_healthcheck_timeout: 10s
stats_prometheus_healthcheck_retries: 3
stats_prometheus_healthcheck_start_period: 20s
stats_smartctl_healthcheck_test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:9902/metrics || exit 1"]
stats_smartctl_healthcheck_interval: 30s
stats_smartctl_healthcheck_timeout: 5s
stats_smartctl_healthcheck_retries: 3
stats_smartctl_healthcheck_start_period: 15s
stats_speedtest_healthcheck_test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:{{ stats_speedtest_exporter_port }}/metrics || exit 1"]
stats_speedtest_healthcheck_interval: 60s
stats_speedtest_healthcheck_timeout: 10s
stats_speedtest_healthcheck_retries: 3
stats_speedtest_healthcheck_start_period: 20s
stats_telegraf_healthcheck_test: ["CMD-SHELL", "telegraf --version || exit 1"]
stats_telegraf_healthcheck_interval: 30s
stats_telegraf_healthcheck_timeout: 5s
stats_telegraf_healthcheck_retries: 3
stats_telegraf_healthcheck_start_period: 15s

# homepage
stats_grafana_homepage_group: "Apps"
stats_grafana_homepage_icon: "grafana.png"
stats_grafana_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ stats_grafana_port }}"
stats_grafana_homepage_showstats: false
stats_grafana_homepage_widget_username: ""
stats_grafana_homepage_widget_password: ""
stats_grafana_homepage_widget_alerts: "grafana"
stats_grafana_homepage_widget_version: "2"
stats_hddtemp_homepage_group: "Misc"
stats_hddtemp_homepage_icon: "mdi-harddisk"
stats_hddtemp_homepage_showstats: false
stats_prometheus_homepage_group: "Apps"
stats_prometheus_homepage_icon: "prometheus.png"
stats_prometheus_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ stats_prometheus_port }}"
stats_prometheus_homepage_showstats: false
stats_smartctl_homepage_group: "Misc"
stats_smartctl_homepage_icon: "prometheus.png"
stats_smartctl_homepage_href: "{{ stats_prometheus_homepage_href }}"
stats_smartctl_homepage_showstats: false
stats_speedtest_homepage_group: "Misc"
stats_speedtest_homepage_icon: "si-speedtest"
stats_speedtest_homepage_showstats: false
stats_telegraf_homepage_group: "Misc"
stats_telegraf_homepage_icon: "telegraf.png"
stats_telegraf_homepage_showstats: false

# tinyauth
stats_grafana_tinyauth_enabled: false
stats_prometheus_tinyauth_enabled: false

# watchtower
stats_grafana_watchtower_enabled: false
stats_hddtemp_watchtower_enabled: false
stats_prometheus_watchtower_enabled: false
stats_smartctl_watchtower_enabled: false
stats_speedtest_watchtower_enabled: false
stats_telegraf_watchtower_enabled: false
