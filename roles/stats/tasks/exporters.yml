---
- name: Start Exporters
  block:
    - name: Create prometheus-smartctl Docker Container
      community.docker.docker_container:
        name: "{{ stats_smartctl_container_name }}"
        hostname: "{{ stats_smartctl_container_name }}"
        image: "{{ stats_smartctl_docker_image_name }}:{{ stats_smartctl_docker_image_version }}"
        pull: true
        privileged: true
        ports:
          - "{{ stats_prometheus_smartctl_port }}:9902"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ stats_smartctl_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ stats_smartctl_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "prometheus-smartctl"
          homepage.group: "{{ stats_smartctl_homepage_group }}"
          homepage.icon: "{{ stats_smartctl_homepage_icon }}"
          homepage.href: "{{ stats_smartctl_homepage_href }}"
          homepage.description: "{{ 'HDD S.M.A.R.T exporter for Prometheus written in Python' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ stats_smartctl_container_name }}"
          homepage.showStats: "{{ stats_smartctl_homepage_showstats }}"
          traefik.enable: "false"
          wud.tag.include: '^v?\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/matusnovak/prometheus-smartctl"
        cpu_shares: "{{ stats_prometheus_smartctl_cpu_shares }}"
        memory: "{{ stats_prometheus_smartctl_memory }}"
        restart_policy: unless-stopped

    - name: Create HDDTemp Docker Container
      community.docker.docker_container:
        name: "{{ stats_hddtemp_container_name }}"
        hostname: "{{ stats_hddtemp_container_name }}"
        image: "{{ stats_hddtemp_docker_image_name }}:{{ stats_hddtemp_docker_image_tag }}"
        pull: true
        privileged: true
        ports:
          - "{{ stats_hddtemp_port }}:7634"
        env:
          HDDTEMP_ARGS: "-q -d -F /dev/sd*"
          TZ: "{{ ansible_nas_timezone }}"
        volumes:
          - "/dev:/dev:ro"
        labels:
          autoheal: "{{ stats_hddtemp_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ stats_hddtemp_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "HDDTemp"
          homepage.group: "{{ stats_hddtemp_homepage_group }}"
          homepage.icon: "{{ stats_hddtemp_homepage_icon }}"
          homepage.description: "{{ 'Hard disk temperature tool' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ stats_hddtemp_container_name }}"
          homepage.showStats: "{{ stats_hddtemp_homepage_showstats }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/modem7/hddtemp-docker"
        cpu_shares: "{{ stats_hddtemp_cpu_shares }}"
        memory: "{{ stats_hddtemp_memory }}"
        restart_policy: unless-stopped

    - name: Create Speedtest-Exporter Docker Container
      community.docker.docker_container:
        name: "{{ stats_speedtest_container_name }}"
        hostname: "{{ stats_speedtest_container_name }}"
        image: "{{ stats_speedtest_docker_image_name }}:{{ stats_speedtest_docker_image_version }}"
        pull: true
        ports:
          "{{ stats_speedtest_exporter_port }}:9798"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ stats_speedtest_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ stats_speedtest_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "Speedtest-Exporter"
          homepage.group: "{{ stats_speedtest_homepage_group }}"
          homepage.icon: "{{ stats_speedtest_homepage_icon }}"
          homepage.href: "{{ stats_speedtest_homepage_href }}"
          homepage.description: "{{ 'Speedtest Exporter made in python using the official speedtest bin' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ stats_speedtest_container_name }}"
          homepage.showStats: "{{ stats_speedtest_homepage_showstats }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/miguelndecarvalho/speedtest-exporter"
        cpu_shares: "{{ stats_speedtest_exporter_cpu_shares }}"
        memory: "{{ stats_speedtest_exporter_memory }}"
        restart_policy: unless-stopped
      when: stats_internet_speed_test_enabled
  when: stats_enabled is true

- name: Stop Exporters
  block:
    - name: Stop smartctl_exporter
      community.docker.docker_container:
        name: "{{ stats_smartctl_container_name }}"
        state: absent

    - name: Stop Hddtemp
      community.docker.docker_container:
        name: "{{ stats_hddtemp_container_name }}"
        state: absent

    - name: Stop Speedtest-Exporter
      community.docker.docker_container:
        name: "{{ stats_speedtest_container_name }}"
        state: absent
  when: stats_enabled is false
