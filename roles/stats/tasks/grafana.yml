---
- name: Start Grafana
  block:
    - name: Create Grafana Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "472"
        recurse: yes
      changed_when: false
      with_items:
        - "{{ stats_grafana_data_directory }}"
        - "{{ stats_grafana_data_directory }}"
        - "{{ stats_grafana_data_directory }}/dashboards"
        - "{{ stats_grafana_data_directory }}/provisioning/datasources"
        - "{{ stats_grafana_data_directory }}/provisioning/dashboards"

    - name: Template Grafana data source
      ansible.builtin.template:
        src: datasources/ansible-nas.yml
        dest: "{{ stats_grafana_data_directory }}/provisioning/datasources/ansible-nas.yml"

    - name: Copy Grafana dashboards configuration
      ansible.builtin.copy:
        src: dashboards/ansible-nas.yml
        dest: "{{ stats_grafana_data_directory }}/provisioning/dashboards/ansible-nas.yml"

    - name: Copy Grafana Ansible-NAS dashboard
      ansible.builtin.copy:
        src: dashboards/ansible-nas-overview.json
        dest: "{{ stats_grafana_data_directory }}/dashboards/ansible-nas-overview.json"

    - name: Create Grafana Docker Container
      community.docker.docker_container:
        name: "{{ stats_grafana_container_name }}"
        hostname: "{{ stats_grafana_container_name }}"
        image: "{{ stats_grafana_image_name }}:{{ stats_grafana_image_version }}"
        pull: true
        volumes:
          - "{{ stats_grafana_data_directory }}:/var/lib/grafana:rw"
          - "{{ stats_grafana_data_directory }}/provisioning:/etc/grafana/provisioning:ro"
          - "{{ stats_grafana_data_directory }}/dashboards:/etc/dashboards:ro"
        ports:
          - "{{ stats_grafana_port }}:3000"
        env:
          GF_PLUGINS_ENABLE_ALPHA: "true"
          GF_UNIFIED_ALERTING_ENABLED: "true"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ stats_grafana_autoheal | string }}"
          com.centurylinklabs.watchtower.enable: "{{ stats_grafana_watchtower_enabled| string }}"
          dockflare.enable: "{{ stats_grafana_dockflare_enabled | string }}"
          dockflare.access.group: "{{ stats_grafana_dockflare_access_group }}"
          dockflare.hostname: "{{ stats_grafana_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ stats_grafana_port }}"
          homepage.group: "{{ stats_grafana_homepage_group }}"
          homepage.name: "Grafana"
          homepage.icon: "{{ stats_grafana_homepage_icon }}"
          homepage.href: "{{ stats_grafana_homepage_href }}"
          homepage.description: "{{ 'Dashboards and centralized observability.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ stats_grafana_container_name }}"
          homepage.showStats: "{{ stats_grafana_homepage_showstats | string }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ stats_grafana_port }}"
          homepage.widget.type: "grafana"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ stats_grafana_port }}"
          homepage.widget.username: "{{ stats_grafana_homepage_widget_username }}"
          homepage.widget.password: "{{ stats_grafana_homepage_widget_password }}"
          homepage.widget.alerts: "{{ stats_grafana_homepage_widget_alerts }}"
          homepage.widget.version: "{{ stats_grafana_homepage_widget_version }}"
          traefik.enable: "{{ stats_grafana_available_externally | string }}"
          traefik.http.routers.statsgrafana.rule: "Host(`{{ stats_grafana_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.statsgrafana.tls.certresolver: "letsencrypt"
          traefik.http.routers.statsgrafana.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.statsgrafana.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.statsgrafana.middlewares: "statsgrafana@docker{{ ',tinyauth-auth@docker' if stats_grafana_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.statsgrafana.IPAllowList.sourcerange: "{{ stats_grafana_traefik_whitelist }}"
          traefik.http.services.grafana.loadbalancer.server.port: "3000"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/grafana/grafana"
        cpu_shares: "{{ stats_grafana_cpu_shares }}"
        memory: "{{ stats_grafana_memory}}"
        restart_policy: unless-stopped

    - name: Access Grafana at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (stats_grafana_port | string)] +
                (['https://' + stats_grafana_hostname + '.' + ansible_nas_domain] if (stats_grafana_available_externally is true or stats_grafana_dockflare_enabled is true) else [])
              }}
  when: stats_enabled is true

- name: Stop Grafana
  block:
    - name: Stop Grafana
      community.docker.docker_container:
        name: "{{ stats_grafana_container_name }}"
        state: absent
  when: stats_enabled is false
