---
- name: Start Grafana
  block:
    - name: Create Grafana Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "472"
        recurse: yes
      changed_when: false
      with_items:
        - "{{ stats_grafana_data_directory }}"
        - "{{ stats_grafana_config_directory }}"
        - "{{ stats_grafana_config_directory }}/dashboards"
        - "{{ stats_grafana_config_directory }}/provisioning/datasources"
        - "{{ stats_grafana_config_directory }}/provisioning/dashboards"

    - name: Template Grafana data source
      ansible.builtin.template:
        src: datasources/ansible-nas.yml
        dest: "{{ stats_grafana_config_directory }}/provisioning/datasources/ansible-nas.yml"

    - name: Copy Grafana dashboards configuration
      ansible.builtin.copy:
        src: dashboards/ansible-nas.yml
        dest: "{{ stats_grafana_config_directory }}/provisioning/dashboards/ansible-nas.yml"

    - name: Copy Grafana Ansible-NAS dashboard
      ansible.builtin.copy:
        src: dashboards/ansible-nas-overview.json
        dest: "{{ stats_grafana_config_directory }}/dashboards/ansible-nas-overview.json"

    - name: Grafana Docker Container
      community.docker.docker_container:
        name: "{{ stats_grafana_container_name }}"
        hostname: "{{ stats_grafana_container_name }}"
        image: "{{ stats_grafana_image_name }}:{{ stats_grafana_image_version }}"
        pull: true
        volumes:
          - "{{ stats_grafana_data_directory }}:/var/lib/grafana:rw"
          - "{{ stats_grafana_config_directory }}/provisioning:/etc/grafana/provisioning:ro"
          - "{{ stats_grafana_config_directory }}/dashboards:/etc/dashboards:ro"
        ports:
          - "{{ stats_grafana_port }}:3000"
        env:
          GF_PLUGINS_ENABLE_ALPHA: "true"
          GF_UNIFIED_ALERTING_ENABLED: "true"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ stats_grafana_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ stats_grafana_watchtower_enable }}"
          dockflare.enable: "{{ stats_grafana_dockflare_tunnel }}"
          dockflare.access.group: "{{ stats_grafana_dockflare_access_group }}"
          dockflare.hostname: "{{ stats_grafana_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ stats_grafana_port }}"
          homepage.group: "{{ stats_grafana_homepage_group }}"
          homepage.name: "Grafana"
          homepage.icon: "{{ stats_grafana_homepage_icon }}"
          homepage.href: "{{ stats_grafana_homepage_href }}"
          homepage.description: "{{ 'Dashboards and centralized observability.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ stats_grafana_container_name }}"
          homepage.showStats: "{{ stats_grafana_homepage_showstats }}"
          traefik.enable: "{{ stats_grafana_available_externally | string }}"
          traefik.http.routers.grafana.rule: "Host(`grafana.{{ ansible_nas_domain }}`) "
          traefik.http.routers.grafana.tls.certresolver: "letsencrypt"
          traefik.http.routers.grafana.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.grafana.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ stats_grafana_hostname }}"
          traefik.http.routers.grafana.middlewares: "{{ stats_grafana_hostname }}@docker"
          traefik.http.middlewares.grafana.IPAllowList.sourcerange: "{{ stats_grafana_traefik_whitelist }}"
          traefik.http.services.grafana.loadbalancer.server.port: "3000"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/grafana/grafana"
        cpu_shares: "{{ grafana_cpu_shares }}"
        memory: "{{ grafana_memory}}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (stats_grafana_port | string)] +
                (['https://' + stats_grafana_hostname + '.' + ansible_nas_domain] if (stats_grafana_available_externally is true or stats_grafana_dockflare_tunnel is true) else [])
              }}
  when: stats_enabled is true

- name: Stop Grafana
  block:
    - name: Stop Grafana
      community.docker.docker_container:
        name: "{{ stats_grafana_container_name }}"
        state: absent
  when: stats_enabled is false

- name: Data Archive Grafana
  block:
    - name: Check for Grafana Data Directory
      stat:
        path: "{{ stats_grafana_data_directory }}"
      register: dir_stat

    - name: Archive Grafana Data Directory
      ansible.builtin.archive:
        path: "{{ stats_grafana_data_directory }}"
        dest: "{{ docker_home }}/grafana.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: stats_enabled is false and archive_app_data_enabled is true
