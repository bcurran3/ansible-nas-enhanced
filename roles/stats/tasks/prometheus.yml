---
- name: Start Prometheus
  block:
    - name: Create Prometheus Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: 0777
      with_items:
        - "{{ stats_prometheus_data_directory }}"
        - "{{ stats_prometheus_config_directory }}"

    - name: Set Prometheus FQDN var overrides
      ansible.builtin.set_fact:
        stats_prometheus_homepage_href: "https://{{ stats_prometheus_hostname }}.{{ ansible_nas_domain }}"
      when: stats_prometheus_traefik_enabled | bool or stats_prometheus_dockflare_enabled | bool

    - name: Template Prometheus config
      ansible.builtin.template:
        src: prometheus.yml.j2
        dest: "{{ stats_prometheus_config_directory }}/prometheus.yml"
      register: prometheus_config

    - name: Create Prometheus Docker Container
      community.docker.docker_container:
        name: "{{ stats_prometheus_container_name }}"
        hostname: "{{ stats_prometheus_container_name }}"
        image: "{{ stats_prometheus_image_name }}:{{ stats_prometheus_image_version }}"
        pull: true
        volumes:
          - "{{ stats_prometheus_config_directory }}/prometheus.yml:/etc/prometheus/prometheus.yml:ro"
          - "{{ stats_prometheus_data_directory }}:/prometheus:rw"
          - "/etc/timezone:/etc/timezone:ro"
        ports:
          - "{{ stats_prometheus_port }}:9090"
        command: "--config.file=/etc/prometheus/prometheus.yml --storage.tsdb.retention.size={{ stats_prometheus_retention_size }} --storage.tsdb.retention.time={{ stats_prometheus_retention_time }}"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: "{{ stats_prometheus_healthcheck_test }}"
          interval: "{{ stats_prometheus_healthcheck_interval }}"
          timeout: "{{ stats_prometheus_healthcheck_timeout }}"
          retries: "{{ stats_prometheus_healthcheck_retries }}"
          start_period: "{{ stats_prometheus_healthcheck_start_period }}"
        labels:
          autoheal: "{{ stats_prometheus_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ stats_prometheus_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ stats_prometheus_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ stats_prometheus_dockflare_access_group }}"
          dockflare.hostname: "{{ stats_prometheus_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ stats_prometheus_port }}"
          homepage.group: "{{ stats_prometheus_homepage_group }}"
          homepage.name: "Prometheus"
          homepage.icon: "{{ stats_prometheus_homepage_icon }}"
          homepage.href: "{{ stats_prometheus_homepage_href }}"
          homepage.description: "{{ 'The Prometheus monitoring system and time series database.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ stats_prometheus_container_name }}"
          homepage.showStats: "{{ stats_prometheus_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ stats_prometheus_port }}"
          homepage.widget.type: "prometheus"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ stats_prometheus_port }}"
          traefik.enable: "{{ stats_prometheus_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.prometheus.rule: "Host(`{{ stats_prometheus_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.prometheus.tls.certresolver: "letsencrypt"
          traefik.http.routers.prometheus.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.prometheus.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.prometheus.middlewares: "prometheus@docker{{ ',tinyauth-auth@docker' if stats_prometheus_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.prometheus.IPAllowList.sourcerange: "{{ stats_prometheus_traefik_whitelist }}"
          traefik.http.services.prometheus.loadbalancer.server.port: "9090"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/prom/prometheus"
        cpu_shares: "{{ stats_prometheus_cpu_shares }}"
        memory: "{{ stats_prometheus_memory }}"
        memory_swap: "{{ stats_prometheus_memory_swap }}"
        restart: "{{ prometheus_config is changed }}"
        restart_policy: unless-stopped

    - name: Access Prometheus at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (stats_prometheus_port | string)] +
                (['https://' + stats_prometheus_hostname + '.' + ansible_nas_domain] if (stats_prometheus_traefik_enabled is true or stats_prometheus_dockflare_enabled is true) else [])
              }}
  when: stats_enabled is true

- name: Stop Prometheus
  block:
    - name: Stop Prometheus
      community.docker.docker_container:
        name: "{{ stats_prometheus_container_name }}"
        state: absent
  when: stats_enabled is false
