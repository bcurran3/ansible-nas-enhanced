---
- name: Check for downloaded {{ webmin_usermin_proper_name }} repo setup script
  ansible.builtin.stat:
    path: scripts/webmin-setup-repo.sh
  register: script_result

- name: Install {{ webmin_usermin_proper_name }} APT repo
  block:
    - name: Download official {{ webmin_usermin_proper_name }} setup repository script
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/webmin/webmin/master/webmin-setup-repo.sh
        dest: scripts/webmin-setup-repo.sh
        mode: '0755'

    - name: Run {{ webmin_usermin_proper_name }} setup repository script
      ansible.builtin.shell: echo y | scripts/webmin-setup-repo.sh
  when: (webmin_enabled is true or usermin_enabled is true) and not script_result.stat.exists

- ansible.builtin.import_tasks: usermin.yml
- ansible.builtin.import_tasks: webmin.yml

- name: Get file status of scripts/webmin-setup-repo.sh
  ansible.builtin.stat:
    path: scripts/webmin-setup-repo.sh
  register: repo_script_status

- name: Remove downloaded {{ webmin_usermin_proper_name }} repo setup script
  ansible.builtin.file:
    path: scripts/webmin-setup-repo.sh
    state: absent
  when: webmin_enabled is false and usermin_enabled is false and repo_script_status.stat.exists is true