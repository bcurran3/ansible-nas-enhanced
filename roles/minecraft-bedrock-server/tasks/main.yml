---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ minecraft_bedrock_server_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ minecraft_bedrock_server_container_name }}"
        hostname: "{{ minecraft_bedrock_server_container_name }}"
        image: "{{ minecraft_bedrock_server_image }}:{{ minecraft_bedrock_server_image_tag }}"
        pull: true
        volumes:
          - "{{ minecraft_bedrock_server_data_directory }}:/data:rw"
        ports:
          - "{{ minecraft_bedrock_server_port }}:19132/udp"
        env:
          EULA: "TRUE"
          SERVER_NAME: "{{ minecraft_bedrock_server_name }}"
          GAMEMODE: "{{ minecraft_bedrock_server_game_mode }}"
          DIFFICULTY: "{{ minecraft_bedrock_server_difficulty }}"
          ONLINE_MODE: "{{ minecraft_bedrock_server_online_mode }}"
          OPS: "{{ minecraft_bedrock_server_ops }}"
          MEMBERS: "{{ minecraft_bedrock_server_members }}"
          VISITORS: "{{ minecraft_bedrock_server_visitors }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ minecraft_bedrock_server_autoheal | string }}"
          com.centurylinklabs.watchtower.enable: "{{ minecraft_bedrock_server_watchtower_enabled | string }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ minecraft_bedrock_server_homepage_group }}"
          homepage.icon: "{{ minecraft_bedrock_server_homepage_icon }}"
          homepage.description: "{{ 'minecraft_bedrock_server description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ minecraft_bedrock_server_container_name }}"
          homepage.showStats: "{{ minecraft_bedrock_server_homepage_showstats | string }}"
          homepage.widget.type: "minecraft"
          homepage.widget.url: "udp://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ minecraft_bedrock_server_port }}"
          repliqate.enabled: "{{ minecraft_bedrock_server_repliqate_enabled | string }}"
          repliqate.engine: "{{ minecraft_bedrock_server_repliqate_engine }}"
          repliqate.schedule: "{{ minecraft_bedrock_server_repliqate_schedule }}"
          repliqate.backup_id: "{{ minecraft_bedrock_server_repliqate_backup_id }}"
          repliqate.retention: "{{ minecraft_bedrock_server_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/itzg/docker-minecraft-bedrock-server/pkgs/container/minecraft-bedrock-server"
        cpu_shares: "{{ minecraft_bedrock_server_cpu_shares }}"
        memory: "{{ minecraft_bedrock_server_memory }}"
        memory_swap: "{{ minecraft_bedrock_server_memory_swap }}"
        restart_policy: unless-stopped
  when: minecraft_bedrock_server_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ minecraft_bedrock_server_container_name }}"
        state: absent
  when: minecraft_bedrock_server_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ minecraft_bedrock_server_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - minecraft_bedrock_server_enabled is false