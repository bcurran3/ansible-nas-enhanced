---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ minecraft_bedrock_server_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ minecraft_bedrock_server_container_name }}"
        hostname: "{{ minecraft_bedrock_server_container_name }}"
        image: "{{ minecraft_bedrock_server_image }}"
        pull: true
        cpu_shares: "{{ minecraft_bedrock_server_cpu_shares }}"
        volumes:
          - "{{ minecraft_bedrock_server_data_directory }}:/data:rw"
        ports:
          - "{{ minecraft_bedrock_server_port }}:19132/udp"
        env:
          EULA: "TRUE"
          SERVER_NAME: "{{ minecraft_bedrock_server_name }}"
          GAMEMODE: "{{ minecraft_bedrock_server_game_mode }}"
          DIFFICULTY: "{{ minecraft_bedrock_server_difficulty }}"
          ONLINE_MODE: "{{ minecraft_bedrock_server_online_mode }}"
          OPS: "{{ minecraft_bedrock_server_ops }}"
          MEMBERS: "{{ minecraft_bedrock_server_members }}"
          VISITORS: "{{ minecraft_bedrock_server_visitors }}"
        restart_policy: unless-stopped
        labels:
          autoheal: "{{ minecraft_bedrock_server_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ minecraft_bedrock_server_watchtower_monitor_only }}"
  when: minecraft_bedrock_server_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ minecraft_bedrock_server_container_name }}"
        state: absent
  when: minecraft_bedrock_server_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ minecraft_bedrock_server_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ minecraft_bedrock_server_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: minecraft_bedrock_server_enabled is false and archive_app_data_enabled is true
