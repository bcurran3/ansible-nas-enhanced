---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ conduit_data_directory }}"
        - "{{ conduit_data_directory }}/db"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ conduit_container_name }}"
        hostname: "{{ conduit_container_name }}"
        image: "{{ conduit_image_name }}:{{ conduit_image_tag }}"
        pull: true
        env:
          CONDUIT_SERVER_NAME: "{{ conduit_hostname}}.{{ ansible_nas_domain }}"
          CONDUIT_DATABASE_PATH: "/var/lib/matrix-conduit/"
          CONDUIT_DATABASE_BACKEND: "rocksdb"
          CONDUIT_ALLOW_REGISTRATION: "true"
          CONDUIT_ALLOW_FEDERATION: "true"
          CONDUIT_MAX_REQUEST_SIZE: "20000000"
          CONDUIT_TRUSTED_SERVERS: "[\"matrix.org\"]"
          CONDUIT_MAX_CONCURRENT_REQUESTS: "100"
          CONDUIT_ADDRESS: "0.0.0.0"
          CONDUIT_CONFIG: ""
          CONDUIT_PORT: "{{ conduit_port_http }}"
          TZ: "{{ ansible_nas_timezone }}"
        volumes:
          - "{{ conduit_data_directory }}/db:/var/lib/matrix-conduit"
        ports:
          - "{{ conduit_port_http }}:6167"
        labels:
          autoheal: "{{ conduit_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ conduit_watchtower_enable }}"
          dockflare.enable: "{{ conduit_dockflare_tunnel }}"
          dockflare.access.group: "{{ conduit_dockflare_access_group }}"
          dockflare.hostname: "{{ conduit_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ conduit_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ conduit_homepage_group }}"
          homepage.href: "{{ conduit_homepage_href }}"
          homepage.icon: "{{ conduit_homepage_icon }}"
          homepage.description: "{{ 'Conduit is a simple, fast and reliable chat server powered by Matrix' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ conduit_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ conduit_container_name }}"
          homepage.showStats: "{{ conduit_homepage_showstats }}"
          repliqate.enabled: "{{ conduit_repliqate_enabled }}"
          repliqate.engine: "{{ conduit_repliqate_engine }}"
          repliqate.schedule: "{{ conduit_repliqate_schedule }}"
          repliqate.backup_id: "{{ conduit_repliqate_backup_id }}"
          repliqate.retention: "{{ conduit_repliqate_retention }}"
          traefik.enable: "{{ conduit_available_externally | string }}"
          traefik.http.routers.conduit.rule: "Host(`{{ conduit_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.conduit.tls.certresolver: "letsencrypt"
          traefik.http.routers.conduit.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.conduit.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ conduit_hostname }}"
          traefik.http.routers.conduit.middlewares: "{{ conduit_hostname }}@docker"
          traefik.http.middlewares.conduit.IPAllowList.sourcerange: "{{ conduit_traefik_whitelist }}"
          traefik.http.services.conduit.loadbalancer.server.port: "{{ conduit_port_http }}"
          wud.watch.digest: "true"
          wud.tag.include: "^latest$"
        cpu_shares: "{{ conduit_cpu_shares }}"
        memory: "{{ conduit_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (conduit_port_http | string)] +
                (['https://' + conduit_hostname + '.' + ansible_nas_domain] if (conduit_available_externally is true or conduit_dockflare_tunnel is true) else [])
              }}
  when: conduit_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ conduit_container_name }}"
        state: absent
  when: conduit_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ conduit_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ conduit_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: conduit_enabled is false and archive_app_data_enabled is true
