---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ duplicati_data_directory }}"
        - "{{ duplicati_data_directory }}/config"
        - "{{ duplicati_data_directory }}/custom-cont-init.d" # added

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ duplicati_container_name }}"
        hostname: "{{ duplicati_container_name }}"
        image: "{{ duplicati_image_name }}:{{ duplicati_image_tag }}"
        pull: true
        ports:
          - "{{ duplicati_port }}:8200"
        volumes:
          - "{{ duplicati_data_directory }}/config:/config:rw"
          - "{{ samba_shares_root }}:/source/shares:{{ duplicati_data_permissions }}"
          - "{{ docker_home }}:/source/docker:{{ duplicati_data_permissions }}"
          - "{{ duplicati_data_directory }}/custom-cont-init.d:/custom-cont-init.d:ro" # added
          - "/etc/timezone:/etc/timezone:ro"
        capabilities:
          - NET_ADMIN
          - DAC_READ_SEARCH
        env:
          DOCKER_MODS: "linuxserver/mods:universal-package-install" # added
          INSTALL_PACKAGES: "smbclient|cifs-utils" # added
          # ^^^ should make these variables
          PUID: "{{ duplicati_user_id }}"
          PGID: "{{ duplicati_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ duplicati_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ duplicati_watchtower_monitor_only }}"
          dockflare.enable: "{{ duplicati_dockflare_tunnel }}"
          dockflare.access.group: "{{ duplicati_dockflare_access_group }}"
          dockflare.hostname: "{{ duplicati_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ duplicati_port }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ duplicati_homepage_group }}"
          homepage.icon: "{{ duplicati_homepage_icon }}"
          homepage.href: "{{ duplicati_homepage_href }}"
          homepage.description: "{{ 'duplicati description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ duplicati_container_name }}"
          homepage.showStats: "{{ duplicati_homepage_showStats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ duplicati_port }}"
          traefik.enable: "{{ duplicati_available_externally | string }}"
          traefik.http.routers.duplicati.rule: "Host(`{{ duplicati_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.duplicati.tls.certresolver: "letsencrypt"
          traefik.http.routers.duplicati.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.duplicati.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ duplicati_hostname }}"
          traefik.http.routers.duplicati.middlewares: "{{ duplicati_hostname }}@docker"
          traefik.http.middlewares.duplicati.IPAllowList.sourcerange: "{{ duplicati_traefik_whitelist }}"
          traefik.http.services.duplicati.loadbalancer.server.port: "8200"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/linuxserver/duplicati"
        cpu_shares: "{{ duplicati_cpu_shares }}"
        memory: "{{ duplicati_memory }}"
        restart_policy: unless-stopped
  when: duplicati_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ duplicati_container_name }}"
        state: absent
  when: duplicati_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ duplicati_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ duplicati_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: duplicati_enabled is false and archive_app_data_enabled is true
