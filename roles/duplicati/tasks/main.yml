---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ duplicati_data_directory }}"
        - "{{ duplicati_data_directory }}/config"
        - "{{ duplicati_data_directory }}/custom-cont-init.d" # added

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ duplicati_container_name }}"
        hostname: "{{ duplicati_container_name }}"
        image: "{{ duplicati_image_name }}:{{ duplicati_image_tag }}"
        pull: true
        ports:
          - "{{ duplicati_port_http }}:8200"
        volumes:
          - "{{ duplicati_data_directory }}/config:/config:rw"
          - "{{ samba_shares_root }}:/source/shares:{{ duplicati_data_permissions }}"
          - "{{ docker_home }}:/source/docker:{{ duplicati_data_permissions }}"
          - "{{ duplicati_data_directory }}/custom-cont-init.d:/custom-cont-init.d:ro" # added
          - "/etc/timezone:/etc/timezone:ro"
        capabilities:
          - NET_ADMIN
          - DAC_READ_SEARCH
        env:
          SETTINGS_ENCRYPTION_KEY: "{{ duplicati_env_settings_encryption_key }}"
          DUPLICATI__WEBSERVICE_PASSWORD: "{{ duplicati_env_duplicati_webservice_password }}"
          CLI_ARGS: "{{ duplicati_env_cli_args }}"
          DOCKER_MODS: "{{ duplicati_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ duplicati_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ duplicati_env_docker_mods_install_pip_packages}}"
          TP_DOMAIN: "{{ duplicati_env_docker_mods_tp_domain }}"
          TP_THEME: "{{ duplicati_env_docker_mods_tp_theme }}"
          TP_COMMUNITY_THEME: "{{ duplicati_env_docker_mods_tp_community_theme }}"
          TP_ADDON: "{{ duplicati_env_docker_mods_tp_addon }}"
          PUID: "{{ duplicati_user_id }}"
          PGID: "{{ duplicati_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ duplicati_autoheal | string }}"
          com.centurylinklabs.watchtower.enable: "{{ duplicati_watchtower_enabled| string }}"
          dockflare.enable: "{{ duplicati_dockflare_enabled | string }}"
          dockflare.access.group: "{{ duplicati_dockflare_access_group }}"
          dockflare.hostname: "{{ duplicati_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ duplicati_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ duplicati_homepage_group }}"
          homepage.icon: "{{ duplicati_homepage_icon }}"
          homepage.href: "{{ duplicati_homepage_href }}"
          homepage.description: "{{ 'backup client that securely stores encrypted, incremental, compressed backups' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ duplicati_container_name }}"
          homepage.showStats: "{{ duplicati_homepage_showstats | string }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ duplicati_port_http }}"
          repliqate.enabled: "{{ duplicati_repliqate_enabled | string }}"
          repliqate.engine: "{{ duplicati_repliqate_engine }}"
          repliqate.schedule: "{{ duplicati_repliqate_schedule }}"
          repliqate.backup_id: "{{ duplicati_repliqate_backup_id }}"
          repliqate.retention: "{{ duplicati_repliqate_retention }}"
          traefik.enable: "{{ duplicati_available_externally | string }}"
          traefik.http.routers.duplicati.rule: "Host(`{{ duplicati_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.duplicati.tls.certresolver: "letsencrypt"
          traefik.http.routers.duplicati.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.duplicati.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.duplicati.middlewares: "duplicati@docker{{ ',tinyauth-auth@docker' if duplicati_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.duplicati.IPAllowList.sourcerange: "{{ duplicati_traefik_whitelist }}"
          traefik.http.services.duplicati.loadbalancer.server.port: "8200"
          wud.tag.include: '^version-\d+\.\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "lscr.io/linuxserver/duplicati"
        cpu_shares: "{{ duplicati_cpu_shares }}"
        memory: "{{ duplicati_memory }}"
        memory_swap: "{{ duplicati_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (duplicati_port_http | string)] +
                (['https://' + duplicati_hostname + '.' + ansible_nas_domain] if (duplicati_available_externally is true or duplicati_dockflare_enabled is true) else [])
              }}
  when: duplicati_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ duplicati_container_name }}"
        state: absent
  when: duplicati_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ duplicati_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - duplicati_enabled is false