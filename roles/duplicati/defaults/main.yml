---
# ANE
ansible_nas_app_name: "Duplicati"
duplicati_enabled: false
duplicati_available_externally: false
duplicati_traefik_whitelist: "{{ lan }}"

# directories
duplicati_data_directory: "{{ docker_home }}/duplicati"

# permissions
duplicati_data_permissions: "ro" # set this to rw to enable the ability to restore data

# uid / gid
duplicati_user_id: "0"
duplicati_group_id: "0"

# network
duplicati_hostname: "duplicati"
duplicati_port_http: "8200"

# docker
duplicati_container_name: "duplicati"
duplicati_image_name: "lscr.io/linuxserver/duplicati"
duplicati_image_tag: "latest"

# specs
duplicati_cpu_shares: 1024
duplicati_memory: "1G"
duplicati_memory_swap: -1

# app
duplicati_env_settings_encryption_key: "QcLoqTdBMeayBvIqbrItOBrfLP4L9g2Q"
duplicati_env_duplicati_webservice_password: "{{ ansible_nas_app_admin_password }}"
duplicati_env_cli_args: ""

# autoheal
duplicati_autoheal: "false"

# dockflare
duplicati_dockflare_tunnel: "false"
duplicati_dockflare_access_group: ""

# homepage
duplicati_homepage_group: "Apps"
duplicati_homepage_icon: "duplicati.png"
duplicati_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ duplicati_port_http }}"
duplicati_homepage_showstats: "false"

# linuxserver.io docker mods
duplicati_env_docker_mods: "linuxserver/mods:universal-package-install"
duplicati_env_docker_mods_install_packages: "smbclient|cifs-utils"
duplicati_env_docker_mods_install_pip_packages: ""

# theme.park themes
# https://docs.theme-park.dev/themes/duplicati/
duplicati_env_docker_mods_tp_theme: ""
duplicati_env_docker_mods_tp_community_theme: ""
duplicati_env_docker_mods_tp_domain: ""
duplicati_env_docker_mods_tp_addon: ""

# repliqate
duplicati_repliqate_enabled: "false"
duplicati_repliqate_engine: "restic"
duplicati_repliqate_schedule: "@daily 3am"
duplicati_repliqate_backup_id: "{{ duplicati_container_name }}"
duplicati_repliqate_retention: "30d"

# tinyauth
duplicati_tinyauth_enabled: false

# watchtower
duplicati_watchtower_enable: "false"