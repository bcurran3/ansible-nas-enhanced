---
# ANE
ansible_nas_app_name: "Duplicati"
duplicati_enabled: false
duplicati_available_externally: false
duplicatai_traefik_whitelist: "{{ lan }}"

# directories
duplicati_data_directory: "{{ docker_home }}/duplicati"

# permissions
duplicati_data_permissions: "ro" # set this to rw to enable the ability to restore data

# uid / gid
duplicati_user_id: "0"
duplicati_group_id: "0"

# network
duplicati_port: "8200"
duplicati_hostname: "duplicati"

duplicati_memory: 1g

# docker
duplicati_container_name: duplicati
duplicati_cpu_shares: 1024
duplicati_image_name: "lscr.io/linuxserver/duplicati"
duplicati_image_tag: "latest"

# autoheal
duplicati_autoheal: "false"

# dockflare
duplicati_dockflare_tunnel: "false"
duplicati_dockflare_access_group: ""

# homepage
duplicati_homepage_group: "Apps"
duplicati_homepage_icon: "duplicati.png"
duplicati_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ duplicati_port }}"
duplicati_homepage_showstats: "false"

# linuxserver.io docker mods
duplicati_env_docker_mods: "linuxserver/mods:universal-package-install"
duplicati_env_install_packages: "smbclient|cifs-utils"

# watchtower
duplicati_watchtower_enable: "false"