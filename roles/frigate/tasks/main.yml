---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ frigate_data_directory }}"
        - "{{ frigate_data_directory }}/config"
        - "{{ frigate_data_directory }}/media"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        frigate_homepage_href: "https://{{ frigate_hostname }}.{{ ansible_nas_domain }}"
      when: frigate_traefik_enabled | bool or frigate_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ frigate_container_name }}"
        hostname: "{{ frigate_container_name }}"
        image: "{{ frigate_image_name }}:{{ frigate_image_tag }}"
        pull: true
        volumes:
        - "{{ frigate_data_directory }}/config:/config"
        - "{{ frigate_data_directory }}/media:/media/frigate"
        - "/etc/localtime:/etc/localtime:ro"
#          - type: tmpfs # Optional: 1GB of memory, reduces SSD/SD Card wear
#            target: /tmp/cache
#            tmpfs:
#              size: 1000000000
        ports:
          - "{{ frigate_port_http }}:8971"
#         - "5000:5000"     # Internal unauthenticated access. Expose carefully.
          - "8554:8554"     # RTSP feeds
          - "8555:8555/tcp" # WebRTC over tcp
          - "8555:8555/udp" # WebRTC over udp
        env:
          FRIGATE_RTSP_PASSWORD: "{{ frigate_env_frigate_rtsp_password }}"
          TZ: "{{ ansible_nas_timezone }}"
        device_requests: "{{
          [{'driver': 'nvidia', 'count': -1, 'capabilities': ['gpu']}]
          if nvidia_runtime_enabled | default(false) | bool else omit
        }}"
        devices: >-
          {%- set dev_list = (app_devices | default([])) -%}
          {%- if intel_igpu_enabled | default(false) | bool or amd_gpu_enabled | default(false) | bool -%}
            {%- set _ = dev_list.append('/dev/dri:/dev/dri') -%}
          {%- endif -%}
          {%- if amd_gpu_enabled | default(false) | bool and frigate_amd_ai_enabled | default(false) | bool -%}
            {%- set _ = dev_list.append('/dev/kfd:/dev/kfd') -%}
          {%- endif -%}
          {{ dev_list if dev_list | length > 0 else omit }}
        group_add: "{{ ['render', 'video'] if (amd_gpu_enabled | default(false) | bool or intel_igpu_enabled | default(false) | bool) else omit }}"
        runtime: "{{ 'nvidia' if nvidia_runtime_enabled | default(false) | bool else omit }}"
        labels:
          autoheal: "{{ frigate_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ frigate_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ frigate_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ frigate_dockflare_access_group }}"
          dockflare.hostname: "{{ frigate_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "https://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ frigate_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ frigate_homepage_group }}"
          homepage.icon: "{{ frigate_homepage_icon }}"
          homepage.href: "{{ frigate_homepage_href }}"
          homepage.description: "{{ 'A complete and local NVR designed for Home Assistant with AI object detection.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ frigate_container_name }}"
          homepage.showStats: "{{ frigate_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "https://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ frigate_port_http }}"
          homepage.widget.type: "frigate"
          homepage.widget.url: "https://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ frigate_port_http }}"
          homepage.widget.enableRecentEvents: "{{ frigate_homepage_widget_enablerecentevents }}"
          homepage.widget.username: "{{ frigate_homepage_widget_username }}"
          homepage.widget.password: "{{ frigate_homepage_widget_password }}"
          repliqate.enabled: "{{ frigate_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ frigate_repliqate_engine }}"
          repliqate.schedule: "{{ frigate_repliqate_schedule }}"
          repliqate.backup_id: "{{ frigate_repliqate_backup_id }}"
          repliqate.retention: "{{ frigate_repliqate_retention }}"
          traefik.enable: "{{ frigate_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.frigate.rule: "Host(`{{ frigate_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.frigate.tls.certresolver: "letsencrypt"
          traefik.http.routers.frigate.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.frigate.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frigate.middlewares: "frigate@docker{{ ',tinyauth-auth@docker' if frigate_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.frigate.IPAllowList.sourcerange: "{{ frigate_traefik_whitelist }}"
          traefik.http.services.frigate.loadbalancer.server.port: "8971"
          wud.tag.include: ^\d+\.\d+\.\d+$
          wud.link.template: https://github.com/blakeblackshear/frigate/releases/tag/v${major}.${minor}.${patch}
        shm_size: "{{ frigate_shm_size }}"
        cpu_shares: "{{ frigate_cpu_shares }}"
        memory: "{{ frigate_memory }}"
        memory_swap: "{{ frigate_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['https://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (frigate_port_http | string)] +
                (['https://' + frigate_hostname + '.' + ansible_nas_domain] if (frigate_traefik_enabled is true or frigate_dockflare_enabled is true) else [])
              }}
  when: frigate_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ frigate_container_name }}"
        state: absent
  when: frigate_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ frigate_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - frigate_enabled is false
