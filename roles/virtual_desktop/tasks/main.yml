---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ virtual_desktop_data_directory }}"
        - "{{ virtual_desktop_data_directory }}/home"

    - name: Create {{ ansible_nas_app_name }} users file
      ansible.builtin.template:
        src: "users.txt.j2"
        dest: "{{ virtual_desktop_data_directory }}/users.txt"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ virtual_desktop_container_name }}"
        image: "{{ virtual_desktop_image_name }}:{{ virtual_desktop_image_version }}"
        pull: true
        volumes:
          - "{{ virtual_desktop_data_directory }}/users.txt:/root/createusers.txt:ro"
          - "{{ virtual_desktop_data_directory }}/home:/home:rw"
          - "{{ samba_shares_root }}:/samba:rw"
          - "{{ docker_home }}:/docker:rw"
          - "/etc/timezone:/etc/timezone:ro"
        ports:
          - "{{ virtual_desktop_rdp_port }}:3389"
        privileged: true
        restart_policy: unless-stopped
        cpu_shares: "{{ virtual_desktop_cpu_shares }}"
        memory: "{{ virtual_desktop_memory }}"
        labels:
          autoheal: "{{ virtual_desktop_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ virtual_desktop_watchtower_monitor_only }}"
  when: virtual_desktop_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ virtual_desktop_container_name }}"
        state: absent
  when: virtual_desktop_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ virtual_desktop_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ virtual_desktop_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: virtual_desktop_enabled is false and archive_app_data_enabled is true
