---
# ANE
ansible_nas_app_name: "appname"
mattermost_enabled: false
mattermost_traefik_enabled: false
mattermost_traefik_whitelist: "{{ lan }}"

# directories
mattermost_data_directory: "{{ docker_home }}/appname"

# docker
mattermost_container_name: "appname"
mattermost_image_name: "appdev/appname" # use ghcr.io or lscr.io when available
mattermost_image_tag: "latest"

# uid / gid
mattermost_user_id: "0"
mattermost_group_id: "0"

# network
mattermost_port_http: "8989"
mattermost_hostname: "appname"

# specs
mattermost_cpu_shares: 1024
mattermost_memory: "1G"
mattermost_memory_swap: -1

# autoheal
mattermost_autoheal_enabled: false

# dockflare
mattermost_dockflare_enabled: false
mattermost_dockflare_access_group: ""

# homepage
mattermost_homepage_group: "Apps"
mattermost_homepage_icon: "appname.png"
mattermost_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ mattermost_port_http }}"
mattermost_homepage_showstats: false

# linuxserver.io docker mods for linuxserver.io images
#mattermost_env_docker_mods: ""
#mattermost_env_docker_mods_install_packages: ""
#mattermost_env_docker_mods_install_pip_packages: ""

# repliqate
mattermost_repliqate_enabled: false
mattermost_repliqate_engine: "restic"
mattermost_repliqate_schedule: "@daily 3am"
mattermost_repliqate_backup_id: "{{ mattermost_container_name }}"
mattermost_repliqate_retention: "30d"

# tinyauth
mattermost_tinyauth_enabled: false

# watchtower
mattermost_watchtower_enabled: false


