---
# ANE
ansible_nas_app_name: "Tdarr Node"
tdarr_node_enabled: false
tdarr_node_traefik_enabled: false
tdarr_traefik_whitelist: "{{ lan }}"

# directories
tdarr_node_data_directory: "{{ docker_home }}/tdarr-node"
tdarr_node_cache_directory: "{{ samba_shares_root }}/dump/tdarr_temp"
tdarr_node_media_directory: "{{ samba_shares_root }}"

# uid / gid
tdarr_node_user_id: "0"
tdarr_node_group_id: "0"

# network
tdarr_node_hostname: "tdarr-node"
tdarr_node_port_http: "8268"
tdarr_node_port_server: "8266"

# docker
tdarr_node_container_name: "tdarr-node"
tdarr_node_image_name: "ghcr.io/haveagitgat/tdarr_node"
tdarr_node_image_tag: "latest"

# specs
tdarr_node_cpu_shares: 1024
# Minimum (1080p / CPU): 2 GB (Per concurrent transcode).
# Recommended (Standard / GPU): 4 GB (Allows for overhead and 1-2 streams).
# Performance (4K / RAM Transcoding): 8 GB – 16 GB+ (Essential if you are processing 4K Remuxes in RAM).
tdarr_node_memory: "4g"

# app
tdarr_node_env_ffmpegversion: "6"

# autoheal
tdarr_node_autoheal_enabled: false

# homepage
tdarr_node_homepage_group: "Misc"
tdarr_node_homepage_icon: "tdarr.png"
tdarr_node_homepage_showstats: false

# repliqate
tdarr_node_repliqate_enabled: false
tdarr_node_repliqate_engine: "restic"
tdarr_node_repliqate_schedule: "@daily 3am"
tdarr_node_repliqate_backup_id: "{{ tdarr_node_container_name }}"
tdarr_node_repliqate_retention: "30d"

# watchtower
tdarr_node_watchtower_enabled: false