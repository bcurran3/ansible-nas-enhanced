---
# ANE
ansible_nas_app_name: "autobrr"
autobrr_enabled: false
autobrr_traefik_enabled: false
autobrr_traefik_whitelist: "{{ lan }}"
autobrr_data_directory: "{{ docker_home }}/autobrr"

# docker
autobrr_container_name: "autobrr"
autobrr_image_name: "ghcr.io/autobrr/autobrr"
autobrr_image_tag: "latest"
autobrr_cpu_shares: 1024
autobrr_memory: "1G"
autobrr_memory_swap: -1

# network
autobrr_hostname: "autobrr"
autobrr_port_http: "7474"

# autoheal
autobrr_autoheal_enabled: false

# dockflare
autobrr_dockflare_enabled: false
autobrr_dockflare_access_group: ""

# homepage 
autobrr_homepage_group: "Apps"
autobrr_homepage_icon: "autobrr.png"
autobrr_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ autobrr_port_http }}"
autobrr_homepage_showstats: false
autobrr_homepage_widget_key: ""

# repliqate
autobrr_repliqate_enabled: false
autobrr_repliqate_engine: "restic"
autobrr_repliqate_schedule: "@daily 3am"
autobrr_repliqate_backup_id: "{{ autobrr_container_name }}"
autobrr_repliqate_retention: "30d"

# tinyauth
autobrr_tinyauth_enabled: false

# watchtower
autobrr_watchtower_enabled: false