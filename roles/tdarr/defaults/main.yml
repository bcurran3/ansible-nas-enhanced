---
# ANE
ansible_nas_app_name: "Tdarr Server"
tdarr_enabled: false
tdarr_traefik_enabled: false
tdarr_traefik_whitelist: "{{ lan }}"

# directories
tdarr_data_directory: "{{ docker_home }}/tdarr"
tdarr_cache_directory: "{{ samba_shares_root }}/dump/tdarr_temp"
tdarr_media_directory: "{{ samba_shares_root }}"
tdarr_extra_directory: "" # e.g. "/host/dir:/container/dir:rw"

# uid / gid
tdarr_user_id: "0"
tdarr_group_id: "0"

# network
tdarr_hostname: "tdarr"
tdarr_port_http: "8265"
tdarr_port_server: "8266"

# docker
tdarr_container_name: "tdarr"
tdarr_image_name: "ghcr.io/haveagitgat/tdarr"
tdarr_image_tag: "latest"

# specs
tdarr_cpu_shares: 1024
tdarr_memory: "1G"
tdarr_memory_swap: -1

# app
tdarr_env_ffmpegversion: "6"

# autoheal
tdarr_autoheal_enabled: false

# dockflare
tdarr_dockflare_enabled: false
tdarr_dockflare_access_group: ""

# homepage
tdarr_homepage_group: "Apps"
tdarr_homepage_icon: "tdarr.png"
tdarr_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ tdarr_port_http }}"
tdarr_homepage_showstats: false
tdarr_homepage_key: "insert Tdarr API key here"

# repliqate
tdarr_repliqate_enabled: false
tdarr_repliqate_engine: "restic"
tdarr_repliqate_schedule: "@daily 3am"
tdarr_repliqate_backup_id: "{{ tdarr_container_name }}"
tdarr_repliqate_retention: "30d"

# tinyauth
tdarr_tinyauth_enabled: false

# watchtower
tdarr_watchtower_enabled: false