---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ tdarr_data_directory }}"
        - "{{ tdarr_data_directory }}/server"
        - "{{ tdarr_data_directory }}/configs"
        - "{{ tdarr_data_directory }}/logs"
        - "{{ tdarr_cache_directory }}"
        - "{{ tdarr_media_directory }}"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        tdarr_homepage_href: "https://{{ tdarr_hostname }}.{{ ansible_nas_domain }}"
      when: tdarr_traefik_enabled | bool or tdarr_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ tdarr_container_name }}"
        hostname: "{{ tdarr_container_name }}"
        image: "{{ tdarr_image_name }}:{{ tdarr_image_tag }}"
        network_mode: bridge
        pull: true
        runtime: "{{ 'nvidia' if nvidia_runtime_enabled | bool else omit }}"
        device_requests: "{{
          [{'driver': 'nvidia', 'count': -1, 'capabilities': ['gpu']}]
          if nvidia_runtime_enabled | bool else omit
        }}"
        devices: >-
                  {{
                    (tdarr_devices | default([])) + ['/dev/dri:/dev/dri']
                    if intel_igpu_enabled | default(false) | bool
                    else (tdarr_devices | default(omit))
                  }}
        volumes:
          - "{{ tdarr_data_directory }}/server:/app/server"
          - "{{ tdarr_data_directory }}/configs:/app/configs"
          - "{{ tdarr_data_directory }}/logs:/app/logs"
          - "{{ tdarr_cache_directory }}:/temp"
          - "{{ tdarr_media_directory }}:/media"
        ports:
          - "{{ tdarr_port_http }}:8265"
          - "{{ tdarr_port_server }}:8266"
        env:
          nodeID: "{{ ansible_nas_hostname }}"
          serverIP: "0.0.0.0"
          serverPort: "{{ tdarr_port_server }}"
          webUIPort: "{{ tdarr_port_http }}"
          internalNode: "true"
          inContainer: "true"
          ffmpegVersion: "{{ tdarr_env_ffmpegversion }}"
          nodeName: "{{ ansible_nas_hostname }}"
          PUID: "{{ tdarr_user_id }}"
          PGID: "{{ tdarr_group_id }}"
          NVIDIA_DRIVER_CAPABILITIES: "all"
          NVIDIA_VISIBLE_DEVICES: "all"
          gpus: "all"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ tdarr_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ tdarr_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ tdarr_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ tdarr_dockflare_access_group }}"
          dockflare.hostname: "{{ tdarr_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ tdarr_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ tdarr_homepage_group }}"
          homepage.href: "{{ tdarr_homepage_href }}"
          homepage.icon: "{{ tdarr_homepage_icon }}"
          homepage.description: "{{ 'Distributed transcode automation using FFmpeg/HandBrake + Audio/Video library analytics + video health checking' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ tdarr_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ tdarr_container_name }}"
          homepage.showStats: "{{ tdarr_homepage_showstats | ternary('true', 'false') }}"
          homepage.widget.type: "tdarr"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ tdarr_port_http }}"
          homepage.widget.key: "{{ tdarr_homepage_key }}"
          repliqate.enabled: "{{ tdarr_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ tdarr_repliqate_engine }}"
          repliqate.schedule: "{{ tdarr_repliqate_schedule }}"
          repliqate.backup_id: "{{ tdarr_repliqate_backup_id }}"
          repliqate.retention: "{{ tdarr_repliqate_retention }}"
          traefik.enable: "{{ tdarr_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.tdarr.rule: "Host(`{{ tdarr_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.tdarr.tls.certresolver: "letsencrypt"
          traefik.http.routers.tdarr.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.tdarr.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.tdarr.middlewares: "tdarr@docker{{ ',tinyauth-auth@docker' if tdarr_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.tdarr.IPAllowList.sourcerange: "{{ tdarr_traefik_whitelist }}"
          traefik.http.services.tdarr.loadbalancer.server.port: "8265"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/HaveAGitGat/Tdarr/pkgs/container/tdarr"
        cpu_shares: "{{ tdarr_cpu_shares }}"
        log_driver: json-file
        log_options:
          max-file: "10"
          max-size: "200k"
        memory: "{{ tdarr_memory }}"
        memory_swap: "{{ tdarr_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (tdarr_port_http | string)] +
                (['https://' + tdarr_hostname + '.' + ansible_nas_domain] if (tdarr_traefik_enabled is true or tdarr_dockflare_enabled is true) else [])
              }}
  when: tdarr_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ tdarr_container_name }}"
        state: absent
  when: tdarr_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ tdarr_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - tdarr_enabled is false