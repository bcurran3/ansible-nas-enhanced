---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ tdarr_data_directory }}"
        - "{{ tdarr_data_directory }}/server"
        - "{{ tdarr_data_directory }}/configs"
        - "{{ tdarr_data_directory }}/logs"
        - "{{ tdarr_cache_directory }}"
        - "{{ tdarr_media_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ tdarr_container_name }}"
        hostname: "{{ tdarr_container_name }}"
        image: "{{ tdarr_image_name }}:{{ tdarr_image_tag }}"
        network_mode: "bridge"
        log_driver: json-file
        log_options:
          max-file: "10"
          max-size: "200k"
        pull: true
        runtime: "{{ 'nvidia' if nvidia_runtime_enabled | bool else omit }}"
        device_requests: "{{
          [{'driver': 'nvidia', 'count': -1, 'capabilities': ['gpu']}]
          if nvidia_runtime_enabled | bool else omit
        }}"
        volumes:
          - "{{ tdarr_data_directory }}/server:/app/server"
          - "{{ tdarr_data_directory }}/configs:/app/configs"
          - "{{ tdarr_data_directory }}/logs:/app/logs"
          - "{{ tdarr_cache_directory }}:/temp"
          - "{{ tdarr_media_directory }}:/media"
          - "{{ porn_root }}:/porn"
        ports:
          - "{{ tdarr_port_http }}:8265"
          - "{{ tdarr_port_server }}:8266"
        devices:
          - "/dev/dri/:/dev/dri/"
        env:
          nodeID: "{{ ansible_nas_hostname }}"
          serverIP: "0.0.0.0"
          serverPort: "{{ tdarr_port_server }}"
          webUIPort: "{{ tdarr_port_http }}"
          internalNode: "true"
          inContainer: "true"
          ffmpegVersion: "6"
          nodeName: "MyInternalNode"
          PUID: "{{ tdarr_user_id }}"
          PGID: "{{ tdarr_group_id }}"
          NVIDIA_DRIVER_CAPABILITIES: "all"
          NVIDIA_VISIBLE_DEVICES: "all"
          gpus: "all"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ tdarr_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ tdarr_watchtower_enable }}"
          dockflare.enable: "{{ tdarr_dockflare_tunnel }}"
          dockflare.access.group: "{{ tdarr_dockflare_access_group }}"
          dockflare.hostname: "{{ tdarr_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ tdarr_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ tdarr_homepage_group }}"
          homepage.href: "{{ tdarr_homepage_href }}"
          homepage.icon: "{{ tdarr_homepage_icon }}"
          homepage.description: "{{ 'Distributed transcode automation using FFmpeg/HandBrake + Audio/Video library analytics + video health checking' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ tdarr_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ tdarr_container_name }}"
          homepage.showStats: "{{ tdarr_homepage_showstats }}"
          homepage.widget.type: "tdarr"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ tdarr_port_http }}"
          homepage.widget.key: "{{ tdarr_homepage_key }}"
          traefik.enable: "{{ tdarr_available_externally | string }}"
          traefik.http.routers.tdarr.rule: "Host(`tdarr.{{ ansible_nas_domain }}`)"
          traefik.http.routers.tdarr.tls.certresolver: "letsencrypt"
          traefik.http.routers.tdarr.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.tdarr.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ tdarr_hostname }}"
          traefik.http.routers.tdarr.middlewares: "{{ tdarr_hostname }}@docker"
          traefik.http.middlewares.tdarr.IPAllowList.sourcerange: "{{ tdarr_traefik_whitelist }}"
          traefik.http.services.tdarr.loadbalancer.server.port: "8265"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/HaveAGitGat/Tdarr/pkgs/container/tdarr"
        cpu_shares: "{{ tdarr_cpu_shares }}"
        memory: "{{ tdarr_memory }}"
        restart_policy: unless-stopped
  when: tdarr_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ tdarr_container_name }}"
        state: absent
  when: tdarr_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ tdarr_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ tdarr_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: tdarr_enabled is false and archive_app_data_enabled is true
