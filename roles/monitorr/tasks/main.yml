---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directory
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ monitorr_data_directory }}/app"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ monitorr_container_name }}"
        hostname: "{{ monitorr_container_name }}"
        image: "{{ monitorr_image_name }}:{{ monitorr_image_tag }}"
        pull: true
        volumes:
          - "{{ monitorr_data_directory }}/app:/app:rw"
          - "{{ samba_shares_root }}:/shares:ro"
          - "{{ samba_shares_other_root }}:/other:ro"
        ports:
          - "{{ monitorr_port_http }}:80"
        env:
          TZ: "{{ ansible_nas_timezone }}"
          PUID: "{{ monitorr_user_id }}"
          PGID: "{{ monitorr_group_id }}"
        labels:
          autoheal: "{{ monitorr_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ monitorr_watchtower_monitor_only }}"
          dockflare.enable: "{{ monitorr_dockflare_tunnel }}"
          dockflare.access.group: "{{ monitorr_dockflare_access_group }}"
          dockflare.hostname: "{{ monitorr_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ monitorr_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ monitorr_homepage_group }}"
          homepage.icon: "{{ monitorr_homepage_icon }}"
          homepage.href: "{{ monitorr_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ monitorr_port_http }}"
          homepage.description: "{{ 'a self-hosted PHP web app that monitors the status of local and remote network services, websites, and applications' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ monitorr_container_name }}"
          homepage.showStats: "{{ monitorr_homepage_showStats }}"
          traefik.enable: "{{ monitorr_available_externally | string }}"
          traefik.http.routers.monitorr.rule: "Host(`monitorr.{{ ansible_nas_domain }}`)"
          traefik.http.routers.monitorr.tls.certresolver: "letsencrypt"
          traefik.http.routers.monitorr.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.monitorr.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ monitorr_hostname }}"
          traefik.http.routers.monitorr.middlewares: "{{ monitorr_hostname }}@docker"
          traefik.http.middlewares.monitorr.IPAllowList.sourcerange: "{{ monitorr_traefik_whitelist }}"
          traefik.http.services.monitorr.loadbalancer.server.port: "80"
          wud.tag.include: "^\\d+\\.\\d+\\.\\d+m$"
          wud.link.template: "https://github.com/Monitorr/Monitorr/releases/tag/$${major}.$${minor}.$${patch}m"
        cpu_shares: "{{ monitorr_cpu_shares }}"
        memory: "{{ monitorr_memory }}"
        restart_policy: unless-stopped
  when: monitorr_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ monitorr_container_name }}"
        state: absent
  when: monitorr_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ monitorr_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ monitorr_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: monitorr_enabled is false and archive_app_data_enabled is true
