---
# ANE
ansible_nas_app_name: "YaDNSb"
yadnsb_enabled: false
yadnsb_traefik_enabled: false
yadnsb_traefik_whitelist: "{{ lan }}"

# docker
yadnsb_container_name: "yadnsb"
yadnsb_image_name: "ghcr.io/altendorfme/yadnsb"
yadnsb_image_tag: "latest"

# network
yadnsb_hostname: "yadnsb"
yadnsb_port_http: "3032"

# specs
yadnsb_cpu_shares: 1024
yadnsb_memory: "256M"

# autoheal
yadnsb_autoheal_enabled: false

# dockflare
yadnsb_dockflare_enabled: false
yadnsb_dockflare_access_group: ""

# homepage
yadnsb_homepage_group: "Apps"
yadnsb_homepage_icon: "sh-yadnsb.png"
yadnsb_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ yadnsb_port_http }}"
yadnsb_homepage_showstats: false

# tinyauth
yadnsb_tinyauth_enabled: false

# watchtower
yadnsb_watchtower_enabled: false
