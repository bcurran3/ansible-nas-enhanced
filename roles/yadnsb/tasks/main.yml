---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ yadnsb_container_name }}"
        hostname: "{{ yadnsb_container_name }}"
        image: "{{ yadnsb_image_name }}:{{ yadnsb_image_tag }}"
        pull: true
        ports:
          - "{{ yadnsb_port_http }}:3000"
        env:
          TZ: "{{ ansible_nas_timezone }}"
#        security_opt:
#          no-new-privileges:true
        healthcheck:
          test: wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1
          interval: 15s
          timeout: 5s
          retries: 3
          start_period: 15s
        labels:
          autoheal: "{{ yadnsb_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ yadnsb_watchtower_enable }}"
          dockflare.enable: "{{ yadnsb_dockflare_tunnel }}"
          dockflare.access.group: "{{ yadnsb_dockflare_access_group }}"
          dockflare.hostname: "{{ yadnsb_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ yadnsb_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ yadnsb_homepage_group }}"
          homepage.icon: "{{ yadnsb_homepage_icon }}"
          homepage.href: "{{ yadnsb_homepage_href }}"
          homepage.description: "{{ 'DNS performance benchmarks' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ yadnsb_container_name }}"
          homepage.showStats: "{{ yadnsb_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ yadnsb_port_http }}"
          repliqate.enabled: "false"
          traefik.enable: "{{ yadnsb_available_externally | string }}"
          traefik.http.routers.yadnsb.rule: "Host(`{{ yadnsb_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.yadnsb.tls.certresolver: "letsencrypt"
          traefik.http.routers.yadnsb.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.yadnsb.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ yadnsb_hostname }}"
          traefik.http.routers.yadnsb.middlewares: "{{ yadnsb_hostname }}@docker"
          traefik.http.middlewares.yadnsb.IPAllowList.sourcerange: "{{ yadnsb_traefik_whitelist }}"
          traefik.http.services.yadnsb.loadbalancer.server.port: "3000"
          wud.tag.include: '^v\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/altendorfme/yadnsb/pkgs/container/yadnsb"
        cpu_shares: "{{ yadnsb_cpu_shares }}"
        memory: "{{ yadnsb_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (yadnsb_port_http | string)] +
                (['https://' + yadnsb_hostname + '.' + ansible_nas_domain] if (yadnsb_available_externally is true or yadnsb_dockflare_tunnel is true) else [])
              }}
  when: yadnsb_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ yadnsb_container_name }}"
        state: absent
  when: yadnsb_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ yadnsb_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ yadnsb_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: yadnsb_enabled is false and archive_app_data_enabled is true
