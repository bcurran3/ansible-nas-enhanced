---
- name: Start Prowlarr
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ prowlarr_data_directory }}"
        - "{{ prowlarr_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ prowlarr_container_name }}"
        hostname: "{{ prowlarr_container_name }}"
        image: "{{ prowlarr_image_name }}:{{ prowlarr_image_version }}"
        pull: true
        volumes:
          - "{{ prowlarr_data_directory }}/config:/config:rw"
        ports:
          - "{{ prowlarr_port }}:9696"
        env:
          DOCKER_MODS: "{{ prowlarr_env_docker_mods }}"
          PUID: "{{ prowlarr_user_id }}"
          PGID: "{{ prowlarr_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ prowlarr_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ prowlarr_watchtower_enable }}"
          dockflare.enable: "{{ prowlarr_dockflare_tunnel }}"
          dockflare.access.group: "{{ prowlarr_dockflare_access_group }}"
          dockflare.hostname: "{{ prowlarr_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ prowlarr_port }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ prowlarr_homepage_group }}"
          homepage.icon: "{{ prowlarr_homepage_icon }}"
          homepage.href: "{{ prowlarr_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ prowlarr_port }}"
          homepage.description: "{{ 'Indexer Proxy' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ prowlarr_container_name }}"
          homepage.showStats: "{{ prowlarr_homepage_showstats }}"
          homepage.widget.type: "prowlarr"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ prowlarr_port }}"
          homepage.widget.key: "{{ prowlarr_homepage_widget_key }}"
          traefik.enable: "{{ prowlarr_available_externally | string }}"
          traefik.http.routers.prowlarr.rule: "Host(`{{ prowlarr_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.prowlarr.tls.certresolver: "letsencrypt"
          traefik.http.routers.prowlarr.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.prowlarr.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ prowlarr_hostname }}"
          traefik.http.routers.prowlarr.middlewares: "{{ prowlarr_hostname }}@docker"
          traefik.http.middlewares.prowlarr.IPAllowList.sourcerange: "{{ prowlarr_traefik_whitelist }}"
          traefik.http.services.prowlarr.loadbalancer.server.port: "9696"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://lscr.io/linuxserver/prowlarr"
        cpu_shares: "{{ prowlarr_cpu_shares }}"
        memory: "{{ prowlarr_memory }}"
        restart_policy: unless-stopped
  when: prowlarr_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ prowlarr_container_name }}"
        state: absent
  when: prowlarr_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ prowlarr_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ prowlarr_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: prowlarr_enabled is false and archive_app_data_enabled is true
