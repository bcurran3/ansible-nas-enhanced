---
# ANE
ansible_nas_app_name: "Prowlarr"
prowlarr_enabled: false
prowlarr_available_externally: false
prowlarr_traefik_whitelist: "{{ lan }}"

# directories
prowlarr_data_directory: "{{ docker_home }}/prowlarr"

# uid / gid
prowlarr_user_id: "0"
prowlarr_group_id: "0"

# network
prowlarr_port: "9696"
prowlarr_hostname: "prowlarr"

# docker
prowlarr_container_name: "prowlarr"
prowlarr_image_name: "lscr.io/linuxserver/prowlarr"
prowlarr_image_version: "develop"

# specs
prowlarr_cpu_shares: 1024
prowlarr_memory: 1g

# autoheal
prowlarr_autoheal: "false"

# dockflare
prowlarr_dockflare_tunnel: "false"
prowlarr_dockflare_access_group: ""

# homepage
prowlarr_homepage_group: "Download Tools"
prowlarr_homepage_icon: "prowlarr.png"
prowlarr_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ prowlarr_port }}"
prowlarr_homepage_showstats: "false"
prowlarr_homepage_widget_key: "your_api_key_here"

# linuxserver.io docker mods
prowlarr_env_docker_mods: ""

# theme.park themes
# https://docs.theme-park.dev/themes/prowlarr/
prowlarr_env_docker_mods_tp_theme: ""
prowlarr_env_docker_mods_tp_community_theme: ""
prowlarr_env_docker_mods_tp_domain: ""
prowlarr_env_docker_mods_tp_addon: ""

# watchtower
prowlarr_watchtower_enable: "false"
