---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ wireguard_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ wireguard_container_name }}"
        hostname: "{{ wireguard_container_name }}"
        image: "{{ wireguard_image_name }}:{{ wireguard_image_tag }}"
        pull: true
        env:
          HOST: "{{ wireguard_env_host }}"
          INSECURE: "{{ wireguard_env_insecure}}"
          PORT: "{{ wireguard_port_http }}"
          TZ: "{{ ansible_nas_timezone }}"
        volumes:
          - "{{ wireguard_data_directory }}:/etc/wireguard"
          - "/lib/modules:/lib/modules:ro"
        ports:
          - "{{ wireguard_port_http }}:{{ wireguard_port_http }}"
          - "{{ wireguard_port_udp }}:51820/udp"
        capabilities:
          - NET_ADMIN
          - SYS_MODULE
        sysctls:
          net.ipv4.conf.all.src_valid_mark=1
          net.ipv4.ip_forward=1
          net.ipv6.conf.all.disable_ipv6=0
          net.ipv6.conf.all.forwarding=1
          net.ipv6.conf.default.forwarding=1
        labels:
          autoheal: "{{ wireguard_autoheal | string }}"
          com.centurylinklabs.watchtower.enable: "{{ wireguard_watchtower_enabled| string }}"
          dockflare.enable: "{{ wireguard_dockflare_enabled | string }}"
          dockflare.access.group: "{{ wireguard_dockflare_access_group }}"
          dockflare.hostname: "{{ wireguard_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ wireguard_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ wireguard_homepage_group }}"
          homepage.icon: "{{ wireguard_homepage_icon }}"
          homepage.href: "{{ wireguard_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ wireguard_port_http }}"
          homepage.description: "{{ 'The easiest way to run WireGuard VPN + Web-based Admin UI.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ wireguard_container_name }}"
          homepage.showStats: "{{ wireguard_homepage_showstats | string }}"
          homepage.widget.type: "wgeasy"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ wireguard_port_http }}"
          homepage.widget.username: "{{ wireguard_homepage_widget_username }}"
          homepage.widget.password: "{{ wireguard_homepage_widget_password }}"
          homepage.widget.threshold: "{{ wireguard_homepage_widget_threshold }}"
          homepage.widget.version: "{{ wireguard_homepage_widget_version }}"
          repliqate.enabled: "{{ wireguard_repliqate_enabled | string }}"
          repliqate.engine: "{{ wireguard_repliqate_engine }}"
          repliqate.schedule: "{{ wireguard_repliqate_schedule }}"
          repliqate.backup_id: "{{ wireguard_repliqate_backup_id }}"
          repliqate.retention: "{{ wireguard_repliqate_retention }}"
          traefik.enable: "{{ wireguard_available_externally | string }}"
          traefik.http.routers.wireguard.rule: "Host(`{{ wireguard_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.wireguard.tls.certresolver: "letsencrypt"
          traefik.http.routers.wireguard.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.wireguard.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.wireguard.middlewares: "wireguard@docker{{ ',tinyauth-auth@docker' if wireguard_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.wireguard.IPAllowList.sourcerange: "{{ wireguard_traefik_whitelist }}"
          traefik.http.services.wireguard.loadbalancer.server.port: "{{ wireguard_port_http }}"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/wg-easy/wg-easy/pkgs/container/wg-easy"
        cpu_shares: "{{ wireguard_cpu_shares }}"
        memory: "{{ wireguard_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (wireguard_port_http | string)] +
                (['https://' + wireguard_hostname + '.' + ansible_nas_domain] if (wireguard_available_externally is true or wireguard_dockflare_enabled is true) else [])
              }}
  when: wireguard_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ wireguard_container_name }}"
        state: absent
  when: wireguard_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ wireguard_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - wireguard_enabled is false