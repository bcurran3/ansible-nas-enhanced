---
# ANE
ansible_nas_app_name: "ProjectSend"
projectsend_enabled: false
projectsend_available_externally: false
projectsend_traefik_whitelist: "{{ lan }}"
projectsend_data_directory: "{{ docker_home }}/projectsend"

# app
projectsend_max_upload: "5000"

# network
projectsend_hostname: "projectsend"
projectsend_port_http: "3006"
projectsend_user_id: "1000"
projectsend_group_id: "1000"

# docker
projectsend_container_name: "projectsend"
projectsend_image_name: "lscr.io/linuxserver/projectsend"
projectsend_image_tag: "latest"
projectsend_cpu_shares: "1024"
projectsend_memory: "512m"
projectsend_db_container_name: "projectsend-db"
projectsend_db_image_name: "lscr.io/linuxserver/mariadb"
projectsend_db_image_tag: "latest"
projectsend_db_cpu_shares: "1024"
projectsend_db_memory: "1g"

# autoheal
projectsend_autoheal: "false"
projectsend_db_autoheal: "false"

# dockflare
projectsend_dockflare_tunnel: "false"
projectsend_dockflare_access_group: ""

# homepage
projectsend_homepage_group: "Apps"
projectsend_homepage_icon: "projectsend.png"
projectsend_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ projectsend_port_http }}"
projectsend_homepage_showstats: "false"
projectsend_db_homepage_group: "DBs"
projectsend_db_homepage_icon: "mariadb.png"
projectsend_db_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ projectsend_port_http }}"
projectsend_db_homepage_showstats: "false"

# linuxserver.io docker mods
# https://mods.linuxserver.io/?mod=projectsend
projectsend_env_docker_mods: ""
projectsend_env_docker_mods_install_packages: ""
projectsend_env_docker_mods_install_pip_packages: ""
projectsend_db_env_docker_mods: ""
projectsend_db_env_docker_mods_install_packages: ""
projectsend_db_env_docker_mods_install_pip_packages: ""

# repliqate
projectsend_repliqate_enabled: "false"
projectsend_repliqate_engine: "restic"
projectsend_repliqate_schedule: "@daily 3am"
projectsend_repliqate_backup_id: "{{ projectsend_container_name }}"
projectsend_repliqate_retention: "30d"
projectsend_db_repliqate_enabled: "false"
projectsend_db_repliqate_engine: "restic"
projectsend_db_repliqate_schedule: "@daily 3am"
projectsend_db_repliqate_backup_id: "{{ projectsend_container_name }}"
projectsend_db_repliqate_retention: "30d"

# watchtower
projectsend_watchtower_enable: "false"
projectsend_db_watchtower_enable: "false"