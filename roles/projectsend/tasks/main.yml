---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ projectsend_data_directory }}"
        - "{{ projectsend_data_directory }}/config"
        - "{{ projectsend_data_directory }}/data"
        - "{{ projectsend_data_directory }}/db"

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ projectsend_db_container_name }}"
        hostname: "{{ projectsend_db_container_name }}"
        image: "{{ projectsend_db_image_name }}:{{ projectsend_db_image_tag }}"
        pull: true
        network_mode: bridge
        volumes:
          - "{{ projectsend_data_directory }}/db:/config/databases"
        env:
          DOCKER_MODS: "{{ projectsend_db_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ projectsend_db_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ projectsend_db_env_docker_mods_install_pip_packages}}"
          MYSQL_ROOT_PASSWORD: "projectsend"
          MYSQL_DATABASE: "projectsend"
          MYSQL_USER: "projectsend"
          MYSQL_PASSWORD: "projectsend"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
              test:
                - CMD-SHELL
                - 'mariadb-admin ping -h localhost --silent'
              interval: "20s"
              timeout: "10s"
              retries: "5"
        labels:
          autoheal: "{{ projectsend_db_autoheal | string }}"
          com.centurylinklabs.watchtower.enable: "{{ projectsend_db_watchtower_enabled| string }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} MariaDB"
          homepage.group: "{{ projectsend_db_homepage_group }}"
          homepage.icon: "{{ projectsend_db_homepage_icon }}"
          homepage.href: "{{ projectsend_db_homepage_href }}"
          homepage.description: "{{ 'MariaDB Server is a high performing open source relational database, forked from MySQL.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ projectsend_db_container_name }}"
          homepage.showStats: "{{ projectsend_db_homepage_showstats | string }}"
          repliqate.enabled: "{{ projectsend_db_repliqate_enabled | string }}"
          repliqate.engine: "{{ projectsend_db_repliqate_engine }}"
          repliqate.schedule: "{{ projectsend_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ projectsend_db_repliqate_backup_id }}"
          repliqate.retention: "{{ projectsend_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://lscr.io/linuxserver/mariadb"
        cpu_shares: "{{ projectsend_db_cpu_shares }}"
        memory: "{{ projectsend_db_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ projectsend_container_name }}"
        hostname: "{{ projectsend_container_name }}"
        image: "{{ projectsend_image_name }}:{{ projectsend_image_tag }}"
        network_mode: bridge
        pull: true
        volumes:
          - "{{ projectsend_data_directory }}/config:/config"
          - "{{ projectsend_data_directory }}/data:/data"
        env:
          DOCKER_MODS: "{{ projectsend_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ projectsend_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ projectsend_env_docker_mods_install_pip_packages}}"
          MAX_UPLOAD: "{{ projectsend_max_upload }}"
          PUID: "{{ projectsend_user_id }}"
          PGID: "{{ projectsend_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        ports:
          - "{{ projectsend_port_http }}:80"
        links:
          - "{{ projectsend_db_container_name }}"
        labels:
          autoheal: "{{ projectsend_autoheal | string }}"
          com.centurylinklabs.watchtower.enable: "{{ projectsend_watchtower_enabled| string }}"
          dockflare.enable: "{{ projectsend_dockflare_enabled | string }}"
          dockflare.access.group: "{{ projectsend_dockflare_access_group }}"
          dockflare.hostname: "{{ projectsend_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ projectsend_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ projectsend_homepage_group }}"
          homepage.href: "{{ projectsend_homepage_href }}"
          homepage.icon: "{{ projectsend_homepage_icon }}"
          homepage.description: "{{ 'ProjectSend is a free, open source software that lets you share files with your clients, focused on ease of use and privacy.' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ projectsend_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ projectsend_container_name }}"
          homepage.showStats: "{{ projectsend_homepage_showstats | string }}"
          repliqate.enabled: "{{ projectsend_repliqate_enabled | string }}"
          repliqate.engine: "{{ projectsend_repliqate_engine }}"
          repliqate.schedule: "{{ projectsend_repliqate_schedule }}"
          repliqate.backup_id: "{{ projectsend_repliqate_backup_id }}"
          repliqate.retention: "{{ projectsend_repliqate_retention }}"
          traefik.enable: "{{ projectsend_available_externally | string }}"
          traefik.http.routers.projectsend.rule: "Host(`{{ projectsend_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.projectsend.tls.certresolver: "letsencrypt"
          traefik.http.routers.projectsend.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.projectsend.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.projectsend.middlewares: "projectsend@docker{{ ',tinyauth-auth@docker' if projectsend_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.projectsend.IPAllowList.sourcerange: "{{ projectsend_traefik_whitelist }}"
          traefik.http.services.projectsend.loadbalancer.server.port: "80"
          wud.tag.include: '^r\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://lscr.io/linuxserver/projectsend"
        cpu_shares: "{{ projectsend_cpu_shares }}"
        memory: "{{ projectsend_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (projectsend_port_http | string)] +
                (['https://' + projectsend_hostname + '.' + ansible_nas_domain] if (projectsend_available_externally is true or projectsend_dockflare_enabled is true) else [])
              }}
  when: projectsend_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ projectsend_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ projectsend_db_container_name }}"
        state: absent
  when: projectsend_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ projectsend_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - projectsend_enabled is false