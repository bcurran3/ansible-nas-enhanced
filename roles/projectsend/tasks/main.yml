---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ projectsend_data_directory }}"
        - "{{ projectsend_data_directory }}/config"
        - "{{ projectsend_data_directory }}/data"
        - "{{ projectsend_data_directory }}/db"

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ projectsend_db_container_name }}"
        hostname: "{{ projectsend_db_container_name }}"
        image: "{{ projectsend_db_image_name }}:{{ projectsend_db_image_tag }}"
        pull: true
        cpu_shares: "{{ projectsend_db_cpu_shares }}"
        network_mode: "bridge"
        volumes:
          - "{{ projectsend_data_directory }}/db:/config/databases"
        env:
          MYSQL_ROOT_PASSWORD: "projectsend"
          MYSQL_DATABASE: "projectsend"
          MYSQL_USER: "projectsend"
          MYSQL_PASSWORD: "projectsend"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ projectsend_db_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ projectsend_db_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }} MariaDB"
          homepage.group: "{{ projectsend_db_homepage_group }}"
          homepage.icon: "{{ projectsend_db_homepage_icon }}"
          homepage.href: "{{ projectsend_db_homepage_href }}"
          homepage.description: "{{ 'MariaDB Server is a high performing open source relational database, forked from MySQL.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ projectsend_db_container_name }}"
          homepage.showStats: "{{ projectsend_db_homepage_showStats }}"
          traefik.enable: "false"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ projectsend_db_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ projectsend_container_name }}"
        hostname: "{{ projectsend_container_name }}"
        image: "{{ projectsend_image_name }}:{{ projectsend_image_tag }}"
        network_mode: "bridge"
        pull: true
        cpu_shares: "{{ projectsend_cpu_shares }}"
        volumes:
          - "{{ projectsend_data_directory }}/config:/config"
          - "{{ projectsend_data_directory }}/data:/data"
        env:
          MAX_UPLOAD: "{{ projectsend_max_upload }}"
          PUID: "{{ projectsend_user_id }}"
          PGID: "{{ projectsend_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        ports:
          - "{{ projectsend_port_http }}:80"
        links:
          - "{{ projectsend_db_container_name }}"
        labels:
          autoheal: "{{ projectsend_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ projectsend_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ projectsend_homepage_group }}"
          homepage.href: "{{ projectsend_homepage_href }}"
          homepage.icon: "{{ projectsend_homepage_icon }}"
          homepage.description: "{{ 'ProjectSend is a free, open source software that lets you share files with your clients, focused on ease of use and privacy.' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ projectsend_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ projectsend_container_name }}"
          homepage.showStats: "{{ projectsend_homepage_showStats }}"
          traefik.enable: "{{ projectsend_available_externally | string }}"
          traefik.http.routers.projectsend.rule: "Host(`{{ projectsend_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.projectsend.tls.certresolver: "letsencrypt"
          traefik.http.routers.projectsend.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.projectsend.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ projectsend_hostname }}"
          traefik.http.routers.projectsend.middlewares: "{{ projectsend_hostname }}@docker"
          traefik.http.middlewares.projectsend.IPAllowList.sourcerange: "{{ projectsend_traefik_whitelist }}"
          traefik.http.services.projectsend.loadbalancer.server.port: "80"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ projectsend_memory }}"
        restart_policy: unless-stopped
  when: projectsend_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ projectsend_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ projectsend_db_container_name }}"
        state: absent
  when: projectsend_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ projectsend_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ projectsend_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: projectsend_enabled is false and archive_app_data_enabled is true
