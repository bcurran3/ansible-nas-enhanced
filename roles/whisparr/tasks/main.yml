---
- name: Start {{ whisparr_proper_name }}
  block:
    - name: Create {{ whisparr_proper_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ whisparr_data_directory }}"
        - "{{ whisparr_data_directory }}/config"
        - "{{ whisperr_download_directory }}"
        - "{{ whisparr_porn_directory }}"

    - name: Set {{ whisparr_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        whisparr_homepage_href: "https://{{ whisparr_hostname }}.{{ ansible_nas_domain }}"
      when: whisparr_traefik_enabled | bool or whisparr_dockflare_enabled | bool

    - name: Create {{ whisparr_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ whisparr_container_name }}"
        hostname: "{{ whisparr_container_name }}"
        image: "{{ whisparr_image_name }}:{{ whisparr_image_tag }}"
        pull: true
        ports:
          - "{{ whisparr_port_http }}:6969"
        volumes:
          - "{{ whisparr_data_directory }}/config:/config"
          - "{{ whisparr_download_directory }}:/downloads"
          - "{{ whisparr_porn_directory }}:/porn"
        network_mode: bridge
        env:
          PUID: "{{ whisparr_puid }}"
          PGID: "{{ whisparr_pgid }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ whisparr_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ whisparr_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ whisparr_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ whisparr_dockflare_access_group }}"
          dockflare.hostname: "{{ whisparr_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ whisparr_port_http }}"
          homepage.name: "{{ whisparr_proper_name }}"
          homepage.group: "{{ whisparr_homepage_group }}"
          homepage.icon: "{{ whisparr_homepage_icon }}"
          homepage.href: "{{ whisparr_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ whisparr_port_http }}"
          homepage.description: "{{ 'Whisparr is an adult movie collection manager for Usenet and BitTorrent users.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ whisparr_container_name }}"
          homepage.showStats: "{{ whisparr_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ whisparr_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ whisparr_repliqate_engine }}"
          repliqate.schedule: "{{ whisparr_repliqate_schedule }}"
          repliqate.backup_id: "{{ whisparr_repliqate_backup_id }}"
          repliqate.retention: "{{ whisparr_repliqate_retention }}"
          traefik.enable: "{{ whisparr_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.whisparr.rule: "Host(`{{ whisparr_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.whisparr.tls.certresolver: "letsencrypt"
          traefik.http.routers.whisparr.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.whisparr.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.whisparr.middlewares: "whisparr@docker{{ ',tinyauth-auth@docker' if whisparr_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.whisparr.IPAllowList.sourcerange: "{{ whisparr_traefik_whitelist }}"
          traefik.http.services.whisparr.loadbalancer.server.port: "6969"
          wud.tag.include: '^v\d+\.\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/TheSpad/Whisparr/pkgs/container/whisparr"
        cpu_shares: "{{ whisparr_cpu_shares }}"
        memory: "{{ whisparr_memory }}"
        memory_swap: "{{ whisparr_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ whisparr_proper_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (whisparr_port_http | string)] +
                (['https://' + whisparr_hostname + '.' + ansible_nas_domain] if (whisparr_traefik_enabled is true or whisparr_dockflare_enabled is true) else [])
              }}
  when: whisparr_enabled is true

- name: Stop {{ whisparr_proper_name }}
  block:
    - name: Stop {{ whisparr_proper_name }} Container
      community.docker.docker_container:
        name: "{{ whisparr_container_name }}"
        state: absent
  when: whisparr_enabled is false

- name: Data Archive {{ whisparr_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ whisparr_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - whisparr_enabled is false