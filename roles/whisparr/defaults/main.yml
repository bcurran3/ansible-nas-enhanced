---
# ANE
ansible_nas_app_name: "Whisparr"
whisparr_enabled: false
whisparr_traefik_enabled: false
whisparr_traefik_whitelist: "{{ lan }}"

# directories
whisparr_data_directory: "{{ docker_home }}/whisparr"
whisparr_download_directory: "{{ downloads_root }}"
whisparr_porn_directory: "{{ porn_root }}"

# network
whisparr_hostname: "whisparr"
whisparr_port_http: "6969"

# docker
whisparr_container_name: "whisparr"
whisparr_image_name: "ghcr.io/thespad/whisparr"
whisparr_image_tag: "latest"

# specs
whisparr_cpu_shares: 1024
whisparr_memory: "1G"

# app
whisparr_puid: "998"
whisparr_pgid: "1001"

# autoheal
whisparr_autoheal_enabled: false

# dockflare
whisparr_dockflare_enabled: false
whisparr_dockflare_access_group: ""

# homepage
whisparr_homepage_group: "Apps"
whisparr_homepage_icon: "whisparr.png"
whisparr_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ whisparr_port_http }}"
whisparr_homepage_showstats: false

# repliqate
whisparr_repliqate_enabled: false
whisparr_repliqate_engine: "restic"
whisparr_repliqate_schedule: "@daily 3am"
whisparr_repliqate_backup_id: "{{ whisparr_container_name }}"
whisparr_repliqate_retention: "30d"

# tinyauth
whisparr_tinyauth_enabled: false

# watchtower
whisparr_watchtower_enabled: false