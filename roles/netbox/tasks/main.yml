---
- name: Start {{ netbox_proper_name }}
  block:
    - name: Create {{ netbox_proper_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ netbox_data_directory }}/config"
        - "{{ netbox_data_directory }}/db"

    - name: Set {{ netbox_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        netbox_homepage_href: "https://{{ netbox_hostname }}.{{ ansible_nas_domain }}"
      when: netbox_traefik_enabled | bool or netbox_dockflare_enabled | bool

    - name: Create {{ netbox_proper_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ netbox_db_container_name }}"
        hostname: "{{ netbox_db_container_name }}"
        image: "{{ netbox_db_image_name }}:{{ netbox_db_image_tag }}"
        pull: true
        network_mode: bridge
        volumes:
          - "{{ netbox_data_directory }}/db:/var/lib/postgresql/data"
        env:
          POSTGRES_USER: "{{ netbox_env_db_user }}"
          POSTGRES_PASSWORD: "{{ netbox_env_db_password }}"
          POSTGRES_DB: "{{ netbox_env_db_name }}"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: "{{ netbox_db_healthcheck_test }}"
          interval: "{{ netbox_db_healthcheck_interval }}"
          timeout: "{{ netbox_db_healthcheck_timeout }}"
          retries: "{{ netbox_db_healthcheck_retries }}"
          start_period: "{{ netbox_db_healthcheck_start_period }}"
        labels:
          autoheal: "{{ netbox_db_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ netbox_db_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ netbox_proper_name }} PostgreSQL"
          homepage.group: "{{ netbox_db_homepage_group }}"
          homepage.icon: "{{ netbox_db_homepage_icon }}"
          homepage.href: "{{ netbox_db_homepage_href }}"
          homepage.description: "{{ 'PostgreSQL Database Management System' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ netbox_db_container_name }}"
          homepage.showStats: "{{ netbox_db_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ netbox_db_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ netbox_db_repliqate_engine }}"
          repliqate.schedule: "{{ netbox_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ netbox_db_repliqate_backup_id }}"
          repliqate.retention: "{{ netbox_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/postgres"
        cpu_shares: "{{ netbox_db_cpu_shares }}"
        memory: "{{ netbox_db_memory }}"
        memory_swap: "{{ netbox_db_memory_swap }}"
        restart_policy: unless-stopped

    - name: Wait for {{ netbox_proper_name }} DB to become healthy
      community.docker.docker_container_info:
        name: "{{ netbox_db_container_name }}"
      register: db_info
      until: "db_info.container.State.Health.Status == 'healthy'"
      retries: 30
      delay: 5

    - name: Create {{ netbox_proper_name }} Redis Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ netbox_redis_container_name }}"
        hostname: "{{ netbox_redis_container_name }}"
        image: "{{ netbox_redis_image_name }}:{{ netbox_redis_image_tag }}"
        pull: true
        network_mode: bridge
        command: "redis-server --requirepass {{ netbox_env_redis_password }}"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: "{{ netbox_redis_healthcheck_test }}"
          interval: "{{ netbox_redis_healthcheck_interval }}"
          timeout: "{{ netbox_redis_healthcheck_timeout }}"
          retries: "{{ netbox_redis_healthcheck_retries }}"
          start_period: "{{ netbox_redis_healthcheck_start_period }}"
        labels:
          autoheal: "{{ netbox_redis_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ netbox_redis_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ netbox_proper_name }} Redis"
          homepage.group: "{{ netbox_redis_homepage_group }}"
          homepage.icon: "{{ netbox_redis_homepage_icon }}"
          homepage.href: "{{ netbox_redis_homepage_href }}"
          homepage.description: "{{ 'The Real-time Data Platform' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ netbox_redis_container_name }}"
          homepage.showStats: "{{ netbox_redis_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ netbox_redis_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ netbox_redis_repliqate_engine }}"
          repliqate.schedule: "{{ netbox_redis_repliqate_schedule }}"
          repliqate.backup_id: "{{ netbox_redis_repliqate_backup_id }}"
          repliqate.retention: "{{ netbox_redis_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: "{{ netbox_redis_wud_tag_include }}"
          wud.tag.transform.type: "{{ netbox_redis_wud_tag_transform_type }}"
          wud.link.template: "{{ netbox_redis_wud_link_template }}"
        cpu_shares: "{{ netbox_redis_cpu_shares }}"
        memory: "{{ netbox_redis_memory }}"
        memory_swap: "{{ netbox_redis_memory_swap }}"
        restart_policy: unless-stopped

    - name: Create {{ netbox_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ netbox_container_name }}"
        hostname: "{{ netbox_container_name }}"
        image: "{{ netbox_image_name }}:{{ netbox_image_tag }}"
        pull: true
        network_mode: bridge
        volumes:
          - "{{ netbox_data_directory }}/config:/config"
        ports:
          - "{{ netbox_port_http }}:8000"
        env:
          ALLOWED_HOST: "{{ netbox_env_allowed_host }}"
          CSRF_TRUSTED_ORIGINS: "{{ netbox_env_csrf_trusted_origins }}"
          DB_NAME: "{{ netbox_env_db_name }}"
          DB_USER: "{{ netbox_env_db_user }}"
          DB_PASSWORD: "{{ netbox_env_db_password }}"
          DB_HOST: "{{ netbox_db_container_name }}"
          DB_PORT: "5432"
          REDIS_HOST: "{{ netbox_redis_container_name }}"
          REDIS_PORT: "6379"
          REDIS_PASSWORD: "{{ netbox_env_redis_password }}"
          REDIS_DB_TASK: "{{ netbox_env_redis_db_task}}"
          REDIS_DB_CACHE: "{{ netbox_env_redis_db_cache }}"
          SUPERUSER_EMAIL: "{{ netbox_env_superuser_email }}"
          SUPERUSER_PASSWORD: "{{ netbox_env_superuser_password }}"
#          BASE_PATH:  #optional
#          REMOTE_AUTH_ENABLED:  #optional
#          REMOTE_AUTH_BACKEND:  #optional
#          REMOTE_AUTH_HEADER:  #optional
#          REMOTE_AUTH_AUTO_CREATE_USER:  #optional
#          REMOTE_AUTH_DEFAULT_GROUPS:  #optional
#          REMOTE_AUTH_DEFAULT_PERMISSIONS:  #optional
          DOCKER_MODS: "{{ netbox_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ netbox_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ netbox_env_docker_mods_install_pip_packages}}"
          PUID: "{{ netbox_user_id }}"
          PGID: "{{ netbox_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: "{{ netbox_healthcheck_test }}"
          interval: "{{ netbox_healthcheck_interval }}"
          timeout: "{{ netbox_healthcheck_timeout }}"
          retries: "{{ netbox_healthcheck_retries }}"
          start_period: "{{ netbox_healthcheck_start_period }}"
        links:
          - "{{ netbox_db_container_name }}"
          - "{{ netbox_redis_container_name }}"
        labels:
          autoheal: "{{ netbox_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ netbox_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ netbox_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ netbox_dockflare_access_group }}"
          dockflare.hostname: "{{ netbox_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ netbox_port_http }}"
          homepage.name: "{{ netbox_proper_name }}"
          homepage.group: "{{ netbox_homepage_group }}"
          homepage.icon: "{{ netbox_homepage_icon }}"
          homepage.href: "{{ netbox_homepage_href }}"
          homepage.description: "{{ 'an IP address management (IPAM) and data center infrastructure management (DCIM) tool' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ netbox_container_name }}"
          homepage.showStats: "{{ netbox_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ netbox_port_http }}"
          repliqate.enabled: "{{ netbox_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ netbox_repliqate_engine }}"
          repliqate.schedule: "{{ netbox_repliqate_schedule }}"
          repliqate.backup_id: "{{ netbox_repliqate_backup_id }}"
          repliqate.retention: "{{ netbox_repliqate_retention }}"
          traefik.enable: "{{ netbox_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.netbox.rule: "Host(`{{ netbox_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.netbox.tls.certresolver: "letsencrypt"
          traefik.http.routers.netbox.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.netbox.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.netbox.middlewares: "netbox@docker{{ ',tinyauth-auth@docker' if netbox_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.netbox.IPAllowList.sourcerange: "{{ netbox_traefik_whitelist }}"
          traefik.http.services.netbox.loadbalancer.server.port: "8000"
          wud.tag.include: "{{ netbox_wud_tag_include }}"
          wud.tag.transform.type: "{{ netbox_wud_tag_transform_type }}"
          wud.link.template: "{{ netbox_wud_link_template }}"
        cpu_shares: "{{ netbox_cpu_shares }}"
        memory: "{{ netbox_memory }}"
        memory_swap: "{{ netbox_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ netbox_proper_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (netbox_port_http | string)] +
                (['https://' + netbox_hostname + '.' + ansible_nas_domain] if (netbox_traefik_enabled is true or netbox_dockflare_enabled is true) else [])
              }}
  when: netbox_enabled is true

- name: Stop {{ netbox_proper_name }}
  block:
    - name: Stop {{ netbox_proper_name }} Container
      community.docker.docker_container:
        name: "{{ netbox_container_name }}"
        state: absent
  when: netbox_enabled is false

- name: Data Archive {{ netbox_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ netbox_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - netbox_enabled is false
