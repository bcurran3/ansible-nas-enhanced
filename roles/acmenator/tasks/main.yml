---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ acmenator_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ acmenator_container_name }}"
        hostname: "{{ acmenator_container_name }}"
        image: "{{ acmenator_image_name }}:{{ acmenator_image_tag }}"
        pull: true
        network_mode: "bridge"
        volumes:
          - "{{ traefik_data_directory }}/letsencrypt/acme.json:/traefik.json:ro"
          - "{{ acmenator_data_directory }}:/target"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        command: "-input /traefik.json -outdir /target -pem -pkcs -watch"
        labels:
          autoheal: "{{ acmenator_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ acmenator_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.group: "{{ acmenator_homepage_group }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.icon: "{{ acmenator_homepage_icon }}"
          homepage.description: "{{ 'Convert Traefik certs to PEM or p12' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ acmenator_container_name }}"
          homepage.showStats: "{{ acmenator_homepage_showstats }}"
          repliqate.enabled: "{{ acmenator_repliqate_enabled }}"
          repliqate.engine: "{{ acmenator_repliqate_engine }}"
          repliqate.schedule: "{{ acmenator_repliqate_schedule }}"
          repliqate.backup_id: "{{ acmenator_repliqate_backup_id }}"
          repliqate.retention: "{{ acmenator_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/ummecasino/acmenator"
        cpu_shares: "{{ acmenator_cpu_shares }}"
        memory: "{{ acmenator_memory }}"
        restart_policy: unless-stopped
  when: acmenator_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ acmenator_container_name }}"
        state: absent
  when: acmenator_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ acmenator_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ acmenator_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: acmenator_enabled is false and archive_app_data_enabled is true

