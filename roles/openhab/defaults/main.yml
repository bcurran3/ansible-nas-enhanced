---
ansible_nas_app_name: "openHAB"

openhab_enabled: false
openhab_available_externally: false
openhab_traefik_whitelist: "{{ lan }}"

# directories
openhab_data_directory: "{{ docker_home }}/openhab"

# network
openhab_port_http: "7777"
openhab_port_https: "7778"
openhab_hostname: "openhab"

# docker
openhab_container_name: "openhab"
openhab_image_name: "openhab/openhab"
openhab_image_version: "latest"
openhab_cpu_shares: 1024

# specs
openhab_memory: 1g

# autoheal
openhab_autoheal: "false"

# homepage
openhab_homepage_group: "Apps"
openhab_homepage_icon: "openhab.png"
openhab_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ openhab_port }}"
openhab_homepage_showStats: "false"

# watchtower
openhab_watchtower_monitor_only: "true"