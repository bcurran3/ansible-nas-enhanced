---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} group
      ansible.builtin.group:
        name: openhab
        gid: 9001
        state: present

    - name: Create {{ ansible_nas_app_name }} user
      ansible.builtin.user:
        name: openhab
        uid: 9001
        state: present
        system: yes
        update_password: on_create
        create_home: no
        group: openhab

    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: openhab
        group: openhab
      with_items:
        - "{{ openhab_data_directory }}"
        - "{{ openhab_data_directory }}/conf"
        - "{{ openhab_data_directory }}/userdata"
        - "{{ openhab_data_directory }}/addons"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ openhab_container_name }}"
        hostname: "{{ openhab_container_name }}"
        image: "{{ openhab_image_name }}:{{ openhab_image_version }}"
        pull: true
        network_mode: "host"
        volumes:
          - "{{ openhab_data_directory }}/conf:/openhab/conf:rw"
          - "{{ openhab_data_directory }}/userdata:/openhab/userdata:rw"
          - "{{ openhab_data_directory }}/addons:/openhab/addons:rw"
          - "/etc/localtime:/etc/localtime:ro"
          - "/etc/timezone:/etc/timezone:ro"
        env:
          OPENHAB_HTTP_PORT: "{{ openhab_port_http }}"
          OPENHAB_HTTPS_PORT: "{{ openhab_port_https }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ openhab_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ openhab_watchtower_enable }}"
          dockflare.enable: "{{ openhab_dockflare_tunnel }}"
          dockflare.access.group: "{{ openhab_dockflare_access_group }}"
          dockflare.hostname: "{{ openhab_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ openhab_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ openhab_homepage_group }}"
          homepage.icon: "{{ openhab_homepage_icon }}"
          homepage.href: "{{ openhab_homepage_href }}"
          homepage.description: "{{ 'openhab description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ openhab_container_name }}"
          homepage.showStats: "{{ openhab_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ openhab_port }}"
# NOTE: Since this is in host mode, why add Traefik labels?
# TDL:  Possible to bridge app?
          traefik.enable: "false"
#          traefik.enable: "{{ openhab_available_externally | string }}"
#          traefik.http.routers.openhab.rule: "Host(`{{ openhab_hostname }}.{{ ansible_nas_domain }}`)"
#          traefik.http.routers.openhab.tls.certresolver: "letsencrypt"
#          traefik.http.routers.openhab.tls.domains[0].main: "{{ ansible_nas_domain }}"
#          traefik.http.routers.openhab.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
#          traefik.http.routers.frontend.middlewares: "{{ openhab_hostname }}"
#          traefik.http.routers.openhab.middlewares: "{{ openhab_hostname }}@docker"
#          traefik.http.middlewares.openhab.IPAllowList.sourcerange: "{{ openhab_traefik_whitelist }}"
#          traefik.http.services.openhab.loadbalancer.server.port: "7777"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/openhab/openhab"
        cpu_shares: "{{ openhab_cpu_shares }}"
        memory: "{{ openhab_memory }}"
        restart_policy: unless-stopped
  when: openhab_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ openhab_container_name }}"
        state: absent
  when: openhab_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ openhab_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ openhab_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: openhab_enabled is false and archive_app_data_enabled is true
