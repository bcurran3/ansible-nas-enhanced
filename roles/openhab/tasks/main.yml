---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} group
      ansible.builtin.group:
        name: openhab
        gid: 9001
        state: present

    - name: Create {{ ansible_nas_app_name }} user
      ansible.builtin.user:
        name: openhab
        uid: 9001
        state: present
        system: yes
        update_password: on_create
        create_home: no
        group: openhab

    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: openhab
        group: openhab
      with_items:
        - "{{ openhab_data_directory }}"
        - "{{ openhab_data_directory }}/conf"
        - "{{ openhab_data_directory }}/userdata"
        - "{{ openhab_data_directory }}/addons"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        openhab_homepage_href: "https://{{ openhab_hostname }}.{{ ansible_nas_domain }}"
      when: openhab_traefik_enabled | bool or openhab_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ openhab_container_name }}"
        hostname: "{{ openhab_container_name }}"
        image: "{{ openhab_image_name }}:{{ openhab_image_version }}"
        pull: true
        network_mode: host
        volumes:
          - "{{ openhab_data_directory }}/conf:/openhab/conf:rw"
          - "{{ openhab_data_directory }}/userdata:/openhab/userdata:rw"
          - "{{ openhab_data_directory }}/addons:/openhab/addons:rw"
          - "/etc/localtime:/etc/localtime:ro"
          - "/etc/timezone:/etc/timezone:ro"
        env:
          OPENHAB_HTTP_PORT: "{{ openhab_port_http }}"
          OPENHAB_HTTPS_PORT: "{{ openhab_port_https }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ openhab_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ openhab_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ openhab_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ openhab_dockflare_access_group }}"
          dockflare.hostname: "{{ openhab_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ openhab_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ openhab_homepage_group }}"
          homepage.icon: "{{ openhab_homepage_icon }}"
          homepage.href: "{{ openhab_homepage_href }}"
          homepage.description: "{{ 'openhab description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ openhab_container_name }}"
          homepage.showStats: "{{ openhab_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ openhab_port_http }}"
          repliqate.enabled: "{{ openhab_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ openhab_repliqate_engine }}"
          repliqate.schedule: "{{ openhab_repliqate_schedule }}"
          repliqate.backup_id: "{{ openhab_repliqate_backup_id }}"
          repliqate.retention: "{{ openhab_repliqate_retention }}"
          traefik.enable: "{{ openhab_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.openhab.rule: "Host(`{{ openhab_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.openhab.entrypoints: "websecure"
          traefik.http.routers.openhab.tls.certresolver: "letsencrypt"
          traefik.http.routers.openhab.middlewares: "{{ openhab_hostname }}@docker{{ ',tinyauth-auth@docker' if openhab_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.openhab.IPAllowList.sourcerange: "{{ openhab_traefik_whitelist }}"
          traefik.http.services.openhab.loadbalancer.server.url: "http:{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ openhab_port_http }}"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/openhab/openhab"
        cpu_shares: "{{ openhab_cpu_shares }}"
        memory: "{{ openhab_memory }}"
        memory_swap: "{{ openhab_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (openhab_port_http | string)] +
                (['https://' + openhab_hostname + '.' + ansible_nas_domain] if (openhab_traefik_enabled is true or openhab_dockflare_enabled is true) else [])
              }}
  when: openhab_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ openhab_container_name }}"
        state: absent
  when: openhab_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ openhab_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - openhab_enabled is false