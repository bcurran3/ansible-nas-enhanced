---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ portracker_data_directory }}"
        - "{{ portracker_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ portracker_container_name }}"
        hostname: "{{ portracker_container_name }}"
        image: "{{ portracker_image_name }}:{{ portracker_image_tag }}"
        pull: true
        pid_mode: host
        volumes:
          - "{{ portracker_data_directory }}/data:/data"
          - "/var/run/docker.sock:/var/run/docker.sock:ro"
        ports:
          - "{{ portracker_port_http }}:{{ portracker_port_http }}"
        env:
          DATABASE_PATH: "/data/portracker.db"
          PORT: "{{ portracker_port_http }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ portracker_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ portracker_watchtower_enable }}"
          dockflare.enable: "{{ portracker_dockflare_tunnel }}"
          dockflare.access.group: "{{ portracker_dockflare_access_group }}"
          dockflare.hostname: "{{ portracker_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ portracker_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ portracker_homepage_group }}"
          homepage.icon: "{{ portracker_homepage_icon }}"
          homepage.href: "{{ portracker_homepage_href }}"
          homepage.description: "{{ 'real-time port monitoring and discovery tool' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ portracker_container_name }}"
          homepage.showStats: "{{ portracker_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ portracker_port_http }}"
          repliqate.enabled: "{{ portracker_repliqate_enabled }}"
          repliqate.engine: "{{ portracker_repliqate_engine }}"
          repliqate.schedule: "{{ portracker_repliqate_schedule }}"
          repliqate.backup_id: "{{ portracker_repliqate_backup_id }}"
          repliqate.retention: "{{ portracker_repliqate_retention }}"
          traefik.enable: "{{ portracker_available_externally | string }}"
          traefik.http.routers.portracker.rule: "Host(`{{ portracker_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.portracker.tls.certresolver: "letsencrypt"
          traefik.http.routers.portracker.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.portracker.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.portracker.middlewares: "portracker@docker{{ ',tinyauth-auth@docker' if portracker_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.portracker.IPAllowList.sourcerange: "{{ portracker_traefik_whitelist }}"
          traefik.http.services.portracker.loadbalancer.server.port: "{{ portracker_port_http }}"
          wud.tag.include: '^\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/mostafawahied/portracker"
        cpu_shares: "{{ portracker_cpu_shares }}"
        memory: "{{ portracker_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (portracker_port_http | string)] +
                (['https://' + portracker_hostname + '.' + ansible_nas_domain] if (portracker_available_externally is true or portracker_dockflare_tunnel is true) else [])
              }}
  when: portracker_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ portracker_container_name }}"
        state: absent
  when: portracker_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ portracker_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - portracker_enabled is false