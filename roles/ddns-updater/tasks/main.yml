---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ ddns_updater_data_directory }}"
        state: directory

    - name: Check {{ ansible_nas_app_name }} config is defined
      ansible.builtin.fail:
        msg: "Please configure {{ ansible_nas_app_name }} by setting ddns_updater_config in your inventory nas.yml."
      when: ddns_updater_config is not defined

    - name: Generate {{ ansible_nas_app_name }} config.json
      ansible.builtin.copy:
        content: "{{ ddns_updater_config | to_nice_json }}"
        dest: "{{ ddns_updater_data_directory }}/config.json"
      register: ddns_updater_config

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ ddns_updater_container_name }}"
        hostname: "{{ ddns_updater_container_name }}"
        image: "{{ ddns_updater_image_name }}:{{ ddns_updater_image_tag }}"
        pull: true
        ports:
          - "{{ ddns_updater_port }}:{{ ddns_updater_port }}"
        volumes:
          - "{{ ddns_updater_data_directory }}:/updater/data:rw"
        env:
          GOTIFY_TOKEN: "{{ ddns_updater_gotify_token | default('') }}"
          GOTIFY_URL: "{{ ddns_updater_gotify_url | default('') }}"
          PERIOD: "{{ ddns_updater_period }}"
          UPDATE_COOLDOWN_PERIOD: "{{ ddns_updater_cooldown_period }}"
          HTTP_TIMEOUT: "{{ ddns_updater_http_timeout }}"
          TZ: "{{ ansible_nas_timezone }}"
          BACKUP_PERIOD: "72h"
          LISTENING_PORT: "{{ ddns_updater_port }}"
        labels:
          autoheal: "{{ ddns_updater_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ ddns_updater_watchtower_enable }}"
          dockflare.enable: "{{ ddns_updater_dockflare_tunnel }}"
          dockflare.access.group: "{{ ddns_updater_dockflare_access_group }}"
          dockflare.hostname: "{{ ddns_updater_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ ddns_updater_port }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ ddns_updater_homepage_group }}"
          homepage.icon: "{{ ddns_updater_homepage_icon }}"
          homepage.href: "{{ ddns_updater_homepage_href }}"
          homepage.description: "{{ 'ddns_updater description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ ddns_updater_container_name }}"
          homepage.showStats: "{{ ddns_updater_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ ddns_updater_port }}"
          traefik.enable: "{{ ddns_updater_available_externally | string }}"
          traefik.http.routers.ddns_updater.rule: "Host(`{{ ddns_updater_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.ddns_updater.tls.certresolver: "letsencrypt"
          traefik.http.routers.ddns_updater.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.ddns_updater.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ ddns_updater_hostname }}"
          traefik.http.routers.ddns_updater.middlewares: "ddns_updater@docker"
          traefik.http.middlewares.ddns_updater.IPAllowList.sourcerange: "{{ ddns_updater_traefik_whitelist }}"
          traefik.http.services.ddns_updater.loadbalancer.server.port: "{{ ddns_updater_port }}"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/qmcgaw/ddns-updater"
        cpu_shares: "{{ ddns_updater_cpu_shares }}"
        memory: "{{ ddns_updater_memory }}"
        restart: "{{ ddns_updater_config is changed }}"
        restart_policy: unless-stopped
  when: ddns_updater_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ ddns_updater_container_name }}"
        state: absent
  when: ddns_updater_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ ddns_updater_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ ddns_updater_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: ddns_updater_enabled is false and archive_app_data_enabled is true
