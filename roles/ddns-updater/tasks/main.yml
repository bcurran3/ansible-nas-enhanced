---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ ddns_updater_data_directory }}"
        state: directory

    - name: Check {{ ansible_nas_app_name }} config is defined
      ansible.builtin.fail:
        msg: "Please configure {{ ansible_nas_app_name }} by setting ddns_updater_config in your inventory nas.yml."
      when: ddns_updater_config is not defined

    - name: Generate {{ ansible_nas_app_name }} config.json
      ansible.builtin.copy:
        content: "{{ ddns_updater_config | to_nice_json }}"
        dest: "{{ ddns_updater_data_directory }}/config.json"
      register: ddns_updater_config

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ ddns_updater_container_name }}"
        hostname: "{{ ddns_updater_container_name }}"
        image: "{{ ddns_updater_image_name }}:{{ ddns_updater_image_tag }}"
        pull: true
        ports:
          - "{{ ddns_updater_port_http }}:{{ ddns_updater_port_http }}"
        volumes:
          - "{{ ddns_updater_data_directory }}:/updater/data:rw"
        env:
          BACKUP_PERIOD: "72h"
          GOTIFY_TOKEN: "{{ ddns_updater_gotify_token | default('') }}"
          GOTIFY_URL: "{{ ddns_updater_gotify_url | default('') }}"
          HTTP_TIMEOUT: "{{ ddns_updater_http_timeout }}"
          LISTENING_PORT: "{{ ddns_updater_port_http }}"
          PERIOD: "{{ ddns_updater_period }}"
          UPDATE_COOLDOWN_PERIOD: "{{ ddns_updater_cooldown_period }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ ddns_updater_autoheal | string }}"
          com.centurylinklabs.watchtower.enable: "{{ ddns_updater_watchtower_enabled | string }}"
          dockflare.enable: "{{ ddns_updater_dockflare_enabled | string }}"
          dockflare.access.group: "{{ ddns_updater_dockflare_access_group }}"
          dockflare.hostname: "{{ ddns_updater_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ ddns_updater_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ ddns_updater_homepage_group }}"
          homepage.icon: "{{ ddns_updater_homepage_icon }}"
          homepage.href: "{{ ddns_updater_homepage_href }}"
          homepage.description: "{{ 'ddns_updater description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ ddns_updater_container_name }}"
          homepage.showStats: "{{ ddns_updater_homepage_showstats | string }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ ddns_updater_port_http }}"
          repliqate.enabled: "{{ ddns_updater_repliqate_enabled | string }}"
          repliqate.engine: "{{ ddns_updater_repliqate_engine }}"
          repliqate.schedule: "{{ ddns_updater_repliqate_schedule }}"
          repliqate.backup_id: "{{ ddns_updater_repliqate_backup_id }}"
          repliqate.retention: "{{ ddns_updater_repliqate_retention }}"
          traefik.enable: "{{ ddnsupdater_available_externally | string }}"
          traefik.http.routers.ddnsupdater.rule: "Host(`{{ ddns_updater_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.ddnsupdater.tls.certresolver: "letsencrypt"
          traefik.http.routers.ddnsupdater.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.ddnsupdater.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.ddnsupdater.middlewares: "ddnsupdater@docker{{ ',tinyauth-auth@docker' if ddns_updater_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.ddnsupdater.IPAllowList.sourcerange: "{{ ddns_updater_traefik_whitelist }}"
          traefik.http.services.ddns_updater.loadbalancer.server.port: "{{ ddns_updater_port_http }}"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/qmcgaw/ddns-updater"
        cpu_shares: "{{ ddns_updater_cpu_shares }}"
        memory: "{{ ddns_updater_memory }}"
        memory_swap: "{{ ddns_updater_memory_swap }}"
        restart: "{{ ddns_updater_config is changed }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (ddns_updater_port_http | string)] +
                (['https://' + ddns_updater_hostname + '.' + ansible_nas_domain] if (ddns_updater_available_externally is true or ddns_updater_dockflare_enabled is true) else [])
              }}
  when: ddns_updater_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ ddns_updater_container_name }}"
        state: absent
  when: ddns_updater_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ ddns_updater_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - ddns_updater_enabled is false