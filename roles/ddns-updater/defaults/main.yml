---
# ANE
ansible_nas_app_name: "ddns-updater"
ddns_updater_enabled: false
ddns_updater_traefik_enabled: false
ddns_updater_traefik_whitelist: "{{ lan }}"

# directories
ddns_updater_data_directory: "{{ docker_home }}/ddns-updater"

# network
ddns_updater_hostname: "ddnsupdater"
ddns_updater_port_http: "8202"

# docker
ddns_updater_container_name: "ddns-updater"
ddns_updater_image_name: "qmcgaw/ddns-updater"
ddns_updater_image_tag: "latest"

# specs
ddns_updater_cpu_shares: 1024
ddns_updater_memory: "1G"
ddns_updater_memory_swap: -1

# app
ddns_updater_period: 5m # Period of IP address check
ddns_updater_cooldown_period: 5m # Duration to cooldown between updates for each record. This is useful to avoid being rate limited or banned.
ddns_updater_http_timeout: 10s # Timeout for all HTTP requests

# autoheal
ddns_updater_autoheal_enabled: false

# dockflare
ddns_updater_dockflare_enabled: false
ddns_updater_dockflare_access_group: ""

# gotify
ddns_updater_gotify_token: "" # your app token
ddns_updater_gotify_url: "" # "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ gotify_port_http }}"

# homepage
ddns_updater_homepage_group: "Network"
ddns_updater_homepage_icon: "ddns-updater.png"
ddns_updater_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ ddns_updater_port_http }}"
ddns_updater_homepage_showstats: false

# repliqate
ddns_updater_repliqate_enabled: false
ddns_updater_repliqate_engine: "restic"
ddns_updater_repliqate_schedule: "@daily 3am"
ddns_updater_repliqate_backup_id: "{{ ddns_updater_container_name }}"
ddns_updater_repliqate_retention: "30d"

# tinyauth
ddns_updater_tinyauth_enabled: false

# watchtower
ddns_updater_watchtower_enabled: false

# ddns_updater_config describes the content of the config.json used to configure the updater.
# see https://github.com/qdm12/ddns-updater#configuration for more info
#
# ddns_updater_config:
