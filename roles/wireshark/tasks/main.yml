---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ wireshark_user_id }}"
        group: "{{ wireshark_group_id }}"
      with_items:
        - "{{ wireshark_data_directory }}"
        - "{{ wireshark_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ wireshark_container_name }}"
        hostname: "{{ wireshark_container_name }}"
        image: "{{ wireshark_image_name }}:{{ wireshark_image_version }}"
        pull: true
        network_mode: host
#        ports:
#         - "{{ wireshark_port_http }}:3000"
#          - "{{ wireshark_port_https }}:3001"
#          - "{{ wireshark_port_kasmvnc }}:8082"
        tmpfs:
          - /tmp:exec,mode=1777
        volumes:
          - "{{ wireshark_data_directory }}/config:/config:rw"
        devices: >-
                  {{
                    (wireshark_devices | default([])) + ['/dev/dri:/dev/dri']
                    if intel_igpu_enabled | default(false) | bool
                    else (wireshark_devices | default(omit))
                  }}
        env:
#          DISPLAY: ":99"
#          LIBGL_ALWAYS_SOFTWARE: "1"
#          GALLIUM_DRIVER: "llvmpipe"
#          NVIDIA_VISIBLE_DEVICES: "none" 
#          NVIDIA_DRIVER_CAPABILITIES: "none"
#          OCL_ICD_VENDORS: "none"
#          S6_READ_ONLY_ROOT: "1"
#          MESA_LOADER_DRIVER_OVERRIDE: "kmsro"
          CUSTOM_PORT: "{{ wireshark_port_http }}"
          CUSTOM_HTTPS_PORT: "{{ wireshark_port_https }}"
          CUSTOM_WS_PORT: "{{ wireshark_port_kasmvnc }}"
          CUSTOM_USER: "{{ wireshark_env_custom_user }}"
          PASSWORD: "{{ wireshark_env_password }}"
          DOCKER_MODS: "{{ wireshark_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ wireshark_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ wireshark_env_docker_mods_install_pip_packages}}"
          PUID: "{{ wireshark_user_id }}"
          PGID: "{{ wireshark_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        capabilities:
          - NET_ADMIN
          - NET_RAW
        labels:
          autoheal: "{{ wireshark_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ wireshark_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ wireshark_homepage_group }}"
          homepage.icon: "{{ wireshark_homepage_icon }}"
          homepage.href: "{{ wireshark_homepage_href }}"
          homepage.description: "{{ 'network traffic analyzer' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ wireshark_container_name }}"
          homepage.showStats: "{{ wireshark_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "https://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:3001"
          repliqate.enabled: "{{ wireshark_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ wireshark_repliqate_engine }}"
          repliqate.schedule: "{{ wireshark_repliqate_schedule }}"
          repliqate.backup_id: "{{ wireshark_repliqate_backup_id }}"
          repliqate.retention: "{{ wireshark_repliqate_retention }}"
          traefik.enable: "{{ wireshark_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.wireshark.rule: "Host(`{{ wireshark_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.wireshark.entrypoints: "websecure"
          traefik.http.routers.wireshark.tls.certresolver: "letsencrypt"
          traefik.http.routers.wireshark.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.wireshark.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.wireshark.middlewares: "wireshark-whitelist{{ ',tinyauth-auth@docker' if wireshark_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.wireshark-whitelist.ipallowlist.sourcerange: "{{ wireshark_traefik_whitelist }}"
          traefik.http.services.wireshark-svc.loadbalancer.server.url: "https://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:3001"
          traefik.http.services.wireshark-svc.loadbalancer.serversTransport: "ignore-cert@file"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "lscr.io/linuxserver/wireshark"
        cpu_shares: "{{ wireshark_cpu_shares }}"
        memory: "{{ wireshark_memory }}"
        memory_swap: "{{ wireshark_memory_swap }}"
        privileged: true
        shm_size: "1GB"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
          {{
            ['https://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + '3001'] +
            (['https://' + wireshark_hostname + '.' + ansible_nas_domain] if (wireshark_traefik_enabled is true) else [])
          }}
  when: wireshark_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ wireshark_container_name }}"
        state: absent
  when: wireshark_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ wireshark_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - wireshark_enabled is false