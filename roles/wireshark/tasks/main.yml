---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ wireshark_data_directory }}"
        - "{{ wireshark_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ wireshark_container_name }}"
        hostname: "{{ wireshark_container_name }}"
        image: "{{ wireshark_image_name }}:{{ wireshark_image_version }}"
        pull: true
        volumes:
          - "{{ wireshark_data_directory }}/config:/config:rw"
        network_mode: host
        env:
          TZ: "{{ ansible_nas_timezone }}"
          PUID: "{{ wireshark_user_id }}"
          PGID: "{{ wireshark_group_id }}"
        capabilities:
          - NET_ADMIN
        restart_policy: unless-stopped
        cpu_shares: "{{ wireshark_cpu_shares }}"
        memory: "{{ wireshark_memory }}"
        labels:
          autoheal: "{{ wireshark_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ wireshark_watchtower_monitor_only }}"
          traefik.enable: "{{ wireshark_available_externally | string }}"
          traefik.http.routers.wireshark.rule: "Host(`{{ wireshark_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.wireshark.tls.certresolver: "letsencrypt"
          traefik.http.routers.wireshark.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.wireshark.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ wireshark_hostname }}"
          traefik.http.routers.wireshark.middlewares: "{{ wireshark_hostname }}@docker"
          traefik.http.middlewares.wireshark.IPAllowList.sourcerange: "{{ wireshark_traefik_whitelist }}"
          traefik.http.services.wireshark.loadbalancer.server.port: "3000"
  when: wireshark_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ wireshark_container_name }}"
        state: absent
  when: wireshark_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ wireshark_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ wireshark_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: wireshark_enabled is false and archive_app_data_enabled is true
