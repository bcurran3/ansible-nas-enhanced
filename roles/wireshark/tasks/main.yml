---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ wireshark_data_directory }}"
        - "{{ wireshark_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ wireshark_container_name }}"
        hostname: "{{ wireshark_container_name }}"
        image: "{{ wireshark_image_name }}:{{ wireshark_image_version }}"
        pull: true
        volumes:
          - "{{ wireshark_data_directory }}/config:/config:rw"
        network_mode: host
        env:
          DOCKER_MODS: "{{ wireshark_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ wireshark_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ wireshark_env_docker_mods_install_pip_packages}}"
          PUID: "{{ wireshark_user_id }}"
          PGID: "{{ wireshark_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        capabilities:
          - NET_ADMIN
        labels:
          autoheal: "{{ wireshark_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ wireshark_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ wireshark_homepage_group }}"
          homepage.icon: "{{ wireshark_homepage_icon }}"
          homepage.href: "{{ wireshark_homepage_href }}"
          homepage.description: "{{ 'network traffic analyzer' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ wireshark_container_name }}"
          homepage.showStats: "{{ wireshark_homepage_showstats }}"
          homepage.siteMonitor: "https://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ wireshark_port_http }}"
          repliqate.enabled: "{{ wireshark_repliqate_enabled }}"
          repliqate.engine: "{{ wireshark_repliqate_engine }}"
          repliqate.schedule: "{{ wireshark_repliqate_schedule }}"
          repliqate.backup_id: "{{ wireshark_repliqate_backup_id }}"
          repliqate.retention: "{{ wireshark_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "lscr.io/linuxserver/wireshark"
        cpu_shares: "{{ wireshark_cpu_shares }}"
        memory: "{{ wireshark_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['https://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (wireshark_port_http | string)]
              }}
  when: wireshark_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ wireshark_container_name }}"
        state: absent
  when: wireshark_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ wireshark_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - wireshark_enabled is false