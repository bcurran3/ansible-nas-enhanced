---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ wireshark_data_directory }}"
        - "{{ wireshark_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ wireshark_container_name }}"
        hostname: "{{ wireshark_container_name }}"
        image: "{{ wireshark_image_name }}:{{ wireshark_image_version }}"
        pull: true
        volumes:
          - "{{ wireshark_data_directory }}/config:/config:rw"
        network_mode: host
        env:
          DOCKER_MODS: "{{ wireshark_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ wireshark_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ wireshark_env_docker_mods_install_pip_packages}}"
          PUID: "{{ wireshark_user_id }}"
          PGID: "{{ wireshark_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        capabilities:
          - NET_ADMIN
        labels:
          autoheal: "{{ wireshark_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ wireshark_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ wireshark_homepage_group }}"
          homepage.icon: "{{ wireshark_homepage_icon }}"
          homepage.href: "{{ wireshark_homepage_href }}"
          homepage.description: "{{ 'wireshark description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ wireshark_container_name }}"
          homepage.showStats: "{{ wireshark_homepage_showstats }}"
          homepage.siteMonitor: "https://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ wireshark_ports }}"
          traefik.enable: "false" # host mode
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "lscr.io/linuxserver/wireshark"
        cpu_shares: "{{ wireshark_cpu_shares }}"
        memory: "{{ wireshark_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['https://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (wireshark_port_https | string)]
              }}
  when: wireshark_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ wireshark_container_name }}"
        state: absent
  when: wireshark_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ wireshark_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ wireshark_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: wireshark_enabled is false and archive_app_data_enabled is true
