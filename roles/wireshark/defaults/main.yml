---
# ANE
ansible_nas_app_name: "Wireshark"
wireshark_enabled: false
wireshark_available_externally: false
wireshark_traefik_whitelist: "{{ lan }}"

# directories
wireshark_data_directory: "{{ docker_home }}/wireshark"

# uid / gid
wireshark_user_id: "1000"
wireshark_group_id: "1000"

# network
wireshark_hostname: "wireshark"
wireshark_port_http: "3000"
wireshark_port_https: "3001"

# docker
wireshark_container_name: "wireshark"
wireshark_image_name: "lscr.io/linuxserver/wireshark"
wireshark_image_version: "latest"

# specs
wireshark_cpu_shares: 1024
wireshark_memory: "512m"

# autoheal
wireshark_autoheal: "false"

# linuxserver.io docker mods
wireshark_env_docker_mods: ""
wireshark_env_docker_mods_install_packages: ""
wireshark_env_docker_mods_install_pip_packages: ""

# repliqate
wireshark_repliqate_enabled: "false"
wireshark_repliqate_engine: "restic"
wireshark_repliqate_schedule: "@daily 3am"
wireshark_repliqate_backup_id: "{{ wireshark_container_name }}"
wireshark_repliqate_retention: "30d"

# watchtower
wireshark_watchtower_enable: "false"

# TDL: more env vars can be added
# # https://github.com/linuxserver/docker-wireshark