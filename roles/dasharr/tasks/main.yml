---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ dasharr_data_directory }}"
        - "{{ dasharr_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ dasharr_container_name }}"
        hostname: "{{ dasharr_container_name }}"
        image: "{{ dasharr_image_name }}:{{ dasharr_image_tag }}"
        pull: true
        volumes:
          - "{{ dasharr_data_directory }}/config:/app/config"
        ports:
          - "{{ dasharr_port_http }}:{{ dasharr_port_http }}"
        env:
          APP_URL: "{{ dasharr_env_app_url }}"
          PORT: "{{ dasharr_port_http }}"
          PUID: "{{ dasharr_user_id }}"
          PGID: "{{ dasharr_group_id }}"
          SESSION_SECRET: "{{ dasharr_env_session_secret }}"
          TRUST_PROXY: "{{ dasharr_env_trust_proxy }}"
          JELLYFIN_URL: "{{ dasharr_env_jellyfin_url }}"
          JELLYFIN_API_KEY: "{{ dasharr_env_jellyfin_api_key }}"
          JELLYSEERR_URL: "{{ dasharr_env_jellyseerr_url }}"
          JELLYSEERR_API_KEY: "{{ dasharr_env_jellyseerr_api_key }}"
          OVERSEERR_URL: "{{ dasharr_env_overseerr_url }}"
          OVERSEERR_API_KEY: "{{ dasharr_env_overseerr_api_key }}"
          PLEX_URL: "{{ dasharr_env_plex_url }}"
          PLEX_TOKEN: "{{ dasharr_env_plex_token }}"
          PROWLARR_URL: "{{ dasharr_env_prowlarr_url }}"
          PROWLARR_API_KEY: "{{ dasharr_env_prowlarr_api_key }}"
          QBITTORRENT_URL: "{{ dasharr_env_qbittorrent_url }}"
          QBITTORRENT_USERNAME: "{{ dasharr_env_qbittorrent_username }}"
          QBITTORRENT_PASSWORD: "{{ dasharr_env_qbittorrent_password }}"
          RADARR_URL: "{{ dasharr_env_radarr_url }}"
          RADARR_API_KEY: "{{ dasharr_env_radarr_api_key }}"
          SABNZBD_URL: "{{ dasharr_env_sabnzbd_url }}"
          SABNZBD_API: "{{ dasharr_env_sabnzbd_api_key }}"
          SONARR_URL: "{{ dasharr_env_sonarr_url }}"
          SONARR_API_KEY: "{{ dasharr_env_sonarr_api_key }}"
          TAUTULLI_URL: "{{ dasharr_env_tautulli_url }}"
          TAUTULLI_API_KEY: "{{ dasharr_env_tautulli_api_key }}"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: ["CMD", "wget", "-q", "--spider", "http://localhost:{{ dasharr_port_http }}"]
          interval: "30s"
          timeout: "10s"
          retries: 3
          start_period: "40s"
        labels:
          autoheal: "{{ dasharr_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ dasharr_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ dasharr_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ dasharr_dockflare_access_group }}"
          dockflare.hostname: "{{ dasharr_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ dasharr_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ dasharr_homepage_group }}"
          homepage.icon: "{{ dasharr_homepage_icon }}"
          homepage.href: "{{ dasharr_homepage_href }}"
          homepage.description: "{{ 'A unified media and network dashboard that consolidates your Plex, Jellyfin, Radarr, Sonarr, Bazarr, UniFi Network, and other services into one beautiful interface.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ dasharr_container_name }}"
          homepage.showStats: "{{ dasharr_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ dasharr_port_http }}"
          repliqate.enabled: "{{ dasharr_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ dasharr_repliqate_engine }}"
          repliqate.schedule: "{{ dasharr_repliqate_schedule }}"
          repliqate.backup_id: "{{ dasharr_repliqate_backup_id }}"
          repliqate.retention: "{{ dasharr_repliqate_retention }}"
          traefik.enable: "{{ dasharr_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.dasharr.rule: "Host(`{{ dasharr_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.dasharr.tls.certresolver: "letsencrypt"
          traefik.http.routers.dasharr.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.dasharr.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.dasharr.middlewares: "dasharr@docker{{ ',tinyauth-auth@docker' if dasharr_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.dasharr.IPAllowList.sourcerange: "{{ dasharr_traefik_whitelist }}"
          traefik.http.services.dasharr.loadbalancer.server.port: "{{ dasharr_port_http }}"
          wud.watch.digest: "true"
          wud.link.template: "https://hub.docker.com/r/schenanigans/dasharr"
        cpu_shares: "{{ dasharr_cpu_shares }}"
        memory: "{{ dasharr_memory }}"
        memory_swap: "{{ dasharr_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (dasharr_port_http | string)] +
                (['https://' + dasharr_hostname + '.' + ansible_nas_domain] if (dasharr_traefik_enabled is true or dasharr_dockflare_enabled is true) else [])
              }}
  when: dasharr_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ dasharr_container_name }}"
        state: absent
  when: dasharr_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ dasharr_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - dasharr_enabled is false