---
# TDL: This was discontinued in 2023 and moved to paperless-ngx
# convert to https://github.com/paperless-ngx/paperless-ngx
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ paperless_ng_data_directory }}"
        - "{{ paperless_ng_data_directory }}/data"
        - "{{ paperless_ng_files_directory }}"
        - "{{ paperless_ng_postgres_directory }}"
        - "{{ paperless_ng_export_directory }}"
        - "{{ paperless_ng_media_directory }}"
        - "{{ paperless_ng_consume_directory }}"

    - name: Create {{ ansible_nas_app_name }} network
      community.docker.docker_network:
        name: "{{ paperless_ng_network_name }}"

    - name: Create {{ ansible_nas_app_name }} Redis Container
      community.docker.docker_container:
        name: "{{ paperless_ng_redis_container_name }}"
        hostname: "{{ paperless_ng_redis_container_name }}"
        image: "{{ paperless_ng_redis_image_name }}:{{ paperless_ng_redis_image_version }}"
        pull: true
        cpu_shares: "{{ paperless_ng_redis_cpu_shares }}"
        restart_policy: unless-stopped
        memory: "{{ paperless_ng_redis_memory }}"
        networks:
          - name: "{{ paperless_ng_network_name }}"
        network_mode: "{{ paperless_ng_network_name }}"
        labels:
          autoheal: "{{ paperless_ng_redis_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ paperless_ng_redis_watchtower_monitor_only }}"

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ paperless_ng_db_container_name }}"
        hostname: "{{ paperless_ng_db_container_name }}"
        image: "{{ paperless_ng_db_image_name }}:{{ paperless_ng_db_image_version }}"
        pull: true
        cpu_shares: "{{ paperless_ng_db_cpu_shares }}"
        volumes:
          - "{{ paperless_ng_postgres_directory }}:/var/lib/postgresql/data"
        env:
          POSTGRES_DB: "{{ paperless_ng_postgres_db }}"
          POSTGRES_USER: "{{ paperless_ng_postgres_user }}"
          POSTGRES_PASSWORD: "{{ paperless_ng_postgres_password }}"
        restart_policy: unless-stopped
        memory: "{{ paperless_ng_postgres_memory }}"
        networks:
          - name: "{{ paperless_ng_network_name }}"
        network_mode: "{{ paperless_ng_network_name }}"
        labels:
          autoheal: "{{ paperless_ng_db_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ paperless_ng_db_watchtower_monitor_only }}"

    - name: Create {{ ansible_nas_app_name }} UI Container
      community.docker.docker_container:
        name: "{{ paperless_ng_uiserver_container_name }}"
        hostname: "{{ paperless_ng_uiserver_container_name }}"
        image: "{{ paperless_ng_uiserver_image_name }}:{{ paperless_ng_uiserver_image_version }}"
        pull: true
        cpu_shares: "{{ paperless_ng_uiserver_cpu_shares }}"
        volumes:
          - "{{ paperless_ng_data_directory }}/data:/usr/src/paperless/data"
          - "{{ paperless_ng_media_directory }}:/usr/src/paperless/media"
          - "{{ paperless_ng_export_directory }}:/usr/src/paperless/export"
          - "{{ paperless_ng_consume_directory }}:/usr/src/paperless/consume"
        ports:
          - "{{ paperless_ng_port }}:8000"
        env:
          PAPERLESS_REDIS: "redis://{{ paperless_ng_redis_container_name | string }}:6379"
          PAPERLESS_DBHOST: "{{ paperless_ng_db_container_name | string }}"
          USERMAP_UID: "{{ paperless_ng_user_id }}"
          USERMAP_GID: "{{ paperless_ng_group_id }}"
          PAPERLESS_OCR_LANGUAGES: "{{ paperless_ng_languages }}"
        restart_policy: unless-stopped
        memory: "{{ paperless_ng_ui_memory }}"
        networks:
          - name: "{{ paperless_ng_network_name }}"
        network_mode: "{{ paperless_ng_network_name }}"
        labels:
          autoheal: "{{ paperless_ng_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ paperless_ng_watchtower_monitor_only }}"
          traefik.enable: "{{ paperless_ng_available_externally | string }}"
          traefik.http.routers.paperless_ng.rule: "Host(`{{ paperless_ng_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.paperless_ng.tls.certresolver: "letsencrypt"
          traefik.http.routers.paperless_ng.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.paperless_ng.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.services.paperless_ng.loadbalancer.server.port: "8080"
  when: paperless_ng_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ paperless_ng_uiserver_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} Redis Container
      community.docker.docker_container:
        name: "{{ paperless_ng_redis_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ paperless_ng_db_container_name }}"
        state: absent
  when: paperless_ng_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ paperless_ng_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ paperless_ng_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: paperless_ng_enabled is false and archive_app_data_enabled is true
