---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ striparr_container_name }}"
        hostname: "{{ striparr_container_name }}"
        image: "{{ striparr_image_name }}:{{ striparr_image_tag }}"
        pull: true
        volumes:
          - "{{ sonarr_tv_directory }}:/tv:rw"
          - "{{ radarr_movies_directory }}:/movies:rw"
        ports:
          - "{{ striparr_port_http }}:40000"
        network_mode: bridge
        env:
          PUID: "{{ striparr_puid }}"
          PGID: "{{ striparr_pgid }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ striparr_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ striparr_watchtower_monitor_only }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ striparr_homepage_group }}"
          homepage.icon: "{{ striparr_homepage_icon }}"
          homepage.href: "{{ striparr_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ striparr_port_http }}"
          homepage.description: "{{ 'Strips metadata from files downloaded by Sonarr and Radarr.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ striparr_container_name }}"
          homepage.showStats: "{{ striparr_homepage_showStats }}"
          traefik.enable:: "false"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/mikenye/striparr"
        cpu_shares: "{{ striparr_cpu_shares }}"
        memory: "{{ striparr_memory }}"
        restart_policy: unless-stopped
  when: striparr_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ striparr_container_name }}"
        state: absent
  when: striparr_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ striparr_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ striparr_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: striparr_enabled is false and archive_app_data_enabled is true
