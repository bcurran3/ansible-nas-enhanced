---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ firefly_data_directory }}/mariadb"
        - "{{ firefly_data_directory }}/upload"
        - "{{ firefly_data_directory }}/export"

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ firefly_db_container_name }}"
        hostname: "{{ firefly_db_container_name }}"
        image: "{{ firefly_db_image_name }}:{{ firefly_db_image_tag }}"
        pull: true
        cpu_shares: "{{ firefly_db_cpu_shares }}"
        volumes:
          - "{{ firefly_data_directory }}/mariadb:/var/lib/mysql:rw"
        env:
          MYSQL_DATABASE: "firefly"
          MYSQL_USER: "firefly"
          MYSQL_PASSWORD: "firefly"
          MYSQL_ROOT_PASSWORD: "firefly"
        restart_policy: unless-stopped
        memory: "{{ firefly_db_memory }}"
        labels:
          autoheal: "{{ firefly_db_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ firefly_db_watchtower_monitor_only }}"

    - name: Wait for DB to init
      ansible.builtin.pause:
        seconds: 30

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ firefly_container_name }}"
        hostname: "{{ firefly_container_name }}"
        image: fireflyiii/core:latest
        pull: true
        volumes:
          - "{{ firefly_data_directory }}/export:/var/www/firefly-iii/storage/export:rw"
          - "{{ firefly_data_directory }}/upload:/var/www/firefly-iii/storage/upload:rw"
        links:
          - "{{ firefly_db_container_name }}"
        ports:
          - "{{ firefly_port }}:8080"
        env:
          APP_URL: "https://{{ firefly_hostname }}.{{ ansible_nas_domain }}"
          TRUSTED_PROXIES: "**"
          APP_ENV: "local"
          APP_KEY: "S0m3R@nd0mString0f32Ch@rsEx@ct1y"
          DB_CONNECTION: "mysql"
          DB_HOST: "{{ firefly_db_container_name }}"
          DB_DATABASE: "firefly"
          DB_USERNAME: "firefly"
          DB_PASSWORD: "firefly"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ firefly_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ firefly_watchtower_monitor_only }}"
          traefik.enable: "{{ firefly_available_externally | string }}"
          traefik.http.routers.firefly.rule: "Host(`{{ firefly_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.firefly.tls.certresolver: "letsencrypt"
          traefik.http.routers.firefly.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.firefly.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.services.firefly.loadbalancer.server.port: "8080"
        cpu_shares: "{{ firefly_cpu_shares }}"
        memory: "{{ firefly_memory }}"
        restart_policy: unless-stopped
  when: firefly_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ firefly_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ firefly_db_container_name }}"
        state: absent
  when: firefly_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ firefly_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ firefly_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: firefly_enabled is false and archive_app_data_enabled is true
