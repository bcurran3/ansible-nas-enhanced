---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ firefly_data_directory }}/mariadb"
        - "{{ firefly_data_directory }}/upload"
        - "{{ firefly_data_directory }}/export"

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ firefly_db_container_name }}"
        hostname: "{{ firefly_db_container_name }}"
        image: "{{ firefly_db_image_name }}:{{ firefly_db_image_tag }}"
        pull: true
        volumes:
          - "{{ firefly_data_directory }}/mariadb:/var/lib/mysql:rw"
        env:
          MYSQL_DATABASE: "firefly"
          MYSQL_USER: "firefly"
          MYSQL_PASSWORD: "firefly"
          MYSQL_ROOT_PASSWORD: "firefly"
        labels:
          autoheal: "{{ firefly_db_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ firefly_db_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} MariaDB"
          homepage.group: "{{ firefly_db_homepage_group }}"
          homepage.icon: "{{ firefly_db_homepage_icon }}"
          homepage.href: "{{ firefly_db_homepage_href }}"
          homepage.description: "{{ 'MariaDB Server is a high performing open source relational database, forked from MySQL.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ firefly_db_container_name }}"
          homepage.showStats: "{{ firefly_db_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ firefly_db_port_http }}"
          repliqate.enabled: "{{ firefly_db_repliqate_enabled }}"
          repliqate.engine: "{{ firefly_db_repliqate_engine }}"
          repliqate.schedule: "{{ firefly_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ firefly_db_repliqate_backup_id }}"
          repliqate.retention: "{{ firefly_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/mariadb"
        cpu_shares: "{{ firefly_db_cpu_shares }}"
        memory: "{{ firefly_db_memory }}"
        restart_policy: unless-stopped

    - name: Wait for DB to init
      ansible.builtin.pause:
        seconds: 30

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ firefly_container_name }}"
        hostname: "{{ firefly_container_name }}"
        image: fireflyiii/core:latest
        pull: true
        volumes:
          - "{{ firefly_data_directory }}/export:/var/www/firefly-iii/storage/export:rw"
          - "{{ firefly_data_directory }}/upload:/var/www/firefly-iii/storage/upload:rw"
        links:
          - "{{ firefly_db_container_name }}"
        ports:
          - "{{ firefly_port_http }}:8080"
        env:
          APP_URL: "https://{{ firefly_hostname }}.{{ ansible_nas_domain }}"
          APP_ENV: "local"
          APP_KEY: "S0m3R@nd0mString0f32Ch@rsEx@ct1y"
          DB_CONNECTION: "mysql"
          DB_HOST: "{{ firefly_db_container_name }}"
          DB_DATABASE: "firefly"
          DB_USERNAME: "firefly"
          DB_PASSWORD: "firefly"
          DOCKER_MODS: "{{ firefly_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ firefly_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ firefly_env_docker_mods_install_pip_packages}}"
          TRUSTED_PROXIES: "**"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ firefly_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ firefly_watchtower_enable }}"
          dockflare.enable: "{{ firefly_dockflare_tunnel }}"
          dockflare.access.group: "{{ firefly_dockflare_access_group }}"
          dockflare.hostname: "{{ firefly_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ firefly_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ firefly_homepage_group }}"
          homepage.icon: "{{ firefly_homepage_icon }}"
          homepage.href: "{{ firefly_homepage_href }}"
          homepage.description: "{{ 'firefly description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ firefly_container_name }}"
          homepage.showStats: "{{ firefly_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ firefly_port_http }}"
          repliqate.enabled: "{{ firefly_repliqate_enabled }}"
          repliqate.engine: "{{ firefly_repliqate_engine }}"
          repliqate.schedule: "{{ firefly_repliqate_schedule }}"
          repliqate.backup_id: "{{ firefly_repliqate_backup_id }}"
          repliqate.retention: "{{ firefly_repliqate_retention }}"
          traefik.enable: "{{ firefly_available_externally | string }}"
          traefik.http.routers.firefly.rule: "Host(`{{ firefly_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.firefly.tls.certresolver: "letsencrypt"
          traefik.http.routers.firefly.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.firefly.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ firefly_hostname }}"
          traefik.http.routers.firefly.middlewares: "{{ firefly_hostname }}@docker"
          traefik.http.middlewares.firefly.IPAllowList.sourcerange: "{{ firefly_traefik_whitelist }}"
          traefik.http.services.firefly.loadbalancer.server.port: "8080"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/fireflyiii/core"
        cpu_shares: "{{ firefly_cpu_shares }}"
        memory: "{{ firefly_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (firefly_port_http | string)] +
                (['https://' + firefly_hostname + '.' + ansible_nas_domain] if (firefly_available_externally is true or firefly_dockflare_tunnel is true) else [])
              }}
  when: firefly_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ firefly_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ firefly_db_container_name }}"
        state: absent
  when: firefly_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ firefly_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ firefly_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: firefly_enabled is false and archive_app_data_enabled is true
