---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ traefik_data_directory }}"
        - "{{ traefik_data_directory }}/data"
        - "{{ traefik_data_directory }}/letsencrypt"

    - name: Copy {{ ansible_nas_app_name }} Template config.toml
      ansible.builtin.template:
        src: traefik.toml
#       dest: "{{ traefik_data_directory }}/traefik.toml"
        dest: "{{ traefik_data_directory }}/data/traefik.toml"
      register: template_config

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ traefik_container_name }}"
        hostname: "{{ traefik_container_name }}"
        image: "{{ traefik_image_name }}:{{ traefik_image_version }}"
        pull: true
        network_mode: host
        dns_servers: "1.1.1.1"
        volumes:
#         - "{{ traefik_data_directory }}/traefik.toml:/etc/traefik/traefik.toml:ro"
          - "{{ traefik_data_directory }}/data:/etc/traefik"
          - "{{ traefik_data_directory }}/letsencrypt:/letsencrypt:rw"
          - "/var/run/docker.sock:/var/run/docker.sock:ro" # ignores this and uses UTC
        env: "{{ traefik_environment_variables }}"
        restart_policy: unless-stopped
        cpu_shares: "{{ traefik_cpu_shares }}"
        memory: "{{ traefik_memory }}"
        recreate: "{{ template_config is changed }}"
        labels:
          autoheal: "{{ traefik_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ traefik_watchtower_monitor_only }}"
          homepage.name: "Traefik"
          homepage.group: "{{ traefik_homepage_group }}"
          homepage.icon: "{{ traefik_homepage_icon }}"
          homepage.href: "{{ traefik_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:8083"
#         homepage.description: "The Cloud Native Application Proxy"
          homepage.server: "my-docker"
          homepage.container: "{{ traefik_container_name }}"
          homepage.showStats: "{{ traefik_homepage_showStats }}"
          homepage.widget.type: "traefik"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:8083"
          traefik.enable: "false"
#         traefik.enable: "{{ traefik_available_externally | string }}"
#         traefik.http.routers.traefik.rule: "Host(`{{ traefik_hostname }}.{{ ansible_nas_domain }}`)"
#         traefik.http.routers.traefik.tls.certresolver: "letsencrypt"
#         traefik.http.routers.traefik.tls.domains[0].main: "{{ ansible_nas_domain }}"
#         traefik.http.routers.traefik.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
#         traefik.http.middlewares.traefik.IPAllowList.sourcerange: "{{ traefik_traefik_whitelist }}"
#         traefik.http.services.traefik.loadbalancer.server.port: "8083"
#     TDL ^ needs re-write rule to go to dashboard
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/traefik/traefik/releases/tag/$${major}.$${minor}.$${patch}"
  when: traefik_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ traefik_container_name }}"
        state: absent
  when: traefik_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ traefik_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ traefik_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: traefik_enabled is false and archive_app_data_enabled is true
