---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        recurse: yes
      with_items:
        - "{{ gitea_data_directory }}/gitea"
        - "{{ gitea_data_directory }}/db"

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ gitea_db_container_name }}"
        hostname: "{{ gitea_db_container_name }}"
        image: "{{ gitea_db_image_name }}:{{ gitea_db_image_version }}"
        pull: true
        volumes:
          - "{{ gitea_data_directory }}/db:/var/lib/mysql:rw"
          - "/etc/timezone:/etc/timezone:ro"
          - "/etc/localtime:/etc/localtime:ro"
        env:
          MYSQL_DATABASE: "gitea"
          MYSQL_USER: "gitea"
          MYSQL_PASSWORD: "gitea"
          MYSQL_ROOT_PASSWORD: "gitea"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ gitea_db_autoheal | string }}"
          com.centurylinklabs.watchtower.enable: "{{ gitea_db_watchtower_enabled | string }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} MySQL"
          homepage.group: "{{ gitea_db_homepage_group }}"
          homepage.icon: "{{ gitea_db_homepage_icon }}"
          homepage.href: "{{ gitea_db_homepage_href }}"
          homepage.description: "{{ 'MySQL Server, the world''s most popular open source database' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ gitea_db_container_name }}"
          homepage.showStats: "{{ gitea_db_homepage_showstats | string }}"
          repliqate.enabled: "{{ gitea_db_repliqate_enabled | string }}"
          repliqate.engine: "{{ gitea_db_repliqate_engine }}"
          repliqate.schedule: "{{ gitea_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ gitea_db_repliqate_backup_id }}"
          repliqate.retention: "{{ gitea_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^9\.3\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/mysql"
        cpu_shares: "{{ gitea_db_cpu_shares }}"
        memory: "{{ gitea_db_memory }}"
        memory_swap: "{{ gitea_db_memory_swap }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ gitea_container_name }}"
        hostname: "{{ gitea_container_name }}"
        image: "{{ gitea_image_name }}:{{ gitea_image_version }}"
        pull: true
        volumes:
          - "{{ gitea_data_directory }}/gitea:/data:rw"
          - "/etc/timezone:/etc/timezone:ro"
          - "/etc/localtime:/etc/localtime:ro"
        ports:
          - "{{ gitea_port_http }}:3000"
          - "{{ gitea_port_ssh | string }}:{{ gitea_port_ssh | string }}"
        links:
          - "{{ gitea_db_container_name }}"
        env:
          DB_TYPE: "mysql"
          DB_HOST: "{{ gitea_db_container_name }}:3306"
          DB_NAME: "gitea"
          DB_USER: "gitea"
          DB_PASSWD: "gitea"
          DISABLE_REGISTRATION: "{{ gitea_disable_registration }}"
          RUN_MODE: "prod"
          SSH_DOMAIN: "{{ ansible_nas_hostname }}"
          SSH_PORT: "{{ gitea_port_ssh | string }}"
          ROOT_URL: "https://{{ gitea_hostname }}.{{ ansible_nas_domain }}/"
          USER_UID: "{{ gitea_uid }}"
          USER_GID: "{{ gitea_gid }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ gitea_autoheal | string }}"
          com.centurylinklabs.watchtower.enable: "{{ gitea_watchtower_enabled | string }}"
          dockflare.enable: "{{ gitea_dockflare_enabled | string }}"
          dockflare.access.group: "{{ gitea_dockflare_access_group }}"
          dockflare.hostname: "{{ gitea_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ gitea_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ gitea_homepage_group }}"
          homepage.icon: "{{ gitea_homepage_icon }}"
          homepage.href: "{{ gitea_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ gitea_port_http }}"
          homepage.description: "{{ 'git with a cup of tea' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ gitea_container_name }}"
          homepage.showStats: "{{ gitea_homepage_showstats | string }}"
          homepage.widget.type: "gitea"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ gitea_port_http }}"
          homepage.widget.key: "{{ gitea_homepage_widget_key }}"
          repliqate.enabled: "{{ gitea_repliqate_enabled | string }}"
          repliqate.engine: "{{ gitea_repliqate_engine }}"
          repliqate.schedule: "{{ gitea_repliqate_schedule }}"
          repliqate.backup_id: "{{ gitea_repliqate_backup_id }}"
          repliqate.retention: "{{ gitea_repliqate_retention }}"
          traefik.enable: "{{ gitea_available_externally | string }}"
          traefik.http.routers.gitea.rule: "Host(`{{ gitea_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.gitea.tls.certresolver: "letsencrypt"
          traefik.http.routers.gitea.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.gitea.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.gitea.middlewares: "gitea@docker{{ ',tinyauth-auth@docker' if gitea_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.gitea.IPAllowList.sourcerange: "{{ gitea_traefik_whitelist }}"
          traefik.http.services.gitea.loadbalancer.server.port: "3000"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/gitea/gitea"
        cpu_shares: "{{ gitea_cpu_shares }}"
        memory: "{{ gitea_memory }}"
        memory_swap: "{{ gitea_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (gitea_port_http | string)] +
                (['https://' + gitea_hostname + '.' + ansible_nas_domain] if (gitea_available_externally is true or gitea_dockflare_enabled is true) else [])
              }}
  when: gitea_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ gitea_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ gitea_db_container_name }}"
        state: absent
  when: gitea_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ gitea_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - gitea_enabled is false

# NOTE: configuration options
# https://docs.gitea.com/next/administration/config-cheat-sheet#service-service
