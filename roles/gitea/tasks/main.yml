---
- name: Start Gitea
  block:
    - name: Create Gitea Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        recurse: yes
      with_items:
        - "{{ gitea_data_directory }}/gitea"
        - "{{ gitea_data_directory }}/db"

    - name: Create Gitea MySQL container
      community.docker.docker_container:
        name: "{{ gitea_db_container_name }}"
        hostname: "{{ gitea_db_container_name }}"
        image: "{{ gitea_db_image_name }}:{{ gitea_db_image_version }}"
        pull: true
        volumes:
          - "{{ gitea_data_directory }}/db:/var/lib/mysql:rw"
          - "/etc/timezone:/etc/timezone:ro"
          - "/etc/localtime:/etc/localtime:ro"
        env:
          MYSQL_DATABASE: "gitea"
          MYSQL_USER: "gitea"
          MYSQL_PASSWORD: "gitea"
          MYSQL_ROOT_PASSWORD: "gitea"
          TZ: "{{ ansible_nas_timezone }}" # added
        restart_policy: unless-stopped
        memory: "{{ gitea_db_memory }}"
        labels:
          autoheal: "{{ gitea_db_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ gitea_db_watchtower_monitor_only }}"
          homepage.group: "{{ gitea_db_homepage_group }}"
          homepage.name: "Gitea MySQL"
          homepage.icon: "{{ gitea_db_homepage_icon }}"
          homepage.href: "{{ gitea_homepage_href }}"
#         homepage.description: "MySQL"
          homepage.server: "my-docker"
          homepage.container: "{{ gitea_db_container_name }}"
          homepage.showStats: "{{ gitea_db_homepage_showStats }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/mysql/mysql-server/releases/tag/$${major}.$${minor}.$${patch}"

    - name: Create Gitea container
      community.docker.docker_container:
        name: "{{ gitea_container_name }}"
        hostname: "{{ gitea_container_name }}"
        image: "{{ gitea_image_name }}:{{ gitea_image_version }}"
        pull: true
        volumes:
          - "{{ gitea_data_directory }}/gitea:/data:rw"
          - "/etc/timezone:/etc/timezone:ro"
          - "/etc/localtime:/etc/localtime:ro"
        ports:
          - "{{ gitea_port_http }}:3000"
          - "{{ gitea_port_ssh }}:{{ gitea_port_ssh }}"
        links:
          - "{{ gitea_db_container_name }}"
        env:
          DB_TYPE: "mysql"
          DB_HOST: "{{ gitea_db_container_name }}:3306"
          DB_NAME: "gitea"
          DB_USER: "gitea"
          DB_PASSWD: "gitea"
          DISABLE_REGISTRATION: "true"
          RUN_MODE: "prod"
          SSH_DOMAIN: "{{ ansible_nas_hostname }}"
          SSH_PORT: "{{ gitea_port_ssh }}"
          ROOT_URL: "https://{{ gitea_hostname }}.{{ ansible_nas_domain }}/"
          USER_UID: "{{ gitea_uid }}"
          USER_GID: "{{ gitea_gid }}"
          TZ: "{{ ansible_nas_timezone }}" # added
        restart_policy: unless-stopped
        memory: "{{ gitea_memory }}"
        labels:
          autoheal: "{{ gitea_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ gitea_watchtower_monitor_only }}"
          homepage.group: "{{ gitea_homepage_group }}"
          homepage.name: "Gitea"
          homepage.icon: "{{ gitea_homepage_icon }}"
          homepage.href: "{{ gitea_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ gitea_port_http }}"
#         homepage.description: "gitea"
          homepage.server: "my-docker"
          homepage.container: "{{ gitea_container_name }}"
          homepage.showStats: "{{ gitea_homepage_showStats }}"
          traefik.enable: "{{ gitea_available_externally | string }}"
          traefik.http.routers.gitea.rule: "Host(`{{ gitea_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.gitea.tls.certresolver: "letsencrypt"
          traefik.http.routers.gitea.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.gitea.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ gitea_hostname }}"
          traefik.http.routers.gitea.middlewares: "{{ gitea_hostname }}@docker"
          traefik.http.middlewares.gitea.IPAllowList.sourcerange: "{{ gitea_traefik_whitelist }}"
          traefik.http.services.gitea.loadbalancer.server.port: "3000"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/go-gitea/gitea/releases/tag/$${major}.$${minor}.$${patch}"
  when: gitea_enabled is true

- name: Stop Gitea
  block:
    - name: Stop Gitea
      community.docker.docker_container:
        name: "{{ gitea_container_name }}"
        state: absent

    - name: Stop Gitea MySQL
      community.docker.docker_container:
        name: "{{ gitea_db_container_name }}"
        state: absent
  when: gitea_enabled is false

# NOTE: configuration options
# https://docs.gitea.com/next/administration/config-cheat-sheet#service-service
