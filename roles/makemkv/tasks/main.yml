---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ makemkv_data_directory }}"
        - "{{ makemkv_data_directory }}/config"
        - "{{ makemkv_output_directory }}"

    - name: Check for optical drive device
      ansible.builtin.stat:
        path: "{{ makemkv_optical_drive }}"
      register: optical_drive_stat

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ makemkv_container_name }}"
        hostname: "{{ makemkv_container_name }}"
        image: "{{ makemkv_image_name }}:{{ makemkv_image_tag }}"
        pull: true
        volumes:
          - "{{ makemkv_data_directory }}/config:/config:rw"
          - "{{ (makemkv_optical_drive + ':/dev/sr0:ro') if optical_drive_stat.stat.exists | default(false) else omit }}"
          - "{{ makemkv_storage_directory }}:/storage:ro"
          - "{{ makemkv_output_directory }}:/output:rw"
        ports:
          - "{{ makemkv_port_http }}:5800"
        env:
          TZ: "{{ ansible_nas_timezone }}"
          USER_ID: "{{ makemkv_user_id }}"
          GROUP_ID: "{{ makemkv_group_id }}"
        labels:
          autoheal: "{{ makemkv_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ makemkv_watchtower_enable }}"
          dockflare.enable: "{{ makemkv_dockflare_tunnel }}"
          dockflare.access.group: "{{ makemkv_dockflare_access_group }}"
          dockflare.hostname: "{{ makemkv_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ makemkv_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ makemkv_homepage_group }}"
          homepage.icon: "{{ makemkv_homepage_icon }}"
          homepage.href: "{{ makemkv_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ makemkv_port_http }}"
          homepage.description: "{{ 'Backup your Bluray and DVD discs' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ makemkv_container_name }}"
          homepage.showStats: "{{ makemkv_homepage_showstats }}"
          repliqate.enabled: "{{ makemkv_repliqate_enabled }}"
          repliqate.engine: "{{ makemkv_repliqate_engine }}"
          repliqate.schedule: "{{ makemkv_repliqate_schedule }}"
          repliqate.backup_id: "{{ makemkv_repliqate_backup_id }}"
          repliqate.retention: "{{ makemkv_repliqate_retention }}"
          traefik.enable: "{{ makemkv_available_externally | string }}"
          traefik.http.routers.makemkv.rule: "Host(`makemkv.{{ ansible_nas_domain }}`)"
          traefik.http.routers.makemkv.tls.certresolver: "letsencrypt"
          traefik.http.routers.makemkv.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.makemkv.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ makemkv_hostname }}"
          traefik.http.routers.makemkv.middlewares: "{{ makemkv_hostname }}@docker"
          traefik.http.middlewares.makemkv.IPAllowList.sourcerange: "{{ makemkv_traefik_whitelist }}"
          traefik.http.services.makemkv.loadbalancer.server.port: "5800"
          wud.tag.include: '^v\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/jlesage/docker-makemkv/pkgs/container/makemkv"
        cpu_shares: "{{ makemkv_cpu_shares }}"
        memory: "{{ makemkv_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (makemkv_port_http | string)] +
                (['https://' + makemkv_hostname + '.' + ansible_nas_domain] if (makemkv_available_externally is true or makemkv_dockflare_tunnel is true) else [])
              }}
  when: makemkv_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ makemkv_container_name }}"
        state: absent
  when: makemkv_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ makemkv_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - makemkv_enabled is false