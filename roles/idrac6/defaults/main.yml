---
# ANE
ansible_nas_app_name: "iDRAC6"
idrac6_enabled: false
idrac6_available_externally: true
idrac6_traefik_whitelist: "{{ lan }}"
idrac6_data_directory: "{{ docker_home }}/idrac6"

# network
idrac6_hostname: "idrac6"
idrac6_port_http: "3062"
idrac6_port_vnc: "5902"

# docker
idrac6_container_name: "idrac6"
idrac6_image_name: "domistyle/idrac6"
idrac6_image_tag: "latest"

# specs
idrac6_cpu_shares: 1024
idrac6_memory: "512M"
idrac6_memory_swap: -1

# app
idrac6_env_idrac_host: "192.168.1.2" # set to your iDRAC IP
idrac6_env_idrac_user: "root"
idrac6_env_idrac_password: "" # set to your iDRAC password
idrac6_env_vnc_password: "{{ ansible_nas_app_admin_password }}"
idrac6_env_virtual_iso: ""
idrac6_env_user_id: "0"
idrac6_env_group_id: "0"

# autoheal
idrac6_autoheal: "false"

# homepage
idrac6_homepage_group: "Apps"
idrac6_homepage_icon: "https://snpi.dell.com/snp/images/products/large/en-nz~385-BBHP_v1/385-BBHP_v1.jpg"
idrac6_homepage_showstats: "false"
idrac6_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ idrac6_port_http }}"

# repliqate
idrac6_repliqate_enabled: "false"
idrac6_repliqate_engine: "restic"
idrac6_repliqate_schedule: "@daily 3am"
idrac6_repliqate_backup_id: "{{ idrac6_container_name }}"
idrac6_repliqate_retention: "30d"

# tinyauth
idrac6_tinyauth_enabled: false

# watchtower
idrac6_watchtower_enable: "false"