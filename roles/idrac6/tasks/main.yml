---
- name: Start {{ idrac6_proper_name }}
  block:
    - name: Create {{ idrac6_proper_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ idrac6_data_directory }}"
        - "{{ idrac6_data_directory }}/app"
        - "{{ idrac6_data_directory }}/vmedia"
        - "{{ idrac6_data_directory }}/screenshots"

    - name: Set {{ idrac6_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        idrac6_homepage_href: "https://{{ idrac6_hostname }}.{{ ansible_nas_domain }}"
      when: idrac6_traefik_enabled | bool or idrac6_dockflare_enabled | bool

    - name: Create {{ idrac6_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ idrac6_container_name }}"
        hostname: "{{ idrac6_container_name }}"
        image: "{{ idrac6_image_name }}:{{ idrac6_image_tag }}"
        pull: true
        network_mode: bridge
        ports:
          - "{{ idrac6_port_http }}:5800"
          - "{{ idrac6_port_vnc }}:5900"
        volumes:
          - "{{ idrac6_data_directory }}/app:/app"
          - "{{ idrac6_data_directory }}/vmedia:/vmedia"
          - "{{ idrac6_data_directory }}/screenshots:/screenshots"
        env:
          IDRAC_HOST: "{{ idrac6_env_idrac_host }}"
          IDRAC_USER: "{{ idrac6_env_idrac_user }}"
          IDRAC_PASSWORD: "{{ idrac6_env_idrac_password }}"
          VIRTUAL_ISO: "{{ idrac6_env_virtual_iso }}"
          VNC_PASSWORD: "{{ idrac6_env_vnc_password }}"
          USER_ID: "{{ idrac6_env_user_id }}"
          GROUP_ID: "{{ idrac6_env_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ idrac6_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ idrac6_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.group: "{{ idrac6_homepage_group }}"
          homepage.name: "{{ idrac6_proper_name }}"
          homepage.href: "{{ idrac6_homepage_href }}"
          homepage.icon: "{{ idrac6_homepage_icon }}"
          homepage.description: "{{ 'iDRAC 6 web interface and VNC proxy' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ idrac6_container_name }}"
          homepage.showStats: "{{ idrac6_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ idrac6_port_http }}"
          repliqate.enabled: "{{ idrac6_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ idrac6_repliqate_engine }}"
          repliqate.schedule: "{{ idrac6_repliqate_schedule }}"
          repliqate.backup_id: "{{ idrac6_repliqate_backup_id }}"
          repliqate.retention: "{{ idrac6_repliqate_retention }}"
          traefik.enable: "{{ idrac6_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.idrac6.rule: "Host(`{{ idrac6_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.idrac6.tls.certresolver: "letsencrypt"
          traefik.http.routers.idrac6.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.idrac6.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.idrac6.middlewares: "idrac6@docker{{ ',tinyauth-auth@docker' if idrac6_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.idrac6.IPAllowList.sourcerange: "{{ idrac6_traefik_whitelist }}"
          traefik.http.services.idrac6.loadbalancer.server.port: "5800"
          wud.watch.digest: "true"
          wud.link.template: "https://hub.docker.com/r/domistyle/idrac6"
        cpu_shares: "{{ idrac6_cpu_shares }}"
        memory: "{{ idrac6_memory }}"
        memory_swap: "{{ idrac6_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ idrac6_proper_name }} at
      ansible.builtin.debug:
        msg: >-
          {{
            [
              'http://' ~ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] ~ ':' ~ idrac6_port_http
            ] + (
              [
                'https://' ~ idrac6_hostname ~ '.' ~ ansible_nas_domain,
                'vnc://' ~ idrac6_hostname ~ '.' ~ ansible_nas_domain ~ ':' ~ idrac6_port_vnc
              ]
              if (idrac6_traefik_enabled is true or idrac6_dockflare_enabled is true) else []
            ) + [
              'vnc://' ~ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] ~ ':' ~ idrac6_port_vnc
            ]
          }}
  when: idrac6_enabled is true

- name: Stop {{ idrac6_proper_name }}
  block:
    - name: Stop {{ idrac6_proper_name }} Container
      community.docker.docker_container:
        name: "{{ idrac6_container_name }}"
        state: absent
  when: idrac6_enabled is false

- name: Data Archive {{ idrac6_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ idrac6_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - idrac6_enabled is false