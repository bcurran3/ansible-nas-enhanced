---
# ANE
ansible_nas_app_name: "RSS-Bridge"
rssbridge_enabled: false
rssbridge_available_externally: false
rssbridge_traefik_whitelist: "{{ lan }}"

# directories
rssbridge_data_directory: "{{ docker_home }}/rssbridge"

# network
rssbridge_port_http: "8091"
rssbridge_hostname: "rssbridge"

# docker
rssbridge_container_name: "rssbridge"
rssbridge_image_name: "ghcr.io/rss-bridge/rss-bridge"
rssbridge_image_version: "latest"

# specs
rssbridge_cpu_shares: 1024
rssbridge_memory: "1G"

# autoheal
rssbridge_autoheal: "false"

# dockflare
rssbridge_dockflare_tunnel: "false"
rssbridge_dockflare_access_group: ""

# homepage
rssbridge_homepage_group: "Apps"
rssbridge_homepage_icon: "sh-rss-bridge.png"
rssbridge_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ rssbridge_port_http }}"
rssbridge_homepage_showstats: "false"

# repliqate
rssbridge_repliqate_enabled: "false"
rssbridge_repliqate_engine: "restic"
rssbridge_repliqate_schedule: "@daily 3am"
rssbridge_repliqate_backup_id: "{{ rssbridge_container_name }}"
rssbridge_repliqate_retention: "30d"

# watchtower
rssbridge_watchtower_enable: "false"