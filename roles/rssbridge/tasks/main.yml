---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ rssbridge_data_directory }}/data"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        rssbridge_homepage_href: "https://{{ rssbridge_hostname }}.{{ ansible_nas_domain }}"
      when: rssbridge_traefik_enabled | bool or rssbridge_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ rssbridge_container_name }}"
        hostname: "{{ rssbridge_container_name }}"
        image: "{{ rssbridge_image_name }}:{{ rssbridge_image_version }}"
        pull: true
        volumes:
          - "{{ rssbridge_data_directory }}/data:/config:rw"
        ports:
          - "{{ rssbridge_port_http }}:80"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ rssbridge_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ rssbridge_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ rssbridge_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ rssbridge_dockflare_access_group }}"
          dockflare.hostname: "{{ rssbridge_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ rssbridge_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ rssbridge_homepage_group }}"
          homepage.icon: "{{ rssbridge_homepage_icon }}"
          homepage.href: "{{ rssbridge_homepage_href }}"
          homepage.description: "{{ 'rssbridge description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ rssbridge_container_name }}"
          homepage.showStats: "{{ rssbridge_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ rssbridge_port_http }}"
          repliqate.enabled: "{{ rssbridge_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ rssbridge_repliqate_engine }}"
          repliqate.schedule: "{{ rssbridge_repliqate_schedule }}"
          repliqate.backup_id: "{{ rssbridge_repliqate_backup_id }}"
          repliqate.retention: "{{ rssbridge_repliqate_retention }}"
          traefik.enable: "{{ rssbridge_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.rssbridge.rule: "Host(`{{ rssbridge_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.rssbridge.tls.certresolver: "letsencrypt"
          traefik.http.routers.rssbridge.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.rssbridge.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.rssbridge.middlewares: "rssbridge@docker{{ ',tinyauth-auth@docker' if rssbridge_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.rssbridge.IPAllowList.sourcerange: "{{ rssbridge_traefik_whitelist }}"
          traefik.http.services.rssbridge.loadbalancer.server.port: "80"
          wud.watch.digest: "true"
          wud.link.template: "https://github.com/RSS-Bridge/rss-bridge/pkgs/container/rss-bridge"
        cpu_shares: "{{ rssbridge_cpu_shares }}"
        memory: "{{ rssbridge_memory }}"
        memory_swap: "{{ rssbridge_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (rssbridge_port_http | string)] +
                (['https://' + rssbridge_hostname + '.' + ansible_nas_domain] if (rssbridge_traefik_enabled is true or rssbridge_dockflare_enabled is true) else [])
              }}
  when: rssbridge_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ rssbridge_container_name }}"
        state: absent
  when: rssbridge_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ rssbridge_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - rssbridge_enabled is false