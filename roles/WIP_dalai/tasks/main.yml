    - name: Create {{ dalai_proper_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ dalai_db_container_name }}"
        hostname: "{{ dalai_db_container_name }}"
        image: "{{ dalai_db_image_name }}:{{ dalai_db_image_tag }}"
        pull: true
        volumes:
          - "{{ dalai_data_directory }}/db:/var/lib/mysql"
        env:
          PUID: "1000"
          PGID: "1000"
          MYSQL_ROOT_PASSWORD: "topsecretroot"
          MYSQL_DATABASE: "dalai"
          MYSQL_USER: "dalai"
          MYSQL_PASSWORD: "{{ dalai_db_password }}"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: "{{ dalai_db_healthcheck_test }}"
          interval: "{{ dalai_db_healthcheck_interval }}"
          timeout: "{{ dalai_db_healthcheck_timeout }}"
          retries: "{{ dalai_db_healthcheck_retries }}"
          start_period: "{{ dalai_db_healthcheck_start_period }}"
        labels:
          autoheal: "{{ dalai_db_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ dalai_db_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ dalai_proper_name }} MariaDB"
          homepage.group: "{{ dalai_db_homepage_group }}"
          homepage.icon: "{{ dalai_db_homepage_icon }}"
          homepage.href: "{{ dalai_db_homepage_href }}"
          homepage.description: "{{ dalai_db_homepage_description if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ dalai_db_container_name }}"
          homepage.showStats: "{{ dalai_db_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ dalai_db_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ dalai_db_repliqate_engine }}"
          repliqate.schedule: "{{ dalai_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ dalai_db_repliqate_backup_id }}"
          repliqate.retention: "{{ dalai_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: "{{ dalai_db_wud_tag_include }}"
          wud.tag.transform.type: "{{ dalai_db_wud_tag_transform_type }}"
          wud.link.template: "{{ dalai_db_wud_link_template }}"
        cpu_shares: "{{ dalai_db_cpu_shares }}"
        memory: "{{ dalai_db_memory }}"
        memory_swap: "{{ dalai_db_memory_swap }}"
        restart_policy: unless-stopped

    - name: Verify {{ dalai_proper_name }} DB is healthy
      community.docker.docker_container_info:
        name: "{{ dalai_db_container_name }}"
      register: db_info
      until: "db_info.container.State.Health.Status == 'healthy'"
      retries: 30
      delay: 5

