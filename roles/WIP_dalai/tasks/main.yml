---
- name: Start {{ dalai_proper_name }}
  block:
    - name: Create {{ dalai_proper_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ dalai_data_directory }}"
        - "{{ dalai_data_directory }}/config"
#       - "{{ dalai_data_directory }}/db"

#    - name: Create {{ dalai_proper_name }} Volumes
#      community.docker.docker_volume:
#        name: "{{ item }}"
#      loop:
#        - dalai_volume1

    - name: Set {{ dalai_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        dalai_homepage_href: "https://{{ dalai_hostname }}.{{ ansible_nas_domain }}"
      when: dalai_traefik_enabled | bool or dalai_dockflare_enabled | bool

    - name: Create {{ dalai_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ dalai_container_name }}"
        hostname: "{{ dalai_container_name }}"
        image: "{{ dalai_image_name }}:{{ dalai_image_tag }}"
        pull: true
        volumes:
          - "{{ dalai_data_directory }}/config:/config"
        ports:
          - "{{ dalai_port_http }}:80"
        env:
#          DOCKER_MODS: "{{ dalai_env_docker_mods }}" # linuxserver.io images
#          INSTALL_PACKAGES: "{{ dalai_env_docker_mods_install_packages }}"
#          INSTALL_PIP_PACKAGES: "{{ dalai_env_docker_mods_install_pip_packages}}"
          PUID: "{{ dalai_user_id }}"
          PGID: "{{ dalai_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: "{{ dalai_healthcheck_test }}"
          interval: "{{ dalai_healthcheck_interval }}"
          timeout: "{{ dalai_healthcheck_timeout }}"
          retries: "{{ dalai_healthcheck_retries }}"
          start_period: "{{ dalai_healthcheck_start_period }}"
        labels:
          autoheal: "{{ dalai_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ dalai_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ dalai_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ dalai_dockflare_access_group }}"
          dockflare.hostname: "{{ dalai_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ dalai_port_http }}"
#         dockflare.access.policy: "authenticate"
#         dockflare.access.allowed_idps: "YOUR_IDP_UUID_HERE"
          homepage.name: "{{ dalai_proper_name }}"
          homepage.group: "{{ dalai_homepage_group }}"
          homepage.icon: "{{ dalai_homepage_icon }}"
          homepage.href: "{{ dalai_homepage_href }}"
          homepage.description: "{{ dalai_homepage_description if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ dalai_container_name }}"
          homepage.showStats: "{{ dalai_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ dalai_port_http }}"
          repliqate.enabled: "{{ dalai_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ dalai_repliqate_engine }}"
          repliqate.schedule: "{{ dalai_repliqate_schedule }}"
          repliqate.backup_id: "{{ dalai_repliqate_backup_id }}"
          repliqate.retention: "{{ dalai_repliqate_retention }}"
          traefik.enable: "{{ dalai_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.dalai.rule: "Host(`{{ dalai_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.dalai.tls.certresolver: "letsencrypt"
          traefik.http.routers.dalai.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.dalai.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.dalai.middlewares: "dalai@docker{{ ',tinyauth-auth@docker' if dalai_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.dalai.IPAllowList.sourcerange: "{{ dalai_traefik_whitelist }}"
          traefik.http.services.dalai.loadbalancer.server.port: "80"
          wud.tag.include: "{{ dalai_wud_tag_include }}"
          wud.tag.transform.type: "{{ dalai_wud_tag_transform_type }}"
          wud.link.template: "{{ dalai_wud_link_template }}"
        cpu_shares: "{{ dalai_cpu_shares }}"
        memory: "{{ dalai_memory }}"
        memory_swap: "{{ dalai_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ dalai_proper_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (dalai_port_http | string)] +
                (['https://' + dalai_hostname + '.' + ansible_nas_domain] if (dalai_traefik_enabled is true or dalai_dockflare_enabled is true) else [])
              }}
  when: dalai_enabled is true

- name: Stop {{ dalai_proper_name }}
  block:
    - name: Stop {{ dalai_proper_name }} Container
      community.docker.docker_container:
        name: "{{ dalai_container_name }}"
        state: absent
  when: dalai_enabled is false

- name: Data Archive {{ dalai_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ dalai_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - dalai_enabled is false

