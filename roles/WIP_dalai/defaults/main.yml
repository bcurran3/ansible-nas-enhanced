# docker
dalai_redis_container_name: "dalai-redis"
dalai_redis_image_name: "redis"
dalai_redis_image_tag: "latest"

# specs
dalai_redis_cpu_shares: 1024
dalai_redis_memory: "128M"
dalai_redis_memory_swap: "{{ dalai_redis_memory }}"

# autoheal
dalai_redis_autoheal_enabled: false

# healthcheck
dalai_redis_healthcheck_test: ["CMD-SHELL", "redis-cli -a topsecret ping | grep PONG || exit 1"]
dalai_redis_healthcheck_interval: 10s
dalai_redis_healthcheck_timeout: 5s
dalai_redis_healthcheck_retries: 3
dalai_redis_healthcheck_start_period: 10s

