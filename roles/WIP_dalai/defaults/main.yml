---
# ANE
dalai_proper_name: "dalai"
dalai_enabled: false
dalai_traefik_enabled: false
dalai_traefik_whitelist: "{{ lan }}"

# directories
dalai_data_directory: "{{ docker_home }}/dalai"

# docker
dalai_container_name: "dalai"
dalai_image_name: "devname/dalai" # use ghcr.io or lscr.io when available
dalai_image_tag: "latest"

# uid / gid
dalai_user_id: "0"
dalai_group_id: "0"

# network
dalai_hostname: "dalai"
#dalai_network_name: "dalai"
dalai_port_http: "8989"

# specs
dalai_cpu_shares: 1024
dalai_memory: "1G"
dalai_memory_swap: -1

# autoheal
dalai_autoheal_enabled: false

# dockflare
dalai_dockflare_enabled: false
dalai_dockflare_access_group: ""

# healthcheck
dalai_healthcheck_test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
dalai_healthcheck_interval: 1m
dalai_healthcheck_timeout: 10s
dalai_healthcheck_retries: 3
dalai_healthcheck_start_period: 30s

# homepage
dalai_homepage_description: "dalai short description"
dalai_homepage_group: "Apps"
dalai_homepage_icon: "dalai.png"
dalai_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ dalai_port_http }}"
dalai_homepage_showstats: false

# linuxserver.io docker mods for linuxserver.io images
#dalai_env_docker_mods: ""
#dalai_env_docker_mods_install_packages: ""
#dalai_env_docker_mods_install_pip_packages: ""

# repliqate
dalai_repliqate_enabled: false
dalai_repliqate_engine: "restic"
dalai_repliqate_schedule: "@daily 3am"
dalai_repliqate_backup_id: "{{ dalai_container_name }}"
dalai_repliqate_retention: "30d"

# tinyauth
dalai_tinyauth_enabled: false

# watchtower
dalai_watchtower_enabled: false

# wud
# Docker Hub example. Please edit.
dalai_wud_tag_include: '^\d+\.\d+$'
dalai_wud_tag_transform_type: "semver"
dalai_wud_link_template: "https://hub.docker.com/r/devname/dalai"
### Github example
#dalai_wud_tag_include: '^\d+\.\d+\.\d+$'
#dalai_wud_tag_transform_type: "semver"
#dalai_wud_link_template: "https://github.com/devname/dalai/pkgs/container/dalai"
### Linuxserver.io example
#dalai_wud_tag_include: '^\d+\.\d+\.\d+.*$'
#dalai_wud_tag_transform_type: "semver"
#dalai_wud_link_template: "https://lscr.io/linuxserver/dalai"

