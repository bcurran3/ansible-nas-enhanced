# docker
dalai_db_container_name: "dalai-db"
dalai_db_image_name: "mariadb"
dalai_db_image_tag: "latest"

# specs
dalai_db_cpu_shares: 1024
dalai_db_memory: "1G"
dalai_db_memory_swap: "{{ dalai_db_memory }}"

# autoheal
dalai_db_autoheal_enabled: false

# healthcheck
dalai_db_healthcheck_test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u", "dalai", "-p{{ dalai_db_password }}"]
dalai_db_healthcheck_interval: 10s
dalai_db_healthcheck_timeout: 5s
dalai_db_healthcheck_retries: 5
dalai_db_healthcheck_start_period: 30s

# homepage
dalai_db_homepage_description: "MariaDB Server is a high performing open source relational database, forked from MySQL."
dalai_db_homepage_group: "DBs"
dalai_db_homepage_icon: "mariadb.png"
dalai_db_homepage_href: "{{ dalai_homepage_href }}"
dalai_db_homepage_showstats: false

# repliqate
dalai_db_repliqate_enabled: false
dalai_db_repliqate_engine: "restic"
dalai_db_repliqate_schedule: "@daily 3am"
dalai_db_repliqate_backup_id: "{{ dalai_db_container_name }}"
dalai_db_repliqate_retention: "30d"

# watchtower
dalai_db_watchtower_enabled: false

# wud
dalai_db_wud_tag_include: '^\d+\.\d+\.\d+.*$'
dalai_db_wud_tag_transform_type: "semver"
dalai_db_wud_link_template: "https://hub.docker.com/_/mariadb"

