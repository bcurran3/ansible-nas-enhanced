---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ technitium_data_directory }}"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        technitium_homepage_href: "https://{{ technitium_hostname }}.{{ ansible_nas_domain }}"
      when: technitium_traefik_enabled | bool or technitium_dockflare_enabled | bool

    - name: Disable systemd-resolved StubListener
      ansible.builtin.lineinfile:
        path: /etc/systemd/resolved.conf
        regexp: '^#?DNSStubListener='
        line: 'DNSStubListener=no'
        state: present
      register: resolved_conf_disable

    - name: Update resolv.conf symlink
      ansible.builtin.file:
        src: /run/systemd/resolve/resolv.conf
        dest: /etc/resolv.conf
        state: link
        force: true
        follow: false

    - name: Restart systemd-resolved
      ansible.builtin.systemd_service:
        name: systemd-resolved
        state: restarted
      when: resolved_conf_disable.changed

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ technitium_container_name }}"
        hostname: "{{ technitium_container_name }}"
        image: "{{ technitium_image_name }}:{{ technitium_image_tag }}"
        pull: true
        dns_servers: "{{ technitium_dns }}"
        ports:
          - "{{ technitium_port_http }}:{{ technitium_port_http }}"
          - "53:53/udp"       # DNS Server
          - "53:53/tcp"       # DNS Server
#         - "67:67/udp"       # DHCP Server
#         - "80:80/tcp"       # DNS-over-HTTP service (use with reverse proxy or certbot certificate renewal)
#         - "443:443/udp"     # DNS-over-HTTPS service (HTTP/3)
#         - "443:443/tcp"     # DNS-over-HTTPS service (HTTP/1.1, HTTP/2)
          - "853:853/udp"     # DNS-over-QUIC service
          - "853:853/tcp"     # DNS-over-TLS service
          - "8053:8053/tcp"   # DNS-over-HTTP service (use with reverse proxy)
#         - "53443:53443/tcp" # DNS web console (HTTPS)
        sysctls:
          net.ipv4.ip_local_port_range: 1024 65535
        volumes:
          - "{{ technitium_data_directory }}:/etc/dns"
        env:
          DNS_SERVER_DOMAIN: "{{ technitium_env_dns_server_domain }}"
          DNS_SERVER_WEB_SERVICE_HTTP_PORT: "{{ technitium_port_http }}"
          DNS_SERVER_ADMIN_PASSWORD: "{{ technitium_env_dns_server_password }}"
#         DNS_SERVER_ADMIN_PASSWORD_FILE=password.txt #The path to a file that contains a plain text password for the DNS web console admin user.
          DNS_SERVER_PREFER_IPV6: "{{ technitium_env_dns_server_prefer_ipv6 }}"
#         DNS_SERVER_WEB_SERVICE_LOCAL_ADDRESSES=172.17.0.1,127.0.0.1 #Comma separated list of network interface IP addresses that you want the web service to listen on for requests. The "172.17.0.1" address is the built-in Docker bridge. The "[::]" is the default value if not specified. Note! This must be used only with "host" network mode.
          DNS_SERVER_WEB_SERVICE_HTTPS_PORT: "{{ technitium_env_dns_server_web_service_https_port }}"
          DNS_SERVER_WEB_SERVICE_ENABLE_HTTPS: "{{ technitium_env_dns_server_web_service_enable_https }}"
          DNS_SERVER_WEB_SERVICE_USE_SELF_SIGNED_CERT: "{{ technitium_env_dns_server_web_service_use_self_signed_cert }}"
          DNS_SERVER_OPTIONAL_PROTOCOL_DNS_OVER_HTTP: "{{ technitium_env_dns_server_optional_protocol_dns_over_http }}"
          DNS_SERVER_RECURSION: "{{ technitium_env_dns_server_recursion }}"
          DNS_SERVER_RECURSION_NETWORK_ACL: "{{ technitium_env_dns_server_recursion_network_acl }}"
          DNS_SERVER_ENABLE_BLOCKING: "{{ technitium_env_dns_server_enable_blocking }}"
          DNS_SERVER_ALLOW_TXT_BLOCKING_REPORT: "{{ technitium_env_dns_server_allow_txt_blocking_report }}"
          DNS_SERVER_BLOCK_LIST_URLS: "{{ technitium_env_dns_server_block_list_urls }}"
          DNS_SERVER_FORWARDERS: "{{ technitium_env_dns_server_forwarders }}"
          DNS_SERVER_FORWARDER_PROTOCOL: "{{ technitium_env_dns_server_forwarder_protocol }}"
          DNS_SERVER_LOG_USING_LOCAL_TIME: "{{ technitium_env_dns_server_log_using_local_time }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ technitium_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ technitium_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ technitium_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ technitium_dockflare_access_group }}"
          dockflare.hostname: "{{ technitium_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ technitium_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ technitium_homepage_group }}"
          homepage.icon: "{{ technitium_homepage_icon }}"
          homepage.href: "{{ technitium_homepage_href }}"
          homepage.description: "{{ 'DNS server for privacy & security Block ads & malware at DNS level for your entire network!' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ technitium_container_name }}"
          homepage.showStats: "{{ technitium_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ technitium_port_http }}"
          homepage.widget.type: "technitium"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ technitium_port_http }}"
          homepage.widget.key: "{{ technitium_homepage_widget_key }}"
          homepage.widget.range: "{{ technitium_homepage_widget_range }}"
          repliqate.enabled: "{{ technitium_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ technitium_repliqate_engine }}"
          repliqate.schedule: "{{ technitium_repliqate_schedule }}"
          repliqate.backup_id: "{{ technitium_repliqate_backup_id }}"
          repliqate.retention: "{{ technitium_repliqate_retention }}"
          traefik.enable: "{{ technitium_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.technitium.rule: "Host(`{{ technitium_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.technitium.tls.certresolver: "letsencrypt"
          traefik.http.routers.technitium.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.technitium.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.technitium.middlewares: "technitium@docker{{ ',tinyauth-auth@docker' if technitium_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.technitium.IPAllowList.sourcerange: "{{ technitium_traefik_whitelist }}"
          traefik.http.services.technitium.loadbalancer.server.port: "{{ technitium_port_http }}"
          wud.tag.include: '^\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/technitium/dns-server"
        cpu_shares: "{{ technitium_cpu_shares }}"
        memory: "{{ technitium_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (technitium_port_http | string)] +
                (['https://' + technitium_hostname + '.' + ansible_nas_domain] if (technitium_traefik_enabled is true or technitium_dockflare_enabled is true) else [])
              }}
  when: technitium_enabled is true

- name: Stop {{ ansible_nas_app_name }} Container
  community.docker.docker_container:
    name: "{{ technitium_container_name }}"
    state: absent
  when: technitium_enabled is false

- name: Re-enable systemd-resolved StubListener
  block:
    - name: Re-enable systemd-resolved StubListener
      ansible.builtin.lineinfile:
        path: /etc/systemd/resolved.conf
        regexp: '^#?DNSStubListener='
        line: 'DNSStubListener=yes'
        state: present
      register: resolved_conf_enable

    - name: Restore default resolv.conf symlink
      ansible.builtin.file:
        src: /run/systemd/resolve/stub-resolv.conf
        dest: /etc/resolv.conf
        state: link
        force: true
        follow: false

    - name: Restart systemd-resolved
      ansible.builtin.systemd_service:
        name: systemd-resolved
        state: restarted
      when: resolved_conf_enable.changed
  when: 
    - technitium_enabled is false
    - adguardhome_enabled is false
    - pihole_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ technitium_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - technitium_enabled is false