---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ technitium_data_directory }}"

    - name: Stop systemd-resolved service
      ansible.builtin.systemd_service:
        name: systemd-resolved
        state: stopped

    - name: Disable systemd-resolved service
      ansible.builtin.systemd_service:
        name: systemd-resolved
        enabled: false

    - name: Backup /etc/resolv.conf
      ansible.builtin.copy:
        src: /etc/resolv.conf
        dest: /etc/resolv.conf.bak.technitium
      ignore_errors: yes

    - name: Remove /etc/resolv.conf
      ansible.builtin.file:
        path: /etc/resolv.conf
        state: absent

    - name: Create new resolv.conf
      ansible.builtin.template:
        src: resolv.conf
        dest: /etc/resolv.conf
        owner: root
        group: root
        mode: '0644'

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ technitium_container_name }}"
        hostname: "{{ technitium_container_name }}"
        image: "{{ technitium_image_name }}:{{ technitium_image_tag }}"
        pull: true
        volumes:
          - "{{ technitium_data_directory }}:/etc/dns"
        ports:
          - "53:53/udp"
          - "53:53/tcp"
          - "{{ technitium_port }}:{{ {{ technitium_port }}"
        # - "53443:53443/tcp" #DNS web console (HTTPS)
        # - "853:853/udp" #DNS-over-QUIC service
        # - "853:853/tcp" #DNS-over-TLS service
        # - "443:443/udp" #DNS-over-HTTPS service (HTTP/3)
        # - "443:443/tcp" #DNS-over-HTTPS service (HTTP/1.1, HTTP/2)
        # - "80:80/tcp" #DNS-over-HTTP service (use with reverse proxy or certbot certificate renewal)
        # - "8053:8053/tcp" #DNS-over-HTTP service (use with reverse proxy)
        # - "67:67/udp" #DHCP service
        sysctls:
          net.ipv4.ip_local_port_range: 1024 65000
        env:
          DNS_SERVER_DOMAIN: "{{ technitium_env_dns_server_domain }}"
          DNS_SERVER_WEB_SERVICE_HTTP_PORT: "{{ {{ technitium_port }}"
      # - DNS_SERVER_ADMIN_PASSWORD=password #DNS web console admin user password.
      # - DNS_SERVER_ADMIN_PASSWORD_FILE=password.txt #The path to a file that contains a plain text password for the DNS web console admin user.
      # - DNS_SERVER_PREFER_IPV6=false #DNS Server will use IPv6 for querying whenever possible with this option enabled.
      # - DNS_SERVER_WEB_SERVICE_LOCAL_ADDRESSES=172.17.0.1,127.0.0.1 #Comma separated list of network interface IP addresses that you want the web service to listen on for requests. The "172.17.0.1" address is the built-in Docker bridge. The "[::]" is the default value if not specified. Note! This must be used only with "host" network mode.
      # - DNS_SERVER_WEB_SERVICE_HTTPS_PORT=53443 #The TCP port number for the DNS web console over HTTPS protocol.
      # - DNS_SERVER_WEB_SERVICE_ENABLE_HTTPS=false #Enables HTTPS for the DNS web console.
      # - DNS_SERVER_WEB_SERVICE_USE_SELF_SIGNED_CERT=false #Enables self signed TLS certificate for the DNS web console.
      # - DNS_SERVER_OPTIONAL_PROTOCOL_DNS_OVER_HTTP=false #Enables DNS server optional protocol DNS-over-HTTP on TCP port 8053 to be used with a TLS terminating reverse proxy like nginx.
      # - DNS_SERVER_RECURSION=AllowOnlyForPrivateNetworks #Recursion options: Allow, Deny, AllowOnlyForPrivateNetworks, UseSpecifiedNetworkACL.
      # - DNS_SERVER_RECURSION_NETWORK_ACL=192.168.10.0/24, !192.168.10.2 #Comma separated list of IP addresses or network addresses to allow access. Add ! character at the start to deny access, e.g. !192.168.10.0/24 will deny entire subnet. The ACL is processed in the same order its listed. If no networks match, the default policy is to deny all except loopback. Valid only for `UseSpecifiedNetworkACL` recursion option.
      # - DNS_SERVER_RECURSION_DENIED_NETWORKS=1.1.1.0/24 #Comma separated list of IP addresses or network addresses to deny recursion. Valid only for `UseSpecifiedNetworkACL` recursion option. This option is obsolete and DNS_SERVER_RECURSION_NETWORK_ACL should be used instead.
      # - DNS_SERVER_RECURSION_ALLOWED_NETWORKS=127.0.0.1, 192.168.1.0/24 #Comma separated list of IP addresses or network addresses to allow recursion. Valid only for `UseSpecifiedNetworkACL` recursion option.  This option is obsolete and DNS_SERVER_RECURSION_NETWORK_ACL should be used instead.
      # - DNS_SERVER_ENABLE_BLOCKING=false #Sets the DNS server to block domain names using Blocked Zone and Block List Zone.
      # - DNS_SERVER_ALLOW_TXT_BLOCKING_REPORT=false #Specifies if the DNS Server should respond with TXT records containing a blocked domain report for TXT type requests.
      # - DNS_SERVER_BLOCK_LIST_URLS= #A comma separated list of block list URLs.
      # - DNS_SERVER_FORWARDERS=1.1.1.1, 8.8.8.8 #Comma separated list of forwarder addresses.
      # - DNS_SERVER_FORWARDER_PROTOCOL=Tcp #Forwarder protocol options: Udp, Tcp, Tls, Https, HttpsJson.
      # - DNS_SERVER_LOG_USING_LOCAL_TIME=true #Enable this option to use local time instead of UTC for logging.
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ technitium_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ technitium_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ technitium_homepage_group }}"
          homepage.icon: "{{ technitium_homepage_icon }}"
          homepage.href: "{{ technitium_homepage_href }}"
          homepage.description: "{{ 'DNS server for privacy & security Block ads & malware at DNS level for your entire network!' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ technitium_container_name }}"
          homepage.showStats: "{{ technitium_homepage_showStats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ technitium_port }}"
          traefik.enable: "{{ technitium_available_externally | string }}"
          traefik.http.routers.technitium.rule: "Host(`{{ technitium_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.technitium.tls.certresolver: "letsencrypt"
          traefik.http.routers.technitium.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.technitium.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ technitium_hostname }}"
          traefik.http.routers.technitium.middlewares: "{{ technitium_hostname }}@docker"
          traefik.http.middlewares.technitium.IPAllowList.sourcerange: "{{ technitium_traefik_whitelist }}"
          traefik.http.services.technitium.loadbalancer.server.port: "{{ {{ technitium_port }}"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://hub.docker.com/r/technitium/dns-server/tags/tag/$${major}.$${minor}.$${patch}"
        cpu_shares: "{{ technitium_cpu_shares }}"
        memory: "{{ technitium_memory }}"
        restart_policy: unless-stopped
  when: technitium_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ technitium_container_name }}"
        state: absent

    - name: Get file status of resolve.conf.bak.technitium
      ansible.builtin.stat:
        path: /etc/resolv.conf.bak.technitium
      register: resolvconfbak_status

    - name: Remove /etc/resolv.conf
      ansible.builtin.file:
        path: /etc/resolv.conf
        state: absent
      ignore_errors: yes
      when: resolvconfbak_status.stat is true

    - name: Restore /etc/resolv.conf
      ansible.builtin.copy:
        src: /etc/resolv.conf.bak.technitium
        dest: /etc/resolv.conf
      when: resolvconfbak_status.stat is true

    - name: Enable systemd-resolved service
      ansible.builtin.systemd_service:
        name: systemd-resolved
        enabled: true
      when: resolvconfbak_status.stat is true

    - name: Start systemd-resolved service
      ansible.builtin.systemd_service:
        name: systemd-resolved
        state: started
      when: resolvconfbak_status.stat is true

    - name: Remove /etc/resolv.conf.bak.technitium
      ansible.builtin.file:
        path: /etc/resolv.conf.bak.technitium
        state: absent
      when: resolvconfbak_status.stat is true
  when: technitium_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ technitium_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ technitium_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: technitium_enabled is false and archive_app_data_enabled is true
