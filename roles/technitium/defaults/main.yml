---
# ANE
ansible_nas_app_name: "Technitium DNS Server"
technitium_enabled: false
technitium_available_externally: false
technitium_traefik_whitelist: "{{ lan }}"

# directories
technitium_data_directory: "{{ docker_home }}/technitium"

# docker
technitium_container_name: "technitium-dns-server"
technitium_image_name: "technitium/dns-server"
technitium_image_tag: "latest"

# network
technitium_port_http: "5380"
technitium_hostname: "technitium"
technitium_dns: "{{ ansible_nas_dns }}"

# specs
technitium_cpu_shares: 1024
technitium_memory: "1G"

# app
technitium_env_dns_server_domain: "{{ ansible_nas_domain }}"
technitium_env_dns_server_password: "{{ ansible_nas_app_admin_password }}"

# autoheal
technitium_autoheal: false

# dockflare
technitium_dockflare_enabled: false
technitium_dockflare_access_group: ""

# homepage
technitium_homepage_group: "Network"
technitium_homepage_icon: "technitium.png"
technitium_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ technitium_port_http }}"
technitium_homepage_showstats: false
technitium_homepage_widget_key: ""
technitium_homepage_widget_range: "LastDay"

# repliqate
technitium_repliqate_enabled: false
technitium_repliqate_engine: "restic"
technitium_repliqate_schedule: "@daily 3am"
technitium_repliqate_backup_id: "{{ technitium_container_name }}"
technitium_repliqate_retention: "30d"

# tinyauth
technitium_tinyauth_enabled: false

# watchtower
technitium_watchtower_enabled: false
