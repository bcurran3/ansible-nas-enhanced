---
# ANE
ansible_nas_app_name: "Tianji"
tianji_enabled: false
tianji_traefik_enabled: false
tianji_traefik_whitelist: "{{ lan }}"

# directories
tianji_data_directory: "{{ docker_home }}/tianji"

# network
tianji_hostname: "tianji"
tianji_port_http: "3031"

# app
tianji_env_jwt_secret: "MstVibaSoeiN48cVmplj4efw2s2YfQ8xdl57RcDHSi8" # replace with your own
tianji_env_allow_register: "false"
tianji_env_allow_openapi: "false"
tianji_env_openapi_key: "put openapi key here"
tianji_env_public_url: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ tianji_port_http }}"

# docker
tianji_container_name: "tianji"
tianji_image_name: "ghcr.io/msgbyte/tianji"
tianji_image_tag: "latest"
tianji_db_container_name: "tianji-db"
tianji_db_image_name: "postgres"
tianji_db_image_tag: "16-alpine"

# specs
tianji_cpu_shares: 1024
tianji_memory: "1G"
tianji_db_cpu_shares: 1024
tianji_db_memory: "1G"

# autoheal
tianji_autoheal_enabled: false
tianji_db_autoheal_enabled: false

# dockflare
tianji_dockflare_enabled: false
tianji_dockflare_access_group: ""

# homepage
tianji_homepage_group: "Apps"
tianji_homepage_icon: "tianji.png"
tianji_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ tianji_port_http }}"
tianji_homepage_showstats: false
tianji_db_homepage_group: "DBs"
tianji_db_homepage_icon: "postgres.png"

# repliqate
tianji_repliqate_enabled: false
tianji_repliqate_engine: "restic"
tianji_repliqate_schedule: "@daily 3am"
tianji_repliqate_backup_id: "{{ tianji_container_name }}"
tianji_repliqate_retention: "30d"
tianji_db_repliqate_enabled: false
tianji_db_repliqate_engine: "restic"
tianji_db_repliqate_schedule: "@daily 3am"
tianji_db_repliqate_backup_id: "{{ tianji_container_name }}"
tianji_db_repliqate_retention: "30d"

# tinyauth
tianji_tinyauth_enabled: false

# watchtower
tianji_watchtower_enabled: false
tianji_db_watchtower_enabled: false
