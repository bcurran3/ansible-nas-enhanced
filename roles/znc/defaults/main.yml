---
ansible_nas_app_name: "ZNC"

# enable or disable the application
znc_enabled: false
znc_available_externally: false
znc_traefik_whitelist: "{{ lan }}"

# directories
znc_data_directory: "{{ docker_home }}/znc"

# uid / gid
znc_user_id: "0"
znc_group_id: "0"

# network
znc_hostname: "znc"
znc_port: "6677"

# docker
znc_container_name: "znc"
znc_image_name: "znc"
znc_image_version: "latest"

# specs
znc_cpu_shares: 1024
znc_memory: "1g"

# znc
znc_user_password: "password"
znc_user_nick: "user"
znc_user_altnick: "user_"
znc_user_ident: "user"
znc_user_real_name: "User Name"

# autoheal
znc_autoheal: "false"

# homepage
znc_homepage_group: "Apps"
znc_homepage_icon: "znc.png"
znc_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ znc_port }}"
znc_homepage_showStats: "false"

# watchtower
znc_watchtower_monitor_only: "true"