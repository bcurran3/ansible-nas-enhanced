---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        # mode: 0755
      with_items:
        - "{{ znc_data_directory }}"
        - "{{ znc_data_directory }}/configs"

    - name: Copy {{ ansible_nas_app_name }} config
      ansible.builtin.template:
        src: znc.conf.j2
        dest: "{{ znc_data_directory }}/configs/znc.conf"
      register: template_config

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ znc_container_name }}"
        hostname: "{{ znc_container_name }}"
        image: "{{ znc_image_name }}:{{ znc_image_version }}"
        pull: true
        volumes:
          - "{{ znc_data_directory }}:/znc-data:rw"
          - "/etc/timezone:/etc/timezone:ro"
        ports:
          - "{{ znc_port }}:6677"
        env:
          PUID: "{{ znc_user_id }}"
          PGID: "{{ znc_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ znc_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ znc_watchtower_enable }}"
          dockflare.enable: "{{ znc_dockflare_tunnel }}"
          dockflare.access.group: "{{ znc_dockflare_access_group }}"
          dockflare.hostname: "{{ znc_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ znc_port }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ znc_homepage_group }}"
          homepage.icon: "{{ znc_homepage_icon }}"
          homepage.href: "{{ znc_homepage_href }}"
          homepage.description: "{{ 'IRC bouncer' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ znc_container_name }}"
          homepage.showStats: "{{ znc_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ znc_port }}"
          traefik.enable: "{{ znc_available_externally | string }}"
          traefik.http.routers.znc.rule: "Host(`{{ znc_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.znc.tls.certresolver: "letsencrypt"
          traefik.http.routers.znc.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.znc.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ znc_hostname }}"
          traefik.http.routers.znc.middlewares: "{{ znc_hostname }}@docker"
          traefik.http.middlewares.znc.IPAllowList.sourcerange: "{{ znc_traefik_whitelist }}"
          traefik.http.services.znc.loadbalancer.server.port: "6677"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/znc"
        cpu_shares: "{{ znc_cpu_shares }}"
        memory: "{{ znc_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (znc_port | string)] +
                (['https://' + znc_hostname + '.' + ansible_nas_domain] if (znc_available_externally is true or znc_dockflare_tunnel is true) else [])
              }}
  when: znc_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ znc_container_name }}"
        state: absent
  when: znc_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ znc_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ znc_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: znc_enabled is false and archive_app_data_enabled is true
