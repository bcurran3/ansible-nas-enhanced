---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        # mode: 0755
      with_items:
        - "{{ znc_data_directory }}"
        - "{{ znc_data_directory }}/configs"

    - name: Copy {{ ansible_nas_app_name }} config
      ansible.builtin.template:
        src: znc.conf.j2
        dest: "{{ znc_data_directory }}/configs/znc.conf"
      register: template_config

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ znc_container_name }}"
        hostname: "{{ znc_container_name }}"
        image: "{{ znc_image_name }}:{{ znc_image_version }}"
        pull: true
        volumes:
          - "{{ znc_data_directory }}:/znc-data:rw"
          - "/etc/timezone:/etc/timezone:ro"
        ports:
          - "{{ znc_port }}:6677"
        env:
          PUID: "{{ znc_user_id }}"
          PGID: "{{ znc_group_id }}"
        restart_policy: unless-stopped
        cpu_shares: "{{ znc_cpu_shares }}"
        memory: "{{ znc_memory }}"
        labels:
          autoheal: "{{ znc_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ znc_watchtower_monitor_only }}"
          traefik.enable: "{{ znc_available_externally | string }}"
          traefik.http.routers.znc.rule: "Host(`{{ znc_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.znc.tls.certresolver: "letsencrypt"
          traefik.http.routers.znc.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.znc.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ znc_hostname }}"
          traefik.http.routers.znc.middlewares: "{{ znc_hostname }}@docker"
          traefik.http.middlewares.znc.IPAllowList.sourcerange: "{{ znc_traefik_whitelist }}"
          traefik.http.services.znc.loadbalancer.server.port: "6677"
  when: znc_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ znc_container_name }}"
        state: absent
  when: znc_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ znc_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ znc_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: znc_enabled is false and archive_app_data_enabled is true
