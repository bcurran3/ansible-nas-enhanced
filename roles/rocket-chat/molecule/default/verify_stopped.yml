---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Try and stop and remove {{ rocket_chat_proper_name }}
      community.docker.docker_container:
        name: "{{ rocket_chat_container_name }}"
        state: absent
      register: result

    - name: Try and stop and remove {{ rocket_chat_proper_name }} DB
      community.docker.docker_container:
        name: "{{ rocket_chat_db_container_name }}"
        state: absent
      register: result_db

    - name: Check {{ rocket_chat_proper_name }} is stopped
      ansible.builtin.assert:
        that:
          - not result.changed
          - not result_db.changed
