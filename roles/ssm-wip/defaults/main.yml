---
# ANE
ansible_nas_app_name: "Squirrel Servers Manager (SSM)"
ssm_enabled: false
ssm_available_externally: false
ssm_traefik_whitelist: "{{ lan }}"

# directories
ssm_data_directory: "{{ docker_home }}/ssm"

# network
ssm_network_name: "squirrel"
ssm_port_http: "3015"
ssm_hostname: "ssm"

# docker
ssm_container_name: "ssm"
ssm_image_name: "ghcr.io/squirrelcorporation/squirrelserversmanager-server"
ssm_image_tag: "latest"
ssm_cpu_shares: "1024"
ssm_memory: "1g"
ssm_client_container_name: "client-ssm"
ssm_client_image_name: "ghcr.io/squirrelcorporation/squirrelserversmanager-client"
ssm_client_image_tag: "latest"
ssm_client_cpu_shares: "1024"
ssm_client_memory_limit: "1g"
ssm_db_container_name: "mongo-ssm"
ssm_db_image_name: "mongo"
ssm_db_image_tag: "latest"
ssm_db_cpu_shares: "1024"
ssm_db_memory: "1g"
ssm_redis_container_name: "cache-ssm"
ssm_redis_image_name: "redis"
ssm_redis_image_tag: "latest"
ssm_redis_cpu_shares: "1024"
ssm_redis_memory: "1g"

# app
ssm_env_secret: "topsecret"
ssm_env_salt: "9876543210abcdef"
ssm_env_vault_pwd: "topsecret"


# autoheal
ssm_autoheal: "false"
ssm_client_autoheal: "false"
ssm_db_autoheal: "false"
ssm_redis_autoheal: "false"

# dockflare
ssm_dockflare_tunnel: "false"
ssm_dockflare_access_group: ""

# watchtower
ssm_watchtower_monitor_only: "true"
ssm_client_watchtower_monitor_only: "true"
ssm_db_watchtower_monitor_only: "true"
ssm_redis_watchtower_monitor_only: "true"