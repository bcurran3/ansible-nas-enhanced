---
# ANE
ansible_nas_app_name: "SickChill"
sickchill_enabled: false
sickchill_traefik_enabled: false
sickchill_traefik_whitelist: "{{ lan }}"

# directories
sickchill_data_directory: "{{ docker_home }}/sickchill"
sickchill_tv_directory: "{{ tv_root }}"
sickchill_downloads_directory: "{{ downloads_root }}/completed"

# uid / gid
sickchill_user_id: "0"
sickchill_group_id: "0"

# network
sickchill_hostname: "sickchill"
sickchill_port_http: "8081"

# docker
# This repository was archived by the owner on Jul 10, 2025. It is now read-only.
# linuxserver.io - This image is deprecated. We will not offer support for this image and it will not be updated.
sickchill_container_name: "sickchill"
sickchill_image_name: "linuxserver/sickchill"
sickchill_image_version: "2024.3.1"

# specs
sickchill_cpu_shares: 1024
sickchill_memory: "1G"

# autoheal
sickchill_autoheal_enabled: false

# dockflare
sickchill_dockflare_enabled: false
sickchill_dockflare_access_group: ""

# homepage
sickchill_homepage_group: "Apps"
sickchill_homepage_icon: "sickchill.png"
sickchill_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ sickchill_port_http }}"
sickchill_homepage_showstats: false

# linuxserver.io docker mods
sickchill_env_docker_mods: ""
sickchill_env_docker_mods_install_packages: ""
sickchill_env_docker_mods_install_pip_packages: ""

# repliqate
sickchill_repliqate_enabled: false
sickchill_repliqate_engine: "restic"
sickchill_repliqate_schedule: "@daily 3am"
sickchill_repliqate_backup_id: "{{ sickchill_container_name }}"
sickchill_repliqate_retention: "30d"

# tinyauth
sickchill_tinyauth_enabled: false

# watchtower
sickchill_watchtower_enabled: false