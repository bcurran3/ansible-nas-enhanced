---
# ANE
ansible_nas_app_name: "SickChill"
sickchill_enabled: false
sickchill_available_externally: false
sickchill_traefik_whitelist: "{{ lan }}"

# directories
sickchill_data_directory: "{{ docker_home }}/sickchill"
sickchill_tv_directory: "{{ tv_root }}"
sickchill_downloads_directory: "{{ downloads_root }}/completed"

# uid / gid
sickchill_user_id: "0"
sickchill_group_id: "0"

# network
sickchill_port: "8081"
sickchill_hostname: "sickchill"

# docker
# This repository was archived by the owner on Jul 10, 2025. It is now read-only.
sickchill_container_name: "sickchill"
sickchill_image_name: "lscr.io/linuxserver/sickchill"
sickchill_image_version: "latest"
sickchill_env_docker_mods: ""

# specs
sickchill_cpu_shares: 1024
sickchill_memory: 1g

# autoheal
sickchill_autoheal: "false"

# dockflare
sickchill_dockflare_tunnel: "false"
sickchill_dockflare_access_group: ""

# homepage
sickchill_homepage_group: "Apps"
sickchill_homepage_icon: "sickchill.png"
sickchill_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ sickchill_port }}"
sickchill_homepage_showStats: "false"

# watchtower
sickchill_watchtower_monitor_only: "true"