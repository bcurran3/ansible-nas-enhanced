---
- name: Start {{ sickchill_proper_name }}
  block:
    - name: Create {{ sickchill_proper_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ sickchill_data_directory }}"
        - "{{ sickchill_data_directory }}/config"
        - "{{ sickchill_downloads_directory }}"
        - "{{ sickchill_tv_directory }}"

    - name: Set {{ sickchill_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        sickchill_homepage_href: "https://{{ sickchill_hostname }}.{{ ansible_nas_domain }}"
      when: sickchill_traefik_enabled | bool or sickchill_dockflare_enabled | bool

    - name: Create {{ sickchill_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ sickchill_container_name }}"
        hostname: "{{ sickchill_container_name }}"
        image: "{{ sickchill_image_name }}:{{ sickchill_image_version }}"
        pull: true
        volumes:
          - "{{ sickchill_data_directory }}/config:/config:rw"
          - "{{ sickchill_downloads_directory }}:/downloads:rw"
          - "{{ sickchill_tv_directory }}:/tv:rw"
        ports:
          - "{{ sickchill_port_http }}:8081"
        env:
          DOCKER_MODS: "{{ sickchill_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ sickchill_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ sickchill_env_docker_mods_install_pip_packages}}"
          PUID: "{{ sickchill_user_id }}"
          PGID: "{{ sickchill_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ sickchill_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ sickchill_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ sickchill_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ sickchill_dockflare_access_group }}"
          dockflare.hostname: "{{ sickchill_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ sickchill_port_http }}"
          homepage.name: "{{ sickchill_proper_name }}"
          homepage.group: "{{ sickchill_homepage_group }}"
          homepage.icon: "{{ sickchill_homepage_icon }}"
          homepage.href: "{{ sickchill_homepage_href }}"
          homepage.description: "{{ 'sickchill description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ sickchill_container_name }}"
          homepage.showStats: "{{ sickchill_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ sickchill_port_http }}"
          repliqate.enabled: "{{ sickchill_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ sickchill_repliqate_engine }}"
          repliqate.schedule: "{{ sickchill_repliqate_schedule }}"
          repliqate.backup_id: "{{ sickchill_repliqate_backup_id }}"
          repliqate.retention: "{{ sickchill_repliqate_retention }}"
          traefik.enable: "{{ sickchill_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.sickchill.rule: "Host(`{{ sickchill_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.sickchill.tls.certresolver: "letsencrypt"
          traefik.http.routers.sickchill.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.sickchill.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.sickchill.middlewares: "sickchill@docker{{ ',tinyauth-auth@docker' if sickchill_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.sickchill.IPAllowList.sourcerange: "{{ sickchill_traefik_whitelist }}"
          traefik.http.services.sickchill.loadbalancer.server.port: "8081"
          wud.watch.digest: "true"
          wud.link.template: "https://hub.docker.com/r/linuxserver/sickchill/tags"
        cpu_shares: "{{ sickchill_cpu_shares }}"
        memory: "{{ sickchill_memory }}"
        memory_swap: "{{ sickchill_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ sickchill_proper_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (sickchill_port_http | string)] +
                (['https://' + sickchill_hostname + '.' + ansible_nas_domain] if (sickchill_traefik_enabled is true or sickchill_dockflare_enabled is true) else [])
              }}
  when: sickchill_enabled is true

- name: Stop {{ sickchill_proper_name }}
  block:
    - name: Stop {{ sickchill_proper_name }} Container
      community.docker.docker_container:
        name: "{{ sickchill_container_name }}"
        state: absent
  when: sickchill_enabled is false

- name: Data Archive {{ sickchill_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ sickchill_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - sickchill_enabled is false