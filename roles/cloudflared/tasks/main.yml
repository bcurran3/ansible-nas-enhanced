---
- name: Start {{ cloudflared_proper_name }}
  block:
    - name: Create {{ cloudflared_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ cloudflared_container_name }}"
        hostname: "{{ cloudflared_container_name }}"
        image: "{{ cloudflared_image_name }}:{{ cloudflared_image_tag }}"
        pull: true
        network_mode: bridge
        command: "--metrics 127.0.0.1:2000 tunnel --no-autoupdate run --token {{ cloudflared_token }}"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: "{{ cloudflared_healthcheck_test }}"
          interval: "{{ cloudflared_healthcheck_interval }}"
          timeout: "{{ cloudflared_healthcheck_timeout }}"
          retries: "{{ cloudflared_healthcheck_retries }}"
          start_period: "{{ cloudflared_healthcheck_start_period }}"
        labels:
          autoheal: "{{ cloudflared_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ cloudflared_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.group: "{{ cloudflared_homepage_group }}"
          homepage.name: "{{ cloudflared_proper_name }}"
          homepage.icon: "{{ cloudflared_homepage_icon }}"
          homepage.href: "https://dash.cloudflare.com/login"
          homepage.description: "{{ 'Client for Cloudflare Tunnel, a daemon that exposes private services through the Cloudflare edge.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ cloudflared_container_name }}"
          homepage.showStats: "{{ cloudflared_homepage_showstats | ternary('true', 'false') }}"
          homepage.widget.type: "cloudflared"
          homepage.widget.accountid: "{{ cloudflared_homepage_widget_accountid }}"
          homepage.widget.tunnelid: "{{ cloudflared_homepage_widget_tunnelid }}"
          homepage.widget.key: "{{ cloudflared_homepage_widget_key }}"
          repliqate.enabled: "false"
          traefik.enable: "false"
          wud.tag.include: "^latest$"
          wud.watch.digest: "true"
          wud.link.template: "https://github.com/cloudflare/cloudflared/releases"
        cpu_shares: "{{ cloudflared_cpu_shares }}"
        memory: "{{ cloudflared_memory }}"
        memory_swap: "{{ cloudflared_memory_swap }}"
        restart_policy: unless-stopped
  when: cloudflared_enabled is true

- name: Stop {{ cloudflared_proper_name }}
  block:
    - name: Stop {{ cloudflared_proper_name }} Container
      community.docker.docker_container:
        name: "{{ cloudflared_container_name }}"
        state: absent
  when: cloudflared_enabled is false
