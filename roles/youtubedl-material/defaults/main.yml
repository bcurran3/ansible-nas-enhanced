---
# ANE
ansible_nas_app_name: "YoutubeDL-Material"
youtubedlmaterial_enabled: false
youtubedlmaterial_available_externally: false
youtubedlmaterial_traefik_whitelist: "{{ lan }}"

# directories
youtubedlmaterial_data_directory: "{{ docker_home }}/youtubedl-material"
youtubedlmaterial_dl_audio_directory: "{{ downloads_root }}/youtube/audio"
youtubedlmaterial_dl_video_directory: "{{ downloads_root }}/youtube/video"
youtubedlmaterial_dl_subscriptions_directory: "{{ downloads_root }}/youtube/subscriptions"
youtubedlmaterial_dl_channels_directory: "{{ downloads_root }}/youtube/subscriptions/channels"
youtubedlmaterial_dl_users_directory: "{{ youtubedlmaterial_data_directory }}/users"

# network
youtubedlmaterial_hostname: "youtubedlmaterial"
youtubedlmaterial_port_http: "8998"

# docker
youtubedlmaterial_container_name: "youtubedl-material"
youtubedlmaterial_image_name: "tzahi12345/youtubedl-material"
youtubedlmaterial_image_version: "latest"
youtubedlmaterial_cpu_shares: 1024
youtubedlmaterial_memory: "1g"
youtubedlmaterial_db_container_name: "youtubedl-material-db"
youtubedlmaterial_db_image_name: "mongo"
youtubedlmaterial_db_image_version: "latest"
youtubedlmaterial_db_cpu_shares: 1024
youtubedlmaterial_db_memory: "1g"

# app
youtubedlmaterial_uid: "1000"
youtubedlmaterial_gid: "1000"
youtubedlmaterial_env_user: "root"
youtubedlmaterial_env_allow_config_mutations: "true"
youtubedlmaterial_env_ytdl_use_local_db: "false"
youtubedlmaterial_env_write_ytdl_config: "true"

# autoheal
youtubedlmaterial_autoheal: "false"
youtubedlmaterial_db_autoheal: "false"

# dockflare
youtubedlmaterial_dockflare_tunnel: "false"
youtubedlmaterial_dockflare_access_group: ""

# homepage
youtubedlmaterial_homepage_group: "Download Tools"
#youtubedlmaterial_homepage_group: "Media Servers"
youtubedlmaterial_homepage_icon: "youtube-dl.png"
youtubedlmaterial_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ youtubedlmaterial_port_http }}"
youtubedlmaterial_homepage_showstats: "false"
youtubedlmaterial_db_homepage_group: "DBs"
youtubedlmaterial_db_homepage_icon: "mongodb.png"
youtubedlmaterial_db_homepage_showstats: "false"

# repliqate
youtubedlmaterial_repliqate_enabled: "false"
youtubedlmaterial_repliqate_engine: "restic"
youtubedlmaterial_repliqate_schedule: "@daily 3am"
youtubedlmaterial_repliqate_backup_id: "{{ youtubedlmaterial_container_name }}"
youtubedlmaterial_repliqate_retention: "30d"
youtubedlmaterial_db_repliqate_enabled: "false"
youtubedlmaterial_db_repliqate_engine: "restic"
youtubedlmaterial_db_repliqate_schedule: "@daily 3am"
youtubedlmaterial_db_repliqate_backup_id: "{{ youtubedlmaterial_container_name }}"
youtubedlmaterial_db_repliqate_retention: "30d"

# watchtower
youtubedlmaterial_watchtower_enable: "false"
youtubedlmaterial_db_watchtower_enable: "false"
