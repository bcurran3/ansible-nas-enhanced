---
# ANE
ansible_nas_app_name: "YoutubeDL-Material"
youtubedl_material_enabled: false
youtubedl_material_traefik_enabled: false
youtubedl_material_traefik_whitelist: "{{ lan }}"

# directories
youtubedl_material_data_directory: "{{ docker_home }}/youtubedl-material"
youtubedl_material_download_audio_directory: "{{ downloads_root }}/youtube/audio"
youtubedl_material_download_video_directory: "{{ downloads_root }}/youtube/video"
youtubedl_material_download_subscriptions_directory: "{{ downloads_root }}/youtube/subscriptions"
youtubedl_material_download_channels_directory: "{{ downloads_root }}/youtube/subscriptions/channels"
youtubedl_material_download_users_directory: "{{ youtubedl_material_data_directory }}/users"

# network
youtubedl_material_hostname: "youtubedlmaterial"
youtubedl_material_port_http: "8998"

# docker
youtubedl_material_container_name: "youtubedl-material"
youtubedl_material_image_name: "tzahi12345/youtubedl-material"
youtubedl_material_image_version: "latest"
youtubedl_material_db_container_name: "youtubedl-material-db"
youtubedl_material_db_image_name: "mongo"
youtubedl_material_db_image_version: "latest"

# specs
youtubedl_material_cpu_shares: 1024
# Minimum (Idle/Small Queue): 512 MB – 1 GB (Functional for basic MP3/1080p downloads).
# Recommended (Standard): 1 GB – 2 GB (Prevents crashes during file merging).
# Performance (4K / High Concurrency): 2 GB – 4 GB.
youtubedl_material_memory: "1G"
youtubedl_material_memory_swap: -1
youtubedl_material_db_cpu_shares: 1024
youtubedl_material_db_memory: "1G"
youtubedl_material_db_memory_swap: "{{ youtubedl_material_db_memory }}"

# app
youtubedl_material_uid: "1000"
youtubedl_material_gid: "1000"
youtubedl_material_env_user: "root"
youtubedl_material_env_allow_config_mutations: "true"
youtubedl_material_env_ytdl_use_local_db: "false"
youtubedl_material_env_write_ytdl_config: "true"

# autoheal
youtubedl_material_autoheal_enabled: false
youtubedl_material_db_autoheal_enabled: false

# dockflare
youtubedl_material_dockflare_enabled: false
youtubedl_material_dockflare_access_group: ""

# homepage
youtubedl_material_homepage_group: "Download Tools"
#youtubedl_material_homepage_group: "Media Servers"
youtubedl_material_homepage_icon: "youtube-dl.png"
youtubedl_material_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ youtubedl_material_port_http }}"
youtubedl_material_homepage_showstats: false
youtubedl_material_db_homepage_group: "DBs"
youtubedl_material_db_homepage_icon: "mongodb.png"
youtubedl_material_db_homepage_href: "{{ youtubedl_material_homepage_href }}"
youtubedl_material_db_homepage_showstats: false

# repliqate
youtubedl_material_repliqate_enabled: false
youtubedl_material_repliqate_engine: "restic"
youtubedl_material_repliqate_schedule: "@daily 3am"
youtubedl_material_repliqate_backup_id: "{{ youtubedl_material_container_name }}"
youtubedl_material_repliqate_retention: "30d"
youtubedl_material_db_repliqate_enabled: false
youtubedl_material_db_repliqate_engine: "restic"
youtubedl_material_db_repliqate_schedule: "@daily 3am"
youtubedl_material_db_repliqate_backup_id: "{{ youtubedl_material_container_name }}"
youtubedl_material_db_repliqate_retention: "30d"

# tinyauth
youtubedl_material_tinyauth_enabled: false

# watchtower
youtubedl_material_watchtower_enabled: false
youtubedl_material_db_watchtower_enabled: false
