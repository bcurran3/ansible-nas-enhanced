---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
#        owner: "{{ youtubedl_material_uid }}"
#        group: "{{ youtubedl_material_gid }}"
        # mode: 0755
      with_items:
        - "{{ youtubedl_material_data_directory }}/appdata"
        - "{{ youtubedl_material_data_directory }}/db"
        - "{{ youtubedl_material_download_audio_directory }}"
        - "{{ youtubedl_material_download_video_directory }}"
        - "{{ youtubedl_material_download_subscriptions_directory }}"
        - "{{ youtubedl_material_download_channels_directory }}"
        - "{{ youtubedl_material_download_users_directory }}"

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ youtubedl_material_db_container_name }}"
        hostname: "{{ youtubedl_material_db_container_name }}"
        image: "{{ youtubedl_material_db_image_name }}:{{ youtubedl_material_db_image_version }}"
        pull: true
        volumes:
          - "{{ youtubedl_material_data_directory }}/db:/data/db"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ youtubedl_material_db_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ youtubedl_material_db_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} MongoDB"
          homepage.group: "{{ youtubedl_material_db_homepage_group }}"
          homepage.icon: "{{ youtubedl_material_db_homepage_icon }}"
          homepage.href: "{{ youtubedl_material_homepage_href }}"
          homepage.description: "{{ 'The Database for Secure Apps' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ youtubedl_material_db_container_name }}"
          homepage.showStats: "{{ youtubedl_material_db_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ youtubedl_material_db_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ youtubedl_material_db_repliqate_engine }}"
          repliqate.schedule: "{{ youtubedl_material_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ youtubedl_material_db_repliqate_backup_id }}"
          repliqate.retention: "{{ youtubedl_material_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/mongo"
        cpu_shares: "{{ youtubedl_material_db_cpu_shares }}"
        memory: "{{ youtubedl_material_db_memory }}"
        memory_swap: "{{ youtubedl_material_db_memory_swap }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ youtubedl_material_container_name }}"
        hostname: "{{ youtubedl_material_container_name }}"
        image: "{{ youtubedl_material_image_name }}:{{ youtubedl_material_image_version }}"
        pull: true
        volumes:
          - "{{ youtubedl_material_data_directory }}/appdata:/app/appdata:rw"
          - "{{ youtubedl_material_download_audio_directory }}:/app/audio:rw"
          - "{{ youtubedl_material_download_video_directory }}:/app/video:rw"
          - "{{ youtubedl_material_download_subscriptions_directory }}:/app/subscriptions:rw"
          - "{{ youtubedl_material_download_channels_directory }}:/app/subscriptions/channels:rw"
          - "{{ youtubedl_material_download_users_directory }}:/app/users:rw"
        network_mode: bridge
        ports:
          - "{{ youtubedl_material_port_http }}:17442"
        env:
          USER: "{{ youtubedl_material_env_user }}"
          ALLOW_CONFIG_MUTATIONS: "{{ youtubedl_material_env_allow_config_mutations }}"
          ytdl_mongodb_connection_string: "mongodb://{{ youtubedl_material_db_container_name }}:27017"
          ytdl_use_local_db: "{{ youtubedl_material_env_ytdl_use_local_db }}"
          write_ytdl_config: "{{ youtubedl_material_env_write_ytdl_config }}"
#         UID: "{{ youtubedl_material_uid }}"
#         GID: "{{ youtubedl_material_gid }}"
          TZ: "{{ ansible_nas_timezone }}"
        links:
          - "{{ youtubedl_material_db_container_name }}"
        labels:
          autoheal: "{{ youtubedl_material_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ youtubedl_material_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ youtubedl_material_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ youtubedl_material_dockflare_access_group }}"
          dockflare.hostname: "{{ youtubedl_material_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ youtubedl_material_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ youtubedl_material_homepage_group }}"
          homepage.icon: "{{ youtubedl_material_homepage_icon }}"
          homepage.href: "{{ youtubedl_material_homepage_href }}"
          homepage.description: "{{ 'Self-hosted YouTube downloader built on Material Design' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ wud_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ youtubedl_material_container_name }}"
          homepage.showStats: "{{ youtubedl_material_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ youtubedl_material_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ youtubedl_material_repliqate_engine }}"
          repliqate.schedule: "{{ youtubedl_material_repliqate_schedule }}"
          repliqate.backup_id: "{{ youtubedl_material_repliqate_backup_id }}"
          repliqate.retention: "{{ youtubedl_material_repliqate_retention }}"
          traefik.enable: "{{ youtubedl_material_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.youtubedlmaterial.rule: "Host(`{{ youtubedl_material_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.youtubedlmaterial.tls.certresolver: "letsencrypt"
          traefik.http.routers.youtubedlmaterial.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.youtubedlmaterial.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.services.youtubedlmaterial.loadbalancer.server.port: "17442"
          traefik.http.routers.youtubedlmaterial.middlewares: "{{ youtubedl_material_hostname }}@docker{{ ',tinyauth-auth@docker' if youtubedl_material_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.youtubedlmaterial.IPAllowList.sourcerange: "{{ youtubedl_material_traefik_whitelist }}"
          wud.tag.include: '^\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/tzahi12345/youtubedl-material"
        cpu_shares: "{{ youtubedl_material_cpu_shares }}"
        memory: "{{ youtubedl_material_memory }}"
        memory_swap: "{{ youtubedl_material_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (youtubedl_material_port_http | string)] +
                (['https://' + youtubedl_material_hostname + '.' + ansible_nas_domain] if (youtubedl_material_traefik_enabled is true or youtubedl_material_dockflare_enabled is true) else [])
              }}
  when: youtubedl_material_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ youtubedl_material_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ youtubedl_material_db_container_name }}"
        state: absent
  when: youtubedl_material_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ youtubedl_material_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - youtubedl_material_enabled is false