---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directory
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ speedtest_tracker_data_directory }}/config"

    - name: Remove old {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ speedtest_tracker_container_name }}"
        state: absent
      tags: molecule-idempotence-notest

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ speedtest_tracker_container_name }}"
        hostname: "{{ speedtest_tracker_container_name }}"
        image: "{{ speedtest_tracker_image_name }}:{{ speedtest_tracker_image_version }}"
        pull: true
        volumes:
          - "{{ speedtest_tracker_data_directory }}/config:/config:rw"
        ports:
          - "{{ speedtest_tracker_port }}:80"
        env:
          AUTH: "{{ speedtest_tracker_auth }}"
          OOKLA_EULA_GDPR: "true"
          PUID: "{{ speedtest_tracker_puid }}"
          PGID: " {{ speedtest_tracker_pgid }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ speedtest_tracker_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ speedtest_tracker_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ speedtest_tracker_homepage_group }}"
          homepage.icon: "{{ speedtest_tracker_homepage_icon }}"
          homepage.href: "{{ speedtest_tracker_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ speedtest_tracker_port }}"
          homepage.description: "{{ 'Continuously track your internet speed' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ speedtest_tracker_container_name }}"
          homepage.showStats: "{{ speedtest_tracker_homepage_showStats }}"
          homepage.widget.type: "speedtest"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ speedtest_tracker_port }}"
          homepage.widget.version: "{{ speedtest_tracker_homepage_widget_version }}"
          traefik.enable: "{{ speedtest_tracker_available_externally | string }}"
          traefik.http.routers.speedtest_tracker.rule: "Host(`{{ speedtest_tracker_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.speedtest_tracker.tls.certresolver: "letsencrypt"
          traefik.http.routers.speedtest_tracker.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.speedtest_tracker.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ speedtest_tracker_hostname }}"
          traefik.http.routers.speedtest_tracker.middlewares: "speedtest_tracker@docker"
          traefik.http.middlewares.speedtest_tracker.IPAllowList.sourcerange: "{{ speedtest_tracker_traefik_whitelist }}"
          traefik.http.services.speedtest_tracker.loadbalancer.server.port: "80"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/henrywhitaker3/Speedtest-Tracker/releases/tag/$${major}.$${minor}.$${patch}"
        cpu_shares: "{{ speedtest_tracker_cpu_shares }}"
        memory: "{{ speedtest_tracker_memory}}"
        restart_policy: unless-stopped
  when: speedtest_tracker_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ speedtest_tracker_container_name }}"
        state: absent
  when: speedtest_tracker_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ speedtest_tracker_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ speedtest_tracker_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: speedtest_tracker_enabled is false and archive_app_data_enabled is true
