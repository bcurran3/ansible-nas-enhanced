---
speedtest_tracker_enabled: false
speedtest_tracker_available_externally: false
speedtest_tracker_traefik_whitelist: "{{ lan }}"

# directories
speedtest_data_directory: "{{ docker_home }}/speedtest_tracker"

# uid / gid
speedtest_tracker_user_id: "0"
speedtest_tracker_group_id: "0"

# network
speedtest_tracker_port: "8765"
speedtest_tracker_hostname: "speedtest-tracker"

# docker
speedtest_container_name: "speedtest-tracker"
speedtest_image_name: "henrywhitaker3/speedtest-tracker"
speedtest_image_version: "latest"

# specs
speedtest_tracker_memory: 1g

# autoheal
speedtest_tracker_autoheal: "false"

# homepage
speedtest_tracker_homepage_group: "Network"
speedtest_tracker_homepage_icon: "speedtest-tracker.png"
speedtest_tracker_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ speedtest_tracker_port }}"
speedtest_tracker_homepage_showStats: "false"

# watchtower
speedtest_tracker_watchtower_monitor_only: "true"