---
# ANE
speedtest_tracker_proper_name: "Speedtest Tracker"
speedtest_tracker_enabled: false
speedtest_tracker_traefik_enabled: false
speedtest_tracker_traefik_whitelist: "{{ lan }}"

# directories
speedtest_tracker_data_directory: "{{ docker_home }}/speedtest-tracker"

# uid / gid
speedtest_tracker_puid: "1000"
speedtest_tracker_pgid: "1000"

# network
speedtest_tracker_port_http: "8765"
speedtest_tracker_hostname: "speedtesttracker"

# docker
speedtest_tracker_container_name: "speedtest-tracker"
speedtest_tracker_image_name: "henrywhitaker3/speedtest-tracker"
speedtest_tracker_image_version: "latest"

# app
speedtest_tracker_auth: "false"

# specs
speedtest_tracker_cpu_shares: 1024
speedtest_tracker_memory: "512M"
speedtest_tracker_memory_swap: -1

# autoheal
speedtest_tracker_autoheal_enabled: false

# dockflare
speedtest_tracker_dockflare_enabled: false
speedtest_tracker_dockflare_access_group: ""

# healthcheck
speedtest_tracker_healthcheck_test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
speedtest_tracker_healthcheck_interval: 1m
speedtest_tracker_healthcheck_timeout: 10s
speedtest_tracker_healthcheck_retries: 3
speedtest_tracker_healthcheck_start_period: 30s

# homepage
speedtest_tracker_homepage_group: "Network"
speedtest_tracker_homepage_icon: "speedtest-tracker.png"
speedtest_tracker_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ speedtest_tracker_port_http }}"
speedtest_tracker_homepage_showstats: false
speedtest_tracker_homepage_widget_version: "1" # version 2 is only compatible with alexjustesen/speedtest-tracker

# repliqate
speedtest_tracker_repliqate_enabled: false
speedtest_tracker_repliqate_engine: "restic"
speedtest_tracker_repliqate_schedule: "@daily 3am"
speedtest_tracker_repliqate_backup_id: "{{ speedtest_tracker_container_name }}"
speedtest_tracker_repliqate_retention: "30d"

# tinyauth
speedtest_tracker_tinyauth_enabled: false

# watchtower
speedtest_tracker_watchtower_enabled: false