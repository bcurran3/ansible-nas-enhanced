---
# ANE
ansible_nas_app_name: "Huntarr"
huntarr_enabled: false
huntarr_traefik_enabled: false
huntarr_traefik_whitelist: "{{ lan }}"
huntarr_data_directory: "{{ docker_home }}/huntarr"

# network
huntarr_hostname: "huntarr"
huntarr_port_http: "9705"

# docker
huntarr_container_name: "huntarr"
huntarr_image_name: "ghcr.io/plexguide/huntarr"
huntarr_image_tag: "latest"

# specs
huntarr_cpu_shares: 1024
huntarr_memory: "1G"
huntarr_memory_swap: -1

# autoheal
huntarr_autoheal_enabled: false

# dockflare
huntarr_dockflare_enabled: false
huntarr_dockflare_access_group: ""

# homepage
huntarr_homepage_group: "Media Management"
huntarr_homepage_icon: "huntarr.png"
huntarr_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ huntarr_port_http }}"
huntarr_homepage_showstats: false

# repliqate
huntarr_repliqate_enabled: false
huntarr_repliqate_engine: "restic"
huntarr_repliqate_schedule: "@daily 3am"
huntarr_repliqate_backup_id: "{{ huntarr_container_name }}"
huntarr_repliqate_retention: "30d"

# tinyauth
huntarr_tinyauth_enabled: false

# watchtower
huntarr_watchtower_enabled: false
