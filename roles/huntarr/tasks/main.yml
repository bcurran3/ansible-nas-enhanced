---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ huntarr_data_directory }}"
        - "{{ huntarr_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ huntarr_container_name }}"
        hostname: "{{ huntarr_container_name }}"
        image: "{{ huntarr_image_name }}:{{ huntarr_image_tag }}"
        pull: true
        ports:
          - "{{ huntarr_port_http }}:9705"
        volumes:
          - "{{ huntarr_data_directory }}/config:/config"
        network_mode: bridge
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ huntarr_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ huntarr_watchtower_enable }}"
          dockflare.enable: "{{ huntarr_dockflare_tunnel }}"
          dockflare.access.group: "{{ huntarr_dockflare_access_group }}"
          dockflare.hostname: "{{ huntarr_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ huntarr_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ huntarr_homepage_group }}"
          homepage.icon: "{{ huntarr_homepage_icon }}"
          homepage.href: "{{ huntarr_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ huntarr_port_http }}"
          homepage.description: "{{ 'A specialized utility that automates discovering missing and upgrading your media collection!' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ huntarr_container_name }}"
          homepage.showStats: "{{ huntarr_homepage_showstats }}"
          traefik.enable: "{{ huntarr_available_externally | string }}"
          traefik.http.routers.huntarr.rule: "Host(`{{ huntarr_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.huntarr.tls.certresolver: "letsencrypt"
          traefik.http.routers.huntarr.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.huntarr.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ huntarr_hostname }}"
          traefik.http.routers.huntarr.middlewares: "{{ huntarr_hostname }}@docker"
          traefik.http.middlewares.huntarr.IPAllowList.sourcerange: "{{ huntarr_traefik_whitelist }}"
          traefik.http.services.huntarr.loadbalancer.server.port: "9705"
          wud.tag.include: '^v?\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/plexguide/Huntarr.io/releases/tag/{{tag}}"
        cpu_shares: "{{ huntarr_cpu_shares }}"
        memory: "{{ huntarr_memory }}"
        restart_policy: unless-stopped
  when: huntarr_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ huntarr_container_name }}"
        state: absent
  when: huntarr_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ huntarr_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ huntarr_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: huntarr_enabled is false and archive_app_data_enabled is true
