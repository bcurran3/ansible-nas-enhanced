---
- name: Start Remotely
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ remotely_data_directory }}"
        - "{{ remotely_data_directory }}/data"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        remotely_homepage_href: "https://{{ remotely_hostname }}.{{ ansible_nas_domain }}"
      when: remotely_traefik_enabled | bool or remotely_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ remotely_container_name }}"
        hostname: "{{ remotely_container_name }}"
        image: "{{ remotely_image_name }}:{{ remotely_image_tag }}"
        pull: true
        ports:
          - "{{ remotely_port_http }}:5000"
        volumes:
          - "{{ remotely_data_directory }}/data:/app/AppData"
        env:
          ASPNETCORE_ENVIRONMENT: "Production"
          ASPNETCORE_HTTP_PORTS: "5000"
          Remotely_ApplicationOptions__DbProvider: "SQLite"
          Remotely_ConnectionStrings__SQLite: "Data Source=/app/AppData/Remotely.db"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: "{{ remotely_healthcheck_test }}"
          interval: "{{ remotely_healthcheck_interval }}"
          timeout: "{{ remotely_healthcheck_timeout }}"
          retries: "{{ remotely_healthcheck_retries }}"
          start_period: "{{ remotely_healthcheck_start_period }}"
        labels:
          autoheal: "{{ remotely_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ remotely_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ remotely_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ remotely_dockflare_access_group }}"
          dockflare.hostname: "{{ remotely_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ remotely_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ remotely_homepage_group }}"
          homepage.icon: "{{ remotely_homepage_icon }}"
          homepage.href: "{{ remotely_homepage_href}}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ remotely_port_http }}"
          homepage.description: "{{ 'A remote control and remote scripting solution, built with .NET 8, Blazor, and SignalR.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ remotely_container_name }}"
          homepage.showStats: "{{ remotely_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ remotely_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ remotely_repliqate_engine }}"
          repliqate.schedule: "{{ remotely_repliqate_schedule }}"
          repliqate.backup_id: "{{ remotely_repliqate_backup_id }}"
          repliqate.retention: "{{ remotely_repliqate_retention }}"
          traefik.enable: "{{ remotely_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.remotely.rule: "Host(`{{ remotely_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.remotely.tls.certresolver: "letsencrypt"
          traefik.http.routers.remotely.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.remotely.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.remotely.middlewares: "remotely@docker{{ ',tinyauth-auth@docker' if remotely_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.remotely.IPAllowList.sourcerange: "{{ remotely_traefik_whitelist }}"
          traefik.http.services.remotely.loadbalancer.server.port: "5000"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/immybot/remotely"
        cpu_shares: "{{ remotely_cpu_shares }}"
        memory: "{{ remotely_memory }}"
        memory_swap: "{{ remotely_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (remotely_port_http | string)] +
                (['https://' + remotely_hostname + '.' + ansible_nas_domain] if (remotely_traefik_enabled is true or remotely_dockflare_enabled is true) else [])
              }}
  when: remotely_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ remotely_container_name }}"
        state: absent
  when: remotely_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ remotely_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - remotely_enabled is false