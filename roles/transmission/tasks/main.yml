---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        # mode: 0755
      with_items:
        - "{{ transmission_data_directory }}"
        - "{{ transmission_data_directory }}/config"
        - "{{ transmission_download_directory }}"
        - "{{ transmission_watch_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ transmission_container_name }}"
        hostname: "{{ transmission_container_name }}"
        image: "{{ transmission_image_name }}:{{ transmission_image_version }}"
        pull: true
        volumes:
          - "{{ transmission_data_directory }}/config:/config:rw"
          - "{{ transmission_download_directory }}:/downloads:rw"
          - "{{ transmission_watch_directory }}:/watch:rw"
        ports:
          - "{{ transmission_port_http }}:9091"
          - "{{ transmission_port_bt }}:51413"
          - "{{ transmission_port_bt }}:51413/udp"
        env:
          DOCKER_MODS: "{{ transmission_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ transmission_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ transmission_env_docker_mods_install_pip_packages}}"
          TP_DOMAIN: "{{ transmission_env_docker_mods_tp_domain }}"
          TP_THEME: "{{ transmission_env_docker_mods_tp_theme }}"
          TP_COMMUNITY_THEME: "{{ transmission_env_docker_mods_tp_community_theme }}"
          TP_ADDON: "{{ transmission_env_docker_mods_tp_addon }}"
          PUID: "{{ transmission_user_id }}"
          PGID: "{{ transmission_group_id }}"
          TZ: "{{ transmission_timezone }}"
        labels:
          autoheal: "{{ transmission_autoheal | string }}"
          com.centurylinklabs.watchtower.enable: "{{ transmission_watchtower_enabled | string }}"
          dockflare.enable: "{{ transmission_dockflare_enabled | string }}"
          dockflare.access.group: "{{ transmission_dockflare_access_group }}"
          dockflare.hostname: "{{ transmission_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ transmission_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ transmission_homepage_group }}"
          homepage.href: "{{ transmission_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ transmission_port_http }}"
          homepage.icon: "{{ transmission_homepage_icon }}"
          homepage.description: "{{ 'BitTorrent client' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ transmission_container_name }}"
          homepage.showStats: "{{ transmission_homepage_showstats | string }}"
          homepage.widget.type: "transmission"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ transmission_port_http }}"
          homepage.widget.user: "{{ transmission_homepage_widget_user }}"
          homepage.widget.password: "{{ transmission_homepage_widget_password }}"
          repliqate.enabled: "{{ transmission_repliqate_enabled | string }}"
          repliqate.engine: "{{ transmission_repliqate_engine }}"
          repliqate.schedule: "{{ transmission_repliqate_schedule }}"
          repliqate.backup_id: "{{ transmission_repliqate_backup_id }}"
          repliqate.retention: "{{ transmission_repliqate_retention }}"
          traefik.enable: "{{ transmission_available_externally | string }}"
          traefik.http.routers.transmission.rule: "Host(`{{ transmission_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.transmission.tls.certresolver: "letsencrypt"
          traefik.http.routers.transmission.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.transmission.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.transmission.middlewares: "transmission@docker{{ ',tinyauth-auth@docker' if transmission_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.transmission.IPAllowList.sourcerange: "{{ transmission_traefik_whitelist }}"
          traefik.http.services.transmission.loadbalancer.server.port: "9091"
          wud.tag.include: '^version-\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "lscr.io/linuxserver/transmission"
        cpu_shares: "{{ transmission_cpu_shares }}"
        memory: "{{ transmission_memory }}"
        memory_swap: "{{ transmission_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (transmission_port_http | string)] +
                (['https://' + transmission_hostname + '.' + ansible_nas_domain] if (transmission_available_externally is true or transmission_dockflare_enabled is true) else [])
              }}
  when: transmission_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ transmission_container_name }}"
        state: absent
  when: transmission_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ transmission_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - transmission_enabled is false