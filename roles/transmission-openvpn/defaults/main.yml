---
# ANE
ansible_nas_app_name: "Transmission with OpenVPN"
transmission_openvpn_enabled: false # Please see docs about how to set VPN credentials
transmission_openvpn_traefik_enabled: false
transmission_openvpn_traefik_whitelist: "{{ lan }}"

# directories
transmission_openvpn_data_directory: "{{ docker_home }}/transmission-openvpn"
transmission_openvpn_download_directory: "{{ downloads_root }}"
transmission_openvpn_watch_directory: "{{ torrents_root }}"

# uid / gid
transmission_openvpn_user_id: "0"
transmission_openvpn_group_id: "0"

# transmission config
transmission_openvpn_ratio_limit_enabled: true
transmission_openvpn_ratio_limit: "2"
transmission_openvpn_local_network: "192.168.1.0/24"

# network config
transmission_openvpn_port_http: "9091"
transmission_openvpn_port_bt: "51415"
transmission_openvpn_port_proxy: "3128"
transmission_openvpn_hostname: "transmission_openvpn"

# docker
transmission_openvpn_container_name: "transmission-openvpn"
transmission_openvpn_image_name: "haugene/transmission-openvpn"
transmission_openvpn_image_version: "latest"

# Transmission VPN Credentials
# If you're using Transmission with a VPN, you'll need to set these credentials.
# See https://github.com/haugene/docker-transmission-openvpn/ for supported VPN providers.
openvpn_username: leisure-suit-larry
openvpn_password: secretpassword
openvpn_provider: AWESOMEVPNPROVIDER
openvpn_config: United-Kingdom

# specs
transmission_openvpn_cpu_shares: 1024
transmission_openvpn_memory: "1G"

# autoheal
transmission_openvpn_autoheal_enabled: false

# dockflare
transmission_openvpn_dockflare_enabled: false
transmission_openvpn_dockflare_access_group: ""

# homepage
transmission_openvpn_homepage_group: "Download Tools"
transmission_openvpn_homepage_icon: "transmission.png"
transmission_openvpn_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ transmission_openvpn_port_http }}"
transmission_openvpn_homepage_showstats: false

# repliqate
transmission_openvpn_repliqate_enabled: false
transmission_openvpn_repliqate_engine: "restic"
transmission_openvpn_repliqate_schedule: "@daily 3am"
transmission_openvpn_repliqate_backup_id: "{{ transmission_openvpn_container_name }}"
transmission_openvpn_repliqate_retention: "30d"

# tinyauth
transmission_openvpn_tinyauth_enabled: false

# watchtower
transmission_openvpn_watchtower_enabled: false