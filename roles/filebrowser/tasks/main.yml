---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directory
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        group: 1000
        owner: 1000
      with_items:
        - "{{ filebrowser_data_directory }}"
        - "{{ filebrowser_data_directory }}/config"
        - "{{ filebrowser_data_directory }}/db"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ filebrowser_container_name }}"
        hostname: "{{ filebrowser_container_name }}"
        image: "{{ filebrowser_image_name }}:{{ filebrowser_image_tag }}"
        pull: true
        volumes:
          - "{{ filebrowser_root_dir }}:/srv"
          - "{{ filebrowser_data_directory }}/config:/config"
          - "{{ filebrowser_data_directory }}/db:/database"
        ports:
          - "{{ filebrowser_port_http }}:80"
        network_mode: bridge
        env:
          PUID: "{{ filebrowser_user_id }}"
          PGID: "{{ filebrowser_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ filebrowser_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ filebrowser_watchtower_enable }}"
          dockflare.enable: "{{ filebrowser_dockflare_tunnel }}"
          dockflare.access.group: "{{ filebrowser_dockflare_access_group }}"
          dockflare.hostname: "{{ filebrowser_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ filebrowser_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ filebrowser_homepage_group }}"
          homepage.icon: "{{ filebrowser_homepage_icon }}"
          homepage.href: "{{ filebrowser_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ filebrowser_port_http }}"
          homepage.description: "{{ 'Web File Browser' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ filebrowser_container_name }}"
          homepage.showStats: "{{ filebrowser_homepage_showstats }}"
          repliqate.enabled: "{{ filebrowser_repliqate_enabled }}"
          repliqate.engine: "{{ filebrowser_repliqate_engine }}"
          repliqate.schedule: "{{ filebrowser_repliqate_schedule }}"
          repliqate.backup_id: "{{ filebrowser_repliqate_backup_id }}"
          repliqate.retention: "{{ filebrowser_repliqate_retention }}"
          traefik.enable: "{{ filebrowser_available_externally | string }}"
          traefik.http.routers.filebrowser.rule: "Host(`{{ filebrowser_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.filebrowser.tls.certresolver: "letsencrypt"
          traefik.http.routers.filebrowser.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.filebrowser.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ filebrowser_hostname }}"
          traefik.http.routers.filebrowser.middlewares: "{{ filebrowser_hostname }}@docker"
          traefik.http.middlewares.filebrowser.IPAllowList.sourcerange: "{{ filebrowser_traefik_whitelist }}"      
          traefik.http.services.filebrowser.loadbalancer.server.port: "80"
          wud.tag.include: '^v?\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/filebrowser/filebrowser"
        cpu_shares: "{{ filebrowser_cpu_shares }}"
        memory: "{{ filebrowser_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (filebrowser_port_http | string)] +
                (['https://' + filebrowser_hostname + '.' + ansible_nas_domain] if (filebrowser_available_externally is true or filebrowser_dockflare_tunnel is true) else [])
              }}
  when: filebrowser_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ filebrowser_container_name }}"
        state: absent
  when: filebrowser_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ filebrowser_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - filebrowser_enabled is false