---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Try and stop and remove {{ openclaw_proper_name }} Gateway
      community.docker.docker_container:
        name: "{{ openclaw_container_name }}"
        state: absent
      register: result

    - name: Try and stop and remove {{ openclaw_proper_name }} CLI
      community.docker.docker_container:
        name: "{{ openclaw_cli_container_name }}"
        state: absent
      register: result_cli

    - name: Check if {{ openclaw_proper_name }} is stopped
      ansible.builtin.assert:
        that:
          - not result.changed
          - not result_cli.changed
