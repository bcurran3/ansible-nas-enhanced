---
# WIP
# ENV VARS HERE:
# https://clemcer.github.io/loggifly/guide/environment-variables.html
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ loggifly_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ loggifly_container_name }}"
        hostname: "{{ loggifly_container_name }}"
        image: "{{ loggifly_image_name }}:{{ loggifly_image_tag }}"
        pull: true
        volumes:
          - "{{ loggifly_data_directory }}:/config"
          - /var/run/docker.sock:/var/run/docker.sock
        env:
          NTFY_URL: "{{ loggifly_env_ntfy_url }}"
          NTFY_TOKEN: "{{ loggifly_env_ntfy_token }}"
          NTFY_USERNAME: "{{ loggifly_env_ntfy_username }}"
          NTFY_PASSWORD: "{{ loggifly_env_ntfy_password }}"
          NTFY_TOPIC: "{{ loggifly_env_ntfy_topic }}"
          NTFY_TAGS: "{{ loggifly_env_ntfy_tags }}"
          NTFY_PRIORITY: "{{ loggifly_env_ntfy_priority }}"
          APPRISE_URL: "{{ loggifly_env_apprise_url }}"
          CONTAINERS: "{{ loggifly_env_containers }}"
          SWARM_SERVICES: "{{ loggifly_env_swarm_services }}"
          MONITOR_ALL_CONTAINERS: "{{ loggifly_env_monitor_all_containers}}"
          MONITOR_ALL_SWARM_SERVICES: "{{ loggifly_env_monitor_all_swarm_containers }}"
          EXCLUDED_CONTAINERS: "{{ loggifly_env_excluded_containers }}"
          EXCLUDED_SWARM_SERVICES: "{{ loggifly_env_excluded_swarm_containers }}"
          LOGGIFLY_MODE: "{{ loggifly_env_loggifly_mode }}"
          GLOBAL_KEYWORDS: "{{ loggifly_env_global_keywords }}"
          GLOBAL_KEYWORDS_WITH_ATTACHMENT: "{{ loggifly_env_global_keywords_with_attachment }}"
          EXCLUDED_KEYWORDS: "{{ loggifly_env_excluded_keywords}}"
          ATTACH_LOGFILE: "{{ loggifly_env_attach_logfile }}"
          ATTACHMENT_LINES: "{{ loggifly_env_attchment_lines }}"
          NOTIFICATION_COOLDOWN: "{{ loggifly_env_notification_cooldown }}"
          ACTION_COOLDOWN: "{{ loggifly_env_action_cooldown }}"
          OLIVETIN_URL: "{{ loggifly_env_olivetin_url }}"
          OLIVETIN_USERNAME: "{{ loggifly_env_olivetin_username }}"
          OLIVETIN_PASSWORD: "{{ loggifly_env_olivetin_password }}"
          LOG_LEVEL: "{{ loggifly_env_log_level }}"
          MULTI_LINE_ENTRIES: "{{ loggifly_env_multi_line_entries }}"
          HIDE_REGEX_IN_TITLE: "{{ loggifly_env_hide_regex_in_title }}"
          RELOAD_CONFIG: "{{ loggifly_env_reload_config }}"
          DISABLE_NOTIFICATIONS: "{{ loggifly_env_disable_notifications }}"
          DISABLE_START_MESSAGE: "{{ loggifly_env_disable_start_messag }}"
          DISABLE_SHUTDOWN_MESSAGE: "{{ loggifly_env_disable_shutdown_message }}"
          DISABLE_CONFIG_RELOAD_MESSAGE: "{{ loggifly_env_disable_config_reload_message }}"
          DISABLE_CONTAINER_EVENT_MESSAGE: "{{ loggifly_env_disable_container_event_message }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ loggifly_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ loggifly_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ loggifly_homepage_group }}"
          homepage.icon: "{{ loggifly_homepage_icon }}"
          homepage.description: "{{ 'A Lightweight Tool that monitors Docker Container Logs for predefined keywords or regex patterns and sends Notifications.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ loggifly_container_name }}"
          homepage.showStats: "{{ loggifly_homepage_showstats }}"
          repliqate.enabled: "{{ loggifly_repliqate_enabled }}"
          repliqate.engine: "{{ loggifly_repliqate_engine }}"
          repliqate.schedule: "{{ loggifly_repliqate_schedule }}"
          repliqate.backup_id: "{{ loggifly_repliqate_backup_id }}"
          repliqate.retention: "{{ loggifly_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/clemcer/loggifly/releases"
        cpu_shares: "{{ loggifly_cpu_shares }}"
        memory: "{{ loggifly_memory }}"
        restart_policy: unless-stopped
  when: loggifly_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ loggifly_container_name }}"
        state: absent
  when: loggifly_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ loggifly_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ loggifly_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: loggifly_enabled is false and archive_app_data_enabled is true
