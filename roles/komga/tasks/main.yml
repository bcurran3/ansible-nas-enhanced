---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ komga_data_directory }}"
        - "{{ komga_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ komga_container_name }}"
        hostname: "{{ komga_container_name }}"
        image: "{{ komga_image_name }}:{{ komga_image_version }}"
        pull: true
        cpu_shares: "{{ komga_cpu_shares }}"
        volumes:
          - "{{ komga_comics_directory }}:/comics:ro"
          - "{{ komga_books_directory }}:/books:ro"
          - "{{ komga_data_directory }}:/data:rw"
          - "{{ komga_data_directory }}/config:/config:rw"
        network_mode: "bridge"
        ports:
          - "{{ komga_port_http }}:{{ komga_port_http }}"
        env:
          PUID: "{{ komga_user_id }}"
          PGID: "{{ komga_group_id }}"
          JAVA_TOOL_OPTIONS: "-Xmx4g"
          journal-mode: "wal"
          SERVER_PORT: "{{ komga_port_http }}"
          TZ: "{{ ansible_nas_timezone }}"
        restart_policy: unless-stopped
        memory: "{{ komga_memory }}"
        labels:
          autoheal: "{{ komga_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ komga_watchtower_monitor_only }}"
          homepage.group: "{{ komga_homepage_group }}"
          homepage.name: "Komga"
          homepage.icon: "{{ komga_homepage_icon }}"
          homepage.href: "{{ komga_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ komga_port_http }}"
#         homepage.description: "Media server for comics/mangas/BDs/magazines/eBooks with API, OPDS, Kobo Sync and KOReader Sync support"
          homepage.server: "my-docker"
          homepage.container: "{{ komga_container_name }}"
          homepage.showStats: "{{ komga_homepage_showStats }}"
          homepage.widget.type: "komga"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ komga_port_http }}"
          homepage.widget.username: "{{ komga_widget_username }}"
          homepage.widget.password: "{{ komga_widget_password }}"
          homepage.widget.key: "{{ komga_widget_key }}"
          traefik.enable: "{{ komga_available_externally | string }}"
          traefik.http.routers.komga.rule: "Host(`{{ komga_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.komga.tls.certresolver: "letsencrypt"
          traefik.http.routers.komga.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.komga.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ komga_hostname }}"
          traefik.http.routers.komga.middlewares: "{{ komga_hostname }}@docker"
          traefik.http.middlewares.komga.IPAllowList.sourcerange: "{{ komga_traefik_whitelist }}"
          traefik.http.services.komga.loadbalancer.server.port: "{{ komga_port_http }}"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/gotson/komga/releases/tag/$${major}.$${minor}.$${patch}"
  when: komga_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ komga_container_name }}"
        state: absent
  when: komga_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ komga_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ komga_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: komga_enabled is false and archive_app_data_enabled is true
