---
# ANE
ansible_nas_app_name: "Youtarr"
youtarr_enabled: false
youtarr_available_externally: false
youtarr_traefik_whitelist: "{{ lan }}"

# directories
youtarr_data_directory: "{{ docker_home }}/youtarr"
youtarr_download_directory: "{{ downloads_root }}/youtube/video"

# docker
youtarr_container_name: "youtarr"
youtarr_image_name: "dialmaster/youtarr"
youtarr_image_tag: "latest"
youtarr_db_container_name: "youtarr-db"
youtarr_db_image_name: "mariadb"
youtarr_db_image_tag: "10.3"

# network
youtarr_hostname: "youtarr"
youtarr_port_http: "3087"

# specs
youtarr_cpu_shares: 1024
youtarr_memory: "1G"
youtarr_db_cpu_shares: 1024
youtarr_db_memory: "1G"

# app
youtarr_env_auth_enabled: "true"
youtarr_env_auth_preset_username: "admin"
youtarr_env_auth_preset_password: "{{ ansible_nas_app_admin_password }}"
youtarr_env_plex_url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:32400"

# autoheal
youtarr_autoheal: "false"
youtarr_db_autoheal: "false"

# dockflare
youtarr_dockflare_tunnel: "false"
youtarr_dockflare_access_group: ""

# homepage
youtarr_homepage_group: "Apps"
youtarr_homepage_icon: "sh-youtarr.png"
youtarr_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ youtarr_port_http }}"
youtarr_homepage_showstats: "false"
youtarr_db_homepage_group: "DBs"
youtarr_db_homepage_icon: "mariadb.png"
youtarr_db_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ youtarr_port_http }}"
youtarr_db_homepage_showstats: "false"

# repliqate
youtarr_repliqate_enabled: "false"
youtarr_repliqate_engine: "restic"
youtarr_repliqate_schedule: "@daily 3am"
youtarr_repliqate_backup_id: "{{ youtarr_container_name }}"
youtarr_repliqate_retention: "30d"
youtarr_db_repliqate_enabled: "false"
youtarr_db_repliqate_engine: "restic"
youtarr_db_repliqate_schedule: "@daily 3am"
youtarr_db_repliqate_backup_id: "{{ youtarr_container_name }}"
youtarr_db_repliqate_retention: "30d"

# tinyauth
youtarr_tinyauth_enabled: false

# watchtower
youtarr_watchtower_enable: "false"
youtarr_db_watchtower_enable: "false"
