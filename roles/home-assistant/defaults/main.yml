---
ansible_nas_app_name: "Home Assistant"

homeassistant_enabled: false
homeassistant_available_externally: false
homeassistant_traefik_whitelist: "{{ lan }}"

# directories
homeassistant_data_directory: "{{ docker_home }}/home-assistant"

# network
homeassistant_port: "8123"
homeassistant_hostname: "homeassistant"

# docker
homeassistant_container_name: "home-assistant"
homeassistant_image_name: "homeassistant/home-assistant"
homeassistant_image_version: latest
homeassistant_cpu_shares: 1024

# specs
homeassistant_memory: 1g

# autoheal
homeassistant_autoheal: "false"

# homepage
homeassistant_homepage_group: "Apps"
homeassistant_homepage_icon: "home-assistant.png"
homeassistant_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ homeassistant_port }}"
homeassistant_homepage_showStats: "false"
homeassistant_widget_key: "your_key_here"

# watchtower
homeassistant_watchtower_monitor_only: "true"