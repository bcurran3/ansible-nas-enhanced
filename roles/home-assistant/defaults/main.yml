---
# ANE
ansible_nas_app_name: "Home Assistant"
home_assistant_enabled: false
home_assistant_available_externally: false
home_assistant_traefik_whitelist: "{{ lan }}"

# directories
home_assistant_data_directory: "{{ docker_home }}/home-assistant"

# network
home_assistant_port_http: "8123"
home_assistant_hostname: "homeassistant"

# docker
home_assistant_container_name: "home-assistant"
home_assistant_image_name: "homeassistant/home-assistant"
home_assistant_image_version: latest
home_assistant_cpu_shares: 1024

# specs
home_assistant_memory: "1G"

# autoheal
home_assistant_autoheal: "false"

# dockflare
home_assistant_dockflare_tunnel: "false"
home_assistant_dockflare_access_group: ""

# homepage
home_assistant_homepage_group: "Apps"
home_assistant_homepage_icon: "home-assistant.png"
home_assistant_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ home_assistant_port_http }}"
home_assistant_homepage_showstats: "false"
home_assistant_widget_key: ""

# repliqate
home_assistant_repliqate_enabled: "false"
home_assistant_repliqate_engine: "restic"
home_assistant_repliqate_schedule: "@daily 3am"
home_assistant_repliqate_backup_id: "{{ home_assistant_container_name }}"
home_assistant_repliqate_retention: "30d"

# tinyauth
home_assistant_tinyauth_enabled: false

# watchtower
home_assistant_watchtower_enable: "false"