---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ homeassistant_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ homeassistant_container_name }}"
        hostname: "{{ homeassistant_container_name }}"
        image: "{{ homeassistant_image_name }}:{{ homeassistant_image_version }}"
        pull: true
        volumes:
          - "{{ homeassistant_data_directory }}/config:/config:rw"
        network_mode: host
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ homeassistant_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ homeassistant_watchtower_enable }}"
          dockflare.enable: "{{ homeassistant_dockflare_tunnel }}"
          dockflare.access.group: "{{ homeassistant_dockflare_access_group }}"
          dockflare.hostname: "{{ homeassistant_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ homeassistant_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ homeassistant_homepage_group }}"
          homepage.icon: "{{ homeassistant_homepage_icon }}"
          homepage.href: "{{ homeassistant_homepage_href }}"
          homepage.description: "{{ 'homeassistant description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ homeassistant_container_name }}"
          homepage.showStats: "{{ homeassistant_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ homeassistant_port_http }}"
          homepage.widget.type: "homeassistant"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:8123"
          homepage.widget.key: "{{ homeassistant_widget_key }}"
          repliqate.enabled: "{{ homeassistant_repliqate_enabled }}"
          repliqate.engine: "{{ homeassistant_repliqate_engine }}"
          repliqate.schedule: "{{ homeassistant_repliqate_schedule }}"
          repliqate.backup_id: "{{ homeassistant_repliqate_backup_id }}"
          repliqate.retention: "{{ homeassistant_repliqate_retention }}"
          traefik.enable: "{{ homeassistant_available_externally | string }}"
          traefik.http.routers.homeassistant.rule: "Host(`{{ homeassistant_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.homeassistant.tls.certresolver: "letsencrypt"
          traefik.http.routers.homeassistant.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.homeassistant.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ homeassistant_hostname }}"
          traefik.http.routers.homeassistant.middlewares: "{{ homeassistant_hostname }}@docker"
          traefik.http.middlewares.homeassistant.IPAllowList.sourcerange: "{{ homeassistant_traefik_whitelist }}"
          traefik.http.services.homeassistant.loadbalancer.server.port: "8123"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/homeassistant/home-assistant"
        cpu_shares: "{{ homeassistant_cpu_shares }}"
        memory: "{{ homeassistant_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (homeassistant_port_http | string)] +
                (['https://' + homeassistant_hostname + '.' + ansible_nas_domain] if (homeassistant_available_externally is true or homeassistant_dockflare_tunnel is true) else [])
              }}
  when: homeassistant_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ homeassistant_container_name }}"
        state: absent
  when: homeassistant_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ homeassistant_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ homeassistant_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: homeassistant_enabled is false and archive_app_data_enabled is true
