---
- name: Start {{ home_assistant_proper_name }}
  block:
    - name: Create {{ home_assistant_proper_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ home_assistant_data_directory }}/config"

- name: Start {{ home_assistant_proper_name }}
  block:
    - name: Create {{ home_assistant_proper_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ home_assistant_data_directory }}/config"


    - name: Set {{ home_assistant_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        home_assistant_homepage_href: "https://{{ home_assistant_hostname }}.{{ ansible_nas_domain }}"
      when: home_assistant_traefik_enabled | bool or home_assistant_dockflare_enabled | bool

    - name: Pre-seed Clean Configuration
      ansible.builtin.copy:
        dest: "{{ home_assistant_data_directory }}/config/configuration.yaml"
        content: |
          default_config:

          frontend:
            themes: !include_dir_merge_named themes

          automation: !include automations.yaml
          script: !include scripts.yaml
          scene: !include scenes.yaml

          http:
            use_x_forwarded_for: true
            trusted_proxies:
              - 172.16.0.0/12
              - 127.0.0.1
              - {{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}

    - name: Create empty helper files
      ansible.builtin.file:
        path: "{{ home_assistant_data_directory }}/config/{{ item }}"
        state: touch
      with_items: [automations.yaml, scripts.yaml, scenes.yaml]

    - name: Create {{ home_assistant_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ home_assistant_container_name }}"
        hostname: "{{ home_assistant_container_name }}"
        image: "{{ home_assistant_image_name }}:{{ home_assistant_image_version }}"
        pull: true
        volumes:
          - "{{ home_assistant_data_directory }}/config:/config:rw"
        network_mode: host
        capabilities:
          - NET_ADMIN
          - NET_RAW
#        ports:
#          - 8123:8123
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ home_assistant_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ home_assistant_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ home_assistant_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ home_assistant_dockflare_access_group }}"
          dockflare.hostname: "{{ home_assistant_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ home_assistant_port_http }}"
          homepage.name: "{{ home_assistant_proper_name }}"
          homepage.group: "{{ home_assistant_homepage_group }}"
          homepage.icon: "{{ home_assistant_homepage_icon }}"
          homepage.href: "{{ home_assistant_homepage_href }}"
          homepage.description: "{{ 'home_assistant description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ home_assistant_container_name }}"
          homepage.showStats: "{{ home_assistant_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ home_assistant_port_http }}"
          homepage.widget.type: "homeassistant"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:8123"
          homepage.widget.key: "{{ home_assistant_widget_key }}"
          repliqate.enabled: "{{ home_assistant_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ home_assistant_repliqate_engine }}"
          repliqate.schedule: "{{ home_assistant_repliqate_schedule }}"
          repliqate.backup_id: "{{ home_assistant_repliqate_backup_id }}"
          repliqate.retention: "{{ home_assistant_repliqate_retention }}"
          traefik.enable: "{{ home_assistant_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.homeassistant.rule: "Host(`{{ home_assistant_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.homeassistant.entrypoints: "websecure"
          traefik.http.routers.homeassistant.tls.certresolver: "letsencrypt"
          traefik.http.routers.homeassistant.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.homeassistant.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.homeassistant.middlewares: "homeassistant-whitelist{{ ',tinyauth-auth@docker' if home_assistant_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.homeassistant-whitelist.ipallowlist.sourcerange: "{{ home_assistant_traefik_whitelist }}"
          traefik.http.services.homeassistant-svc.loadbalancer.server.url: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:8123"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/homeassistant/home-assistant"
        cpu_shares: "{{ home_assistant_cpu_shares }}"
        memory: "{{ home_assistant_memory }}"
        memory_swap: "{{ home_assistant_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ home_assistant_proper_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (home_assistant_port_http | string)] +
                (['https://' + home_assistant_hostname + '.' + ansible_nas_domain] if (home_assistant_traefik_enabled is true or home_assistant_dockflare_enabled is true) else [])
              }}
  when: home_assistant_enabled is true

- name: Stop {{ home_assistant_proper_name }}
  block:
    - name: Stop {{ home_assistant_proper_name }} Container
      community.docker.docker_container:
        name: "{{ home_assistant_container_name }}"
        state: absent
  when: home_assistant_enabled is false

- name: Data Archive {{ home_assistant_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ home_assistant_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - home_assistant_enabled is false