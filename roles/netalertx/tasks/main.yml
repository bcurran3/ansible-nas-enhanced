---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "20211"
        group: "20211"
#        mode: "1750"
      with_items:
        - "{{ netalertx_data_directory }}"
        - "{{ netalertx_data_directory }}/db"
        - "{{ netalertx_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ netalertx_container_name }}"
        hostname: "{{ netalertx_container_name }}"
        image: "{{ netalertx_image_name }}:{{ netalertx_image_tag }}"
        pull: true
        network_mode: host
        cap_drop:
          - ALL              # Drop all capabilities for enhanced security
        capabilities:
          - NET_ADMIN        # Required for ARP scanning
          - NET_BIND_SERVICE # Required to bind to privileged ports (nbtscan)
          - NET_RAW          # Required for raw socket operations
        env:
          LISTEN_ADDR: "{{ netalertx_env_listen_addr }}" # Listen for connections on all interfaces
          PORT: "{{ netalertx_port_http }}" # Application port
          GRAPHQL_PORT: "{{ netalertx_port_graphql }}" # GraphQL API port (passed into APP_CONF_OVERRIDE at runtime)
          ALWAYS_FRESH_INSTALL: "{{ netalertx_env_always_fresh_install }}" # Set to true to reset your config and database on each container start
          NETALERTX_DEBUG: "{{ netalertx_env_netalertx_debug }}" # 0=kill all services and restart if any dies. 1 keeps running dead services.
          TZ: "{{ ansible_nas_timezone }}"
        volumes:
          - "{{ netalertx_data_directory }}:/data"
          - "/etc/localtime:/etc/localtime:ro"
        tmpfs:
              - "/tmp:uid=20211,gid=20211,mode=1700,rw,noexec,nosuid,nodev,async,noatime,nodiratime"
        labels:
          autoheal: "{{ netalertx_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ netalertx_watchtower_enable }}"
          dockflare.enable: "{{ netalertx_dockflare_tunnel }}"
          dockflare.access.group: "{{ netalertx_dockflare_access_group }}"
          dockflare.hostname: "{{ netalertx_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ netalertx_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ netalertx_homepage_group }}"
          homepage.icon: "{{ netalertx_homepage_icon }}"
          homepage.href: "{{ netalertx_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ netalertx_port_http }}"
          homepage.description: "{{ 'Network scanner & notification framework' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ netalertx_container_name }}"
          homepage.showStats: "false"
          homepage.widget.type: "netalertx"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ netalertx_port_http }}"
          homepage.widget.key: "{{ netalertx_homepage_widget_key }}"
          repliqate.enabled: "{{ netalertx_repliqate_enabled }}"
          repliqate.engine: "{{ netalertx_repliqate_engine }}"
          repliqate.schedule: "{{ netalertx_repliqate_schedule }}"
          repliqate.backup_id: "{{ netalertx_repliqate_backup_id }}"
          repliqate.retention: "{{ netalertx_repliqate_retention }}"
          traefik.enable: "{{ netalertx_available_externally | string }}"
          traefik.http.routers.netalertx.rule: "Host(`{{ netalertx_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.netalertx.entrypoints: "websecure"
          traefik.http.routers.netalertx.tls.certresolver: "letsencrypt"
          traefik.http.routers.netalertx.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.netalertx.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          
          # Middlewares
          traefik.http.routers.netalertx.middlewares: "netalertx-whitelist{{ ',tinyauth-auth@docker' if netalertx_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.netalertx-whitelist.ipallowlist.sourcerange: "{{ netalertx_traefik_whitelist }}"

          # THE FIX: Point to the Docker Bridge Gateway (usually 172.17.0.1)
          # We use the URL here, but we MUST ensure no other 'port' labels exist for this service.
          traefik.http.services.netalertx.loadbalancer.server.url: "http://172.17.0.1:{{ netalertx_port_http }}"
          wud.tag.include: '^v\\d+\\.\\d+\\.\\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/jokob-sk/NetAlertX/pkgs/container/netalertx"
        cpu_shares: "{{ netalertx_cpu_shares }}"
        log_driver: "json-file" # Use JSON file logging driver
        log_options:
            max-file: "3"     # Keep a maximum of 3 log files
            max-size: "10m"   # Rotate log files after they reach 10MB
        memory: "{{ netalertx_memory }}"
        pids_limit: "512"
        read_only: true      # Make the container filesystem read-only
        restart_policy: unless-stopped

    - name: Set permissions on app.conf to 644
      ansible.builtin.file:
        path: "{{ netalertx_data_directory }}/config/app.conf"
        mode: '0644'
        state: file

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
          {{
            ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (netalertx_port_http | string)] +
            (['https://' + netalertx_hostname + '.' + ansible_nas_domain] if (netalertx_available_externally is true or netalertx_dockflare_tunnel is true) else [])
          }}
  when: netalertx_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ netalertx_container_name }}"
        state: absent
  when: netalertx_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ netalertx_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - netalertx_enabled is false
