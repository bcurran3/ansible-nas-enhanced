---
# ANE
ansible_nas_app_name: "Dozzle"
dozzle_enabled: false
dozzle_available_externally: false
dozzle_traefik_whitelist: "{{ lan }}"
dozzle_data_directory: "{{ docker_home }}/dozzle"

# network
dozzle_hostname: "dozzle"
dozzle_port_http: "9999"

# docker
dozzle_container_name: "dozzle"
dozzle_image_name: "ghcr.io/amir20/dozzle"
dozzle_image_tag: "latest"

# specs
dozzle_cpu_shares: 1024
dozzle_memory: "256MB"
dozzle_memory_swap: -1

# app
dozzle_env_dozzle_remote_agent: ""

# autoheal
dozzle_autoheal: "false"

# dockflare
dozzle_dockflare_tunnel: "false"
dozzle_dockflare_access_group: ""

# homepage
dozzle_homepage_group: "Apps"
dozzle_homepage_icon: "dozzle.png"
dozzle_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ dozzle_port_http }}"
dozzle_homepage_showstats: "false"

# repliqate
dozzle_repliqate_enabled: "false"
dozzle_repliqate_engine: "restic"
dozzle_repliqate_schedule: "@daily 3am"
dozzle_repliqate_backup_id: "{{ dozzle_container_name }}"
dozzle_repliqate_retention: "30d"

# tinyauth
dozzle_tinyauth_enabled: false

# watchtower
dozzle_watchtower_enable: "false"