---
- name: Start {{ dozzle_proper_name }}
  block:
    - name: Set {{ dozzle_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        dozzle_homepage_href: "https://{{ dozzle_hostname }}.{{ ansible_nas_domain }}"
      when: dozzle_traefik_enabled | bool or dozzle_dockflare_enabled | bool

    - name: Set {{ dozzle_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        dozzle_homepage_href: "https://{{ dozzle_hostname }}.{{ ansible_nas_domain }}"
      when: dozzle_traefik_enabled | bool or dozzle_dockflare_enabled | bool

    - name: Create {{ dozzle_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ dozzle_container_name }}"
        hostname: "{{ dozzle_container_name }}"
        image: "{{ dozzle_image_name }}:{{ dozzle_image_tag }}"
        pull: true
        ports:
          - "{{ dozzle_port_http }}:8080"
        volumes:
          - "/var/run/docker.sock:/var/run/docker.sock"
          - "/etc/timezone:/etc/timezone:ro"
        env:
          DOZZLE_REMOTE_AGENT: "{{ dozzle_env_dozzle_remote_agent }}"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: "{{ dozzle_healthcheck_test }}"
          interval: "{{ dozzle_healthcheck_interval }}"
          timeout: "{{ dozzle_healthcheck_timeout }}"
          retries: "{{ dozzle_healthcheck_retries }}"
          start_period: "{{ dozzle_healthcheck_start_period }}"
        labels:
          autoheal: "{{ dozzle_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ dozzle_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ dozzle_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ dozzle_dockflare_access_group }}"
          dockflare.hostname: "{{ dozzle_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ dozzle_port_http }}"
          homepage.name: "{{ dozzle_proper_name }}"
          homepage.group: "{{ dozzle_homepage_group }}"
          homepage.icon: "{{ dozzle_homepage_icon }}"
          homepage.href: "{{ dozzle_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ dozzle_port_http }}"
          homepage.description: "{{ 'Realtime log viewer for docker containers.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ dozzle_container_name }}"
          homepage.showStats: "{{ dozzle_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ dozzle_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ dozzle_repliqate_engine }}"
          repliqate.schedule: "{{ dozzle_repliqate_schedule }}"
          repliqate.backup_id: "{{ dozzle_repliqate_backup_id }}"
          repliqate.retention: "{{ dozzle_repliqate_retention }}"
          traefik.enable: "{{ dozzle_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.dozzle.rule: "Host(`{{ dozzle_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.dozzle.tls.certresolver: "letsencrypt"
          traefik.http.routers.dozzle.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.dozzle.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.dozzle.middlewares: "dozzle@docker{{ ',tinyauth-auth@docker' if dozzle_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.dozzle.IPAllowList.sourcerange: "{{ dozzle_traefik_whitelist }}"
          traefik.http.services.dozzle.loadbalancer.server.port: "8080"
          wud.tag.include: '^\\d+\\.\\d+\\.\\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/amir20/dozzle/pkgs/container/dozzle"
        cpu_shares: "{{ dozzle_cpu_shares }}"
        memory: "{{ dozzle_memory }}"
        memory_swap: "{{ dozzle_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ dozzle_proper_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (dozzle_port_http | string)] +
                (['https://' + dozzle_hostname + '.' + ansible_nas_domain] if (dozzle_traefik_enabled is true or dozzle_dockflare_enabled is true) else [])
              }}
  when: dozzle_enabled is true

- name: Stop {{ dozzle_proper_name }}
  block:
    - name: Stop {{ dozzle_proper_name }} Container
      community.docker.docker_container:
        name: "{{ dozzle_container_name }}"
        state: absent
  when: dozzle_enabled is false