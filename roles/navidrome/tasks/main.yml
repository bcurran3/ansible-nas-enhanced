---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        # mode: 0755
      with_items:
        - "{{ navidrome_data_directory }}/data"
        - "{{ navidrome_data_directory }}/playlists"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ navidrome_container_name }}"
        hostname: "{{ navidrome_container_name }}"
        image: "{{ navidrome_image_name }}:{{ navidrome_image_version }}"
        pull: true
        volumes:
          - "{{ navidrome_data_directory }}/data:/navidrome/data:rw"
          - "{{ navidrome_music_directory }}:/navidrome/music:rw"
        ports:
          - "{{ navidrome_port_http }}:4533"
        env:
          ND_MUSICFOLDER: "/navidrome/music"
          ND_DATAFOLDER: "/navidrome/data"
          ND_SCANSCHEDULE: "{{ navidrome_scan_schedule }}"
          ND_LOGLEVEL: "{{ navidrome_log_level }}"
          ND_SESSIONTIMEOUT: "{{ navidrome_session_timeout }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ navidrome_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ navidrome_watchtower_enable }}"
          dockflare.enable: "{{ navidrome_dockflare_tunnel }}"
          dockflare.access.group: "{{ navidrome_dockflare_access_group }}"
          dockflare.hostname: "{{ navidrome_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ navidrome_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ navidrome_homepage_group }}"
          homepage.icon: "{{ navidrome_homepage_icon }}"
          homepage.href: "{{ navidrome_homepage_href }}"
          homepage.description: "{{ 'navidrome description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ navidrome_container_name }}"
          homepage.showStats: "{{ navidrome_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ navidrome_port_http }}"
          repliqate.enabled: "{{ navidrome_repliqate_enabled }}"
          repliqate.engine: "{{ navidrome_repliqate_engine }}"
          repliqate.schedule: "{{ navidrome_repliqate_schedule }}"
          repliqate.backup_id: "{{ navidrome_repliqate_backup_id }}"
          repliqate.retention: "{{ navidrome_repliqate_retention }}"
          traefik.enable: "{{ navidrome_available_externally | string }}"
          traefik.http.routers.navidrome.rule: "Host(`{{ navidrome_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.navidrome.tls.certresolver: "letsencrypt"
          traefik.http.routers.navidrome.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.navidrome.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.navidrome.middlewares: "navidrome@docker{{ ',tinyauth-auth@docker' if navidrome_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.navidrome.IPAllowList.sourcerange: "{{ navidrome_traefik_whitelist }}"
          traefik.http.services.navidrome.loadbalancer.server.port: "4533"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/deluan/navidrome"
        cpu_shares: "{{ navidrome_cpu_shares }}"
        memory: "{{ navidrome_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (navidrome_port_http | string)] +
                (['https://' + navidrome_hostname + '.' + ansible_nas_domain] if (navidrome_available_externally is true or navidrome_dockflare_tunnel is true) else [])
              }}
  when: navidrome_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ navidrome_container_name }}"
        state: absent
  when: navidrome_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ navidrome_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - navidrome_enabled is false