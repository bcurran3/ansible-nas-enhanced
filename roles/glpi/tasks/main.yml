---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ glpi_data_directory }}"
        - "{{ glpi_data_directory }}/db"
        - "{{ glpi_data_directory }}/html"

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ glpi_db_container_name }}"
        hostname: "{{ glpi_db_container_name }}"
        image: "{{ glpi_db_image_name }}:{{ glpi_db_image_tag }}"
        pull: true
        volumes:
          - "{{ glpi_data_directory }}/db:/var/lib/mysql"
        env:
          MARIADB_ROOT_PASSWORD: "diouxx"
          MARIADB_DATABASE: "glpidb"
          MARIADB_USER: "glpi_user"
          MARIADB_PASSWORD: "{{ glpi_db_password }}"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
              test:
                - CMD
                - /usr/local/bin/healthcheck.sh
                - --su-mysql
                - --connect
                - --innodb_initialized
              interval: "30s"
              timeout: "10s"
              retries: "3"
              start_period: "30s"
        labels:
          autoheal: "{{ glpi_db_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ glpi_db_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} MariaDB"
          homepage.group: "{{ glpi_db_homepage_group }}"
          homepage.icon: "{{ glpi_db_homepage_icon }}"
          homepage.href: "{{ glpi_db_homepage_href }}"
          homepage.description: "{{ 'MariaDB' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ glpi_db_container_name }}"
          homepage.showStats: "{{ glpi_db_homepage_showstats }}"
          repliqate.enabled: "{{ glpi_db_repliqate_enabled }}"
          repliqate.engine: "{{ glpi_db_repliqate_engine }}"
          repliqate.schedule: "{{ glpi_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ glpi_db_repliqate_backup_id }}"
          repliqate.retention: "{{ glpi_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/mariadb"
        cpu_shares: "{{ glpi_db_cpu_shares }}"
        memory: "{{ glpi_db_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ glpi_container_name }}"
        hostname: "{{ glpi_container_name }}"
        image: "{{ glpi_image_name }}:{{ glpi_image_tag }}"
        pull: true
        volumes:
          - "/etc/timezone:/etc/timezone:ro"
          - "/etc/localtime:/etc/localtime:ro"
          - "{{ glpi_data_directory }}/html:/var/www/html/glpi"
        ports:
          - "{{ glpi_port_http }}:80"
        env:
          TIMEZONE: "{{ ansible_nas_timezone }}"
          TZ: "{{ ansible_nas_timezone }}"
        links:
          - "{{ glpi_db_container_name }}"
        labels:
          autoheal: "{{ glpi_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ glpi_watchtower_enable }}"
          dockflare.enable: "{{ glpi_dockflare_tunnel }}"
          dockflare.access.group: "{{ glpi_dockflare_access_group }}"
          dockflare.hostname: "{{ glpi_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ glpi_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ glpi_homepage_group }}"
          homepage.icon: "{{ glpi_homepage_icon }}"
          homepage.href: "{{ glpi_homepage_href }}"
          homepage.description: "{{ 'GLPI is a Free Asset and IT Management Software package, Data center management, ITIL Service Desk, licenses tracking and software auditing.' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ glpi_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ glpi_container_name }}"
          homepage.showStats: "{{ glpi_homepage_showstats }}"
          repliqate.enabled: "{{ glpi_repliqate_enabled }}"
          repliqate.engine: "{{ glpi_repliqate_engine }}"
          repliqate.schedule: "{{ glpi_repliqate_schedule }}"
          repliqate.backup_id: "{{ glpi_repliqate_backup_id }}"
          repliqate.retention: "{{ glpi_repliqate_retention }}"
          traefik.enable: "{{ glpi_available_externally | string }}"
          traefik.http.routers.glpi.rule: "Host(`{{ glpi_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.glpi.tls.certresolver: "letsencrypt"
          traefik.http.routers.glpi.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.glpi.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.glpi.middlewares: "glpi@docker{{ ',tinyauth-auth@docker' if glpi_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.glpi.IPAllowList.sourcerange: "{{ glpi_traefik_whitelist }}"
          traefik.http.services.glpi.loadbalancer.server.port: "80"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/diouxx/glpi"
        cpu_shares: "{{ glpi_cpu_shares }}"
        memory: "{{ glpi_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (glpi_port_http | string)] +
                (['https://' + glpi_hostname + '.' + ansible_nas_domain] if (glpi_available_externally is true or glpi_dockflare_tunnel is true) else [])
              }}
  when: glpi_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ glpi_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ glpi_db_container_name }}"
        state: absent
  when: glpi_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ glpi_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - glpi_enabled is false