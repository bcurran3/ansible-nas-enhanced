---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Get {{ ansible_nas_app_name }} API container state
      community.docker.docker_container:
        name: "{{ rackula_api_container_name }}"
      register: result_api

    - name: Get {{ ansible_nas_app_name }} container state
      community.docker.docker_container:
        name: "{{ rackula_container_name }}"
      register: result

    - name: Check if {{ ansible_nas_app_name }} containers are running
      ansible.builtin.assert:
        that:
          - result_api.container['State']['Status'] == "running"
          - result_api.container['State']['Restarting'] == false
          - result.container['State']['Status'] == "running"
          - result.container['State']['Restarting'] == false
