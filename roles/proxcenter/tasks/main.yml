---
- name: Start {{ proxcenter_proper_name }}
  block:
    - name: Create {{ proxcenter_proper_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: 1001
        group: 1001
      with_items:
        - "{{ proxcenter_data_directory }}"
        - "{{ proxcenter_data_directory }}/data"

    - name: Set {{ proxcenter_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        proxcenter_homepage_href: "https://{{ proxcenter_hostname }}.{{ ansible_nas_domain }}"
        proxcenter_env_app_url: "https://{{ proxcenter_hostname }}.{{ ansible_nas_domain }}"
        proxcenter_env_nextauth_url: "https://{{ proxcenter_hostname }}.{{ ansible_nas_domain }}"
      when: proxcenter_traefik_enabled | bool or proxcenter_dockflare_enabled | bool

    - name: Create {{ proxcenter_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ proxcenter_container_name }}"
        hostname: "{{ proxcenter_container_name }}"
        image: "{{ proxcenter_image_name }}:{{ proxcenter_image_tag }}"
        pull: true
        volumes:
          - "{{ proxcenter_data_directory }}/data:/app/data"
        ports:
          - "{{ proxcenter_port_http }}:3000"
        env:
          APP_SECRET: "{{ proxcenter_env_app_secret }}"
          APP_URL: "{{ proxcenter_env_app_url }}"
          DATABASE_URL: "{{ proxcenter_env_database_url }}"
          NEXTAUTH_SECRET: "{{ proxcenter_env_nextauth_secret }}"
          NEXTAUTH_URL: "{{ proxcenter_env_nextauth_url }}"
          NODE_ENV: "{{ proxcenter_env_node_env }}"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: "{{ proxcenter_healthcheck_test }}"
          interval: "{{ proxcenter_healthcheck_interval }}"
          timeout: "{{ proxcenter_healthcheck_timeout }}"
          retries: "{{ proxcenter_healthcheck_retries }}"
          start_period: "{{ proxcenter_healthcheck_start_period }}"
        labels:
          autoheal: "{{ proxcenter_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ proxcenter_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ proxcenter_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ proxcenter_dockflare_access_group }}"
          dockflare.hostname: "{{ proxcenter_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ proxcenter_port_http }}"
          homepage.name: "{{ proxcenter_proper_name }}"
          homepage.group: "{{ proxcenter_homepage_group }}"
          homepage.icon: "{{ proxcenter_homepage_icon }}"
          homepage.href: "{{ proxcenter_homepage_href }}"
          homepage.description: "{{ proxcenter_homepage_description if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ proxcenter_container_name }}"
          homepage.showStats: "{{ proxcenter_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ proxcenter_port_http }}"
          repliqate.enabled: "{{ proxcenter_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ proxcenter_repliqate_engine }}"
          repliqate.schedule: "{{ proxcenter_repliqate_schedule }}"
          repliqate.backup_id: "{{ proxcenter_repliqate_backup_id }}"
          repliqate.retention: "{{ proxcenter_repliqate_retention }}"
          traefik.enable: "{{ proxcenter_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.proxcenter.rule: "Host(`{{ proxcenter_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.proxcenter.tls.certresolver: "letsencrypt"
          traefik.http.routers.proxcenter.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.proxcenter.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.proxcenter.middlewares: "proxcenter@docker{{ ',tinyauth-auth@docker' if proxcenter_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.proxcenter.IPAllowList.sourcerange: "{{ proxcenter_traefik_whitelist }}"
          traefik.http.services.proxcenter.loadbalancer.server.port: "3000"
          wud.tag.include: "{{ proxcenter_wud_tag_include }}"
          wud.tag.transform.type: "{{ proxcenter_wud_tag_transform_type }}"
          wud.link.template: "{{ proxcenter_wud_link_template }}"
        cpu_shares: "{{ proxcenter_cpu_shares }}"
        memory: "{{ proxcenter_memory }}"
        memory_swap: "{{ proxcenter_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ proxcenter_proper_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (proxcenter_port_http | string)] +
                (['https://' + proxcenter_hostname + '.' + ansible_nas_domain] if (proxcenter_traefik_enabled is true or proxcenter_dockflare_enabled is true) else [])
              }}
  when: proxcenter_enabled is true

- name: Stop {{ proxcenter_proper_name }}
  block:
    - name: Stop {{ proxcenter_proper_name }} Container
      community.docker.docker_container:
        name: "{{ proxcenter_container_name }}"
        state: absent
  when: proxcenter_enabled is false

- name: Data Archive {{ proxcenter_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ proxcenter_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - proxcenter_enabled is false
