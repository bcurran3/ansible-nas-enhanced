---
- name: Start {{ gpu_hot_proper_name }}
  block:
    - name: Set {{ gpu_hot_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        gpu_hot_homepage_href: "https://{{ gpu_hot_hostname }}.{{ ansible_nas_domain }}"
      when: gpu_hot_traefik_enabled | bool or gpu_hot_dockflare_enabled | bool

    - name: Create {{ gpu_hot_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ gpu_hot_container_name }}"
        hostname: "{{ gpu_hot_container_name }}"
        image: "{{ gpu_hot_image_name }}:{{ gpu_hot_image_tag }}"
        pull: true
        ports:
          - "{{ gpu_hot_port_http }}:1312"
        runtime: "{{ 'nvidia' if nvidia_runtime_enabled | bool else omit }}"
        device_requests: "{{
          [{'driver': 'nvidia', 'count': -1, 'capabilities': ['gpu']}]
          if nvidia_runtime_enabled | bool else omit
        }}"
        env:
          NVIDIA_SMI: "{{ gpu_hot_env_nvidia_smi }}"
          NVIDIA_VISIBLE_DEVICES: "{{ gpu_hot_env_nvidia_visible_devices }}"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: ["CMD", "curl", "-f", "http://localhost:1312/api/gpu-data"]
          interval: 30s
          timeout: 10s
          retries: 3
          start_period: 40s
        labels:
          autoheal: "{{ gpu_hot_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ gpu_hot_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ gpu_hot_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ gpu_hot_dockflare_access_group }}"
          dockflare.hostname: "{{ gpu_hot_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ gpu_hot_port_http }}"
          homepage.name: "{{ gpu_hot_proper_name }}"
          homepage.group: "{{ gpu_hot_homepage_group }}"
          homepage.icon: "{{ gpu_hot_homepage_icon }}"
          homepage.href: "{{ gpu_hot_homepage_href }}"
          homepage.description: "{{ 'Real-time NVIDIA GPU dashboard' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ gpu_hot_container_name }}"
          homepage.showStats: "{{ gpu_hot_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ gpu_hot_port_http }}"
          repliqate.enabled: "false"
          traefik.enable: "{{ gpu_hot_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.gpuhot.rule: "Host(`{{ gpu_hot_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.gpuhot.tls.certresolver: "letsencrypt"
          traefik.http.routers.gpuhot.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.gpuhot.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.gpuhot.middlewares: "gpuhot@docker{{ ',tinyauth-auth@docker' if gpu_hot_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.gpuhot.IPAllowList.sourcerange: "{{ gpu_hot_traefik_whitelist }}"
          traefik.http.services.gpuhot.loadbalancer.server.port: "1312"
          wud.tag.include: "^v\\d+\\.\\d+\\.\\d+$"
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/psalias2006/GPU-Hot/pkgs/container/gpu-hot"
        cpu_shares: "{{ gpu_hot_cpu_shares }}"
        memory: "{{ gpu_hot_memory }}"
        memory_swap: "{{ gpu_hot_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ gpu_hot_proper_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (gpu_hot_port_http | string)] +
                (['https://' + gpu_hot_hostname + '.' + ansible_nas_domain] if (gpu_hot_traefik_enabled is true or gpu_hot_dockflare_enabled is true) else [])
              }}
  when: gpu_hot_enabled is true

- name: Stop {{ gpu_hot_proper_name }}
  block:
    - name: Stop {{ gpu_hot_proper_name }} Container
      community.docker.docker_container:
        name: "{{ gpu_hot_container_name }}"
        state: absent
  when: gpu_hot_enabled is false
