---
# ANE
ansible_nas_app_name: "CheckCle"
checkcle_enabled: false
checkcle_available_externally: false
checkcle_traefik_whitelist: "{{ lan }}"

# directories
checkcle_data_directory: "{{ docker_home }}/checkcle"

# docker
checkcle_container_name: "checkcle"
checkcle_image_name: "operacle/checkcle"
checkcle_image_tag: "latest"

# uid / gid
checkcle_user_id: "0"
checkcle_group_id: "0"

# network
checkcle_port_http: "8098"
checkcle_hostname: "checkcle"

# specs
checkcle_cpu_shares: 1024
checkcle_memory: "1G"
checkcle_memory_swap: -1

# autoheal
checkcle_autoheal: "false"

# dockflare
checkcle_dockflare_tunnel: "false"
checkcle_dockflare_access_group: ""

# homepage
checkcle_homepage_group: "Apps"
checkcle_homepage_icon: "sh-checkcle.png"
checkcle_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ checkcle_port_http }}"
checkcle_homepage_showstats: "false"

# repliqate
checkcle_repliqate_enabled: "false"
checkcle_repliqate_engine: "restic"
checkcle_repliqate_schedule: "@daily 3am"
checkcle_repliqate_backup_id: "{{ checkcle_container_name }}"
checkcle_repliqate_retention: "30d"

# tinyauth
checkcle_tinyauth_enabled: false

# watchtower
checkcle_watchtower_enable: "false"
