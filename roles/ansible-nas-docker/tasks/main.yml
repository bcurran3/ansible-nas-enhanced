---
- name: Start Docker setup for Ubuntu 22.04 LTS
  block:
    - name: Install python3-pip
      apt:
        name: python3-pip
        state: present
      register: result
      until: result is succeeded

    - name: Remove docker-py python module
      pip:
        name: docker-py
        state: absent
      register: result
      until: result is succeeded

    - name: Install docker python module
      pip:
        name: docker
        state: present
      register: result
      until: result is succeeded
  when: ansible_distribution == "Ubuntu" and ansible_distribution_version == "22.04"

- name: Start Docker setup for Ubuntu 24.04 LTS
  block:
    - debug:
        msg: "WHAT NEEDS TO BE DONE?"
  when: ansible_distribution == "Ubuntu" and ansible_distribution_version == "24.04"

- name: Create Docker home directory
  file:
    path: "{{ docker_home }}"
    mode: 0755
    state: directory

- name: Add {{ ansible_nas_user }} to docker group
  ansible.builtin.user:
    name: "{{ ansible_nas_user }}"
    state: present
    groups: docker
    append: yes

- name: Generate Docker daemon.json
  copy:
    dest: /etc/docker/daemon.json
    content: "{{ docker_daemon_json | to_nice_json }}"
  register: docker_config
  when: nvidia_runtime_enabled is false

- name: Generate Docker daemon.json with NVIDIA runtime
  copy:
    dest: /etc/docker/daemon.json
    content: "{{ docker_daemon_with_nvidia_json | to_nice_json }}"
  register: docker_config
  when: nvidia_runtime_enabled is true

- name: Restart Docker
  service:
    name: docker
    state: restarted
  when: docker_config.changed
  tags:
    - skip_ansible_lint
