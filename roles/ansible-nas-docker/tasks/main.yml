#            curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | gpg --dearmor -o /etc/apt/keyrings/nvidia-container-toolkit-keyring.gpg
#          args:
#            creates: /etc/apt/keyrings/nvidia-container-toolkit-keyring.gpg

#        - name: Add NVIDIA Container Toolkit repository to APT sources
#          ansible.builtin.apt_repository:
#            repo: "deb [arch={{ nvidia_runtime_arch }} signed-by=/etc/apt/keyrings/nvidia-container-toolkit-keyring.gpg] https://nvidia.github.io/libnvidia-container/stable/deb/ubuntu{{ ansible_distribution_version }} /"
#            state: present
#            filename: nvidia-container-toolkit
#            update_cache: yes
# ^ close but errors updating cache

# my old, less Ansible-ly way:
        - name: Add NVIDIA Container Toolkit repository to APT sources
          ansible.builtin.shell: |
            curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | \
            sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | \
            sudo tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
          args:
            creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list
      when: not nvidia_runtime_presence.stat.exists

    - name: Install NVIDIA Container Runtime packages
      ansible.builtin.apt:
        pkg:
          - nvidia-container-toolkit
          - nvidia-container-toolkit-base
          - libnvidia-container-tools
          - libnvidia-container1
        update_cache: yes
        state: present
      register: nvidia_container_result
      until: nvidia_container_result is succeeded

    - name: Generate Docker daemon.json with NVIDIA runtime
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        content: "{{ docker_daemon_with_nvidia_json | to_nice_json }}"
      register: docker_config_nvidia
  when: nvidia_runtime_enabled is true

- name: Remove NVIDIA Container Runtime
  ansible.builtin.apt:
    pkg:
      - nvidia-container-toolkit
      - nvidia-container-toolkit-base
      - libnvidia-container-tools
      - libnvidia-container1
    update_cache: no
    state: absent
  when: nvidia_runtime_enabled is false
##### END NVIDIA STUFF #####

- name: Generate Docker daemon.json
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: "{{ docker_daemon_json | to_nice_json }}"
  register: docker_config
  when: nvidia_runtime_enabled is false

- name: Restart Docker
  ansible.builtin.service:
    name: docker
    state: restarted
  when: docker_config.changed or docker_config_nvidia.changed
