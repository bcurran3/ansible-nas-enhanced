---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Remove NVIDIA Container Runtime packages
      ansible.builtin.apt:
        pkg:
          - nvidia-container-toolkit
          - nvidia-container-toolkit-base
          - libnvidia-container-tools
          - libnvidia-container1
        update_cache: no
        state: absent
      register: result

    - name: Check NVIDIA Container Runtime packages removed
      ansible.builtin.assert:
        that:
          - not result.changed
