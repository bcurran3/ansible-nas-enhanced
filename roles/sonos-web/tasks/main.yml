---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ sonos_web_container_name }}"
        hostname: "{{ sonos_web_container_name }}"
        image: "{{ sonos_web_image_name }}:{{ sonos_web_image_tag }}"
        pull: true
#        ports:
#          - "{{ sonos_web_port_http }}:5050"
        network_mode: host
        # ^ figure out the ports Sonos' use and make bridged
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ sonos_web_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ sonos_web_watchtower_enable }}"
          dockflare.enable: "{{ sonos_web_dockflare_tunnel }}"
          dockflare.access.group: "{{ sonos_web_dockflare_access_group }}"
          dockflare.hostname: "{{ sonos_web_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ sonos_web_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ sonos_web_homepage_group }}"
          homepage.icon: "{{ sonos_web_homepage_icon }}"
          homepage.href: "{{ sonos_web_homepage_href }}"
          homepage.description: "{{ 'Sonos controller for your web browser' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ sonos_web_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ sonos_web_container_name }}"
          homepage.showStats: "{{ sonos_web_homepage_showstats }}"
          repliqate.enabled: "false"
# HOST MODE
# TDL: possibly convert to bridged with sonos ports forwarded
#          traefik.enable: "{{ sonos_web_available_externally | string }}"
#          traefik.http.routers.sonos_web.rule: "Host(`sonos_web.{{ ansible_nas_domain }}`)"
#          traefik.http.routers.sonos_web.tls.certresolver: "letsencrypt"
#          traefik.http.routers.sonos_web.tls.domains[0].main: "{{ ansible_nas_domain }}"
#          traefik.http.routers.sonos_web.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
#          traefik.http.routers.frontend.middlewares: "{{ sonos_web_hostname }}"
#          traefik.http.routers.sonos_web.middlewares: "{{ sonos_web_hostname }}@docker"
#          traefik.http.middlewares.sonos_web.IPAllowList.sourcerange: "{{ sonos_web_traefik_whitelist }}"
#          traefik.http.services.sonos_web.loadbalancer.server.port: "5050"
          wud.tag.include: '^v?\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/sonosweb/sonos-web"
        cpu_shares: "{{ sonos_web_cpu_shares }}"
        memory: "{{ sonos_web_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (sonos_web_port_http | string)] +
                (['https://' + sonos_web_hostname + '.' + ansible_nas_domain] if (sonos_web_available_externally is true or sonos_web_dockflare_tunnel is true) else [])
              }}
  when: sonos_web_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ sonos_web_container_name }}"
        state: absent
  when: sonos_web_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ sonos_web_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - sonos_web_enabled is false

# NOTE: you can use Sonos's website instead
# https://play.sonos.com
