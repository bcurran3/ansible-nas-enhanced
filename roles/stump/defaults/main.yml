---
# ANE
ansible_nas_app_name: "Stump"
stump_enabled: false
stump_available_externally: false
stump_traefik_whitelist: "{{ lan }}"

# network
stump_port_http: "10801"
stump_hostname: "stump"

stump_data_directory: "{{ docker_home }}/stump"
stump_books_directory: "{{ books_root }}"
stump_comics_directory: "{{ comics_root }}"

# docker
stump_container_name: "stump"
stump_image_name: "aaronleopold/stump"
stump_image_tag: "latest"
stump_cpu_shares: "1024"
stump_memory: "1G"

# autoheal
stump_autoheal: "false"

# dockflare
stump_dockflare_tunnel: "false"
stump_dockflare_access_group: ""

# homepage
stump_homepage_group: "Apps"
stump_homepage_icon: "stump.png"
stump_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ stump_port_http }}"
stump_homepage_showstats: "false"

# repliqate
stump_repliqate_enabled: "false"
stump_repliqate_engine: "restic"
stump_repliqate_schedule: "@daily 3am"
stump_repliqate_backup_id: "{{ stump_container_name }}"
stump_repliqate_retention: "30d"

# watchtower
stump_watchtower_enable: "false"