---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ stump_data_directory }}"
        - "{{ stump_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ stump_container_name }}"
        hostname: "{{ stump_container_name }}"
        image: "{{ stump_image_name }}:{{ stump_image_tag }}"
        pull: true
        volumes:
          - "{{ stump_data_directory }}/config:/config"
          - "{{ stump_comics_directory }}:/data/comics:ro"
          - "{{ stump_books_directory }}:/data/books:ro"
        ports:
          - "{{ stump_port_http }}:10801"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ stump_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ stump_watchtower_enable }}"
          dockflare.enable: "{{ stump_dockflare_tunnel }}"
          dockflare.access.group: "{{ stump_dockflare_access_group }}"
          dockflare.hostname: "{{ stump_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ stump_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ stump_homepage_group }}"
          homepage.icon: "{{ stump_homepage_icon }}"
          homepage.href: "{{ stump_homepage_href }}"
          homepage.description: "{{ 'A free and open source comics, manga and digital book server with OPDS support' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ stump_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ stump_container_name }}"
          homepage.showStats: "{{ stump_homepage_showstats }}"
          traefik.enable: "{{ stump_available_externally | string }}"
          traefik.http.routers.stump.rule: "Host(`stump.{{ ansible_nas_domain }}`)"
          traefik.http.routers.stump.tls.certresolver: "letsencrypt"
          traefik.http.routers.stump.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.stump.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ stump_hostname }}"
          traefik.http.routers.stump.middlewares: "{{ stump_hostname }}@docker"
          traefik.http.middlewares.stump.IPAllowList.sourcerange: "{{ stump_traefik_whitelist }}"
          traefik.http.services.stump.loadbalancer.server.port: "10801"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/aaronleopold/stump"
        cpu_shares: "{{ stump_cpu_shares }}"
        memory: "{{ stump_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (stump_port_http | string)] +
                (['https://' + stump_hostname + '.' + ansible_nas_domain] if (stump_available_externally is true or stump_dockflare_tunnel is true) else [])
              }}
  when: stump_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ stump_container_name }}"
        state: absent
  when: stump_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ stump_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ stump_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: stump_enabled is false and archive_app_data_enabled is true
