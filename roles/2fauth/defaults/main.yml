---
# ANE
ansible_nas_app_name: "2FAuth"
twofauth_enabled: false
twofauth_available_externally: false
twofauth_traefik_whitelist: "{{ lan }}"

# directories
twofauth_data_directory: "{{ docker_home }}/2fauth"

# docker
twofauth_container_name: "2fauth"
twofauth_image_name: "2fauth"
twofauth_image_tag: "2fauth"
twofauth_cpu_shares: "1024"
twofauth_memory_limit: "1G"

# network
twofauth_hostname: "2fauth"
twofauth_port_http: "8001"

# app
twofauth_app_key: "use_php_artisan_key:generate"
twofauth_mail_driver: "log"
twofauth_mail_host: "smtp.mailtrap.io"
twofauth_mail_port: "2525"
twofauth_mail_username: "null"
twofauth_mail_password: "null"
twofauth_mail_encryption: "null"
twofauth_mail_from_name: "null"
twofauth_mail_from_address: "null"
twofauth_mail_verify_ssl_peer: "true"

# autoheal
twofauth_autoheal: "false"

# dockflare
twofauth_dockflare_tunnel: "false"
twofauth_dockflare_access_group: ""

# homepage 
twofauth_homepage_group: "Apps"
twofauth_homepage_icon: "sh-2FAuth.png"
twofauth_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ twofauth_port_http }}"
twofauth_homepage_showstats: "false"

# repliqate
twofauth_repliqate_enabled: "false"
twofauth_repliqate_engine: "restic"
twofauth_repliqate_schedule: "@daily 3am"
twofauth_repliqate_backup_id: "{{ twofauth_container_name }}"
twofauth_repliqate_retention: "30d"

# watchtower
twofauth_watchtower_enable: "false"
