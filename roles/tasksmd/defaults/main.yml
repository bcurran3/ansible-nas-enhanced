---
# ANE
ansible_nas_app_name: "Tasks.md"
tasksmd_enabled: false
tasksmd_available_externally: false
tasksmd_traefik_whitelist: "{{ lan }}"
tasksmd_data_directory: "{{ docker_home }}/tasksmd"

# network
tasksmd_hostname: "tasksmd"
tasksmd_port_http: "3048"

tasksmd_puid: "1000"
tasksmd_pgid: "1000"

# docker
tasksmd_container_name: "tasksmd"
tasksmd_image_name: "baldissaramatheus/tasks.md"
tasksmd_image_tag: "latest"

# specs
tasksmd_cpu_shares: 1024
tasksmd_memory: "1G"

# autoheal
tasksmd_autoheal: "false"

# dockflare
tasksmd_dockflare_tunnel: "false"
tasksmd_dockflare_access_group: ""

# homepage
tasksmd_homepage_group: "Apps"
tasksmd_homepage_icon: "https://raw.githubusercontent.com/BaldissaraMatheus/Tasks.md/main/public/logo.png"
tasksmd_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ tasksmd_port_http }}"
tasksmd_homepage_showstats: "false"

# repliqate
tasksmd_repliqate_enabled: "false"
tasksmd_repliqate_engine: "restic"
tasksmd_repliqate_schedule: "@daily 3am"
tasksmd_repliqate_backup_id: "{{ tasksmd_container_name }}"
tasksmd_repliqate_retention: "30d"

# watchtower
tasksmd_watchtower_enable: "false"