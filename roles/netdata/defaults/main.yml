---
netdata_enabled: false
netdata_available_externally: false
netdata_traefik_whitelist: "{{ lan }}"

# network
netdata_hostname: "netdata"
netdata_port: "19999"

# docker
netdata_container_name: "netdata"
netdata_image_name: "netdata/netdata"
netdata_image_version: "latest"
netdata_cpu_shares: 1024

# specs
netdata_memory: 1g

# autoheal
netdata_autoheal: "false"

# homepage
netdata_homepage_group: "Apps"
netdata_homepage_icon: "netdata.png"
netdata_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ netdata_port_one }}"
netdata_homepage_showStats: "false"

# watchtower
netdata_watchtower_monitor_only: "true"
