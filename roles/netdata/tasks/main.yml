---
- name: Start {{ netdata_proper_name }}
  block:
    - name: Create {{ netdata_proper_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ netdata_data_directory }}/cache"
        - "{{ netdata_data_directory }}/config"
        - "{{ netdata_data_directory }}/lib"

    - name: Set {{ netdata_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        netdata_homepage_href: "https://{{ netdata_hostname }}.{{ ansible_nas_domain }}/v3"
      when: netdata_traefik_enabled | bool or netdata_dockflare_enabled | bool

    - name: Get docker group id
      ansible.builtin.group:
        name: docker
      register: docker_group

    - name: Create {{ netdata_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ netdata_container_name }}"
        hostname: "{{ netdata_container_name }}"
        image: "{{ netdata_image_name }}:{{ netdata_image_version }}"
        state: started
        pull: true
        pid_mode: host
        privileged: true
        ports:
          - "{{ netdata_port_http }}:19999"
        volumes:
          - "{{ netdata_data_directory }}/cache:/var/cache/netdata"
          - "{{ netdata_data_directory }}/config:/etc/netdata"
          - "{{ netdata_data_directory }}/lib:/var/lib/netdata"
          - "/:/host/root:ro,rslave"
          - "/etc/group:/host/etc/group:ro"
          - "/etc/localtime:/etc/localtime:ro"
          - "/etc/os-release:/host/etc/os-release:ro"
          - "/etc/passwd:/host/etc/passwd:ro"
          - "/proc:/host/proc:ro"
          - "/run/dbus:/run/dbus:ro"
          - "/sys:/host/sys:ro"
          - "/var/log:/host/var/log:ro"
          - "/var/run/docker.sock:/var/run/docker.sock:ro"
        env:
          NETDATA_EXTRA_DEB_PACKAGES: "{{ netdata_env_netdata_extra_deb_packages }}"
#          NETDATA_GO_D_MONITOR_POSTGRES: "false"
#          NETDATA_PG_USER: "netdata"
#          NETDATA_PG_PASS: "{{ netdata_postgres_monitoring_password }}"
#          NETDATA_POSTGRES_AUTODETECT: "false"
#          NETDATA_POSTGRES_USER: "netdata"
#          NETDATA_POSTGRES_PASS: "{{ netdata_postgres_monitoring_password }}"
          PGID: "{{ docker_group.gid | string }}"
          TZ: "{{ ansible_nas_timezone }}"
        security_opts: ["apparmor=unconfined"]
        device_requests: "{{
          [{'driver': 'nvidia', 'count': -1, 'capabilities': ['gpu']}]
          if nvidia_runtime_enabled | default(false) | bool else omit
        }}"
        devices: >-
          {%- set dev_list = (app_devices | default([])) -%}
          {%- if intel_igpu_enabled | default(false) | bool or amd_gpu_enabled | default(false) | bool -%}
            {%- set _ = dev_list.append('/dev/dri:/dev/dri') -%}
          {%- endif -%}
          {{ dev_list if dev_list | length > 0 else omit }}
        group_add: "{{ ['render', 'video'] if (amd_gpu_enabled | default(false) | bool or intel_igpu_enabled | default(false) | bool) else omit }}"
        runtime: "{{ 'nvidia' if nvidia_runtime_enabled | default(false) | bool else omit }}"
        healthcheck:
          test: "{{ netdata_healthcheck_test }}"
          interval: "{{ netdata_healthcheck_interval }}"
          timeout: "{{ netdata_healthcheck_timeout }}"
          retries: "{{ netdata_healthcheck_retries }}"
          start_period: "{{ netdata_healthcheck_start_period }}"
        labels:
          autoheal: "{{ netdata_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ netdata_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ netdata_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ netdata_dockflare_access_group }}"
          dockflare.hostname: "{{ netdata_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ netdata_port_http }}"
          homepage.name: "{{ netdata_proper_name }}"
          homepage.group: "{{ netdata_homepage_group }}"
          homepage.icon: "{{ netdata_homepage_icon }}"
          homepage.href: "{{ netdata_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ netdata_port_http }}"
          homepage.description: "{{ 'The fastest path to AI-powered full stack observability, even for lean teams.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ netdata_container_name }}"
          homepage.showStats: "{{ netdata_homepage_showstats | ternary('true', 'false') }}"
          homepage.widget.type: "netdata"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ netdata_port_http }}"
          repliqate.enabled: "false"
          traefik.enable: "{{ netdata_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.netdata.rule: "Host(`{{ netdata_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.netdata.tls.certresolver: "letsencrypt"
          traefik.http.routers.netdata.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.netdata.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.netdata.middlewares: "{{ netdata_hostname }}@docker{{ ',tinyauth-auth@docker' if netdata_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.netdata.IPAllowList.sourcerange: "{{ netdata_traefik_whitelist }}"
          traefik.http.services.netdata.loadbalancer.server.port: "19999"
          wud.tag.include: "^stable$"
          wud.watch.digest: "true"
          wud.link.template: "https://github.com/netdata/netdata/pkgs/container/netdata"
        cpu_shares: "{{ netdata_cpu_shares }}"
        memory: "{{ netdata_memory }}"
        memory_swap: "{{ netdata_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ netdata_proper_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (netdata_port_http | string) + '/v3'] +
                (['https://' + netdata_hostname + '.' + ansible_nas_domain + '/v3'] if (netdata_traefik_enabled is true or netdata_dockflare_enabled is true) else [])
              }}
  when: netdata_enabled is true

- name: Stop {{ netdata_proper_name }}
  block:
    - name: Stop {{ netdata_proper_name }} Container
      community.docker.docker_container:
        name: "{{ netdata_container_name }}"
        state: absent
  when: netdata_enabled is false

- name: Data Archive {{ netdata_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ netdata_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - netdata_enabled is false