---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories # added
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ netdata_data_directory }}/cache"
        - "{{ netdata_data_directory }}/config"
        - "{{ netdata_data_directory }}/lib"

    - name: Get docker group id
      ansible.builtin.group:
        name: docker
      register: docker_group

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ netdata_container_name }}"
        hostname: "{{ netdata_container_name }}"
        image: "{{ netdata_image_name }}:{{ netdata_image_version }}"
        state: started
        pull: true
        pid_mode: host # added
        privileged: true # added
        ports:
          - "{{ netdata_port_http }}:19999"
        volumes:
          - "{{ netdata_data_directory }}/cache:/var/cache/netdata" # added
          - "{{ netdata_data_directory }}/config:/etc/netdata" # added
          - "{{ netdata_data_directory }}/lib:/var/lib/netdata" # added
          - "/proc:/host/proc:ro"
          - "/sys:/host/sys:ro"
          - "/var/run/docker.sock:/var/run/docker.sock:ro"
          - "/:/host/root:ro,rslave" # added
          - "/etc/os-release:/host/etc/os-release:ro" # added
          - "/etc/passwd:/host/etc/passwd:ro" # added
          - "/etc/group:/host/etc/group:ro" # added
          - "/var/log:/host/var/log:ro" # added
          - "/run/dbus:/run/dbus:ro" # added
          - "/etc/localtime:/etc/localtime:ro" # added
        env:
          NETDATA_EXTRA_DEB_PACKAGES: "{{ netdata_env_netdata_extra_deb_packages }}" # added
          PGID: "{{ docker_group.gid | string }}"
          TZ: "{{ ansible_nas_timezone }}"
#        capabilities:
#          - SYS_PTRACE
#          - SYS_ADMIN # added
        security_opts: ["apparmor=unconfined"]
        runtime: "{{ 'nvidia' if nvidia_runtime_enabled | bool else omit }}"
        device_requests: "{{
          [{'driver': 'nvidia', 'count': -1, 'capabilities': ['gpu']}]
          if nvidia_runtime_enabled | bool else omit
        }}" # added
        devices: >-
                  {{
                    (netdata_devices | default([])) + ['/dev/dri:/dev/dri']
                    if intel_igpu_enabled | default(false) | bool
                    else (netdata_devices | default(omit))
                  }}
        labels:
          autoheal: "{{ netdata_autoheal | string }}"
          com.centurylinklabs.watchtower.enable: "{{ netdata_watchtower_enable | string }}"
          dockflare.enable: "{{ netdata_dockflare_tunnel | string }}"
          dockflare.access.group: "{{ netdata_dockflare_access_group }}"
          dockflare.hostname: "{{ netdata_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ netdata_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ netdata_homepage_group }}"
          homepage.icon: "{{ netdata_homepage_icon }}"
          homepage.href: "{{ netdata_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ netdata_port_http }}"
          homepage.description: "{{ 'The fastest path to AI-powered full stack observability, even for lean teams.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ netdata_container_name }}"
          homepage.showStats: "{{ netdata_homepage_showstats }}"
          homepage.widget.type: "netdata"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ netdata_port_http }}"
          repliqate.enabled: "false"
          traefik.enable: "{{ netdata_available_externally | string }}"
          traefik.http.routers.netdata.rule: "Host(`{{ netdata_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.netdata.tls.certresolver: "letsencrypt"
          traefik.http.routers.netdata.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.netdata.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.netdata.middlewares: "{{ netdata_hostname }}@docker{{ ',tinyauth-auth@docker' if netdata_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.netdata.IPAllowList.sourcerange: "{{ netdata_traefik_whitelist }}"
          traefik.http.services.netdata.loadbalancer.server.port: "19999"
          wud.tag.include: '^v\\d+\\.\\d+\\.\\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/netdata/netdata/pkgs/container/netdata"
        cpu_shares: "{{ netdata_cpu_shares }}"
        memory: "{{ netdata_memory }}"
        memory_swap: "{{ netdata_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (netdata_port_http | string)] +
                (['https://' + netdata_hostname + '.' + ansible_nas_domain] if (netdata_available_externally is true or netdata_dockflare_tunnel is true) else [])
              }}
  when: netdata_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ netdata_container_name }}"
        state: absent
  when: netdata_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ netdata_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - netdata_enabled is false