---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Get docker group id
      ansible.builtin.group:
        name: docker
      register: docker_group

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ netdata_container_name }}"
        hostname: "{{ netdata_container_name }}"
        image: "{{ netdata_image_name }}:{{ netdata_image_version }}"
        state: started
        pull: true
        cpu_shares: "{{ netdata_cpu_shares }}"
        ports:
          - "{{ netdata_port }}:19999"
        volumes:
          - "/proc:/host/proc:ro"
          - "/sys:/host/sys:ro"
        env:
          PGID: "{{ docker_group.gid }}"
          TZ: "{{ ansible_nas_timezone }}"
        capabilities:
          - SYS_PTRACE
        security_opts:
          - apparmor:unconfined
        restart_policy: unless-stopped
        memory: "{{ netdata_memory }}"
        labels:
          autoheal: "{{ netdata_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ netdata_watchtower_monitor_only }}"
          homepage.group: "{{ netdata_homepage_group }}"
          homepage.name: "Netdata"
          homepage.icon: "{{ netdata_homepage_icon }}"
          homepage.href: "{{ netdata_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ netdata_port }}"
          homepage.description: "{{ 'The fastest path to AI-powered full stack observability, even for lean teams.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ netdata_container_name }}"
          homepage.showStats: "{{ netdata_homepage_showStats }}"
          homepage.widget.type: "netdata"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ netdata_port }}"
          traefik.enable: "{{ netdata_available_externally | string }}"
          traefik.http.routers.netdata.rule: "Host(`{{ netdata_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.netdata.tls.certresolver: "letsencrypt"
          traefik.http.routers.netdata.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.netdata.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ netdata_hostname }}"
          traefik.http.routers.netdata.middlewares: "{{ netdata_hostname }}@docker"
          traefik.http.middlewares.netdata.IPAllowList.sourcerange: "{{ netdata_traefik_whitelist }}"
          traefik.http.services.netdata.loadbalancer.server.port: "19999"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/netdata/netdata/releases/tag/$${major}.$${minor}.$${patch}"
  when: netdata_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ netdata_container_name }}"
        state: absent
  when: netdata_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ netdata_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ netdata_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: netdata_enabled is false and archive_app_data_enabled is true

