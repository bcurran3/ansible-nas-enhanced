---
# ANE
freshrss_proper_name: "FreshRSS"
freshrss_enabled: false
freshrss_traefik_enabled: false
freshrss_traefik_whitelist: "{{ lan }}"

# directories
freshrss_data_directory: "{{ docker_home }}/freshrss"

# docker
freshrss_container_name: "freshrss"
freshrss_image_name: "freshrss/freshrss"
freshrss_image_version: "latest"
freshrss_db_container_name: "freshrss-db"
freshrss_db_image_name: "postgres"
freshrss_db_image_version: "16-alpine"

# specs
freshrss_cpu_shares: 1024
freshrss_memory: "1G"
freshrss_memory_swap: -1
freshrss_db_cpu_shares: 1024
freshrss_db_memory: "1G"
freshrss_db_memory_swap: "{{ freshrss_db_memory }}"

# network
freshrss_hostname: "freshrss"
freshrss_port_http: "8089"

# app
freshrss_env_cron_min: "1,31"
freshrss_db_base: "freshrss"
freshrss_db_password: "freshrss"
freshrss_db_user: "freshrss"

# autoheal
freshrss_autoheal_enabled: false
freshrss_db_autoheal_enabled: false

# dockflare
freshrss_dockflare_enabled: false
freshrss_dockflare_access_group: ""

# healthcheck
freshrss_healthcheck_test: ["CMD-SHELL", "pgrep -f apache2 || pgrep -f httpd || pgrep -f php-fpm || exit 1"]
freshrss_healthcheck_interval: 1m
freshrss_healthcheck_timeout: 10s
freshrss_healthcheck_retries: 3
freshrss_healthcheck_start_period: 30s
freshrss_db_healthcheck_test: ["CMD-SHELL", "pg_isready -U {{ freshrss_db_user }} -d {{ freshrss_db_base }}"]
freshrss_db_healthcheck_interval: 10s
freshrss_db_healthcheck_timeout: 5s
freshrss_db_healthcheck_retries: 5
freshrss_db_healthcheck_start_period: 30s

# homepage
freshrss_homepage_group: "Apps"
freshrss_homepage_icon: "freshrss.png"
freshrss_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ freshrss_port_http }}"
freshrss_homepage_showstats: false
freshrss_homepage_widget_username: ""
freshrss_homepage_widget_password: ""
freshrss_db_homepage_group: "DBs"
freshrss_db_homepage_icon: "postgres.png"
freshrss_db_homepage_href: "{{ freshrss_homepage_href }}"
freshrss_db_homepage_showstats: false

# repliqate
freshrss_repliqate_enabled: false
freshrss_repliqate_engine: "restic"
freshrss_repliqate_schedule: "@daily 3am"
freshrss_repliqate_backup_id: "{{ freshrss_container_name }}"
freshrss_repliqate_retention: "30d"
freshrss_db_repliqate_enabled: false
freshrss_db_repliqate_engine: "restic"
freshrss_db_repliqate_schedule: "@daily 3am"
freshrss_db_repliqate_backup_id: "{{ freshrss_db_container_name }}"
freshrss_db_repliqate_retention: "30d"

# tinyauth
freshrss_tinyauth_enabled: false

# watchtower
freshrss_watchtower_enabled: false
freshrss_db_watchtower_enabled: false