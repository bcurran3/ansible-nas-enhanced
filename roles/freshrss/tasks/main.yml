---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
        # mode: 0755
      with_items:
        - "{{ freshrss_data_directory }}/db"
        - "{{ freshrss_data_directory }}/data"
        - "{{ freshrss_data_directory }}/extensions"

    - name: Create {{ ansible_nas_app_name }} PostgreSQL Container
      community.docker.docker_container:
        name: "{{ freshrss_db_container_name }}"
        hostname: "{{ freshrss_db_container_name }}"
        image: "{{ freshrss_db_image_name }}:{{ freshrss_db_image_version }}"
        pull: true
        cpu_shares: "{{ freshrss_db_cpu_shares }}"
        volumes:
          - "{{ freshrss_data_directory }}/db:/var/lib/postgresql/data"
        container_default_behavior: no_defaults
        env:
          POSTGRES_USER: "freshrss"
          POSTGRES_PASSWORD: "freshrss"
          POSTGRES_DB: "freshrss"
          TZ: "{{ ansible_nas_timezone }}"
        restart_policy: unless-stopped
        memory: "{{ freshrss_db_memory }}"
        labels:
          autoheal: "{{ freshrss_db_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ freshrss_db_watchtower_monitor_only }}"
          homepage.group: "{{ freshrss_db_homepage_group }}"
          homepage.name: "FreshRSS PostgreSQL"
          homepage.icon: "{{ freshrss_db_homepage_icon }}"
          homepage.href: "{{ freshrss_homepage_href }}"
#         homepage.description: "PostgrSQL"
          homepage.server: "my-docker"
          homepage.container: "{{ freshrss_db_container_name }}"
          homepage.showStats: "{{ freshrss_db_homepage_showStats }}"
          traefik.enable: "false"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ freshrss_container_name }}"
        hostname: "{{ freshrss_container_name }}"
        image: "{{ freshrss_image_name }}:{{ freshrss_image_version }}"
        pull: true
        cpu_shares: "{{ freshrss_cpu_shares }}"
        links:
          - "{{ freshrss_db_container_name }}"
        volumes:
          - "{{ freshrss_data_directory }}/data:/var/www/FreshRSS/data:rw"
          - "{{ freshrss_data_directory }}/extensions:/var/www/FreshRSS/extensions:rw"
        ports:
          - "{{ freshrss_port }}:80"
        container_default_behavior: no_defaults
        env:
          CRON_MIN: "1,31"
          DB_HOST: "{{ freshrss_container_name }}"
          DB_BASE: "freshrss"
          DB_PASSWORD: "freshrss"
          DB_USER: "freshrss"
          TZ: "{{ ansible_nas_timezone }}"
        restart_policy: unless-stopped
        memory: "{{ freshrss_memory }}"
        labels:
          autoheal: "{{ freshrss_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ freshrss_watchtower_monitor_only }}"
          homepage.group: "{{ freshrss_homepage_group }}"
          homepage.name: "FreshRSS"
          homepage.icon: "{{ freshrss_homepage_icon }}"
          homepage.href: "{{ freshrss_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ freshrss_port }}"
#         homepage.description: "A free, self-hostable news aggregator…"
          homepage.server: "my-docker"
          homepage.container: "{{ freshrss_container_name }}"
          homepage.showStats: "{{ freshrss_homepage_showStats }}"
          homepage.widget.type: "freshrss"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ freshrss_port }}"
          homepage.widget.username: "{{ freshrss_homepage_widget_username }}"
          homepage.widget.password: "{{ freshrss_homepage_widget_password }}"
          traefik.enable: "{{ freshrss_available_externally | string }}"
          traefik.http.routers.freshrss.rule: "Host(`{{ freshrss_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.freshrss.tls.certresolver: "letsencrypt"
          traefik.http.routers.freshrss.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.freshrss.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ freshrss_hostname }}"
          traefik.http.routers.freshrss.middlewares: "{{ freshrss_hostname }}@docker"
          traefik.http.middlewares.freshrss.IPAllowList.sourcerange: "{{ freshrss_traefik_whitelist }}"
          traefik.http.services.freshrss.loadbalancer.server.port: "80"
  when: freshrss_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ freshrss_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} PostgreSQL Container
      community.docker.docker_container:
        name: "freshrss-db"
        state: absent
  when: freshrss_enabled is false