---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ commafeed_data_directory }}/data"
        - "{{ commafeed_data_directory }}/db"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        commafeed_homepage_href: "https://{{ commafeed_hostname }}.{{ ansible_nas_domain }}"
      when: commafeed_traefik_enabled | bool or commafeed_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ commafeed_db_container_name }}"
        hostname: "{{ commafeed_db_container_name }}"
        image: "{{ commafeed_db_image_name }}:{{ commafeed_db_image_tag }}"
        pull: true
        volumes:
          - "{{ commafeed_data_directory }}/db:/var/lib/postgresql/data"
        env:
          POSTGRES_USER: "commafeed"
          POSTGRES_PASSWORD: "commafeedpw"
          POSTGRES_DB: "commafeed"
        healthcheck:
          test: ["CMD-SHELL", "pg_isready -U commafeed"]
          interval: 10s
          timeout: 5s
          retries: 5
          start_period: 30s
        labels:
          autoheal: "{{ commafeed_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ commafeed_db_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} PostgreSQL"
          homepage.group: "{{ commafeed_db_homepage_group }}"
          homepage.icon: "{{ commafeed_db_homepage_icon }}"
          homepage.href: "{{ commafeed_db_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ commafeed_port_http }}"
          homepage.description: "{{ 'PostgreSQL Database Management System' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ commafeed_db_container_name }}"
          homepage.showStats: "{{ commafeed_db_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ commafeed_db_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ commafeed_db_repliqate_engine }}"
          repliqate.schedule: "{{ commafeed_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ commafeed_db_repliqate_backup_id }}"
          repliqate.retention: "{{ commafeed_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/postgres/postgres/releases/tag/$${major}.$${minor}.$${patch}"
        cpu_shares: "{{ commafeed_db_cpu_shares }}"
        memory: "{{ commafeed_memory }}"
        memory_swap: "{{ commafeed_db_memory_swap }}"
        restart_policy: unless-stopped
      register: commafeed_db_status

    - name: Verify {{ ansible_nas_app_name }} DB is healthy
      community.docker.docker_container_info:
        name: "{{ commafeed_db_container_name }}"
      register: db_info
      until: "db_info.container.State.Health.Status == 'healthy'"
      retries: 30
      delay: 5

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ commafeed_container_name }}"
        hostname: "{{ commafeed_container_name }}"
        image: "{{ commafeed_image_name }}:{{ commafeed_image_tag }}"
        pull: true
        links:
          - "{{ commafeed_db_container_name }}"
        volumes:
          - "{{ commafeed_data_directory }}/data:/commafeed/data"
        ports:
          - "{{ commafeed_port_http }}:8082"
        env:
          CF_DATABASE_DRIVERCLASS: "org.postgresql.Driver"
          CF_DATABASE_URL: "jdbc:postgresql://{{ commafeed_db_container_name }}:5433/commafeed"
          CF_DATABASE_USER: "commafeed"
          CF_DATABASE_PASSWORD: "commafeedpw"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ commafeed_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ commafeed_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ commafeed_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ commafeed_dockflare_access_group }}"
          dockflare.hostname: "{{ commafeed_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ commafeed_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ commafeed_homepage_group }}"
          homepage.icon: "{{ commafeed_homepage_icon }}"
          homepage.href: "{{ commafeed_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ commafeed_port_http }}"
          homepage.description: "{{ 'Google Reader inspired self-hosted personal RSS reader.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ commafeed_container_name }}"
          homepage.showStats: "{{ commafeed_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ commafeed_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ commafeed_repliqate_engine }}"
          repliqate.schedule: "{{ commafeed_repliqate_schedule }}"
          repliqate.backup_id: "{{ commafeed_repliqate_backup_id }}"
          repliqate.retention: "{{ commafeed_repliqate_retention }}"
          traefik.enable: "{{ commafeed_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.commafeed.rule: "Host(`{{ commafeed_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.commafeed.tls.certresolver: "letsencrypt"
          traefik.http.routers.commafeed.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.commafeed.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.commafeed.middlewares: "commafeed@docker{{ ',tinyauth-auth@docker' if commafeed_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.commafeed.IPAllowList.sourcerange: "{{ commafeed_traefik_whitelist }}"
          traefik.http.services.commafeed.loadbalancer.server.port: "8082"
          wud.watch.digest: "true"
          wud.link.template: "https://hub.docker.com/r/athou/commafeed"
        cpu_shares: "{{ commafeed_cpu_shares }}"
        memory: "{{ commafeed_memory }}"
        memory_swap: "{{ commafeed_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (commafeed_port_http | string)] +
                (['https://' + commafeed_hostname + '.' + ansible_nas_domain] if (commafeed_traefik_enabled is true or commafeed_dockflare_enabled is true) else [])
              }}
  when: commafeed_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ commafeed_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ commafeed_db_container_name }}"
        state: absent
  when: commafeed_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ commafeed_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - commafeed_enabled is false