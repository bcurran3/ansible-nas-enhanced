---
# ANE
ansible_nas_app_name: "Glance"
glance_enabled: false
glance_traefik_enabled: false
glance_traefik_whitelist: "{{ lan }}"
glance_data_directory: "{{ docker_home }}/glance"

# network
glance_hostname: "glance"
glance_port_http: "9006"

# docker
glance_container_name: "glance"
glance_image_name: "glanceapp/glance"
glance_image_tag: "latest"

# specs
glance_cpu_shares: 1024
glance_memory: "1G"
glance_memory_swap: -1

# autoheal
glance_autoheal_enabled: false

# dockflare
glance_dockflare_enabled: false
glance_dockflare_access_group: ""

# homepage
glance_homepage_group: "Apps"
glance_homepage_icon: "https://raw.githubusercontent.com/glanceapp/glance/refs/heads/main/docs/logo.png"
glance_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ glance_port_http }}"
glance_homepage_showstats: false

# repliqate
glance_repliqate_enabled: false
glance_repliqate_engine: "restic"
glance_repliqate_schedule: "@daily 3am"
glance_repliqate_backup_id: "{{ glance_container_name }}"
glance_repliqate_retention: "30d"

# tinyauth
glance_tinyauth_enabled: false

# watchtower
glance_watchtower_enabled: false