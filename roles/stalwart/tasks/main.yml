---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ stalwart_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ stalwart_container_name }}"
        hostname: "{{ stalwart_container_name }}"
        image: "{{ stalwart_image_name }}:{{ stalwart_image_tag }}"
        pull: true
        ports:
          - "{{ stalwart_port_http }}:8080"
#         - "443:443"
          - "25:25"
          - "587:587"
          - "465:465"
          - "143:143"
          - "993:993"
          - "4190:4190"
        volumes:
          - "{{ stalwart_data_directory }}:/opt/stalwart-mail"
        network_mode: bridge
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ stalwart_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ stalwart_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ stalwart_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ stalwart_dockflare_access_group }}"
          dockflare.hostname: "{{ stalwart_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ stalwart_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ stalwart_homepage_group }}"
          homepage.icon: "{{ stalwart_homepage_icon }}"
          homepage.href: "{{ stalwart_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ stalwart_port_http }}"
          homepage.description: "{{ 'Secure & Modern All-in-One Mail Server (IMAP, JMAP, POP3, SMTP)' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ stalwart_container_name }}"
          homepage.showStats: "{{ stalwart_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ stalwart_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ stalwart_repliqate_engine }}"
          repliqate.schedule: "{{ stalwart_repliqate_schedule }}"
          repliqate.backup_id: "{{ stalwart_repliqate_backup_id }}"
          repliqate.retention: "{{ stalwart_repliqate_retention }}"
          traefik.enable: "{{ stalwart_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.stalwart.rule: "Host(`{{ stalwart_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.stalwart.tls.certresolver: "letsencrypt"
          traefik.http.routers.stalwart.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.stalwart.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.stalwart.middlewares: "stalwart@docker{{ ',tinyauth-auth@docker' if stalwart_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.stalwart.IPAllowList.sourcerange: "{{ stalwart_traefik_whitelist }}"
          traefik.http.services.stalwart.loadbalancer.server.port: "8080"
          wud.tag.include: '^v\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/stalwartlabs/mail-server/pkgs/container/stalwart"
        cpu_shares: "{{ stalwart_cpu_shares }}"
        memory: "{{ stalwart_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (stalwart_port_http | string)] +
                (['https://' + stalwart_hostname + '.' + ansible_nas_domain] if (stalwart_traefik_enabled is true or stalwart_dockflare_enabled is true) else [])
              }}
  when: stalwart_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ stalwart_container_name }}"
        state: absent
  when: stalwart_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ stalwart_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - stalwart_enabled is false