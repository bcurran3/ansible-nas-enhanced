---
# ANE
ansible_nas_app_name: "Krusader"
krusader_enabled: false
krusader_available_externally: false
krusadar_traefik_whitelist: "{{ lan }}"

# uid / gid
krusader_user_id: "0"
krusader_group_id: "0"

# directories
krusader_data_directory: "{{ docker_home }}/krusader"
krusader_browse_directory: "/"

# network
krusader_port_http: "6080"
krusader_port_vnc: "5900"
krusader_hostname: "krusader"

# docker
krusader_container_name: "krusader"
krusader_image_name: "ghcr.io/binhex/arch-krusader"
krusader_image_version: "latest"

# specs
krusader_cpu_shares: 1024
krusader_memory: "1G"

# krusader
krusader_umask: "000"
krusader_webpage_title: "Tower"
krusader_temp_folder: "/config/krusader/tmp"
krusader_vnc_password: "{{ ansible_nas_app_admin_password }}"

# autoheal
krusader_autoheal: "false"

# dockflare
krusader_dockflare_tunnel: "false"
krusader_dockflare_access_group: ""

# homepage
krusader_homepage_group: "Apps"
krusader_homepage_icon: "krusader.png"
krusader_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ krusader_port_http }}"
krusader_homepage_showstats: "false"

# repliqate
krusader_repliqate_enabled: "false"
krusader_repliqate_engine: "restic"
krusader_repliqate_schedule: "@daily 3am"
krusader_repliqate_backup_id: "{{ krusader_container_name }}"
krusader_repliqate_retention: "30d"

# watchtower
krusader_watchtower_enable: "false"