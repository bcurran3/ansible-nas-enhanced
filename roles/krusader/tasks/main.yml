---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directory
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ krusader_data_directory }}"
        - "{{ krusader_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ krusader_container_name }}"
        hostname: "{{ krusader_container_name }}"
        image: "{{ krusader_image_name }}:{{ krusader_image_version }}"
        pull: true
        privileged: true
        volumes:
          - "{{ krusader_data_directory }}/config:/config:rw"
          - "{{ krusader_browse_directory }}:/mnt/fs"
          - "/etc/localtime:/etc/localtime:ro"
        ports:
          - "{{ krusader_port_http }}:{{ krusader_port_http }}"
          - "{{ krusader_port_vnc }}:5900"
        env:
          PUID: "{{ krusader_user_id }}"
          PGID: "{{ krusader_group_id }}"
          TEMP_FOLDER: "{{ krusader_temp_folder }}"
          UMASK: "{{ krusader_umask }}"
          VNC_PASSWORD: "{{ krusader_vnc_password }}"
          WEBPAGE_TITLE: "{{ krusader_webpage_title }}"
          WEBUI_PORT: "{{ krusader_port_http }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ krusader_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ krusader_watchtower_enable }}"
          dockflare.enable: "{{ krusader_dockflare_tunnel }}"
          dockflare.access.group: "{{ krusader_dockflare_access_group }}"
          dockflare.hostname: "{{ krusader_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ krusader_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ krusader_homepage_group }}"
          homepage.icon: "{{ krusader_homepage_icon }}"
          homepage.href: "{{ krusader_homepage_href }}"
          homepage.description: "{{ 'Krusader is an advanced orthodox file manager ' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ krusader_container_name }}"
          homepage.showStats: "{{ krusader_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ krusader_port_http }}"
          repliqate.enabled: "{{ krusader_repliqate_enabled }}"
          repliqate.engine: "{{ krusader_repliqate_engine }}"
          repliqate.schedule: "{{ krusader_repliqate_schedule }}"
          repliqate.backup_id: "{{ krusader_repliqate_backup_id }}"
          repliqate.retention: "{{ krusader_repliqate_retention }}"
          traefik.enable: "{{ krusader_available_externally | string }}"
          traefik.http.routers.krusader.rule: "Host(`{{ krusader_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.krusader.tls.certresolver: "letsencrypt"
          traefik.http.routers.krusader.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.krusader.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ krusader_hostname }}"
          traefik.http.routers.krusader.middlewares: "{{ krusader_hostname }}@docker"
          traefik.http.middlewares.krusader.IPAllowList.sourcerange: "{{ krusader_traefik_whitelist }}"
          traefik.http.services.krusader.loadbalancer.server.port: "{{ krusader_port_http }}"
          wud.tag.include: '^\d+\.\d+\.\d+-\d+-\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/binhex/arch-krusader/pkgs/container/arch-krusader"
        cpu_shares: "{{ krusader_cpu_shares }}"
        memory: "{{ krusader_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
          msg: >-
            {{
              [
                'http://' ~ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] ~ ':' ~ krusader_port_http ~ '/vnc.html?resize=remote&host=' ~ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] ~ '&port=' ~ krusader_port_http ~ '&autoconnect=1'
              ] + (
                ['https://' ~ krusader_hostname ~ '.' ~ ansible_nas_domain]
                if (krusader_available_externally is true or krusader_dockflare_tunnel is true) else []
              ) + [
                'VNC access at ' ~ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] ~ ':' ~ krusader_port_vnc
              ]
            }}
  when: krusader_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ krusader_container_name }}"
        state: absent
  when: krusader_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ krusader_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ krusader_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: krusader_enabled is false and archive_app_data_enabled is true
