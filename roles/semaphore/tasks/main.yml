---
# TDL: move env vars to ANE vars
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ semaphore_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ semaphore_container_name }}"
        hostname: "{{ semaphore_container_name }}"
        image: "{{ semaphore_image_name }}:{{ semaphore_image_tag }}"
        pull: true
        volumes:
        network_mode: "bridge"
        ports:
          - "{{ semaphore_port_http }}:3000"
        env:
          SEMAPHORE_DB_DIALECT: "bolt"
          SEMAPHORE_ADMIN_PASSWORD: "topsecret"
          SEMAPHORE_ADMIN_NAME: "admin"
          SEMAPHORE_ADMIN_EMAIL: "admin@localhost"
          SEMAPHORE_ADMIN: "admin"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ semaphore_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ semaphore_watchtower_enable }}"
          dockflare.enable: "{{ semaphore_dockflare_tunnel }}"
          dockflare.access.group: "{{ semaphore_dockflare_access_group }}"
          dockflare.hostname: "{{ semaphore_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ semaphore_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ semaphore_homepage_group }}"
          homepage.icon: "{{ semaphore_homepage_icon }}"
          homepage.href: "{{ semaphore_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ semaphore_port_http }}"
          homepage.description: "{{ 'Modern UI and powerful API for Ansible, Terraform, OpenTofu, PowerShell and other DevOps tools.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ semaphore_container_name }}"
          homepage.showStats: "{{ semaphore_homepage_showstats }}"
          traefik.enable: "{{ semaphore_available_externally | string }}"
          traefik.http.routers.semaphore.rule: "Host(`{{ semaphore_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.semaphore.tls.certresolver: "letsencrypt"
          traefik.http.routers.semaphore.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.semaphore.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ semaphore_hostname }}"
          traefik.http.routers.semaphore.middlewares: "{{ semaphore_hostname }}@docker"
          traefik.http.middlewares.semaphore.IPAllowList.sourcerange: "{{ semaphore_traefik_whitelist }}"
          traefik.http.services.semaphore.loadbalancer.server.port: "3000"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/semaphoreui/semaphore"
        cpu_shares: "{{ semaphore_cpu_shares }}"
        memory: "{{ semaphore_memory }}"
        restart_policy: unless-stopped
  when: semaphore_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ semaphore_container_name }}"
        state: absent
  when: semaphore_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ semaphore_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ semaphore_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: semaphore_enabled is false and archive_app_data_enabled is true
