---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ pocketid_data_directory }}"
        - "{{ pocketid_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ pocketid_container_name }}"
        hostname: "{{ pocketid_container_name }}"
        image: "{{ pocketid_image_name }}:{{ pocketid_image_tag }}"
        pull: true
        volumes:
          - "{{ pocketid_data_directory }}/data:/app/data"
        ports:
          - "{{ pocketid_port_http }}:{{ pocketid_port_http }}"
        env:
        # https://pocket-id.org/docs/configuration/environment-variables
          APP_URL: "{{ pocketid_homepage_href }}"
          TRUST_PROXY: "{{ pocketid_env_trust_proxy }}"
          MAXMIND_LICENSE_KEY: "{{ pocketid_env_maxmind_license_key }}"
          PORT: "{{ pocketid_port }}"
          PUID: "{{ pocketid_user_id }}"
          PGID: "{{ pocketid_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: [ "CMD", "/app/pocket-id", "healthcheck" ]
          interval: 1m30s
          timeout: 5s
          retries: 2
          start_period: 10s
        labels:
          autoheal: "{{ pocketid_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ pocketid_watchtower_enable }}"
          dockflare.enable: "{{ pocketid_dockflare_tunnel }}"
          dockflare.access.group: "{{ pocketid_dockflare_access_group }}"
          dockflare.hostname: "{{ pocketid_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ pocketid_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ pocketid_homepage_group }}"
          homepage.icon: "{{ pocketid_homepage_icon }}"
          homepage.href: "{{ pocketid_homepage_href }}"
          homepage.description: "{{ 'A simple and easy-to-use OIDC provider that allows users to authenticate with their passkeys to your services.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ pocketid_container_name }}"
          homepage.showStats: "{{ pocketid_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ pocketid_port_http }}"
          repliqate.enabled: "{{ pocketid_repliqate_enabled }}"
          repliqate.engine: "{{ pocketid_repliqate_engine }}"
          repliqate.schedule: "{{ pocketid_repliqate_schedule }}"
          repliqate.backup_id: "{{ pocketid_repliqate_backup_id }}"
          repliqate.retention: "{{ pocketid_repliqate_retention }}"
          traefik.enable: "{{ pocketid_available_externally | string }}"
          traefik.http.routers.pocketid.rule: "Host(`{{ pocketid_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.pocketid.tls.certresolver: "letsencrypt"
          traefik.http.routers.pocketid.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.pocketid.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.pocketid.middlewares: "pocketid@docker{{ ',tinyauth-auth@docker' if pocketid_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.pocketid.IPAllowList.sourcerange: "{{ pocketid_traefik_whitelist }}"
          traefik.http.services.pocketid.loadbalancer.server.port: "{{ pocketid_port_http }}"
          wud.tag.include: '^v\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/pocket-id/pocket-id/pkgs/container/pocket-id"
        cpu_shares: "{{ pocketid_cpu_shares }}"
        memory: "{{ pocketid_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (pocketid_port_http | string)] +
                (['https://' + pocketid_hostname + '.' + ansible_nas_domain] if (pocketid_available_externally is true or pocketid_dockflare_tunnel is true) else [])
              }}
  when: pocketid_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ pocketid_container_name }}"
        state: absent
  when: pocketid_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ pocketid_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - pocketid_enabled is false