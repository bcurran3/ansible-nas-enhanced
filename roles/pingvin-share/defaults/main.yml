---
ansible_nas_app_name: "Pingvin Share"

#
pingvinshare_enabled: false
pingvinshare_available_externally: false
pingvinshare_traefik_whitelist: "{{ lan }}"
pingvinshare_data_directory: "{{ docker_home }}/pingvin-share"

# network
pingvinshare_hostname: "pingvinshare"
pingvinshare_port_http: "3001"

# docker
pingvinshare_container_name: "pingvin-share"
pingvinshare_image_name: "stonith404/pingvin-share"
pingvinshare_image_tag: "latest"
pingvinshare_cpu_shares: "1024"
pingvinshare_memory: "1g"

# autoheal
pingvinshare_autoheal: "false"

# homepage
pingvinshare_homepage_group: "Apps"
pingvinshare_homepage_icon: "pingvinshare.png"
pingvinshare_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ pingvinshare_port_http }}"
pingvinshare_homepage_showStats: "false"

# watchtower
pingvinshare_watchtower_monitor_only: "true"