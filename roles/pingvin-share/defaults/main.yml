---
# ANE
ansible_nas_app_name: "Pingvin Share"
pingvin_share_enabled: false
pingvin_share_traefik_enabled: false
pingvin_share_traefik_whitelist: "{{ lan }}"
pingvin_share_data_directory: "{{ docker_home }}/pingvin-share"

# network
pingvin_share_hostname: "pingvinshare"
pingvin_share_port_http: "3053"

# docker
# This repository was archived by the owner on Jun 29, 2025. It is now read-only.
pingvin_share_container_name: "pingvin-share"
pingvin_share_image_name: "ghcr.io/stonith404/pingvin-share"
pingvin_share_image_tag: "latest"

# specs
pingvin_share_cpu_shares: 1024
pingvin_share_memory: "1G"

# autoheal
pingvin_share_autoheal_enabled: false

# dockflare
pingvin_share_dockflare_enabled: false
pingvin_share_dockflare_access_group: ""

# homepage
pingvin_share_homepage_group: "Apps"
pingvin_share_homepage_icon: "pingvin-share.png"
pingvin_share_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ pingvin_share_port_http }}"
pingvin_share_homepage_showstats: false

# repliqate
pingvin_share_repliqate_enabled: false
pingvin_share_repliqate_engine: "restic"
pingvin_share_repliqate_schedule: "@daily 3am"
pingvin_share_repliqate_backup_id: "{{ pingvin_share_container_name }}"
pingvin_share_repliqate_retention: "30d"

# tinyauth
pingvin_share_tinyauth_enabled: false

# watchtower
pingvin_share_watchtower_enabled: false