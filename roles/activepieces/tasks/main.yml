---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ activepieces_data_directory }}"
        - "{{ activepieces_data_directory }}/cache"

    - name: Create {{ ansible_nas_app_name }} Volumes
      community.docker.docker_volume:
        name: "{{ item }}"
      loop:
        - activepieces_postgres_data
        - activepieces_redis_data

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        activepieces_homepage_href: "https://{{ activepieces_hostname }}.{{ ansible_nas_domain }}"
      when: activepieces_traefik_enabled | bool or activepieces_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ activepieces_db_container_name }}"
        hostname: "{{ activepieces_db_container_name }}"
        image: "{{ activepieces_db_image_name }}:{{ activepieces_db_image_tag }}"
        pull: true
        volumes:
          - activepieces_postgres_data:/var/lib/postgresql/data
        env:
          POSTGRES_USER: "{{ activepieces_env_ap_postgres_username }}"
          POSTGRES_PASSWORD: "{{ activepieces_env_ap_postgres_password }}"
          POSTGRES_DB: "{{ activepieces_env_ap_postgres_database }}"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: ["CMD-SHELL", "pg_isready -U {{ activepieces_env_ap_postgres_username }}"]
          interval: 10s
          timeout: 5s
          retries: 5
          start_period: 30s
        labels:
          autoheal: "{{ activepieces_db_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ activepieces_db_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} PostgreSQL"
          homepage.group: "{{ activepieces_db_homepage_group }}"
          homepage.icon: "{{ activepieces_db_homepage_icon }}"
          homepage.href: "{{ activepieces_db_homepage_href }}"
          homepage.description: "{{ 'PostgreSQL Database Management System' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ activepieces_db_container_name }}"
          homepage.showStats: "{{ activepieces_db_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ activepieces_db_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ activepieces_db_repliqate_engine }}"
          repliqate.schedule: "{{ activepieces_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ activepieces_db_repliqate_backup_id }}"
          repliqate.retention: "{{ activepieces_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/postgres"
        cpu_shares: "{{ activepieces_db_cpu_shares }}"
        memory: "{{ activepieces_db_memory }}"
        memory_swap: "{{ activepieces_db_memory_swap }}"
        restart_policy: unless-stopped
      register: activepieces_db_status

    - name: Verify {{ ansible_nas_app_name }} DB is healthy
      community.docker.docker_container_info:
        name: "{{ activepieces_db_container_name }}"
      register: db_info
      until: "db_info.container.State.Health.Status == 'healthy'"
      retries: 30
      delay: 5

    - name: Create {{ ansible_nas_app_name }} Redis Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ activepieces_redis_container_name }}"
        hostname: "{{ activepieces_redis_container_name }}"
        image: "{{ activepieces_redis_image_name }}:{{ activepieces_redis_image_tag }}"
        pull: true
        volumes:
          - activepieces_redis_data:/data
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ activepieces_redis_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ activepieces_redis_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} Redis"
          homepage.group: "{{ activepieces_redis_homepage_group }}"
          homepage.icon: "{{ activepieces_redis_homepage_icon }}"
          homepage.href: "{{ activepieces_redis_homepage_href }}"
          homepage.description: "{{ 'The Real-time Data Platform' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ activepieces_redis_container_name }}"
          homepage.showStats: "{{ activepieces_redis_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ activepieces_redis_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ activepieces_redis_repliqate_engine }}"
          repliqate.schedule: "{{ activepieces_redis_repliqate_schedule }}"
          repliqate.backup_id: "{{ activepieces_redis_repliqate_backup_id }}"
          repliqate.retention: "{{ activepieces_redis_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: "^v?\\d+-alpine$"
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/redis"
        cpu_shares: "{{ activepieces_redis_cpu_shares }}"
        memory: "{{ activepieces_redis_memory }}"
        memory_swap: "{{ activepieces_redis_memory_swap }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ activepieces_container_name }}"
        hostname: "{{ activepieces_container_name }}"
        image: "{{ activepieces_image_name }}:{{ activepieces_image_tag }}"
        pull: true
        volumes:
          - "{{ activepieces_data_directory }}/cache:/usr/src/app/cache"
        ports:
          - "{{ activepieces_port_http }}:80"
        env:
          AP_ENGINE_EXECUTABLE_PATH: "{{ activepieces_env_ap_engine_executable_path }}"
          AP_API_KEY: "{{ activepieces_env_ap_api_key }}"
          AP_ENCRYPTION_KEY: "{{ activepieces_env_ap_encryption_key }}"
          AP_JWT_SECRET: "{{ activepieces_env_ap_jwt_secret }}"
          AP_ENVIRONMENT: "{{ activepieces_env_ap_environment }}"
          AP_FRONTEND_URL: "{{ activepieces_env_ap_frontend_url }}"
          AP_WEBHOOK_TIMEOUT_SECONDS: "{{ activepieces_env_ap_webhook_timeout_seconds }}"
          AP_TRIGGER_DEFAULT_POLL_INTERVAL: "{{ activepieces_env_ap_trigger_default_poll_interval }}"
          AP_POSTGRES_DATABASE: "{{ activepieces_env_ap_postgres_database }}"
          AP_POSTGRES_HOST: "{{ activepieces_env_ap_postgres_host }}"
          AP_POSTGRES_PORT: "{{ activepieces_env_ap_postgres_port }}"
          AP_POSTGRES_USERNAME: "{{ activepieces_env_ap_postgres_username }}"
          AP_POSTGRES_PASSWORD: "{{ activepieces_env_ap_postgres_password }}"
          AP_EXECUTION_MODE: "{{ activepieces_env_ap_execution_mode }}"
          AP_REDIS_HOST: "{{ activepieces_env_ap_redis_host }}"
          AP_REDIS_PORT: "{{ activepieces_env_ap_redis_port }}"
          AP_FLOW_TIMEOUT_SECONDS: "{{ activepieces_env_ap_flow_timeout_seconds }}"
          AP_TELEMETRY_ENABLED: "{{ activepieces_env_ap_telemetry_enabled }}"
          AP_TEMPLATES_SOURCE_URL: "{{ activepieces_env_ap_templates_source_url }}"
          AP_SMTP_HOST: "{{ activepieces_env_ap_smtp_host }}"
          AP_SMTP_PORT: "{{ activepieces_env_ap_smtp_port }}"
          AP_SMTP_USERNAME: "{{ activepieces_env_ap_smtp_username }}"
          AP_SMTP_PASSWORD: "{{ activepieces_env_ap_smtp_password }}"
          AP_SMTP_SENDER_EMAIL: "{{ activepieces_env_ap_smtp_sender_email }}"
          AP_SMTP_SENDER_NAME: "{{ activepieces_env_ap_smtp_sender_name }}"
          TZ: "{{ ansible_nas_timezone }}"
        links:
          - "{{ activepieces_db_container_name }}"
          - "{{ activepieces_redis_container_name }}"
        labels:
          autoheal: "{{ activepieces_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ activepieces_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ activepieces_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ activepieces_dockflare_access_group }}"
          dockflare.hostname: "{{ activepieces_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ activepieces_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ activepieces_homepage_group }}"
          homepage.icon: "{{ activepieces_homepage_icon }}"
          homepage.href: "{{ activepieces_homepage_href }}"
          homepage.description: "{{ 'All-in-one AI automation designed to be extensible' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ activepieces_container_name }}"
          homepage.showStats: "{{ activepieces_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ activepieces_port_http }}"
          repliqate.enabled: "{{ activepieces_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ activepieces_repliqate_engine }}"
          repliqate.schedule: "{{ activepieces_repliqate_schedule }}"
          repliqate.backup_id: "{{ activepieces_repliqate_backup_id }}"
          repliqate.retention: "{{ activepieces_repliqate_retention }}"
          traefik.enable: "{{ activepieces_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.activepieces.rule: "Host(`{{ activepieces_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.activepieces.tls.certresolver: "letsencrypt"
          traefik.http.routers.activepieces.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.activepieces.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.activepieces.middlewares: "activepieces@docker{{ ',tinyauth-auth@docker' if activepieces_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.activepieces.IPAllowList.sourcerange: "{{ activepieces_traefik_whitelist }}"
          traefik.http.services.activepieces.loadbalancer.server.port: "80"
          wud.tag.include: "^latest$"
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/activepieces/activepieces/releases"
        cpu_shares: "{{ activepieces_cpu_shares }}"
        memory: "{{ activepieces_memory }}"
        memory_swap: "{{ activepieces_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (activepieces_port_http | string)] +
                (['https://' + activepieces_hostname + '.' + ansible_nas_domain] if (activepieces_traefik_enabled is true or activepieces_dockflare_enabled is true) else [])
              }}
  when: activepieces_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ activepieces_container_name }}"
        state: absent

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Redis Container
      community.docker.docker_container:
        name: "{{ activepieces_redis_container_name }}"
        state: absent

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ activepieces_db_container_name }}"
        state: absent
  when: activepieces_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ activepieces_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - activepieces_enabled is false
