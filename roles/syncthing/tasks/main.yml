---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ syncthing_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ syncthing_container_name }}"
        image: "{{ syncthing_image_name }}:{{ syncthing_image_version }}"
        pull: true
        ports:
          - "{{ syncthing_port }}:8384"
          - "21027:21027/udp"
          - "22000:22000/udp"
          - "22000:22000/tcp"
        env:
          PUID: "{{ syncthing_user_id }}"
          PGID: "{{ syncthing_group_id }}"
        volumes: "{{ syncthing_volumes }}"
        restart_policy: unless-stopped
        cpu_shares: "{{ syncthing_cpu_shares }}"
        memory: "{{ syncthing_memory }}"
        labels:
          autoheal: "{{ syncthing_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ syncthing_watchtower_monitor_only }}"
          traefik.enable: "{{ syncthing_available_externally | string }}"
          traefik.http.routers.syncthing.rule: "Host(`{{ syncthing_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.syncthing.tls.certresolver: "letsencrypt"
          traefik.http.routers.syncthing.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.syncthing.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.services.syncthing.loadbalancer.server.port: "8384"
  when: syncthing_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ syncthing_container_name }}"
        state: absent
  when: syncthing_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ syncthing_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ syncthing_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: syncthing_enabled is false and archive_app_data_enabled is true
