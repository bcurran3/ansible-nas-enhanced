---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ syncthing_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ syncthing_container_name }}"
        hostname: "{{ syncthing_container_name }}"
        image: "{{ syncthing_image_name }}:{{ syncthing_image_version }}"
        pull: true
        ports:
          - "{{ syncthing_port_http }}:8384"
          - "21027:21027/udp"
          - "22000:22000/udp"
          - "22000:22000/tcp"
        env:
          PUID: "{{ syncthing_user_id }}"
          PGID: "{{ syncthing_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        volumes: "{{ syncthing_volumes }}"
        labels:
          autoheal: "{{ syncthing_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ syncthing_watchtower_enable }}"
          dockflare.enable: "{{ syncthing_dockflare_tunnel }}"
          dockflare.access.group: "{{ syncthing_dockflare_access_group }}"
          dockflare.hostname: "{{ syncthing_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ syncthing_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ syncthing_homepage_group }}"
          homepage.icon: "{{ syncthing_homepage_icon }}"
          homepage.href: "{{ syncthing_homepage_href }}"
          homepage.description: "{{ 'Open Source Continuous File Synchronization' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ syncthing_container_name }}"
          homepage.showStats: "{{ syncthing_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ syncthing_port_http }}"
          repliqate.enabled: "{{ syncthing_repliqate_enabled }}"
          repliqate.engine: "{{ syncthing_repliqate_engine }}"
          repliqate.schedule: "{{ syncthing_repliqate_schedule }}"
          repliqate.backup_id: "{{ syncthing_repliqate_backup_id }}"
          repliqate.retention: "{{ syncthing_repliqate_retention }}"
          traefik.enable: "{{ syncthing_available_externally | string }}"
          traefik.http.routers.syncthing.rule: "Host(`{{ syncthing_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.syncthing.tls.certresolver: "letsencrypt"
          traefik.http.routers.syncthing.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.syncthing.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ syncthing_hostname }}"
          traefik.http.routers.syncthing.middlewares: "{{ syncthing_hostname }}@docker"
          traefik.http.middlewares.syncthing.IPAllowList.sourcerange: "{{ syncthing_traefik_whitelist }}"
          traefik.http.services.syncthing.loadbalancer.server.port: "8384"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/syncthing/syncthing/pkgs/container/syncthing"
        cpu_shares: "{{ syncthing_cpu_shares }}"
        memory: "{{ syncthing_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (syncthing_port_http | string)] +
                (['https://' + syncthing_hostname + '.' + ansible_nas_domain] if (syncthing_available_externally is true or syncthing_dockflare_tunnel is true) else [])
              }}
  when: syncthing_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ syncthing_container_name }}"
        state: absent
  when: syncthing_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ syncthing_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ syncthing_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: syncthing_enabled is false and archive_app_data_enabled is true
