---
- name: Start {{ tautulli_proper_name }}
  block:
    - name: Create {{ tautulli_proper_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ tautulli_data_directory }}"
        - "{{ tautulli_data_directory }}/config"
        - "{{ plex_data_directory }}/logs"

    - name: Set {{ tautulli_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        tautulli_homepage_href: "https://{{ tautulli_hostname }}.{{ ansible_nas_domain }}"
      when: tautulli_traefik_enabled | bool or tautulli_dockflare_enabled | bool

    - name: Create {{ tautulli_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ tautulli_container_name }}"
        hostname: "{{ tautulli_container_name }}"
        image: "{{ tautulli_image_name }}:{{ tautulli_image_version }}"
        pull: true
        volumes:
          - "{{ tautulli_data_directory }}/config:/config:rw"
          - "{{ plex_data_directory }}/logs:/logs:ro"
        ports:
          - "{{ tautulli_port_http }}:8181"
        env:
          DOCKER_MODS: "{{ tautulli_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ tautulli_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ tautulli_env_docker_mods_install_pip_packages}}"
          TP_DOMAIN: "{{ tautulli_env_docker_mods_tp_domain }}"
          TP_THEME: "{{ tautulli_env_docker_mods_tp_theme }}"
          TP_COMMUNITY_THEME: "{{ tautulli_env_docker_mods_tp_community_theme }}"
          TP_ADDON: "{{ tautulli_env_docker_mods_tp_addon }}"
          PUID: "{{ tautulli_user_id }}"
          PGID: "{{ tautulli_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: "{{ tautulli_healthcheck_test }}"
          interval: "{{ tautulli_healthcheck_interval }}"
          timeout: "{{ tautulli_healthcheck_timeout }}"
          retries: "{{ tautulli_healthcheck_retries }}"
          start_period: "{{ tautulli_healthcheck_start_period }}"
        labels:
          autoheal: "{{ tautulli_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ tautulli_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ tautulli_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ tautulli_dockflare_access_group }}"
          dockflare.hostname: "{{ tautulli_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ tautulli_port_http }}"
          homepage.name: "{{ tautulli_proper_name }}"
          homepage.group: "{{ tautulli_homepage_group }}"
          homepage.icon: "{{ tautulli_homepage_icon }}"
          homepage.href: "{{ tautulli_homepage_href }}"
          homepage.description: "{{ 'a python based web application for monitoring, analytics and notifications for Plex Media Server' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ tautulli_container_name }}"
          homepage.showStats: "{{ tautulli_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ tautulli_port_http }}"
          repliqate.enabled: "{{ tautulli_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ tautulli_repliqate_engine }}"
          repliqate.schedule: "{{ tautulli_repliqate_schedule }}"
          repliqate.backup_id: "{{ tautulli_repliqate_backup_id }}"
          repliqate.retention: "{{ tautulli_repliqate_retention }}"
          traefik.enable: "{{ tautulli_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.tautulli.rule: "Host(`{{ tautulli_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.tautulli.tls.certresolver: "letsencrypt"
          traefik.http.routers.tautulli.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.tautulli.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.tautulli.middlewares: "{{ tautulli_hostname }}@docker{{ ',tinyauth-auth@docker' if tautulli_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.tautulli.IPAllowList.sourcerange: "{{ tautulli_traefik_whitelist }}"
          traefik.http.services.tautulli.loadbalancer.server.port: "8181"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://lscr.io/linuxserver/tautulli"
        cpu_shares: "{{ tautulli_cpu_shares }}"
        memory: "{{ tautulli_memory }}"
        memory_swap: "{{ tautulli_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ tautulli_proper_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (tautulli_port_http | string)] +
                (['https://' + tautulli_hostname + '.' + ansible_nas_domain] if (tautulli_traefik_enabled is true or tautulli_dockflare_enabled is true) else [])
              }}
  when: tautulli_enabled is true

- name: Stop {{ tautulli_proper_name }}
  block:
    - name: Stop {{ tautulli_proper_name }} Container
      community.docker.docker_container:
        name: "{{ tautulli_container_name }}"
        state: absent
  when: tautulli_enabled is false

- name: Data Archive {{ tautulli_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ tautulli_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - tautulli_enabled is false