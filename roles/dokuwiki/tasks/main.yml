---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create DokuWiki Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ dokuwiki_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ dokuwiki_container_name }}"
        hostname: "{{ dokuwiki_container_name }}"
        image: "{{ dokuwiki_image_name }}:{{ dokuwiki_image_tag }}"
        pull: true
        volumes:
          - "{{ dokuwiki_data_directory }}:/config/dokuwiki/data:rw"
        ports:
          - "{{ dokuwiki_port_http }}:80"
        env:
          DOCKER_MODS: "{{ dokuwiki_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ dokuwiki_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ dokuwiki_env_docker_mods_install_pip_packages}}"
          PUID: "{{ dokuwiki_user_id }}"
          PGID: "{{ dokuwiki_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ dokuwiki_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ dokuwiki_watchtower_enable }}"
          dockflare.enable: "{{ dokuwiki_dockflare_tunnel }}"
          dockflare.access.group: "{{ dokuwiki_dockflare_access_group }}"
          dockflare.hostname: "{{ dokuwiki_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ dokuwiki_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ dokuwiki_homepage_group }}"
          homepage.icon: "{{ dokuwiki_homepage_icon }}"
          homepage.href: "{{ dokuwiki_homepage_href }}"
          homepage.description: "{{ 'dokuwiki description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ dokuwiki_container_name }}"
          homepage.showStats: "{{ dokuwiki_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ dokuwiki_port_http }}"
          repliqate.enabled: "{{ dokuwiki_repliqate_enabled }}"
          repliqate.engine: "{{ dokuwiki_repliqate_engine }}"
          repliqate.schedule: "{{ dokuwiki_repliqate_schedule }}"
          repliqate.backup_id: "{{ dokuwiki_repliqate_backup_id }}"
          repliqate.retention: "{{ dokuwiki_repliqate_retention }}"
          traefik.enable: "{{ dokuwiki_available_externally | string }}"
          traefik.http.routers.dokuwiki.rule: "Host(`{{ dokuwiki_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.dokuwiki.tls.certresolver: "letsencrypt"
          traefik.http.routers.dokuwiki.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.dokuwiki.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ dokuwiki_hostname }}"
          traefik.http.routers.dokuwiki.middlewares: "{{ dokuwiki_hostname }}@docker"
          traefik.http.middlewares.dokuwiki.IPAllowList.sourcerange: "{{ dokuwiki_traefik_whitelist }}"
          traefik.http.services.dokuwiki.loadbalancer.server.port: "80"
          wud.watch.digest: "true"
          wud.link.template: "https://hub.docker.com/r/linuxserver/dokuwiki"
        cpu_shares: "{{ dokuwiki_cpu_shares }}"
        memory: "{{ dokuwiki_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (dokuwiki_port_http | string)] +
                (['https://' + dokuwiki_hostname + '.' + ansible_nas_domain] if (dokuwiki_available_externally is true or dokuwiki_dockflare_tunnel is true) else [])
              }}
  when: dokuwiki_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ dokuwiki_container_name }}"
        state: absent
  when: dokuwiki_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ dokuwiki_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ dokuwiki_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: dokuwiki_enabled is false and archive_app_data_enabled is true
