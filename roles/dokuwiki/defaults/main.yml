---
ansible_nas_app_name: "DokuWiki"

dokuwiki_enabled: false
dokuwiki_available_externally: false
dokuwiki_traefik_whitelist: "{{ lan }}"

# directories
dokuwiki_data_directory: "{{ docker_home }}/dokuwiki"

# uid / gid
dokuwiki_user_id: "1000"
dokuwiki_group_id: "1000"

# network
dokuwiki_hostname: "dokuwiki"
dokuwiki_port: "8085"

# specs
dokuwiki_memory: 1g

# docker
dokuwiki_container_name: dokuwiki
dokuwiki_cpu_shares: 1024

# autoheal
dokuwiki_autoheal: "false"

# watchtower
dokuwiki_watchtower_monitor_only: "true"