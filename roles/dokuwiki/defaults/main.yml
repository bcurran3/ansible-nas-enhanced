---
# ANE
ansible_nas_app_name: "DokuWiki"
dokuwiki_enabled: false
dokuwiki_traefik_enabled: false
dokuwiki_traefik_whitelist: "{{ lan }}"

# directories
dokuwiki_data_directory: "{{ docker_home }}/dokuwiki"

# uid / gid
dokuwiki_user_id: "1000"
dokuwiki_group_id: "1000"

# network
dokuwiki_hostname: "dokuwiki"
dokuwiki_port_http: "8085"

# docker
dokuwiki_container_name: "dokuwiki"
dokuwiki_image_name: "lscr.io/linuxserver/dokuwiki"
dokuwiki_image_tag: "latest"

# specs
dokuwiki_cpu_shares: 1024
dokuwiki_memory: "1G"
dokuwiki_memory_swap: -1

# autoheal
dokuwiki_autoheal_enabled: false

# dockflare
dokuwiki_dockflare_enabled: false
dokuwiki_dockflare_access_group: ""

# homepage
dokuwiki_homepage_group: "Apps"
dokuwiki_homepage_icon: "dokuwiki.png"
dokuwiki_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ dokuwiki_port_http }}"
dokuwiki_homepage_showstats: false

# linuxserver.io docker mods
dokuwiki_env_docker_mods: ""
dokuwiki_env_docker_mods_install_packages: ""
dokuwiki_env_docker_mods_install_pip_packages: ""

# repliqate
dokuwiki_repliqate_enabled: false
dokuwiki_repliqate_engine: "restic"
dokuwiki_repliqate_schedule: "@daily 3am"
dokuwiki_repliqate_backup_id: "{{ dokuwiki_container_name }}"
dokuwiki_repliqate_retention: "30d"

# tinyauth
dokuwiki_tinyauth_enabled: false

# watchtower
dokuwiki_watchtower_enabled: false