---
# ANE
ansible_nas_app_name: "BanBan"
banban_enabled: false
banban_available_externally: false
banban_traefik_whitelist: "{{ lan }}"
banban_data_directory: "{{ docker_home }}/banban"

# network
banban_port_http: "3028"
banban_hostname: "banban"

# docker
banban_container_name: "banban"
banban_image_name: "m0gd0ck/banban"
banban_image_tag: "latest"
banban_cpu_shares: 1024
banban_memory: "1G"
banban_memory_swap: -1

# autoheal
banban_autoheal: "false"

# dockflare
banban_dockflare_tunnel: "false"
banban_dockflare_access_group: ""

# homepage
banban_homepage_group: "Apps"
banban_homepage_icon: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ banban_port_http }}/favicon.svg"
banban_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ banban_port_http }}"
banban_homepage_showstats: "false"

# repliqate
banban_repliqate_enabled: "false"
banban_repliqate_engine: "restic"
banban_repliqate_schedule: "@daily 3am"
banban_repliqate_backup_id: "{{ banban_container_name }}"
banban_repliqate_retention: "30d"

# tinyauth
banban_tinyauth_enabled: false

# watchtower
banban_watchtower_enable: "false"
