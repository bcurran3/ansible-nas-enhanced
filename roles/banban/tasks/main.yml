---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ banban_data_directory }}"
        - "{{ banban_data_directory }}/db"
        - "{{ banban_data_directory }}/storage"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        banban_homepage_href: "https://{{ banban_hostname }}.{{ ansible_nas_domain }}"
      when: banban_traefik_enabled | bool or banban_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ banban_container_name }}"
        hostname: "{{ banban_container_name }}"
        image: "{{ banban_image_name }}:{{ banban_image_tag }}"
        pull: true
        volumes:
          - "{{ banban_data_directory }}/db:/app/prisma/db"
          - "{{ banban_data_directory }}/storage:/app/storage"
        ports:
          - "{{ banban_port_http }}:{{ banban_port_http }}"
        env:
          DATABASE_URL: "file:./db/banban.db"
          PORT: "{{ banban_port_http | string }}"
          NODE_ENV: "production"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ banban_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ banban_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ banban_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ banban_dockflare_access_group }}"
          dockflare.hostname: "{{ banban_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ banban_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ banban_homepage_group }}"
          homepage.icon: "{{ banban_homepage_icon }}"
          homepage.href: "{{ banban_homepage_href }}"
          homepage.description: "{{ 'Self hosted Kanban board tool' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ banban_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ banban_container_name }}"
          homepage.showStats: "{{ banban_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ banban_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ banban_repliqate_engine }}"
          repliqate.schedule: "{{ banban_repliqate_schedule }}"
          repliqate.backup_id: "{{ banban_repliqate_backup_id }}"
          repliqate.retention: "{{ banban_repliqate_retention }}"
          traefik.enable: "{{ banban_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.banban.rule: "Host(`{{ banban_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.banban.tls.certresolver: "letsencrypt"
          traefik.http.routers.banban.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.banban.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.banban.middlewares: "banban@docker{{ ',tinyauth-auth@docker' if banban_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.banban.IPAllowList.sourcerange: "{{ banban_traefik_whitelist }}"
          traefik.http.services.banban.loadbalancer.server.port: "{{ banban_port_http }}"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/m0gd0ck/banban"
        cpu_shares: "{{ banban_cpu_shares }}"
        memory: "{{ banban_memory }}"
        memory_swap: "{{ banban_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (banban_port_http | string)] +
                (['https://' + banban_hostname + '.' + ansible_nas_domain] if (banban_traefik_enabled is true or banban_dockflare_enabled is true) else [])
              }}
  when: banban_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ banban_container_name }}"
        state: absent
  when: banban_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ banban_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - banban_enabled is false