---
# ANE
searxng_proper_name: "SearXNG"
searxng_enabled: false
searxng_traefik_enabled: false
searxng_traefik_whitelist: "{{ lan }}"
searxng_data_directory: "{{ docker_home }}/searxng"

# network
searxng_hostname: "searxng"
searxng_port_http: "3008"

# docker
searxng_container_name: "searxng"
searxng_image_name: "ghcr.io/searxng/searxng"
searxng_image_tag: "latest"

# specs
searxng_cpu_shares: 1024
searxng_memory: "1G"
searxng_memory_swap: -1

# app
searxng_env_instance_name: "{{ ansible_nas_hostname }}-1"
searxng_env_searxng_base_url: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ searxng_port_http }}"
searxng_env_searxng_limiter_proxies: "1"
searxng_env_searxng_limiter_real_ip_header: "X-Forwarded-For"
searxng_env_url: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ searxng_port_http }}"

# autoheal
searxng_autoheal_enabled: false

# dockflare
searxng_dockflare_enabled: false
searxng_dockflare_access_group: ""

# healthcheck
searxng_healthcheck_test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/healthz || exit 1"]
searxng_healthcheck_interval: 30s
searxng_healthcheck_timeout: 10s
searxng_healthcheck_retries: 3
searxng_healthcheck_start_period: 20s

# homepage
searxng_homepage_group: "Apps"
searxng_homepage_icon: "searxng.png"
searxng_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ searxng_port_http }}"
searxng_homepage_showstats: false

# repliqate
searxng_repliqate_enabled: false
searxng_repliqate_engine: "restic"
searxng_repliqate_schedule: "@daily 3am"
searxng_repliqate_backup_id: "{{ searxng_container_name }}"
searxng_repliqate_retention: "30d"

# tinyauth
searxng_tinyauth_enabled: false

# watchtower
searxng_watchtower_enabled: false