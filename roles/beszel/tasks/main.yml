---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ beszel_data_directory }}"
        - "{{ beszel_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ beszel_container_name }}"
        hostname: "{{ beszel_container_name }}"
        image: "{{ beszel_image_name }}:{{ beszel_image_tag }}"
        pull: true
        ports:
          - "{{ beszel_port_http }}:8090"
        volumes:
          - "{{ beszel_data_directory }}/data:/beszel_data"
        network_mode: bridge
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ beszel_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ beszel_watchtower_monitor_only }}"
          dockflare.enable: "{{ beszel_dockflare_tunnel }}"
          dockflare.access.group: "{{ beszel_dockflare_access_group }}"
          dockflare.hostname: "{{ beszel_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ beszel_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ beszel_homepage_group }}"
          homepage.icon: "{{ beszel_homepage_icon }}"
          homepage.href: "{{ beszel_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ beszel_port_http }}"
          homepage.description: "{{ 'Lightweight server monitoring hub with historical data, docker stats, and alerts.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ beszel_container_name }}"
          homepage.showStats: "{{ beszel_homepage_showStats }}"
          traefik.enable: "{{ beszel_available_externally | string }}"
          traefik.http.routers.beszel.rule: "Host(`{{ beszel_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.beszel.tls.certresolver: "letsencrypt"
          traefik.http.routers.beszel.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.beszel.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ beszel_hostname }}"
          traefik.http.routers.beszel.middlewares: "{{ beszel_hostname }}@docker"
          traefik.http.middlewares.beszel.IPAllowList.sourcerange: "{{ beszel_traefik_whitelist }}"
          traefik.http.services.beszel.loadbalancer.server.port: "8090"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/henrygd/beszel"
        cpu_shares: "{{ beszel_cpu_shares }}"
        memory: "{{ beszel_memory }}"
        restart_policy: unless-stopped
  when: beszel_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ beszel_container_name }}"
        state: absent
  when: beszel_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ beszel_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ beszel_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: beszel_enabled is false and archive_app_data_enabled is true


