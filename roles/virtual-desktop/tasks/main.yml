---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ virtual_desktop_data_directory }}"
        - "{{ virtual_desktop_data_directory }}/home"

    - name: Create {{ ansible_nas_app_name }} users file
      ansible.builtin.template:
        src: "users.txt.j2"
        dest: "{{ virtual_desktop_data_directory }}/users.txt"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ virtual_desktop_container_name }}"
        hostname: "{{ virtual_desktop_container_name }}"
        image: "{{ virtual_desktop_image_name }}:{{ virtual_desktop_image_version }}"
        pull: true
        volumes:
          - "{{ virtual_desktop_data_directory }}/users.txt:/root/createusers.txt:ro"
          - "{{ virtual_desktop_data_directory }}/home:/home:rw"
          - "{{ samba_shares_root }}:/samba:rw"
          - "{{ docker_home }}:/docker:rw"
          - "/etc/timezone:/etc/timezone:ro"
        ports:
          - "{{ virtual_desktop_port_rdp }}:3389"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        privileged: true
        labels:
          autoheal: "{{ virtual_desktop_autoheal | string }}"
          com.centurylinklabs.watchtower.enable: "{{ virtual_desktop_watchtower_enabled| string }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ virtual_desktop_homepage_group }}"
          homepage.icon: "{{ virtual_desktop_homepage_icon }}"
          homepage.description: "{{ 'Ubuntu with XRDP and MATE' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ virtual_desktop_container_name }}"
          homepage.showStats: "{{ virtual_desktop_homepage_showstats | string }}"
          repliqate.enabled: "{{ virtual_desktop_repliqate_enabled | string }}"
          repliqate.engine: "{{ virtual_desktop_repliqate_engine }}"
          repliqate.schedule: "{{ virtual_desktop_repliqate_schedule }}"
          repliqate.backup_id: "{{ virtual_desktop_repliqate_backup_id }}"
          repliqate.retention: "{{ virtual_desktop_repliqate_retention }}"
          traefik.enable: "false"
          wud.watch.digest: "true"
          wud.link.template: "https://hub.docker.com/r/rattydave/docker-ubuntu-xrdp-mate-custom"
        cpu_shares: "{{ virtual_desktop_cpu_shares }}"
        memory: "{{ virtual_desktop_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
          {{
            [
              'rdp://' ~ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] ~ ':' ~ virtual_desktop_port_rdp
            ]
          }}
  when: virtual_desktop_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ virtual_desktop_container_name }}"
        state: absent
  when: virtual_desktop_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ virtual_desktop_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - virtual_desktop_enabled is false