---
# ANE
ansible_nas_app_name: "Virtual Desktop"
virtual_desktop_enabled: false
virtual_desktop_traefik_whitelist: "{{ lan }}"

virtual_desktop_users:
  - username: "{{ ansible_nas_user }}"
    password: "{{ ansible_nas_app_admin_password }}"
    sudo: "Y"

# uid / gid
virtual_desktop_user_id: "0"
virtual_desktop_group_id: "0"

# Directories
virtual_desktop_data_directory: "{{ docker_home }}/virtual_desktop"

# Networking
virtual_desktop_port_rdp: 3389

# Container
virtual_desktop_memory: 2g
virtual_desktop_container_name: "virtual-desktop"
virtual_desktop_image_name: "rattydave/docker-ubuntu-xrdp-mate-custom"
virtual_desktop_image_version: "20.04-tools"
virtual_desktop_cpu_shares: 1024

# autoheal
virtual_desktop_autoheal: "false"

# homepage
virtual_desktop_homepage_group: "Apps"
virtual_desktop_homepage_icon: "virtual_desktop.png"
virtual_desktop_homepage_showstats: "false"

# repliqate
virtual_desktop_repliqate_enabled: "false"
virtual_desktop_repliqate_engine: "restic"
virtual_desktop_repliqate_schedule: "@daily 3am"
virtual_desktop_repliqate_backup_id: "{{ virtual_desktop_container_name }}"
virtual_desktop_repliqate_retention: "30d"

# watchtower
virtual_desktop_watchtower_enable: "false"