---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directory
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ wud_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ wud_container_name }}"
        hostname: "{{ wud_container_name }}"
        image: "{{ wud_image_name }}:{{ wud_image_tag }}"
        pull: true
        volumes:
          - "{{ wud_data_directory }}:/store"
          - "/var/run/docker.sock:/var/run/docker.sock"
        ports:
          - "{{ wud_port_http }}:3000"
        env:
# NOTE: Consider moving env vars to a list so that triggers can be added manually
          WUD_AUTH_BASIC_ADMIN_USER: "{{ wud_env_wud_auth_basic_admin_username }}"
          WUD_AUTH_BASIC_ADMIN_HASH: "{{ wud_admin_password | password_hash('md5') }}"
          WUD_REGISTRY_HUB_PUBLIC_LOGIN: "{{ wud_env_wud_registry_hub_public_login }}"
          WUD_REGISTRY_HUB_PUBLIC_PASSWORD: "{{ wud_env_wud_registry_hub_public_password }}"
          WUD_WATCHER_LOCAL_WATCHALL: "{{ wud_env_wud_watcher_local_watchall }}"
          WUD_TRIGGER_WATCHTOWER_HTTP_URL: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ watchtower_port_api }}/v1/update"
          WUD_TRIGGER_WATCHTOWER_HTTP_METHOD: "POST"
          WUD_TRIGGER_WATCHTOWER_HTTP_HEADERS: '{"Authorization":"Bearer {{ watchtower_api_token }}"}'
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: 'curl --fail http://localhost:3000/health || exit 1'
          interval: "10s"
          timeout: "10s"
          retries: "3"
          start_period: "10s"
        labels:
          autoheal: "{{ wud_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ wud_watchtower_enable }}"
          dockflare.enable: "{{ wud_dockflare_tunnel }}"
          dockflare.access.group: "{{ wud_dockflare_access_group }}"
          dockflare.hostname: "{{ wud_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ wud_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ wud_homepage_group }}"
          homepage.icon: "{{ wud_homepage_icon }}"
          homepage.href: "{{ wud_homepage_href }}"
          homepage.description: "{{ 'Keep your containers up-to-date!' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ wud_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ wud_container_name }}"
          homepage.showStats: "{{ wud_homepage_showstats }}"
          homepage.widget.type: "whatsupdocker"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ wud_port_http }}"
          homepage.widget.username: "{{ wud_env_wud_auth_basic_admin_username }}"
          homepage.widget.password: "{{ wud_env_wud_auth_basic_admin_hash }}"
          repliqate.enabled: "{{ wud_repliqate_enabled }}"
          repliqate.engine: "{{ wud_repliqate_engine }}"
          repliqate.schedule: "{{ wud_repliqate_schedule }}"
          repliqate.backup_id: "{{ wud_repliqate_backup_id }}"
          repliqate.retention: "{{ wud_repliqate_retention }}"
          traefik.enable: "{{ wud_available_externally | string }}"
          traefik.http.routers.wud.rule: "Host(`wud.{{ ansible_nas_domain }}`)"
          traefik.http.routers.wud.tls.certresolver: "letsencrypt"
          traefik.http.routers.wud.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.wud.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ wud_hostname }}"
          traefik.http.routers.wud.middlewares: "{{ wud_hostname }}@docker"
          traefik.http.middlewares.wud.IPAllowList.sourcerange: "{{ wud_traefik_whitelist }}"
          traefik.http.services.wud.loadbalancer.server.port: "3000"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/getwud/wud/releases/tag/$${major}.$${minor}.$${patch}"
        cpu_shares: "{{ wud_cpu_shares }}"
        memory: "{{ wud_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (wud_port_http | string)] +
                (['https://' + wud_hostname + '.' + ansible_nas_domain] if (wud_available_externally is true or wud_dockflare_tunnel is true) else [])
              }}
  when: wud_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ wud_container_name }}"
        state: absent
  when: wud_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ wud_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - wud_enabled is false