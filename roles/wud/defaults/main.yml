---
# ANE
ansible_nas_app_name: "What's Up Docker?"
wud_enabled: false
wud_available_externally: false
wud_traefik_whitelist: "{{ lan }}"

wud_data_directory: "{{ docker_home }}/wud"

# network
wud_hostname: "wud"
wud_port_http: "3013"

# docker
wud_container_name: "wud"
wud_image_name: "ghcr.io/getwud/wud"
wud_image_tag: "latest"

# specs
wud_cpu_shares: 1024
wud_memory: "256MB"
wud_memory_swap: -1

# app
wud_admin_password:  "{{ ansible_nas_app_admin_password }}"
wud_env_wud_auth_basic_admin_username: "{{ ansible_nas_user }}"
wud_env_wud_auth_basic_admin_hash: "{{ ansible_nas_app_admin_password | hash('sha256') }}"
wud_env_wud_registry_hub_public_login: ""    # your https://hub.docker.com account
wud_env_wud_registry_hub_public_password: "" # your https://hub.docker.com token
wud_env_wud_watcher_local_watchall: "true"

# autoheal
wud_autoheal: "false"

# dockflare
wud_dockflare_tunnel: "false"
wud_dockflare_access_group: ""

# homepage
wud_homepage_group: "Apps"
wud_homepage_icon: "whats-up-docker.png"
wud_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ wud_port_http }}"
wud_homepage_showstats: "false"
wud_homepage_widget_username: "{{ wud_env_wud_auth_basic_admin_username }}"
wud_homepage_widget_password:  "{{ wud_env_wud_auth_basic_admin_hash }}"

# repliqate
wud_repliqate_enabled: "false"
wud_repliqate_engine: "restic"
wud_repliqate_schedule: "@daily 3am"
wud_repliqate_backup_id: "{{ wud_container_name }}"
wud_repliqate_retention: "30d"

# tinyauth
wud_tinyauth_enabled: false

# watchtower
wud_watchtower_enable: "false"