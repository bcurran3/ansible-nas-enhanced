---
# ANE
ansible_nas_app_name: "Kasm"
kasm_enabled: false
kasm_available_externally: false
kasm_traefik_whitelist: "{{ lan }}"
kasm_data_directory: "{{ docker_home }}/kasm"

# network
kasm_hostname: "kasm"
kasm_port_https: "3025"
kasm_port_install_https: "3026"

# app
kasm_docker_hub_username: ""
kasm_docker_hub_password: ""

# docker
kasm_container_name: "kasm"
kasm_image_name: "lscr.io/linuxserver/kasm"
kasm_image_tag: "latest"

# specs
kasm_cpu_shares: 1024
kasm_memory: "2g"
kasm_memory_swap: -1

# autoheal
kasm_autoheal: "false"

# dockflare
kasm_dockflare_tunnel: "false"
kasm_dockflare_access_group: ""

# homepage
kasm_homepage_group: "Apps"
kasm_homepage_icon: "kasm.png"
kasm_homepage_href: "https://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ kasm_port_https }}"
kasm_homepage_showstats: "false"

# linuxserver.io docker mods
kasm_env_docker_mods: ""
kasm_env_docker_mods_install_packages: ""
kasm_env_docker_mods_install_pip_packages: ""

# repliqate
kasm_repliqate_enabled: "false"
kasm_repliqate_engine: "restic"
kasm_repliqate_schedule: "@daily 3am"
kasm_repliqate_backup_id: "{{ kasm_container_name }}"
kasm_repliqate_retention: "30d"

# tinyauth
kasm_tinyauth_enabled: false

# watchtower
kasm_watchtower_enable: "false"
