---
# ANE
flexget_proper_name: "Flexget"
flexget_enabled: false
flexget_traefik_enabled: false
flexget_traefik_whitelist: "{{ lan }}"
flexget_data_directory: "{{ docker_home }}/flexget"

# network
flexget_hostname: "flexget"
flexget_port_http: "3539"

flexget_user_id: "0"
flexget_group_id: "0"

# docker
flexget_container_name: "flexget"
flexget_image_name: "ghcr.io/wiserain/flexget"
flexget_image_tag: "latest"

# specs
flexget_cpu_shares: 1024
flexget_memory: "1G"
flexget_memory_swap: -1

# app
flexget_env_fg_log_level: "info"
flexget_env_fg_plugins: "write_magnet"
flexget_env_fg_webui_passwd: "{{ ansible_nas_app_admin_password }}"

# autoheal
flexget_autoheal_enabled: false

# dockflare
flexget_dockflare_enabled: false
flexget_dockflare_access_group: ""

# homepage
flexget_homepage_group: "Apps"
flexget_homepage_icon: "flexget.png"
flexget_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ flexget_port_http }}"
flexget_homepage_showstats: false

# repliqate
flexget_repliqate_enabled: false
flexget_repliqate_engine: "restic"
flexget_repliqate_schedule: "@daily 3am"
flexget_repliqate_backup_id: "{{ flexget_container_name }}"
flexget_repliqate_retention: "30d"

# tinyauth
flexget_tinyauth_enabled: false

# watchtower
flexget_watchtower_enabled: false
