---
- name: Start {{ flexget_proper_name }}
  block:
    - name: Create {{ flexget_proper_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ flexget_data_directory }}/config"
        - "{{ flexget_data_directory }}/data"

    - name: Set {{ flexget_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        flexget_homepage_href: "https://{{ flexget_hostname }}.{{ ansible_nas_domain }}"
      when: flexget_traefik_enabled | bool or flexget_dockflare_enabled | bool

    - name: Create {{ flexget_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ flexget_container_name }}"
        hostname: "{{ flexget_container_name }}"
        image: "{{ flexget_image_name }}:{{ flexget_image_tag }}"
        pull: true
        volumes:
          - "{{ flexget_data_directory }}/config:/config"
          - "{{ flexget_data_directory }}/data:/data"
        ports:
          - "{{ flexget_port_http }}:5050"
        env:
          FG_LOG_LEVEL: "{{ flexget_env_fg_log_level }}"
          FG_PLUGINS: "{{ flexget_env_fg_plugins }}"
          FG_WEBUI_PASSWD: "{{ flexget_env_fg_webui_passwd }}"
          PUID: "{{ flexget_user_id }}"
          PGID: "{{ flexget_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ flexget_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ flexget_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ flexget_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ flexget_dockflare_access_group }}"
          dockflare.hostname: "{{ flexget_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ flexget_port_http }}"
          homepage.name: "{{ flexget_proper_name }}"
          homepage.group: "{{ flexget_homepage_group }}"
          homepage.icon: "{{ flexget_homepage_icon }}"
          homepage.href: "{{ flexget_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ flexget_port_http }}"
          homepage.description: "{{ 'FlexGet is a multipurpose automation tool for content like torrents, nzbs, podcasts, comics, series, movies, etc.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ flexget_container_name }}"
          homepage.showStats: "{{ flexget_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ flexget_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ flexget_repliqate_engine }}"
          repliqate.schedule: "{{ flexget_repliqate_schedule }}"
          repliqate.backup_id: "{{ flexget_repliqate_backup_id }}"
          repliqate.retention: "{{ flexget_repliqate_retention }}"
          traefik.enable: "{{ flexget_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.flexget.rule: "Host(`{{ flexget_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.flexget.tls.certresolver: "letsencrypt"
          traefik.http.routers.flexget.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.flexget.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.flexget.middlewares: "flexget@docker{{ ',tinyauth-auth@docker' if flexget_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.flexget.IPAllowList.sourcerange: "{{ flexget_traefik_whitelist }}"
          traefik.http.services.flexget.loadbalancer.server.port: "5050"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/wiserain/docker-flexget/pkgs/container/flexget"
        cpu_shares: "{{ flexget_cpu_shares }}"
        memory: "{{ flexget_memory }}"
        memory_swap: "{{ flexget_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ flexget_proper_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (flexget_port_http | string)] +
                (['https://' + flexget_hostname + '.' + ansible_nas_domain] if (flexget_traefik_enabled is true or flexget_dockflare_enabled is true) else [])
              }}
  when: flexget_enabled is true

- name: Stop {{ flexget_proper_name }}
  block:
    - name: Stop {{ flexget_proper_name }} Container
      community.docker.docker_container:
        name: "{{ flexget_container_name }}"
        state: absent
  when: flexget_enabled is false

- name: Data Archive {{ flexget_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ flexget_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - flexget_enabled is false