---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ flexget_data_directory }}/config"
        - "{{ flexget_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ flexget_container_name }}"
        hostname: "{{ flexget_container_name }}"
        image: "{{ flexget_image_name }}:{{ flexget_image_tag }}"
        pull: true
        volumes:
          - "{{ flexget_data_directory }}/config"
          - "{{ flexget_data_directory }}/data"
        ports:
          - "{{ flexget_port_http }}:5050"
        env:
          FG_WEBUI_PASSWD: "{{ flexget_FG_WEBUI_PASSWD }}"
          FG_LOG_LEVEL: "info"
          FG_PLUGINS: "write_magnet"
          PUID: "{{ flexget_user_id }}"
          PGID: "{{ flexget_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ flexget_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ flexget_watchtower_monitor_only }}"
          dockflare.enable: "{{ flexget_dockflare_tunnel }}"
          dockflare.access.group: "{{ flexget_dockflare_access_group }}"
          dockflare.hostname: "{{ flexget_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ flexget_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ flexget_homepage_group }}"
          homepage.icon: "{{ flexget_homepage_icon }}"
          homepage.href: "{{ flexget_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ flexget_port_http }}"
          homepage.description: "{{ 'FlexGet is a multipurpose automation tool for content like torrents, nzbs, podcasts, comics, series, movies, etc.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ flexget_container_name }}"
          homepage.showStats: "{{ flexget_homepage_showStats }}"
          traefik.enable: "{{ flexget_available_externally | string }}"
          traefik.http.routers.flexget.rule: "Host(`flexget.{{ ansible_nas_domain }}`)"
          traefik.http.routers.flexget.tls.certresolver: "letsencrypt"
          traefik.http.routers.flexget.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.flexget.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ flexget_hostname }}"
          traefik.http.routers.flexget.middlewares: "{{ flexget_hostname }}@docker"
          traefik.http.middlewares.flexget.IPAllowList.sourcerange: "{{ flexget_traefik_whitelist }}"
          traefik.http.services.flexget.loadbalancer.server.port: "5050"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/wiserain/flexget"
        cpu_shares: "{{ flexget_cpu_shares }}"
        memory: "{{ flexget_memory }}"
        restart_policy: unless-stopped
  when: flexget_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ flexget_container_name }}"
        state: absent
  when: flexget_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ flexget_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ flexget_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: flexget_enabled is false and archive_app_data_enabled is true
