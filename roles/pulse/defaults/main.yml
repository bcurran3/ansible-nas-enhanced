---
# ANE
pulse_proper_name: "Pulse"
pulse_enabled: false
pulse_traefik_enabled: false
pulse_traefik_whitelist: "{{ lan }}"

# directories
pulse_data_directory: "{{ docker_home }}/pulse"

# docker
pulse_container_name: "pulse"
pulse_image_name: "ghcr.io/rcourtman/pulse"
pulse_image_tag: "latest"

# app
pulse_env_discovery_subnet: "192.168.1.0/24"

# network
pulse_port_http: "7655"
pulse_hostname: "pulse"

# specs
pulse_cpu_shares: 1024
pulse_memory: "512M"
pulse_memory_swap: -1

# autoheal
pulse_autoheal_enabled: false

# dockflare
pulse_dockflare_enabled: false
pulse_dockflare_access_group: ""

# homepage
pulse_homepage_group: "Apps"
pulse_homepage_icon: "pulse.png"
pulse_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ pulse_port_http }}"
pulse_homepage_showstats: false

# repliqate
pulse_repliqate_enabled: false
pulse_repliqate_engine: "restic"
pulse_repliqate_schedule: "@daily 3am"
pulse_repliqate_backup_id: "{{ pulse_container_name }}"
pulse_repliqate_retention: "30d"

# tinyauth
pulse_tinyauth_enabled: false

# watchtower
pulse_watchtower_enabled: false
