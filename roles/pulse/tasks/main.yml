---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "1000"
        group: "1000"
      with_items:
        - "{{ pulse_data_directory }}"
        - "{{ pulse_data_directory }}/data"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        pulse_homepage_href: "https://{{ pulse_hostname }}.{{ ansible_nas_domain }}"
      when: pulse_traefik_enabled | bool or pulse_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ pulse_container_name }}"
        hostname: "{{ pulse_container_name }}"
        image: "{{ pulse_image_name }}:{{ pulse_image_tag }}"
        pull: true
        volumes:
          - "{{ pulse_data_directory }}/data:/data"
        ports:
          - "{{ pulse_port_http }}:{{ pulse_port_http }}"
        env:
          ALLOWED_ORIGINS: "*"
          DISCOVERY_SUBNET: "{{ pulse_env_discovery_subnet }}"
          FRONTEND_PORT: "{{ pulse_port_http }}"
          PORT: "{{ pulse_port_http }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ pulse_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ pulse_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ pulse_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ pulse_dockflare_access_group }}"
          dockflare.hostname: "{{ pulse_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ pulse_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ pulse_homepage_group }}"
          homepage.icon: "{{ pulse_homepage_icon }}"
          homepage.href: "{{ pulse_homepage_href }}"
          homepage.description: "{{ 'A responsive monitoring application for Proxmox VE that displays real-time metrics across multiple nodes' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ pulse_container_name }}"
          homepage.showStats: "{{ pulse_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ pulse_port_http }}"
          repliqate.enabled: "{{ pulse_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ pulse_repliqate_engine }}"
          repliqate.schedule: "{{ pulse_repliqate_schedule }}"
          repliqate.backup_id: "{{ pulse_repliqate_backup_id }}"
          repliqate.retention: "{{ pulse_repliqate_retention }}"
          traefik.enable: "{{ pulse_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.pulse.rule: "Host(`{{ pulse_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.pulse.tls.certresolver: "letsencrypt"
          traefik.http.routers.pulse.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.pulse.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.pulse.middlewares: "{{ pulse_hostname }}@docker{{ ',tinyauth-auth@docker' if pulse_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.pulse.IPAllowList.sourcerange: "{{ pulse_traefik_whitelist }}"
          traefik.http.services.pulse.loadbalancer.server.port: "{{ pulse_port_http }}"
          wud.tag.include: '^v\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/rcourtman/pulse/pkgs/container/pulse"
        cpu_shares: "{{ pulse_cpu_shares }}"
        memory: "{{ pulse_memory }}"
        memory_swap: "{{ pulse_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (pulse_port_http | string)] +
                (['https://' + pulse_hostname + '.' + ansible_nas_domain] if (pulse_traefik_enabled is true or pulse_dockflare_enabled is true) else [])
              }}
  when: pulse_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ pulse_container_name }}"
        state: absent
  when: pulse_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ pulse_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - pulse_enabled is false