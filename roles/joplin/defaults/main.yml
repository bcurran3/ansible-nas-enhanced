---
# ANE
ansible_nas_app_name: "Joplin"
joplin_enabled: false
joplin_traefik_enabled: false
joplin_traefik_whitelist: "{{ lan }}"

# directories
joplin_data_directory: "{{ docker_home }}/joplin"

# network
joplin_hostname: "joplin"
joplin_port_http: "22300"

# docker
# there is a linuxserver.io image - maybe switch
joplin_container_name: "joplin"
joplin_image_name: "joplin/server"
joplin_image_tag: "latest"
joplin_db_container_name: "joplin-db"
joplin_db_image_name: "postgres"
joplin_db_image_tag: "16-alpine"

# specs
joplin_cpu_shares: 1024
joplin_memory: "1G"
joplin_memory_swap: -1
joplin_db_cpu_shares: 1024
joplin_db_memory: "1G"
joplin_db_memory_swap: "{{ joplin_db_memory }}"

# app
joplin_env_app_base_url: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ joplin_port_http }}"
joplin_env_postgres_password: "topsecret"
joplin_env_postgres_database: "joplin_db"
joplin_env_postgres_user: "joplin"
joplin_env_postgres_port: "5432"
joplin_env_mailer_enabled: "0" # 1 to enable
joplin_env_mailer_host: "" # smtp.{{ ansible_nas_domain }}
joplin_env_mailer_port: "" # 587
joplin_env_mailer_security: "" # starttls
joplin_env_mailer_auth_user: "" # your_email_address@{{ ansible_nas_domain }}
joplin_env_mailer_auth_password: ""
joplin_env_mailer_noreply_name: "" # JoplinServer
joplin_env_mailer_noreply_email: "" # noreply@{{ ansible_nas_domain }}

# autoheal
joplin_autoheal_enabled: false
joplin_db_autoheal_enabled: false

# dockflare
joplin_dockflare_enabled: false
joplin_dockflare_access_group: ""

# homepage
joplin_homepage_group: "Apps"
joplin_homepage_icon: "joplin.png"
joplin_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ joplin_port_http }}"
joplin_homepage_showstats: false
joplin_db_homepage_group: "DBs"
joplin_db_homepage_icon: "postgres.png"
joplin_db_homepage_href: "{{ joplin_homepage_href }}"
joplin_db_homepage_showstats: false

# repliqate
joplin_repliqate_enabled: false
joplin_repliqate_engine: "restic"
joplin_repliqate_schedule: "@daily 3am"
joplin_repliqate_backup_id: "{{ joplin_container_name }}"
joplin_repliqate_retention: "30d"
joplin_db_repliqate_enabled: false
joplin_db_repliqate_engine: "restic"
joplin_db_repliqate_schedule: "@daily 3am"
joplin_db_repliqate_backup_id: "{{ joplin_db_container_name }}"
joplin_db_repliqate_retention: "30d"

# tinyauth
joplin_tinyauth_enabled: false

# watchtower
joplin_watchtower_enabled: false
joplin_db_watchtower_enabled: false