---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ joplin_data_directory }}"
        - "{{ joplin_data_directory }}/db"

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ joplin_db_container_name }}"
        hostname: "{{ joplin_db_container_name }}"
        image: "{{ joplin_db_image_name }}:{{ joplin_db_image_tag }}"
        pull: true
        volumes:
          - "{{ joplin_data_directory }}/db:/var/lib/postgresql/data"
        env:
          POSTGRES_USER: "{{ joplin_env_postgres_user }}"
          POSTGRES_PASSWORD: "{{ joplin_env_postgres_password }}"
          POSTGRES_DB: "{{ joplin_env_postgres_database }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ joplin_db_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ joplin_db_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} PostgreSQL"
          homepage.group: "{{ joplin_db_homepage_group }}"
          homepage.icon: "{{ joplin_db_homepage_icon }}"
          homepage.href: "{{ joplin_homepage_href }}"
          homepage.description: "{{ 'PostgreSQL Database Management System' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ joplin_db_container_name }}"
          homepage.showStats: "{{ joplin_db_homepage_showstats }}"
          repliqate.enabled: "{{ joplin_db_repliqate_enabled }}"
          repliqate.engine: "{{ joplin_db_repliqate_engine }}"
          repliqate.schedule: "{{ joplin_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ joplin_db_repliqate_backup_id }}"
          repliqate.retention: "{{ joplin_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/postgres"
        cpu_shares: "{{ joplin_db_cpu_shares }}"
        memory: "{{ joplin_db_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ joplin_container_name }}"
        hostname: "{{ joplin_container_name }}"
        image: "{{ joplin_image_name }}:{{ joplin_image_tag }}"
        pull: true
        links:
          - "{{ joplin_db_container_name }}"
        ports:
          - "{{ joplin_port_http }}:22300"
        env:
          APP_PORT: "22300"
          APP_BASE_URL: "https://{{ joplin_hostname }}.{{ ansible_nas_domain }}"
          DB_CLIENT: "pg"
          MAILER_ENABLED: "{{ joplin_env_mailer_enabled }}"
          MAILER_HOST: "{{ joplin_env_mailer_host }}"
          MAILER_PORT: "{{ joplin_env_mailer_port }}"
          MAILER_SECURITY: "{{ joplin_env_mailer_security }}"
          MAILER_AUTH_USER: "{{ joplin_env_mailer_auth_user }}"
          MAILER_AUTH_PASSWORD: "{{ joplin_env_mailer_auth_password }}"
          MAILER_NOREPLY_NAME: "{{ joplin_env_mailer_noreply_name }}"
          MAILER_NOREPLY_EMAIL: "{{ joplin_env_mailer_noreply_email }}"
          POSTGRES_PASSWORD: "{{ joplin_env_postgres_password }}"
          POSTGRES_DATABASE: "{{ joplin_env_postgres_database }}"
          POSTGRES_CONNECTION_STRING: "postgresql://{{ joplin_env_postgres_user }}:{{ joplin_env_postgres_password }}@{{ joplin_db_container_name }}:{{ joplin_env_postgres_port }}/{{ joplin_env_postgres_database }}"
          POSTGRES_USER: "{{ joplin_env_postgres_user }}"
          POSTGRES_PORT: "{{ joplin_env_postgres_port }}"
          POSTGRES_HOST: "{{ joplin_db_container_name }}"
          TZ: "{{ ansible_nas_timezone }}"
        links:
          - "{{ joplin_db_container_name }}"
        labels:
          autoheal: "{{ joplin_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ joplin_watchtower_enable }}"
          dockflare.enable: "{{ joplin_dockflare_tunnel }}"
          dockflare.access.group: "{{ joplin_dockflare_access_group }}"
          dockflare.hostname: "{{ joplin_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ joplin_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ joplin_homepage_group }}"
          homepage.icon: "{{ joplin_homepage_icon }}"
          homepage.href: "{{ joplin_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ joplin_port_http }}"
          homepage.description: "{{ 'the privacy-focused note taking app with sync capabilities for Windows, macOS, Linux, Android and iOS.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ joplin_container_name }}"
          homepage.showStats: "{{ joplin_homepage_showstats }}"
          repliqate.enabled: "{{ joplin_repliqate_enabled }}"
          repliqate.engine: "{{ joplin_repliqate_engine }}"
          repliqate.schedule: "{{ joplin_repliqate_schedule }}"
          repliqate.backup_id: "{{ joplin_repliqate_backup_id }}"
          repliqate.retention: "{{ joplin_repliqate_retention }}"
          traefik.enable: "{{ joplin_available_externally | string }}"
          traefik.http.routers.joplin.rule: "Host(`{{ joplin_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.joplin.tls.certresolver: "letsencrypt"
          traefik.http.routers.joplin.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.joplin.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ joplin_hostname }}"
          traefik.http.routers.joplin.middlewares: "{{ joplin_hostname }}@docker"
          traefik.http.middlewares.joplin.IPAllowList.sourcerange: "{{ joplin_traefik_whitelist }}"
          traefik.http.services.joplin.loadbalancer.server.port: "22300"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/joplin/server"
        cpu_shares: "{{ joplin_cpu_shares }}"
        memory: "{{ joplin_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (joplin_port_http | string)] +
                (['https://' + joplin_hostname + '.' + ansible_nas_domain] if (joplin_available_externally is true or joplin_dockflare_tunnel is true) else [])
              }}
  when: joplin_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ joplin_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ joplin_db_container_name }}"
        state: absent
  when: joplin_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ joplin_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ joplin_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: joplin_enabled is false and archive_app_data_enabled is true
