---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ mosquitto_data_directory }}/config"
        - "{{ mosquitto_data_directory }}/data"
        - "{{ mosquitto_data_directory }}/log"

    - name: Copy {{ ansible_nas_app_name }} Template mosquitto.conf
      ansible.builtin.copy:
        src: mosquitto.conf
        dest: "{{ mosquitto_data_directory }}/config/mosquitto.conf"
      register: mosquitto_conf

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ mosquitto_container_name }}"
        hostname: "{{ mosquitto_container_name }}"
        image: "{{ mosquitto_image_name }}:{{ mosquitto_image_version }}"
        pull: true
        volumes:
          - "{{ mosquitto_data_directory }}/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:rw"
          - "{{ mosquitto_data_directory }}/data:/mosquitto/data:rw"
          - "{{ mosquitto_data_directory }}/log:/mosquitto/log:rw"
        ports:
          - "{{ mosquitto_port_a }}:1883"
          - "{{ mosquitto_port_b }}:9001"
        restart_policy: unless-stopped
        labels:
          autoheal: "{{ mosquitto_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ mosquitto_watchtower_monitor_only }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ mosquitto_homepage_group }}"
          homepage.icon: "{{ mosquitto_homepage_icon }}"
          homepage.description: "{{ 'An open source MQTT broker' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ mosquitto_container_name }}"
          homepage.showStats: "{{ mosquitto_homepage_showStats }}"
          traefik_enabled: "false"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://hub.docker.com/_/eclipse-mosquitto/tags/tag/$${major}.$${minor}.$${patch}"
        cpu_shares: "{{ mosquitto_cpu_shares }}"
        memory: "{{ mosquitto_memory }}"
        restart: "{{ mosquitto_conf is changed }}"
  when: mosquitto_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ mosquitto_container_name }}"
        state: absent
  when: mosquitto_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ mosquitto_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ mosquitto_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: mosquitto_enabled is false and archive_app_data_enabled is true
