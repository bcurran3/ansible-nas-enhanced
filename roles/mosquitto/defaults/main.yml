---
# ANE
ansible_nas_app_name: "Eclipse Mosquitto"
mosquitto_enabled: false
mosquitto_data_directory: "{{ docker_home }}/mosquitto"

# uid / gid
mosquitto_user_id: "0"
mosquitto_group_id: "0"

# network
mosquitto_port_a: "1883"
mosquitto_port_b: "9001"

# docker
mosquitto_container_name: "mosquitto"
mosquitto_image_name: "eclipse-mosquitto"
mosquitto_image_version: "latest"
mosquitto_cpu_shares: 1024

# specs
mosquitto_memory: 1g

# autoheal
mosquitto_autoheal: "false"

# homepage
mosquitto_homepage_group: "Misc"
mosquitto_homepage_icon: "mosquitto.png"
mosquitto_homepage_showstats: "false"

# watchtower
mosquitto_watchtower_enable: "false"