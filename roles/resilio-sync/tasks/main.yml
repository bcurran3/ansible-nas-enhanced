# https://hub.docker.com/r/linuxserver/resilio-sync
---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ resilio_sync_data_directory }}"
        - "{{ resilio_sync_data_directory }}/config"
        - "{{ resilio_sync_data_directory }}/downloads"
        - "{{ resilio_sync_data_directory }}/sync"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ resilio_sync_container_name }}"
        hostname: "{{ resilio_sync_container_name }}"
        image: "{{ resilio_sync_image_name }}:{{ resilio_sync_image_tag }}"
        pull: true
        cpu_shares: "{{ resilio_sync_cpu_shares }}"
        volumes:
          - "{{ resilio_sync_data_directory }}:/config"
          - "{{ resilio_sync_data_directory }}:/downloads"
          - "{{ resilio_sync_data_directory }}:/sync"
          - "/etc/timezone:/etc/timezone:ro"
        ports:
          - "{{ resilio_sync_port_http }}:8888"
          - "{{ resilio_sync_port_sync }}:55555"
        env:
          PUID: "{{ resilio_sync_puid }}"
          PGID: "{{ resilio_sync_pgid }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ resilio_sync_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ resilio_sync_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ resilio_sync_homepage_group }}"
          homepage.icon: "{{ resilio_sync_homepage_icon }}"
          homepage.href: "{{ resilio_sync_homepage_href }}"
          homepage.description: "{{ 'Personal file sync and share powered by P2P' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ resilio_sync_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ resilio_sync_container_name }}"
          homepage.showStats: "{{ resilio_sync_homepage_showStats }}"
          traefik.enable: "{{ resilio_sync_available_externally | string }}"
          traefik.http.routers.resilio_sync.rule: "Host(`{{ resilio_sync_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.resilio_sync.tls.certresolver: "letsencrypt"
          traefik.http.routers.resilio_sync.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.resilio_sync.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ resilio_sync_hostname }}"
          traefik.http.routers.resilio_sync.middlewares: "resilio_sync@docker"
          traefik.http.middlewares.resilio_sync.IPAllowList.sourcerange: "{{ resilio_sync_traefik_whitelist }}"
          traefik.http.services.resilio_sync.loadbalancer.server.port: "8888"
          resilio_sync.tag.include: '^\d+\.\d+\.\d+$$'
          resilio_sync.link.template: "https://github.com/linuxserver/docker-resilio-sync/releases/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ resilio_sync_memory }}"
        restart_policy: unless-stopped
  when: resilio_sync_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ resilio_sync_container_name }}"
        state: absent
  when: resilio_sync_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ resilio_sync_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ resilio_sync_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: resilio_sync_enabled is false and archive_app_data_enabled is true
