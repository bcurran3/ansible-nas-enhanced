---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create Couchpotato Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        # mode: 0755
      with_items:
        - "{{ couchpotato_data_directory }}"
        - "{{ couchpotato_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ couchpotato_container_name }}"
        hostname: "{{ couchpotato_container_name }}"
        image: "{{ couchpotato_image_name }}:{{ couchpotato_image_tag }}"
        pull: true
        volumes:
          - "{{ couchpotato_data_directory }}/config:/config:rw"
          - "{{ couchpotato_downloads_directory }}:/downloads:rw"
          - "{{ couchpotato_movies_directory }}:/movies:rw"
          - "{{ couchpotato_torrents_directory }}:/torrents:rw"
        ports:
          - "{{ couchpotato_port }}:5050"
        env:
          DOCKER_MODS: "{{ couchpotato_env_docker_mods }}"
          PUID: "{{ couchpotato_user_id }}"
          PGID: "{{ couchpotato_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ couchpotato_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ couchpotato_watchtower_monitor_only }}"
          dockflare.enable: "{{ couchpotato_dockflare_tunnel }}"
          dockflare.access.group: "{{ couchpotato_dockflare_access_group }}"
          dockflare.hostname: "{{ couchpotato_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ couchpotato_port }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ couchpotato_homepage_group }}"
          homepage.icon: "{{ couchpotato_homepage_icon }}"
          homepage.href: "{{ couchpotato_homepage_href }}"
          homepage.description: "{{ 'couchpotato description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ couchpotato_container_name }}"
          homepage.showStats: "{{ couchpotato_homepage_showStats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ couchpotato_port }}"
          traefik.enable: "{{ couchpotato_available_externally | string }}"
          traefik.http.routers.couchpotato.rule: "Host(`couchpotato.{{ ansible_nas_domain }}`)"
          traefik.http.routers.couchpotato.tls.certresolver: "letsencrypt"
          traefik.http.routers.couchpotato.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.couchpotato.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ couchpotato_hostname }}"
          traefik.http.routers.couchpotato.middlewares: "{{ couchpotato_hostname }}@docker"
          traefik.http.middlewares.couchpotato.IPAllowList.sourcerange: "{{ couchpotato_traefik_whitelist }}"
          traefik.http.services.couchpotato.loadbalancer.server.port: "5050"
          wud.watch.digest: "true"
          wud.link.template: "lscr.io/linuxserver/couchpotato"
        cpu_shares: "{{ couchpotato_cpu_shares }}"
        memory: "{{ couchpotato_memory }}"
        restart_policy: unless-stopped
  when: couchpotato_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ couchpotato_container_name }}"
        state: absent
  when: couchpotato_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ couchpotato_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ couchpotato_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: couchpotato_enabled is false and archive_app_data_enabled is true
