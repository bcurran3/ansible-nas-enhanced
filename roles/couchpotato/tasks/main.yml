---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ couchpotato_data_directory }}"
        - "{{ couchpotato_data_directory }}/config"
        - "{{ couchpotato_downloads_directory }}"
        - "{{ couchpotato_movies_directory }}"
        - "{{ couchpotato_torrents_directory }}"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        couchpotato_homepage_href: "https://{{ couchpotato_hostname }}.{{ ansible_nas_domain }}"
      when: couchpotato_traefik_enabled | bool or couchpotato_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ couchpotato_container_name }}"
        hostname: "{{ couchpotato_container_name }}"
        image: "{{ couchpotato_image_name }}:{{ couchpotato_image_tag }}"
        pull: true
        volumes:
          - "{{ couchpotato_data_directory }}/config:/config:rw"
          - "{{ couchpotato_downloads_directory }}:/downloads:rw"
          - "{{ couchpotato_movies_directory }}:/movies:rw"
          - "{{ couchpotato_torrents_directory }}:/torrents:rw"
        ports:
          - "{{ couchpotato_port_http }}:5050"
        env:
          DOCKER_MODS: "{{ couchpotato_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ couchpotato_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ couchpotato_env_docker_mods_install_pip_packages}}"
          PUID: "{{ couchpotato_user_id }}"
          PGID: "{{ couchpotato_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ couchpotato_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ couchpotato_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ couchpotato_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ couchpotato_dockflare_access_group }}"
          dockflare.hostname: "{{ couchpotato_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ couchpotato_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ couchpotato_homepage_group }}"
          homepage.icon: "{{ couchpotato_homepage_icon }}"
          homepage.href: "{{ couchpotato_homepage_href }}"
          homepage.description: "{{ 'couchpotato description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ couchpotato_container_name }}"
          homepage.showStats: "{{ couchpotato_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ couchpotato_port_http }}"
          repliqate.enabled: "{{ couchpotato_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ couchpotato_repliqate_engine }}"
          repliqate.schedule: "{{ couchpotato_repliqate_schedule }}"
          repliqate.backup_id: "{{ couchpotato_repliqate_backup_id }}"
          repliqate.retention: "{{ couchpotato_repliqate_retention }}"
          traefik.enable: "{{ couchpotato_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.couchpotato.rule: "Host(`{{ couchpotato_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.couchpotato.tls.certresolver: "letsencrypt"
          traefik.http.routers.couchpotato.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.couchpotato.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.couchpotato.middlewares: "couchpotato@docker{{ ',tinyauth-auth@docker' if couchpotato_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.couchpotato.IPAllowList.sourcerange: "{{ couchpotato_traefik_whitelist }}"
          traefik.http.services.couchpotato.loadbalancer.server.port: "5050"
          wud.watch.digest: "true"
          wud.link.template: "lscr.io/linuxserver/couchpotato"
        cpu_shares: "{{ couchpotato_cpu_shares }}"
        memory: "{{ couchpotato_memory }}"
        memory_swap: "{{ couchpotato_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (couchpotato_port_http | string)] +
                (['https://' + couchpotato_hostname + '.' + ansible_nas_domain] if (couchpotato_traefik_enabled is true or couchpotato_dockflare_enabled is true) else [])
              }}
  when: couchpotato_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ couchpotato_container_name }}"
        state: absent
  when: couchpotato_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ couchpotato_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - couchpotato_enabled is false