---
ansible_nas_app_name: "CouchPotato"

couchpotato_enabled: false
couchpotato_available_externally: false
couchpotato_traefik_whitelist: "{{ lan }}"

# directories
couchpotato_data_directory: "{{ docker_home }}/couchpotato"
couchpotato_movies_directory: "{{ movies_root }}"
couchpotato_downloads_directory: "{{ downloads_root }}"
couchpotato_torrents_directory: "{{ torrents_root }}"

# uid / gid
couchpotato_user_id: "0"
couchpotato_group_id: "0"

# network
couchpotato_port: "5050"

# specs
couchpotato_memory: 1g

# docker
couchpotato_container_name: couchpotato
couchpotato_cpu_shares: 1024
couchpotato_image_name: "linuxserver/couchpotato"
couchpotato_image_tag: "latest"

# autoheal
couchpotato_autoheal: "false"

# homepage
couchpotato_homepage_group: "Apps"
couchpotato_homepage_icon: "couchpotato.png"
couchpotato_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ couchpotato_port }}"
couchpotato_homepage_showStats: "false"

# watchtower
couchpotato_watchtower_monitor_only: "true"