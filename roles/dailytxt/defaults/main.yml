---
# ANE
dailytxt_proper_name: "DailyTxT"
dailytxt_enabled: false
dailytxt_traefik_enabled: false
dailytxt_traefik_whitelist: "{{ lan }}"

# directories
dailytxt_data_directory: "{{ docker_home }}/dailytxt"

# network
dailytxt_hostname: "dailytxt"
dailytxt_port_http: "8766"

# docker
dailytxt_container_name: "dailytxt"
dailytxt_image_name: "phitux/dailytxt"
dailytxt_image_tag: "latest"

# specs
dailytxt_cpu_shares: 1024
dailytxt_memory: "512M"
dailytxt_memory_swap: -1

# app
dailytxt_env_admin_password: "{{ ansible_nas_app_admin_password }}"
dailytxt_env_allow_registration: "true"
dailytxt_env_data_indent: "2"
dailytxt_env_jwt_exp_days: "30"
dailytxt_env_logout_after_days: "30"
dailytxt_env_secret_key: "N2HnBPOjMbouxti1lx2iR5Uz40WyjBDVk1w2GLHM2aA="

# autoheal
dailytxt_autoheal_enabled: false

# dockflare
dailytxt_dockflare_enabled: false
dailytxt_dockflare_access_group: ""

# healthcheck
dailytxt_healthcheck_interval: 30s
dailytxt_healthcheck_timeout: 5s
dailytxt_healthcheck_retries: 3
dailytxt_healthcheck_start_period: 15s

# homepage
dailytxt_homepage_group: "Apps"
dailytxt_homepage_icon: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ dailytxt_port_http }}/icons/icon-512.png"
dailytxt_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ dailytxt_port_http }}"
dailytxt_homepage_showstats: false

# repliqate
dailytxt_repliqate_enabled: false
dailytxt_repliqate_engine: "restic"
dailytxt_repliqate_schedule: "@daily 3am"
dailytxt_repliqate_backup_id: "{{ dailytxt_container_name }}"
dailytxt_repliqate_retention: "30d"

# tinyauth
dailytxt_tinyauth_enabled: false

# watchtower
dailytxt_watchtower_enabled: false