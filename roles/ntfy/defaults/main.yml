---
# ANE
ansible_nas_app_name: "ntfy"
ntfy_enabled: false
ntfy_traefik_enabled: false
ntfy_traefik_whitelist: "{{ lan }}"
ntfy_data_directory: "{{ docker_home }}/ntfy"

# network
ntfy_hostname: "ntfy"
ntfy_port_http: "3018"

# docker
ntfy_container_name: "ntfy"
ntfy_image_name: "binwiederhier/ntfy"
ntfy_image_tag: "latest"

# specs
ntfy_cpu_shares: 1024
ntfy_memory: "1G"
ntfy_memory_swap: -1

# autoheal
ntfy_autoheal_enabled: false

# dockflare
ntfy_dockflare_enabled: false
ntfy_dockflare_access_group: ""

# homepage
ntfy_homepage_group: "Apps"
ntfy_homepage_icon: "ntfy.png"
ntfy_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ ntfy_port_http }}"
ntfy_homepage_showstats: false

# repliqate
ntfy_repliqate_enabled: false
ntfy_repliqate_engine: "restic"
ntfy_repliqate_schedule: "@daily 3am"
ntfy_repliqate_backup_id: "{{ ntfy_container_name }}"
ntfy_repliqate_retention: "30d"

# tinyauth
ntfy_tinyauth_enabled: false

# watchtower
ntfy_watchtower_enabled: false