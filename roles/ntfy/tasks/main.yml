---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ ntfy_data_directory }}"
        - "{{ ntfy_data_directory }}/cache"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        ntfy_homepage_href: "https://{{ ntfy_hostname }}.{{ ansible_nas_domain }}"
      when: ntfy_traefik_enabled | bool or ntfy_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ ntfy_container_name }}"
        hostname: "{{ ntfy_container_name }}"
        image: "{{ ntfy_image_name }}:{{ ntfy_image_tag }}"
        pull: true
        command: "serve"
        ports:
          - "{{ ntfy_port_http }}:80"
        volumes:
          - "{{ ntfy_data_directory }}/cache:/var/cache/ntfy"
        network_mode: bridge
        env:
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
            test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1"]
            interval: 60s
            timeout: 10s
            retries: 3
            start_period: 40s
        labels:
          autoheal: "{{ ntfy_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ ntfy_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ ntfy_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ ntfy_dockflare_access_group }}"
          dockflare.hostname: "{{ ntfy_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ ntfy_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ ntfy_homepage_group }}"
          homepage.icon: "{{ ntfy_homepage_icon }}"
          homepage.href: "{{ ntfy_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ ntfy_port_http }}"
          homepage.description: "{{ 'Send push notifications to your phone or desktop using PUT/POST' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ ntfy_container_name }}"
          homepage.showStats: "{{ ntfy_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ ntfy_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ ntfy_repliqate_engine }}"
          repliqate.schedule: "{{ ntfy_repliqate_schedule }}"
          repliqate.backup_id: "{{ ntfy_repliqate_backup_id }}"
          repliqate.retention: "{{ ntfy_repliqate_retention }}"
          traefik.enable: "{{ ntfy_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.ntfy.rule: "Host(`{{ ntfy_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.ntfy.tls.certresolver: "letsencrypt"
          traefik.http.routers.ntfy.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.ntfy.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.ntfy.middlewares: "ntfy@docker{{ ',tinyauth-auth@docker' if ntfy_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.ntfy.IPAllowList.sourcerange: "{{ ntfy_traefik_whitelist }}"
          traefik.http.services.ntfy.loadbalancer.server.port: "80"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/binwiederhier/ntfy"
        cpu_shares: "{{ ntfy_cpu_shares }}"
        memory: "{{ ntfy_memory }}"
        memory_swap: "{{ ntfy_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (ntfy_port_http | string)] +
                (['https://' + ntfy_hostname + '.' + ansible_nas_domain] if (ntfy_traefik_enabled is true or ntfy_dockflare_enabled is true) else [])
              }}
  when: ntfy_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ ntfy_container_name }}"
        state: absent
  when: ntfy_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ ntfy_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - ntfy_enabled is false