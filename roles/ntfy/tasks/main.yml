---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ ntfy_data_directory }}"
        - "{{ ntfy_data_directory }}/cache"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ ntfy_container_name }}"
        hostname: "{{ ntfy_container_name }}"
        image: "{{ ntfy_image_name }}:{{ ntfy_image_tag }}"
        pull: true
        command: "serve"
        ports:
          - "{{ ntfy_port_http }}:80"
        volumes:
          - "{{ ntfy_data_directory }}/cache:/var/cache/ntfy"
        network_mode: bridge
        env:
          TZ: "{{ ansible_nas_timezone }}"
#        healthcheck: # optional: remember to adapt the host:port to your environment
#            test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1"]
#            interval: 60s
#            timeout: 10s
#            retries: 3
#            start_period: 40s
        labels:
          autoheal: "{{ ntfy_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ ntfy_watchtower_enable }}"
          dockflare.enable: "{{ ntfy_dockflare_tunnel }}"
          dockflare.access.group: "{{ ntfy_dockflare_access_group }}"
          dockflare.hostname: "{{ ntfy_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ ntfy_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ ntfy_homepage_group }}"
          homepage.icon: "{{ ntfy_homepage_icon }}"
          homepage.href: "{{ ntfy_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ ntfy_port_http }}"
          homepage.description: "{{ 'Send push notifications to your phone or desktop using PUT/POST' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ ntfy_container_name }}"
          homepage.showStats: "{{ ntfy_homepage_showstats }}"
          traefik.enable: "{{ ntfy_available_externally | string }}"
          traefik.http.routers.ntfy.rule: "Host(`{{ ntfy_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.ntfy.tls.certresolver: "letsencrypt"
          traefik.http.routers.ntfy.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.ntfy.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ ntfy_hostname }}"
          traefik.http.routers.ntfy.middlewares: "{{ ntfy_hostname }}@docker"
          traefik.http.middlewares.ntfy.IPAllowList.sourcerange: "{{ ntfy_traefik_whitelist }}"
          traefik.http.services.ntfy.loadbalancer.server.port: "80"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/binwiederhier/ntfy"
        cpu_shares: "{{ ntfy_cpu_shares }}"
        memory: "{{ ntfy_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (ntfy_port_http | string)] +
                (['https://' + ntfy_hostname + '.' + ansible_nas_domain] if (ntfy_available_externally is true or ntfy_dockflare_tunnel is true) else [])
              }}
  when: ntfy_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ ntfy_container_name }}"
        state: absent
  when: ntfy_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ ntfy_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ ntfy_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: ntfy_enabled is false and archive_app_data_enabled is true
