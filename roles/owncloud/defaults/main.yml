---
# ANE
ansible_nas_app_name: "ownCloud Server"
owncloud_enabled: false
owncloud_traefik_enabled: false
owncloud_traefik_whitelist: "{{ lan }}"

# directories
owncloud_data_directory: "{{ docker_home }}/owncloud"

# docker
owncloud_container_name: "owncloud"
owncloud_image_name: "owncloud/server"
owncloud_image_tag: "latest"
owncloud_db_container_name: "owncloud-db"
owncloud_db_image_name: "mariadb"
owncloud_db_image_tag: "10.11"
owncloud_redis_container_name: "owncloud-redis"
owncloud_redis_image_name: "redis"
owncloud_redis_image_tag: "6"

# uid / gid
owncloud_user_id: "0"
owncloud_group_id: "0"

# network
owncloud_port_http: "3034"
owncloud_hostname: "owncloud"

# specs
owncloud_cpu_shares: 1024
owncloud_memory: "1G"
owncloud_memory_swap: -1
owncloud_db_cpu_shares: 1024
owncloud_db_memory: "1G"
owncloud_db_memory_swap: "{{ owncloud_db_memory }}"
owncloud_redis_cpu_shares: 1024
owncloud_redis_memory: "128M"
owncloud_redis_memory_swap: "{{ owncloud_redis_memory }}"

# app
owncloud_env_owncloud_domain: "{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ owncloud_port_http }}"
owncloud_env_owncloud_trusted_domains: "localhost, {{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}, {{ owncloud_hostname }}.{{ ansible_nas_domain }}"
owncloud_env_owncloud_db_name: "owncloud_db"
owncloud_env_owncloud_db_username: "owncloud"
owncloud_env_owncloud_db_password: "topsecret"
owncloud_env_owncloud_admin_username: "admin" # ADMIN_USERNAME and ADMIN_PASSWORD will not change between deploys even if you change the values
owncloud_env_owncloud_admin_password: "{{ ansible_nas_app_admin_password }}"
owncloud_env_owncloud_mysql_utf8mb4: "true"
owncloud_env_owncloud_redis_enabled: "true"
owncloud_db_env_mysql_root_password: "topsecretroot"
owncloud_db_env_mariadb_auto_upgrade: "1"

# autoheal
owncloud_autoheal_enabled: false
owncloud_db_autoheal_enabled: false
owncloud_redis_autoheal_enabled: false

# dockflare
owncloud_dockflare_enabled: false
owncloud_dockflare_access_group: ""

# homepage
owncloud_homepage_group: "Apps"
owncloud_homepage_icon: "owncloud.png"
owncloud_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ owncloud_port_http }}"
owncloud_homepage_showstats: false
owncloud_db_homepage_group: "DBs"
owncloud_db_homepage_icon: "mariadb.png"
owncloud_db_homepage_href: "{{ owncloud_homepage_href }}"
owncloud_db_homepage_showstats: false
owncloud_redis_homepage_group: "DBs"
owncloud_redis_homepage_icon: "redis.png"
owncloud_redis_homepage_href: "{{ owncloud_homepage_href }}"
owncloud_redis_homepage_showstats: false

# repliqate
owncloud_repliqate_enabled: false
owncloud_repliqate_engine: "restic"
owncloud_repliqate_schedule: "@daily 3am"
owncloud_repliqate_backup_id: "owncloud"
owncloud_repliqate_retention: "30d"
owncloud_db_repliqate_enabled: false
owncloud_db_repliqate_engine: "restic"
owncloud_db_repliqate_schedule: "@daily 3am"
owncloud_db_repliqate_backup_id: "owncloud"
owncloud_db_repliqate_retention: "30d"
owncloud_redis_repliqate_enabled: false
owncloud_redis_repliqate_engine: "restic"
owncloud_redis_repliqate_schedule: "@daily 3am"
owncloud_redis_repliqate_backup_id: "owncloud"
owncloud_redis_repliqate_retention: "30d"

# tinyauth
owncloud_tinyauth_enabled: false

# watchtower
owncloud_watchtower_enabled: false
owncloud_db_watchtower_enabled: false
owncloud_redis_watchtower_enabled: false
