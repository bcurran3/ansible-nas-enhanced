---
### WORK IN PROGRESS
# https://github.com/bitbound/ControlR
# https://github.com/bitbound/ControlR/blob/main/docker-compose/docker-compose.yml

# These values need to be set.  You can either define these environment variables
# on the host or supply them here directly as string literals.
# x-postgres-user: &pgUser ${ControlR_POSTGRES_USER:?error}
# x-postgres-password: &pgPassword ${ControlR_POSTGRES_PASSWORD:?error}
# x-aspire-browser-token: &aspireToken ${ControlR_ASPIRE_BROWSER_TOKEN:?error}
# I'm not sure why this is in it's own network

- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ controlr_data_directory }}"
        - "{{ controlr_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }} network
      community.docker.docker_network:
        name: "{{ controlr_network_name }}"
        ipam_config:
          - subnet: "{{ controlr_network_subnet }}"

    - name: Create {{ ansible_nas_app_name }} Aspire Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ controlr_aspire_container_name }}"
        hostname: "{{ controlr_aspire_container_name }}"
        image: "{{ controlr_aspire_image_name }}:{{ controlr_aspire_image_tag }}"
        pull: true
        ports:
          - "18888:18888"
        networks:                                  # optional
          - name: "{{ controlr_network_name }}"     # optional
        network_mode: "{{ controlr_network_name }}" # optional
        networks_cli_compatible: "yes"             # optional
        env:
          DOTNET_DASHBOARD_OTLP_ENDPOINT_URL: "http://aspire:18889"
          Dashboard__Frontend__BrowserToken: "aspireToken"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ controlr_aspire_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ controlr_aspire_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }} Aspire"
          homepage.group: "{{ controlr_aspire_homepage_group }}"
          homepage.icon: "{{ controlr_aspire_homepage_icon }}"
          homepage.href: "{{ controlr_homepage_href }}"
          homepage.description: "{{ 'Aspire' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ controlr_aspire_container_name }}"
          homepage.showStats: "{{ controlr_aspire_homepage_showStats }}"
          traefik.enable: "false"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://hub.docker.com/_/postgres/tag/$${major}.$${minor}.$${patch}"
#         ^ needs to be updated
        cpu_shares: "{{ controlr_aspire_cpu_shares }}"
        memory: "{{ controlr_aspire_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} PostgreSQL Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ controlr_db_container_name }}"
        hostname: "{{ controlr_db_container_name }}"
        image: "{{ controlr_db_image_name }}:{{ controlr_db_image_tag }}"
        pull: true
        networks:                                  # optional
          - name: "{{ controlr_network_name }}"     # optional
        network_mode: "{{ controlr_network_name }}" # optional
        networks_cli_compatible: "yes"             # optional
        volumes:
          - "{{ controlr_data_directory }}/db:/var/lib/postgresql/data"
        env:
          POSTGRES_USER: "controlr"
          POSTGRES_PASSWORD: "controlr"
          POSTGRES_DB: "controlr"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ controlr_db_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ controlr_db_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }} PostgreSQL"
          homepage.group: "{{ controlr_db_homepage_group }}"
          homepage.icon: "{{ controlr_db_homepage_icon }}"
          homepage.href: "{{ controlr_homepage_href }}"
          homepage.description: "{{ 'PostgreSQL Database Management System' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ controlr_db_container_name }}"
          homepage.showStats: "{{ controlr_db_homepage_showStats }}"
          traefik.enable: "false"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://hub.docker.com/_/postgres/tag/$${major}.$${minor}.$${patch}"
#         ^ needs to be updated
        cpu_shares: "{{ controlr_db_cpu_shares }}"
        memory: "{{ controlr_db_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ controlr_container_name }}"
        hostname: "{{ controlr_container_name }}"
        image: "{{ controlr_image_name }}:{{ controlr_image_tag }}"
        pull: true
        networks:
          - name: "{{ controlr_network_name }}"
        networks_cli_compatible: "yes"
        network_mode: "bridge"
        ports:
          - "{{ controlr_port_http }}:{{ controlr_port_http }}"
        volumes:
          - "{{ controlr_data_directory }}/data:/app/AppData"
        env:
          # ASPNETCORE variables should *not* be changed.
          ASPNETCORE_ENVIRONMENT: Production
          ASPNETCORE_HTTP_PORTS: "{{ controlr_port_http }}"

          ControlR_POSTGRES_USER: "controlr"
          ControlR_POSTGRES_PASSWORD: "controlr"
          ControlR_POSTGRES_HOST: "{{ controlr_db_container_name }}"

          # Whether to make self-registration publicly available.
          ControlR_AppOptions__EnablePublicRegistration: false

          # Allows devices to self-register without requiring an installer key.
          ControlR_AppOptions__AllowAgentsToSelfBootstrap: false

          # Automatically obtain Cloudflare IPs from https://www.cloudflare.com/ips-v4
          # and add them to the KnownNetworks list for forwarded headers.
          ControlR_AppOptions__EnableCloudflareProxySupport: false

          # Add an OTLP endpoint URL to enable exporting of OpenTelemetry data to an OTLP endpoint.
          ControlR_OTLP_ENDPOINT_URL: "http://aspire:18889"

          # Set the minimum level for logs sent to OTLP exporter and/or Azure Monitor.
          ControlR_Logging__LogLevel__Default: "Information"

          # Whether to add HTTP logging services.
          # https://learn.microsoft.com/en-us/aspnet/core/fundamentals/http-logging
          ControlR_AppOptions__UseHttpLogging: "false"

          # The Gateway IP here must match the IP address in the above controlr network gateway.
          ControlR_AppOptions__DockerGatewayIp: "172.29.0.1"

          ControlR_AppOptions__ServerBaseUri: "http://localhost:{{ controlr_port_http }}"

          ControlR_AppOptions__RequireUserEmailConfirmation: "true"
          ControlR_AppOptions__SmtpDisplayName: ""
          ControlR_AppOptions__SmtpEmail: ""
          ControlR_AppOptions__SmtpHost: ""
          ControlR_AppOptions__SmtpLocalDomain: ""
          ControlR_AppOptions__SmtpCheckCertificateRevocation: "true"
          ControlR_AppOptions__SmtpPassword: ""
          ControlR_AppOptions__SmtpPort: "587"
          ControlR_AppOptions__SmtpUserName: ""

          # Uncomment and add an entry for each proxy that will be forwarding traffic
          # to ControlR.  The app will not work correctly if this isn't done or if the
          # forwarded headers are not in the correct format.
          # See the docs for more details:
          # https://learn.microsoft.com/en-us/aspnet/core/host-and-deploy/proxy-load-balancer
          #ControlR_AppOptions__KnownProxies__0:

          #ControlR_AppOptions__KnownNetworks__0:

          # If enabled, ControlR will attempt to use geolocation APIs to determine
          # the closest relay server to the viewer when starting a remote control
          # session.  Otherwise, the local server will be used.
          ControlR_AppOptions__UseExternalWebSocketRelay: "false"
          #ControlR_AppOptions__ExternalWebSocketHosts__0__Label:
          #ControlR_AppOptions__ExternalWebSocketHosts__0__Origin:
          #ControlR_AppOptions__ExternalWebSocketHosts__0__Latitude:
          #ControlR_AppOptions__ExternalWebSocketHosts__0__Longitude:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ controlr_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ controlr_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ controlr_homepage_group }}"
          homepage.icon: "{{ controlr_homepage_icon }}"
          homepage.href: "{{ controlr_homepage_href }}"
          homepage.description: "{{ 'Open-source, self-hostable remote control and remote access.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ controlr_container_name }}"
          homepage.showStats: "{{ controlr_homepage_showStats }}"
          traefik.enable: "{{ controlr_available_externally | string }}"
          traefik.http.routers.controlr.rule: "Host(`{{ controlr_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.controlr.tls.certresolver: "letsencrypt"
          traefik.http.routers.controlr.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.controlr.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ controlr_hostname }}"
          traefik.http.routers.controlr.middlewares: "{{ controlr_hostname }}@docker"
          traefik.http.middlewares.controlr.IPAllowList.sourcerange: "{{ controlr_traefik_whitelist }}"
          traefik.http.services.controlr.loadbalancer.server.port: "{{ controlr_port_http }}"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/bitbound/ControlR/releases/tag/$${major}.$${minor}.$${patch}"
        cpu_shares: "{{ controlr_cpu_shares }}"
        memory: "{{ controlr_memory }}"
        restart_policy: unless-stopped
  when: controlr_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ controlr_container_name }}"
        state: absent

    - name: Delete {{ ansible_nas_app_name }} Network
      community.docker.docker_network:
        name: "{{ controlr_network_name }}"
        state: absent
  when: controlr_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ controlr_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ controlr_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: controlr_enabled is false and archive_app_data_enabled is true
