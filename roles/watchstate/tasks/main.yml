---
- name: Start {{ watchstate_proper_name }}
  block:
    - name: Create {{ watchstate_proper_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ watchstate_user_id }}"
        group: "{{ watchstate_group_id }}"
        mode: 0775
      with_items:
        - "{{ watchstate_data_directory }}"
        - "{{ watchstate_data_directory }}/config"

    - name: Set {{ watchstate_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        watchstate_homepage_href: "https://{{ watchstate_hostname }}.{{ ansible_nas_domain }}"
      when: watchstate_traefik_enabled | bool or watchstate_dockflare_enabled | bool

    - name: Create {{ watchstate_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ watchstate_container_name }}"
        hostname: "{{ watchstate_container_name }}"
        image: "{{ watchstate_image_name }}:{{ watchstate_image_tag }}"
        pull: true
        user: "{{ watchstate_user_id }}:{{ watchstate_group_id }}"
        volumes:
          - "{{ watchstate_data_directory }}/config:/config"
        ports:
          - "{{ watchstate_port_http }}:8080"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ watchstate_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ watchstate_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ watchstate_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ watchstate_dockflare_access_group }}"
          dockflare.hostname: "{{ watchstate_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ watchstate_port_http }}"
          homepage.name: "{{ watchstate_proper_name }}"
          homepage.group: "{{ watchstate_homepage_group }}"
          homepage.icon: "{{ watchstate_homepage_icon }}"
          homepage.href: "{{ watchstate_homepage_href }}"
          homepage.description: "{{ 'Self-hosted service to sync your plex, jellyfin and emby play state.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ watchstate_container_name }}"
          homepage.showStats: "{{ watchstate_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ watchstate_port_http }}"
          repliqate.enabled: "{{ watchstate_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ watchstate_repliqate_engine }}"
          repliqate.schedule: "{{ watchstate_repliqate_schedule }}"
          repliqate.backup_id: "{{ watchstate_repliqate_backup_id }}"
          repliqate.retention: "{{ watchstate_repliqate_retention }}"
          traefik.enable: "{{ watchstate_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.watchstate.rule: "Host(`{{ watchstate_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.watchstate.tls.certresolver: "letsencrypt"
          traefik.http.routers.watchstate.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.watchstate.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.watchstate.middlewares: "watchstate@docker{{ ',tinyauth-auth@docker' if watchstate_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.watchstate.IPAllowList.sourcerange: "{{ watchstate_traefik_whitelist }}"
          traefik.http.services.watchstate.loadbalancer.server.port: "8080"
          wud.tag.include: '^v\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/ArabCoders/watchstate/pkgs/container/watchstate"
        cpu_shares: "{{ watchstate_cpu_shares }}"
        memory: "{{ watchstate_memory }}"
        memory_swap: "{{ watchstate_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ watchstate_proper_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (watchstate_port_http | string)] +
                (['https://' + watchstate_hostname + '.' + ansible_nas_domain] if (watchstate_traefik_enabled is true or watchstate_dockflare_enabled is true) else [])
              }}
  when: watchstate_enabled is true

- name: Stop {{ watchstate_proper_name }}
  block:
    - name: Stop {{ watchstate_proper_name }} Container
      community.docker.docker_container:
        name: "{{ watchstate_container_name }}"
        state: absent
  when: watchstate_enabled is false

- name: Data Archive {{ watchstate_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ watchstate_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - watchstate_enabled is false