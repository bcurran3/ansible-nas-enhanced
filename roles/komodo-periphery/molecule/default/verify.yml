---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Get {{ komodo_periphery_proper_name }} container state
      community.docker.docker_container:
        name: "{{ komodo_periphery_container_name }}"
      register: result_periphery

    - name: Check if {{ komodo_periphery_proper_name }} container is running
      ansible.builtin.assert:
        that:
          - result_periphery.container['State']['Status'] == "running"
          - result_periphery.container['State']['Restarting'] == false
