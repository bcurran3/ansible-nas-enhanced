---
# ANE
ansible_nas_app_name: "Webtop"
webtop_enabled: false
webtop_traefik_enabled: false
webtop_traefik_whitelist: "{{ lan }}"
webtop_data_directory: "{{ docker_home }}/webtop"

webtop_user_id: "1000"
webtop_group_id: "1000"
webtop_umask: "000"

# network
webtop_hostname: "webtop"
webtop_port_http: "3058"
webtop_port_https: "3059"

# docker
webtop_container_name: "webtop"
webtop_image_name: "lscr.io/linuxserver/webtop"
webtop_image_tag: "latest"

# specs
webtop_cpu_shares: 1024
# Minimum (Idle/Light Desktop): 1 GB (Alpine/XFCE versions).
# Recommended (Standard): 2 GB – 4 GB (Essential for modern web browsing inside the container).
# Performance (Heavy Apps): 4 GB – 8 GB+.
webtop_memory: "2G"

# app
# https://docs.linuxserver.io/images/docker-webtop/#optional-environment-variables
webtop_env_keyboard: "en-us-qwerty"
webtop_env_subfolder: "/"
webtop_env_custom_user: "{{ ansible_nas_user }}"
webtop_env_password: "{{ ansible_nas_app_admin_password }}"
webtop_env_disable_open_tools: "false"
webtop_env_disable_sudo: "false"
webtop_env_disable_terminals: "false"
webtop_env_disable_close_button: "false"
webtop_env_disable_mouse_buttons: "false"
webtop_env_disable_harden_keybinds: "false"
webtop_env_disable_restart_app: "false"

# autoheal
webtop_autoheal_enabled: false

# dockflare
webtop_dockflare_enabled: false
webtop_dockflare_access_group: ""

# homepage
webtop_homepage_group: "Apps"
webtop_homepage_icon: "webtop.png"
webtop_homepage_href: "https://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ webtop_port_https }}"
webtop_homepage_showstats: false

# linuxserver.io docker mods
webtop_env_docker_mods: ""
webtop_env_docker_mods_install_packages: ""
webtop_env_docker_mods_install_pip_packages: ""

# repliqate
webtop_repliqate_enabled: false
webtop_repliqate_engine: "restic"
webtop_repliqate_schedule: "@daily 3am"
webtop_repliqate_backup_id: "{{ webtop_container_name }}"
webtop_repliqate_retention: "30d"

# tinyauth
webtop_tinyauth_enabled: false

# watchtower
webtop_watchtower_enabled: false

# webtop_image_tags:
# latest         XFCE Alpine
# debian-xfce    XFCE Debian
# el-xfce        XFCE Enterprise Linux
# ubuntu-xfce	   XFCE Ubuntu
# fedora-xfce	   XFCE Fedora
# arch-xfce	     XFCE Arch
# alpine-kde	   KDE Alpine
# debian-kde     KDE Debian
# ubuntu-kde	   KDE Ubuntu
# fedora-kde	   KDE Fedora
# arch-kde	     KDE Arch
# alpine-mate	   MATE Alpine
# debian-mate    MATE Debian
# el-mate        MATE Enterprise Linux
# ubuntu-mate	   MATE Ubuntu
# fedora-mate	   MATE Fedora
# arch-mate	     MATE Arch
# alpine-i3	     i3 Alpine
# debian-i3      i3 Debian
# el-i3          i3 Enterprise Linux
# ubuntu-i3	     i3 Ubuntu
# fedora-i3	     i3 Fedora
# arch-i3        i3 Arch
