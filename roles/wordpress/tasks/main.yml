---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ wordpress_data_directory }}"
        - "{{ wordpress_data_directory }}/db"
        - "{{ wordpress_data_directory }}/html"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        wordpress_homepage_href: "https://{{ wordpress_hostname }}.{{ ansible_nas_domain }}"
      when: wordpress_traefik_enabled | bool or wordpress_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ wordpress_db_container_name }}"
        hostname: "{{ wordpress_db_container_name }}"
        image: "{{ wordpress_db_image_name }}:{{ wordpress_db_image_tag }}"
        pull: true
        volumes:
          - "{{ wordpress_data_directory }}/db:/var/lib/mysql"
#         - "{{ wordpress_data_directory }}/db/my.cnf:/etc/my.cnf"
        env:
          MYSQL_DATABASE: "{{ wordpress_env_wordpress_db_name }}"
          MYSQL_USER: "{{ wordpress_env_wordpress_db_user }}"
          MYSQL_PASSWORD: "{{ wordpress_env_wordpress_db_password }}"
          MYSQL_RANDOM_ROOT_PASSWORD: "{{ wordpress_db_env_mysql_random_root_password }}"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: "mysqladmin ping -u {{ wordpress_env_wordpress_db_user }} -p{{ wordpress_env_wordpress_db_user }} -h localhost"
          interval: "10s"
          start_period: "30s"
          start_interval: "10s"
          retries: 5
        labels:
          autoheal: "{{ wordpress_db_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ wordpress_db_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} MySQL"
          homepage.group: "{{ wordpress_db_homepage_group }}"
          homepage.icon: "{{ wordpress_db_homepage_icon }}"
          homepage.href: "{{ wordpress_homepage_href }}"
          homepage.description: "{{ 'MySQL Server, the world''s most popular open source database' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ wordpress_db_container_name }}"
          homepage.showStats: "{{ wordpress_db_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ wordpress_db_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ wordpress_db_repliqate_engine }}"
          repliqate.schedule: "{{ wordpress_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ wordpress_db_repliqate_backup_id }}"
          repliqate.retention: "{{ wordpress_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/mysql"
        cpu_shares: "{{ wordpress_db_cpu_shares }}"
        memory: "{{ wordpress_db_memory }}"
        memory_swap: "{{ wordpress_db_memory_swap }}"
        restart_policy: unless-stopped

    - name: Wait for {{ ansible_nas_app_name }} DB to become healthy
      community.docker.docker_container_info:
        name: "{{ wordpress_db_container_name }}"
      register: db_info
      until: "db_info.container.State.Health.Status == 'healthy'"
      retries: 30
      delay: 5

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ wordpress_container_name }}"
        hostname: "{{ wordpress_container_name }}"
        image: "{{ wordpress_image_name }}:{{ wordpress_image_tag }}"
        pull: true
        volumes:
          - "{{ wordpress_data_directory }}/html:/var/www/html"
        ports:
          - "{{ wordpress_port_http }}:80"
        env:
          WORDPRESS_DB_HOST: "{{ wordpress_db_container_name }}"
          WORDPRESS_DB_USER: "{{ wordpress_env_wordpress_db_user}}"
          WORDPRESS_DB_PASSWORD: "{{ wordpress_env_wordpress_db_password }}"
          WORDPRESS_DB_NAME: "{{ wordpress_env_wordpress_db_name }}"
          TZ: "{{ ansible_nas_timezone }}"
        links:
          - "{{ wordpress_db_container_name }}"
        labels:
          autoheal: "{{ wordpress_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ wordpress_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ wordpress_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ wordpress_dockflare_access_group }}"
          dockflare.hostname: "{{ wordpress_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ wordpress_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ wordpress_homepage_group }}"
          homepage.icon: "{{ wordpress_homepage_icon }}"
          homepage.href: "{{ wordpress_homepage_href }}"
          homepage.description: "{{ 'wordpress description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ wordpress_container_name }}"
          homepage.showStats: "{{ wordpress_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ wordpress_port_http }}"
          repliqate.enabled: "{{ wordpress_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ wordpress_repliqate_engine }}"
          repliqate.schedule: "{{ wordpress_repliqate_schedule }}"
          repliqate.backup_id: "{{ wordpress_repliqate_backup_id }}"
          repliqate.retention: "{{ wordpress_repliqate_retention }}"
          traefik.enable: "{{ wordpress_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.wordpress.rule: "Host(`{{ wordpress_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.wordpress.tls.certresolver: "letsencrypt"
          traefik.http.routers.wordpress.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.wordpress.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.wordpress.middlewares: "wordpress@docker{{ ',tinyauth-auth@docker' if wordpress_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.wordpress.IPAllowList.sourcerange: "{{ wordpress_traefik_whitelist }}"
          traefik.http.services.wordpress.loadbalancer.server.port: "80"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/wordpress"
        cpu_shares: "{{ wordpress_cpu_shares }}"
        memory: "{{ wordpress_memory }}"
        memory_swap: "{{ wordpress_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (wordpress_port_http | string)] +
                (['https://' + wordpress_hostname + '.' + ansible_nas_domain] if (wordpress_traefik_enabled is true or wordpress_dockflare_enabled is true) else [])
              }}
  when: wordpress_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ wordpress_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ wordpress_db_container_name }}"
        state: absent
  when: wordpress_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ wordpress_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - wordpress_enabled is false