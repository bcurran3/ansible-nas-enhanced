---
# ANE
ansible_nas_app_name: "WordPress"
wordpress_enabled: false
wordpress_available_externally: false
wordpress_traefik_whitelist: "{{ lan }}"

# directories
wordpress_data_directory: "{{ docker_home }}/wordpress"

# docker
wordpress_container_name: "wordpress"
wordpress_image_name: "wordpress"
wordpress_image_tag: "latest"
wordpress_db_container_name: "wordpress-db"
wordpress_db_image_name: "mysql"
wordpress_db_image_tag: "8.0"

# network
wordpress_port_http: "3040"
wordpress_hostname: "wordpress"

# specs
wordpress_cpu_shares: 1024
wordpress_memory: "1G"
wordpress_db_cpu_shares: 1024
wordpress_db_memory: "1G"

# app
wordpress_env_wordpress_db_user: "wordpress"
wordpress_env_wordpress_db_password: "wordpress"
wordpress_env_wordpress_db_name: "wordpress"
wordpress_db_env_mysql_random_root_password: "1"

# autoheal
wordpress_autoheal: "false"
wordpress_db_autoheal: "false"

# dockflare
wordpress_dockflare_tunnel: "false"
wordpress_dockflare_access_group: ""

# homepage
wordpress_homepage_group: "Apps"
wordpress_homepage_icon: "wordpress.png"
wordpress_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ wordpress_port_http }}"
wordpress_homepage_showstats: "false"
wordpress_db_homepage_group: "DBs"
wordpress_db_homepage_icon: "mysql.png"
wordpress_db_homepage_href: "{{ wordpress_homepage_href }}"
wordpress_db_homepage_showstats: "false"

# repliqate
wordpress_repliqate_enabled: "false"
wordpress_repliqate_engine: "restic"
wordpress_repliqate_schedule: "@daily 3am"
wordpress_repliqate_backup_id: "{{ wordpress_container_name }}"
wordpress_repliqate_retention: "30d"
wordpress_db_repliqate_enabled: "false"
wordpress_db_repliqate_engine: "restic"
wordpress_db_repliqate_schedule: "@daily 3am"
wordpress_db_repliqate_backup_id: "{{ wordpress_container_name }}"
wordpress_db_repliqate_retention: "30d"

# tinyauth
wordpress_tinyauth_enabled: false

# watchtower
wordpress_watchtower_enable: "false"
wordpress_db_watchtower_enable: "false"
