---
# ANE
ansible_nas_app_name: "Audiobookshelf"
audiobookshelf_enabled: false
audiobookshelf_traefik_enabled: false
audiobookshelf_traefik_whitelist: "{{ lan }}"

# directories
audiobookshelf_data_directory: "{{ docker_home }}/audiobookshelf"
audiobookshelf_audiobooks_directory: "{{ audiobooks_root }}"
audiobookshelf_podcasts_directory: "{{ podcasts_root }}"

# docker
audiobookshelf_container_name: "audiobookshelf"
audiobookshelf_image_name: "ghcr.io/advplyr/audiobookshelf"
audiobookshelf_image_tag: "latest"

# network
audiobookshelf_hostname: "audiobookshelf"
audiobookshelf_port_http: "13378"

# specs
audiobookshelf_cpu_shares: 1024
audiobookshelf_memory: "1G"
audiobookshelf_memory_swap: -1

# autoheal
audiobookshelf_autoheal_enabled: false

# dockflare
audiobookshelf_dockflare_enabled: false
audiobookshelf_dockflare_access_group: ""

# healthcheck
audiobookshelf_healthcheck_interval: 30s
audiobookshelf_healthcheck_timeout: 10s
audiobookshelf_healthcheck_retries: 3
audiobookshelf_healthcheck_start_period: 30s

# homepage
audiobookshelf_homepage_group: "Media Servers"
audiobookshelf_homepage_icon: "audiobookshelf.png"
audiobookshelf_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ audiobookshelf_port_http }}"
audiobookshelf_homepage_showstats: false
audiobookshelf_homepage_widget_key: ""

# repliqate
audiobookshelf_repliqate_enabled: false
audiobookshelf_repliqate_engine: "restic"
audiobookshelf_repliqate_schedule: "@daily 3am"
audiobookshelf_repliqate_backup_id: "{{ audiobookshelf_container_name }}"
audiobookshelf_repliqate_retention: "30d"

# tinyauth
audiobookshelf_tinyauth_enabled: false

# watchtower
audiobookshelf_watchtower_enabled: false
