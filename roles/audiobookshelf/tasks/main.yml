---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ audiobookshelf_data_directory }}"
        - "{{ audiobookshelf_data_directory }}/config"
        - "{{ audiobookshelf_data_directory }}/metadata"
        - "{{ audiobookshelf_audiobooks_directory }}"
        - "{{ audiobookshelf_podcasts_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ audiobookshelf_container_name }}"
        hostname: "{{ audiobookshelf_container_name }}"
        image: "{{ audiobookshelf_image_name }}:{{ audiobookshelf_image_tag }}"
        pull: true
        volumes:
          - "{{ audiobookshelf_data_directory }}/config:/config"
          - "{{ audiobookshelf_data_directory }}/metadata:/metadata"
          - "{{ audiobookshelf_audiobooks_directory }}:/audiobooks"
          - "{{ audiobookshelf_podcasts_directory }}:/podcasts"
        ports:
          - "{{ audiobookshelf_port_http }}:80"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ audiobookshelf_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ audiobookshelf_watchtower_enable }}"
          dockflare.enable: "{{ audiobookshelf_dockflare_tunnel }}"
          dockflare.access.group: "{{ audiobookshelf_dockflare_access_group }}"
          dockflare.hostname: "{{ audiobookshelf_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ audiobookshelf_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ audiobookshelf_homepage_group }}"
          homepage.icon: "{{ audiobookshelf_homepage_icon }}"
          homepage.href: "{{ audiobookshelf_homepage_href }}"
          homepage.description: "{{ 'Self-hosted audiobook and podcast server' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ audiobookshelf_container_name }}"
          homepage.showStats: "{{ audiobookshelf_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ audiobookshelf_port_http }}"
          repliqate.enabled: "{{ audiobookshelf_repliqate_enabled }}"
          repliqate.engine: "{{ audiobookshelf_repliqate_engine }}"
          repliqate.schedule: "{{ audiobookshelf_repliqate_schedule }}"
          repliqate.backup_id: "{{ audiobookshelf_repliqate_backup_id }}"
          repliqate.retention: "{{ audiobookshelf_repliqate_retention }}"
          traefik.enable: "{{ audiobookshelf_available_externally | string }}"
          traefik.http.routers.audiobookshelf.rule: "Host(`{{ audiobookshelf_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.audiobookshelf.tls.certresolver: "letsencrypt"
          traefik.http.routers.audiobookshelf.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.audiobookshelf.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.audiobookshelf.middlewares: "audiobookshelf@docker{{ ',tinyauth-auth@docker' if audiobookshelf_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.audiobookshelf.IPAllowList.sourcerange: "{{ audiobookshelf_traefik_whitelist }}"
          traefik.http.services.audiobookshelf.loadbalancer.server.port: "80"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/advplyr/audiobookshelf/releases"
        cpu_shares: "{{ audiobookshelf_cpu_shares }}"
        memory: "{{ audiobookshelf_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (audiobookshelf_port_http | string)] +
                (['https://' + audiobookshelf_hostname + '.' + ansible_nas_domain] if (audiobookshelf_available_externally is true or audiobookshelf_dockflare_tunnel is true) else [])
              }}
  when: audiobookshelf_enabled is true

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ audiobookshelf_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - audiobookshelf_enabled is false