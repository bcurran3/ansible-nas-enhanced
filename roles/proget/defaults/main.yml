---
ansible_nas_app_name: "ProGet"

#
proget_enabled: false
proget_available_externally: false
proget_traefik_whitelist: "{{ lan }}"
proget_data_directory: "{{ docker_home }}/proget"

# config
proget_db_password: "U'(3QWs9(K!0PLh1"

# network
proget_hostname: "proget"
proget_network_name: "proget"
proget_port_http: "3334"

# docker
proget_container_name: "proget"
proget_image_name: "proget.inedo.com/productimages/inedo/proget"
proget_image_tag: "latest"
proget_cpu_shares: "1024"
proget_memory: "1g"
proget_db_container_name: "proget-db"
proget_db_image_name: "mcr.microsoft.com/mssql/server"
proget_db_image_tag: "2019-latest"
proget_db_cpu_shares: "1024"
proget_db_memory: "1g"

# autoheal
proget_autoheal: "false"
proget_db_autoheal: "false"

# homepage
proget_homepage_group: "Apps"
proget_homepage_icon: "https://upload.wikimedia.org/wikipedia/commons/e/eb/Inedo_ProGet_Logo.png"
proget_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ proget_port_http }}"
proget_homepage_showStats: "false"
proget_db_homepage_group: "DBs"
proget_db_homepage_icon: "mysql.png"
proget_db_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ proget_port_http }}"
proget_db_homepage_showStats: "false"

# watchtower
proget_watchtower_monitor_only: "true"
proget_db_watchtower_monitor_only: "true"