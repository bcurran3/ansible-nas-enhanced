---
# TDL/NOTES:
# docker exec -it proget_sql /opt/mssql-tools/bin/sqlcmd \
#  -S localhost -U SA -P 't0ps3cr3t!pw' \
#  -Q 'CREATE DATABASE [ProGet] COLLATE SQL_Latin1_General_CP1_CI_AS'
# ^ this should be automated
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ proget_data_directory }}/packages"

    - name: Create {{ ansible_nas_app_name }} DB Directories
      file:
        path: "{{ item }}"
        owner: "10001"
        state: directory
      with_items:
        - "{{ proget_data_directory }}/data"
        - "{{ proget_data_directory }}/log"
        - "{{ proget_data_directory }}/secrets"

    - name: Create {{ ansible_nas_app_name }} Network
      community.docker.docker_network:
        name: "{{ proget_network_name }}"

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ proget_db_container_name}}"
        hostname: "{{ proget_db_container_name}}"
        image: "{{ proget_db_image_name }}:{{ proget_db_image_tag }}"
        pull: true
        networks:
          - name: "{{ proget_network_name }}"
        networks_cli_compatible: "yes"
        network_mode: "bridge"
#        ports:
#          - "1433:1433"
        volumes:
          - "{{ proget_data_directory }}/data:/var/opt/mssql/data"
          - "{{ proget_data_directory }}/log:/var/opt/mssql/log"
          - "{{ proget_data_directory }}/secrets:/var/opt/mssql/secrets"
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "{{ proget_db_mssql_sa_password }}"
          MSSQL_PID: "{{ proget_db_mssql_pid }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ proget_db_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ proget_db_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} MSSQL"
          homepage.group: "{{ proget_db_homepage_group }}"
          homepage.icon: "{{ proget_db_homepage_icon }}"
          homepage.href: "{{ proget_db_homepage_href}}"
          homepage.description: "{{ 'Microsoft SQL Server' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ proget_db_container_name }}"
          homepage.showStats: "{{ proget_db_homepage_showstats }}"
          traefik.enable: "false"
          wud.tag.include: '^2019-CU\d+.*$'
          wud.tag.transform.type: "semver"
          wud.watch.registry: "https://mcr.microsoft.com"
          wud.link.template: "https://hub.docker.com/r/microsoft/mssql-server"
        cpu_shares: "{{ proget_db_cpu_shares }}"
        memory: "{{ proget_db_memory }}"
        restart_policy: unless-stopped

    - name: Init ProGet DB
      community.docker.docker_container_exec:
        container: "{{ proget_db_container_name }}"
        command: >-
          /opt/mssql-tools18/bin/sqlcmd
          -C 
          -S localhost
          -U SA
          -P {{ proget_db_mssql_sa_password | quote }}
          -Q 'IF NOT EXISTS (SELECT * FROM sys.databases WHERE name = "ProGet") BEGIN CREATE DATABASE [ProGet] COLLATE SQL_Latin1_General_CP1_CI_AS; END'
      register: result
      changed_when: "'CREATE DATABASE' in result.stdout"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ proget_container_name }}"
        hostname: "{{ proget_container_name }}"
        image: "{{ proget_image_name }}:{{ proget_image_tag }}"
        pull: true
        networks:
          - name: "{{ proget_network_name }}"
        networks_cli_compatible: "yes"
        network_mode: "bridge"
        ports:
          - "{{ proget_port_http }}:80"
        volumes:
          - "{{ proget_data_directory }}/packages:/var/proget/packages"
        env:
          PROGET_SQL_CONNECTION_STRING: "{{ proget_env_proget_sql_connection_string }}"
          TZ: "{{ ansible_nas_timezone }}"
        links:
          - "{{ proget_db_container_name }}"
        labels:
          autoheal: "{{ proget_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ proget_watchtower_enable }}"
          dockflare.enable: "{{ proget_dockflare_tunnel }}"
          dockflare.access.group: "{{ proget_dockflare_access_group }}"
          dockflare.hostname: "{{ proget_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ proget_port_http }}"
          homepage.group: "{{ proget_homepage_group }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.icon: "{{ proget_homepage_icon }}"
          homepage.href: "{{ proget_homepage_href}}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ proget_port_http }}"
          homepage.description: "{{ 'ProGet' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ proget_container_name }}"
          homepage.showStats: "{{ proget_homepage_showstats }}"
          traefik.enable: "{{ proget_available_externally | string }}"
          traefik.http.routers.proget.rule: "Host(`{{ proget_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.proget.tls.certresolver: "letsencrypt"
          traefik.http.routers.proget.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.proget.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ proget_hostname }}"
          traefik.http.routers.proget.middlewares: "proget@docker"
          traefik.http.middlewares.proget.IPAllowList.sourcerange: "{{ proget_traefik_whitelist }}"
          traefik.http.services.proget.loadbalancer.server.port: "80"
          wud.tag.include: '^\d{4}\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://inedo.com/proget"
        cpu_shares: "{{ proget_cpu_shares }}"
        memory: "{{ proget_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (proget_port_http | string)] +
                (['https://' + proget_hostname + '.' + ansible_nas_domain] if (proget_available_externally is true or proget_dockflare_tunnel is true) else [])
              }}
  when: proget_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ proget_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ proget_db_container_name }}"
        state: absent
  when: proget_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ proget_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ proget_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: proget_enabled is false and archive_app_data_enabled is true

