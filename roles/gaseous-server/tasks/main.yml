---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ gaseous_server_data_directory }}"
        - "{{ gaseous_server_data_directory }}/db"
        - "{{ gaseous_server_data_directory }}/gaseous-server"

    - name: Create {{ ansible_nas_app_name }} network
      community.docker.docker_network:
        name: "{{ gaseous_server_network_name }}"

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ gaseous_server_db_container_name }}"
        hostname: "{{ gaseous_server_db_container_name }}"
        image: "{{ gaseous_server_db_image_name }}:{{ gaseous_server_db_image_tag }}"
        pull: true
        network_mode: "bridge"
        networks:
          - name: "{{ gaseous_server_network_name }}"
        networks_cli_compatible: "yes"
        volumes:
          - "{{ gaseous_server_data_directory }}/db:/var/lib/mysql"
        env:
          MARIADB_ROOT_PASSWORD: "gaseous"
          MARIADB_USER: "gaseous"
          MARIADB_PASSWORD: "{{ gaseous_server_db_password }}"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
              test:
                - CMD
                - /usr/local/bin/healthcheck.sh
                - --su-mysql
                - --connect
                - --innodb_initialized
              interval: "30s"
              timeout: "10s"
              retries: "3"
              start_period: "30s"
        labels:
          autoheal: "{{ gaseous_server_db_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ gaseous_server_db_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} MariaDB"
          homepage.description: "{{ 'The open source relational database' if homepage_show_description else omit }}"
          homepage.group: "{{ gaseous_server_db_homepage_group }}"
          homepage.icon: "{{ gaseous_server_db_homepage_icon }}"
          homepage.href: "{{ gaseous_server_db_homepage_href }}"
          homepage.server: "my-docker"
          homepage.container: "{{ gaseous_server_db_container_name }}"
          homepage.showStats: "{{ gaseous_server_db_homepage_showstats }}"
          repliqate.enabled: "{{ gaseous_server_db_repliqate_enabled }}"
          repliqate.engine: "{{ gaseous_server_db_repliqate_engine }}"
          repliqate.schedule: "{{ gaseous_server_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ gaseous_server_db_repliqate_backup_id }}"
          repliqate.retention: "{{ gaseous_server_db_repliqate_retention }}"
          traefik.enable: "false"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/MariaDB/mariadb-docker/releases/tag/$${major}.$${minor}.$${patch}"
        cpu_shares: "{{ gaseous_server_db_cpu_shares }}"
        memory: "{{ gaseous_server_db_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ gaseous_server_container_name }}"
        hostname: "{{ gaseous_server_container_name }}"
        image: "{{ gaseous_server_image_name }}:{{ gaseous_server_image_tag }}"
        pull: true
        network_mode: "bridge"
        networks:
          - name: "{{ gaseous_server_network_name }}"
        networks_cli_compatible: "yes"
        ports:
          - "{{ gaseous_server_port_http }}:80"
        volumes:
          - "{{ gaseous_server_data_directory }}/gaseous-server:/root/.gaseous-server"
        env:
          dbhost: "{{ gaseous_server_db_container_name }}"
#         dbname: "gaseous"
          dbuser: "root"
          dbpass: "{{ gaseous_server_db_password }}"
          igdbclientid: "{{ gaseous_server_igdb_client_id }}"
          igdbclientsecret: "{{ gaseous_server_igdb_client_secret }}" # https://api-docs.igdb.com/#account-creation
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ gaseous_server_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ gaseous_server_watchtower_enable }}"
          dockflare.enable: "{{ gaseous_server_dockflare_tunnel }}"
          dockflare.access.group: "{{ gaseous_server_dockflare_access_group }}"
          dockflare.hostname: "{{ gaseous_server_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ gaseous_server_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ gaseous_server_homepage_group }}"
          homepage.icon: "{{ gaseous_server_homepage_icon }}"
          homepage.href: "{{ gaseous_server_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ gaseous_server_port_http }}"
          homepage.description: "{{ 'A game ROM manager, with a built in web based emulator using multiple sources to identify and provide metadata' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ gaseous_server_container_name }}"
          homepage.showStats: "{{ gaseous_server_homepage_showstats }}"
          repliqate.enabled: "{{ gaseous_server_repliqate_enabled }}"
          repliqate.engine: "{{ gaseous_server_repliqate_engine }}"
          repliqate.schedule: "{{ gaseous_server_repliqate_schedule }}"
          repliqate.backup_id: "{{ gaseous_server_repliqate_backup_id }}"
          repliqate.retention: "{{ gaseous_server_repliqate_retention }}"
          traefik.enable: "{{ gaseous_server_available_externally | string }}"
          traefik.http.routers.gaseousserver.rule: "Host(`{{ gaseous_server_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.gaseousserver.tls.certresolver: "letsencrypt"
          traefik.http.routers.gaseousserver.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.gaseousserver.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.gaseousserver.middlewares: "gaseousserver@docker{{ ',tinyauth-auth@docker' if gaseous_server_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.gaseousserver.IPAllowList.sourcerange: "{{ gaseous_server_traefik_whitelist }}"
          traefik.http.services.gaseousserver.loadbalancer.server.port: "80"
          wud.tag.include: '^v\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/gaseous-project/gaseous-server/pkgs/container/gaseousserver"
        cpu_shares: "{{ gaseous_server_cpu_shares }}"
        memory: "{{ gaseous_server_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (gaseous_server_port_http | string)] +
                (['https://' + gaseous_server_hostname + '.' + ansible_nas_domain] if (gaseous_server_available_externally is true or gaseous_server_dockflare_tunnel is true) else [])
              }}
  when: gaseous_server_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ gaseous_server_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ gaseous_server_db_container_name }}"
        state: absent

    - name: Delete {{ ansible_nas_app_name }} Network
      community.docker.docker_network:
        name: "{{ gaseous_server_network_name }}"
        state: absent
  when: gaseous_server_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ gaseous_server_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - gaseous_server_enabled is false