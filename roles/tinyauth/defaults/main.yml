---
# ANE
tinyauth_proper_name: "Tinyauth"
tinyauth_enabled: false
tinyauth_traefik_enabled: false
tinyauth_traefik_whitelist: "{{ lan }}"

# directories
tinyauth_data_directory: "{{ docker_home }}/tinyauth"

# docker
tinyauth_container_name: "tinyauth"
tinyauth_image_name: "ghcr.io/steveiliop56/tinyauth"
tinyauth_image_tag: "latest"

# network
tinyauth_port_http: "8999"
tinyauth_hostname: "tinyauth"

# specs
tinyauth_cpu_shares: 1024
tinyauth_memory: "128M"
tinyauth_memory_swap: -1

# app
# use below to create your own secret:
# openssl rand -base64 32 | tr -dc 'a-zA-Z0-9' | head -c 32 && echo
tinyauth_env_secret: "jbOzK46As0IbppC2cPaW4W2QaolO1TsM"
# create your users using this example:
# docker exec -it tinyauth ./tinyauth user create --username ANE --password topsecret
tinyauth_env_users: 'ANE:$2a$10$5hM2ALnuL54LGoU.kJLYsuJwoZ6dC5DivjxABHHPgqw3RwklYgESO'
# more info: https://tinyauth.app/docs/reference/configuration

# autoheal
tinyauth_autoheal_enabled: false

# dockflare
tinyauth_dockflare_enabled: false
tinyauth_dockflare_access_group: ""

# healthcheck
tinyauth_healthcheck_test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:{{ tinyauth_port_http }}/ || exit 1"]
tinyauth_healthcheck_interval: 30s
tinyauth_healthcheck_timeout: 10s
tinyauth_healthcheck_retries: 3
tinyauth_healthcheck_start_period: 15s

# homepage
tinyauth_homepage_group: "Apps"
tinyauth_homepage_icon: "tinyauth.png"
tinyauth_homepage_href: "https://{{ tinyauth_hostname }}.{{ ansible_nas_domain }}"
tinyauth_homepage_showstats: false

# watchtower
tinyauth_watchtower_enabled: false
