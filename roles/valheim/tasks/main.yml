---
- name: Start {{ valheim_proper_name }}
  block:
    - name: Create {{ valheim_proper_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ valheim_user_id }}"
        group: "{{ valheim_group_id }}"
      with_items:
        - "{{ valheim_data_directory }}/saves"
        - "{{ valheim_data_directory }}/server"
        - "{{ valheim_data_directory }}/backups"

    - name: Create {{ valheim_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ valheim_container_name }}"
        hostname: "{{ valheim_container_name }}"
        image: "{{ valheim_image_name }}:{{ valheim_image_version }}"
        pull: true
        volumes:
          - "{{ valheim_data_directory }}/saves:/home/steam/.config/unity3d/IronGate/Valheim"
          - "{{ valheim_data_directory }}/server:/home/steam/valheim"
          - "{{ valheim_data_directory }}/backups:/home/steam/backups"
        ports:
          - "{{ valheim_port_a }}:2456/udp"
          - "{{ valheim_port_b }}:2457/udp"
          - "{{ valheim_port_c }}:2458/udp"
        env: "{{ valheim_env }}"
        capabilities:
          - SYS_NICE
        labels:
          autoheal: "{{ valheim_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ valheim_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ valheim_proper_name }}"
          homepage.group: "{{ valheim_homepage_group }}"
          homepage.icon: "{{ valheim_homepage_icon }}"
          homepage.description: "{{ 'dedicated gameserver manager' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ valheim_container_name }}"
          homepage.showStats: "{{ valheim_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ valheim_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ valheim_repliqate_engine }}"
          repliqate.schedule: "{{ valheim_repliqate_schedule }}"
          repliqate.backup_id: "{{ valheim_repliqate_backup_id }}"
          repliqate.retention: "{{ valheim_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d{4}\.\d{2}\.\d{2}-\d{2}-\d{2}$'
          wud.tag.transform.type: "date"
          wud.tag.transform.date.format: "YYYY.MM.DD-HH-mm"
          wud.link.template: "https://hub.docker.com/r/mbround18/valheim"
        cpu_shares: "{{ valheim_cpu_shares }}"
        memory: "{{ valheim_memory }}"
        memory_swap: "{{ valheim_memory_swap }}"
        restart_policy: unless-stopped
  when: valheim_enabled is true

- name: Stop {{ valheim_proper_name }}
  block:
    - name: Stop {{ valheim_proper_name }} Container
      community.docker.docker_container:
        name: "{{ valheim_container_name }}"
        state: absent
  when: valheim_enabled is false

- name: Data Archive {{ valheim_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ valheim_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - valheim_enabled is false