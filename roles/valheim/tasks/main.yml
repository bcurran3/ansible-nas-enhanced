---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ valheim_user_id }}"
        group: "{{ valheim_group_id }}"
      with_items:
        - "{{ valheim_data_directory }}/saves"
        - "{{ valheim_data_directory }}/server"
        - "{{ valheim_data_directory }}/backups"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ valheim_container_name }}"
        hostname: "{{ valheim_container_name }}"
        image: "{{ valheim_image_name }}:{{ valheim_image_version }}"
        pull: true
        volumes:
          - "{{ valheim_data_directory }}/saves:/home/steam/.config/unity3d/IronGate/Valheim"
          - "{{ valheim_data_directory }}/server:/home/steam/valheim"
          - "{{ valheim_data_directory }}/backups:/home/steam/backups"
        ports:
          - "{{ valheim_port_a }}:2456/udp"
          - "{{ valheim_port_b }}:2457/udp"
          - "{{ valheim_port_c }}:2458/udp"
        env: "{{ valheim_env }}"
        capabilities:
          - SYS_NICE
        labels:
          autoheal: "{{ valheim_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ valheim_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ valheim_homepage_group }}"
          homepage.icon: "{{ valheim_homepage_icon }}"
          homepage.href: "{{ valheim_homepage_href }}"
          homepage.description: "{{ 'valheim description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ valheim_container_name }}"
          homepage.showStats: "{{ valheim_homepage_showStats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ valheim_port }}"
          traefik.enable: "{{ valheim_available_externally | string }}"
          traefik.http.routers.valheim.rule: "Host(`{{ valheim_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.valheim.tls.certresolver: "letsencrypt"
          traefik.http.routers.valheim.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.valheim.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ valheim_hostname }}"
          traefik.http.routers.valheim.middlewares: "{{ valheim_hostname }}@docker"
          traefik.http.middlewares.valheim.IPAllowList.sourcerange: "{{ valheim_traefik_whitelist }}"
          traefik.http.services.valheim.loadbalancer.server.port: "2456"
        cpu_shares: "{{ valheim_cpu_shares }}"
        memory: "{{ valheim_memory }}"
        restart_policy: unless-stopped
  when: valheim_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ valheim_container_name }}"
        state: absent
  when: valheim_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ valheim_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ valheim_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: valheim_enabled is false and archive_app_data_enabled is true
