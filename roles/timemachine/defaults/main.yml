---
# ANE
ansible_nas_app_name: "Time Machine"
timemachine_enabled: false

timemachine_volume_size: "0"
timemachine_password: timemachine
timemachine_share_name: Data
timemachine_log_level: error

# Directories
timemachine_data_directory: "{{ docker_home }}/timemachine"

# Networking
timemachine_port: "10445"

# Container
timemachine_memory: "1G"
timemachine_container_name: "timemachine"
timemachine_image_name: "awlnx/samba-timemachine"
timemachine_image_version: "latest"
timemachine_cpu_shares: 1024

# autoheal
timemachine_autoheal: "false"

# homepage
timemachine_homepage_group: "Apps"
timemachine_homepage_icon: "timemachine.png"
timemachine_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ timemachine_port }}"
timemachine_homepage_showstats: "false"

# repliqate
timemachine_repliqate_enabled: "false"
timemachine_repliqate_engine: "restic"
timemachine_repliqate_schedule: "@daily 3am"
timemachine_repliqate_backup_id: "{{ timemachine_container_name }}"
timemachine_repliqate_retention: "30d"

# watchtower
timemachine_watchtower_enable: "false"