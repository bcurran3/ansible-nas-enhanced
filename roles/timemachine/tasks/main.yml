---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ timemachine_data_directory }}"
        state: directory

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ timemachine_container_name }}"
        hostname: "{{ timemachine_container_name }}"
        image: "{{ timemachine_image_name }}:{{ timemachine_image_version }}"
        pull: true
        ports:
          - "{{ timemachine_port }}:445"
        env:
          TMSIZE: "{{ timemachine_volume_size_limit }}"
          PASS: "{{ timemachine_password }}"
          SHARENAME: "{{ timemachine_share_name }}"
        volumes:
          - "{{ timemachine_data_directory }}/data:/backups"
        ulimits:
          - "nofile:1048576:1048576"
        network_mode: bridge
        labels:
          autoheal: "{{ timemachine_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ timemachine_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ timemachine_homepage_group }}"
          homepage.icon: "{{ timemachine_homepage_icon }}"
          homepage.href: "{{ timemachine_homepage_href }}"
          homepage.description: "{{ 'timemachine description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ timemachine_container_name }}"
          homepage.showStats: "{{ timemachine_homepage_showStats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ timemachine_port }}"
        cpu_shares: "{{ timemachine_cpu_shares }}"
        memory: "{{ timemachine_memory }}"
        restart_policy: unless-stopped

    - name: Install avahi
      ansible.builtin.apt:
        name: "avahi-daemon"
        state: present
        update_cache: yes
      register: result
      until: result is succeeded

    - name: Setup {{ ansible_nas_app_name }} service for avahi
      ansible.builtin.template:
        src: timemachine.service
        dest: "/etc/avahi/services/timemachine.service"
      notify: reload avahi configuration
  when: timemachine_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ timemachine_container_name }}"
        state: absent

# NOTE: I don't use this and don't know the ramifications - not tested
#    - name: Remove avahi
#      ansible.builtin.apt:
#        name: "avahi-daemon"
#        state: absent
#        update_cache: yes
#      register: result
#      until: result is succeeded
  when: timemachine_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ timemachine_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ timemachine_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: timemachine_enabled is false and archive_app_data_enabled is true
