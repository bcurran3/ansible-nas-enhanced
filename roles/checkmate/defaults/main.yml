---
ansible_nas_app_name: "Checkmate"

#
checkmate_enabled: false
checkmate_available_externally: false
checkmate_traefik_whitelist: "{{ lan }}"
checkmate_data_directory: "{{ docker_home }}/checkmate"

# network
checkmate_network: "checkmate"
checkmate_server_hostname: "checkmate"
checkmate_server_port_http: "52345"
checkmate_client_hostname: "checkmate-client"
checkmate_client_port_http: "4001"
checkmate_client_port_https: "4002"

# docker
checkmate_server_container_name: "checkmate"
checkmate_server_image_name: "ghcr.io/bluewave-labs/checkmate-backend-mono"
#checkmate_server_image_tag: "latest"
checkmate_server_image_tag: "v2.3.1"
checkmate_server_cpu_shares: "1024"
checkmate_server_memory: "1g"
checkmate_client_container_name: "checkmate-client"
checkmate_client_image_name: "ghcr.io/bluewave-labs/checkmate-client"
checkmate_client_image_tag: "latest"
checkmate_client_cpu_shares: "1024"
checkmate_client_memory: "1g"
checkmate_db_container_name: "checkmate-db"
checkmate_db_image_name: "ghcr.io/bluewave-labs/checkmate-mongo"
#checkmate_db_image_tag: "latest"
checkmate_db_image_tag: "v2.3.1"
checkmate_db_cpu_shares: "1024"
checkmate_db_memory: "1g"
checkmate_redis_container_name: "checkmate-redis"
checkmate_redis_image_name: "bluewaveuptime/uptime_redis"
checkmate_redis_image_tag: "latest"
checkmate_redis_cpu_shares: "1024"
checkmate_redis_memory: "1g"

# autoheal
checkmate_server_autoheal: "false"
checkmate_client_autoheal: "false"
checkmate_db_autoheal: "false"
checkmate_redis_autoheal: "false"

# homepage
checkmate_server_homepage_group: "Apps"
checkmate_server_homepage_icon: "sh-checkmate.png"
checkmate_server_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ checkmate_server_port_http }}"
checkmate_server_homepage_showStats: "false"
checkmate_client_homepage_group: "Apps"
checkmate_client_homepage_icon: "sh-checkmate.png"
checkmate_client_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ checkmate_client_port_http }}"
checkmate_client_homepage_showStats: "false"
checkmate_db_homepage_group: "DBs"
checkmate_db_homepage_icon: "mongodb.png"
checkmate_db_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ checkmate_server_port_http }}"
checkmate_db_homepage_showStats: "false"
checkmate_redis_homepage_group: "DBs"
checkmate_redis_homepage_icon: "redis.png"
checkmate_redis_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ checkmate_server_port_http }}"
checkmate_redis_homepage_showStats: "false"

# watchtower
checkmate_server_watchtower_monitor_only: "true"
checkmate_client_watchtower_monitor_only: "true"
checkmate_db_watchtower_monitor_only: "true"
checkmate_redis_watchtower_monitor_only: "true"
