---
# ANE
ansible_nas_app_name: "Checkmate"
checkmate_enabled: false
checkmate_available_externally: false
checkmate_traefik_whitelist: "{{ lan }}"
checkmate_data_directory: "{{ docker_home }}/checkmate"

# network
checkmate_network: "checkmate"
checkmate_hostname: "checkmate"
checkmate_port_http: "52345"
#checkmate_client_hostname: "checkmate-client"
#checkmate_client_port_http: "4001"
#checkmate_client_port_https: "4002"

# docker
checkmate_container_name: "checkmate"
checkmate_image_name: "ghcr.io/bluewave-labs/checkmate-backend-mono"
checkmate_image_tag: "latest"
#checkmate_client_container_name: "checkmate-client"
#checkmate_client_image_name: "ghcr.io/bluewave-labs/checkmate-client"
#checkmate_client_image_tag: "latest"
checkmate_db_container_name: "checkmate-db"
checkmate_db_image_name: "ghcr.io/bluewave-labs/checkmate-mongo"
checkmate_db_image_tag: "latest"
#checkmate_redis_container_name: "checkmate-redis"
#checkmate_redis_image_name: "ghcr.io/bluewave-labs/checkmate-redis"
#checkmate_redis_image_tag: "latest"

# specs
checkmate_cpu_shares: 1024
checkmate_memory: "1G"
checkmate_memory_swap: -1
#checkmate_client_cpu_shares: 1024
#checkmate_client_memory: "1G"
#checkmate_client_memory_swap: -1
checkmate_db_cpu_shares: 1024
checkmate_db_memory: "1G"
checkmate_db_memory_swap: "{{ checkmate_db_memory }}"
#checkmate_redis_cpu_shares: 1024
#checkmate_redis_memory: "1G"
checkmate_redis_memory_swap: "{{ checkmate_redis_memory }}"

# app
checkmate_env_uptime_app_api_base_url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ checkmate_port_http }}/api/v1"
checkmate_env_uptime_app_client_host: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}"
checkmate_env_client_host: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}"
checkmate_env_jwt_secret: "EtNCM7ibSBHF33XB5q+zwOumszdQPvWo+mPF3HF0lUQ="

# autoheal
checkmate_autoheal: false
#checkmate_client_autoheal: false
checkmate_db_autoheal: false
#checkmate_redis_autoheal: false

# dockflare
checkmate_dockflare_enabled: false
checkmate_dockflare_access_group: ""

# homepage
checkmate_homepage_group: "Apps"
checkmate_homepage_icon: "sh-checkmate.png"
checkmate_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ checkmate_port_http }}"
checkmate_homepage_showstats: false
#checkmate_client_homepage_group: "Apps"
#checkmate_client_homepage_icon: "sh-checkmate.png"
#checkmate_client_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ checkmate_client_port_http }}"
#checkmate_client_homepage_showstats: false
checkmate_db_homepage_group: "DBs"
checkmate_db_homepage_icon: "mongodb.png"
checkmate_db_homepage_href: "{{ checkmate_homepage_href }}"
checkmate_db_homepage_showstats: false
#checkmate_redis_homepage_group: "DBs"
#checkmate_redis_homepage_icon: "redis.png"
#checkmate_redis_homepage_href: "{{ checkmate_homepage_href }}"
#checkmate_redis_homepage_showstats: false

# repliqate
checkmate_repliqate_enabled: false
checkmate_repliqate_engine: "restic"
checkmate_repliqate_schedule: "@daily 3am"
checkmate_repliqate_backup_id: "{{ checkmate_container_name }}"
checkmate_repliqate_retention: "30d"
checkmate_db_repliqate_enabled: false
checkmate_db_repliqate_engine: "restic"
checkmate_db_repliqate_schedule: "@daily 3am"
checkmate_db_repliqate_backup_id: "{{ checkmate_db_container_name }}"
checkmate_db_repliqate_retention: "30d"

# tinyauth
checkmate_tinyauth_enabled: false

# watchtower
checkmate_watchtower_enabled: false
#checkmate_client_watchtower_enabled: false
checkmate_db_watchtower_enabled: false
#checkmate_redis_watchtower_enabled: false
