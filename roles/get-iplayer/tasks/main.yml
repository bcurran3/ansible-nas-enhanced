---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ get_iplayer_data_directory }}"
        - "{{ get_iplayer_download_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ get_iplayer_container_name }}"
        hostname: "{{ get_iplayer_container_name }}"
        image: "{{ get_iplayer_image_name }}:{{ get_iplayer_image_version }}"
        pull: true
        volumes:
          - "{{ get_iplayer_data_directory }}:/root/.get_iplayer:rw"
          - "{{ get_iplayer_download_directory }}:/root/output:rw"
        ports:
          - "{{ get_iplayer_port }}:8181"
        labels:
          autoheal: "{{ get_iplayer_autoheal | string }}"
          com.centurylinklabs.watchtower.enable: "{{ get_iplayer_watchtower_enabled | string }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ get_iplayer_homepage_group }}"
          homepage.icon: "{{ get_iplayer_homepage_icon }}"
          homepage.description: "{{ 'get_iplayer description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ get_iplayer_container_name }}"
          homepage.showStats: "{{ get_iplayer_homepage_showstats | string }}"
          repliqate.enabled: "{{ get_iplayer_repliqate_enabled | string }}"
          repliqate.engine: "{{ get_iplayer_repliqate_engine }}"
          repliqate.schedule: "{{ get_iplayer_repliqate_schedule }}"
          repliqate.backup_id: "{{ get_iplayer_repliqate_backup_id }}"
          repliqate.retention: "{{ get_iplayer_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^v?\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/kolonuk/get_iplayer"
        cpu_shares: "{{ get_iplayer_cpu_shares }}"
        memory: "{{ get_iplayer_memory }}"
        memory_swap: "{{ get_iplayer_memory_swap }}"
        restart_policy: unless-stopped
  when: get_iplayer_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ get_iplayer_container_name }}"
        state: absent
  when: get_iplayer_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ get_iplayer_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - get_iplayer_enabled is false