---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ adguardhome_data_directory }}"
        - "{{ adguardhome_data_directory }}/conf"
        - "{{ adguardhome_data_directory }}/work"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        adguardhome_homepage_href: "https://{{ adguardhome_hostname }}.{{ ansible_nas_domain }}"
      when: adguardhome_traefik_enabled | bool or adguardhome_dockflare_enabled | bool

    - name: Disable systemd-resolved StubListener
      ansible.builtin.lineinfile:
        path: /etc/systemd/resolved.conf
        regexp: '^#?DNSStubListener='
        line: 'DNSStubListener=no'
        state: present
      register: resolved_conf_disable

    - name: Update resolv.conf symlink
      ansible.builtin.file:
        src: /run/systemd/resolve/resolv.conf
        dest: /etc/resolv.conf
        state: link
        force: true
        follow: false

    - name: Restart systemd-resolved
      ansible.builtin.systemd_service:
        name: systemd-resolved
        state: restarted
      when: resolved_conf_disable.changed

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ adguardhome_container_name }}"
        hostname: "{{ adguardhome_container_name }}"
        image: "{{ adguardhome_image_name }}:{{ adguardhome_image_tag }}"
        pull: true
        dns_servers: "{{ adguardhome_dns }}"
        ports:
          - "{{ adguardhome_port_http }}:3000"
          - "53:53/udp" # DNS
          - "53:53/tcp" # DNS
#         - "67:67/udp" # DHCP Server (Only needed if AdGuard acts as your router's DHCP)
          - "784:784/udp" # DNS-over-QUIC
          - "853:853/udp" # DNS-over-QUIC
          - "853:853/tcp" # DNS-over-TLS
          - "5443:5443/tcp" # DNSCrypt
          - "5443:5443/udp" # DNSCrypt
          - "8853:8853/udp" # DNS-over-QUIC
        volumes:
          - "{{ adguardhome_data_directory }}/conf:/opt/adguardhome/conf"
          - "{{ adguardhome_data_directory }}/work://opt/adguardhome/work"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ adguardhome_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ adguardhome_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ adguardhome_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ adguardhome_dockflare_access_group }}"
          dockflare.hostname: "{{ adguardhome_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ adguardhome_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ adguardhome_homepage_group }}"
          homepage.icon: "{{ adguardhome_homepage_icon }}"
          homepage.href: "{{ adguardhome_homepage_href }}"
          homepage.description: "{{ 'Network-wide Ad Blocking' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ adguardhome_container_name }}"
          homepage.showStats: "{{ adguardhome_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ adguardhome_port_http }}"
          homepage.widget.type: "adguard"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ adguardhome_port_http }}"
          homepage.widget.username: "{{ adguardhome_homepage_widget_username }}"
          homepage.widget.password: "{{ adguardhome_homepage_widget_password }}"
          repliqate.enabled: "{{ adguardhome_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ adguardhome_repliqate_engine }}"
          repliqate.schedule: "{{ adguardhome_repliqate_schedule }}"
          repliqate.backup_id: "{{ adguardhome_repliqate_backup_id }}"
          repliqate.retention: "{{ adguardhome_repliqate_retention }}"
          traefik.enable: "{{ adguardhome_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.adguardhome.rule: "Host(`{{ adguardhome_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.adguardhome.tls.certresolver: "letsencrypt"
          traefik.http.routers.adguardhome.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.adguardhome.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.adguardhome.middlewares: "adguardhome@docker{{ ',tinyauth-auth@docker' if adguardhome_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.adguardhome.IPAllowList.sourcerange: "{{ adguardhome_traefik_whitelist }}"
          traefik.http.services.adguardhome.loadbalancer.server.port: "3000"
          wud.tag.include: '^v?\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/adguard/adguardhome"
        cpu_shares: "{{ adguardhome_cpu_shares }}"
        memory: "{{ adguardhome_memory }}"
        memory_swap: "{{ adguardhome_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (adguardhome_port_http | string)] +
                (['https://' + adguardhome_hostname + '.' + ansible_nas_domain] if (adguardhome_traefik_enabled is true or adguardhome_dockflare_enabled is true) else [])
              }}
  when: adguardhome_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ adguardhome_container_name }}"
        state: absent

    - name: Re-enable systemd-resolved StubListener
      ansible.builtin.lineinfile:
        path: /etc/systemd/resolved.conf
        regexp: '^#?DNSStubListener='
        line: 'DNSStubListener=yes'
        state: present
      register: resolved_conf_enable

    - name: Restore default resolv.conf symlink (Point to Stub)
      ansible.builtin.file:
        src: /run/systemd/resolve/stub-resolv.conf
        dest: /etc/resolv.conf
        state: link
        force: true
        follow: false

    - name: Restart systemd-resolved
      ansible.builtin.systemd_service:
        name: systemd-resolved
        state: restarted
      when: resolved_conf_enable.changed
  when: adguardhome_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ adguardhome_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - adguardhome_enabled is false