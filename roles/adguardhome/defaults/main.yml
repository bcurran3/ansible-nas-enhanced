---
# ANE
adguardhome_proper_name: "AdGuard Home"
adguardhome_enabled: false
adguardhome_traefik_enabled: false
adguardhome_traefik_whitelist: "{{ lan }}"

# directories
adguardhome_data_directory: "{{ docker_home }}/adguardhome"

# docker
adguardhome_container_name: "adguardhome"
adguardhome_image_name: "adguard/adguardhome"
adguardhome_image_tag: "latest"

# network
adguardhome_port_http: "8844"
adguardhome_hostname: "adguardhome"
adguardhome_dns: "{{ ansible_nas_dns }}"

# specs
adguardhome_cpu_shares: 1024
adguardhome_memory: "512M"
adguardhome_memory_swap: -1

# autoheal
adguardhome_autoheal_enabled: false

# dockflare
adguardhome_dockflare_enabled: false
adguardhome_dockflare_access_group: ""

# healthcheck
adguardhome_healthcheck_interval: 30s
adguardhome_healthcheck_timeout: 10s
adguardhome_healthcheck_retries: 3
adguardhome_healthcheck_start_period: 20s

# homepage
adguardhome_homepage_group: "Network"
adguardhome_homepage_icon: "adguard-home.png"
adguardhome_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ adguardhome_port_http }}"
adguardhome_homepage_showstats: false
adguardhome_homepage_widget_username: "admin"
adguardhome_homepage_widget_password: "{{ ansible_nas_app_admin_password }}"

# repliqate
adguardhome_repliqate_enabled: false
adguardhome_repliqate_engine: "restic"
adguardhome_repliqate_schedule: "@daily 3am"
adguardhome_repliqate_backup_id: "{{ adguardhome_container_name }}"
adguardhome_repliqate_retention: "30d"

# tinyauth
adguardhome_tinyauth_enabled: false

# watchtower
adguardhome_watchtower_enabled: false
