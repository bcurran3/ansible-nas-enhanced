---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        # mode: 0755
      with_items:
        - "{{ transmission_data_directory }}"
        - "{{ transmission_data_directory }}/config"
        - "{{ transmission_download_directory }}"
        - "{{ transmission_watch_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ transmission_openvpn_container_name }}"
        image: "{{ transmission_openvpn_image_name }}:{{ transmission_openvpn_image_version }}"
        pull: true
        volumes:
          - "{{ transmission_data_directory }}//config:/config:rw"
          - "{{ transmission_download_directory }}:/downloads:rw"
          - "{{ transmission_watch_directory }}:/watch:rw"
          - "/etc/timezone:/etc/timezone:ro"
        ports:
          - "{{ transmission_openvpn_port_http }}:9091"
          - "{{ transmission_openvpn_port_bt }}:51413"
          - "{{ transmission_openvpn_port_bt }}:51413/udp"
          - "{{ transmission_openvpn_port_proxy }}:3128"
        env:
          TRANSMISSION_HOME: "/config"
          TRANSMISSION_DOWNLOAD_DIR: "/downloads"
          TRANSMISSION_INCOMPLETE_DIR: "/downloads/.incomplete"
          TRANSMISSION_WATCH_DIR: "/watch"
          TRANSMISSION_RATIO_LIMIT: "{{ transmission_openvpn_ratio_limit }}"
          TRANSMISSION_RATIO_LIMIT_ENABLED: "{{ transmission_openvpn_ratio_limit_enabled | string }}"
          OPENVPN_PROVIDER: "{{ openvpn_provider }}"
          OPENVPN_USERNAME: "{{ openvpn_username }}"
          OPENVPN_PASSWORD: "{{ openvpn_password }}"
          OPENVPN_CONFIG: "{{ openvpn_config }}"
          WEBPROXY_ENABLED: "true"
          WEBPROXY_PORT: "3128"
          PUID: "{{ transmission_openvpn_user_id }}"
          PGID: "{{ transmission_openvpn_group_id }}"
          LOCAL_NETWORK: "{{ transmission_openvpn_local_network }}"
          ENABLE_UFW: "false"
          TZ: "{{ ansible_nas_timezone }}"
        devices:
          - /dev/net/tun
        capabilities:
          - NET_ADMIN
        labels:
          autoheal: "{{ transmission_openvpn_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ transmission_openvpn_watchtower_enable }}"
          dockflare.enable: "{{ transmission_openvpn_dockflare_tunnel }}"
          dockflare.access.group: "{{ transmission_openvpn_dockflare_access_group }}"
          dockflare.hostname: "{{ transmission_openvpn_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ transmission_openvpn_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ transmission_openvpn_homepage_group }}"
          homepage.icon: "{{ transmission_openvpn_homepage_icon }}"
          homepage.href: "{{ transmission_openvpn_homepage_href }}"
          homepage.description: "{{ 'transmission_openvpn description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ transmission_openvpn_container_name }}"
          homepage.showStats: "{{ transmission_openvpn_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ transmission_openvpn_port_http }}"
          repliqate.enabled: "{{ transmission_openvpn_repliqate_enabled }}"
          repliqate.engine: "{{ transmission_openvpn_repliqate_engine }}"
          repliqate.schedule: "{{ transmission_openvpn_repliqate_schedule }}"
          repliqate.backup_id: "{{ transmission_openvpn_repliqate_backup_id }}"
          repliqate.retention: "{{ transmission_openvpn_repliqate_retention }}"
          traefik.enable: "{{ transmission_openvpn_available_externally | string }}"
          traefik.http.routers.transmission_openvpn.rule: "Host(`{{ transmission_openvpn_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.transmission_openvpn.tls.certresolver: "letsencrypt"
          traefik.http.routers.transmission_openvpn.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.transmission_openvpn.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ transmission_openvpn_hostname }}"
          traefik.http.routers.transmission_openvpn.middlewares: "{{ transmission_openvpn_hostname }}@docker"
          traefik.http.middlewares.transmission_openvpn.IPAllowList.sourcerange: "{{ transmission_openvpn_traefik_whitelist }}"
          traefik.http.services.transmission_openvpn.loadbalancer.server.port: "9091"
          wud.tag.include: '^\d+\.\d+(\.\d+)?$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/haugene/transmission-openvpn"
        restart_policy: unless-stopped
        cpu_shares: "{{ transmission_openvpn_cpu_shares }}"
        memory: "{{ transmission_openvpn_memory }}"

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (transmission_openvpn_port_http | string)] +
                (['https://' + transmission_openvpn_hostname + '.' + ansible_nas_domain] if (transmission_openvpn_available_externally is true or transmission_openvpn_dockflare_tunnel is true) else [])
              }}
  when: transmission_openvpn_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ transmission_openvpn_container_name }}"
        state: absent
  when: transmission_openvpn_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ transmission_openvpn_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ transmission_openvpn_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: transmission_openvpn_enabled is false and archive_app_data_enabled is true
