---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create Booksonic Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: 0755
      with_items:
        - "{{ booksonic_data_directory }}/data"
        - "{{ booksonic_data_directory }}/playlists"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ booksonic_container_name }}"
        hostname: "{{ booksonic_container_name }}"
        image: "{{ booksonic_image_name }}:{{ booksonic_image_tag }}"
        pull: true
        cpu_shares: "{{ books_root_cpu_shares }}"
        volumes:
          - "{{ booksonic_data_directory }}/data:/booksonic/data:rw"
          - "{{ booksonic_data_directory }}/playlists:/booksonic/playlists:rw"
          - "{{ booksonic_audiobooks_directory }}:/booksonic/audiobooks:rw"
          - "{{ booksonic_podcasts_directory }}:/booksonic/podcasts:rw"
        ports:
          - "{{ booksonic_port }}:4040"
        env:
          TZ: "{{ ansible_nas_timezone }}"
          PUID: "{{ booksonic_user_id }}"
          PGID: "{{ booksonic_group_id }}"
        restart_policy: unless-stopped
        memory: "{{ booksonic_memory }}"
        labels:
          autoheal: "{{ booksonic_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ booksonic_watchtower_monitor_only }}"
          traefik.enable: "{{ booksonic_available_externally | string }}"
          traefik.http.routers.booksonic.rule: "Host(`{{ booksonic_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.booksonic.tls.certresolver: "letsencrypt"
          traefik.http.routers.booksonic.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.booksonic.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.services.booksonic.loadbalancer.server.port: "4040"
  when: booksonic_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ booksonic_container_name }}"
        state: absent
  when: booksonic_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ booksonic_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ booksonic_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: booksonic_enabled is false and archive_app_data_enabled is true
