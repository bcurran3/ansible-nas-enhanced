---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ komodo_data_directory }}"
        - "{{ komodo_data_directory }}/backups"
        - "{{ komodo_data_directory }}/configdb"
        - "{{ komodo_data_directory }}/db"
        - "{{ komodo_data_directory }}/periphery"

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ komodo_db_container_name }}"
        hostname: "{{ komodo_db_container_name }}"
        image: "{{ komodo_db_image_name }}:{{ komodo_db_image_tag }}"
        pull: true
        command: "--quiet --wiredTigerCacheSizeGB 0.25"
        volumes:
          - "{{ komodo_data_directory }}/configdb:/data/configdb"
          - "{{ komodo_data_directory }}/db:/data/db"
        env:
          MONGO_INITDB_ROOT_USERNAME: "{{ komodo_env_komodo_database_username }}"
          MONGO_INITDB_ROOT_PASSWORD: "{{ komodo_env_komodo_database_password }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ komodo_db_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ komodo_db_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} MongoDB"
          homepage.group: "{{ komodo_db_homepage_group }}"
          homepage.icon: "{{ komodo_db_homepage_icon }}"
          homepage.href: "{{ komodo_homepage_href }}"
          homepage.description: "{{ 'The Database for Secure Apps' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ komodo_db_container_name }}"
          homepage.showStats: "{{ komodo_db_homepage_showstats }}"
          repliqate.enabled: "{{ komodo_db_repliqate_enabled }}"
          repliqate.engine: "{{ komodo_db_repliqate_engine }}"
          repliqate.schedule: "{{ komodo_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ komodo_db_repliqate_backup_id }}"
          repliqate.retention: "{{ komodo_db_repliqate_retention }}"
          traefik.enable: "false"
          komodo.skip:
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/mongo"
        cpu_shares: "{{ komodo_db_cpu_shares }}"
        memory: "{{ komodo_db_memory }}"
        memory_swap: "{{ komodo_db_memory_swap }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Periphery Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ komodo_periphery_container_name }}"
        hostname: "{{ komodo_periphery_container_name }}"
        image: "{{ komodo_periphery_image_name }}:{{ komodo_periphery_image_tag }}"
        pull: true
#        ports:
#          - 8120:8120
        volumes:
          - "/var/run/docker.sock:/var/run/docker.sock"
          - "/proc:/proc"
          - "{{ komodo_data_directory }}/periphery:{{ komodo_data_directory }}/periphery"
        env:
          PERIPHERY_ROOT_DIRECTORY: "{{ komodo_periphery_env_periphery_root_directory }}"
          PERIPHERY_PASSKEYS: "{{ komodo_periphery_env_periphery_passkeys }}"
          PERIPHERY_DISABLE_TERMINALS: "{{ komodo_periphery_env_periphery_disable_terminals }}"
          PERIPHERY_SSL_ENABLED: "{{ komodo_periphery_env_periphery_ssl_enabled }}"
          PERIPHERY_INCLUDE_DISK_MOUNTS: "{{ komodo_periphery_env_periphery_include_disk_mounts }}"
          PERIPHERY_EXCLUDE_DISK_MOUNTS: "{{ komodo_periphery_env_periphery_exclude_disk_mounts }}"
          PERIPHERY_LOGGING_PRETTY: "{{ komodo_periphery_env_periphery_logging_pretty }}"
          PERIPHERY_PRETTY_STARTUP_CONFIG: "{{ komodo_periphery_env_periphery_pretty_startup_config }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ komodo_periphery_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ komodo_periphery_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} Periphery"
          homepage.group: "{{ komodo_periphery_homepage_group }}"
          homepage.icon: "{{ komodo_periphery_homepage_icon }}"
          homepage.href: "{{ komodo_periphery_homepage_href }}"
          homepage.description: "{{ 'Komodo Periphery (agent)' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ komodo_periphery_container_name }}"
          homepage.showStats: "{{ komodo_periphery_homepage_showstats }}"
#         homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:8120"
          komodo.skip:
          repliqate.enabled: "{{ komodo_periphery_repliqate_enabled }}"
          repliqate.engine: "{{ komodo_periphery_repliqate_engine }}"
          repliqate.schedule: "{{ komodo_periphery_repliqate_schedule }}"
          repliqate.backup_id: "{{ komodo_periphery_repliqate_backup_id }}"
          repliqate.retention: "{{ komodo_periphery_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/moghtech/komodo/pkgs/container/komodo-periphery"
        cpu_shares: "{{ komodo_periphery_cpu_shares }}"
        memory: "{{ komodo_periphery_memory }}"
        memory_swap: "{{ komodo_periphery_memory_swap }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ komodo_container_name }}"
        hostname: "{{ komodo_container_name }}"
        image: "{{ komodo_image_name }}:{{ komodo_image_tag }}"
        pull: true
        volumes:
          - "{{ komodo_data_directory }}/backups:/backups"
        ports:
          - "{{ komodo_port_http }}:9120"
        env:
          KOMODO_DATABASE_ADDRESS: "{{ komodo_db_container_name }}:27017"
          KOMODO_DATABASE_USERNAME: "{{ komodo_env_komodo_database_username }}"
          KOMODO_DATABASE_PASSWORD: "{{ komodo_env_komodo_database_password }}"
          KOMODO_HOST: "{{ komodo_env_komodo_host }}"
          KOMODO_TITLE: "{{ komodo_env_komodo_title }}"
          KOMODO_FIRST_SERVER: "{{ komodo_env_komodo_first_server }}"
          KOMODO_FIRST_SERVER_NAME: "{{ komodo_env_komodo_first_server_name }}"
          KOMODO_DISABLE_CONFIRM_DIALOG: "{{ komodo_env_komodo_disable_confirm_dialog }}"
          KOMODO_MONITORING_INTERVAL: "{{ komodo_env_komodo_monitoring_interval }}"
          KOMODO_RESOURCE_POLL_INTERVAL: "{{ komodo_env_komodo_resource_poll_interval }}"
          KOMODO_WEBHOOK_SECRET: "{{ komodo_env_komodo_webhook_secret }}"
          KOMODO_JWT_SECRET: "{{ komodo_env_komodo_jwt_secret }}"
          KOMODO_JWT_TTL: "{{ komodo_env_komodo_jwt_ttl }}"
          KOMODO_PASSKEY: "{{ komodo_env_komodo_passkey }}"
          KOMODO_LOCAL_AUTH: "{{ komodo_env_komodo_local_auth }}"
          KOMODO_INIT_ADMIN_USERNAME: "{{ komodo_env_komodo_init_admin_username }}"
          KOMODO_INIT_ADMIN_PASSWORD: "{{ komodo_env_komodo_init_admin_password }}"
          KOMODO_DISABLE_USER_REGISTRATION: "{{ komodo_env_komodo_disable_user_registration }}"
          KOMODO_ENABLE_NEW_USERS: "{{ komodo_env_komodo_enable_new_users }}"
          KOMODO_DISABLE_NON_ADMIN_CREATE: "{{ komodo_env_komodo_disable_non_admin_create }}"
          KOMODO_TRANSPARENT_MODE: "{{ komodo_env_komodo_transparent_mode }}"
          KOMODO_LOGGING_PRETTY: "{{ komodo_env_komodo_logging_pretty }}"
          KOMODO_PRETTY_STARTUP_CONFIG: "{{ komodo_env_komodo_pretty_startup_config }}"
          KOMODO_OIDC_ENABLED: "false"
          KOMODO_OIDC_PROVIDER: "{{ komodo_env_komodo_oidc_provider }}"
          KOMODO_OIDC_REDIRECT_HOST: "{{ komodo_env_komodo_oidc_redirect_host }}"
          KOMODO_OIDC_CLIENT_ID: "{{ komodo_env_komodo_oidc_client_id }}"
          KOMODO_OIDC_CLIENT_SECRET: "{{ komodo_env_komodo_oidc_client_secret }}"
          KOMODO_OIDC_USE_FULL_EMAIL: "{{ komodo_env_komodo_oidc_use_full_email }}"
          KOMODO_OIDC_ADDITIONAL_AUDIENCES: "{{ komodo_env_komodo_oidc_additional_audiences }}"
          KOMODO_GITHUB_OAUTH_ENABLED: "{{ komodo_env_komodo_github_oauth_enabled }}"
          KOMODO_GITHUB_OAUTH_ID: "{{ komodo_env_komodo_github_oauth_id }}"
          KOMODO_GITHUB_OAUTH_SECRET: "{{ komodo_env_komodo_github_oauth_secret }}"
          KOMODO_GOOGLE_OAUTH_ENABLED: "{{ komodo_env_komodo_google_oauth_enabled }}"
          KOMODO_GOOGLE_OAUTH_ID: "{{ komodo_env_komodo_google_oauth_id }}"
          KOMODO_GOOGLE_OAUTH_SECRET: "{{ komodo_env_komodo_google_oauth_secret }}"
          KOMODO_AWS_ACCESS_KEY_ID: "{{ komodo_env_komodo_aws_access_key_id }}"
          KOMODO_AWS_SECRET_ACCESS_KEY: "{{ komodo_env_komodo_aws_secret_access_key }}"
          TZ: "{{ ansible_nas_timezone }}"
        links:
          - "{{ komodo_db_container_name }}"
          - "{{ komodo_periphery_container_name }}"
        labels:
          autoheal: "{{ komodo_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ komodo_watchtower_enable }}"
          dockflare.enable: "{{ komodo_dockflare_tunnel }}"
          dockflare.access.group: "{{ komodo_dockflare_access_group }}"
          dockflare.hostname: "{{ komodo_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ komodo_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ komodo_homepage_group }}"
          homepage.icon: "{{ komodo_homepage_icon }}"
          homepage.href: "{{ komodo_homepage_href }}"
          homepage.description: "{{ 'a tool to build and deploy software on many servers' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ komodo_container_name }}"
          homepage.showStats: "{{ komodo_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ komodo_port_http }}"
          homepage.widget.type: "komodo"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ komodo_port_http }}"
          homepage.widget.key: "{{ komodo_homepage_widget_key }}"
          homepage.widget.secret: "{{ komodo_homepage_widget_secret }}"
          homepage.widget.showSummary: "{{ komodo_homepage_widget_showsummary }}"
          homepage.widget.showStacks: "{{ komodo_homepage_widget_showstacks }}"
          komodo.skip:
          repliqate.enabled: "{{ komodo_repliqate_enabled }}"
          repliqate.engine: "{{ komodo_repliqate_engine }}"
          repliqate.schedule: "{{ komodo_repliqate_schedule }}"
          repliqate.backup_id: "{{ komodo_repliqate_backup_id }}"
          repliqate.retention: "{{ komodo_repliqate_retention }}"
          traefik.enable: "{{ komodo_available_externally | string }}"
          traefik.http.routers.komodo.rule: "Host(`{{ komodo_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.komodo.tls.certresolver: "letsencrypt"
          traefik.http.routers.komodo.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.komodo.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.komodo.middlewares: "komodo@docker{{ ',tinyauth-auth@docker' if komodo_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.komodo.IPAllowList.sourcerange: "{{ komodo_traefik_whitelist }}"
          traefik.http.services.komodo.loadbalancer.server.port: "9120"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/moghtech/komodo/pkgs/container/komodo-core"
        cpu_shares: "{{ komodo_cpu_shares }}"
        memory: "{{ komodo_memory }}"
        memory_swap: "{{ komodo_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (komodo_port_http | string)] +
                (['https://' + komodo_hostname + '.' + ansible_nas_domain] if (komodo_available_externally is true or komodo_dockflare_tunnel is true) else [])
              }}
  when: komodo_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ komodo_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} Periphery Container
      community.docker.docker_container:
        name: "{{ komodo_periphery_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ komodo_db_container_name }}"
        state: absent
  when: komodo_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ komodo_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - komodo_enabled is false