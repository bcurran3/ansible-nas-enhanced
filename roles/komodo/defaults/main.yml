---
# ANE
ansible_nas_app_name: "Komodo"
komodo_enabled: false
komodo_traefik_enabled: false
komodo_traefik_whitelist: "{{ lan }}"

# directories
komodo_data_directory: "{{ docker_home }}/komodo"

# docker
komodo_container_name: "komodo"
komodo_image_name: "ghcr.io/moghtech/komodo-core"
komodo_image_tag: "latest"
komodo_db_container_name: "komodo-db"
komodo_db_image_name: "mongo"
komodo_db_image_tag: "latest"
komodo_periphery_container_name: "komodo-periphery"
komodo_periphery_image_name: "ghcr.io/moghtech/komodo-periphery"
komodo_periphery_image_tag: "latest"

# network
komodo_hostname: "komodo"
komodo_port_http: "9120"
komodo_db_hostname: "komodo-db"
komodo_periphery_hostname: "komodoperiphery"

# specs
komodo_cpu_shares: 1024
komodo_memory: "1G"
komodo_memory_swap: -1
komodo_db_cpu_shares: 1024
komodo_db_memory: "1G"
komodo_db_memory_swap: "{{ komodo_db_memory }}"
komodo_periphery_cpu_shares: 1024
komodo_periphery_memory: "256M"
komodo_periphery_memory_swap: -1

# app
komodo_env_komodo_database_username: "komodo"
komodo_env_komodo_database_password: "komodo"
komodo_env_komodo_host: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ komodo_port_http }}" ## Used for Oauth / Webhook url suggestion / Caddy reverse proxy.
komodo_env_komodo_title: "Komodo" ## Displayed in the browser tab.
komodo_env_komodo_first_server: "https://{{ komodo_periphery_container_name }}:8120" ## Create a server matching this address as the "first server".
komodo_env_komodo_first_server_name: "{{ ansible_nas_hostname }}" ## Give the first server a custom name.
komodo_env_komodo_disable_confirm_dialog: "false" ## Make all buttons just double-click, rather than the full confirmation dialog.
komodo_env_komodo_monitoring_interval: "15-sec" ## Rate Komodo polls your servers for status / container status / system stats / alerting. Options: 1-sec, 5-sec, 15-sec, 1-min, 5-min, 15-min
komodo_env_komodo_resource_poll_interval: "1-hr" ## Interval at which to poll Resources for any updates / automated actions. Options: 15-min, 1-hr, 2-hr, 6-hr, 12-hr, 1-day
komodo_env_komodo_webhook_secret: "XSP9i2V8YxkyKekTjBO8G4JBPT4rPmcg" ## Used to auth incoming webhooks. Alt: KOMODO_WEBHOOK_SECRET_FILE
komodo_env_komodo_jwt_secret: "KiqHoKG1RwoHACmRLi4u4JmikLXvcZDHLl29Z3AUPdSk4ppmrV5YFm2y5KbwAEVY" ## Used to generate jwt. Alt: KOMODO_JWT_SECRET_FILE
komodo_env_komodo_jwt_ttl: "1-day" ## Time to live for jwt tokens. Options: 1-hr, 12-hr, 1-day, 3-day, 1-wk, 2-wk
komodo_env_komodo_passkey: "OdgswggH6J5mF0kOXfh18KL1QSGKB06t"
komodo_env_komodo_local_auth: "true" ## Enable login with username + password.
komodo_env_komodo_init_admin_username: "admin" ## Set the initial admin username created upon first launch. Comment out to disable initial user creation, and create first user using signup button.
komodo_env_komodo_init_admin_password: "{{ ansible_nas_app_admin_password }}" ## Set the initial admin password
komodo_env_komodo_disable_user_registration: "false" ## Disable new user signups.
komodo_env_komodo_enable_new_users: "false" ## All new logins are auto enabled
komodo_env_komodo_disable_non_admin_create: "false" ## Disable non-admins from creating new resources.
komodo_env_komodo_transparent_mode: "false" ## Allows all users to have Read level access to all resources.
komodo_env_komodo_logging_pretty: "false" ## Prettier logging with empty lines between logs
komodo_env_komodo_pretty_startup_config: "false" ## More human readable logging of startup config (multi-line)
## OIDC Login
komodo_env_komodo_oidc_enabled: "false"
komodo_env_komodo_oidc_provider: "" ## Must reachable from Komodo Core container https://oidc.provider.internal/application/o/komodo
komodo_env_komodo_oidc_redirect_host: "" ## Change the host to one reachable be reachable by users (optional if it is the same as above). DO NOT include the `path` part of the URL. https://oidc.provider.external
komodo_env_komodo_oidc_client_id: "" ## Your OIDC client id Alt: KOMODO_OIDC_CLIENT_ID_FILE
komodo_env_komodo_oidc_client_secret: "" ## Your OIDC client secret. If your provider supports PKCE flow, this can be ommitted. Alt: KOMODO_OIDC_CLIENT_SECRET_FILE
komodo_env_komodo_oidc_use_full_email: "false" ## Make usernames the full email. example true/false Note. This does not work for all OIDC providers.
komodo_env_komodo_oidc_additional_audiences: "" ## Add additional trusted audiences for token claims verification. Supports comma separated list, and passing with _FILE (for compose secrets). example abc,123 Alt: KOMODO_OIDC_ADDITIONAL_AUDIENCES_FILE
## Github Oauth
komodo_env_komodo_github_oauth_enabled: "false"
komodo_env_komodo_github_oauth_id: "" # Alt: KOMODO_GITHUB_OAUTH_ID_FILE
komodo_env_komodo_github_oauth_secret: "" # Alt: KOMODO_GITHUB_OAUTH_SECRET_FILE
## Google Oauth
komodo_env_komodo_google_oauth_enabled: "false"
komodo_env_komodo_google_oauth_id: "" # Alt: KOMODO_GOOGLE_OAUTH_ID_FILE
komodo_env_komodo_google_oauth_secret: "" # Alt: KOMODO_GOOGLE_OAUTH_SECRET_FILE
## Aws - Used to launch Builder instances.
komodo_env_komodo_aws_access_key_id: "" # Alt: KOMODO_AWS_ACCESS_KEY_ID_FILE
komodo_env_komodo_aws_secret_access_key: "" # Alt: KOMODO_AWS_SECRET_ACCESS_KEY_FILE
## Periphery Container
komodo_periphery_env_periphery_root_directory: "/etc/komodo" ## Specify the root directory used by Periphery agent.
komodo_periphery_env_periphery_passkeys: "OdgswggH6J5mF0kOXfh18KL1QSGKB06t" ## Periphery passkeys must include KOMODO_PASSKEY to authenticate.
komodo_periphery_env_periphery_disable_terminals: "false" ## Specify whether to disable the terminals feature and disallow remote shell access (inside the Periphery container).
komodo_periphery_env_periphery_ssl_enabled: "true" ## Enable SSL using self signed certificates. Connect to Periphery at https://address:8120.
komodo_periphery_env_periphery_include_disk_mounts: "/etc/hostname" ## If the disk size is overreporting, can use one of these to whitelist / blacklist the disks to filter them, whichever is easier. Accepts comma separated list of paths. Usually whitelisting just /etc/hostname gives correct size.
komodo_periphery_env_periphery_exclude_disk_mounts: "/snap,/etc/repos"
komodo_periphery_env_periphery_logging_pretty: "false" ## Prettier logging with empty lines between logs
komodo_periphery_env_periphery_pretty_startup_config: "false" ## More human readable logging of startup config (multi-line)

# autoheal
komodo_autoheal_enabled: false
komodo_db_autoheal_enabled: false
komodo_periphery_autoheal_enabled: false

# dockflare
komodo_dockflare_enabled: false
komodo_dockflare_access_group: ""

# healthcheck
komodo_healthcheck_test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:9120/ || exit 1"]
komodo_healthcheck_interval: 30s
komodo_healthcheck_timeout: 10s
komodo_healthcheck_retries: 3
komodo_healthcheck_start_period: 30s
komodo_db_healthcheck_test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--host", "127.0.0.1"]
komodo_db_healthcheck_interval: 10s
komodo_db_healthcheck_timeout: 5s
komodo_db_healthcheck_retries: 3
komodo_db_healthcheck_start_period: 15s
komodo_periphery_healthcheck_test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider --no-check-certificate https://127.0.0.1:8120/ || exit 1"]
komodo_periphery_healthcheck_interval: 30s
komodo_periphery_healthcheck_timeout: 10s
komodo_periphery_healthcheck_retries: 3
komodo_periphery_healthcheck_start_period: 20s

# homepage
komodo_homepage_group: "Apps"
komodo_homepage_icon: "komodo.png"
komodo_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ komodo_port_http }}"
komodo_homepage_showstats: false
komodo_homepage_widget_key: ""
komodo_homepage_widget_secret: ""
komodo_homepage_widget_showsummary: "true"
komodo_homepage_widget_showstacks: "true"
komodo_db_homepage_group: "DBs"
komodo_db_homepage_icon: "mongodb.png"
komodo_db_homepage_href: "{{ komodo_homepage_href }}"
komodo_db_homepage_showstats: false
komodo_periphery_homepage_group: "Misc"
komodo_periphery_homepage_icon: "komodo.png"
komodo_periphery_homepage_href: "{{ komodo_homepage_href }}"
komodo_periphery_homepage_showstats: false

# repliqate
komodo_repliqate_enabled: false
komodo_repliqate_engine: "restic"
komodo_repliqate_schedule: "@daily 3am"
komodo_repliqate_backup_id: "{{ komodo_container_name }}"
komodo_repliqate_retention: "30d"
komodo_db_repliqate_enabled: false
komodo_db_repliqate_engine: "restic"
komodo_db_repliqate_schedule: "@daily 3am"
komodo_db_repliqate_backup_id: "{{ komodo_db_container_name }}"
komodo_db_repliqate_retention: "30d"
komodo_periphery_repliqate_enabled: false
komodo_periphery_repliqate_engine: "restic"
komodo_periphery_repliqate_schedule: "@daily 3am"
komodo_periphery_repliqate_backup_id: "{{ komodo_periphery_container_name }}"
komodo_periphery_repliqate_retention: "30d"

# tinyauth
komodo_tinyauth_enabled: false

# watchtower
komodo_watchtower_enabled: false
komodo_db_watchtower_enabled: false
komodo_periphery_watchtower_enabled: false
