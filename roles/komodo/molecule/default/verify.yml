---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Get {{ komodo_proper_name }} container state
      community.docker.docker_container:
        name: "{{ komodo_container_name }}"
      register: result

    - name: Get {{ komodo_proper_name }} DB container state
      community.docker.docker_container:
        name: "{{ komodo_db_container_name }}"
      register: result_db

    - name: Get {{ komodo_proper_name }} Periphery container state
      community.docker.docker_container:
        name: "{{ komodo_periphery_container_name }}"
      register: result_periphery

    - name: Check if {{ komodo_proper_name }} container is running
      ansible.builtin.assert:
        that:
          - result.container['State']['Status'] == "running"
          - result.container['State']['Restarting'] == false
          - result_db.container['State']['Status'] == "running"
          - result_db.container['State']['Restarting'] == false
          - result_periphery.container['State']['Status'] == "running"
          - result_periphery.container['State']['Restarting'] == false
