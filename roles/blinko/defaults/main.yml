---
# ANE
ansible_nas_app_name: "Blinko"
blinko_enabled: false
blinko_traefik_enabled: false
blinko_traefik_whitelist: "{{ lan }}"

# directories
blinko_data_directory: "{{ docker_home }}/blinko"

# docker
blinko_container_name: "blinko"
blinko_image_name: "blinkospace/blinko"
blinko_image_tag: "latest"
blinko_db_container_name: "blinko-db"
blinko_db_image_name: "postgres"
blinko_db_image_tag: "14"

# network
blinko_port_http: "1111"
blinko_hostname: "blinko"

# specs
blinko_cpu_shares: 1024
blinko_memory: "1G"
blinko_memory_swap: -1
blinko_db_cpu_shares: 1024
blinko_db_memory: "1G"
blinko_db_memory_swap: "{{ blinko_db_memory }}"

# app
blinko_env_postgress_user: "blinko"
blinko_env_postgress_password: "blinko"
# generate a secret
# openssl rand -base64 32 | tr -dc 'a-zA-Z0-9' | head -c 32 && echo
blinko_env_nextauth_secret: "xDyFaPiH7H8NRNgz18zFYyKUAN40LaQT"

# autoheal
blinko_autoheal_enabled: false
blinko_db_autoheal_enabled: false

# dockflare
blinko_dockflare_enabled: false
blinko_dockflare_access_group: ""

# homepage
blinko_homepage_group: "Apps"
blinko_homepage_icon: "sh-blinko"
blinko_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ blinko_port_http }}"
blinko_homepage_showstats: false
blinko_db_homepage_group: "DBs"
blinko_db_homepage_icon: "postgres.png"
blinko_db_homepage_href: "{{ blinko_homepage_href }}"
blinko_db_homepage_showstats: false

# repliqate
blinko_repliqate_enabled: false
blinko_repliqate_engine: "restic"
blinko_repliqate_schedule: "@daily 3am"
blinko_repliqate_backup_id: "{{ blinko_container_name }}"
blinko_repliqate_retention: "30d"
blinko_db_repliqate_enabled: false
blinko_db_repliqate_engine: "restic"
blinko_db_repliqate_schedule: "@daily 3am"
blinko_db_repliqate_backup_id: "{{ blinko_db_container_name }}"
blinko_db_repliqate_retention: "30d"

# tinyauth
blinko_tinyauth_enabled: false

# watchtower
blinko_watchtower_enabled: false
blinko_db_watchtower_enabled: false
