---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directory
      ansible.builtin.file:
        path: "{{ tiddlywiki_data_directory }}"
        state: directory

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ tiddlywiki_container_name }}"
        hostname: "{{ tiddlywiki_container_name }}"
        image: "{{ tiddlywiki_image_name }}:{{ tiddlywiki_image_version }}"
        ports:
          - "{{ tiddlywiki_port_http }}:8080"
        volumes:
          - "{{ tiddlywiki_data_directory }}:/var/lib/tiddlywiki"
        env:
          DEBUG: "{{ tiddlywiki_debug_level | default(omit) }}"
          NODE_MEM: "{{ tiddlywiki_node_memory | default(omit) }}"
          USERNAME: "{{ tiddlywiki_username | default(omit) }}"
          PASSWORD: "{{ tiddlywiki_password | default(omit) }}"
          TZ: "{{ ansible_nas_timezone }}"
        pull: true
        labels:
          autoheal: "{{ tiddlywiki_autoheal | string }}"
          com.centurylinklabs.watchtower.enable: "{{ tiddlywiki_watchtower_enabled| string }}"
          dockflare.enable: "{{ tiddlywiki_dockflare_enabled | string }}"
          dockflare.access.group: "{{ tiddlywiki_dockflare_access_group }}"
          dockflare.hostname: "{{ tiddlywiki_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ tiddlywiki_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ tiddlywiki_homepage_group }}"
          homepage.icon: "{{ tiddlywiki_homepage_icon }}"
          homepage.href: "{{ tiddlywiki_homepage_href }}"
          homepage.description: "{{ 'tiddlywiki description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ tiddlywiki_container_name }}"
          homepage.showStats: "{{ tiddlywiki_homepage_showstats | string }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ tiddlywiki_port_http }}"
          repliqate.enabled: "{{ tiddlywiki_repliqate_enabled | string }}"
          repliqate.engine: "{{ tiddlywiki_repliqate_engine }}"
          repliqate.schedule: "{{ tiddlywiki_repliqate_schedule }}"
          repliqate.backup_id: "{{ tiddlywiki_repliqate_backup_id }}"
          repliqate.retention: "{{ tiddlywiki_repliqate_retention }}"
          traefik.enable: "{{ tiddlywiki_available_externally | string }}"
          traefik.http.routers.tiddlywiki.rule: "Host(`{{ tiddlywiki_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.tiddlywiki.tls.certresolver: "letsencrypt"
          traefik.http.routers.tiddlywiki.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.tiddlywiki.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.tiddlywiki.middlewares: "tiddlywiki@docker{{ ',tinyauth-auth@docker' if tiddlywiki_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.tiddlywiki.IPAllowList.sourcerange: "{{ tiddlywiki_traefik_whitelist }}"
          traefik.http.services.tiddlywiki.loadbalancer.server.port: "8080"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/wmudge/tiddlywiki"
        cpu_shares: "{{ tiddlywiki_cpu_shares }}"
        memory: "{{ tiddlywiki_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (tiddlywiki_port_http | string)] +
                (['https://' + tiddlywiki_hostname + '.' + ansible_nas_domain] if (tiddlywiki_available_externally is true or tiddlywiki_dockflare_enabled is true) else [])
              }}
  when: tiddlywiki_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ tiddlywiki_container_name }}"
        state: absent
  when: tiddlywiki_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ tiddlywiki_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - tiddlywiki_enabled is false