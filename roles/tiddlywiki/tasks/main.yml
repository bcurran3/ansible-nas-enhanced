---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directory
      ansible.builtin.file:
        path: "{{ tiddlywiki_data_directory }}"
        state: directory

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ tiddlywiki_container_name }}"
        hostname: "{{ tiddlywiki_container_name }}"
        image: "{{ tiddlywiki_image_name }}:{{ tiddlywiki_image_version }}"
        ports:
          - "{{ tiddlywiki_port }}:8080"
        volumes:
          - "{{ tiddlywiki_data_directory }}:/var/lib/tiddlywiki"
        env:
          DEBUG: "{{ tiddlywiki_debug_level | default(omit) }}"
          NODE_MEM: "{{ tiddlywiki_node_memory | default(omit) }}"
          USERNAME: "{{ tiddlywiki_username | default(omit) }}"
          PASSWORD: "{{ tiddlywiki_password | default(omit) }}"
          TZ: "{{ ansible_nas_timezone }}"
        pull: true
        labels:
          autoheal: "{{ tiddlywiki_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ tiddlywiki_watchtower_enable }}"
          dockflare.enable: "{{ tiddlywiki_dockflare_tunnel }}"
          dockflare.access.group: "{{ tiddlywiki_dockflare_access_group }}"
          dockflare.hostname: "{{ tiddlywiki_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ tiddlywiki_port }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ tiddlywiki_homepage_group }}"
          homepage.icon: "{{ tiddlywiki_homepage_icon }}"
          homepage.href: "{{ tiddlywiki_homepage_href }}"
          homepage.description: "{{ 'tiddlywiki description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ tiddlywiki_container_name }}"
          homepage.showStats: "{{ tiddlywiki_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ tiddlywiki_port }}"
          traefik.enable: "{{ tiddlywiki_available_externally | string }}"
          traefik.http.routers.tiddlywiki.rule: "Host(`{{ tiddlywiki_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.tiddlywiki.tls.certresolver: "letsencrypt"
          traefik.http.routers.tiddlywiki.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.tiddlywiki.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ tiddlywiki_hostname }}"
          traefik.http.routers.tiddlywiki.middlewares: "{{ tiddlywiki_hostname }}@docker"
          traefik.http.middlewares.tiddlywiki.IPAllowList.sourcerange: "{{ tiddlywiki_traefik_whitelist }}"
          traefik.http.services.tiddlywiki.loadbalancer.server.port: "8080"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/wmudge/tiddlywiki"
        cpu_shares: "{{ tiddlywiki_cpu_shares }}"
        memory: "{{ tiddlywiki_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (tiddlywiki_port | string)] +
                (['https://' + tiddlywiki_hostname + '.' + ansible_nas_domain] if (tiddlywiki_available_externally is true or tiddlywiki_dockflare_tunnel is true) else [])
              }}
  when: tiddlywiki_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ tiddlywiki_container_name }}"
        state: absent
  when: tiddlywiki_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ tiddlywiki_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ tiddlywiki_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: tiddlywiki_enabled is false and archive_app_data_enabled is true
