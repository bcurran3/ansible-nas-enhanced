---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ fasten_data_directory }}"
        - "{{ fasten_data_directory }}/cache"
        - "{{ fasten_data_directory }}/db"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ fasten_container_name }}"
        hostname: "{{ fasten_container_name }}"
        image: "{{ fasten_image_name }}:{{ fasten_image_tag }}"
        pull: true
        ports:
          - "{{ fasten_port_http }}:8080"
        volumes:
          - "{{ fasten_data_directory }}/cache:/opt/fasten/cache"
          - "{{ fasten_data_directory }}/db:/opt/fasten/db"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ fasten_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ fasten_watchtower_monitor_only }}"
          dockflare.enable: "{{ fasten_dockflare_tunnel }}"
          dockflare.access.group: "{{ fasten_dockflare_access_group }}"
          dockflare.hostname: "{{ fasten_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ fasten_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ fasten_homepage_group }}"
          homepage.icon: "{{ fasten_homepage_icon }}"
          homepage.href: "{{ fasten_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ fasten_port_http }}"
          homepage.description: "{{ 'Fasten is an open-source, self-hosted, personal/family electronic medical record aggregator, designed to integrate with 100,000's of insurances/hospitals/clinic' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ fasten_container_name }}"
          homepage.showStats: "{{ fasten_homepage_showStats }}"
          traefik.enable: "{{ fasten_available_externally | string }}"
          traefik.http.routers.fasten.rule: "Host(`{{ fasten_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.fasten.tls.certresolver: "letsencrypt"
          traefik.http.routers.fasten.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.fasten.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ fasten_hostname }}"
          traefik.http.routers.fasten.middlewares: "{{ fasten_hostname }}@docker"
          traefik.http.middlewares.fasten.IPAllowList.sourcerange: "{{ fasten_traefik_whitelist }}"
          traefik.http.services.fasten.loadbalancer.server.port: "8080"
          wud.tag.include: '^v?\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/fastenhealth/fasten-onprem/releases"
        cpu_shares: "{{ fasten_cpu_shares }}"
        memory: "{{ fasten_memory }}"
        restart_policy: unless-stopped
  when: fasten_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ fasten_container_name }}"
        state: absent
  when: fasten_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ fasten_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ fasten_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: fasten_enabled is false and archive_app_data_enabled is true
