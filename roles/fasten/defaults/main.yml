---
# ANE
ansible_nas_app_name: "Fasten"
fasten_enabled: false
fasten_available_externally: false
fasten_traefik_whitelist: "{{ lan }}"
fasten_data_directory: "{{ docker_home }}/fasten"

#
fasten_download_directory: "{{ downloads_root }}"
fasten_porn_directory: "{{ porn_root }}"

# network 
fasten_hostname: "fasten"
fasten_port_http: "9091"

# docker
fasten_container_name: "fasten"
fasten_image_name: "ghcr.io/fastenhealth/fasten-onprem"
fasten_image_tag: "main"
fasten_cpu_shares: "1024"
fasten_memory: "1G"

# autoheal
fasten_autoheal: "false"

# dockflare
fasten_dockflare_tunnel: "false"
fasten_dockflare_access_group: ""

# homepage
fasten_homepage_group: "Apps"
fasten_homepage_icon: "fasten.png"
fasten_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ fasten_port_http }}"
fasten_homepage_showStats: "false"

# watchtower
fasten_watchtower_monitor_only: "true"