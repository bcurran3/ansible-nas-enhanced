---
# ANE
ansible_nas_app_name: "Flood"
flood_enabled: false
flood_traefik_enabled: false
flood_traefik_whitelist: "{{ lan }}"

flood_data_directory: "{{ docker_home }}/flood"

# network
flood_hostname: "flood"
flood_port_http: "3003"

# docker
flood_container_name: "flood"
flood_image_name: "jesec/flood"
flood_image_tag: "latest"

# specs
flood_cpu_shares: 1024
flood_memory: "512M"
flood_memory_swap: -1

# autoheal
flood_autoheal_enabled: false

# dockflare
flood_dockflare_enabled: false
flood_dockflare_access_group: ""

# homepage
flood_homepage_group: "Apps"
flood_homepage_icon: "flood.png"
flood_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ flood_port_http }}"
flood_homepage_showstats: false
flood_homepage_widget_username: ""
flood_homepage_widget_password: ""

# repliqate
flood_repliqate_enabled: false
flood_repliqate_engine: "restic"
flood_repliqate_schedule: "@daily 3am"
flood_repliqate_backup_id: "{{ flood_container_name }}"
flood_repliqate_retention: "30d"

# tinyauth
flood_tinyauth_enabled: false

# watchtower
flood_watchtower_enabled: false