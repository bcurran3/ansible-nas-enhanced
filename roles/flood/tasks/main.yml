---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directory
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ flood_data_directory }}/config"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        flood_homepage_href: "https://{{ flood_hostname }}.{{ ansible_nas_domain }}"
      when: flood_traefik_enabled | bool or flood_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ flood_container_name }}"
        hostname: "{{ flood_container_name }}"
        image: "{{ flood_image_name }}:{{ flood_image_tag }}"
        pull: true
        volumes:
          - "{{ flood_data_directory }}/date:/date:rw"
        ports:
          - "{{ flood_port_http }}:3000"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ flood_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ flood_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ flood_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ flood_dockflare_access_group }}"
          dockflare.hostname: "{{ flood_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ flood_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ flood_homepage_group }}"
          homepage.icon: "{{ flood_homepage_icon }}"
          homepage.href: "{{ flood_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ flood_port_http }}"
          homepage.description: "{{ 'A modern web UI for various torrent clients with a Node.js backend and React frontend.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ flood_container_name }}"
          homepage.showStats: "{{ flood_homepage_showstats | ternary('true', 'false') }}"
          homepage.widget.type: "flood"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ flood_port_http }}"
          homepage.widget.username: "{{ flood_homepage_widget_username }}"
          homepage.widget.password: "{{ flood_homepage_widget_password }}"
          repliqate.enabled: "{{ flood_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ flood_repliqate_engine }}"
          repliqate.schedule: "{{ flood_repliqate_schedule }}"
          repliqate.backup_id: "{{ flood_repliqate_backup_id }}"
          repliqate.retention: "{{ flood_repliqate_retention }}"
          traefik.enable: "{{ flood_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.flood.rule: "Host(`{{ flood_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.flood.tls.certresolver: "letsencrypt"
          traefik.http.routers.flood.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.flood.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.flood.middlewares: "flood@docker{{ ',tinyauth-auth@docker' if flood_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.flood.IPAllowList.sourcerange: "{{ flood_traefik_whitelist }}"
          traefik.http.services.flood.loadbalancer.server.port: "3000"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/jesec/flood"
        cpu_shares: "{{ flood_cpu_shares }}"
        memory: "{{ flood_memory }}"
        memory_swap: "{{ flood_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (flood_port_http | string)] +
                (['https://' + flood_hostname + '.' + ansible_nas_domain] if (flood_traefik_enabled is true or flood_dockflare_enabled is true) else [])
              }}
  when: flood_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ flood_container_name }}"
        state: absent
  when: flood_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ flood_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - flood_enabled is false