---
# ANE
ansible_nas_app_name: "Stash"
stash_enabled: false
stash_traefik_enabled: false
stash_traefik_whitelist: "{{ lan }}"

# directories
stash_data_directory: "{{ docker_home }}/stash"
stash_porn_directory: "{{ porn_root }}"

# network
stash_hostname: "stash"
stash_port_http: "9998"

stash_user_id: "0"
stash_group_id: "0"

# docker
stash_container_name: "stash"
stash_image_name: "stashapp/stash"
stash_image_tag: "latest"

# specs
stash_cpu_shares: 1024
stash_memory: "1G"

# autoheal
stash_autoheal_enabled: false

# dockflare
stash_dockflare_enabled: false
stash_dockflare_access_group: ""

# homepage
stash_homepage_group: "Apps"
stash_homepage_icon: "stash.png"
stash_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ stash_port_http }}"
stash_homepage_showstats: false
stash_homepage_widget_key: ""
stash_homepage_widget_fields: '["scenes", "images"]' # optional - default fields shown

# repliqate
stash_repliqate_enabled: false
stash_repliqate_engine: "restic"
stash_repliqate_schedule: "@daily 3am"
stash_repliqate_backup_id: "{{ stash_container_name }}"
stash_repliqate_retention: "30d"

# tinyauth
stash_tinyauth_enabled: false

# watchtower
stash_watchtower_enabled: false