---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ stash_data_directory }}/cache"
        - "{{ stash_data_directory }}/config"
        - "{{ stash_data_directory }}/config/root"
        - "{{ stash_data_directory }}/config/root/.stash"
        - "{{ stash_data_directory }}/data"
        - "{{ stash_data_directory }}/generated"
        - "{{ stash_data_directory }}/metadata"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ stash_container_name }}"
        hostname: "{{ stash_container_name }}"
        image: "{{ stash_image_name }}:{{ stash_image_tag }}"
        pull: true
        log_driver: "json-file"
        log_options:
            max-size: "10m"
            max-file: "10"
        volumes:
          - "{{ stash_data_directory }}/cache:/cache:rw"
          - "{{ stash_data_directory }}/config:/root/.stash:rw"
          - "{{ stash_data_directory }}/data:/data:rw"
          - "{{ stash_data_directory }}/generated:/generated:rw"
          - "{{ stash_data_directory }}/metadata:/metadata:rw"
          - "{{ porn_root }}:/porn:ro"
        ports:
          - "{{ stash_port_http }}:9999"
        env:
          PUID: "{{ stash_user_id }}"
          PGID: "{{ stash_group_id }}"
          STASH_STASH: "/data/"
          STASH_GENERATED: "/generated/"
          STASH_METADATA: "/metadata/"
          STASH_CACHE: "/cache/"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ stash_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ stash_watchtower_enable }}"
          dockflare.enable: "{{ stash_dockflare_tunnel }}"
          dockflare.access.group: "{{ stash_dockflare_access_group }}"
          dockflare.hostname: "{{ stash_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ stash_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ stash_homepage_group }}"
          homepage.icon: "{{ stash_homepage_icon }}"
          homepage.href: "{{ stash_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ stash_port_http }}"
          homepage.description: "{{ 'Stash your porn' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ stash_container_name }}"
          homepage.showStats: "{{ stash_homepage_showstats }}"
          homepage.widget.type: "stash"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ stash_port_http }}"
          homepage.widget.key: "{{ stash_homepage_widget_key }}"
          homepage.widget.fields: "{{ stash_homepage_widget_fields }}"
          repliqate.enabled: "{{ stash_repliqate_enabled }}"
          repliqate.engine: "{{ stash_repliqate_engine }}"
          repliqate.schedule: "{{ stash_repliqate_schedule }}"
          repliqate.backup_id: "{{ stash_repliqate_backup_id }}"
          repliqate.retention: "{{ stash_repliqate_retention }}"
          traefik.enable: "{{ stash_available_externally | string }}"
          traefik.http.routers.stash.rule: "Host(`stash.{{ ansible_nas_domain }}`)"
          traefik.http.routers.stash.tls.certresolver: "letsencrypt"
          traefik.http.routers.stash.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.stash.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ stash_hostname }}"
          traefik.http.routers.stash.middlewares: "{{ stash_hostname }}@docker"
          traefik.http.middlewares.stash.IPAllowList.sourcerange: "{{ stash_traefik_whitelist }}"
          traefik.http.services.stash.loadbalancer.server.port: "9999"
          wud.tag.include: '^v?\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/stashapp/stash"
        cpu_shares: "{{ stash_cpu_shares }}"
        memory: "{{ stash_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (stash_port_http | string)] +
                (['https://' + stash_hostname + '.' + ansible_nas_domain] if (stash_available_externally is true or stash_dockflare_tunnel is true) else [])
              }}
  when: stash_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ stash_container_name }}"
        state: absent
  when: stash_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ stash_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ stash_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: stash_enabled is false and archive_app_data_enabled is true
