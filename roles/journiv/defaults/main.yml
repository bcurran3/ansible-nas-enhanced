---
# ANE
ansible_nas_app_name: "Journiv"
journiv_enabled: false
journiv_available_externally: false
journiv_traefik_whitelist: "{{ lan }}"

# directories
journiv_data_directory: "{{ docker_home }}/journiv"

# docker
journiv_container_name: "journiv"
journiv_image_name: "swalabtech/journiv-app"
journiv_image_tag: "latest"

# network
journiv_port_http: "3079"
journiv_hostname: "journiv"

# specs
journiv_cpu_shares: 1024
journiv_memory: "1G"
journiv_memory_swap: -1

# app
journiv_env_secret_key: "CyYM/QgJMb4S2ha501Bd5pX0y+bjh+Rp8nXAGyxVjfo="
journiv_env_domain_name: "{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}"

# autoheal
journiv_autoheal: false

# dockflare
journiv_dockflare_enabled: false
journiv_dockflare_access_group: ""

# homepage
journiv_homepage_group: "Apps"
journiv_homepage_icon: "sh-journiv.png"
journiv_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ journiv_port_http }}"
journiv_homepage_showstats: false

# repliqate
journiv_repliqate_enabled: false
journiv_repliqate_engine: "restic"
journiv_repliqate_schedule: "@daily 3am"
journiv_repliqate_backup_id: "{{ journiv_container_name }}"
journiv_repliqate_retention: "30d"

# tinyauth
journiv_tinyauth_enabled: false

# watchtower
journiv_watchtower_enabled: false
