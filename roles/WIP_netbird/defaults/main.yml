netbird_db_repliqate_enabled: false
netbird_db_repliqate_engine: "restic"
netbird_db_repliqate_schedule: "@daily 3am"
netbird_db_repliqate_backup_id: "{{ netbird_db_container_name }}"
netbird_db_repliqate_retention: "30d"

# watchtower
netbird_db_watchtower_enabled: false

# wud
netbird_db_wud_tag_include: '^\d+\.\d+\.\d+.*$'
netbird_db_wud_tag_transform_type: "semver"
netbird_db_wud_link_template: "https://hub.docker.com/_/mariadb"

