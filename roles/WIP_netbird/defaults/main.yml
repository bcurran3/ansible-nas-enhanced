---
# ANE
netbird_proper_name: "netbird"
netbird_enabled: false
netbird_traefik_enabled: false
netbird_traefik_whitelist: "{{ lan }}"

# directories
netbird_data_directory: "{{ docker_home }}/netbird"

# docker
netbird_container_name: "netbird"
netbird_image_name: "appdev/netbird" # use ghcr.io or lscr.io when available
netbird_image_tag: "latest"

# uid / gid
netbird_user_id: "0"
netbird_group_id: "0"

# network
netbird_hostname: "netbird"
#netbird_network_name: "netbird"
netbird_port_http: "8989"

# specs
netbird_cpu_shares: 1024
netbird_memory: "1G"
netbird_memory_swap: -1

# autoheal
netbird_autoheal_enabled: false

# dockflare
netbird_dockflare_enabled: false
netbird_dockflare_access_group: ""

# healthcheck
netbird_healthcheck_test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
netbird_healthcheck_interval: 30s
netbird_healthcheck_timeout: 10s
netbird_healthcheck_retries: 3
netbird_healthcheck_start_period: 20s

# homepage
netbird_homepage_description: "NetBird creates a WireGuard-based overlay network that automatically connects your machines over an encrypted tunnel, leaving behind the hassle of opening ports, complex firewall rules, VPN gateways, and so forth."
netbird_homepage_group: "Apps"
netbird_homepage_icon: "netbird.png"
netbird_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ netbird_port_http }}"
netbird_homepage_showstats: false

# linuxserver.io docker mods for linuxserver.io images
#netbird_env_docker_mods: ""
#netbird_env_docker_mods_install_packages: ""
#netbird_env_docker_mods_install_pip_packages: ""

# repliqate
netbird_repliqate_enabled: false
netbird_repliqate_engine: "restic"
netbird_repliqate_schedule: "@daily 3am"
netbird_repliqate_backup_id: "{{ netbird_container_name }}"
netbird_repliqate_retention: "30d"

# tinyauth
netbird_tinyauth_enabled: false

# watchtower
netbird_watchtower_enabled: false

# wud
# Docker Hub example. Please edit.
netbird_wud_tag_include: '^\d+\.\d+$'
netbird_wud_tag_transform_type: "semver"
netbird_wud_link_template: "https://hub.docker.com/r/devname/netbird"
### Github example
#netbird_wud_tag_include: '^\d+\.\d+\.\d+$'
#netbird_wud_tag_transform_type: "semver"
#netbird_wud_link_template: "https://github.com/dev/netbird/pkgs/container/netbird"
### Linuxserver.io example
#netbird_wud_tag_include: '^\d+\.\d+\.\d+.*$'
#netbird_wud_tag_transform_type: "semver"
#netbird_wud_link_template: "https://lscr.io/linuxserver/netbird"

