# docker
netbird_redis_container_name: "netbird-redis"
netbird_redis_image_name: "redis"
netbird_redis_image_tag: "latest"

# specs
netbird_redis_cpu_shares: 1024
netbird_redis_memory: "128M"
netbird_redis_memory_swap: "{{ netbird_redis_memory }}"

# autoheal
netbird_redis_autoheal_enabled: false

# healthcheck
netbird_redis_healthcheck_test: ["CMD-SHELL", "redis-cli -a topsecret ping | grep PONG || exit 1"]
netbird_redis_healthcheck_interval: 10s
netbird_redis_healthcheck_timeout: 5s
netbird_redis_healthcheck_retries: 3
netbird_redis_healthcheck_start_period: 10s

