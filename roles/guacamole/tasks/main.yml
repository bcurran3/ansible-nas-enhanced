---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ guacamole_data_directory }}/config"

    - name: Remove Old {{ ansible_nas_app_name }} Mysql Container
      community.docker.docker_container:
        name: guacamole-mysql
        state: absent
        keep_volumes: true

    - name: Remove Old {{ ansible_nas_app_name }} guacd Container
      community.docker.docker_container:
        name: guacamole-guacd
        state: absent
        keep_volumes: true

    - name: Remove old {{ ansible_nas_app_name }} directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      with_items:
        - "{{ guacamole_data_directory }}/mysql"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ guacamole_container_name }}"
        hostname: "{{ guacamole_container_name }}"
        image: "{{ guacamole_image_name }}:{{ guacamole_image_version }}"
        pull: true
        cpu_shares: "{{ guacamole_cpu_shares }}"
        volumes:
          - "{{ guacamole_data_directory }}/config:/config:rw"
        ports:
          - "{{ guacamole_port }}:8080"
        restart_policy: unless-stopped
        memory: "{{ guacamole_memory }}"
        labels:
          autoheal: "{{ guacamole_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ guacamole_watchtower_monitor_only }}"
          traefik.enable: "{{ guacamole_available_externally | string }}"
          traefik.http.routers.guacamole.rule: "Host(`{{ guacamole_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.guacamole.tls.certresolver: "letsencrypt"
          traefik.http.routers.guacamole.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.guacamole.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.services.guacamole.loadbalancer.server.port: "8080"

    - name: Restart Gua{{ ansible_nas_app_name }}camole Container
      community.docker.docker_container:
        name: "{{ guacamole_container_name }}"
        image: "{{ guacamole_image_name }}:{{ guacamole_image_version }}"
        restart: true
      tags: molecule-idempotence-notest
  when: guacamole_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ guacamole_container_name }}"
        state: absent
  when: guacamole_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ guacamole_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ guacamole_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: guacamole_enabled is false and archive_app_data_enabled is true
