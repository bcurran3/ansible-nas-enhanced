---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ guacamole_data_directory }}/config"

    - name: Remove Old {{ ansible_nas_app_name }} Mysql Container
      community.docker.docker_container:
        name: guacamole-mysql
        state: absent
        keep_volumes: true

    - name: Remove Old {{ ansible_nas_app_name }} guacd Container
      community.docker.docker_container:
        name: guacamole-guacd
        state: absent
        keep_volumes: true

    - name: Remove old {{ ansible_nas_app_name }} directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      with_items:
        - "{{ guacamole_data_directory }}/mysql"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        guacamole_homepage_href: "https://{{ guacamole_hostname }}.{{ ansible_nas_domain }}"
      when: guacamole_traefik_enabled | bool or guacamole_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ guacamole_container_name }}"
        hostname: "{{ guacamole_container_name }}"
        image: "{{ guacamole_image_name }}:{{ guacamole_image_version }}"
        pull: true
        volumes:
          - "{{ guacamole_data_directory }}/config:/config:rw"
        ports:
          - "{{ guacamole_port_http }}:8080"
        labels:
          autoheal: "{{ guacamole_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ guacamole_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ guacamole_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ guacamole_dockflare_access_group }}"
          dockflare.hostname: "{{ guacamole_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ guacamole_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ guacamole_homepage_group }}"
          homepage.icon: "{{ guacamole_homepage_icon }}"
          homepage.href: "{{ guacamole_homepage_href }}"
          homepage.description: "{{ 'guacamole description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ guacamole_container_name }}"
          homepage.showStats: "{{ guacamole_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ guacamole_port_http }}"
          repliqate.enabled: "{{ guacamole_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ guacamole_repliqate_engine }}"
          repliqate.schedule: "{{ guacamole_repliqate_schedule }}"
          repliqate.backup_id: "{{ guacamole_repliqate_backup_id }}"
          repliqate.retention: "{{ guacamole_repliqate_retention }}"
          traefik.enable: "{{ guacamole_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.guacamole.rule: "Host(`{{ guacamole_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.guacamole.tls.certresolver: "letsencrypt"
          traefik.http.routers.guacamole.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.guacamole.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.guacamole.middlewares: "guacamole@docker{{ ',tinyauth-auth@docker' if guacamole_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.guacamole.IPAllowList.sourcerange: "{{ guacamole_traefik_whitelist }}"
          traefik.http.services.guacamole.loadbalancer.server.port: "8080"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/oznu/guacamole"
        cpu_shares: "{{ guacamole_cpu_shares }}"
        memory: "{{ guacamole_memory }}"
        memory_swap: "{{ guacamole_memory_swap }}"
        restart_policy: unless-stopped

    - name: Restart {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ guacamole_container_name }}"
        image: "{{ guacamole_image_name }}:{{ guacamole_image_version }}"
        restart: true
      tags: molecule-idempotence-notest

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (guacamole_port_http | string)] +
                (['https://' + guacamole_hostname + '.' + ansible_nas_domain] if (guacamole_traefik_enabled is true or guacamole_dockflare_enabled is true) else [])
              }}
  when: guacamole_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ guacamole_container_name }}"
        state: absent
  when: guacamole_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ guacamole_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - guacamole_enabled is false