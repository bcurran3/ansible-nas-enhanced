---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ mkvtoolnix_data_directory }}"
        - "{{ mkvtoolnix_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ mkvtoolnix_container_name }}"
        hostname: "{{ mkvtoolnix_container_name }}"
        image: "{{ mkvtoolnix_image_name }}:{{ mkvtoolnix_image_tag }}"
        pull: true
        volumes:
          - "{{ mkvtoolnix_data_directory }}/config:/config:rw"
          - "{{ mkvtoolnix_storage_directory }}:/storage:rw"
        ports:
          - "{{ mkvtoolnix_port_http }}:5800"
        env:
          APP_NICENESS: "10"
          CLEAN_TMP_DIR: "1"
          USER_ID: "{{ mkvtoolnix_user_id }}"
          GROUP_ID: "{{ mkvtoolnix_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ mkvtoolnix_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ mkvtoolnix_watchtower_enable }}"
          dockflare.enable: "{{ mkvtoolnix_dockflare_tunnel }}"
          dockflare.access.group: "{{ mkvtoolnix_dockflare_access_group }}"
          dockflare.hostname: "{{ mkvtoolnix_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ mkvtoolnix_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ mkvtoolnix_homepage_group }}"
          homepage.icon: "{{ mkvtoolnix_homepage_icon }}"
          homepage.href: "{{ mkvtoolnix_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ mkvtoolnix_port_http }}"
          homepage.description: "{{ 'Creating and working with Matroska files' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ mkvtoolnix_container_name }}"
          homepage.showStats: "{{ mkvtoolnix_homepage_showstats }}"
          traefik.enable: "{{ mkvtoolnix_available_externally | string }}"
          traefik.http.routers.mkvtoolnix.rule: "Host(`mkvtoolnix.{{ ansible_nas_domain }}`)"
          traefik.http.routers.mkvtoolnix.tls.certresolver: "letsencrypt"
          traefik.http.routers.mkvtoolnix.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.mkvtoolnix.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ mkvtoolnix_hostname }}"
          traefik.http.routers.mkvtoolnix.middlewares: "{{ mkvtoolnix_hostname }}@docker"
          traefik.http.middlewares.mkvtoolnix.IPAllowList.sourcerange: "{{ mkvtoolnix_traefik_whitelist }}"
          traefik.http.services.mkvtoolnix.loadbalancer.server.port: "5800"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/jlesage/mkvtoolnix"
        cpu_shares: "{{ mkvtoolnix_cpu_shares }}"
        memory: "{{ mkvtoolnix_memory }}"
        restart_policy: unless-stopped
  when: mkvtoolnix_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ mkvtoolnix_container_name }}"
        state: absent
  when: mkvtoolnix_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ mkvtoolnix_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ mkvtoolnix_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: mkvtoolnix_enabled is false and archive_app_data_enabled is true
