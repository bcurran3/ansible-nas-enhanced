---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
        mode: 0777
      with_items:
        - "{{ shaarli_data_directory }}/cache"
        - "{{ shaarli_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ shaarli_container_name }}"
        hostname: "{{ shaarli_container_name }}"
        image: "{{ shaarli_image_name }}:{{ shaarli_image_tag }}"
        pull: true
        volumes:
          - "{{ shaarli_data_directory }}/cache:/var/www/shaarli/cache:rw"
          - "{{ shaarli_data_directory }}/data:/var/www/shaarli/data:rw"
        ports:
          - "{{ shaarli_port_http }}:80"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ shaarli_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ shaarli_watchtower_monitor_only }}"
          dockflare.enable: "{{ shaarli_dockflare_tunnel }}"
          dockflare.access.group: "{{ shaarli_dockflare_access_group }}"
          dockflare.hostname: "{{ shaarli_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ shaarli_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ shaarli_homepage_group }}"
          homepage.icon: "{{ shaarli_homepage_icon }}"
          homepage.href: "{{ shaarli_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ shaarli_port_http }}"
          homepage.description: "{{ 'The personal, minimalist, super-fast, database free, bookmarking service' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ shaarli_container_name }}"
          homepage.showStats: "{{ shaarli_homepage_showStats }}"
          traefik.enable: "{{ shaarli_available_externally | string }}"
          traefik.http.routers.shaarli.rule: "Host(`shaarli.{{ ansible_nas_domain }}`)"
          traefik.http.routers.shaarli.tls.certresolver: "letsencrypt"
          traefik.http.routers.shaarli.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.shaarli.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ shaarli_hostname }}"
          traefik.http.routers.shaarli.middlewares: "{{ shaarli_hostname }}@docker"
          traefik.http.middlewares.shaarli.IPAllowList.sourcerange: "{{ shaarli_traefik_whitelist }}"
          traefik.http.services.shaarli.loadbalancer.server.port: "80"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"
        cpu_shares: "{{ shaarli_cpu_shares }}"
        memory: "{{ shaarli_memory }}"
        restart_policy: unless-stopped
  when: shaarli_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ shaarli_container_name }}"
        state: absent
  when: shaarli_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ shaarli_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ shaarli_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: shaarli_enabled is false and archive_app_data_enabled is true
