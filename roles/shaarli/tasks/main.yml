---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: 0777
      with_items:
        - "{{ shaarli_data_directory }}/cache"
        - "{{ shaarli_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ shaarli_container_name }}"
        hostname: "{{ shaarli_container_name }}"
        image: "{{ shaarli_image_name }}:{{ shaarli_image_tag }}"
        pull: true
        volumes:
          - "{{ shaarli_data_directory }}/cache:/var/www/shaarli/cache:rw"
          - "{{ shaarli_data_directory }}/data:/var/www/shaarli/data:rw"
        ports:
          - "{{ shaarli_port_http }}:80"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ shaarli_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ shaarli_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ shaarli_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ shaarli_dockflare_access_group }}"
          dockflare.hostname: "{{ shaarli_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ shaarli_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ shaarli_homepage_group }}"
          homepage.icon: "{{ shaarli_homepage_icon }}"
          homepage.href: "{{ shaarli_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ shaarli_port_http }}"
          homepage.description: "{{ 'The personal, minimalist, super-fast, database free, bookmarking service' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ shaarli_container_name }}"
          homepage.showStats: "{{ shaarli_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ shaarli_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ shaarli_repliqate_engine }}"
          repliqate.schedule: "{{ shaarli_repliqate_schedule }}"
          repliqate.backup_id: "{{ shaarli_repliqate_backup_id }}"
          repliqate.retention: "{{ shaarli_repliqate_retention }}"
          traefik.enable: "{{ shaarli_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.shaarli.rule: "Host(`{{ shaarli_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.shaarli.tls.certresolver: "letsencrypt"
          traefik.http.routers.shaarli.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.shaarli.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.shaarli.middlewares: "shaarli@docker{{ ',tinyauth-auth@docker' if shaarli_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.shaarli.IPAllowList.sourcerange: "{{ shaarli_traefik_whitelist }}"
          traefik.http.services.shaarli.loadbalancer.server.port: "80"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/shaarli/shaarli"
        cpu_shares: "{{ shaarli_cpu_shares }}"
        memory: "{{ shaarli_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (shaarli_port_http | string)] +
                (['https://' + shaarli_hostname + '.' + ansible_nas_domain] if (shaarli_traefik_enabled is true or shaarli_dockflare_enabled is true) else [])
              }}
  when: shaarli_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ shaarli_container_name }}"
        state: absent
  when: shaarli_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ shaarli_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - shaarli_enabled is false