---
- name: Start Duplicacy
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ duplicacy_data_directory }}"
        - "{{ duplicacy_data_directory }}/cache"
        - "{{ duplicacy_data_directory }}/config"
        - "{{ duplicacy_data_directory }}/logs"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ duplicacy_container_name }}"
        hostname: "{{ duplicacy_hostname }}"
        image: "{{ duplicacy_image_name }}:{{ duplicacy_image_tag }}"
        pull: true
        ports:
          - "{{ duplicacy_port }}:3875"
        volumes:
          - "{{ duplicacy_data_directory }}/cache:/cache:rw"
          - "{{ duplicacy_data_directory }}/config:/config:rw"
          - "{{ duplicacy_data_directory }}/logs:/logs:rw"
          - "{{ samba_shares_root }}:/backuproot:{{ duplicacy_data_permissions }}"
        env:
          DUPLICACY_WEB_VERSION: "{{ duplicacy_web_version }}"
          TZ: "{{ ansible_nas_timezone }}"
          USR_ID: "{{ duplicacy_user_id }}"
          GRP_ID: "{{ duplicacy_group_id }}"
        labels:
          autoheal: "{{ duplicacy_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ duplicacy_watchtower_enable }}"
          dockflare.enable: "{{ duplicacy_dockflare_tunnel }}"
          dockflare.access.group: "{{ duplicacy_dockflare_access_group }}"
          dockflare.hostname: "{{ duplicacy_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ duplicacy_port }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ duplicacy_homepage_group }}"
          homepage.icon: "{{ duplicacy_homepage_icon }}"
          homepage.href: "{{ duplicacy_homepage_href }}"
          homepage.description: "{{ 'duplicacy description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ duplicacy_container_name }}"
          homepage.showStats: "{{ duplicacy_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ duplicacy_port }}"
          traefik.enable: "{{ duplicacy_available_externally | string }}"
          traefik.http.routers.duplicacy.rule: "Host(`{{ duplicacy_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.duplicacy.tls.certresolver: "letsencrypt"
          traefik.http.routers.duplicacy.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.duplicacy.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ duplicacy_hostname }}"
          traefik.http.routers.duplicacy.middlewares: "{{ duplicacy_hostname }}@docker"
          traefik.http.middlewares.duplicacy.IPAllowList.sourcerange: "{{ duplicacy_traefik_whitelist }}"
          traefik.http.services.duplicacy.loadbalancer.server.port: "3875"
          wud.display.name: "Duplicacy Web"
          wud.watch.digest: "true"
          wud.link.template: "https://hub.docker.com/r/saspus/duplicacy-web"
        cpu_shares: "{{ duplicacy_cpu_shares }}"
        memory: "{{ duplicacy_memory }}"
        restart_policy: unless-stopped
  when: duplicacy_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ duplicacy_container_name }}"
        state: absent
  when: duplicacy_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ duplicacy_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ duplicacy_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: duplicacy_enabled is false and archive_app_data_enabled is true
