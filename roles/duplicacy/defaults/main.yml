---
ansible_nas_app_name: "Duplicacy"

duplicacy_enabled: false
duplicacy_available_externally: false
duplicacy_traefik_whitelist: "{{ lan }}"

# directories
duplicacy_data_directory: "{{ docker_home }}/duplicacy"

# permissions
duplicacy_data_permissions: "ro" # Change to 'rw' to allow the UI to restore data

# version
duplicacy_web_version: "Stable"

# uid / gid
duplicacy_user_id: "0"
duplicacy_group_id: "0"

# network
duplicacy_port: "3875"
duplicacy_hostname: "duplicacy"

duplicacy_memory: 1g

# docker
duplicacy_container_name: duplicacy
duplicacy_cpu_shares: 1024

# autoheal
duplicacy_autoheal: "false"

# watchtower
duplicacy_watchtower_monitor_only: "true"