---
# ANE
ansible_nas_app_name: "Airsonic"
airsonic_enabled: false
airsonic_traefik_enabled: false
airsonic_traefik_whitelist: "{{ lan }}"

# directories
airsonic_data_directory: "{{ docker_home }}/airsonic"
airsonic_music_directory: "{{ music_root }}"
airsonic_podcasts_directory: "{{ podcasts_root }}"

# docker
# This repository was archived by the owner on Sep 8, 2021. It is now read-only.
airsonic_container_name: "airsonic"
airsonic_image_name: "airsonic/airsonic"
airsonic_image_tag: "latest"

# network
airsonic_hostname: "airsonic"
airsonic_port_http: "4040"

# specs
airsonic_cpu_shares: 1024
airsonic_memory: "1G"
airsonic_memory_swap: -1

# autoheal
airsonic_autoheal_enabled: false

# dockflare
airsonic_dockflare_enabled: false
airsonic_dockflare_access_group: ""

# homepage
airsonic_homepage_group: "Apps"
airsonic_homepage_icon: "airsonic.png"
airsonic_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ airsonic_port_http }}"
airsonic_homepage_showstats: false

# repliqate
airsonic_repliqate_enabled: false
airsonic_repliqate_engine: "restic"
airsonic_repliqate_schedule: "@daily 3am"
airsonic_repliqate_backup_id: "{{ airsonic_container_name }}"
airsonic_repliqate_retention: "30d"

# tinyauth
airsonic_tinyauth_enabled: false

# watchtower
airsonic_watchtower_enabled: false
