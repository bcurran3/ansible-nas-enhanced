---
# This repository was archived by the owner on Sep 8, 2021. It is now read-only.
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ airsonic_data_directory }}/data"
        - "{{ airsonic_data_directory }}/playlists"
        - "{{ airsonic_music_directory }}"
        - "{{ airsonic_podcasts_directory }}"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        airsonic_homepage_href: "https://{{ airsonic_hostname }}.{{ ansible_nas_domain }}"
      when: airsonic_traefik_enabled | bool or airsonic_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ airsonic_container_name }}"
        hostname: "{{ airsonic_container_name }}"
        image: "{{ airsonic_image_name }}:{{ airsonic_image_tag }}"
        pull: true
        volumes:
          - "{{ airsonic_data_directory }}/data:/airsonic/data:rw"
          - "{{ airsonic_data_directory }}/playlists:/airsonic/playlists:rw"
          - "{{ airsonic_music_directory }}:/airsonic/music:rw"
          - "{{ airsonic_podcasts_directory }}:/airsonic/podcasts:rw"
        ports:
          - "{{ airsonic_port_http }}:4040"
        healthcheck:
          test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:4040/login.view || exit 1"]
          interval: "{{ airsonic_healthcheck_interval }}"
          timeout: "{{ airsonic_healthcheck_timeout }}"
          retries: "{{ airsonic_healthcheck_retries }}"
          start_period: "{{ airsonic_healthcheck_start_period }}"
        labels:
          autoheal: "{{ airsonic_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ airsonic_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ airsonic_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ airsonic_dockflare_access_group }}"
          dockflare.hostname: "{{ airsonic_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ airsonic_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ airsonic_homepage_group }}"
          homepage.icon: "{{ airsonic_homepage_icon }}"
          homepage.href: "{{ airsonic_homepage_href }}"
          homepage.description: "{{ 'community driven media server' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ airsonic_container_name }}"
          homepage.showStats: "{{ airsonic_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ airsonic_port_http }}"
          repliqate.enabled: "{{ airsonic_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ airsonic_repliqate_engine }}"
          repliqate.schedule: "{{ airsonic_repliqate_schedule }}"
          repliqate.backup_id: "{{ airsonic_repliqate_backup_id }}"
          repliqate.retention: "{{ airsonic_repliqate_retention }}"
          traefik.enable: "{{ airsonic_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.airsonic.rule: "Host(`{{ airsonic_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.airsonic.tls.certresolver: "letsencrypt"
          traefik.http.routers.airsonic.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.airsonic.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.airsonic.middlewares: "airsonic@docker{{ ',tinyauth-auth@docker' if airsonic_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.airsonic.IPAllowList.sourcerange: "{{ airsonic_traefik_whitelist }}"
          traefik.http.services.airsonic.loadbalancer.server.port: "4040"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/airsonic/airsonic"
        cpu_shares: "{{ airsonic_cpu_shares }}"
        memory: "{{ airsonic_memory }}"
        memory_swap: "{{ airsonic_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (airsonic_port_http | string)] +
                (['https://' + airsonic_hostname + '.' + ansible_nas_domain] if (airsonic_traefik_enabled is true or airsonic_dockflare_enabled is true) else [])
              }}
  when: airsonic_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ airsonic_container_name }}"
        state: absent
  when: airsonic_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ airsonic_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - airsonic_enabled is false