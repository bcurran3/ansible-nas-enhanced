---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ airsonic_data_directory }}/data"
        - "{{ airsonic_data_directory }}/playlists"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ airsonic_container_name }}"
        hostname: "{{ airsonic_container_name }}"
        image: "{{ airsonic_image_name }}:{{ airsonic_image_tag }}"
        pull: true
        cpu_shares: "{{ airsonic_cpu_shares }}"
        volumes:
          - "{{ airsonic_data_directory }}/data:/airsonic/data:rw"
          - "{{ airsonic_data_directory }}/playlists:/airsonic/playlists:rw"
          - "{{ airsonic_music_directory }}:/airsonic/music:rw"
          - "{{ airsonic_podcasts_directory }}:/airsonic/podcasts:rw"
        ports:
          - "{{ airsonic_port }}:4040"
        restart_policy: unless-stopped
        memory: "{{ airsonic_memory }}"
        labels:
          autoheal: "{{ airsonic_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ airsonic_watchtower_monitor_only }}"
          dockflare.enable: "{{ airsonic_dockflare_tunnel }}"
          dockflare.access.group: "{{ airsonic_dockflare_access_group }}"
          dockflare.hostname: "{{ airsonic_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ airsonic_port }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ airsonic_homepage_group }}"
          homepage.icon: "{{ airsonic_homepage_icon }}"
          homepage.href: "{{ airsonic_homepage_href }}"
          homepage.description: "{{ 'airsonic description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ airsonic_container_name }}"
          homepage.showStats: "{{ airsonic_homepage_showStats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ airsonic_port }}"
          traefik.enable: "{{ airsonic_available_externally | string }}"
          traefik.http.routers.airsonic.rule: "Host(`{{ airsonic_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.airsonic.tls.certresolver: "letsencrypt"
          traefik.http.routers.airsonic.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.airsonic.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ airsonic_hostname }}"
          traefik.http.routers.airsonic.middlewares: "{{ airsonic_hostname }}@docker"
          traefik.http.middlewares.airsonic.IPAllowList.sourcerange: "{{ airsonic_traefik_whitelist }}"
          traefik.http.services.airsonic.loadbalancer.server.port: "4040"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/airsonic/airsonic/releases/tag/$${major}.$${minor}.$${patch}"
  when: airsonic_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ airsonic_container_name }}"
        state: absent
  when: airsonic_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ airsonic_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ airsonic_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: airsonic_enabled is false and archive_app_data_enabled is true
