---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "1000"
        group: "1000"
      with_items:
        - "{{ gotosocial_data_directory }}"
        - "{{ gotosocial_data_directory }}/data"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        gotosocial_homepage_href: "https://{{ gotosocial_hostname }}.{{ ansible_nas_domain }}"
      when: gotosocial_traefik_enabled | bool or gotosocial_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ gotosocial_container_name }}"
        hostname: "{{ gotosocial_container_name }}"
        image: "{{ gotosocial_image_name }}:{{ gotosocial_image_tag }}"
        pull: true
        user: 1000:1000
        ports:
          - "{{ gotosocial_port_http }}:8080"
        volumes:
          - "{{ gotosocial_data_directory }}/data:/gotosocial/storage"
        network_mode: bridge
        env:
          GTS_HOST: "{{ gotosocial_hostname }}.{{ ansible_nas_domain }}"
          GTS_DB_TYPE: "sqlite"
          GTS_DB_ADDRESS: "/gotosocial/storage/sqlite.db"
          GTS_LETSENCRYPT_ENABLED: "false"
#         GTS_LETSENCRYPT_EMAIL_ADDRESS: ""
          GTS_WAZERO_COMPILATION_CACHE: "/gotosocial/.cache"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ gotosocial_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ gotosocial_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ gotosocial_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ gotosocial_dockflare_access_group }}"
          dockflare.hostname: "{{ gotosocial_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ gotosocial_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ gotosocial_homepage_group }}"
          homepage.icon: "{{ gotosocial_homepage_icon }}"
          homepage.href: "{{ gotosocial_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ gotosocial_port_http }}"
          homepage.description: "{{ 'Fast, fun, small ActivityPub server.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ gotosocial_container_name }}"
          homepage.showStats: "{{ gotosocial_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ gotosocial_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ gotosocial_repliqate_engine }}"
          repliqate.schedule: "{{ gotosocial_repliqate_schedule }}"
          repliqate.backup_id: "{{ gotosocial_repliqate_backup_id }}"
          repliqate.retention: "{{ gotosocial_repliqate_retention }}"
          traefik.enable: "{{ gotosocial_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.gotosocial.rule: "Host(`{{ gotosocial_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.gotosocial.tls.certresolver: "letsencrypt"
          traefik.http.routers.gotosocial.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.gotosocial.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.gotosocial.middlewares: "gotosocial@docker{{ ',tinyauth-auth@docker' if gotosocial_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.gotosocial.IPAllowList.sourcerange: "{{ gotosocial_traefik_whitelist }}"
          traefik.http.services.gotosocial.loadbalancer.server.port: "8080"
          wud.tag.include: '^v?\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/superseriousbusiness/gotosocial"
        cpu_shares: "{{ gotosocial_cpu_shares }}"
        memory: "{{ gotosocial_memory }}"
        memory_swap: "{{ gotosocial_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (gotosocial_port_http | string)] +
                (['https://' + gotosocial_hostname + '.' + ansible_nas_domain] if (gotosocial_traefik_enabled is true or gotosocial_dockflare_enabled is true) else [])
              }}
  when: gotosocial_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ gotosocial_container_name }}"
        state: absent
  when: gotosocial_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ gotosocial_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - gotosocial_enabled is false