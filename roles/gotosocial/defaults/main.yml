---
ansible_nas_app_name: "GoToSocial"

#
gotosocial_enabled: false
gotosocial_available_externally: false
gotosocial_traefik_whitelist: "{{ lan }}"
gotosocial_data_directory: "{{ docker_home }}/gotosocial"

# network
gotosocial_hostname: "gotosocial"
gotosocial_port_http: "3016"

# docker
gotosocial_container_name: "gotosocial"
gotosocial_image_name: "superseriousbusiness/gotosocial"
gotosocial_image_tag: "latest"  # or snapshot better?
gotosocial_cpu_shares: "1024"
gotosocial_memory: "1G"

# autoheal
gotosocial_autoheal: "false"

# dockflare
gotosocial_dockflare_tunnel: "false"
gotosocial_dockflare_access_group: ""

# homepage
gotosocial_homepage_group: "Apps"
gotosocial_homepage_icon: "gotosocial.png"
gotosocial_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ gotosocial_port_http }}"
gotosocial_homepage_showStats: "false"

# watchtower
gotosocial_watchtower_monitor_only: "true"