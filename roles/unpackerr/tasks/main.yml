---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ unpackerr_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ unpackerr_container_name }}"
        hostname: "{{ unpackerr_container_name }}"
        image: "{{ unpackerr_image_name }}:{{ unpackerr_image_tag }}"
        pull: true
        volumes:
          - "{{ downloads_root }}:/downloads"
        env:
          UN_LOG_FILE: "{{ unpackerr_data_directory }}"
          UN_SONARR_0_URL: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ sonarr_port_http }}"
          UN_SONARR_0_API_KEY: "{{ unpackerr_env_un_sonarr_0_api_key }}"
          UN_RADARR_0_URL: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ radarr_port_http }}"
          UN_RADARR_0_API_KEY: "{{ unpackerr_env_un_radarr_0_api_key }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ unpackerr_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ unpackerr_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ unpackerr_homepage_group }}"
          homepage.icon: "{{ unpackerr_homepage_icon }}"
          homepage.description: "{{ 'xtracts downloads for Radarr, Sonarr, Lidarr, Readarr, and/or a Watch folder - Deletes extracted files after import' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ unpackerr_container_name }}"
          homepage.showStats: "{{ unpackerr_homepage_showstats }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/golift/unpackerr"
        cpu_shares: "{{ unpackerr_cpu_shares }}"
        memory: "{{ unpackerr_memory }}"
        restart_policy: unless-stopped
  when: unpackerr_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ unpackerr_container_name }}"
        state: absent
  when: unpackerr_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ unpackerr_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ unpackerr_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: unpackerr_enabled is false and archive_app_data_enabled is true
