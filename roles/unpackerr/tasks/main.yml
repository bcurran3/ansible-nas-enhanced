---
- name: Start {{ unpackerr_proper_name }}
  block:
    - name: Create {{ unpackerr_proper_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ unpackerr_data_directory }}"
        - "{{ unpackerr_data_directory }}/config"
        - "{{ unpackerr_data_directory }}/log"
        - "{{ unpackerr_downloads_directory }}"

    - name: Create {{ unpackerr_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ unpackerr_container_name }}"
        hostname: "{{ unpackerr_container_name }}"
        image: "{{ unpackerr_image_name }}:{{ unpackerr_image_tag }}"
        pull: true
        volumes:
          - "{{ unpackerr_data_directory }}/config:/config"
          - "{{ unpackerr_data_directory }}/log:/log"
          - "{{ unpackerr_downloads_directory }}:/downloads"
        env:
          UN_LOG_FILE: "/log/unpackerr.log"
          UN_LIDARR_0_URL: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ lidarr_port_http }}"
          UN_LIDARR_0_API_KEY: "{{ unpackerr_env_un_lidarr_0_api_key }}"
          UN_SONARR_0_URL: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ sonarr_port_http }}"
          UN_SONARR_0_API_KEY: "{{ unpackerr_env_un_sonarr_0_api_key }}"
          UN_RADARR_0_URL: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ radarr_port_http }}"
          UN_RADARR_0_API_KEY: "{{ unpackerr_env_un_radarr_0_api_key }}"
          UN_READARR_0_URL: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ readarr_port_http }}"
          UN_READARR_0_API_KEY: "{{ unpackerr_env_un_readarr_0_api_key }}"
          UN_WHISPARR_0_URL: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ whisparr_port_http }}"
          UN_WHISPARR_0_API_KEY: "{{ unpackerr_env_un_whisparr_0_api_key }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ unpackerr_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ unpackerr_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ unpackerr_proper_name }}"
          homepage.group: "{{ unpackerr_homepage_group }}"
          homepage.icon: "{{ unpackerr_homepage_icon }}"
          homepage.description: "{{ 'xtracts downloads for Radarr, Sonarr, Lidarr, Readarr, and/or a Watch folder - Deletes extracted files after import' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ unpackerr_container_name }}"
          homepage.showStats: "{{ unpackerr_homepage_showstats | ternary('true', 'false') }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/golift/unpackerr"
        cpu_shares: "{{ unpackerr_cpu_shares }}"
        memory: "{{ unpackerr_memory }}"
        memory_swap: "{{ unpackerr_memory_swap }}"
        restart_policy: unless-stopped
  when: unpackerr_enabled is true

- name: Stop {{ unpackerr_proper_name }}
  block:
    - name: Stop {{ unpackerr_proper_name }} Container
      community.docker.docker_container:
        name: "{{ unpackerr_container_name }}"
        state: absent
  when: unpackerr_enabled is false

- name: Data Archive {{ unpackerr_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ unpackerr_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - unpackerr_enabled is false