---
- name: Start n8n
  block:
    - name: Create {{ ansible_nas_app_name }} Directory
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: 1000
        group: 1000
      with_items:
        - "{{ n8n_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ n8n_container_name }}"
        hostname: "{{ n8n_container_name }}"
        image: "{{ n8n_image_name }}:{{ n8n_image_version }}"
        pull: true
        ports:
          - "{{ n8n_port }}:5678"
        volumes:
          - "{{ n8n_data_directory }}:/home/node/.n8n:rw"
          - "/etc/timezone:/etc/timezone:ro"
        env:
          N8N_BASIC_AUTH_ACTIVE: "true"
          N8N_BASIC_AUTH_USER: "{{ n8n_basic_auth_user }}"
          N8N_BASIC_AUTH_PASSWORD: "{{ n8n_basic_auth_password }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ n8n_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ n8n_watchtower_enable }}"
          dockflare.enable: "{{ n8n_dockflare_tunnel }}"
          dockflare.access.group: "{{ n8n_dockflare_access_group }}"
          dockflare.hostname: "{{ n8n_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ n8n_port }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ n8n_homepage_group }}"
          homepage.icon: "{{ n8n_homepage_icon }}"
          homepage.href: "{{ n8n_homepage_href }}"
          homepage.description: "{{ 'n8n description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ n8n_container_name }}"
          homepage.showStats: "{{ n8n_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ n8n_port }}"
          traefik.enable: "{{ n8n_available_externally | string }}"
          traefik.http.routers.n8n.rule: "Host(`{{ n8n_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.n8n.tls.certresolver: "letsencrypt"
          traefik.http.routers.n8n.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.n8n.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ n8n_hostname }}"
          traefik.http.routers.n8n.middlewares: "{{ n8n_hostname }}@docker"
          traefik.http.middlewares.n8n.IPAllowList.sourcerange: "{{ n8n_traefik_whitelist }}"
          traefik.http.services.n8n.loadbalancer.server.port: "5678"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.watch.registry: "https://docker.n8n.io"
          wud.link.template: "https://github.com/n8n-io/n8n/releases"
        cpu_shares: "{{ n8n_cpu_shares }}"
        memory: "{{ n8n_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (n8n_port | string)] +
                (['https://' + n8n_hostname + '.' + ansible_nas_domain] if (n8n_available_externally is true or n8n_dockflare_tunnel is true) else [])
              }}
  when: n8n_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ n8n_container_name }}"
        state: absent
  when: n8n_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ n8n_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ n8n_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: n8n_enabled is false and archive_app_data_enabled is true

