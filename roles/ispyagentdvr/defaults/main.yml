---
# ANE
ansible_nas_app_name: "Agent DVR"
ispyagentdvr_enabled: false
ispyagentdvr_available_externally: false
ispyagentdvr_traefik_whitelist: "{{ lan }}"

# directories
ispyagentdvr_data_directory: "{{ docker_home }}/ispyagentdvr"
ispyagentdvr_recordings_directory: "{{ downloads_root }}/recordings"

# uid / gid
ispyagentdvr_user_id: "1000"
ispyagentdvr_group_id: "1000"

# network
ispyagentdvr_hostname: "agentdvr"
ispyagentdvr_port_http: "8097"
ispyagentdvr_port_turn: "3478"
ispyagentdvr_agentdvr_host_port: "50000-50100"

# specs
ispyagentdvr_cpu_shares: 1024
ispyagentdvr_memory: "1G"

# docker
ispyagentdvr_container_name: "ispyagentdvr"
ispyagentdvr_image_name: "mekayelanik/ispyagentdvr"
ispyagentdvr_image_tag: "latest"

# autoheal
ispyagentdvr_autoheal: "false"

# dockflare
ispyagentdvr_dockflare_tunnel: "false"
ispyagentdvr_dockflare_access_group: ""

# homepage
ispyagentdvr_homepage_group: "Apps"
ispyagentdvr_homepage_icon: "ispy.png"
ispyagentdvr_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ ispyagentdvr_port_http }}"
ispyagentdvr_homepage_showstats: "false"

# repliqate
ispyagentdvr_repliqate_enabled: "false"
ispyagentdvr_repliqate_engine: "restic"
ispyagentdvr_repliqate_schedule: "@daily 3am"
ispyagentdvr_repliqate_backup_id: "{{ ispyagentdvr_container_name }}"
ispyagentdvr_repliqate_retention: "30d"

# watchtower
ispyagentdvr_watchtower_enable: "false"