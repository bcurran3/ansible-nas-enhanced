---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ ispyagentdvr_data_directory }}"
        - "{{ ispyagentdvr_data_directory }}/config"
        - "{{ ispyagentdvr_data_directory }}/commands"
        - "{{ ispyagentdvr_recordings_directory }}"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        ispyagentdvr_homepage_href: "https://{{ ispyagentdvr_hostname }}.{{ ansible_nas_domain }}"
      when: ispyagentdvr_traefik_enabled | bool or ispyagentdvr_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ ispyagentdvr_container_name }}"
        hostname: "{{ ispyagentdvr_container_name }}"
        image: "{{ ispyagentdvr_image_name }}:{{ ispyagentdvr_image_tag }}"
        pull: true
        volumes:
          - "{{ ispyagentdvr_data_directory }}/config:/AgentDVR/Media/XML:rw"
          - "{{ ispyagentdvr_data_directory }}/commands:/AgentDVR/Commands:rw"
          - "{{ ispyagentdvr_recordings_directory }}:/AgentDVR/Media/WebServerRoot/Media:rw"
        ports:
          - "{{ ispyagentdvr_port_http }}:8090"
          - "{{ ispyagentdvr_port_turn }}:3478/udp"
          - "{{ ispyagentdvr_agentdvr_host_port }}:50000-50100/udp"
        devices: >-
                  {{
                    (ispyagentdvr_devices | default([])) + ['/dev/dri:/dev/dri']
                    if intel_igpu_enabled | default(false) | bool
                    else (ispyagentdvr_devices | default(omit))
                  }}
        runtime: "{{ 'nvidia' if nvidia_runtime_enabled | bool else omit }}"
        device_requests: "{{
          [{'driver': 'nvidia', 'count': -1, 'capabilities': ['gpu']}]
          if nvidia_runtime_enabled | bool else omit
        }}"
        env:
          TZ: "{{ ansible_nas_timezone }}"
          WEBUI_PORT: "{{ ispyagentdvr_port_http }}"
          PUID: "{{ ispyagentdvr_user_id }}"
          PGID: "{{ ispyagentdvr_group_id }}"
        labels:
          autoheal: "{{ ispyagentdvr_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ ispyagentdvr_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ ispyagentdvr_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ ispyagentdvr_dockflare_access_group }}"
          dockflare.hostname: "{{ ispyagentdvr_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ ispyagentdvr_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ ispyagentdvr_homepage_group }}"
          homepage.icon: "{{ ispyagentdvr_homepage_icon }}"
          homepage.href: "{{ ispyagentdvr_homepage_href }}"
          homepage.description: "{{ 'Camera Monitoring software' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ ispyagentdvr_container_name }}"
          homepage.showStats: "{{ ispyagentdvr_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ ispyagentdvr_port_http }}"
          repliqate.enabled: "{{ ispyagentdvr_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ ispyagentdvr_repliqate_engine }}"
          repliqate.schedule: "{{ ispyagentdvr_repliqate_schedule }}"
          repliqate.backup_id: "{{ ispyagentdvr_repliqate_backup_id }}"
          repliqate.retention: "{{ ispyagentdvr_repliqate_retention }}"
          traefik.enable: "{{ ispyagentdvr_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.ispyagentdvr.rule: "Host(`{{ ispyagentdvr_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.ispyagentdvr.tls.certresolver: "letsencrypt"
          traefik.http.routers.ispyagentdvr.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.ispyagentdvr.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.ispyagentdvr.middlewares: "ispyagentdvr@docker{{ ',tinyauth-auth@docker' if ispyagentdvr_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.ispyagentdvr.IPAllowList.sourcerange: "{{ ispyagentdvr_traefik_whitelist }}"
          traefik.http.services.ispyagentdvr.loadbalancer.server.port: "8097"
          wud.tag.include: '^\d+\.\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/mekayelanik/ispyagentdvr"
        cpu_shares: "{{ ispyagentdvr_cpu_shares }}"
        memory: "{{ ispyagentdvr_memory }}"
        memory_swap: "{{ ispyagentdvr_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (ispyagentdvr_port_http | string)] +
                (['https://' + ispyagentdvr_hostname + '.' + ansible_nas_domain] if (ispyagentdvr_traefik_enabled is true or ispyagentdvr_dockflare_enabled is true) else [])
              }}
  when: ispyagentdvr_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ ispyagentdvr_container_name }}"
        state: absent
  when: ispyagentdvr_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ ispyagentdvr_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - ispyagentdvr_enabled is false