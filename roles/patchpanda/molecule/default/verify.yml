---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Get {{ ansible_nas_app_name }} container state
      community.docker.docker_container:
        name: "{{ patchpanda_container_name }}"
      register: result

    - name: Get {{ ansible_nas_app_name }} Apprise API container state
      community.docker.docker_container:
        name: "{{ patchpanda_apprise_container_name }}"
      register: result_apprise

    - name: Check if {{ ansible_nas_app_name }} container is running
      ansible.builtin.assert:
        that:
          - result.container['State']['Status'] == "running"
          - result.container['State']['Restarting'] == false
          - result_apprise.container['State']['Status'] == "running"
          - result_apprise.container['State']['Restarting'] == false