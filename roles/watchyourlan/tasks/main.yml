- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ watchyourlan_container_name }}"
        hostname: "{{ watchyourlan_container_name }}"
        image: "{{ watchyourlan_image_name }}:{{ watchyourlan_image_tag }}"
        pull: true
        network_mode: host
        env:
          IFACES: "{{ watchyourlan_ifaces }}"  # required: 1 or more interface
          HOST: "0.0.0.0"                      # optional, default: 0.0.0.0
          PORT: "{{ watchyourlan_port_http }}" # optional, default: 8840
          TIMEOUT: "120"                       # optional, time in seconds, default: 120
          SHOUTRRR_URL: "{{ watchyourlan_shoutrrr_url }}" # optional, set url to notify
          THEME: "sand"                        # optional
          COLOR: "dark"                        # optional
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ watchyourlan_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ watchyourlan_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ watchyourlan_homepage_group }}"
          homepage.icon: "{{ watchyourlan_homepage_icon }}"
          homepage.href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ watchyourlan_port_http }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ watchyourlan_port_http }}"
          homepage.description: "{{ 'Lightweight network IP scanner.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ watchyourlan_container_name }}"
          homepage.showStats: "{{ watchyourlan_homepage_showstats }}"
          repliqate.enabled: "false"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/aceberg/watchyourlan/pkgs/container/watchyourlan"
        cpu_shares: "{{ watchyourlan_cpu_shares }}"
        memory: "{{ watchyourlan_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (watchyourlan_port_http | string)] +
                (['https://' + watchyourlan_hostname + '.' + ansible_nas_domain] if (watchyourlan_dockflare_tunnel is true) else [])
              }}
  when: watchyourlan_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ watchyourlan_container_name }}"
        state: absent
  when: watchyourlan_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ watchyourlan_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ watchyourlan_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: watchyourlan_enabled is false and archive_app_data_enabled is true
