---
# ANE
ansible_nas_app_name: "appname"
mediacms_enabled: false
mediacms_traefik_enabled: false
mediacms_traefik_whitelist: "{{ lan }}"

# directories
mediacms_data_directory: "{{ docker_home }}/appname"

# docker
mediacms_container_name: "appname"
mediacms_image_name: "appdev/appname" # use ghcr.io or lscr.io when available
mediacms_image_tag: "latest"

# uid / gid
mediacms_user_id: "0"
mediacms_group_id: "0"

# network
mediacms_port_http: "8989"
mediacms_hostname: "appname"

# specs
mediacms_cpu_shares: 1024
mediacms_memory: "1G"

# autoheal
mediacms_autoheal_enabled: false

# dockflare
mediacms_dockflare_enabled: false
mediacms_dockflare_access_group: ""

# homepage
mediacms_homepage_group: "Apps"
mediacms_homepage_icon: "appname.png"
mediacms_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ mediacms_port_http }}"
mediacms_homepage_showstats: false

# linuxserver.io docker mods for linuxserver.io images
#mediacms_env_docker_mods: ""
#mediacms_env_docker_mods_install_packages: ""
#mediacms_env_docker_mods_install_pip_packages: ""

# repliqate
mediacms_repliqate_enabled: false
mediacms_repliqate_engine: "restic"
mediacms_repliqate_schedule: "@daily 3am"
mediacms_repliqate_backup_id: "{{ mediacms_container_name }}"
mediacms_repliqate_retention: "30d"

# tinyauth
mediacms_tinyauth_enabled: false

# watchtower
mediacms_watchtower_enabled: false


