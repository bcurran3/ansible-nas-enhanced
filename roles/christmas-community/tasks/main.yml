---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ christmas_community_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ christmas_community_container_name }}"
        hostname: "{{ christmas_community_container_name }}"
        image: "{{ christmas_community_image_name }}:{{ christmas_community_image_tag }}"
        pull: true
        volumes:
          - "{{ christmas_community_data_directory }}:/data"
        ports:
          - "{{ christmas_community_port_http }}:80"
        env:
          SMILE: 'true'
          TABLE: 'true'
          SINGLE_LIST: 'false'
          NODE_OPTIONS: "--max-http-header-size=32768"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ christmas_community_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ christmas_community_watchtower_enable }}"
          dockflare.enable: "{{ christmas_community_dockflare_tunnel }}"
          dockflare.access.group: "{{ christmas_community_dockflare_access_group }}"
          dockflare.hostname: "{{ christmas_community_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ christmas_community_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ christmas_community_homepage_group }}"
          homepage.href: "{{ christmas_community_homepage_href }}"
          homepage.icon: "{{ christmas_community_homepage_icon }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ christmas_community_port_http }}"
          homepage.description: "{{ 'Christmas lists for families' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "christmas-community"
          homepage.showStats: "{{ christmas_community_homepage_showstats }}"
          traefik.enable: "{{ christmas_community_available_externally | string }}"
          traefik.http.routers.christmas_community.rule: "Host(`{{ christmas_community_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.christmas_community.tls.certresolver: "letsencrypt"
          traefik.http.routers.christmas_community.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.christmas_community.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ christmas_community_hostname }}"
          traefik.http.routers.christmas_community.middlewares: "christmas_community@docker"
          traefik.http.middlewares.christmas_community.IPAllowList.sourcerange: "{{ christmas_community_traefik_whitelist }}"
          traefik.http.services.christmas_community.loadbalancer.server.port: "80"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/wingysam/christmas-community"
        cpu_shares: "{{ christmas_community_cpu_shares }}"
        memory: "{{ christmas_community_memory }}"
        restart_policy: unless-stopped
  when: christmas_community_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ christmas_community_container_name }}"
        state: absent
  when: christmas_community_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ christmas_community_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ christmas_community_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: christmas_community_enabled is false and archive_app_data_enabled is true
