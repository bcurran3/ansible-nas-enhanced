---
# ANE
ansible_nas_app_name: "Christmas Community"
christmas_community_enabled: false
christmas_community_available_externally: false
christmas_community_traefik_whitelist: "{{ lan }}"

# directories
christmas_community_data_directory: "{{ docker_home }}/christmas-community"

# network
christmas_community_hostname: "christmascommunity"
christmas_community_port_http: "3010"

# configuration

# docker
christmas_community_container_name: "christmas-community"
christmas_community_image_name: "wingysam/christmas-community"
christmas_community_image_tag: "latest"
christmas_community_cpu_shares: 1024
christmas_community_memory: "512M"

# autoheal
christmas_community_autoheal: "false"

# dockflare
christmas_community_dockflare_tunnel: "false"
christmas_community_dockflare_access_group: ""

# homepage
christmas_community_homepage_group: "Apps"
christmas_community_homepage_icon: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ christmas_community_port_http }}/img/logo.transparent.png"
christmas_community_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ christmas_community_port_http }}"
christmas_community_homepage_showstats: "false"

# repliqate
christmas_community_repliqate_enabled: "false"
christmas_community_repliqate_engine: "restic"
christmas_community_repliqate_schedule: "@daily 3am"
christmas_community_repliqate_backup_id: "{{ christmas_community_container_name }}"
christmas_community_repliqate_retention: "30d"

# tinyauth
christmas_cummunity_tinyauth_enabled: false

# watchtower
christmas_community_watchtower_enable: "false"