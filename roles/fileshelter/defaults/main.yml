---
ansible_nas_app_name: "FileShelter"

#
fileshelter_enabled: false
fileshelter_available_externally: false
fileshelter_traefik_whitelist: "{{ lan }}"
fileshelter_data_directory: "{{ docker_home }}/fileshelter"

# network
fileshelter_hostname: "fileshelter"
fileshelter_port_http: "5091"

# docker
fileshelter_container_name: "fileshelter"
fileshelter_image_name: "epoupon/fileshelter"
fileshelter_image_tag: ""
fileshelter_cpu_shares: "1024"
fileshelter_memory: "1g"

# autoheal
fileshelter_autoheal: "false"

# homepage
fileshelter_homepage_group: "Apps"
fileshelter_homepage_icon: "mdi-upload-box.png"
fileshelter_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ fileshelter_port_http }}"
fileshelter_homepage_showStats: "false"

# watchtower
fileshelter_watchtower_monitor_only: "true"