---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "0"
        group: "1000"
      with_items:
        - "{{ fileshelter_data_directory }}"
        - "{{ fileshelter_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ fileshelter_container_name }}"
        hostname: "{{ fileshelter_container_name }}"
        image: "{{ fileshelter_image_name }}:{{ fileshelter_image_tag }}"
        pull: true
        user: "0:1000"
        ports:
          - "{{ fileshelter_port_http }}:5091"
        volumes:
          - "{{ fileshelter_data_directory }}/data:/var/fileshelter"
        network_mode: bridge
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ fileshelter_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ fileshelter_watchtower_enable }}"
          dockflare.enable: "{{ fileshelter_dockflare_tunnel }}"
          dockflare.access.group: "{{ fileshelter_dockflare_access_group }}"
          dockflare.hostname: "{{ fileshelter_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ fileshelter_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ fileshelter_homepage_group }}"
          homepage.icon: "{{ fileshelter_homepage_icon }}"
          homepage.href: "{{ fileshelter_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ fileshelter_port_http }}"
          homepage.description: "{{ 'FileShelter is a “one-click” file sharing web application' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ fileshelter_container_name }}"
          homepage.showStats: "{{ fileshelter_homepage_showstats }}"
          repliqate.enabled: "{{ fileshelter_repliqate_enabled }}"
          repliqate.engine: "{{ fileshelter_repliqate_engine }}"
          repliqate.schedule: "{{ fileshelter_repliqate_schedule }}"
          repliqate.backup_id: "{{ fileshelter_repliqate_backup_id }}"
          repliqate.retention: "{{ fileshelter_repliqate_retention }}"
          traefik.enable: "{{ fileshelter_available_externally | string }}"
          traefik.http.routers.fileshelter.rule: "Host(`{{ fileshelter_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.fileshelter.tls.certresolver: "letsencrypt"
          traefik.http.routers.fileshelter.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.fileshelter.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ fileshelter_hostname }}"
          traefik.http.routers.fileshelter.middlewares: "{{ fileshelter_hostname }}@docker"
          traefik.http.middlewares.fileshelter.IPAllowList.sourcerange: "{{ fileshelter_traefik_whitelist }}"
          traefik.http.services.fileshelter.loadbalancer.server.port: "5091"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/epoupon/fileshelter"
        cpu_shares: "{{ fileshelter_cpu_shares }}"
        memory: "{{ fileshelter_memory_limit }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (fileshelter_port_http | string)] +
                (['https://' + fileshelter_hostname + '.' + ansible_nas_domain] if (fileshelter_available_externally is true or fileshelter_dockflare_tunnel is true) else [])
              }}
  when: fileshelter_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ fileshelter_container_name }}"
        state: absent
  when: fileshelter_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ fileshelter_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ fileshelter_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: fileshelter_enabled is false and archive_app_data_enabled is true
