---
# ANE
flaresolverr_proper_name: "FlareSolverr"
flaresolverr_enabled: false
flaresolverr_traefik_enabled: false
flaresolverr_traefik_whitelist: "{{ lan }}"

# directories
flaresolverr_data_directory: "{{ docker_home }}/flaresolverr"

# network
flaresolverr_port_http: "8191"
flaresolverr_hostname: "flaresolverr"

# docker
flaresolverr_container_name: "flaresolverr"
flaresolverr_image_name: "ghcr.io/flaresolverr/flaresolverr"
flaresolverr_image_version: "latest"

# specs
flaresolverr_cpu_shares: 1024
flaresolverr_memory: "1024M"
flaresolverr_memory_swap: -1

# autoheal
flaresolverr_autoheal_enabled: false

# dockflare
flaresolverr_dockflare_enabled: false
flaresolverr_dockflare_access_group: ""

# healthcheck
flaresolverr_healthcheck_test: ["CMD-SHELL", "pgrep -f flaresolverr || exit 1"]
flaresolverr_healthcheck_interval: 30s
flaresolverr_healthcheck_timeout: 10s
flaresolverr_healthcheck_retries: 3
flaresolverr_healthcheck_start_period: 45s

# homepage
flaresolverr_homepage_group: "Misc"
flaresolverr_homepage_icon: "flaresolverr.png"
flaresolverr_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ flaresolverr_port_http }}"
flaresolverr_homepage_showstats: false

# repliqate
flaresolverr_repliqate_enabled: false
flaresolverr_repliqate_engine: "restic"
flaresolverr_repliqate_schedule: "@daily 3am"
flaresolverr_repliqate_backup_id: "{{ flaresolverr_container_name }}"
flaresolverr_repliqate_retention: "30d"

# tinyauth
flaresolverr_tinyauth_enabled: false

# watchtower
flaresolverr_watchtower_enabled: false