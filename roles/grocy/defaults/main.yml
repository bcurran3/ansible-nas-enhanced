---
# ANE
ansible_nas_app_name: "Grocy"
grocy_enabled: false
grocy_traefik_enabled: false
grocy_traefik_whitelist: "{{ lan }}"
grocy_data_directory: "{{ docker_home }}/grocy"

# network
grocy_hostname: "grocy"
grocy_port_http: "9283"

# docker
grocy_container_name: "grocy"
grocy_image_name: "lscr.io/linuxserver/grocy"
grocy_image_tag: "latest"

# specs
grocy_cpu_shares: 1024
grocy_memory: "1G"
grocy_memory_swap: -1

# app
grocy_user_id: "1000"
grocy_group_id: "1000"

# autoheal
grocy_autoheal_enabled: false

# dockflare
grocy_dockflare_enabled: false
grocy_dockflare_access_group: ""

# homepage
grocy_homepage_group: "Apps"
grocy_homepage_icon: "grocy.png"
grocy_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ grocy_port_http }}"
grocy_homepage_showstats: false

# linuxserver.io docker mods
grocy_env_docker_mods: ""
grocy_env_docker_mods_install_packages: ""
grocy_env_docker_mods_install_pip_packages: ""

# repliqate
grocy_repliqate_enabled: false
grocy_repliqate_engine: "restic"
grocy_repliqate_schedule: "@daily 3am"
grocy_repliqate_backup_id: "{{ grocy_container_name }}"
grocy_repliqate_retention: "30d"

# tinyauth
grocy_tinyauth_enabled: false

# watchtower
grocy_watchtower_enabled: false