---
# ANE
ansible_nas_app_name: "Grocy"
grocy_enabled: false
grocy_available_externally: false
grocy_traefik_whitelist: "{{ lan }}"
grocy_data_directory: "{{ docker_home }}/grocy"

# network
grocy_hostname: "grocy"
grocy_port_http: "9283"

# docker
grocy_container_name: "grocy"
grocy_image_name: "lscr.io/linuxserver/grocy"
grocy_image_tag: "latest"
grocy_cpu_shares: "1024"
grocy_memory: "1G"
grocy_env_docker_mods: ""

# app
grocy_user_id: "1000"
grocy_group_id: "1000"

# autoheal
grocy_autoheal: "false"

# dockflare
grocy_dockflare_tunnel: "false"
grocy_dockflare_access_group: ""

# homepage
grocy_homepage_group: "Apps"
grocy_homepage_icon: "grocy.png"
grocy_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ grocy_port_http }}"
grocy_homepage_showStats: "false"

# watchtower
grocy_watchtower_monitor_only: "true"