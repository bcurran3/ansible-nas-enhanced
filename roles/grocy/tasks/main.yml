---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directory
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ grocy_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ grocy_container_name }}"
        hostname: "{{ grocy_container_name }}"
        image: "{{ grocy_image_name }}:{{ grocy_image_tag }}"
        pull: true
        volumes:
          - "{{ grocy_data_directory }}/config:/config:rw"
        ports:
          - "{{ grocy_port_http }}:80"
        env:
          PUID: "{{ grocy_user_id }}"
          PGID: "{{ grocy_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ grocy_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ grocy_watchtower_monitor_only }}"
          dockflare.enable: "{{ grocy_dockflare_tunnel }}"
          dockflare.access.group: "{{ grocy_dockflare_access_group }}"
          dockflare.hostname: "{{ grocy_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ grocy_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ grocy_homepage_group }}"
          homepage.icon: "{{ grocy_homepage_icon }}"
          homepage.href: "{{ grocy_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ grocy_port_http }}"
          homepage.description: "{{ 'ERP beyond your fridge - Grocy is a web-based self-hosted groceries & household management solution for your home' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ grocy_container_name }}"
          homepage.showStats: "{{ grocy_homepage_showStats }}"
          traefik.enable: "{{ grocy_available_externally | string }}"
          traefik.http.routers.grocy.rule: "Host(`grocy.{{ ansible_nas_domain }}`)"
          traefik.http.routers.grocy.tls.certresolver: "letsencrypt"
          traefik.http.routers.grocy.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.grocy.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ grocy_hostname }}"
          traefik.http.routers.grocy.middlewares: "{{ grocy_hostname }}@docker"
          traefik.http.middlewares.grocy.IPAllowList.sourcerange: "{{ grocy_traefik_whitelist }}"
          traefik.http.services.grocy.loadbalancer.server.port: "80"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/linuxserver/docker-grocy/releases/tag/$${major}.$${minor}.$${patch}"
        cpu_shares: "{{ grocy_cpu_shares }}"
        memory: "{{ grocy_memory }}"
        restart_policy: unless-stopped
  when: grocy_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ grocy_container_name }}"
        state: absent
  when: grocy_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ grocy_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ grocy_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: grocy_enabled is false and archive_app_data_enabled is true
