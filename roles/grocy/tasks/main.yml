---
- name: Start {{ grocy_proper_name }}
  block:
    - name: Create {{ grocy_proper_name }} Directory
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ grocy_data_directory }}/config"

    - name: Set {{ grocy_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        grocy_homepage_href: "https://{{ grocy_hostname }}.{{ ansible_nas_domain }}"
      when: grocy_traefik_enabled | bool or grocy_dockflare_enabled | bool

    - name: Create {{ grocy_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ grocy_container_name }}"
        hostname: "{{ grocy_container_name }}"
        image: "{{ grocy_image_name }}:{{ grocy_image_tag }}"
        pull: true
        volumes:
          - "{{ grocy_data_directory }}/config:/config:rw"
        ports:
          - "{{ grocy_port_http }}:80"
        env:
          DOCKER_MODS: "{{ grocy_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ grocy_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ grocy_env_docker_mods_install_pip_packages}}"
          PUID: "{{ grocy_user_id }}"
          PGID: "{{ grocy_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ grocy_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ grocy_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ grocy_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ grocy_dockflare_access_group }}"
          dockflare.hostname: "{{ grocy_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ grocy_port_http }}"
          homepage.name: "{{ grocy_proper_name }}"
          homepage.group: "{{ grocy_homepage_group }}"
          homepage.icon: "{{ grocy_homepage_icon }}"
          homepage.href: "{{ grocy_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ grocy_port_http }}"
          homepage.description: "{{ 'ERP beyond your fridge - Grocy is a web-based self-hosted groceries & household management solution for your home' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ grocy_container_name }}"
          homepage.showStats: "{{ grocy_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ grocy_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ grocy_repliqate_engine }}"
          repliqate.schedule: "{{ grocy_repliqate_schedule }}"
          repliqate.backup_id: "{{ grocy_repliqate_backup_id }}"
          repliqate.retention: "{{ grocy_repliqate_retention }}"
          traefik.enable: "{{ grocy_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.grocy.rule: "Host(`{{ grocy_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.grocy.tls.certresolver: "letsencrypt"
          traefik.http.routers.grocy.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.grocy.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.grocy.middlewares: "grocy@docker{{ ',tinyauth-auth@docker' if grocy_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.grocy.IPAllowList.sourcerange: "{{ grocy_traefik_whitelist }}"
          traefik.http.services.grocy.loadbalancer.server.port: "80"
          wud.tag.include: '^version-\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "lscr.io/linuxserver/grocy"
        cpu_shares: "{{ grocy_cpu_shares }}"
        memory: "{{ grocy_memory }}"
        memory_swap: "{{ grocy_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ grocy_proper_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (grocy_port_http | string)] +
                (['https://' + grocy_hostname + '.' + ansible_nas_domain] if (grocy_traefik_enabled is true or grocy_dockflare_enabled is true) else [])
              }}
  when: grocy_enabled is true

- name: Stop {{ grocy_proper_name }}
  block:
    - name: Stop {{ grocy_proper_name }} Container
      community.docker.docker_container:
        name: "{{ grocy_container_name }}"
        state: absent
  when: grocy_enabled is false

- name: Data Archive {{ grocy_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ grocy_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - grocy_enabled is false