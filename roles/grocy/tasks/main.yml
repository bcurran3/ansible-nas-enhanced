---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directory
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ grocy_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ grocy_container_name }}"
        hostname: "{{ grocy_container_name }}"
        image: "{{ grocy_image_name }}:{{ grocy_image_tag }}"
        pull: true
        volumes:
          - "{{ grocy_data_directory }}/config:/config:rw"
        ports:
          - "{{ grocy_port_http }}:80"
        env:
          DOCKER_MODS: "{{ grocy_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ grocy_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ grocy_env_docker_mods_install_pip_packages}}"
          PUID: "{{ grocy_user_id }}"
          PGID: "{{ grocy_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ grocy_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ grocy_watchtower_enable }}"
          dockflare.enable: "{{ grocy_dockflare_tunnel }}"
          dockflare.access.group: "{{ grocy_dockflare_access_group }}"
          dockflare.hostname: "{{ grocy_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ grocy_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ grocy_homepage_group }}"
          homepage.icon: "{{ grocy_homepage_icon }}"
          homepage.href: "{{ grocy_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ grocy_port_http }}"
          homepage.description: "{{ 'ERP beyond your fridge - Grocy is a web-based self-hosted groceries & household management solution for your home' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ grocy_container_name }}"
          homepage.showStats: "{{ grocy_homepage_showstats }}"
          repliqate.enabled: "{{ grocy_repliqate_enabled }}"
          repliqate.engine: "{{ grocy_repliqate_engine }}"
          repliqate.schedule: "{{ grocy_repliqate_schedule }}"
          repliqate.backup_id: "{{ grocy_repliqate_backup_id }}"
          repliqate.retention: "{{ grocy_repliqate_retention }}"
          traefik.enable: "{{ grocy_available_externally | string }}"
          traefik.http.routers.grocy.rule: "Host(`grocy.{{ ansible_nas_domain }}`)"
          traefik.http.routers.grocy.tls.certresolver: "letsencrypt"
          traefik.http.routers.grocy.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.grocy.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ grocy_hostname }}"
          traefik.http.routers.grocy.middlewares: "{{ grocy_hostname }}@docker"
          traefik.http.middlewares.grocy.IPAllowList.sourcerange: "{{ grocy_traefik_whitelist }}"
          traefik.http.services.grocy.loadbalancer.server.port: "80"
          wud.tag.include: '^version-\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "lscr.io/linuxserver/grocy"
        cpu_shares: "{{ grocy_cpu_shares }}"
        memory: "{{ grocy_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (grocy_port_http | string)] +
                (['https://' + grocy_hostname + '.' + ansible_nas_domain] if (grocy_available_externally is true or grocy_dockflare_tunnel is true) else [])
              }}
  when: grocy_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ grocy_container_name }}"
        state: absent
  when: grocy_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ grocy_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ grocy_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: grocy_enabled is false and archive_app_data_enabled is true
