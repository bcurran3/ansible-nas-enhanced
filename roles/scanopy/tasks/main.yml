---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ scanopy_data_directory }}"
        - "{{ scanopy_data_directory }}/config"
        - "{{ scanopy_data_directory }}/data"
        - "{{ scanopy_data_directory }}/db"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        scanopy_env_scanopy_public_url: "https://{{ scanopy_hostname }}.{{ ansible_nas_domain }}"
        scanopy_env_scanopy_use_secure_session_cookies: "true"
        scanopy_homepage_href: "https://{{ scanopy_hostname }}.{{ ansible_nas_domain }}"
      when: scanopy_traefik_enabled | bool or scanopy_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} daemon Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ scanopy_daemon_container_name }}"
        hostname: "{{ scanopy_daemon_container_name }}"
        image: "{{ scanopy_daemon_image_name }}:{{ scanopy_daemon_image_tag }}"
        pull: true
        network_mode: host
        privileged: true
        volumes:
          - "{{ scanopy_data_directory }}/config:/root/.config/daemon"
          - /var/run/docker.sock:/var/run/docker.sock:ro
#        ports:
#          - 60073:60073
        env:
          SCANOPY_SERVER_URL: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ scanopy_port_http }}"
          SCANOPY_DAEMON_PORT: "60073"
          SCANOPY_PORT: "{{ scanopy_daemon_port_http }}"
          SCANOPY_BIND_ADDRESS: "{{ scanopy_daemon_env_scanopy_bind_address }}"
          SCANOPY_NAME: "{{ scanopy_daemon_env_scanopy_name }}"
          SCANOPY_HEARTBEAT_INTERVAL: "{{ scanopy_daemon_env_scanopy_heartbeat_interval }}"
          SCANOPY_MODE: "{{ scanopy_daemon_env_scanopy_mode }}"
          SCANOPY_INTEGRATED_DAEMON_URL: "{{ scanopy_daemon_env_scanopy_integrated_daemon_url }}"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: ["CMD-SHELL", "curl -f http://localhost:{{ scanopy_daemon_port_http }}/api/health || exit 1"]
          interval: "5s"
          timeout: "3s"
          retries: 15
        labels:
          autoheal: "{{ scanopy_daemon_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ scanopy_daemon_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} daemon"
          homepage.group: "{{ scanopy_daemon_homepage_group }}"
          homepage.icon: "{{ scanopy_daemon_homepage_icon }}"
          homepage.href: "{{ scanopy_daemon_homepage_href }}"
          homepage.description: "{{ 'Scanopy daemon' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ scanopy_daemon_container_name }}"
          homepage.showStats: "{{ scanopy_daemon_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ scanopy_daemon_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ scanopy_daemon_repliqate_engine }}"
          repliqate.schedule: "{{ scanopy_daemon_repliqate_schedule }}"
          repliqate.backup_id: "{{ scanopy_daemon_repliqate_backup_id }}"
          repliqate.retention: "{{ scanopy_daemon_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/dev/scanopy/pkgs/container/scanopy"
        cpu_shares: "{{ scanopy_daemon_cpu_shares }}"
        memory: "{{ scanopy_daemon_memory }}"
        memory_swap: "{{ scanopy_daemon_memory_swap }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ scanopy_db_container_name }}"
        hostname: "{{ scanopy_db_container_name }}"
        image: "{{ scanopy_db_image_name }}:{{ scanopy_db_image_tag }}"
        pull: true
        volumes:
          - "{{ scanopy_data_directory }}/db:/var/lib/postgresql/data"
        env:
          POSTGRES_DB: "{{ scanopy_env_postgres_db }}"
          POSTGRES_USER: "{{ scanopy_env_postgres_user }}"
          POSTGRES_PASSWORD: "{{ scanopy_env_postgres_password }}"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: ["CMD-SHELL", "pg_isready -U postgres"]
          interval: "10s"
          timeout: "5s"
          retries: 5
        labels:
          autoheal: "{{ scanopy_db_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ scanopy_db_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} PostgreSQL"
          homepage.group: "{{ scanopy_db_homepage_group }}"
          homepage.icon: "{{ scanopy_db_homepage_icon }}"
          homepage.href: "{{ scanopy_homepage_href }}"
          homepage.description: "{{ 'PostgreSQL Database Management System' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ scanopy_db_container_name }}"
          homepage.showStats: "{{ scanopy_db_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ scanopy_db_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ scanopy_db_repliqate_engine }}"
          repliqate.schedule: "{{ scanopy_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ scanopy_db_repliqate_backup_id }}"
          repliqate.retention: "{{ scanopy_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/postgres"
        cpu_shares: "{{ scanopy_db_cpu_shares }}"
        memory: "{{ scanopy_db_memory }}"
        memory_swap: "{{ scanopy_db_memory_swap }}"
        restart_policy: unless-stopped

    - name: Verify {{ ansible_nas_app_name }} DB is healthy
      community.docker.docker_container_info:
        name: "{{ scanopy_db_container_name }}"
      register: db_info
      until: "db_info.container.State.Health.Status == 'healthy'"
      retries: 30
      delay: 5

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ scanopy_container_name }}"
        hostname: "{{ scanopy_container_name }}"
        image: "{{ scanopy_image_name }}:{{ scanopy_image_tag }}"
        pull: true
        volumes:
          - "{{ scanopy_data_directory }}/data:/data"
        ports:
          - "{{ scanopy_port_http }}:60072"
        env:
          SCANOPY_DATABASE_URL: "postgresql://{{ scanopy_env_postgres_user }}:{{ scanopy_env_postgres_password }}@{{ scanopy_db_container_name }}:5432/scanopy"
          SCANOPY_WEB_EXTERNAL_PATH: "{{ scanopy_env_scanopy_web_external_path }}"
          SCANOPY_PUBLIC_URL: "{{ scanopy_env_scanopy_public_url }}"
          SCANOPY_SERVER_PORT: "60072"
          SCANOPY_LOG_LEVEL: "{{ scanopy_env_scanopy_log_level }}"
          SCANOPY_INTEGRATED_DAEMON_URL: "{{ scanopy_env_scanopy_integrated_daemon_url }}"
          SCANOPY_USE_SECURE_SESSION_COOKIES: "{{ scanopy_env_scanopy_use_secure_session_cookies }}"
          TZ: "{{ ansible_nas_timezone }}"
        links:
          - "{{ scanopy_db_container_name }}"
        labels:
          autoheal: "{{ scanopy_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ scanopy_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ scanopy_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ scanopy_dockflare_access_group }}"
          dockflare.hostname: "{{ scanopy_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ scanopy_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ scanopy_homepage_group }}"
          homepage.icon: "{{ scanopy_homepage_icon }}"
          homepage.href: "{{ scanopy_homepage_href }}"
          homepage.description: "{{ 'Clean network diagrams. One-time setup, zero upkeep.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ scanopy_container_name }}"
          homepage.showStats: "{{ scanopy_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ scanopy_port_http }}"
          repliqate.enabled: "{{ scanopy_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ scanopy_repliqate_engine }}"
          repliqate.schedule: "{{ scanopy_repliqate_schedule }}"
          repliqate.backup_id: "{{ scanopy_repliqate_backup_id }}"
          repliqate.retention: "{{ scanopy_repliqate_retention }}"
          traefik.enable: "{{ scanopy_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.scanopy.rule: "Host(`{{ scanopy_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.scanopy.tls.certresolver: "letsencrypt"
          traefik.http.routers.scanopy.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.scanopy.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.scanopy.middlewares: "scanopy@docker{{ ',tinyauth-auth@docker' if scanopy_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.scanopy.IPAllowList.sourcerange: "{{ scanopy_traefik_whitelist }}"
          traefik.http.services.scanopy.loadbalancer.server.port: "60072"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/dev/scanopy/pkgs/container/scanopy"
        cpu_shares: "{{ scanopy_cpu_shares }}"
        memory: "{{ scanopy_memory }}"
        memory_swap: "{{ scanopy_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (scanopy_port_http | string)] +
                (['https://' + scanopy_hostname + '.' + ansible_nas_domain] if (scanopy_traefik_enabled is true or scanopy_dockflare_enabled is true) else [])
              }}
  when: scanopy_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ scanopy_container_name }}"
        state: absent
  when: scanopy_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ scanopy_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - scanopy_enabled is false
