---
# ANE
ansible_nas_app_name: "pyLoad"
pyload_enabled: false
pyload_traefik_enabled: false
pyload_traefik_whitelist: "{{ lan }}"

# directories
pyload_data_directory: "{{ docker_home }}/pyload"
pyload_download_directory: "{{ downloads_root }}"

# uid / gid
pyload_user_id: "0"
pyload_group_id: "0"

# network
pyload_hostname: "pyload"
pyload_port_http: "8000"

# docker
pyload_container_name: "pyload"
pyload_image_name: "writl/pyload"
pyload_image_version: "latest"

# specs
pyload_cpu_shares: 1024
pyload_memory: "1G"

# autoheal
pyload_autoheal_enabled: false

# dockflare
pyload_dockflare_enabled: false
pyload_dockflare_access_group: ""

# homepage
pyload_homepage_group: "Download Tools"
pyload_homepage_icon: "pyload.png"
pyload_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ pyload_port_http }}"
pyload_homepage_showstats: false

# repliqate
pyload_repliqate_enabled: false
pyload_repliqate_engine: "restic"
pyload_repliqate_schedule: "@daily 3am"
pyload_repliqate_backup_id: "{{ pyload_container_name }}"
pyload_repliqate_retention: "30d"

# tinyauth
pyload_tinyauth_enabled: false

# watchtower
pyload_watchtower_enabled: false