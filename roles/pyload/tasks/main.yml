---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        # mode: 0755
      with_items:
        - "{{ pyload_data_directory }}"
        - "{{ pyload_download_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ pyload_container_name }}"
        hostname: "{{ pyload_container_name }}"
        image: "{{ pyload_image_name }}:{{ pyload_image_version }}"
        pull: true
        volumes:
          - "{{ pyload_data_directory }}:/opt/pyload/pyload-config:rw"
          - "{{ pyload_download_directory }}:/opt/pyload/Downloads:rw"
        ports:
          - "{{ pyload_port_http }}:8000"
        env:
          TZ: "{{ ansible_nas_timezone }}"
          UID: "{{ pyload_user_id }}"
          GID: "{{ pyload_group_id }}"
        labels:
          autoheal: "{{ pyload_autoheal | string }}"
          com.centurylinklabs.watchtower.enable: "{{ pyload_watchtower_enabled | string }}"
          dockflare.enable: "{{ pyload_dockflare_enabled | string }}"
          dockflare.access.group: "{{ pyload_dockflare_access_group }}"
          dockflare.hostname: "{{ pyload_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ pyload_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ pyload_homepage_group }}"
          homepage.icon: "{{ pyload_homepage_icon }}"
          homepage.href: "{{ pyload_homepage_href }}"
          homepage.description: "{{ 'Download client' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ pyload_container_name }}"
          homepage.showStats: "{{ pyload_homepage_showstats | string }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ pyload_port_http }}"
          repliqate.enabled: "{{ pyload_repliqate_enabled | string }}"
          repliqate.engine: "{{ pyload_repliqate_engine }}"
          repliqate.schedule: "{{ pyload_repliqate_schedule }}"
          repliqate.backup_id: "{{ pyload_repliqate_backup_id }}"
          repliqate.retention: "{{ pyload_repliqate_retention }}"
          traefik.enable: "{{ pyload_available_externally | string }}"
          traefik.http.routers.pyload.rule: "Host(`{{ pyload_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.pyload.tls.certresolver: "letsencrypt"
          traefik.http.routers.pyload.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.pyload.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.pyload.middlewares: "pyload@docker{{ ',tinyauth-auth@docker' if pyload_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.pyload.IPAllowList.sourcerange: "{{ pyload_traefik_whitelist }}"
          traefik.http.services.pyload.loadbalancer.server.port: "8000"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/writl/pyload"
        cpu_shares: "{{ pyload_cpu_shares }}"
        memory: "{{ pyload_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (pyload_port_http | string)] +
                (['https://' + pyload_hostname + '.' + ansible_nas_domain] if (pyload_available_externally is true or pyload_dockflare_enabled is true) else [])
              }}
  when: pyload_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ pyload_container_name }}"
        state: absent
  when: pyload_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ pyload_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - pyload_enabled is false