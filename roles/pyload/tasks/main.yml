---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        # mode: 0755
      with_items:
        - "{{ pyload_data_directory }}"
        - "{{ pyload_download_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ pyload_container_name }}"
        hostname: "{{ pyload_container_name }}"
        image: "{{ pyload_image_name }}:{{ pyload_image_version }}"
        pull: true
        volumes:
          - "{{ pyload_data_directory }}:/opt/pyload/pyload-config:rw"
          - "{{ pyload_download_directory }}:/opt/pyload/Downloads:rw"
        ports:
          - "{{ pyload_port }}:8000"
        env:
          TZ: "{{ ansible_nas_timezone }}"
          UID: "{{ pyload_user_id }}"
          GID: "{{ pyload_group_id }}"
        labels:
          autoheal: "{{ pyload_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ pyload_watchtower_enable }}"
          dockflare.enable: "{{ pyload_dockflare_tunnel }}"
          dockflare.access.group: "{{ pyload_dockflare_access_group }}"
          dockflare.hostname: "{{ pyload_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ pyload_port }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ pyload_homepage_group }}"
          homepage.icon: "{{ pyload_homepage_icon }}"
          homepage.href: "{{ pyload_homepage_href }}"
          homepage.description: "{{ 'Download client' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ pyload_container_name }}"
          homepage.showStats: "{{ pyload_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ pyload_port }}"
          traefik.enable: "{{ pyload_available_externally | string }}"
          traefik.http.routers.pyload.rule: "Host(`{{ pyload_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.pyload.tls.certresolver: "letsencrypt"
          traefik.http.routers.pyload.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.pyload.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ pyload_hostname }}"
          traefik.http.routers.pyload.middlewares: "{{ pyload_hostname }}@docker"
          traefik.http.middlewares.pyload.IPAllowList.sourcerange: "{{ pyload_traefik_whitelist }}"
          traefik.http.services.pyload.loadbalancer.server.port: "8000"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/writl/pyload"
        cpu_shares: "{{ pyload_cpu_shares }}"
        memory: "{{ pyload_memory }}"
        restart_policy: unless-stopped
  when: pyload_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ pyload_container_name }}"
        state: absent
  when: pyload_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ pyload_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ pyload_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: pyload_enabled is false and archive_app_data_enabled is true
