---
# ANE
ansible_nas_app_name: "Gotify"
gotify_enabled: false
gotify_available_externally: false
gotify_traefik_whitelist: "{{ lan }}"

# data directory
gotify_data_directory: "{{ docker_home }}/gotify"

# network
gotify_port: "2346"
gotify_hostname: "gotify"

# docker
gotify_container_name: "gotify"
gotify_image_name: "ghcr.io/gotify/server"
gotify_image_version: "latest"
gotify_cpu_shares: 1024

gotify_user_id: "0"
gotify_group_id: "0"

# specs
gotify_memory: 256m

# app
gotify_env_gotify_server_cors_alloworigins: "{{ ansible_nas_domain }}"
gotify_env_gotify_server_trustedproxies: "{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}"

# autoheal
gotify_autoheal: "false"

# dockflare
gotify_dockflare_tunnel: "false"
gotify_dockflare_access_group: ""

# homepage
gotify_homepage_group: "Apps"
gotify_homepage_name: "Gotify"
gotify_homepage_icon: "gotify.png"
gotify_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ gotify_port }}"
gotify_homepage_showstats: "false"
gotify_homepage_widget_key: "your key"

# watchtower
gotify_watchtower_enable: "false"