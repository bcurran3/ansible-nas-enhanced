---
# ANE
ansible_nas_app_name: "Gotify"
gotify_enabled: false
gotify_available_externally: false
gotify_traefik_whitelist: "{{ lan }}"

# data directory
gotify_data_directory: "{{ docker_home }}/gotify"

# network
gotify_port: "2346"
gotify_hostname: "gotify"

# docker
gotify_container_name: "gotify"
gotify_image_name: "ghcr.io/gotify/server"
gotify_image_version: "latest"
gotify_cpu_shares: 1024

gotify_user_id: "0"
gotify_group_id: "0"

# specs
gotify_memory: 256m

# app
gotify_env_gotify_server_cors_alloworigins: "[{{ ansible_nas_domain }}]" # [.+.example\.com, otherdomain\.com]
gotify_env_gotify_server_cors_allowmethods: "" # [GET, POST]
gotify_env_gotify_server_cors_allowheaders: "" # [X-Gotify-Key, Authorization]
gotify_env_gotify_server_responseheaders: "" # {X-Custom-Header: "custom value", x-other: value}
gotify_env_gotify_server_stream_alloworigins: "[{{ ansible_nas_domain }}]" # [.+.example\.com, otherdomain\.com]
gotify_env_gotify_server_trustedproxies: "[127.0.0.1,{{ lan }}]" # [127.0.0.1,192.168.178.2/24]

# autoheal
gotify_autoheal: "false"

# dockflare
gotify_dockflare_tunnel: "false"
gotify_dockflare_access_group: ""

# homepage
gotify_homepage_group: "Apps"
gotify_homepage_name: "Gotify"
gotify_homepage_icon: "gotify.png"
gotify_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ gotify_port }}"
gotify_homepage_showstats: "false"
gotify_homepage_widget_key: "your key"

# repliqate
gotify_repliqate_enabled: "false"
gotify_repliqate_engine: "restic"
gotify_repliqate_schedule: "@daily 3am"
gotify_repliqate_backup_id: "gotify"
gotify_repliqate_retention: "30d"

# watchtower
gotify_watchtower_enable: "false"