---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ gotify_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ gotify_container_name }}"
        hostname: "{{ gotify_container_name }}"
        image: "{{ gotify_image_name }}:{{ gotify_image_version }}"
        pull: true
        ports:
          - "{{ gotify_port }}:{{ gotify_port }}"
        volumes:
          - "/var/run/docker.sock:/var/run/docker.sock"
          - "{{ gotify_data_directory }}:/app/data:rw"
        env:
          GOTIFY_SERVER_PORT: "{{ gotify_port }}"
          GOTIFY_SERVER_CORS_ALLOWORIGINS: "{{ gotify_env_gotify_server_cors_alloworigins }}"
          GOTIFY_SERVER_TRUSTEDPROXIES: "[{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}]"
          PUID: "{{ gotify_user_id }}"
          PGID: "{{ gotify_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ gotify_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ gotify_watchtower_enable }}"
          dockflare.enable: "{{ gotify_dockflare_tunnel }}"
          dockflare.hostname: "{{ gotify_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ gotify_port }}"
          homepage.name: "{{ gotify_homepage_name }}"
          homepage.group: "{{ gotify_homepage_group }}"
          homepage.icon: "{{ gotify_homepage_icon }}"
          homepage.description: "{{ 'A simple server for sending and receiving messages in real-time per WebSocket.' if homepage_show_description else omit }}"
          homepage.href: "{{ gotify_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ gotify_port }}"
          homepage.server: "my-docker"
          homepage.container: "{{ gotify_container_name }}"
          homepage.showStats: "{{ gotify_homepage_showstats }}"
          homepage.widget.type: "gotify"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ gotify_port }}"
          homepage.widget.key: "{{ gotify_homepage_widget_key }}"
          traefik.enable: "{{ gotify_available_externally | string }}"
          traefik.http.routers.gotify.rule: "Host(`{{ gotify_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.gotify.tls.certresolver: "letsencrypt"
          traefik.http.routers.gotify.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.gotify.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ gotify_hostname }}"
          traefik.http.routers.gotify.middlewares: "{{ gotify_hostname }}@docker"
          traefik.http.middlewares.gotify.IPAllowList.sourcerange: "{{ gotify_traefik_whitelist }}"
          traefik.http.services.gotify.loadbalancer.server.port: "{{ gotify_port }}"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/gotify/server"
        cpu_shares: "{{ gotify_cpu_shares }}"
        memory: "{{ gotify_memory }}"
        restart_policy: unless-stopped
  when: gotify_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ gotify_container_name }}"
        state: absent
  when: gotify_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ gotify_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ gotify_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: gotify_enabled is false and archive_app_data_enabled is true
