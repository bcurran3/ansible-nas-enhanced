---
# ANE
ansible_nas_app_name: "HTPC Manager"
htpcmanager_enabled: false
htpcmanager_available_externally: true
htpcmanager_traefik_whitelist: "{{ lan }}"
htpcmanager_data_directory: "{{ docker_home }}/htpcmanager"

# network
htpcmanager_hostname: "htpcmanager"
htpcmanager_port_http: "9011"

# docker
htpcmanager_container_name: "htpcmanager"
htpcmanager_image_name: "lscr.io/linuxserver/htpcmanager"
htpcmanager_image_tag: "latest"

# specs
htpcmanager_cpu_shares: 1024
htpcmanager_memory: "1G"
htpcmanager_memory_swap: -1

# app
htpcmanager_puid: "1000"
htpcmanager_pgid: "1000"

# autoheal
htpcmanager_autoheal: "false"

# dockflare
htpcmanager_dockflare_tunnel: "false"
htpcmanager_dockflare_access_group: ""

# homepage
htpcmanager_homepage_group: "Apps"
htpcmanager_homepage_icon: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ htpcmanager_port_http }}/img/homescreen.png"
htpcmanager_homepage_showstats: "false"
htpcmanager_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ htpcmanager_port_http }}"

# linuxserver.io docker mods
htpcmanager_env_docker_mods: ""
htpcmanager_env_docker_mods_install_packages: ""
htpcmanager_env_docker_mods_install_pip_packages: ""

# repliqate
htpcmanager_repliqate_enabled: "false"
htpcmanager_repliqate_engine: "restic"
htpcmanager_repliqate_schedule: "@daily 3am"
htpcmanager_repliqate_backup_id: "{{ htpcmanager_container_name }}"
htpcmanager_repliqate_retention: "30d"

# tinyauth
htpcmanager_tinyauth_enabled: false

# watchtower
htpcmanager_watchtower_enable: "false"
