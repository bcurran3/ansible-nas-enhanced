---
# ANE
ansible_nas_app_name: "IT-Tools"
it_tools_enabled: false
it_tools_traefik_enabled: false
it_tools_traefik_whitelist: "{{ lan }}"

# docker
it_tools_container_name: "it-tools"
it_tools_image_name: "ghcr.io/sharevb/it-tools"
it_tools_image_tag: "latest"

# network
it_tools_port_http: "8991"
it_tools_hostname: "ittools"

# specs
it_tools_cpu_shares: 1024
it_tools_memory: "1G"
it_tools_memory_swap: -1

# autoheal
it_tools_autoheal_enabled: false

# dockflare
it_tools_dockflare_enabled: false
it_tools_dockflare_access_group: ""

# homepage
it_tools_homepage_group: "Apps"
it_tools_homepage_icon: "it-tools.png"
it_tools_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ it_tools_port }}"
it_tools_homepage_showstats: false

# tinyauth
it_tools_tinyauth_enabled: false

# watchtower
it_tools_watchtower_enabled: false
