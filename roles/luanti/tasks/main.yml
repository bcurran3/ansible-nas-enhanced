---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ luanti_data_directory }}"
        - "{{ luanti_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ luanti_container_name }}"
        hostname: "{{ luanti_container_name }}"
        image: "{{ luanti_image_name }}:{{ luanti_image_tag }}"
        pull: true
        volumes:
          - "{{ luanti_data_directory }}/config:/config/.minetest"
        ports:
          - "30000:30000/udp"
        env:
          DOCKER_MODS: "{{ luanti_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ luanti_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ luanti_env_docker_mods_install_pip_packages}}"
          PUID: "{{ luanti_user_id }}"
          PGID: "{{ luanti_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ luanti_autoheal | string }}"
          com.centurylinklabs.watchtower.enable: "{{ luanti_watchtower_enabled| string }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ luanti_homepage_group }}"
          homepage.icon: "{{ luanti_homepage_icon }}"
          homepage.description: "{{ 'An open source voxel game engine.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ luanti_container_name }}"
          homepage.showStats: "{{ luanti_homepage_showstats | string }}"
          repliqate.enabled: "{{ luanti_repliqate_enabled | string }}"
          repliqate.engine: "{{ luanti_repliqate_engine }}"
          repliqate.schedule: "{{ luanti_repliqate_schedule }}"
          repliqate.backup_id: "{{ luanti_repliqate_backup_id }}"
          repliqate.retention: "{{ luanti_repliqate_retention }}"
          traefik.enable: "false"
          wud.watch.digest: "true"
          wud.link.template: "https://lscr.io/linuxserver/luanti"
        cpu_shares: "{{ luanti_cpu_shares }}"
        memory: "{{ luanti_memory }}"
        memory_swap: "{{ luanti_memory_swap }}"
        restart_policy: unless-stopped
  when: luanti_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ luanti_container_name }}"
        state: absent
  when: luanti_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ luanti_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - luanti_enabled is false