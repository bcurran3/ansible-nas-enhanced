---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ luanti_data_directory }}"
        - "{{ luanti_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ luanti_container_name }}"
        hostname: "{{ luanti_container_name }}"
        image: "{{ luanti_image_name }}:{{ luanti_image_tag }}"
        pull: true
        volumes:
          - "{{ luanti_data_directory }}/config:/config/.minetest"
        ports:
          - "30000:30000/udp"
        env:
          PUID: "{{ luanti_user_id }}"
          PGID: "{{ luanti_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ luanti_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ luanti_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ luanti_homepage_group }}"
          homepage.icon: "{{ luanti_homepage_icon }}"
          homepage.description: "{{ 'An open source voxel game engine.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ luanti_container_name }}"
          homepage.showStats: "{{ luanti_homepage_showStats }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/linuxserver/docker-luanti/releases/tag/$${major}.$${minor}.$${patch}"
        cpu_shares: "{{ luanti_cpu_shares }}"
        memory: "{{ luanti_memory }}"
        restart_policy: unless-stopped
  when: luanti_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ luanti_container_name }}"
        state: absent
  when: luanti_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ luanti_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ luanti_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: luanti_enabled is false and archive_app_data_enabled is true
