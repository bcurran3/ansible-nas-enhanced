---
# ANE
ansible_nas_app_name: "My Media for Alexa"
mymediaforalexa_enabled: false

# directories
mymediaforalexa_data_directory: "{{ docker_home }}/mymediaforalexa"
mymediaforalexa_media_directory: "{{ music_root }}"

# docker
mymediaforalexa_container_name: "mymediaforalexa"
mymediaforalexa_image_name: "bizmodeller/mymediaforalexa"
mymediaforalexa_image_version: "latest"

# specs
mymediaforalexa_cpu_shares: 1024
mymediaforalexa_memory: "1G"
mymediaforalexa_memory_swap: -1

# autoheal
mymediaforalexa_autoheal_enabled: false

# homepage
mymediaforalexa_homepage_group: "Misc"
mymediaforalexa_homepage_icon: "https://raw.githubusercontent.com/itimpi/MyMediaForAlexa/refs/heads/master/MyMediaForAlexa.png"
mymediaforalexa_homepage_showstats: false

# repliqate
mymediaforalexa_repliqate_enabled: false
mymediaforalexa_repliqate_engine: "restic"
mymediaforalexa_repliqate_schedule: "@daily 3am"
mymediaforalexa_repliqate_backup_id: "{{ mymediaforalexa_container_name }}"
mymediaforalexa_repliqate_retention: "30d"

# watchtower
mymediaforalexa_watchtower_enabled: false