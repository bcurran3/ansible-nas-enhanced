---
# ANE
ansible_nas_app_name: "My Media for Alexa"
mymediaforalexa_enabled: false

# directories
mymediaforalexa_data_directory: "{{ docker_home }}/mymediaforalexa"
mymediaforalexa_media_directory: "{{ music_root }}"

# docker
mymediaforalexa_container_name: "mymediaforalexa"
mymediaforalexa_image_name: "bizmodeller/mymediaforalexa"
mymediaforalexa_image_version: "latest"
mymediaforalexa_cpu_shares: 1024

# specs
mymediaforalexa_memory: "1g"

# autoheal
mymediaforalexa_autoheal: "false"

# homepage
mymediaforalexa_homepage_group: "Misc"
mymediaforalexa_homepage_icon: "mymediaforalexa.png"
mymediaforalexa_homepage_showstats: "false"

# watchtower
mymediaforalexa_watchtower_enable: "false"