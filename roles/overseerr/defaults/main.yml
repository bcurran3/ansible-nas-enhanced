---
# ANE
ansible_nas_app_name: "Overseerr"
overseerr_enabled: false
overseerr_available_externally: false
overseerr_traefik_whitelist: "{{ lan }}"

# directories
overseerr_data_directory: "{{ docker_home }}/overseerr"

# docker
overseerr_container_name: "overseerr"
overseerr_image_name: "lscr.io/linuxserver/overseerr"
overseerr_image_version: "latest"

overseerr_user_id: "1000"
overseerr_group_id: "1000"

# network config
overseerr_port_http: "5055"
overseerr_hostname: "overseerr"

# specs
overseerr_cpu_shares: 1024
overseerr_memory: "1G"

# autoheal
overseerr_autoheal: "false"

# dockflare
overseerr_dockflare_tunnel: "false"
overseerr_dockflare_access_group: ""

# homepage
overseerr_homepage_group: "Apps"
overseerr_homepage_icon: "overseerr.png"
overseerr_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ overseerr_port_http }}"
overseerr_homepage_showstats: "false"
overseerr_homepage_widget_key: "replace_this_with_API_token"

# linuxserver.io docker mods
overseerr_env_docker_mods: ""
overseerr_env_docker_mods_install_packages: ""
overseerr_env_docker_mods_install_pip_packages: ""

# theme.park themes
# https://docs.theme-park.dev/themes/overseerr/
overseerr_env_docker_mods_tp_theme: ""
overseerr_env_docker_mods_tp_community_theme: ""
overseerr_env_docker_mods_tp_domain: ""
overseerr_env_docker_mods_tp_addon: ""

# repliqate
overseerr_repliqate_enabled: "false"
overseerr_repliqate_engine: "restic"
overseerr_repliqate_schedule: "@daily 3am"
overseerr_repliqate_backup_id: "{{ overseerr_container_name }}"
overseerr_repliqate_retention: "30d"

# watchtower
overseerr_watchtower_enable: "false"