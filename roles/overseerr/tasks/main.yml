---
- name: Start Overseerr
  block:
    - name: Create Overseerr Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ overseerr_data_directory }}"
        - "{{ overseerr_data_directory }}/config"

    - name: Overseerr Docker Container
      community.docker.docker_container:
        name: "{{ overseerr_container_name }}"
        hostname: "{{ overseerr_container_name }}"
        image: "{{ overseerr_image_name }}:{{ overseerr_image_version }}"
        pull: true
        volumes:
          - "{{ overseerr_data_directory }}/config:/app/config:rw"
        ports:
          - "{{ overseerr_port }}:5055"
        env:
          TZ: "{{ ansible_nas_timezone }}"
          PUID: "{{ overseerr_user_id }}"
          PGID: "{{ overseerr_group_id }}"
        restart_policy: unless-stopped
        memory: "{{ overseerr_memory }}"
        labels:
          autoheal: "{{ overseerr_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ overseerr_watchtower_monitor_only }}"
          homepage.name: "Overseerr"
          homepage.group: "{{ overseerr_homepage_group }}"
          homepage.icon: "{{ overseerr_homepage_icon }}"
          homepage.href: "{{ overseerr_homepage_href }}"
#         homepage.description: "Request management and media discovery tool for the Plex ecosystem"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ overseerr_port }}"
          homepage.server: "my-docker"
          homepage.container: "{{ overseerr_container_name }}"
          homepage.showStats: "{{ overseerr_homepage_showStats }}"
          homepage.widget.type: "overseerr"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ overseerr_port }}"
          homepage.widget.key: "{{ overseerr_homepage_widget_key }}"
          traefik.enable: "{{ overseerr_available_externally | string }}"
          traefik.http.routers.overseerr.rule: "Host(`{{ overseerr_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.overseerr.tls.certresolver: "letsencrypt"
          traefik.http.routers.overseerr.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.overseerr.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ overseerr_hostname }}"
          traefik.http.routers.overseer.middlewares: "{{ overseerr_hostname }}@docker"
          traefik.http.middlewares.overseerr.IPAllowList.sourcerange: "{{ overseerr_traefik_whitelist }}"      
          traefik.http.services.overseerr.loadbalancer.server.port: "5055"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/linuxserver/docker-overseerr/releases/tag/$${major}.$${minor}.$${patch}"
  when: overseerr_enabled is true

- name: Stop Overseerr
  block:
    - name: Stop Overseerr
      community.docker.docker_container:
        name: "{{ overseerr_container_name }}"
        state: absent
  when: overseerr_enabled is false
