---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ overseerr_data_directory }}"
        - "{{ overseerr_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ overseerr_container_name }}"
        hostname: "{{ overseerr_container_name }}"
        image: "{{ overseerr_image_name }}:{{ overseerr_image_version }}"
        pull: true
        volumes:
          - "{{ overseerr_data_directory }}/config:/config:rw"
        ports:
          - "{{ overseerr_port_http }}:5055"
        env:
          DOCKER_MODS: "{{ overseerr_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ overseerr_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ overseerr_env_docker_mods_install_pip_packages}}"
          TP_DOMAIN: "{{ overseerr_env_docker_mods_tp_domain }}"
          TP_THEME: "{{ overseerr_env_docker_mods_tp_theme }}"
          TP_COMMUNITY_THEME: "{{ overseerr_env_docker_mods_tp_community_theme }}"
          TP_ADDON: "{{ overseerr_env_docker_mods_tp_addon }}"
          PUID: "{{ overseerr_user_id }}"
          PGID: "{{ overseerr_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ overseerr_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ overseerr_watchtower_enable }}"
          dockflare.enable: "{{ overseerr_dockflare_tunnel }}"
          dockflare.access.group: "{{ overseerr_dockflare_access_group }}"
          dockflare.hostname: "{{ overseerr_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ overseerr_port_http }}"
          repliqate.enabled: "{{ overseerr_repliqate_enabled }}"
          repliqate.engine: "{{ overseerr_repliqate_engine }}"
          repliqate.schedule: "{{ overseerr_repliqate_schedule }}"
          repliqate.backup_id: "{{ overseerr_repliqate_backup_id }}"
          repliqate.retention: "{{ overseerr_repliqate_retention }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ overseerr_homepage_group }}"
          homepage.icon: "{{ overseerr_homepage_icon }}"
          homepage.href: "{{ overseerr_homepage_href }}"
          homepage.description: "{{ 'Request management and media discovery tool for the Plex ecosystem' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ overseerr_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ overseerr_container_name }}"
          homepage.showStats: "{{ overseerr_homepage_showstats }}"
          homepage.widget.type: "overseerr"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ overseerr_port_http }}"
          homepage.widget.key: "{{ overseerr_homepage_widget_key }}"
          traefik.enable: "{{ overseerr_available_externally | string }}"
          traefik.http.routers.overseerr.rule: "Host(`{{ overseerr_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.overseerr.tls.certresolver: "letsencrypt"
          traefik.http.routers.overseerr.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.overseerr.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.overseerr.middlewares: "{{ overseerr_hostname }}@docker{{ ',tinyauth-auth@docker' if overseerr_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.overseerr.IPAllowList.sourcerange: "{{ overseerr_traefik_whitelist }}"
          traefik.http.services.overseerr.loadbalancer.server.port: "5055"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://lscr.io/linuxserver/overseerr"
        cpu_shares: "{{ overseerr_cpu_shares }}"
        memory: "{{ overseerr_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (overseerr_port_http | string)] +
                (['https://' + overseerr_hostname + '.' + ansible_nas_domain] if (overseerr_available_externally is true or overseerr_dockflare_tunnel is true) else [])
              }}
  when: overseerr_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ overseerr_container_name }}"
        state: absent
  when: overseerr_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ overseerr_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - overseerr_enabled is false