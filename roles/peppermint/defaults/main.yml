---
# ANE
ansible_nas_app_name: "Peppermint"
peppermint_enabled: false
peppermint_traefik_enabled: false
peppermint_traefik_whitelist: "{{ lan }}"

peppermint_data_directory: "{{ docker_home }}/peppermint"

# network
peppermint_port_http: "3021"
peppermint_hostname: "peppermint"

# docker
peppermint_container_name: "peppermint"
peppermint_image_name: "pepperlabs/peppermint"
peppermint_image_tag: "latest"
peppermint_db_container_name: "peppermint-db"
peppermint_db_image_name: "postgres"
peppermint_db_image_tag: "17-alpine"

# specs
peppermint_cpu_shares: 1024
peppermint_memory: "1G"
peppermint_db_cpu_shares: 1024
peppermint_db_memory: "1G"

# app
peppermint_db_password: "peppermint"

# autoheal
peppermint_autoheal_enabled: false
peppermint_db_autoheal_enabled: false

# dockflare
peppermint_dockflare_enabled: false
peppermint_dockflare_access_group: ""

# homepage
peppermint_homepage_group: "Apps"
peppermint_homepage_icon: "peppermint.png"
peppermint_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ peppermint_port_http }}"
peppermint_homepage_showstats: false
peppermint_db_homepage_group: "DBs"
peppermint_db_homepage_icon: "postgres.png"
peppermint_db_homepage_href: "{{ peppermint_homepage_href }}"
peppermint_db_homepage_showstats: false

# repliqate
peppermint_repliqate_enabled: false
peppermint_repliqate_engine: "restic"
peppermint_repliqate_schedule: "@daily 3am"
peppermint_repliqate_backup_id: "{{ peppermint_container_name }}"
peppermint_repliqate_retention: "30d"
peppermint_db_repliqate_enabled: false
peppermint_db_repliqate_engine: "restic"
peppermint_db_repliqate_schedule: "@daily 3am"
peppermint_db_repliqate_backup_id: "{{ peppermint_container_name }}"
peppermint_db_repliqate_retention: "30d"

# tinyauth
peppermint_tinyauth_enabled: false

# watchtower
peppermint_watchtower_enabled: false
peppermint_db_watchtower_enabled: false