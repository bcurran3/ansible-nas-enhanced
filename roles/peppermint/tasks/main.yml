---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ peppermint_data_directory }}"
        - "{{ peppermint_data_directory }}/db"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        peppermint_homepage_href: "https://{{ peppermint_hostname }}.{{ ansible_nas_domain }}"
      when: peppermint_traefik_enabled | bool or peppermint_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ peppermint_db_container_name }}"
        hostname: "{{ peppermint_db_container_name }}"
        image: "{{ peppermint_db_image_name }}:{{ peppermint_db_image_tag }}"
        pull: true
        volumes:
          - "{{ peppermint_data_directory }}/db:/var/lib/postgresql/data"
        env:
          POSTGRES_USER: "{{ peppermint_env_db_username }}"
          POSTGRES_PASSWORD: "{{ peppermint_env_db_password }}"
          POSTGRES_DB: "{{ peppermint_db_env_postgres_db }}"
        healthcheck:
          test: ["CMD-SHELL", "pg_isready -U peppermint"]
          interval: 10s
          timeout: 5s
          retries: 5
          start_period: 30s
        labels:
          autoheal: "{{ peppermint_db_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ peppermint_db_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} PostgreSQL"
          homepage.group: "{{ peppermint_db_homepage_group }}"
          homepage.icon: "{{ peppermint_db_homepage_icon }}"
          homepage.href: "{{ peppermint_db_homepage_href }}"
          homepage.description: "{{ 'MariaDB Server is a high performing open source relational database, forked from MySQL.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ peppermint_db_container_name }}"
          homepage.showStats: "{{ peppermint_db_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ peppermint_db_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ peppermint_db_repliqate_engine }}"
          repliqate.schedule: "{{ peppermint_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ peppermint_db_repliqate_backup_id }}"
          repliqate.retention: "{{ peppermint_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/postgres"
        cpu_shares: "{{ peppermint_db_cpu_shares }}"
        memory: "{{ peppermint_db_memory }}"
        memory_swap: "{{ peppermint_db_memory_swap }}"
        restart_policy: unless-stopped

    - name: Verify {{ ansible_nas_app_name }} DB is healthy
      community.docker.docker_container_info:
        name: "{{ peppermint_db_container_name }}"
      register: db_info
      until: "db_info.container.State.Health.Status == 'healthy'"
      retries: 30
      delay: 5

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ peppermint_container_name }}"
        hostname: "{{ peppermint_container_name }}"
        image: "{{ peppermint_image_name }}:{{ peppermint_image_tag }}"
        pull: true
        ports:
          - "{{ peppermint_port_http }}:3000"
          - 5003:5003
        env:
          DB_USERNAME: "{{ peppermint_env_db_username }}"
          DB_PASSWORD: "{{ peppermint_env_db_password }}"
          DB_HOST: "{{ peppermint_db_container_name }}"
          SECRET: "{{ peppermint_env_secret }}"
          TZ: "{{ ansible_nas_timezone }}"
        links:
          - "{{ peppermint_db_container_name }}"
        labels:
          autoheal: "{{ peppermint_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ peppermint_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ peppermint_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ peppermint_dockflare_access_group }}"
          dockflare.hostname: "{{ peppermint_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ peppermint_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ peppermint_homepage_group }}"
          homepage.icon: "{{ peppermint_homepage_icon }}"
          homepage.href: "{{ peppermint_homepage_href }}"
          homepage.description: "{{ 'An open source issue management & help desk solution. A zendesk & jira alternative' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ peppermint_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ peppermint_container_name }}"
          homepage.showStats: "{{ peppermint_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ peppermint_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ peppermint_repliqate_engine }}"
          repliqate.schedule: "{{ peppermint_repliqate_schedule }}"
          repliqate.backup_id: "{{ peppermint_repliqate_backup_id }}"
          repliqate.retention: "{{ peppermint_repliqate_retention }}"
          traefik.enable: "{{ peppermint_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.peppermint.rule: "Host(`{{ peppermint_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.peppermint.tls.certresolver: "letsencrypt"
          traefik.http.routers.peppermint.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.peppermint.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.peppermint.middlewares: "peppermint@docker{{ ',tinyauth-auth@docker' if peppermint_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.peppermint.IPAllowList.sourcerange: "{{ peppermint_traefik_whitelist }}"
          traefik.http.services.peppermint.loadbalancer.server.port: "3000"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/pepperlabs/peppermint"
        cpu_shares: "{{ peppermint_cpu_shares }}"
        memory: "{{ peppermint_memory }}"
        memory_swap: "{{ peppermint_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (peppermint_port_http | string)] +
                (['https://' + peppermint_hostname + '.' + ansible_nas_domain] if (peppermint_traefik_enabled is true or peppermint_dockflare_enabled is true) else [])
              }}
  when: peppermint_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ peppermint_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ peppermint_db_container_name }}"
        state: absent
  when: peppermint_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ peppermint_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - peppermint_enabled is false