---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ offlineu_data_directory }}"
        - "{{ offlineu_data_directory }}/data"
        - "{{ offlineu_courses_directory }}"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        offlineu_homepage_href: "https://{{ offlineu_hostname }}.{{ ansible_nas_domain }}"
      when: offlineu_traefik_enabled | bool or offlineu_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ offlineu_container_name }}"
        hostname: "{{ offlineu_container_name }}"
        image: "{{ offlineu_image_name }}:{{ offlineu_image_tag }}"
        pull: true
        volumes:
          - "{{ offlineu_data_directory }}/data:/app/data"
          - "{{ offlineu_courses_directory }}:/app/courses"
        ports:
          - "{{ offlineu_port_http }}:5000"
        env:
          FLASK_ENV: "{{ offlineu_env_flask_env }}"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: ["CMD", "curl", "-f", "http://localhost:5000/"]
          interval: 30s
          timeout: 10s
          retries: 3
          start_period: 40s 
        labels:
          autoheal: "{{ offlineu_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ offlineu_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ offlineu_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ offlineu_dockflare_access_group }}"
          dockflare.hostname: "{{ offlineu_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ offlineu_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ offlineu_homepage_group }}"
          homepage.icon: "{{ offlineu_homepage_icon }}"
          homepage.href: "{{ offlineu_homepage_href }}"
          homepage.description: "{{ 'Self-Hosted Local Course Loader & Progress Tracker' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ offlineu_container_name }}"
          homepage.showStats: "{{ offlineu_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ offlineu_port_http }}"
          repliqate.enabled: "{{ offlineu_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ offlineu_repliqate_engine }}"
          repliqate.schedule: "{{ offlineu_repliqate_schedule }}"
          repliqate.backup_id: "{{ offlineu_repliqate_backup_id }}"
          repliqate.retention: "{{ offlineu_repliqate_retention }}"
          traefik.enable: "{{ offlineu_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.offlineu.rule: "Host(`{{ offlineu_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.offlineu.tls.certresolver: "letsencrypt"
          traefik.http.routers.offlineu.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.offlineu.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.offlineu.middlewares: "offlineu@docker{{ ',tinyauth-auth@docker' if offlineu_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.offlineu.IPAllowList.sourcerange: "{{ offlineu_traefik_whitelist }}"
          traefik.http.services.offlineu.loadbalancer.server.port: "5000"
          wud.tag.include: '^main$'
          wud.watch.digest: "true"
          wud.link.template: "https://github.com/WhiskeyCoder/OfflineU/pkgs/container/offlineu"
        cpu_shares: "{{ offlineu_cpu_shares }}"
        memory: "{{ offlineu_memory }}"
        memory_swap: "{{ offlineu_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (offlineu_port_http | string)] +
                (['https://' + offlineu_hostname + '.' + ansible_nas_domain] if (offlineu_traefik_enabled is true or offlineu_dockflare_enabled is true) else [])
              }}
  when: offlineu_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ offlineu_container_name }}"
        state: absent
  when: offlineu_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ offlineu_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - offlineu_enabled is false