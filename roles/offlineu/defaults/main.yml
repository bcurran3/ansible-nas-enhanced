---
# ANE
ansible_nas_app_name: "OfflineU"
offlineu_enabled: false
offlineu_available_externally: false
offlineu_traefik_whitelist: "{{ lan }}"

# directories
offlineu_data_directory: "{{ docker_home }}/offlineu"
offlineu_courses: "{{ courses_root }}"

# docker
offlineu_container_name: "offlineu"
offlineu_image_name: "ghcr.io/skippysteve/offlineu"
offlineu_image_tag: "main"

# network
offlineu_port_http: "5000"
offlineu_hostname: "offlineu"

# specs
offlineu_cpu_shares: "1024"
offlineu_memory: 1g

# autoheal
offlineu_autoheal: "false"

# dockflare
offlineu_dockflare_tunnel: "false"
offlineu_dockflare_access_group: ""

# homepage
offlineu_homepage_group: "Apps"
offlineu_homepage_icon: "mdi-school-outline"
offlineu_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ offlineu_port }}"
offlineu_homepage_showstats: "false"

# repliqate
offlineu_repliqate_enabled: "false"
offlineu_repliqate_engine: "restic"
offlineu_repliqate_schedule: "@daily 3am"
offlineu_repliqate_backup_id: "{{ offlineu_container_name }}"
offlineu_repliqate_retention: "30d"

# watchtower
offlineu_watchtower_enable: "false"
