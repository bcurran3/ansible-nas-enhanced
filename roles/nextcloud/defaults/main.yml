---
# ANE
ansible_nas_app_name: "Nextcloud"
nextcloud_enabled: false
nextcloud_traefik_enabled: false
nextcloud_traefik_whitelist: "{{ lan }}"
nextcloud_media_enable: "false"

# directories
nextcloud_data_directory: "{{ docker_home }}/nextcloud"

# network
nextcloud_port_http: "8080"
nextcloud_hostname: "nextcloud"
nextcloud_network_name: "nextcloud"

# docker
nextcloud_container_name: "nextcloud"
nextcloud_image_name: "nextcloud"
nextcloud_image_version: "stable"
#nextcloud_image_version: "latest"
nextcloud_db_container_name: "nextcloud-db"
nextcloud_db_image_name: "mariadb"
nextcloud_db_image_version: "10.6"
nextcloud_redis_container_name: "nextcloud-redis"
nextcloud_redis_image_name: "redis"
nextcloud_redis_image_version: "latest"

# specs
nextcloud_cpu_shares: 1024
nextcloud_memory: "2G"
nextcloud_memory_swap: -1
nextcloud_db_cpu_shares: 1024
nextcloud_db_memory: "1G"
nextcloud_db_memory_swap: "{{ nextcloud_db_memory }}"
nextcloud_redis_cpu_shares: 1024
nextcloud_redis_memory: "128M"
nextcloud_redis_memory_swap: "{{ nextcloud_redis_memory }}"

# app
nextcloud_db_database: "nextcloud_db"
nextcloud_db_user: "nextcloud"
nextcloud_db_password: "nextcloud_pw"
nextcloud_db_root_password: "nextcloud-topsecret"
nextcloud_env_nextcloud_data_dir: "/var/www/html/data"
nextcloud_env_nextcloud_init_htaccess: "false"
nextcloud_env_nextcloud_trusted_domains: "localhost {{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }} {{ nextcloud_hostname }}.{{ ansible_nas_domain }}"
nextcloud_env_redis_host_password: "topsecret"
nextcloud_env_apache_disable_rewrite_ip: "1" #  (not set by default): Set to 1 to disable rewrite IP.
nextcloud_env_body_limit:  "1073741824" #  [1GiB]) This restricts the total size of the HTTP request body sent from the client. It specifies the number of bytes that are allowed in a request body. A value of 0 means unlimited. Check the Nextcloud documentation for more information.
nextcloud_env_overwritehost: "" # (empty by default): Set the hostname of the proxy. Can also specify a port.
nextcloud_env_overwriteprotocol: "" # (empty by default): Set the protocol of the proxy, http or https.
nextcloud_env_overwriteclirul: "" # (empty by default): Set the cli url of the proxy (e.g. https://mydnsname.example.com)
nextcloud_env_overwritewebroot: "" # (empty by default): Set the absolute path of the proxy.
nextcloud_env_overwritecondaddr: "" # (empty by default): Regex to overwrite the values dependent on the remote address.
nextcloud_env_php_memory_limit: "512M"
nextcloud_env_php_upload_limit: "512M"
nextcloud_env_smtp_host: "" # (not set by default): The hostname of the SMTP server.
nextcloud_env_smtp_secure: "" # (empty by default): Set to ssl to use SSL, or tls to use STARTTLS.
nextcloud_env_smtp_port: "" # (default: 465 for SSL and 25 for non-secure connections): Optional port for the SMTP connection. Use 587 for an alternative port for STARTTLS.
nextcloud_env_smtp_authtype: "" # (default: LOGIN): The method used for authentication. Use PLAIN if no authentication is required.
nextcloud_env_smtp_name: "" # (empty by default): The username for the authentication.
nextcloud_env_smtp_password: "" # (empty by default): The password for the authentication.
nextcloud_env_mail_from_address: "" # (not set by default): Set the local-part for the 'from' field in the emails sent by Nextcloud.
nextcloud_env_mail_domain: "" # (not set by default): Set a different domain for the emails than the domain where Nextcloud is installed.

# autoheal
nextcloud_autoheal_enabled: false
nextcloud_db_autoheal_enabled: false
nextcloud_redis_autoheal_enabled: false

# dockflare
nextcloud_dockflare_enabled: false
nextcloud_dockflare_access_group: ""

# homepage
nextcloud_homepage_group: "Apps"
nextcloud_homepage_icon: "nextcloud.png"
nextcloud_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ nextcloud_port_http }}"
nextcloud_homepage_showstats: false
nextcloud_homepage_widget_key: "" # your_api_key
nextcloud_db_homepage_group: "DBs"
nextcloud_db_homepage_icon: "mariadb.png"
nextcloud_db_homepage_href: "{{ nextcloud_homepage_href }}"
nextcloud_db_homepage_showstats: false
nextcloud_redis_homepage_group: "DBs"
nextcloud_redis_homepage_icon: "redis.png"
nextcloud_redis_homepage_href: "{{ nextcloud_homepage_href }}"
nextcloud_redis_homepage_showstats: false

# repliqate
nextcloud_repliqate_enabled: false
nextcloud_repliqate_engine: "restic"
nextcloud_repliqate_schedule: "@daily 3am"
nextcloud_repliqate_backup_id: "{{ nextcloud_container_name }}"
nextcloud_repliqate_retention: "30d"
nextcloud_db_repliqate_enabled: false
nextcloud_db_repliqate_engine: "restic"
nextcloud_db_repliqate_schedule: "@daily 3am"
nextcloud_db_repliqate_backup_id: "{{ nextcloud_db_container_name }}"
nextcloud_db_repliqate_retention: "30d"

# tinyauth
nextcloud_tinyauth_enabled: false

# watchtower
nextcloud_watchtower_enabled: false
nextcloud_db_watchtower_enabled: false
nextcloud_redis_watchtower_enabled: false