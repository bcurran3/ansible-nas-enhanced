---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Get {{ nextcloud_proper_name }} container state
      community.docker.docker_container:
        name: "{{ nextcloud_container_name }}"
      register: result

    - name: Get {{ nextcloud_proper_name }} DB container state
      community.docker.docker_container:
        name: "{{ nextcloud_db_container_name }}"
      register: result_db

    - name: Get {{ nextcloud_proper_name }} Redis container state
      community.docker.docker_container:
        name: "{{ nextcloud_redis_container_name }}"
      register: result_redis

    - name: Check if nextcloud containers are running
      ansible.builtin.assert:
        that:
          - result.container['State']['Status'] == "running"
          - result.container['State']['Restarting'] == false
          - result_db.container['State']['Status'] == "running"
          - result_db.container['State']['Restarting'] == false
          - result_redis.container['State']['Status'] == "running"
          - result_redis.container['State']['Restarting'] == false
