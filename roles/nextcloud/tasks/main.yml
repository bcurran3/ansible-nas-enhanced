---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "755"
      loop:
        - path: "{{ nextcloud_data_directory }}/db"
          owner: 0
          group: 0
        - path: "{{ nextcloud_data_directory }}/nextcloud"
          owner: 33
          group: 33
        - path: "{{ nextcloud_data_directory }}/nextcloud/before-starting"
          owner: 33
          group: 33
        - path: "{{ nextcloud_data_directory }}/nextcloud/pre-installation"
          owner: 33
          group: 33
        - path: "{{ nextcloud_data_directory }}/nextcloud/post-installation"
          owner: 33
          group: 33
        - path: "{{ nextcloud_data_directory }}/nextcloud/pre-upgrade"
          owner: 33
          group: 33
        - path: "{{ nextcloud_data_directory }}/nextcloud/post-upgrade"
          owner: 33
          group: 33

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        nextcloud_homepage_href: "https://{{ nextcloud_hostname }}.{{ ansible_nas_domain }}"
      when: nextcloud_traefik_enabled | bool or nextcloud_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Network
      community.docker.docker_network:
        name: "{{ nextcloud_network_name }}"

    - name: Create {{ ansible_nas_app_name }} Redis Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ nextcloud_redis_container_name }}"
        hostname: "{{ nextcloud_redis_container_name }}"
        image: "{{ nextcloud_redis_image_name }}:{{ nextcloud_redis_image_version }}"
        pull: true
        networks:
          - name: "{{ nextcloud_network_name }}"
        network_mode: "{{ nextcloud_network_name }}"
        networks_cli_compatible: "yes"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        command: "redis-server --requirepass {{ nextcloud_env_redis_host_password }}"
        healthcheck:
          test: ["CMD-SHELL", "redis-cli -a {{ nextcloud_env_redis_host_password }} ping | grep PONG"]
          interval: 10s
          timeout: 5s
          retries: 3
        labels:
          autoheal: "{{ nextcloud_redis_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ nextcloud_redis_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} Redis"
          homepage.group: "{{ nextcloud_redis_homepage_group }}"
          homepage.icon: "{{ nextcloud_redis_homepage_icon }}"
          homepage.href: "{{ nextcloud_redis_homepage_href }}"
          homepage.description: "{{ 'The Real-time Data Platform' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ nextcloud_redis_container_name }}"
          homepage.showStats: "{{ nextcloud_redis_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "false"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/redis"
        cpu_shares: "{{ nextcloud_redis_cpu_shares }}"
        memory: "{{ nextcloud_redis_memory }}"
        memory_swap: "{{ nextcloud_redis_memory_swap }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ nextcloud_db_container_name }}"
        hostname: "{{ nextcloud_db_container_name }}"
        image: "{{ nextcloud_db_image_name }}:{{ nextcloud_db_image_version }}"
        command: "--transaction-isolation=READ-COMMITTED --log-bin=binlog --log_error_suppression_list='MY-010068,MY-013360'"
        networks:
          - name: "{{ nextcloud_network_name }}"
        network_mode: "{{ nextcloud_network_name }}"
        pull: true
        volumes:
          - "{{ nextcloud_data_directory }}/db/my.cnf:/etc/my.cnf"
          - "{{ nextcloud_data_directory }}/db/mysql:/var/lib/mysql"
        env:
          MYSQL_DATABASE: "{{ nextcloud_db_database }}"
          MYSQL_USER: "{{ nextcloud_db_user }}"
          MYSQL_PASSWORD: "{{ nextcloud_db_password }}"
          MYSQL_ROOT_PASSWORD: "{{ nextcloud_db_root_password }}"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
              test:
                - CMD
                - /usr/local/bin/healthcheck.sh
                - --su-mysql
                - --connect
                - --innodb_initialized
              interval: "30s"
              timeout: "10s"
              retries: "3"
              start_period: "30s"
        labels:
          autoheal: "{{ nextcloud_db_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ nextcloud_db_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} MariaDB"
          homepage.group: "{{ nextcloud_db_homepage_group }}"
          homepage.icon: "{{ nextcloud_db_homepage_icon }}"
          homepage.href: "{{ nextcloud_db_homepage_href }}"
          homepage.description: "{{ 'MariaDB Server is a high performing open source relational database, forked from MySQL.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ nextcloud_db_container_name }}"
          homepage.showStats: "{{ nextcloud_db_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ nextcloud_db_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ nextcloud_db_repliqate_engine }}"
          repliqate.schedule: "{{ nextcloud_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ nextcloud_db_repliqate_backup_id }}"
          repliqate.retention: "{{ nextcloud_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/mariadb"
        cpu_shares: "{{ nextcloud_db_cpu_shares }}"
        memory: "{{ nextcloud_db_memory }}"
        memory_swap: "{{ nextcloud_db_memory_swap }}"
        restart_policy: unless-stopped

    - name: Verify {{ ansible_nas_app_name }} DB is healthy
      community.docker.docker_container_info:
        name: "{{ nextcloud_db_container_name }}"
      register: db_info
      until: "db_info.container.State.Health.Status == 'healthy'"
      retries: 30
      delay: 5

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ nextcloud_container_name }}"
        hostname: "{{ nextcloud_container_name }}"
        image: "{{ nextcloud_image_name }}:{{ nextcloud_image_version }}"
        networks:
          - name: "{{ nextcloud_network_name }}"
        network_mode: "{{ nextcloud_network_name }}"
        pull: true
        volumes:
          - "{{ nextcloud_data_directory }}/nextcloud:/var/www/html:rw"
          - "{{ nextcloud_data_directory }}/nextcloud/pre-installation:/docker-entrypoint-hooks.d/pre-installation" # added
          - "{{ nextcloud_data_directory }}/nextcloud/post-installation:/docker-entrypoint-hooks.d/post-installation" # added
          - "{{ nextcloud_data_directory }}/nextcloud/pre-upgrade:/docker-entrypoint-hooks.d/pre-upgrade" # added
          - "{{ nextcloud_data_directory }}/nextcloud/post-upgrade:/docker-entrypoint-hooks.d/post-upgrade" # added
          - "{{ nextcloud_data_directory }}/nextcloud/before-starting:/docker-entrypoint-hooks.d/before-starting" # added
# TDL:    nextcloud_media_enable to add access to media
#         - "{{ audiobooks_root }}:/media/audiobooks:ro"
#         - "{{ books_root }}:/media/books:ro"
#         - "{{ comics_root }}:/media/comics:ro"
#         - "{{ music_root }}:/media/music:ro"
        ports:
          - "{{ nextcloud_port_http }}:80"
          - "3478:3478" # TURN server for Talk
        env:
          MYSQL_HOST: "{{ nextcloud_db_container_name }}"
          MYSQL_DATABASE: "{{ nextcloud_db_database }}"
          MYSQL_USER: "{{ nextcloud_db_user }}"
          MYSQL_PASSWORD: "{{ nextcloud_db_password }}"
          REDIS_HOST: "{{ nextcloud_redis_container_name }}"
          REDIS_PORT: "6379"
          REDIS_HOST_PASSWORD: "{{ nextcloud_env_redis_host_password }}"
          NEXTCLOUD_ADMIN_USER: "{{ ansible_nas_user }}"
          NEXTCLOUD_ADMIN_PASSWORD: "{{ ansible_nas_app_admin_password }}"
          NEXTCLOUD_DATA_DIR: "{{ nextcloud_env_nextcloud_data_dir }}"
          NEXTCLOUD_TRUSTED_DOMAINS: "{{ nextcloud_env_nextcloud_trusted_domains }}"
          NEXTCLOUD_INIT_HTACCESS: "{{ nextcloud_env_nextcloud_init_htaccess }}" # added
          TRUSTED_PROXIES: "{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}"
          APACHE_DISABLE_REWRITE_IP: "{{ nextcloud_env_apache_disable_rewrite_ip }}"
          APACHE_BODY_LIMIT: "{{ nextcloud_env_body_limit }}"
          OVERWRITEHOST: "{{ nextcloud_env_overwritehost }}"
          OVERWRITEPROTOCOL: "{{ nextcloud_env_overwriteprotocol }}"
          OVERWRITECLIURL: "{{ nextcloud_env_overwriteclirul }}"
          OVERWRITEWEBROOT: "{{ nextcloud_env_overwritewebroot }}"
          OVERWRITECONDADDR: "{{ nextcloud_env_overwritecondaddr }}"
          PHP_MEMORY_LIMIT: "{{ nextcloud_env_php_memory_limit }}"
          PHP_UPLOAD_LIMIT: "{{ nextcloud_env_php_upload_limit }}"
          SMTP_HOST: "{{ nextcloud_env_smtp_host }}"
          SMTP_SECURE: "{{ nextcloud_env_smtp_secure }}"
          SMTP_PORT: "{{ nextcloud_env_smtp_port }}"
          SMTP_AUTHTYPE: "{{ nextcloud_env_smtp_authtype }}"
          SMTP_NAME: "{{ nextcloud_env_smtp_name }}"
          SMTP_PASSWORD: "{{ nextcloud_env_smtp_password }}"
          MAIL_FROM_ADDRESS: "{{ nextcloud_env_mail_from_address }}"
          MAIL_DOMAIN: "{{ nextcloud_env_mail_domain }}"
          TZ: "{{ ansible_nas_timezone }}"
        links:
          - "{{ nextcloud_db_container_name }}"
          - "{{ nextcloud_redis_container_name }}"
        labels:
          autoheal: "{{ nextcloud_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ nextcloud_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ nextcloud_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ nextcloud_dockflare_access_group }}"
          dockflare.hostname: "{{ nextcloud_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ nextcloud_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ nextcloud_homepage_group }}"
          homepage.icon: "{{ nextcloud_homepage_icon }}"
          homepage.href: "{{ nextcloud_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ nextcloud_port_http }}/login"
          homepage.description: "{{ 'Open source dropbox alternative' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ nextcloud_container_name }}"
          homepage.showStats: "{{ nextcloud_homepage_showstats | ternary('true', 'false') }}"
          homepage.widget.type: "nextcloud"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ nextcloud_port_http }}"
          homepage.widget.key: "{{ nextcloud_homepage_widget_key }}"
          repliqate.enabled: "{{ nextcloud_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ nextcloud_repliqate_engine }}"
          repliqate.schedule: "{{ nextcloud_repliqate_schedule }}"
          repliqate.backup_id: "{{ nextcloud_repliqate_backup_id }}"
          repliqate.retention: "{{ nextcloud_repliqate_retention }}"
          traefik.enable: "{{ nextcloud_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.nextcloud.rule: "Host(`{{ nextcloud_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.nextcloud.tls.certresolver: "letsencrypt"
          traefik.http.routers.nextcloud.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.nextcloud.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.nextcloud.middlewares: "{{ nextcloud_hostname }}@docker{{ ',tinyauth-auth@docker' if nextcloud_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.nextcloud.IPAllowList.sourcerange: "{{ nextcloud_traefik_whitelist }}"
          traefik.http.services.nextcloud.loadbalancer.server.port: "80"
# from https://docs.nextcloud.com/server/27/admin_manual/configuration_server/reverse_proxy_configuration.html#traefik-2
#      traefik.http.routers.nextcloud.middlewares: "nextcloud_redirectregex"
#      traefik.http.middlewares.nextcloud_redirectregex.redirectregex.permanent: "true"
#      traefik.http.middlewares.nextcloud_redirectregex.redirectregex.regex: "https://(.*)/.well-known/(?:card|cal)dav"
#      traefik.http.middlewares.nextcloud_redirectregex.redirectregex.replacement: "https://$${1}/remote.php/dav"
# ^^^^^^^^^ above did not fix problem
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/nextcloud"
        cpu_shares: "{{ nextcloud_cpu_shares }}"
        memory: "{{ nextcloud_memory }}"
        memory_swap: "{{ nextcloud_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (nextcloud_port_http | string)] +
                (['https://' + nextcloud_hostname + '.' + ansible_nas_domain] if (nextcloud_traefik_enabled is true or nextcloud_dockflare_enabled is true) else [])
              }}
  when: nextcloud_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ nextcloud_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} Redis Container
      community.docker.docker_container:
        name: "{{ nextcloud_redis_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ nextcloud_db_container_name }}"
        state: absent

    - name: Delete {{ ansible_nas_app_name }} Network
      community.docker.docker_network:
        name: "{{ nextcloud_network_name }}"
        state: absent
  when: nextcloud_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ nextcloud_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - nextcloud_enabled is false
