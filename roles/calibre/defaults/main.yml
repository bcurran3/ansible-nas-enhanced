---
# ANE
ansible_nas_app_name: "Calibre"
calibre_enabled: false
calibre_available_externally: "false"
calibre_traefik_whitelist: "{{ lan }}"

# uid / gid
calibre_user_id: "0"
calibre_group_id: "0"

# directories
calibre_data_directory: "{{ docker_home }}/calibre"
calibre_books_directory: "{{ books_root }}"
calibre_comics_directory: "{{ comics_root }}"

# network
calibre_port: "8093"
calibre_webserver_port: "8094"
calibre_hostname: "calibre"

# env
calibre_password: ""
calibre_cli_args: ""
calibre_security_opts: "seccomp=unconfined" # For why this is here, see https://github.com/linuxserver/docker-calibre/issues/102

# specs
calibre_memory: 1g

# docker
calibre_container_name: calibre
calibre_cpu_shares: 1024
calibre_image_name: "lscr.io/linuxserver/calibre"
calibre_image_tag: "latest"
calibre_env_docker_mods: ""

# autoheal
calibre_autoheal: "false"

# dockflare
calibre_dockflare_tunnel: "false"
calibre_dockflare_access_group: ""

# homepage
calibre_homepage_group: "Apps"
calibre_homepage_icon: "calibre.png"
calibre_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ calibre_port }}"
calibre_homepage_showStats: "false"

# watchtower
calibre_watchtower_monitor_only: "true"