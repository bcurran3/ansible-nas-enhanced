---
# ANE
calibre_proper_name: "Calibre"
calibre_enabled: false
calibre_traefik_enabled: false
calibre_traefik_whitelist: "{{ lan }}"

# uid / gid
calibre_user_id: "0"
calibre_group_id: "0"

# directories
calibre_data_directory: "{{ docker_home }}/calibre"
calibre_books_directory: "{{ books_root }}"
calibre_comics_directory: "{{ comics_root }}"

# network
calibre_hostname: "calibre"
calibre_port_http: "8093"
calibre_port_https: "3060"
calibre_port_webserver_http: "8094"
calibre_port_websocket: "3061"

# env
# https://github.com/linuxserver/docker-calibre
calibre_user: "{{ ansible_nas_user }}"
calibre_password: "{{ ansible_nas_app_admin_password }}"
calibre_cli_args: ""
calibre_security_opts: "seccomp=unconfined" # For why this is here, see https://github.com/linuxserver/docker-calibre/issues/102

# specs
calibre_cpu_shares: 1024
calibre_memory: "1G"
calibre_memory_swap: -1

# docker
calibre_container_name: "calibre"
calibre_image_name: "lscr.io/linuxserver/calibre"
calibre_image_tag: "latest"

# autoheal
calibre_autoheal_enabled: false

# dockflare
calibre_dockflare_enabled: false
calibre_dockflare_access_group: ""

# homepage
calibre_homepage_group: "Apps"
calibre_homepage_icon: "calibre.png"
calibre_homepage_href: "https://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ calibre_port_https }}"
calibre_homepage_showstats: false

# linuxserver.io docker mods
calibre_env_docker_mods: ""
calibre_env_docker_mods_install_packages: ""
calibre_env_docker_mods_install_pip_packages: ""

# repliqate
calibre_repliqate_enabled: false
calibre_repliqate_engine: "restic"
calibre_repliqate_schedule: "@daily 3am"
calibre_repliqate_backup_id: "{{ calibre_container_name }}"
calibre_repliqate_retention: "30d"

# tinyauth
calibre_tinyauth_enabled: false

# watchtower
calibre_watchtower_enabled: false