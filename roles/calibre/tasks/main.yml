---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create Calibre Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: 0755
      with_items:
        - "{{ calibre_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ calibre_container_name }}"
        hostname: "{{ calibre_container_name }}"
        pull: true
        cpu_shares: "{{ calibre_cpu_shares }}"
        volumes:
          - "{{ calibre_data_directory }}/data:/config:rw"
          - "{{ calibre_books_directory }}:/books:rw"
          - "{{ calibre_comics_directory }}:/comics:rw"
        env:
          TZ: "{{ ansible_nas_timezone }}"
          PUID: "{{ calibre_user_id }}"
          PGID: "{{ calibre_group_id }}"
          PASSWORD: "{{ calibre_password }}"
          CLI_ARGS: "{{ calibre_cli_args }}"
        ports:
          - "{{ calibre_port }}:8080"
          - "{{ calibre_webserver_port }}:8081"
        security_opts: "{{ calibre_security_opts }}"
        restart_policy: unless-stopped
        memory: "{{ calibre_memory }}"
        labels:
          autoheal: "{{ calibre_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ calibre_watchtower_monitor_only }}"
          traefik.enable: "{{ calibre_available_externally | string }}"
          traefik.http.routers.calibre.rule: "Host(`{{ calibre_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.calibre.tls.certresolver: "letsencrypt"
          traefik.http.routers.calibre.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.calibre.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ calibre_hostname }}"
          traefik.http.routers.calibre.middlewares: "{{ calibre_hostname }}@docker"
          traefik.http.middlewares.calibre.IPAllowList.sourcerange: "{{ calibre_traefik_whitelist }}"
          traefik.http.services.calibre.loadbalancer.server.port: "8080"
  when: calibre_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ calibre_container_name }}"
        state: absent
  when: calibre_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ calibre_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ calibre_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: calibre_enabled is false and archive_app_data_enabled is true
