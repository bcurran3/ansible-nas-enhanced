---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create Calibre Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: 0755
      with_items:
        - "{{ calibre_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ calibre_container_name }}"
        hostname: "{{ calibre_container_name }}"
        image: "{{ calibre_image_name }}:{{ calibre_image_tag }}"
        pull: true
        volumes:
          - "{{ calibre_data_directory }}/data:/config:rw"
          - "{{ calibre_books_directory }}:/books:rw"
          - "{{ calibre_comics_directory }}:/comics:rw"
        devices: >-
                  {{
                    (calibre_devices | default([])) + ['/dev/dri:/dev/dri']
                    if intel_igpu_enabled | default(false) | bool
                    else (calibre_devices | default(omit))
                  }}
        env:
          CLI_ARGS: "{{ calibre_cli_args }}"
          CUSTOM_PORT: "{{ calibre_port_http }}"
          CUSTOM_HTTPS_PORT: "{{ calibre_port_https }}"
          CUSTOM_USER: "{{ calibre_user }}"
          CUSTOM_WS_PORT: "{{ calibre_port_websocket }}"
          PASSWORD: "{{ calibre_password }}"
          DOCKER_MODS: "{{ calibre_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ calibre_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ calibre_env_docker_mods_install_pip_packages}}"
          PUID: "{{ calibre_user_id }}"
          PGID: "{{ calibre_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        ports:
          - "{{ calibre_port_http }}:{{ calibre_port_http }}"
          - "{{ calibre_port_https }}:{{ calibre_port_https }}"
          - "{{ calibre_port_webserver_http }}:8094"
          - "{{ calibre_port_websocket }}:{{ calibre_port_websocket }}"
        security_opts: "{{ calibre_security_opts }}"
        labels:
          autoheal: "{{ calibre_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ calibre_watchtower_enable }}"
          dockflare.enable: "{{ calibre_dockflare_tunnel }}"
          dockflare.access.group: "{{ calibre_dockflare_access_group }}"
          dockflare.hostname: "{{ calibre_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "https://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ calibre_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ calibre_homepage_group }}"
          homepage.icon: "{{ calibre_homepage_icon }}"
          homepage.href: "{{ calibre_homepage_href }}"
          homepage.description: "{{ 'a powerful and easy to use e-book manager' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ calibre_container_name }}"
          homepage.showStats: "{{ calibre_homepage_showstats }}"
          homepage.siteMonitor: "https://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ calibre_port_https }}"
          repliqate.enabled: "{{ calibre_repliqate_enabled }}"
          repliqate.engine: "{{ calibre_repliqate_engine }}"
          repliqate.schedule: "{{ calibre_repliqate_schedule }}"
          repliqate.backup_id: "{{ calibre_repliqate_backup_id }}"
          repliqate.retention: "{{ calibre_repliqate_retention }}"
          traefik.enable: "{{ calibre_available_externally | string }}"
          traefik.http.routers.calibre.rule: "Host(`{{ calibre_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.calibre.tls.certresolver: "letsencrypt"
          traefik.http.routers.calibre.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.calibre.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.calibre.middlewares: "calibre@docker{{ ',tinyauth-auth@docker' if calibre_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.calibre.IPAllowList.sourcerange: "{{ calibre_traefik_whitelist }}"
          traefik.http.services.calibre.loadbalancer.server.port: "{{ calibre_port_https }}"
          wud.tag.include: '^version-\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "lscr.io/linuxserver/calibre"
        cpu_shares: "{{ calibre_cpu_shares }}"
        memory: "{{ calibre_memory }}"
        shm_size: "1GB"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['https://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (calibre_port_https | string)] +
                (['https://' + calibre_hostname + '.' + ansible_nas_domain] if (calibre_available_externally is true or calibre_dockflare_tunnel is true) else [])
              }}
  when: calibre_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ calibre_container_name }}"
        state: absent
  when: calibre_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ calibre_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - calibre_enabled is false