---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create Lidarr Directory
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ lidarr_data_directory }}"
        - "{{ lidarr_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ lidarr_container_name }}"
        hostname: "{{ lidarr_container_name }}"
        image: "{{ lidarr_image_name }}:{{ lidarr_image_version }}"
        pull: true
        volumes:
          - "{{ lidarr_data_directory }}/config:/config:rw"
          - "{{ lidarr_downloads_directory }}:/downloads:rw"
          - "{{ lidarr_music_directory }}:/music:rw"
        ports:
          - "{{ lidarr_port }}:8686"
        env:
          DOCKER_MODS: "{{ lidarr_docker_mods }}"
          TP_DOMAIN: "{{ lidarr_docker_mods_domain }}"
          TP_THEME: "{{ lidarr_docker_mods_tp_theme }}"
          TP_COMMUNITY_THEME: "{{ lidarr_docker_mods_community_theme }}"
          TP_ADDON: "{{ lidarr_docker_mods_addon }}"
          PUID: "{{ lidarr_user_id }}"
          PGID: "{{ lidarr_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ lidarr_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ lidarr_watchtower_monitor_only }}"
          homepage.group: "{{ lidarr_homepage_group }}"
          homepage.name: "Lidarr"
          homepage.icon: "{{ lidarr_homepage_icon }}"
          homepage.href: "{{ lidarr_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ lidarr_port }}"
          homepage.description: "{{ 'a music collection manager' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ lidarr_container_name }}"
          homepage.showStats: "{{ lidarr_homepage_showStats }}"
          homepage.widget.type: "lidarr"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ lidarr_port }}"
          homepage.widget.key: "{{ lidarr_homepage_widget_key }}"
          traefik.enable: "{{ lidarr_available_externally | string }}"
          traefik.http.routers.lidarr.rule: "Host(`{{ lidarr_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.lidarr.tls.certresolver: "letsencrypt"
          traefik.http.routers.lidarr.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.lidarr.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ lidarr_hostname }}"
          traefik.http.routers.lidarr.middlewares: "{{ lidarr_hostname }}@docker"
          traefik.http.middlewares.lidarr.IPAllowList.sourcerange: "{{ lidarr_traefik_whitelist }}"
          traefik.http.services.lidarr.loadbalancer.server.port: "8686"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/linuxserver/docker-lidarr/releases/tag/$${major}.$${minor}.$${patch}"
        cpu_shares: "{{ lidarr_cpu_shares }}"
        memory: "{{ lidarr_memory }}"
        restart_policy: unless-stopped
  when: lidarr_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ lidarr_container_name }}"
        state: absent
  when: lidarr_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ lidarr_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ lidarr_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: lidarr_enabled is false and archive_app_data_enabled is true
