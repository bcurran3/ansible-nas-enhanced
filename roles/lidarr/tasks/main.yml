---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create Lidarr Directory
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ lidarr_data_directory }}"
        - "{{ lidarr_data_directory }}/config"
        - "{{ lidarr_downloads_directory }}"
        - "{{ lidarr_music_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ lidarr_container_name }}"
        hostname: "{{ lidarr_container_name }}"
        image: "{{ lidarr_image_name }}:{{ lidarr_image_version }}"
        pull: true
        volumes:
          - "{{ lidarr_data_directory }}/config:/config:rw"
          - "{{ lidarr_downloads_directory }}:/downloads:rw"
          - "{{ lidarr_music_directory }}:/music:rw"
        ports:
          - "{{ lidarr_port_http }}:8686"
        env:
          DOCKER_MODS: "{{ lidarr_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ lidarr_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ lidarr_env_docker_mods_install_pip_packages}}"
          TP_DOMAIN: "{{ lidarr_env_docker_mods_tp_domain }}"
          TP_THEME: "{{ lidarr_env_docker_mods_tp_theme }}"
          TP_COMMUNITY_THEME: "{{ lidarr_env_docker_mods_tp_community_theme }}"
          TP_ADDON: "{{ lidarr_env_docker_mods_tp_addon }}"
          PUID: "{{ lidarr_user_id }}"
          PGID: "{{ lidarr_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ lidarr_autoheal | string }}"
          com.centurylinklabs.watchtower.enable: "{{ lidarr_watchtower_enabled | string }}"
          dockflare.enable: "{{ lidarr_dockflare_enabled | string }}"
          dockflare.access.group: "{{ lidarr_dockflare_access_group }}"
          dockflare.hostname: "{{ lidarr_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ lidarr_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ lidarr_homepage_group }}"
          homepage.icon: "{{ lidarr_homepage_icon }}"
          homepage.href: "{{ lidarr_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ lidarr_port_http }}"
          homepage.description: "{{ 'a music collection manager' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ lidarr_container_name }}"
          homepage.showStats: "{{ lidarr_homepage_showstats | string }}"
          homepage.widget.type: "lidarr"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ lidarr_port_http }}"
          homepage.widget.key: "{{ lidarr_homepage_widget_key }}"
          repliqate.enabled: "{{ lidarr_repliqate_enabled | string }}"
          repliqate.engine: "{{ lidarr_repliqate_engine }}"
          repliqate.schedule: "{{ lidarr_repliqate_schedule }}"
          repliqate.backup_id: "{{ lidarr_repliqate_backup_id }}"
          repliqate.retention: "{{ lidarr_repliqate_retention }}"
          traefik.enable: "{{ lidarr_available_externally | string }}"
          traefik.http.routers.lidarr.rule: "Host(`{{ lidarr_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.lidarr.tls.certresolver: "letsencrypt"
          traefik.http.routers.lidarr.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.lidarr.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.lidarr.middlewares: "lidarr@docker{{ ',tinyauth-auth@docker' if lidarr_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.lidarr.IPAllowList.sourcerange: "{{ lidarr_traefik_whitelist }}"
          traefik.http.services.lidarr.loadbalancer.server.port: "8686"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://lscr.io/linuxserver/lidarr"
        cpu_shares: "{{ lidarr_cpu_shares }}"
        memory: "{{ lidarr_memory }}"
        memory_swap: "{{ lidarr_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (lidarr_port_http | string)] +
                (['https://' + lidarr_hostname + '.' + ansible_nas_domain] if (lidarr_available_externally is true or lidarr_dockflare_enabled is true) else [])
              }}
  when: lidarr_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ lidarr_container_name }}"
        state: absent
  when: lidarr_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ lidarr_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - lidarr_enabled is false