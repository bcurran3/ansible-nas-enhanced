---
lidarr_enabled: false
lidarr_available_externally: false
lidarr_traefik_whitelist: "{{ lan }}"

# directories
lidarr_data_directory: "{{ docker_home }}/lidarr/config"
lidarr_music_directory: "{{ music_root }}"
lidarr_downloads_directory: "{{ downloads_root }}"

# uid/gid
lidarr_user_id: "0"
lidarr_group_id: "0"

# network
lidarr_port: "8686"
lidarr_hostname: "lidarr"

# docker
lidarr_container_name: "lidarr"
lidarr_image_name: "linuxserver/lidarr"
lidarr_image_version: "latest"

# specs
lidarr_memory: 1g

# autoheal
lidarr_autoheal: "false"

# hompage
lidarr_homepage_group: "Media Management"
lidarr_homepage_name: "Lidarr"
lidarr_homepage_href: "https://{{ lidarr_hostname }}.{{ ansible_nas_domain }}"
lidarr_homepage_icon: "lidarr.png"
lidarr_homepage_widget_key: "your_api_key"

# watchtower
lidarr_watchtower_monitor_only: "true"