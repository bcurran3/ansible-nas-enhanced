---
# ANE
ansible_nas_app_name: "Lidarr"
lidarr_enabled: false
lidarr_traefik_enabled: false
lidarr_traefik_whitelist: "{{ lan }}"

# directories
lidarr_data_directory: "{{ docker_home }}/lidarr"
lidarr_downloads_directory: "{{ downloads_root }}"
lidarr_music_directory: "{{ music_root }}"

# uid/gid
lidarr_user_id: "0"
lidarr_group_id: "0"

# network
lidarr_port_http: "8686"
lidarr_hostname: "lidarr"

# docker
lidarr_container_name: "lidarr"
lidarr_image_name: "lscr.io/linuxserver/lidarr"
lidarr_image_version: "latest"

# specs
lidarr_cpu_shares: 1024
lidarr_memory: "1G"
lidarr_memory_swap: -1

# autoheal
lidarr_autoheal_enabled: false

# dockflare
lidarr_dockflare_enabled: false
lidarr_dockflare_access_group: ""

# hompage
lidarr_homepage_group: "Media Management"
lidarr_homepage_icon: "lidarr.png"
lidarr_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ lidarr_port_http }}"
lidarr_homepage_showstats: false
lidarr_homepage_widget_key: ""

# linuxserver.io docker mods
# https://mods.linuxserver.io/?mod=lidarr
lidarr_env_docker_mods: ""
lidarr_env_docker_mods_install_packages: ""
lidarr_env_docker_mods_install_pip_packages: ""

# theme.park themes
# https://docs.theme-park.dev/themes/lidarr/
lidarr_env_docker_mods_tp_theme: ""
lidarr_env_docker_mods_tp_community_theme: ""
lidarr_env_docker_mods_tp_domain: ""
lidarr_env_docker_mods_tp_addon: ""

# repliqate
lidarr_repliqate_enabled: false
lidarr_repliqate_engine: "restic"
lidarr_repliqate_schedule: "@daily 3am"
lidarr_repliqate_backup_id: "{{ lidarr_container_name }}"
lidarr_repliqate_retention: "30d"

# tinyauth
lidarr_tinyauth_enabled: false

# watchtower
lidarr_watchtower_enabled: false