---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ portainer_agent_container_name }}"
        hostname: "{{ portainer_agent_container_name }}"
        image: "{{ portainer_agent_image_name }}:{{ portainer_agent_image_tag }}"
        pull: true
        volumes:
          - "/var/run/docker.sock:/var/run/docker.sock"
          - "/var/lib/docker/volumes:/var/lib/docker/volumes"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        ports:
          - "{{ portainer_agent_port }}:9001"
        labels:
          autoheal: "{{ portainer_agent_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ portainer_agent_watchtower_monitor_only }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ portainer_agent_homepage_group }}"
          homepage.href: "{{ portainer_agent_homepage_href }}"
          homepage.icon: "{{ portainer_agent_homepage_icon }}"
          homepage.description: "{{ 'The Portainer agent' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ portainer_agent_container_name }}"
          homepage.showStats: "{{ portainer_agent_homepage_showStats }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/portainer/agent/releases/tag/$${major}.$${minor}.$${patch}"
        cpu_shares: "{{ portainer_agent_cpu_shares }}"
        memory: "{{ portainer_agent_memory }}"
        restart_policy: unless-stopped
  when: portainer_agent_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ portainer_agent_container_name }}"
        state: absent
  when: portainer_agent_enabled is false
