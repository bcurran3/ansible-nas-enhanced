---
# ANE
ansible_nas_app_name: "Heimdall"
heimdall_enabled: false
heimdall_available_externally: false
heimdall_traefik_whitelist: "{{ lan }}"

# directories
heimdall_data_directory: "{{ docker_home }}/heimdall"

# network
heimdall_port_http: "11112"
heimdall_hostname: heimdall

# docker
heimdall_container_name: heimdall
heimdall_docker_image: "lscr.io/linuxserver/heimdall"
heimdall_docker_image_tag: "latest"
heimdall_cpu_shares: 1024
heimdall_memory: 256m  # changed

# app
heimdall_puid: "1000"
heimdall_pgid: "1000"

# autoheal
heimdall_autoheal: "false"

# dockflare
heimdall_dockflare_tunnel: "false"
heimdall_dockflare_access_group: ""

# homepage
heimdall_homepage_group: "Apps"
heimdall_homepage_icon: "heimdall.png"
heimdall_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ heimdall_port_http }}"
heimdall_homepage_showstats: "false"

# linuxserver.io docker mods
heimdall_env_docker_mods: ""
heimdall_env_docker_mods_install_packages: ""
heimdall_env_docker_mods_install_pip_packages: ""

# repliqate
heimdall_repliqate_enabled: "false"
heimdall_repliqate_engine: "restic"
heimdall_repliqate_schedule: "@daily 3am"
heimdall_repliqate_backup_id: "heimdall"
heimdall_repliqate_retention: "30d"

# watchtower
heimdall_watchtower_enable: "false"