---
# ANE
ansible_nas_app_name: "DweebUI"
dweebui_enabled: false
dweebui_available_externally: false
dweebui_traefik_whitelist: "{{ lan }}"
dweebui_data_directory: "{{ docker_home }}/dweebui"

# network
dweebui_hostname: "dweebui"
dweebui_port_http: "8004"

# app
dweebui_env_secret: "{{ ansible_nas_app_admin_password }}"

# docker
dweebui_container_name: "dweebui"
dweebui_image_name: "lllllllillllllillll/dweebui"
#ghcr.io/lllllllillllllillll/dweebui:main - no version description
dweebui_image_tag: "latest"
dweebui_cpu_shares: 1024
dweebui_memory: "1G"

# autoheal
dweebui_autoheal: "false"

# dockflare
dweebui_dockflare_tunnel: "false"
dweebui_dockflare_access_group: ""

# homepage
dweebui_homepage_group: "Apps"
dweebui_homepage_icon: "sh-dweebui.png"
dweebui_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ dweebui_port_http }}"
dweebui_homepage_showstats: "false"

# repliqate
dweebui_repliqate_enabled: "false"
dweebui_repliqate_engine: "restic"
dweebui_repliqate_schedule: "@daily 3am"
dweebui_repliqate_backup_id: "{{ dweebui_container_name }}"
dweebui_repliqate_retention: "30d"

# watchtower
dweebui_watchtower_enable: "false"