---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ dweebui_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ dweebui_container_name }}"
        hostname: "{{ dweebui_container_name }}"
        image: "{{ dweebui_image_name }}:{{ dweebui_image_tag }}"
        pull: true
        ports:
          - "{{ dweebui_port_http }}:{{ dweebui_port_http }}"
        volumes:
          - "{{ dweebui_data_directory }}:/app"
          - "/var/run/docker.sock:/var/run/docker.sock"
        network_mode: bridge
        env:
          PORT: "{{ dweebui_port_http }}"
          SECRET: "{{ dweebui_secret }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ dweebui_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ dweebuit_watchtower_monitor_only }}"
          dockflare.enable: "{{ dweebui_dockflare_tunnel }}"
          dockflare.access.group: "{{ dweebui_dockflare_access_group }}"
          dockflare.hostname: "{{ dweebui_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ dweebui_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ dweebui_homepage_group }}"
          homepage.icon: "{{ dweebui_homepage_icon }}"
          homepage.href: "{{ dweebui_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ dweebui_port_http }}"
          homepage.description: "{{ 'DweebUI is a WebUI for managing your containers. Simple setup, a dynamically updating dashboard, and a multi-user permission system.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ dweebui_container_name }}"
          homepage.showStats: "{{ dweebui_homepage_showStats }}"
          traefik.enable: "{{ dweebui_available_externally | string }}"
          traefik.http.routers.dweebui.rule: "Host(`{{ dweebui_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.dweebui.tls.certresolver: "letsencrypt"
          traefik.http.routers.dweebui.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.dweebui.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ dweebui_hostname }}"
          traefik.http.routers.dweebui.middlewares: "{{ dweebui_hostname }}@docker"
          traefik.http.middlewares.dweebui.IPAllowList.sourcerange: "{{ dweebui_traefik_whitelist }}"
          traefik.http.services.dweebui.loadbalancer.server.port: "{{ dweebui_port_http }}"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/lllllllillllllillll/DweebUI/releases/tag/$${major}.$${minor}.$${patch}"
        cpu_shares: "{{ dweebui_cpu_shares }}"
        memory: "{{ dweebui_memory }}"
        restart_policy: unless-stopped
  when: dweebui_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ dweebui_container_name }}"
        state: absent
  when: dweebui_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ dweebui_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ dweebui_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: dweebui_enabled is false and archive_app_data_enabled is true
