---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ dweebui_data_directory }}"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        dweebui_homepage_href: "https://{{ dweebui_hostname }}.{{ ansible_nas_domain }}"
      when: dweebui_traefik_enabled | bool or dweebui_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ dweebui_container_name }}"
        hostname: "{{ dweebui_container_name }}"
        image: "{{ dweebui_image_name }}:{{ dweebui_image_tag }}"
        pull: true
        ports:
          - "{{ dweebui_port_http }}:{{ dweebui_port_http }}"
        volumes:
          - "{{ dweebui_data_directory }}:/app/config"
          - "/var/run/docker.sock:/var/run/docker.sock"
        network_mode: bridge
        env:
          PORT: "{{ dweebui_port_http }}"
          SECRET: "{{ dweebui_env_secret }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ dweebui_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ dweebui_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ dweebui_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ dweebui_dockflare_access_group }}"
          dockflare.hostname: "{{ dweebui_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ dweebui_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ dweebui_homepage_group }}"
          homepage.icon: "{{ dweebui_homepage_icon }}"
          homepage.href: "{{ dweebui_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ dweebui_port_http }}"
          homepage.description: "{{ 'Free and Open-Source WebUI For Managing Your Containers.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ dweebui_container_name }}"
          homepage.showStats: "{{ dweebui_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ dweebui_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ dweebui_repliqate_engine }}"
          repliqate.schedule: "{{ dweebui_repliqate_schedule }}"
          repliqate.backup_id: "{{ dweebui_repliqate_backup_id }}"
          repliqate.retention: "{{ dweebui_repliqate_retention }}"
          traefik.enable: "{{ dweebui_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.dweebui.rule: "Host(`{{ dweebui_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.dweebui.tls.certresolver: "letsencrypt"
          traefik.http.routers.dweebui.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.dweebui.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.dweebui.middlewares: "dweebui@docker{{ ',tinyauth-auth@docker' if dweebui_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.dweebui.IPAllowList.sourcerange: "{{ dweebui_traefik_whitelist }}"
          traefik.http.services.dweebui.loadbalancer.server.port: "{{ dweebui_port_http }}"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/lllllllillllllillll/dweebui"
        cpu_shares: "{{ dweebui_cpu_shares }}"
        memory: "{{ dweebui_memory }}"
        memory_swap: "{{ dweebui_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (dweebui_port_http | string)] +
                (['https://' + dweebui_hostname + '.' + ansible_nas_domain] if (dweebui_traefik_enabled is true or dweebui_dockflare_enabled is true) else [])
              }}
  when: dweebui_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ dweebui_container_name }}"
        state: absent
  when: dweebui_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ dweebui_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - dweebui_enabled is false