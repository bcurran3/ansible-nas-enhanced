---
# ANE
ansible_nas_app_name: "Kavita"
kavita_enabled: false
kavita_available_externally: false
kavita_traefik_whitelist: "{{ lan }}"

# directories
kavita_data_directory: "{{ docker_home }}/kavita"
kavita_books_directory: "{{ books_root }}"
kavita_comics_directory: "{{ comics_root }}"

# docker
kavita_container_name: "kavita"
kavita_image_name: "jvmilazz0/kavita"
kavita_image_tag: "latest"
kavita_cpu_shares: "1024"
kavita_memory: "1g"

# network
kavita_hostname: "kavita"
kavita_port_http: "3024"

# autoheal
kavita_autoheal: "false"

# dockflare
kavita_dockflare_tunnel: "false"
kavita_dockflare_access_group: ""

# homepage
kavita_homepage_group: "Apps"
kavita_homepage_icon: "kavita.png"
kavita_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ kavita_port_http }}"
kavita_homepage_showstats: "false"

# watchtower
kavita_watchtower_enable: "false"