---
# ANE
ansible_nas_app_name: "Nextcloud AIO"
nextcloudaio_enabled: false
nextcloudaio_available_externally: false
nextcloudaio_traefik_whitelist: "{{ lan }}"

# directories
nextcloudaio_data_directory: "{{ docker_home }}/nextcloudaio"

# network
nextcloudaio_port_http: "8081"
nextcloudaio_hostname: "nextcloudaio"
nextcloudaio_network_name: "nextcloudaio"

# docker
nextcloudaio_container_name: "nextcloud-aio"
nextcloudaio_image_name: "nextcloud/all-in-one"
nextcloudaio_image_tag: "latest"

# specs
nextcloudaio_cpu_shares: 1024
nextcloudaio_memory: "2G"

# autoheal
nextcloudaio_autoheal: false

# dockflare
nextcloudaio_dockflare_enabled: false
nextcloudaio_dockflare_access_group: ""

# tinyauth
nextcloudaio_tinyauth_enabled: false

# watchtower
nextcloudaio_watchtower_enabled: false
