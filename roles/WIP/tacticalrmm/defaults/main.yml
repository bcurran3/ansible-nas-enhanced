---
# ANE
ansible_nas_app_name: "Tactical RMM"
tacticalrmm_enabled: false
tacticalrmm_traefik_enabled: false
tacticalrmm_traefik_whitelist: "{{ lan }}"
tacticalrmm_data_directory: "{{ docker_home }}/tacticalrmm"

tacticalrmm_certs_directory: "{{ docker_home }}/certs"
tacticalrmm_port_http: "3010"
tacticalrmm_port_https: "3011"
tacticalrmm_memory: "1G"

# networks
tacticalrmm_proxy_network: "tactical_proxy"
tacticalrmm_api_network: "tactical_api-db"
tacticalrmm_redis_network: "tactical_redis"
tacticalrmm_mesh_network: "tactical_mesh-db"

# network names
tacticalrmm_hostname: "tacticalrmm"
tacticalrmm_api_hostname: "trmm-api"
tacticalrmm_mesh_hostname: "trmm-mesh"

# postgress db
tacticalrmm_postgress_db: "tacticalrmm"
tacticalrmm_postgress_user: "trmm_user"
tacticalrmm_postgress_password: "trmm_topsecret"

# mongo db
tacticalrmm_mongo_db: "meshcentral"
tacticalrmm_mongo_user: "trmm_user"
tacticalrmm_mongo_password: "trmm_topsecret"

# tactical credentials (Used to login to dashboard)
tacticalrmm_user: "tactical"
tacticalrmm_pass: "tactical"

# mesh settings
tacticalrmm_mesh_user: "tactical"
tacticalrmm_mesh_pass: "tactical"
tacticalrmm_mongodb_user: "mongouser"
tacticalrmm_mongodb_password: "mongopass"
tacticalrmm_mesh_persistent_config: "0"
tacticalrmm_cert_pub_key: "/certs/{{ ansible_nas_domain }}.pem"
tacticalrmm_cert_priv_key: "/certs/{{ ansible_nas_domain }}.key"

# docker
tacticalrmm_container_name: "tacticalrmm-nginx"
tacticalrmm_cpu_shares: 1024
# many more #####################################

# autoheal
tacticalrmm_autoheal_enabled: false # only one while WIP

# dockflare
tacticalrmm_dockflare_enabled: false
tacticalrmm_dockflare_access_group: ""

# tinyauth
tacticalrmm_tinyauth_enabled: false

# watchtower
tacticalrmm_watchtower_enabled: false