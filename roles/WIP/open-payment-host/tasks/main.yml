---
# https://openpaymenthost.com/
# requires editing secrets/fragmenta.json within the container
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ openpaymenthost_data_directory }}"
        - "{{ openpaymenthost_data_directory }}/certs"
        - "{{ openpaymenthost_data_directory }}/db"
        - "{{ openpaymenthost_data_directory }}/log"
        - "{{ openpaymenthost_data_directory }}/public"
        - "{{ openpaymenthost_data_directory }}/secrets"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        openpaymenthost_homepage_href: "https://{{ openpaymenthost_hostname }}.{{ ansible_nas_domain }}"
      when: openpaymenthost_traefik_enabled | bool or openpaymenthost_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ openpaymenthost_container_name }}"
        hostname: "{{ openpaymenthost_container_name }}"
        image: "{{ openpaymenthost_image_name }}:{{ openpaymenthost_image_tag }}"
        pull: true
        command: "/home/default/build/exec/open-payment-host"
        ports:
          - "{{ openpaymenthost_port_http }}:80"
        volumes:
          - "{{ openpaymenthost_data_directory }}/certs:/home/default/build/certs"
          - "{{ openpaymenthost_data_directory }}/db:/home/default/build/db"
          - "{{ openpaymenthost_data_directory }}/log:/home/default/build/log"
          - "{{ openpaymenthost_data_directory }}/public:/home/default/build/public"
          - "{{ openpaymenthost_data_directory }}/secrets:/home/default/build/secrets"
        env:
          FRAG_ENV: "production"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ openpaymenthost_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ openpaymenthost_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ openpaymenthost_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ openpaymenthost_dockflare_access_group }}"
          dockflare.hostname: "{{ openpaymenthost_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ openpaymenthost_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ openpaymenthost_homepage_group }}"
          homepage.icon: "{{ openpaymenthost_homepage_icon }}"
          homepage.href: "{{ openpaymenthost_homepage_href }}"
          homepage.description: "{{ 'Self hosted alternative for Gumroad, Buy Me a Coffee, Ko-fi etc' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ openpaymenthost_container_name }}"
          homepage.showStats: "{{ openpaymenthost_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ openpaymenthost_port_http }}"
          traefik.enable: "{{ openpaymenthost_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.openpaymenthost.rule: "Host(`{{ openpaymenthost_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.openpaymenthost.tls.certresolver: "letsencrypt"
          traefik.http.routers.openpaymenthost.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.openpaymenthost.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.openpaymenthost.middlewares: "openpaymenthost@docker{{ ',tinyauth-auth@docker' if openpaymenthost_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.openpaymenthost.IPAllowList.sourcerange: "{{ openpaymenthost_traefik_whitelist }}"
          traefik.http.services.openpaymenthost.loadbalancer.server.port: "80"
          wud.tag.include: '/^\\d+\\.\\d+\\.\\d+$/'
          wud.tag.transform.type: "semver"
          wud.link.template: 'https://hub.docker.com/r/abishekmuthian/open-payment-host'
        cpu_shares: "{{ openpaymenthost_cpu_shares }}"
        memory: "{{ openpaymenthost_memory }}"
        memory_swap: "{{ openpaymenthost_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (openpaymenthost_port_http | string)] +
                (['https://' + openpaymenthost_hostname + '.' + ansible_nas_domain] if (openpaymenthost_traefik_enabled is true or openpaymenthost_dockflare_enabled is true) else [])
              }}
  when: openpaymenthost_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ openpaymenthost_container_name }}"
        state: absent
  when: openpaymenthost_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ openpaymenthost_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - openpaymenthost_enabled is false