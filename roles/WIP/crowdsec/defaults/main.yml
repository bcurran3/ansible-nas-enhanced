---
# ANE
ansible_nas_app_name: "Crowdsec"
crowdsec_enabled: false
crowdsec_available_externally: false
crowdsec_traefik_whitelist: "{{ lan }}"
crowdsec_data_directory: "{{ docker_home }}/crowdsec"

# network
crowdsec_port_http: "3032"
crowdsec_port_metrics: "6060"
crowdsec_hostname: "crowdsec"

# docker
crowdsec_container_name: "crowdsec"
crowdsec_image_name: "ghcr.io/crowdsecurity/crowdsec"
crowdsec_image_tag: "latest"

# specs
crowdsec_cpu_shares: 1024
crowdsec_memory: "1G"

# app
crowdsec_env_collections: "crowdsecurity/sshd"
crowdsec_env_disable_collections: "crowdsecurity/nginx"

# autoheal
crowdsec_autoheal: false

# dockflare
crowdsec_dockflare_enabled: false
crowdsec_dockflare_access_group: ""

# homepage
crowdsec_homepage_group: "Apps"
crowdsec_homepage_icon: "crowdsec.png"
crowdsec_homepage_href: "https://app.crowdsec.net/"
crowdsec_homepage_showstats: false
crowdsec_homepage_widget_username: ""
crowdsec_homepage_widget_password: ""

# repliqate
crowdsec_repliqate_enabled: false
crowdsec_repliqate_engine: "restic"
crowdsec_repliqate_schedule: "@daily 3am"
crowdsec_repliqate_backup_id: "crowdsec"
crowdsec_repliqate_retention: "30d"

# tinyauth
crowdsec_tinyauth_enabled: false

# watchtower
crowdsec_watchtower_enabled: false
