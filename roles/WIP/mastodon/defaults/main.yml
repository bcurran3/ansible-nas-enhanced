---
# ANE
ansible_nas_app_name: "Mastodon"
mastodon_enabled: false
mastodon_traefik_enabled: false
mastodon_traefik_whitelist: "{{ lan }}"

# directories
mastodon_data_directory: "{{ docker_home }}/mastodon"

# network
mastodon_port_http: "3013"
mastodon_port_https: "3014"
mastodon_hostname: "mastodon"
mastodon_network_name: "mastodon"

# docker
mastodon_container_name: "mastodon"
mastodon_image_name: "ghcr.io/mastodon/mastodon"
mastodon_image_tag: "v4.3.0"
mastodon_env_docker_mods: ""
mastodon_db_container_name: "mastodon-db"
mastodon_db_image_name: "postgres"
mastodon_db_image_tag: "14-alpine"
mastodon_redris_container_name: "mastodon-redris"
mastodon_redis_image_name: "redis"
mastodon_redis_image_tag: "8-alpine"

# specs
mastodon_cpu_shares: 1024
mastodon_memory: "1G"
mastodon_db_cpu_shares: 1024
mastodon_db_memory: "1G"
mastodon_redris_cpu_shares: 1024
mastodon_redris_memory: "1G"

# autoheal
mastodon_autoheal_enabled: false
mastodon_db_autoheal_enabled: false
mastodon_redis_autoheal_enabled: false

# dockflare
mastodon_dockflare_enabled: false
mastodon_dockflare_access_group: ""

# homepage
mastodon_homepage_group: "Apps"
mastodon_homepage_icon: "mastodon.png"
mastodon_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ mastodon_port_http }}"
mastodon_homepage_showstats: false

# linuxserver.io docker mods
mastodon_env_docker_mods: ""
mastodon_env_docker_mods_install_packages: ""
mastodon_env_docker_mods_install_pip_packages: ""

# tinyauth
mastodon_tinyauth_enabled: false

# watchtower
mastodon_watchtower_enabled: false
mastodon_db_watchtower_enabled: false
mastodon_redis_watchtower_enabled: false