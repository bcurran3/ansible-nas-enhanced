---
# ANE
ansible_nas_app_name: "Squirrel Servers Manager (SSM)"
ssm_enabled: false
ssm_traefik_enabled: false
ssm_traefik_whitelist: "{{ lan }}"

# directories
ssm_data_directory: "{{ docker_home }}/ssm"

# network
ssm_network_name: "squirrel"
ssm_port_http: "3015"
ssm_hostname: "ssm"

# docker
ssm_container_name: "ssm"
ssm_image_name: "ghcr.io/squirrelcorporation/squirrelserversmanager-server"
ssm_image_tag: "latest"
ssm_client_container_name: "ssm-client"
ssm_client_image_name: "ghcr.io/squirrelcorporation/squirrelserversmanager-client"
ssm_client_image_tag: "latest"
ssm_db_container_name: "ssm-mongo"
ssm_db_image_name: "mongo"
ssm_db_image_tag: "latest"
ssm_redis_container_name: "ssm-cache"
ssm_redis_image_name: "redis"
ssm_redis_image_tag: "latest"

# specs
ssm_cpu_shares: 1024
ssm_memory: "1G"
ssm_client_cpu_shares: 1024
ssm_client_memory: "1G"
ssm_db_cpu_shares: 1024
ssm_db_memory: "1G"
ssm_redis_cpu_shares: 1024
ssm_redis_memory: "1G"

# app
ssm_env_secret: "topsecret"
ssm_env_salt: "9876543210abcdef"
ssm_env_vault_pwd: "topsecret"


# autoheal
ssm_autoheal_enabled: false
ssm_client_autoheal_enabled: false
ssm_db_autoheal_enabled: false
ssm_redis_autoheal_enabled: false

# dockflare
ssm_dockflare_enabled: false
ssm_dockflare_access_group: ""

# tinyauth
ssm_tinyauth_enabled: false

# watchtower
ssm_watchtower_enabled: false
ssm_client_watchtower_enabled: false
ssm_db_watchtower_enabled: false
ssm_redis_watchtower_enabled: false