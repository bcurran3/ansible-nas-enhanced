---
### WORK IN PROGRESS
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ ssm_data_directory }}"
        - "{{ ssm_data_directory }}/data"
        - "{{ ssm_data_directory }}/db"
        - "{{ ssm_data_directory }}/playbooks"

    - name: Create {{ ansible_nas_app_name }} Network
      community.docker.docker_network:
        name: "{{ ssm_network_name }}"

    - name: Create {{ ansible_nas_app_name }} Redis Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ ssm_redis_container_name }}"
        hostname: "{{ ssm_redis_container_name }}"
        image: "{{ ssm_redis_image_name }}:{{ ssm_redis_image_tag }}"
        pull: true
        networks:
          - name: "{{ ssm_network_name }}"
        networks_cli_compatible: "yes"
        network_mode: bridge
        volumes:
          - "{{ ssm_data_directory }}/data:/data"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: ['CMD', 'redis-cli', 'ping']
        command: "--save 60 1"
        labels:
          autoheal: "{{ ssm_redis_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ ssm_redis_watchtower_enable }}"
          dockflare.enable: "false"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/redis"
        cpu_shares: "{{ ssm_redis_cpu_shares }}"
        memory: "{{ ssm_redis_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ ssm_db_container_name }}"
        hostname: "{{ ssm_db_container_name }}"
        image: "{{ ssm_db_image_name }}:{{ ssm_db_image_tag }}"
        pull: true
        networks:
          - name: "{{ ssm_network_name }}"
        networks_cli_compatible: "yes"
        network_mode: bridge
        volumes:
          - "{{ ssm_data_directory }}/db:/data/db"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        command: "--quiet"
        healthcheck:
          test: ['CMD', 'pg_isready', '-U', 'postgres']
        labels:
          autoheal: "{{ ssm_db_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ ssm_db_watchtower_enable }}"
          dockflare.enable: "false"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/mongo"
        cpu_shares: "{{ ssm_db_cpu_shares }}"
        memory: "{{ ssm_db_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Client Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ ssm_client_container_name }}"
        hostname: "{{ ssm_client_container_name }}"
        image: "{{ ssm_client_image_name }}:{{ ssm_client_image_tag }}"
        pull: true
        networks:
          - name: "{{ ssm_network_name }}"
        networks_cli_compatible: "yes"
        network_mode: bridge
        ports:
          - "{{ ssm_port_http }}: 8000"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ ssm_client_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ ssm_client_watchtower_enable }}"
          dockflare.enable: "{{ ssm_dockflare_tunnel }}"
          dockflare.access.group: "{{ ssm_dockflare_access_group }}"
          dockflare.hostname: "{{ ssm_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ ssm_port_http }}"
          traefik.enable: "{{ ssm_available_externally | string }}"
          traefik.http.routers.ssm.rule: "Host(`{{ ssm_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.ssm.tls.certresolver: "letsencrypt"
          traefik.http.routers.ssm.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.ssm.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.ssm.middlewares: "ssm@docker{{ ',tinyauth-auth@docker' if ssm_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.ssm.IPAllowList.sourcerange: "{{ ssm_traefik_whitelist }}"
          traefik.http.services.ssm.loadbalancer.server.port: "8000"
          wud.tag.include: '^v\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/SquirrelCorporation/SquirrelServersManager/pkgs/container/squirrelserversmanager-client"
        cpu_shares: "{{ ssm_client_cpu_shares }}"
        memory: "{{ ssm_client_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (ssm_port_http | string)] +
                (['https://' + ssm_hostname + '.' + ansible_nas_domain] if (ssm_available_externally is true or ssm_dockflare_tunnel is true) else [])
              }}

    - name: Create {{ ansible_nas_app_name }} Server Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ ssm_container_name }}"
        hostname: "{{ ssm_container_name }}"
        image: "{{ ssm_image_name }}:{{ ssm_image_tag }}"
        pull: true
        networks:
          - name: "{{ ssm_network_name }}"
        networks_cli_compatible: "yes"
        network_mode: bridge
        env:
          SECRET: "{{ ssm_env_secret }}"
          SALT: "{{ ssm_env_salt }}"
          VAULT_PWD: "{{ ssm_env_vault_pwd }}"
          #MONGO
          DB_HOST: "{{ ssm_db_container_name }}"
          DB_NAME: "ssm"
          DB_PORT: "27017"
          #redis
          REDIS_HOST: "{{ ssm_redis_container_name }}"
          REDIS_PORT: "6379"
          NODE_ENV: "production"
          TZ: "{{ ansible_nas_timezone }}"
        volumes:
          - "{{ ssm_data_directory }}/playbooks:/playbooks"
        labels:
          autoheal: "{{ ssm_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ ssm_watchtower_enable }}"
          dockflare.enable: "false"
          wud.tag.include: '^v\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/SquirrelCorporation/SquirrelServersManager/pkgs/container/squirrelserversmanager-server"
        cpu_shares: "{{ ssm_cpu_shares }}"
        memory: "{{ ssm_memory }}"
        restart_policy: unless-stopped
  when: ssm_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Client Container
      community.docker.docker_container:
        name: "{{ ssm_client_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} Server Container
      community.docker.docker_container:
        name: "{{ ssm_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} Redis Container
      community.docker.docker_container:
        name: "{{ ssm_redis_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ ssm_db_container_name }}"
        state: absent

    - name: Remove {{ ansible_nas_app_name }} Network
      community.docker.docker_network:
        name: "{{ ssm_network_name }}"
        state: absent
  when: ssm_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ ssm_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - ssm_enabled is false

