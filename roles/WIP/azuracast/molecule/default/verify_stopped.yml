---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Try and stop and remove {{ ansible_nas_app_name }}
      community.docker.docker_container:
        name: "{{ azuracast_container_name }}"
        state: absent
      register: result

    - name: Try and stop and remove {{ ansible_nas_app_name }} Updater
      community.docker.docker_container:
        name: "{{ azuracast_updater_container_name }}"
        state: absent
      register: result_updater

    - name: Try and stop and remove {{ ansible_nas_app_name }} Redis
      community.docker.docker_container:
        name: "{{ azuracast_redis_container_name }}"
        state: absent_redis
      register: result

    - name: Try and stop and remove {{ ansible_nas_app_name }} DB
      community.docker.docker_container:
        name: "{{ azuracast_db_container_name }}"
        state: absent
      register: result_db

    - name: Check if {{ ansible_nas_app_name }} is stopped
      ansible.builtin.assert:
        that:
          - not result.changed
          - not result_db.changed
          - not result_redis.changed
          - not result_updater.changed
