    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ grampsweb_container_name }}"
        hostname: "{{ grampsweb_container_name }}"
        image: "{{ grampsweb_image_name }}:{{ grampsweb_image_tag }}"
        pull: true
        volumes:
          - "{{ grampsweb_data_directory }}/users:/app/users"  # persist user database
          - "{{ grampsweb_data_directory }}/index:/app/indexdir"  # persist search index
          - "{{ grampsweb_data_directory }}/thumb_cache:/app/thumbnail_cache"  # persist thumbnails
          - "{{ grampsweb_data_directory }}/cache:/app/cache"  # persist export and report caches
          - "{{ grampsweb_data_directory }}/secret:/app/secret"  # persist flask secret
          - "{{ grampsweb_data_directory }}/db:/root/.gramps/grampsdb"  # persist Gramps database
          - "{{ grampsweb_data_directory }}/media:/app/media"  # persist media files
          - "{{ grampsweb_data_directory }}/tmp:/tmp"
        ports:
          - "{{ grampsweb_port_http }}:5000"
        env:
          GRAMPSWEB_TREE: "Gramps Web"  # will create a new tree if not exists
          GRAMPSWEB_CELERY_CONFIG__broker_url: "redis://{{ grampsweb_redis_container_name }}:6379/0"
          GRAMPSWEB_CELERY_CONFIG__result_backend: "redis://{{ grampsweb_redis_container_name }}:6379/0"
          GRAMPSWEB_RATELIMIT_STORAGE_URI: redis://{{ grampsweb_redis_container_name }}:6379/1
          TZ: "{{ ansible_nas_timezone }}"
        links:
#          - "{{ grampsweb_celery_container_name }}"
          - "{{ grampsweb_redis_container_name }}"
        labels:
          autoheal: "{{ grampsweb_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ grampsweb_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ grampsweb_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ grampsweb_dockflare_access_group }}"
          dockflare.hostname: "{{ grampsweb_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ grampsweb_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ grampsweb_homepage_group }}"
          homepage.icon: "{{ grampsweb_homepage_icon }}"
          homepage.href: "{{ grampsweb_homepage_href }}"
          homepage.description: "{{ 'Open Source Online Genealogy System' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ grampsweb_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ grampsweb_container_name }}"
          homepage.showStats: "{{ grampsweb_homepage_showstats | ternary('true', 'false') }}"
          traefik.enable: "{{ grampsweb_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.grampsweb.rule: "Host(`{{ grampsweb_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.grampsweb.tls.certresolver: "letsencrypt"
          traefik.http.routers.grampsweb.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.grampsweb.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.grampsweb.middlewares: "grampsweb@docker{{ ',tinyauth-auth@docker' if grampsweb_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.grampsweb.IPAllowList.sourcerange: "{{ grampsweb_traefik_whitelist }}"
          traefik.http.services.grampsweb.loadbalancer.server.port: "5000"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/gramps-project/GrampsWeb/releases"
        cpu_shares: "{{ grampsweb_cpu_shares }}"
        memory: "{{ grampsweb_memory }}"
        memory_swap: "{{ grampsweb_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (grampsweb_port_http | string)] +
                (['https://' + grampsweb_hostname + '.' + ansible_nas_domain] if (grampsweb_traefik_enabled is true or grampsweb_dockflare_enabled is true) else [])
              }}
  when: grampsweb_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ grampsweb_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} Celery Container
      community.docker.docker_container:
        name: "{{ grampsweb_celery_container_name }}"
        state: absent
    
    - name: Stop {{ ansible_nas_app_name }} Redis Container
      community.docker.docker_container:
        name: "{{ grampsweb_redis_container_name }}"
        state: absent
  when: grampsweb_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ grampsweb_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - grampsweb_enabled is false