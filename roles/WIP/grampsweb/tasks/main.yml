---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ grampsweb_data_directory }}"
        - "{{ grampsweb_data_directory }}/cache"
        - "{{ grampsweb_data_directory }}/db"
        - "{{ grampsweb_data_directory }}/index"
        - "{{ grampsweb_data_directory }}/media"
        - "{{ grampsweb_data_directory }}/secret"
        - "{{ grampsweb_data_directory }}/thumb_cache"
        - "{{ grampsweb_data_directory }}/tmp"
        - "{{ grampsweb_data_directory }}/users"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        grampsweb_homepage_href: "https://{{ grampsweb_hostname }}.{{ ansible_nas_domain }}"
      when: grampsweb_traefik_enabled | bool or grampsweb_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Redis Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ grampsweb_redis_container_name }}"
        hostname: "{{ grampsweb_redis_container_name }}"
        image: "{{ grampsweb_redis_image_name }}:{{ grampsweb_redis_image_tag }}"
        pull: true
        networks_cli_compatible: "yes"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ grampsweb_redis_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "true"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} Redis"
          homepage.group: "{{ grampsweb_redis_homepage_group }}"
          homepage.icon: "{{ grampsweb_redis_homepage_icon }}"
          homepage.href: "{{ grampsweb_redis_homepage_href }}"
          homepage.description: "{{ 'Redis' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ grampsweb_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ grampsweb_redis_container_name }}"
          homepage.showStats: "{{ grampsweb_redis_homepage_showstats | ternary('true', 'false') }}"
          traefik.enable: "false"
        cpu_shares: "{{ grampsweb_redis_cpu_shares }}"
        memory: "{{ grampsweb_redis_memory }}"
        memory_swap: "{{ grampsweb_redis_memory_swap }}"
        restart_policy: unless-stopped

