---
# ANE
ansible_nas_app_name: "Gramps Web"
grampsweb_enabled: false
grampsweb_traefik_enabled: false
grampsweb_traefik_whitelist: "{{ lan }}"

# network
grampsweb_port_http: "3031"
grampsweb_hostname: "grampsweb"

grampsweb_data_directory: "{{ docker_home }}/grampsweb"

# docker
grampsweb_container_name: "grampsweb"
grampsweb_image_name: "ghcr.io/gramps-project/grampsweb"
grampsweb_image_tag: "latest"
grampsweb_celery_container_name: "grampsweb-celery"
grampsweb_celery_image_name: ""
grampsweb_celery_image_tag: "latest"
grampsweb_redis_container_name: "grampsweb-redis"
grampsweb_redis_image_name: "docker.io/library/redis"
grampsweb_redis_image_tag: "7.2.4-alpine"

# specs
grampsweb_cpu_shares: 1024
grampsweb_memory: "1G"
grampsweb_memory_swap: -1
grampsweb_celery_cpu_shares: 1024
grampsweb_celery_memory: "1G"
grampsweb_celerty_memory_swap: -1
grampsweb_redis_cpu_shares: 1024
grampsweb_redis_memory: "128M"
grampsweb_redis_memory_swap: "{{ grampsweb_redis_memory }}"

# autoheal
grampsweb_autoheal_enabled: false
grampsweb_celery_autoheal_enabled: false
grampsweb_redis_autoheal_enabled: false

# dockflare
grampsweb_dockflare_enabled: false
grampsweb_dockflare_access_group: ""

# homepage
grampsweb_homepage_group: "Apps"
grampsweb_homepage_icon: "grampsweb.png"
grampsweb_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ grampsweb_port_http }}"
grampsweb_homepage_showstats: false
grampsweb_celery_homepage_group: "Apps"
grampsweb_celery_homepage_icon: "celery.png"
grampsweb_celery_homepage_href: "{{ grampsweb_homepage_href  }}"
grampsweb_celery_homepage_showstats: false
grampsweb_redis_homepage_group: "Apps"
grampsweb_redis_homepage_icon: "redis.png"
grampsweb_redis_homepage_href: "{{ grampsweb_homepage_href  }}"
grampsweb_redis_homepage_showstats: false

# tinyauth
grampsweb_tinyauth_enabled: false

# watchtower
grampsweb_watchtower_enabled: false
grampsweb_celery_watchtower_enabled: false
grampsweb_redis_watchtower_enabled: false
