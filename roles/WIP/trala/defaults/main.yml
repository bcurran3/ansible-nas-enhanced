---
# ANE
ansible_nas_app_name: "TraLa"
trala_enabled: false
trala_traefik_enabled: false
trala_traefik_whitelist: "{{ lan }}"

# directories
trala_data_directory: "{{ docker_home }}/trala"

# docker
trala_container_name: "trala"
trala_image_name: "ghcr.io/dannybouwers/trala"
trala_image_tag: "latest"

# network
trala_port_http: "8080"
trala_hostname: "trala"

# specs
trala_cpu_shares: 1024
trala_memory: "1G"
trala_memory_swap: -1

# autoheal
trala_autoheal_enabled: false

# dockflare
trala_dockflare_enabled: false
trala_dockflare_access_group: ""

# homepage
trala_homepage_group: "Network"
trala_homepage_icon: "trala.png"
trala_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ trala_port_http }}"
trala_homepage_showstats: false

# tinyauth
trala_tinyauth_enabled: false

# watchtower
trala_watchtower_enabled: false
