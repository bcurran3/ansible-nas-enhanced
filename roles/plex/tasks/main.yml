---
- name: Start {{ plex_proper_name }}
  block:
    - name: Create {{ plex_proper_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ plex_data_directory }}"
        - "{{ plex_data_directory }}/config"
        - "{{ plex_data_directory }}/logs"

    - name: Set {{ plex_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        plex_homepage_href: "https://{{ plex_hostname }}.{{ ansible_nas_domain }}"
      when: plex_traefik_enabled | bool or plex_dockflare_enabled | bool

    - name: Create {{ plex_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ plex_container_name }}"
        hostname: "{{ plex_container_name }}"
        image: "{{ plex_image_name }}:{{ plex_image_version }}"
        pull: true
        network_mode: host
#        ports:
#          - "{{ plex_port_http }}:32400"
#          - "32400:32400/udp"
#          - "5353:5353/udp"     # older Bonjour/Avahi network discovery
#          - "8324:8324"         # controlling Plex for Roku via Plex Companion
#          - "32410:32410/udp"   # GDM network discovery
#          - "32412:32412/udp"   # GDM network discovery
#          - "32413:32413/udp"   # GDM network discovery
#          - "32414:32414/udp"   # GDM network discovery
#          - "32469:32469"       # access to the Plex DLNA Server
#          - "32469:32469/udp"   # access to the Plex DLNA Server
#          - "33400:33400"       # Plex Web Tools
#          - "1900:1900/udp"     # Plex DLNA Server
        device_requests: "{{
          [{'driver': 'nvidia', 'count': -1, 'capabilities': ['gpu']}]
          if nvidia_runtime_enabled | default(false) | bool else omit
        }}"
        devices: >-
          {%- set dev_list = (app_devices | default([])) -%}
          {%- if intel_igpu_enabled | default(false) | bool or amd_gpu_enabled | default(false) | bool -%}
            {%- set _ = dev_list.append('/dev/dri:/dev/dri') -%}
          {%- endif -%}
          {{ dev_list if dev_list | length > 0 else omit }}
        group_add: "{{ ['render', 'video'] if (amd_gpu_enabled | default(false) | bool or intel_igpu_enabled | default(false) | bool) else omit }}"
        runtime: "{{ 'nvidia' if nvidia_runtime_enabled | default(false) | bool else omit }}"
        volumes:
          - "{{ plex_data_directory }}/config:/config:rw"
          - "{{ plex_data_directory }}/logs:/opt/plex/Library/Application Support/Plex Media Server/Logs:rw"
          - "{{ plex_anime_directory }}:/anime:{{ plex_anime_permissions }}"  # added
          - "{{ plex_audiobooks_directory }}:/audiobooks:{{ plex_audiobooks_permissions }}"
          - "{{ plex_movies_directory }}:/movies:{{ plex_movies_permissions }}"
          - "{{ plex_music_directory }}:/music:{{ plex_music_permissions }}"
          - "{{ plex_photos_directory }}:/photos:{{ plex_photos_permissions }}"
          - "{{ plex_podcasts_directory }}:/podcasts:{{ plex_podcasts_permissions }}"
          - "{{ plex_porn_directory }}:/porn:{{ plex_porn_permissions }}"  # added
          - "{{ plex_tv_directory }}:/tv:{{ plex_tv_permissions }}"
          - "{{ acmenator_data_directory }}:/certs"
        env:
          DOCKER_MODS: "{{ plex_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ plex_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ plex_env_docker_mods_install_pip_packages}}"
          TP_DOMAIN: "{{ plex_env_docker_mods_tp_domain }}"
          TP_THEME: "{{ plex_env_docker_mods_tp_theme }}"
          TP_COMMUNITY_THEME: "{{ plex_env_docker_mods_tp_community_theme }}"
          TP_ADDON: "{{ plex_env_docker_mods_tp_addon }}"
          PUID: "{{ plex_user_id }}"
          PGID: "{{ plex_group_id }}"
          VERSION: "{{ plex_version }}"
          NVIDIA_VISIBLE_DEVICES: "all"                       # added
          NVIDIA_DRIVER_CAPABILITIES: "compute,video,utility" # added
          GenerateBIFKeyframesOnly: "1"                       # added
          PLEX_DISABLE_SECURITY: "1"                          # added
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: "{{ plex_healthcheck_test }}"
          interval: "{{ plex_healthcheck_interval }}"
          timeout: "{{ plex_healthcheck_timeout }}"
          retries: "{{ plex_healthcheck_retries }}"
          start_period: "{{ plex_healthcheck_start_period }}"
        labels:
          autoheal: "{{ plex_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ plex_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ plex_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ plex_dockflare_access_group }}"
          dockflare.hostname: "{{ plex_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ plex_port_http }}"
          homepage.name: "{{ plex_proper_name }}"
          homepage.group: "{{ plex_homepage_group }}"
          homepage.icon: "{{ plex_homepage_icon }}"
          homepage.href: "{{ plex_homepage_href }}"
          homepage.siteMonitor: "https://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:32400"
          homepage.description: "{{ 'Plex Media Server' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ plex_container_name }}"
          homepage.showStats: "{{ plex_homepage_showstats | ternary('true', 'false') }}"
          homepage.widget.type: "tautulli"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ tautulli_port_http }}"
          homepage.widget.key: "{{ plex_homepage_widget_key }}"
          repliqate.enabled: "{{ plex_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ plex_repliqate_engine }}"
          repliqate.schedule: "{{ plex_repliqate_schedule }}"
          repliqate.backup_id: "{{ plex_repliqate_backup_id }}"
          repliqate.retention: "{{ plex_repliqate_retention }}"
          traefik.enable: "{{ plex_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.plex.entrypoints: "websecure"
          traefik.http.routers.plex.rule: "Host(`{{ plex_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.plex.tls.certresolver: "letsencrypt"
          traefik.http.routers.plex.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.plex.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.middlewares.plex-whitelist.ipallowlist.sourcerange: "{{ plex_traefik_whitelist }}"
          traefik.http.routers.plex.middlewares: "plex-whitelist@docker"
          traefik.http.services.plex.loadbalancer.server.url: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:32400"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://lscr.io/linuxserver/plex"
        cpu_shares: "{{ plex_cpu_shares }}"
        memory: "{{ plex_memory }}"
        memory_swap: "{{ plex_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ plex_proper_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (plex_port_http | string) ] +
                (['https://' + plex_hostname + '.' + ansible_nas_domain ] if (plex_traefik_enabled is true or plex_dockflare_enabled is true) else [])
              }}
  when: plex_enabled is true

- name: Stop {{ plex_proper_name }}
  block:
    - name: Stop {{ plex_proper_name }} Container
      community.docker.docker_container:
        name: "{{ plex_container_name }}"
        state: absent
  when: plex_enabled is false

- name: Data Archive {{ plex_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ plex_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - plex_enabled is false