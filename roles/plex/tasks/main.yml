---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ plex_data_directory }}"
        - "{{ plex_data_directory }}/config"
        - "{{ plex_data_directory }}/logs"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ plex_container_name }}"
        hostname: "{{ plex_container_name }}"
        image: "{{ plex_image_name }}:{{ plex_image_version }}"
        pull: true
#       healthcheck:
#         test: curl --connect-timeout 15 --silent --show-error --fail http://localhost:32400/identity
#         interval: 1m00s
#         timeout: 15s
#         retries: 3
#         start_period: 1m00s
        ports:
          - "{{ plex_port }}:32400"
          - "32400:32400/udp"
          - "5353:5353/udp"     # older Bonjour/Avahi network discovery
          - "8324:8324"         # controlling Plex for Roku via Plex Companion
          - "32410:32410/udp"   # GDM network discovery
          - "32412:32412/udp"   # GDM network discovery
          - "32413:32413/udp"   # GDM network discovery
          - "32414:32414/udp"   # GDM network discovery
          - "32469:32469"       # access to the Plex DLNA Server
          - "32469:32469/udp"   # access to the Plex DLNA Server
          - "33400:33400"       # Plex Web Tools
          - "1900:1900/udp"     # Plex DLNA Server
        runtime: "{{ 'nvidia' if nvidia_runtime_enabled | bool else omit }}"
        device_requests: "{{
          [{'driver': 'nvidia', 'count': -1, 'capabilities': ['gpu']}]
          if nvidia_runtime_enabled | bool else omit
        }}"
        volumes:
          - "{{ plex_data_directory }}/config:/config:rw"
          - "{{ plex_data_directory }}/logs:/opt/plex/Library/Application Support/Plex Media Server/Logs:rw"
          - "{{ plex_movies_directory }}:/movies:{{ plex_movies_permissions }}"
          - "{{ plex_tv_directory }}:/tv:{{ plex_tv_permissions }}"
          - "{{ plex_photos_directory }}:/photos:{{ plex_photos_permissions }}"
          - "{{ plex_podcasts_directory }}:/podcasts:{{ plex_podcasts_permissions }}"
          - "{{ plex_music_directory }}:/music:{{ plex_music_permissions }}"
          - "{{ plex_audiobooks_directory }}:/audiobooks:{{ plex_audiobooks_permissions }}"
          - "{{ plex_porn_directory }}:/porn:{{ plex_porn_permissions }}"  # added
          - "{{ plex_anime_directory }}:/anime:{{ plex_anime_permissions }}"  # added
          - "{{ acmenator_data_directory }}:/certs"
        network_mode: "bridge"   # changed
        devices: "{{ plex_devices | default(omit) }}"
        env:
          TZ: "{{ ansible_nas_timezone }}"
          PUID: "{{ plex_user_id }}"
          PGID: "{{ plex_group_id }}"
          VERSION: "{{ plex_version }}"
          NVIDIA_VISIBLE_DEVICES: "all"                       # added
          NVIDIA_DRIVER_CAPABILITIES: "compute,video,utility" # added
          GenerateBIFKeyframesOnly: "1"                       # added
          PLEX_DISABLE_SECURITY: "1"                          # added
        cpu_shares: "{{ plex_cpu_shares }}"
        restart_policy: unless-stopped
        memory: "{{ plex_memory }}"
        labels:
          autoheal: "{{ plex_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ plex_watchtower_monitor_only }}"
          homepage.group: "{{ plex_homepage_group }}"
          homepage.name: "Plex Media Server"
          homepage.icon: "{{ plex_homepage_icon }}"
          homepage.href: "{{ plex_homepage_href }}"
          homepage.siteMonitor: "https://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:32400/web"
          homepage.description: "{{ 'Plex Media Server' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ plex_container_name }}"
          homepage.showStats: "{{ plex_homepage_showStats }}"
          homepage.widget.type: "tautulli"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ tautulli_port }}"
          homepage.widget.key: "{{ plex_homepage_widget_key }}"
          traefik.enable: "{{ plex_available_externally | string }}"
          traefik.http.routers.plex.rule: "Host(`{{ plex_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.plex.tls.certresolver: "letsencrypt"
          traefik.http.routers.plex.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.plex.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ plex_hostname }}"
          traefik.http.routers.plex.middlewares: "{{ plex_hostname }}@docker"
          traefik.http.middlewares.plex.IPAllowList.sourcerange: "{{ plex_traefik_whitelist }}"
          traefik.http.services.plex.loadbalancer.server.port: "32400"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/linuxserver/docker-plex/releases/tag/$${major}.$${minor}.$${patch}"
  when: plex_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ plex_container_name }}"
        state: absent
  when: plex_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ plex_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ plex_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: plex_enabled is false and archive_app_data_enabled is true
