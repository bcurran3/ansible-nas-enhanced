---
# ANE
ansible_nas_app_name: "SilverBullet"
silverbullet_enabled: false
silverbullet_traefik_enabled: false
silverbullet_traefik_whitelist: "{{ lan }}"

# directories
silverbullet_data_directory: "{{ docker_home }}/silverbullet"

# network
silverbullet_port_http: 3007
silverbullet_hostname: "silverbullet"

# docker
silverbullet_container_name: "silverbullet"
silverbullet_image_name: "zefhemel/silverbullet"
silverbullet_image_version: "latest"

# specs
silverbullet_cpu_shares: 1024
silverbullet_memory: "1G"
silverbullet_memory_swap: -1

# config
silverbullet_username: admin
silverbullet_password: "{{ ansible_nas_app_admin_password }}"

# autoheal
silverbullet_autoheal_enabled: false

# dockflare
silverbullet_dockflare_enabled: false
silverbullet_dockflare_access_group: ""

# homepage
silverbullet_homepage_group: "Apps"
silverbullet_homepage_icon: "silverbullet.png"
silverbullet_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ silverbullet_port_http }}"
silverbullet_homepage_showstats: false

# repliqate
silverbullet_repliqate_enabled: false
silverbullet_repliqate_engine: "restic"
silverbullet_repliqate_schedule: "@daily 3am"
silverbullet_repliqate_backup_id: "{{ silverbullet_container_name }}"
silverbullet_repliqate_retention: "30d"

# tinyauth
silverbullet_tinyauth_enabled: false

# watchtower
silverbullet_watchtower_enabled: false