---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ silverbullet_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ silverbullet_container_name }}"
        hostname: "{{ silverbullet_container_name }}"
        image: "{{ silverbullet_image_name }}:{{ silverbullet_image_version }}"
        pull: true
        ports:
          - "{{ silverbullet_port }}:3000"
        volumes:
          - "{{ silverbullet_data_directory }}:/space"
        env:
          SB_USER: "{{ silverbullet_username }}:{{ silverbullet_password }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ silverbullet_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ silverbullet_watchtower_monitor_only }}"
          dockflare.enable: "{{ silverbullet_dockflare_tunnel }}"
          dockflare.access.group: "{{ silverbullet_dockflare_access_group }}"
          dockflare.hostname: "{{ silverbullet_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ silverbullet_port }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ silverbullet_homepage_group }}"
          homepage.icon: "{{ silverbullet_homepage_icon }}"
          homepage.href: "{{ silverbullet_homepage_href }}"
          homepage.description: "{{ 'Notes for developers' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ silverbullet_container_name }}"
          homepage.showStats: "{{ silverbullet_homepage_showStats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ silverbullet_port }}"
          traefik.enable: "{{ silverbullet_available_externally | string }}"
          traefik.http.routers.silverbullet.rule: "Host(`{{ silverbullet_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.silverbullet.tls.certresolver: "letsencrypt"
          traefik.http.routers.silverbullet.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.silverbullet.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ silverbullet_hostname }}"
          traefik.http.routers.silverbullet.middlewares: "{{ silverbullet_hostname }}@docker"
          traefik.http.middlewares.silverbullet.IPAllowList.sourcerange: "{{ silverbullet_traefik_whitelist }}"
          traefik.http.services.silverbullet.loadbalancer.server.port: "3000"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/zefhemel/silverbullet"
        cpu_shares: "{{ silverbullet_cpu_shares }}"
        memory: "{{ silverbullet_memory }}"
        restart_policy: unless-stopped
  when: silverbullet_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ silverbullet_container_name }}"
        state: absent
  when: silverbullet_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ silverbullet_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ silverbullet_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: silverbullet_enabled is false and archive_app_data_enabled is true
