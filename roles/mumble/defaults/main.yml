---
# ANE
ansible_nas_app_name: "Mumble"
mumble_enabled: false
mumble_traefik_enabled: false
mumble_traefik_whitelist: "{{ lan }}"

# Directories
mumble_data_directory: "{{ docker_home }}/mumble"

# Networking
mumble_port_tcp: "64738"
mumble_port_udp: "64738"
mumble_hostname: "mumble"

mumble_puid: "1000"
mumble_pgid: "1000"

# docker
mumble_container_name: "mumble-server"
mumble_image_name: "mumblevoip/mumble-server"
mumble_image_tag: "latest"

# specs
mumble_cpu_shares: 1024
mumble_memory: "1G"
mumble_memory_swap: -1

# app
mumble_env_mumble_config_server_password: "{{ ansible_nas_app_admin_password }}"
mumble_env_mumble_config_imagemessagelength: "1310720"
mumble_env_mumble_config_registername: "Main Channel Name"
mumble_env_mumble_config_username: '[ -=\\w\\[\\]\\{\\}\\(\\)\\@\\|\\.]+'
mumble_env_mumble_config_channelname: '[ \\-=\\w\\#\\[\\]\\{\\}\\(\\)\\@\\|\\%\\'']+'
mumble_env_mumble_config_welcometext: 'Hello there !'
mumble_env_mumble_config_ice: "tcp -h 127.0.0.1 -p 6502"
mumble_env_mumble_config_icesecretwrite: "***"
mumble_env_mumble_config_port: "64738"
mumble_env_mumble_config_timeout: "30"
mumble_env_mumble_config_users: "100"
mumble_env_mumble_config_rememberchannel: "true"
mumble_env_mumble_config_allowhtml: "true"
mumble_env_mumble_serveruser_password: "{{ ansible_nas_app_admin_password }}"
mumble_env_mumble_verbose: "false"

# autoheal
mumble_autoheal_enabled: false

# dockflare
mumble_dockflare_enabled: false
mumble_dockflare_access_group: ""

# homepage
mumble_homepage_group: "Misc"
mumble_homepage_icon: "mumble.png"
mumble_homepage_showstats: false

# repliqate
mumble_repliqate_enabled: false
mumble_repliqate_engine: "restic"
mumble_repliqate_schedule: "@daily 3am"
mumble_repliqate_backup_id: "{{ mumble_container_name }}"
mumble_repliqate_retention: "30d"

# tinyauth
mumble_tinyauth_enabled: false

# watchtower
mumble_watchtower_enabled: false