---
ansible_nas_app_name: "Mumble"

mumble_enabled: false
mumble_available_externally: false
mumble_traefik_whitelist: "{{ lan }}"

# Directories
mumble_data_directory: "{{ docker_home }}/mumble"

# Networking
mumble_tcp_port: "64738"
mumble_udp_port: "64738"
mumble_hostname: mumble

# Configuration
# It is strongly advised this password is changed, especially if this is publicly available.
mumble_server_password: "abcpassword123"

# docker
mumble_container_name: mumble-server
mumble_cpu_shares: 1024
mumble_memory: 1G
mumble_image_name: "mumblevoip/mumble-server"
mumble_image_tag: "latest"

# autoheal
mumble_autoheal: "false"

# dockflare
mumble_dockflare_tunnel: "false"
mumble_dockflare_access_group: ""

# homepage
mumble_homepage_group: "Apps"
mumble_homepage_icon: "mumble.png"
mumble_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ mumble_port }}"
mumble_homepage_showStats: "false"

# watchtower
mumble_watchtower_monitor_only: "true"