---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ hello_world_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ hello_world_container_name }}"
        hostname: "{{ hello_world_container_name }}"
        image: "{{ hello_world_image_name }}:{{ hello_world_image_tag }}"
        pull: true
        volumes:
          - "{{ hello_world_data_directory }}:/hello_world:rw"
        ports:
          - "{{ hello_world_port }}:8000"
        restart_policy: unless-stopped
        cpu_shares: "{{ hello_world_cpu_shares }}"
        memory: "{{ hello_world_memory }}"
        labels:
          autoheal: "{{ hello_world_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ hello_world_watchtower_monitor_only }}"
          traefik.enable: "{{ hello_world_available_externally | string }}"
          traefik.http.routers.hello_world.rule: "Host(`{{ hello_world_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.hello_world.tls.certresolver: "letsencrypt"
          traefik.http.routers.hello_world.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.hello_world.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ hello_world_hostname }}"
          traefik.http.routers.hello_world.middlewares: "{{ hello_world_hostname }}@docker"
          traefik.http.middlewares.hello_world.IPAllowList.sourcerange: "{{ hello_world_traefik_whitelist }}"
          traefik.http.services.hello_world.loadbalancer.server.port: "8000"
  when: hello_world_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ hello_world_container_name }}"
        state: absent
  when: hello_world_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ hello_world_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ hello_world_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: hello_world_enabled is false and archive_app_data_enabled is true
