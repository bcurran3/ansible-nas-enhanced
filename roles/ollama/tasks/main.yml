---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ ollama_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ ollama_container_name }}"
        hostname: "{{ ollama_container_name }}"
        image: "{{ ollama_image_name }}:{{ ollama_image_tag }}"
        pull: true
        cpu_shares: "{{ ollama_cpu_shares }}"
        runtime: "{{ 'nvidia' if nvidia_runtime_enabled | bool else omit }}"
        device_requests: "{{
          [{'driver': 'nvidia', 'count': -1, 'capabilities': ['gpu']}]
          if nvidia_runtime_enabled | bool else omit
        }}"
        volumes:
          - "{{ ollama_data_directory }}:/root/.ollama"
        ports:
          - "{{ ollama_port_http }}:11434"
        env:
          OLLAMA_HOST: "0.0.0.0"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ ollama_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ ollama_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ ollama_homepage_group }}"
          homepage.icon: "{{ ollama_homepage_icon }}"
          homepage.href: "{{ ollama_homepage_href }}"
          homepage.description: "{{ 'Get up and running with Llama 3.3, DeepSeek-R1, Phi-4, Gemma 3, Mistral Small 3.1 and other large language models.' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ ollama_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ ollama_container_name }}"
          homepage.showStats: "{{ ollama_homepage_showStats }}"
          traefik.enable: "{{ ollama_available_externally | string }}"
          traefik.http.routers.ollama.rule: "Host(`ollama.{{ ansible_nas_domain }}`)"
          traefik.http.routers.ollama.tls.certresolver: "letsencrypt"
          traefik.http.routers.ollama.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.ollama.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ ollama_hostname }}"
          traefik.http.routers.ollama.middlewares: "{{ ollama_hostname }}@docker"
          traefik.http.middlewares.ollama.IPAllowList.sourcerange: "{{ ollama_traefik_whitelist }}"
          traefik.http.services.ollama.loadbalancer.server.port: "11434"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/ollama/ollama/releases/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ ollama_memory }}"
        restart_policy: unless-stopped
  when: ollama_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ ollama_container_name }}"
        state: absent
  when: ollama_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ ollama_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ ollama_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: ollama_enabled is false and archive_app_data_enabled is true
