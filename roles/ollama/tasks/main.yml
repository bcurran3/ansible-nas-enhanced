---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ ollama_data_directory }}"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        ollama_homepage_href: "https://{{ ollama_hostname }}.{{ ansible_nas_domain }}"
      when: ollama_traefik_enabled | bool or ollama_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ ollama_container_name }}"
        hostname: "{{ ollama_container_name }}"
        image: "{{ ollama_image_name }}:{{ ollama_image_tag }}"
        pull: true
        device_requests: "{{
          [{'driver': 'nvidia', 'count': -1, 'capabilities': ['gpu']}]
          if nvidia_runtime_enabled | default(false) | bool else omit
        }}"
        devices: >-
          {%- set dev_list = (app_devices | default([])) -%}
          {%- if intel_igpu_enabled | default(false) | bool or amd_gpu_enabled | default(false) | bool -%}
            {%- set _ = dev_list.append('/dev/dri:/dev/dri') -%}
          {%- endif -%}
          {%- if amd_gpu_enabled | default(false) | bool and ansible_nas_app_name | lower is search('ollama|localai') -%}
            {%- set _ = dev_list.append('/dev/kfd:/dev/kfd') -%}
          {%- endif -%}
          {{ dev_list if dev_list | length > 0 else omit }}
        group_add: "{{ ['render', 'video'] if (amd_gpu_enabled | default(false) | bool or intel_igpu_enabled | default(false) | bool) else omit }}"
        runtime: "{{ 'nvidia' if nvidia_runtime_enabled | default(false) | bool else omit }}"
        volumes:
          - "{{ ollama_data_directory }}:/root/.ollama"
        ports:
          - "{{ ollama_port_http }}:11434"
        env:
          OLLAMA_HOST: "0.0.0.0"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ ollama_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ ollama_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ ollama_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ ollama_dockflare_access_group }}"
          dockflare.hostname: "{{ ollama_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ ollama_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ ollama_homepage_group }}"
          homepage.icon: "{{ ollama_homepage_icon }}"
          homepage.href: "{{ ollama_homepage_href }}"
          homepage.description: "{{ 'Get up and running with Llama 3.3, DeepSeek-R1, Phi-4, Gemma 3, Mistral Small 3.1 and other large language models.' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ ollama_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ ollama_container_name }}"
          homepage.showStats: "{{ ollama_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ ollama_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ ollama_repliqate_engine }}"
          repliqate.schedule: "{{ ollama_repliqate_schedule }}"
          repliqate.backup_id: "{{ ollama_repliqate_backup_id }}"
          repliqate.retention: "{{ ollama_repliqate_retention }}"
          traefik.enable: "{{ ollama_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.ollama.rule: "Host(`{{ ollama_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.ollama.tls.certresolver: "letsencrypt"
          traefik.http.routers.ollama.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.ollama.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.ollama.middlewares: "ollama@docker{{ ',tinyauth-auth@docker' if ollama_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.ollama.IPAllowList.sourcerange: "{{ ollama_traefik_whitelist }}"
          traefik.http.services.ollama.loadbalancer.server.port: "11434"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/ollama/ollama"
        cpu_shares: "{{ ollama_cpu_shares }}"
        memory: "{{ ollama_memory }}"
        memory_swap: "{{ ollama_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (ollama_port_http | string)] +
                (['https://' + ollama_hostname + '.' + ansible_nas_domain] if (ollama_traefik_enabled is true or ollama_dockflare_enabled is true) else [])
              }}
  when: ollama_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ ollama_container_name }}"
        state: absent
  when: ollama_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ ollama_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - ollama_enabled is false