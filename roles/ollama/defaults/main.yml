---
# ANE
ansible_nas_app_name: "Ollama"
ollama_enabled: false
ollama_traefik_enabled: false
ollama_traefik_whitelist: "{{ lan }}"
ollama_amd_ai_enabled: true

ollama_data_directory: "{{ docker_home }}/ollama"

# network
ollama_port_http: "11434"
ollama_hostname: "ollama"

# docker
ollama_container_name: "ollama"
ollama_image_name: "ollama/ollama"
ollama_image_tag: "latest"
#ollama_image_tag: "rocm" # AMD GPU support

# specs
ollama_cpu_shares: 1024
ollama_memory: "8G" # 8GB (3B models), 16GB (7B models), 32GB+ (13B+ models)
ollama_memory_swap: -1

# autoheal
ollama_autoheal_enabled: false

# dockflare
ollama_dockflare_enabled: false
ollama_dockflare_access_group: ""

# healthcheck
ollama_healthcheck_test: ["CMD", "ollama", "list"]
ollama_healthcheck_interval: 30s
ollama_healthcheck_timeout: 10s
ollama_healthcheck_retries: 3
ollama_healthcheck_start_period: 60s

# homepage
ollama_homepage_group: "Misc"
ollama_homepage_icon: "ollama.png"
ollama_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ ollama_port_http }}"
ollama_homepage_showstats: false

# repliqate
ollama_repliqate_enabled: false
ollama_repliqate_engine: "restic"
ollama_repliqate_schedule: "@daily 3am"
ollama_repliqate_backup_id: "{{ ollama_container_name }}"
ollama_repliqate_retention: "30d"

# tinyauth
ollama_tinyauth_enabled: false

# watchtower
ollama_watchtower_enabled: false
