---
# ANE
ansible_nas_app_name: "Dokemon"
dokemon_enabled: false
dokemon_available_externally: false
dokemon_traefik_whitelist: "{{ lan }}"
dokemon_data_directory: "{{ docker_home }}/dokemon"

# network
dokemon_hostname: "dokemon"
dokemon_port_http: "9019"

# docker
dokemon_container_name: "dokemon"
dokemon_image_name: "productiveops/dokemon"
dokemon_image_tag: "latest"

# specs
dokemon_cpu_shares: 1024
dokemon_memory: "1G"
dokemon_memory_swap: -1

# autoheal
dokemon_autoheal: false

# dockflare
dokemon_dockflare_enabled: false
dokemon_dockflare_access_group: ""

# homepage
dokemon_homepage_group: "Apps"
dokemon_homepage_icon: "dokemon.png"
dokemon_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ dokemon_port_http }}"
dokemon_homepage_showstats: false

# repliqate
dokemon_repliqate_enabled: false
dokemon_repliqate_engine: "restic"
dokemon_repliqate_schedule: "@daily 3am"
dokemon_repliqate_backup_id: "{{ dokemon_container_name }}"
dokemon_repliqate_retention: "30d"

# tinyauth
dokemon_tinyauth_enabled: false

# watchtower
dokemon_watchtower_enabled: false