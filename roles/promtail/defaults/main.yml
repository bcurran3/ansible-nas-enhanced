---
ansible_nas_app_name: "Promtail"

# enable or disable the application
promtail_enabled: false
promtail_available_externally: false
promtail_traefik_whitelist: "{{ lan }}"

# directories
promtail_data_directory: "{{ docker_home }}/promtail"

# network
promtail_hostname: "promtail"
promtail_network_name: "promtail"
promtail_port: "9080"

# docker
promtail_container_name: "promtail"
promtail_image_name: "grafana/promtail"
promtail_image_version: "latest"

# specs
promtail_cpu_shares: 1024
promtail_memory: "1g"

# config
promtail_loki_url: http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ loki_http_port }}/loki/api/v1/push

# autoheal
promtail_autoheal: "false"

# dockflare
promtail_dockflare_tunnel: "false"
promtail_dockflare_access_group: ""

# homepage
promtail_homepage_group: "Apps"
promtail_homepage_icon: "promtail.png"
promtail_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ promtail_port }}"
promtail_homepage_showStats: "false"

# watchtower
promtail_watchtower_monitor_only: "true"