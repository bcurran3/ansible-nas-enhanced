---
# ANE
ansible_nas_app_name: "Promtail"
promtail_enabled: false
promtail_traefik_enabled: false
promtail_traefik_whitelist: "{{ lan }}"

# directories
promtail_data_directory: "{{ docker_home }}/promtail"

# network
promtail_hostname: "promtail"
promtail_network_name: "promtail"
promtail_port_http: "9080"

# docker
promtail_container_name: "promtail"
promtail_image_name: "grafana/promtail"
promtail_image_version: "latest"

# specs
promtail_cpu_shares: 1024
promtail_memory: "1G"

# config
promtail_loki_url: http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ loki_http_port }}/loki/api/v1/push

# autoheal
promtail_autoheal_enabled: false

# dockflare
promtail_dockflare_enabled: false
promtail_dockflare_access_group: ""

# homepage
promtail_homepage_group: "Apps"
promtail_homepage_icon: "promtail.png"
promtail_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ promtail_port_http }}"
promtail_homepage_showstats: false

# repliqate
promtail_repliqate_enabled: false
promtail_repliqate_engine: "restic"
promtail_repliqate_schedule: "@daily 3am"
promtail_repliqate_backup_id: "{{ promtail_container_name }}"
promtail_repliqate_retention: "30d"

# tinyauth
promtail_tinyauth_enabled: false

# watchtower
promtail_watchtower_enabled: false