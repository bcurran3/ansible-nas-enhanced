---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Check for Loki installation
      ansible.builtin.fail:
        msg: "Promtail requires Loki enabled and running as a write target, please set that up first."
      when: loki_enabled is false

    - name: Include Loki variables
      ansible.builtin.include_vars: ../../loki/defaults/main.yml

    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ promtail_data_directory }}/config"
        - "{{ promtail_data_directory }}/data"

    - name: Copy {{ ansible_nas_app_name }} Template config
      ansible.builtin.template:
        src: config.yml
        dest: "{{ promtail_data_directory }}/config/config.yml"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ promtail_container_name }}"
        hostname: "{{ promtail_container_name }}"
        image: "{{ promtail_image_name }}:{{ promtail_image_version }}"
        pull: true
        command: "-config.file=/etc/promtail/config.yml"
        ports:
          - "{{ promtail_port }}:9080"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        volumes:
          - "{{ promtail_data_directory }}/config/config.yml:/etc/promtail/config.yml"
          - "{{ promtail_data_directory }}/data/:/data"
          - "/var/run/docker.sock:/var/run/docker.sock"
        labels:
          autoheal: "{{ promtail_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ promtail_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ promtail_homepage_group }}"
          homepage.icon: "{{ promtail_homepage_icon }}"
          homepage.href: "{{ promtail_homepage_href }}"
          homepage.description: "{{ 'promtail description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ promtail_container_name }}"
          homepage.showStats: "{{ promtail_homepage_showStats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ promtail_port }}"
          traefik.enable: "{{ promtail_available_externally | string }}"
          traefik.http.routers.promtail.rule: "Host(`{{ promtail_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.promtail.tls.certresolver: "letsencrypt"
          traefik.http.routers.promtail.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.promtail.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ promtail_hostname }}"
          traefik.http.routers.promtail.middlewares: "{{ promtail_hostname }}@docker"
          traefik.http.middlewares.promtail.IPAllowList.sourcerange: "{{ promtail_traefik_whitelist }}"
          traefik.http.services.promtail.loadbalancer.server.port: "9080"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/dev/appname/releases/tag/$${major}.$${minor}.$${patch}"
        cpu_shares: "{{ promtail_cpu_shares }}"
        memory: "{{ promtail_memory }}"
        restart_policy: unless-stopped
  when: promtail_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ promtail_container_name }}"
        state: absent
  when: promtail_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ promtail_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ promtail_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: promtail_enabled is false and archive_app_data_enabled is true
