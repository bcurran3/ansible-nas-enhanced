---
- name: Start {{ promtail_proper_name }}
  block:
    - name: Check for Loki installation
      ansible.builtin.fail:
        msg: "Promtail requires Loki enabled and running as a write target, please set that up first."
      when: loki_enabled is false

    - name: Include Loki variables
      ansible.builtin.include_vars: ../../loki/defaults/main.yml

    - name: Create {{ promtail_proper_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ promtail_data_directory }}/config"
        - "{{ promtail_data_directory }}/data"

    - name: Set {{ promtail_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        promtail_homepage_href: "https://{{ promtail_hostname }}.{{ ansible_nas_domain }}"
      when: promtail_traefik_enabled | bool or promtail_dockflare_enabled | bool

    - name: Copy {{ promtail_proper_name }} Template config
      ansible.builtin.template:
        src: config.yml
        dest: "{{ promtail_data_directory }}/config/config.yml"

    - name: Create {{ promtail_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ promtail_container_name }}"
        hostname: "{{ promtail_container_name }}"
        image: "{{ promtail_image_name }}:{{ promtail_image_version }}"
        pull: true
        command: "-config.file=/etc/promtail/config.yml"
        ports:
          - "{{ promtail_port_http }}:9080"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        volumes:
          - "{{ promtail_data_directory }}/config/config.yml:/etc/promtail/config.yml"
          - "{{ promtail_data_directory }}/data/:/data"
          - "/var/run/docker.sock:/var/run/docker.sock"
        labels:
          autoheal: "{{ promtail_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ promtail_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ promtail_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ promtail_dockflare_access_group }}"
          dockflare.hostname: "{{ promtail_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ promtail_port_http }}"
          homepage.name: "{{ promtail_proper_name }}"
          homepage.group: "{{ promtail_homepage_group }}"
          homepage.icon: "{{ promtail_homepage_icon }}"
          homepage.href: "{{ promtail_homepage_href }}"
          homepage.description: "{{ 'promtail description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ promtail_container_name }}"
          homepage.showStats: "{{ promtail_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ promtail_port_http }}"
          repliqate.enabled: "{{ promtail_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ promtail_repliqate_engine }}"
          repliqate.schedule: "{{ promtail_repliqate_schedule }}"
          repliqate.backup_id: "{{ promtail_repliqate_backup_id }}"
          repliqate.retention: "{{ promtail_repliqate_retention }}"
          traefik.enable: "{{ promtail_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.promtail.rule: "Host(`{{ promtail_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.promtail.tls.certresolver: "letsencrypt"
          traefik.http.routers.promtail.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.promtail.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.promtail.middlewares: "promtail@docker{{ ',tinyauth-auth@docker' if promtail_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.promtail.IPAllowList.sourcerange: "{{ promtail_traefik_whitelist }}"
          traefik.http.services.promtail.loadbalancer.server.port: "9080"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/grafana/promtail"
        cpu_shares: "{{ promtail_cpu_shares }}"
        memory: "{{ promtail_memory }}"
        memory_swap: "{{ promtail_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ promtail_proper_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (promtail_port_http | string)] +
                (['https://' + promtail_hostname + '.' + ansible_nas_domain] if (promtail_traefik_enabled is true or promtail_dockflare_enabled is true) else [])
              }}
  when: promtail_enabled is true

- name: Stop {{ promtail_proper_name }}
  block:
    - name: Stop {{ promtail_proper_name }} Container
      community.docker.docker_container:
        name: "{{ promtail_container_name }}"
        state: absent
  when: promtail_enabled is false

- name: Data Archive {{ promtail_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ promtail_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - promtail_enabled is false