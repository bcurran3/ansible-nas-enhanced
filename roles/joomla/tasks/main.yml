---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ joomla_data_directory }}"
        - "{{ joomla_data_directory }}/db"

    - name: Create {{ ansible_nas_app_name }} network
      community.docker.docker_network:
        name: "{{ joomla_network_name }}"

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ joomla_db_container_name }}"
        hostname: "{{ joomla_db_container_name }}"
        image: "{{ joomla_db_image_name }}:{{ joomla_db_image_version }}"
        pull: true
        networks:
          - name: "{{ joomla_network_name }}"
        network_mode: "{{ joomla_network_name }}"
        volumes:
          - "{{ joomla_data_directory }}/db:/var/lib/mysql"
        env:
          MYSQL_DATABASE: "joomla"
          MYSQL_USER: "joomla"
          MYSQL_ROOT_PASSWORD: "{{ joomla_database_password }}"
        labels:
          autoheal: "{{ joomla_db_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ joomla_db_watchtower_monitor_only }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} MySQL"
          homepage.group: "{{ joomla_db_homepage_group }}"
          homepage.icon: "{{ joomla_db_homepage_icon }}"
          homepage.href: "{{ joomla_homepage_href }}"
          homepage.description: "{{ 'MySQL Server, the world''s most popular open source database' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ joomla_db_container_name }}"
          homepage.showStats: "{{ joomla_db_homepage_showStats }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/mysql"
        cpu_shares: "{{ joomla_db_cpu_shares }}"
        memory: "{{ joomla_db_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ joomla_container_name }}"
        hostname: "{{ joomla_container_name }}"
        image: "{{ joomla_image_name }}:{{ joomla_image_version }}"
        pull: true
        networks:
          - name: "{{ joomla_network_name }}"
        network_mode: "{{ joomla_network_name }}"
        volumes:
          - "{{ joomla_data_directory }}:/var/www/html:rw"
        ports:
          - "{{ joomla_port }}:80"
        env:
          JOOMLA_DB_HOST: "{{ joomla_db_container_name }}"
          JOOMLA_DB_USER: "root"
          JOOMLA_DB_PASSWORD: "{{ joomla_database_password }}"
        labels:
          autoheal: "{{ joomla_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ joomla_watchtower_monitor_only }}"
          dockflare.enable: "{{ joomla_dockflare_tunnel }}"
          dockflare.access.group: "{{ joomla_dockflare_access_group }}"
          dockflare.hostname: "{{ joomla_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ joomla_port }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ joomla_homepage_group }}"
          homepage.icon: "{{ joomla_homepage_icon }}"
          homepage.href: "{{ joomla_homepage_href }}"
          homepage.description: "{{ 'joomla description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ joomla_container_name }}"
          homepage.showStats: "{{ joomla_homepage_showStats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ joomla_port }}"
          traefik.enable: "{{ joomla_available_externally | string }}"
          traefik.http.routers.joomla.rule: "Host(`{{ joomla_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.joomla.tls.certresolver: "letsencrypt"
          traefik.http.routers.joomla.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.joomla.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ joomla_hostname }}"
          traefik.http.routers.joomla.middlewares: "{{ joomla_hostname }}@docker"
          traefik.http.middlewares.joomla.IPAllowList.sourcerange: "{{ joomla_traefik_whitelist }}"
          traefik.http.services.joomla.loadbalancer.server.port: "80"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/joomla"
        cpu_shares: "{{ joomla_cpu_shares }}"
        memory: "{{ joomla_memory }}"
        restart_policy: unless-stopped
  when: joomla_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ joomla_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ joomla_db_container_name }}"
        state: absent
  when: joomla_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ joomla_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ joomla_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: joomla_enabled is false and archive_app_data_enabled is true
