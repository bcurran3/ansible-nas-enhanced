---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ joomla_data_directory }}"
        - "{{ joomla_data_directory }}/data"
        - "{{ joomla_data_directory }}/db"

    - name: Create {{ ansible_nas_app_name }} network
      community.docker.docker_network:
        name: "{{ joomla_network_name }}"

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ joomla_db_container_name }}"
        hostname: "{{ joomla_db_container_name }}"
        image: "{{ joomla_db_image_name }}:{{ joomla_db_image_version }}"
        pull: true
        networks:
          - name: "{{ joomla_network_name }}"
        network_mode: "{{ joomla_network_name }}"
        volumes:
          - "{{ joomla_data_directory }}/db:/var/lib/mysql"
        env:
          MYSQL_DATABASE: "{{ joomla_env_joomla_db_name }}"
          MYSQL_USER: "{{ joomla_env_joomla_db_user }}"
          MYSQL_PASSWORD: "{{ joomla_env_joomla_db_password }}"
          MYSQL_RANDOM_ROOT_PASSWORD: '1'
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ joomla_db_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ joomla_db_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} MySQL"
          homepage.group: "{{ joomla_db_homepage_group }}"
          homepage.icon: "{{ joomla_db_homepage_icon }}"
          homepage.href: "{{ joomla_homepage_href }}"
          homepage.description: "{{ 'MySQL Server, the world''s most popular open source database' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ joomla_db_container_name }}"
          homepage.showStats: "{{ joomla_db_homepage_showstats }}"
          repliqate.enabled: "{{ joomla_db_repliqate_enabled }}"
          repliqate.engine: "{{ joomla_db_repliqate_engine }}"
          repliqate.schedule: "{{ joomla_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ joomla_db_repliqate_backup_id }}"
          repliqate.retention: "{{ joomla_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/mysql"
        cpu_shares: "{{ joomla_db_cpu_shares }}"
        memory: "{{ joomla_db_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ joomla_container_name }}"
        hostname: "{{ joomla_container_name }}"
        image: "{{ joomla_image_name }}:{{ joomla_image_version }}"
        pull: true
        networks:
          - name: "{{ joomla_network_name }}"
        network_mode: "{{ joomla_network_name }}"
        volumes:
          - "{{ joomla_data_directory }}:/var/www/html"
        ports:
          - "{{ joomla_port_http }}:80"
        env:
          JOOMLA_DB_USER: "{{ joomla_env_joomla_db_user }}"
          JOOMLA_DB_NAME: "{{ joomla_env_joomla_db_name }}"
          JOOMLA_DB_PASSWORD: "{{ joomla_env_joomla_db_password }}"
          JOOMLA_DB_TYPE: "{{ joomla_env_joomla_db_type }}"
          JOOMLA_SITE_NAME: "{{ joomla_env_joomla_site_name }}"
          JOOMLA_ADMIN_USER: "{{ joomla_env_joomla_admin_user }}"
          JOOMLA_ADMIN_USERNAME: "{{ joomla_env_joomla_admin_username }}"
          JOOMLA_ADMIN_PASSWORD: "{{ joomla_env_joomla_admin_password }}"
          JOOMLA_ADMIN_EMAIL: "{{ joomla_env_joomla_admin_email }}"
          JOOMLA_EXTENSIONS_URLS: "{{ joomla_env_joomla_extensions_urls }}"
          JOOMLA_EXTENSIONS_PATHS: "{{ joomla_env_joomla_extensions_paths }}"
          JOOMLA_SMTP_HOST: "{{ joomla_env_joomla_smtp_host }}"
          JOOMLA_SMTP_HOST_PORT: "{{ joomla_env_joomla_smtp_host_port }}"
          TZ: "{{ ansible_nas_timezone }}"
        links:
          - "{{ joomla_db_container_name }}"
        labels:
          autoheal: "{{ joomla_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ joomla_watchtower_enable }}"
          dockflare.enable: "{{ joomla_dockflare_tunnel }}"
          dockflare.access.group: "{{ joomla_dockflare_access_group }}"
          dockflare.hostname: "{{ joomla_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ joomla_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ joomla_homepage_group }}"
          homepage.icon: "{{ joomla_homepage_icon }}"
          homepage.href: "{{ joomla_homepage_href }}"
          homepage.description: "{{ 'open source content management system' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ joomla_container_name }}"
          homepage.showStats: "{{ joomla_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ joomla_port_http }}"
          repliqate.enabled: "{{ joomla_repliqate_enabled }}"
          repliqate.engine: "{{ joomla_repliqate_engine }}"
          repliqate.schedule: "{{ joomla_repliqate_schedule }}"
          repliqate.backup_id: "{{ joomla_repliqate_backup_id }}"
          repliqate.retention: "{{ joomla_repliqate_retention }}"
          traefik.enable: "{{ joomla_available_externally | string }}"
          traefik.http.routers.joomla.rule: "Host(`{{ joomla_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.joomla.tls.certresolver: "letsencrypt"
          traefik.http.routers.joomla.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.joomla.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ joomla_hostname }}"
          traefik.http.routers.joomla.middlewares: "{{ joomla_hostname }}@docker"
          traefik.http.middlewares.joomla.IPAllowList.sourcerange: "{{ joomla_traefik_whitelist }}"
          traefik.http.services.joomla.loadbalancer.server.port: "80"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/joomla"
        cpu_shares: "{{ joomla_cpu_shares }}"
        memory: "{{ joomla_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (joomla_port_http | string)] +
                (['https://' + joomla_hostname + '.' + ansible_nas_domain] if (joomla_available_externally is true or joomla_dockflare_tunnel is true) else [])
              }}
  when: joomla_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ joomla_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ joomla_db_container_name }}"
        state: absent

    - name: Delete {{ ansible_nas_app_name }} Network
      community.docker.docker_network:
        name: "{{ joomla_network_name }}"
        state: absent
  when: joomla_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ joomla_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ joomla_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: joomla_enabled is false and archive_app_data_enabled is true
