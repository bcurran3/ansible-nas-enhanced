---
# ANE
ansible_nas_app_name: "Woodpecker CI"
woodpecker_ci_enabled: false
woodpecker_ci_traefik_enabled: false
woodpecker_ci_traefik_whitelist: "{{ lan }}"

# directories
woodpecker_ci_data_directory: "{{ docker_home }}/woodpecker-ci"

# network
woodpecker_ci_port_http: "8000"
woodpecker_ci_port_grpc: "9000"
woodpecker_ci_address: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ woodpecker_ci_port_http }}"
woodpecker_ci_hostname: "woodpeckerci"

# docker
woodpecker_ci_container_name: "woodpecker-ci"
woodpecker_ci_image_name: "woodpeckerci/woodpecker-server"
woodpecker_ci_image_version: "latest"
woodpecker_ci_agent_container_name: "woodpecker-ci-agent"
woodpecker_ci_agent_image_name: "woodpeckerci/woodpecker-agent"
woodpecker_ci_agent_image_version: "latest"

# specs
woodpecker_ci_cpu_shares: 1024
woodpecker_ci_memory: "1G"
woodpecker_ci_memory_swap: -1
woodpecker_ci_agent_cpu_shares: 1024
woodpecker_ci_agent_memory: "1G"
woodpecker_ci_agent_memory_swap: -1

# Woodpecker-CI Application Config
# the users that'll be granted admin, comma separated
woodpecker_ci_admin_user: "{{ ansible_nas_user }}"

# shared secret - use openssl rand -hex 32 to generate your own
woodpecker_ci_agent_secret: 9f3aeaa7bbabcf42b724f65d4acb38456899ca32511677a8c3837869621c3798

# logging level
woodpecker_ci_log_level: info

# the url to your gitea server
woodpecker_ci_gitea_url: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ gitea_port_http }}"

# gitea auth credentials. see https://woodpecker-ci.org/docs/administration/forges/gitea for more info
woodpecker_ci_gitea_client: notset
woodpecker_ci_gitea_secret: notset

# autoheal
woodpecker_ci_autoheal_enabled: false
woodpecker_ci_agent_autoheal_enabled: false

# dockflare
woodpecker_ci_dockflare_enabled: false
woodpecker_ci_dockflare_access_group: ""

# homepage
woodpecker_ci_homepage_group: "Apps"
woodpecker_ci_homepage_icon: "woodpecker-ci.png"
woodpecker_ci_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ woodpecker_ci_port }}"
woodpecker_ci_homepage_showstats: false

# repliqate
woodpecker_ci_repliqate_enabled: false
woodpecker_ci_repliqate_engine: "restic"
woodpecker_ci_repliqate_schedule: "@daily 3am"
woodpecker_ci_repliqate_backup_id: "{{ woodpecker_ci_container_name }}"
woodpecker_ci_repliqate_retention: "30d"

# tinyauth
woodpecker_ci_tinyauth_enabled: false

# watchtower
woodpecker_ci_watchtower_enabled: false
woodpecker_ci_agent_watchtower_enabled: false
