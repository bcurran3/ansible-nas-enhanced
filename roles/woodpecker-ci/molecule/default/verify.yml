---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Get {{ woodpecker_ci_proper_name }} container state
      community.docker.docker_container:
        name: "{{ woodpecker_ci_container_name }}"
      register: result

    - name: Get {{ woodpecker_ci_proper_name }} container state
      community.docker.docker_container:
        name: "{{ woodpecker_ci_agent_container_name }}"
      register: result_agent

    - name: Check if {{ woodpecker_ci_proper_name }} containers are running
      ansible.builtin.assert:
        that:
          - result.container['State']['Status'] == "running"
          - result.container['State']['Restarting'] == false
          - result_agent.container['State']['Status'] == "running"
          - result_agent.container['State']['Restarting'] == false
