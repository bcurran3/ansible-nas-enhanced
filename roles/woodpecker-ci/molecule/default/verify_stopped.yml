---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Try and stop and remove {{ woodpecker_ci_proper_name }}
      community.docker.docker_container:
        name: "{{ woodpecker_ci_container_name }}"
        state: absent
      register: result

    - name: Try and stop and remove {{ woodpecker_ci_proper_name }}
      community.docker.docker_container:
        name: "{{ woodpecker_ci_agent_container_name }}"
        state: absent
      register: result_agent

    - name: Check if {{ woodpecker_ci_proper_name }} is stopped
      ansible.builtin.assert:
        that:
          - not result.changed
          - not result_agent.changed
