---
- name: Start {{ woodpecker_ci_proper_name }}
  block:
    - name: Prerequisite {{ woodpecker_ci_proper_name }} - Check for Gitea installation
      ansible.builtin.set_fact:
        gitea_ready: "{{ gitea_enabled is true }}"

    - name: Warn if Gitea not enabled
      ansible.builtin.debug:
        msg: "Skipping {{ woodpecker_ci_proper_name }} install. Gitea enabled and running required."
      when: not gitea_ready

    - name: Prerequisite {{ woodpecker_ci_proper_name }} - Check for Gitea Oauth2 config
      ansible.builtin.set_fact:
        oauth_ready: "{{ woodpecker_ci_gitea_client != 'notset' }}"

    - name: Warn if Gitea Oauth2 config missing
      ansible.builtin.debug:
        msg: "Skipping {{ woodpecker_ci_proper_name }} install. Missing Gitea Oauth2 config! Set woodpecker_ci_gitea_client and secret."
      when: not oauth_ready

    - name: Continue {{ woodpecker_ci_proper_name }}
      block:
        - name: Create {{ woodpecker_ci_proper_name }} Directories
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
          with_items:
            - "{{ woodpecker_ci_data_directory }}"

        - name: Set {{ woodpecker_ci_proper_name }} FQDN var overrides
          ansible.builtin.set_fact:
            woodpecker_ci_homepage_href: "https://{{ woodpecker_ci_hostname }}.{{ ansible_nas_domain }}"
          when: woodpecker_ci_traefik_enabled | bool or woodpecker_ci_dockflare_enabled | bool

        - name: Create {{ woodpecker_ci_proper_name }} Container
          community.docker.docker_container:
            container_default_behavior: "compatibility"
            name: "{{ woodpecker_ci_container_name }}"
            hostname: "{{ woodpecker_ci_container_name }}"
            image: "{{ woodpecker_ci_image_name }}:{{ woodpecker_ci_image_version }}"
            pull: true
            volumes:
              - "{{ woodpecker_ci_data_directory }}:/var/lib/woodpecker:rw"
            ports:
              - "{{ woodpecker_ci_port_http }}:8000"
              - "{{ woodpecker_ci_port_grpc }}:9000"
            env:
              WOODPECKER_ADMIN: "{{ woodpecker_ci_admin_user }}"
              WOODPECKER_OPEN: "true"
              WOODPECKER_HOST: "{{ woodpecker_ci_address }}"
              WOODPECKER_AGENT_SECRET: "{{ woodpecker_ci_agent_secret }}"
              WOODPECKER_GITEA: "true"
              WOODPECKER_GITEA_URL: "{{ woodpecker_ci_gitea_url }}"
              WOODPECKER_GITEA_CLIENT: "{{ woodpecker_ci_gitea_client }}"
              WOODPECKER_GITEA_SECRET: "{{ woodpecker_ci_gitea_secret }}"
              WOODPECKER_LOG_LEVEL: "{{ woodpecker_ci_log_level }}"
              TZ: "{{ ansible_nas_timezone }}"
            labels:
              autoheal: "{{ woodpecker_ci_autoheal_enabled | ternary('true', 'false') }}"
              com.centurylinklabs.watchtower.enable: "{{ woodpecker_ci_watchtower_enabled | ternary('true', 'false') }}"
              dockflare.enable: "{{ woodpecker_ci_dockflare_enabled | ternary('true', 'false') }}"
              dockflare.access.group: "{{ woodpecker_ci_dockflare_access_group }}"
              dockflare.hostname: "{{ woodpecker_ci_hostname }}.{{ ansible_nas_domain }}"
              dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ woodpecker_ci_port_http }}"
              homepage.name: "{{ woodpecker_ci_proper_name }}"
              homepage.group: "{{ woodpecker_ci_homepage_group }}"
              homepage.icon: "{{ woodpecker_ci_homepage_icon }}"
              homepage.href: "{{ woodpecker_ci_homepage_href }}"
              homepage.description: "{{ 'Woodpecker is a simple, yet powerful CI/CD engine with great extensibility.' if homepage_show_description else omit }}"
              homepage.server: "my-docker"
              homepage.container: "{{ woodpecker_ci_container_name }}"
              homepage.showStats: "{{ woodpecker_ci_homepage_showstats | ternary('true', 'false') }}"
              homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ woodpecker_ci_port_ui }}"
              repliqate.enabled: "{{ woodpecker_ci_repliqate_enabled | ternary('true', 'false') }}"
              repliqate.engine: "{{ woodpecker_ci_repliqate_engine }}"
              repliqate.schedule: "{{ woodpecker_ci_repliqate_schedule }}"
              repliqate.backup_id: "{{ woodpecker_ci_repliqate_backup_id }}"
              repliqate.retention: "{{ woodpecker_ci_repliqate_retention }}"
              traefik.enable: "{{ woodpecker_ci_traefik_enabled | ternary('true', 'false') }}"
              traefik.http.routers.woodpeckerci.rule: "Host(`{{ woodpecker_ci_hostname }}.{{ ansible_nas_domain }}`)"
              traefik.http.routers.woodpeckerci.tls.certresolver: "letsencrypt"
              traefik.http.routers.woodpeckerci.tls.domains[0].main: "{{ ansible_nas_domain }}"
              traefik.http.routers.woodpeckerci.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
              traefik.http.routers.woodpeckerci.middlewares: "woodpeckerci@docker{{ ',tinyauth-auth@docker' if woodpecker_ci_tinyauth_enabled | bool else '' }}"
              traefik.http.middlewares.woodpeckerci.IPAllowList.sourcerange: "{{ woodpecker_ci_traefik_whitelist }}"
              traefik.http.services.woodpecker_ci.loadbalancer.server.port: "8000"
              wud.tag.include: '^v\d+\.\d+\.\d+$'
              wud.tag.transform.type: "semver"
              wud.link.template: "https://hub.docker.com/r/woodpeckerci/woodpecker-server"
            cpu_shares: "{{ woodpecker_ci_cpu_shares }}"
            memory: "{{ woodpecker_ci_memory }}"
            memory_swap: "{{ woodpecker_ci_memory_swap }}"
            restart_policy: unless-stopped

        - name: Access {{ woodpecker_ci_proper_name }} at
          ansible.builtin.debug:
            msg: >-
                  {{
                    ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (woodpecker_ci_port_http | string)] +
                    (['https://' + woodpecker_ci_hostname + '.' + ansible_nas_domain] if (woodpecker_ci_traefik_enabled is true or woodpecker_ci_dockflare_enabled is true) else [])
                  }}

        - name: Create {{ woodpecker_ci_proper_name }} Agent Container
          community.docker.docker_container:
            container_default_behavior: "compatibility"
            name: "{{ woodpecker_ci_agent_container_name }}"
            image: "{{ woodpecker_ci_agent_image_name }}:{{ woodpecker_ci_agent_image_version }}"
            pull: true
            volumes:
              - "/var/run/docker.sock:/var/run/docker.sock:rw"
            env:
              WOODPECKER_SERVER: "{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ woodpecker_ci_port_grpc }}"
              WOODPECKER_AGENT_SECRET: "{{ woodpecker_ci_agent_secret }}"
              WOODPECKER_LOG_LEVEL: "{{ woodpecker_ci_log_level }}"
            labels:
              autoheal: "{{ woodpecker_ci_agent_autoheal_enabled | ternary('true', 'false') }}"
              com.centurylinklabs.watchtower.enable: "{{ woodpecker_ci_agent_watchtower_enabled | ternary('true', 'false') }}"
              dockflare.enable: "false"
              traefik.enable: false
              wud.tag.include: '^v\d+\.\d+\.\d+$'
              wud.tag.transform.type: "semver"
              wud.link.template: "https://hub.docker.com/r/woodpeckerci/woodpecker-agent"
            cpu_shares: "{{ woodpecker_ci_agent_cpu_shares }}"
            memory: "{{ woodpecker_ci_agent_memory }}"
            memory_swap: "{{ woodpecker_ci_agent_memory_swap }}"
            restart_policy: unless-stopped

        - name: Add webhook allowed hosts to Gitea
          ansible.builtin.blockinfile:
            path: "{{ gitea_data_directory }}/gitea/gitea/conf/app.ini"
            block: |
              [webhook]
              ALLOWED_HOST_LIST=private
              SKIP_TLS_VERIFY=true
          notify: restart
          tags: molecule-notest
      when: 
          - gitea_ready
          - oauth_ready
  when: woodpecker_ci_enabled is true

- name: Stop {{ woodpecker_ci_proper_name }}
  block:
    - name: Stop {{ woodpecker_ci_proper_name }} Agent Container
      community.docker.docker_container:
        name: "{{ woodpecker_ci_agent_container_name }}"
        state: absent

    - name: Stop {{ woodpecker_ci_proper_name }} Container
      community.docker.docker_container:
        name: "{{ woodpecker_ci_container_name }}"
        state: absent
  when: woodpecker_ci_enabled is false

- name: Data Archive {{ woodpecker_ci_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ woodpecker_ci_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - woodpecker_ci_enabled is false