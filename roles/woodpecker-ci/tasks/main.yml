---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Check for Gitea installation
      ansible.builtin.fail:
        msg: "{{ ansible_nas_app_name }} requires Gitea enabled and running for authentication, please set that up first."
      when: gitea_enabled is false

    - name: Check for Gitea config
      ansible.builtin.fail:
        msg: "Missing Gitea Oauth2 config! Read https://woodpecker-ci.org/docs/administration/forges/gitea and set woodpecker_ci_gitea_client and woodpecker_ci_gitea_secret."
      when: woodpecker_ci_gitea_client == "notset"

    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ woodpecker_ci_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ woodpecker_ci_container_name }}"
        hostname: "{{ woodpecker_ci_container_name }}"
        image: "{{ woodpecker_ci_image_name }}:{{ woodpecker_ci_image_version }}"
        pull: true
        volumes:
          - "{{ woodpecker_ci_data_directory }}:/var/lib/woodpecker:rw"
        ports:
          - "{{ woodpecker_ci_port_http }}:8000"
          - "{{ woodpecker_ci_port_grpc }}:9000"
        env:
          WOODPECKER_ADMIN: "{{ woodpecker_ci_admin_user }}"
          WOODPECKER_OPEN: "true"
          WOODPECKER_HOST: "{{ woodpecker_ci_address }}"
          WOODPECKER_AGENT_SECRET: "{{ woodpecker_ci_agent_secret }}"
          WOODPECKER_GITEA: "true"
          WOODPECKER_GITEA_URL: "{{ woodpecker_ci_gitea_url }}"
          WOODPECKER_GITEA_CLIENT: "{{ woodpecker_ci_gitea_client }}"
          WOODPECKER_GITEA_SECRET: "{{ woodpecker_ci_gitea_secret }}"
          WOODPECKER_LOG_LEVEL: "{{ woodpecker_ci_log_level }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ woodpecker_ci_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ woodpecker_ci_watchtower_enable }}"
          dockflare.enable: "{{ woodpecker_ci_dockflare_tunnel }}"
          dockflare.access.group: "{{ woodpecker_ci_dockflare_access_group }}"
          dockflare.hostname: "{{ woodpecker_ci_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ woodpecker_ci_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ woodpecker_ci_homepage_group }}"
          homepage.icon: "{{ woodpecker_ci_homepage_icon }}"
          homepage.href: "{{ woodpecker_ci_homepage_href }}"
          homepage.description: "{{ 'Woodpecker is a simple, yet powerful CI/CD engine with great extensibility.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ woodpecker_ci_container_name }}"
          homepage.showStats: "{{ woodpecker_ci_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ woodpecker_ci_port_ui }}"
          traefik.enable: "{{ woodpecker_ci_available_externally | string }}"
          traefik.http.routers.woodpecker_ci.rule: "Host(`{{ woodpecker_ci_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.woodpecker_ci.tls.certresolver: "letsencrypt"
          traefik.http.routers.woodpecker_ci.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.woodpecker_ci.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ woodpecker_ci_hostname }}"
          traefik.http.routers.woodpecker_ci.middlewares: "{{ woodpecker_ci_hostname }}@docker"
          traefik.http.middlewares.woodpecker_ci.IPAllowList.sourcerange: "{{ woodpecker_ci_traefik_whitelist }}"
          traefik.http.services.woodpecker_ci.loadbalancer.server.port: "8000"
          wud.tag.include: '^v\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/woodpeckerci/woodpecker-server"
        cpu_shares: "{{ woodpecker_ci_cpu_shares }}"
        memory: "{{ woodpecker_ci_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (woodpecker_ci_port_http | string)] +
                (['https://' + woodpecker_ci_hostname + '.' + ansible_nas_domain] if (woodpecker_ci_available_externally is true or woodpecker_ci_dockflare_tunnel is true) else [])
              }}

    - name: Create {{ ansible_nas_app_name }} Agent Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ woodpecker_ci_agent_container_name }}"
        image: "{{ woodpecker_ci_agent_image_name }}:{{ woodpecker_ci_agent_image_version }}"
        pull: true
        volumes:
          - "/var/run/docker.sock:/var/run/docker.sock:rw"
        env:
          WOODPECKER_SERVER: "{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ woodpecker_ci_port_grpc }}"
          WOODPECKER_AGENT_SECRET: "{{ woodpecker_ci_agent_secret }}"
          WOODPECKER_LOG_LEVEL: "{{ woodpecker_ci_log_level }}"
        labels:
          autoheal: "{{ woodpecker_ci_agent_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ woodpecker_ci_agent_watchtower_enable }}"
          dockflare.enable: "false"
          traefik.enable: false
          wud.tag.include: '^v\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/woodpeckerci/woodpecker-agent"
        cpu_shares: "{{ woodpecker_ci_agent_cpu_shares }}"
        memory: "{{ woodpecker_ci_agent_memory }}"
        restart_policy: unless-stopped

    - name: Add webhook allowed hosts to Gitea
      ansible.builtin.blockinfile:
        path: "{{ gitea_data_directory }}/gitea/gitea/conf/app.ini"
        block: |
          [webhook]
          ALLOWED_HOST_LIST=private
          SKIP_TLS_VERIFY=true
      notify: restart
      tags: molecule-notest
  when: woodpecker_ci_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Agent Container
      community.docker.docker_container:
        name: "{{ woodpecker_ci_agent_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ woodpecker_ci_container_name }}"
        state: absent
  when: woodpecker_ci_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ woodpecker_ci_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ woodpecker_ci_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: woodpecker_ci_enabled is false and archive_app_data_enabled is true
