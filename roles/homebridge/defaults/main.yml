---
ansible_nas_app_name: "Homebridge"

# enable or disable the application
homebridge_enabled: false
homebridge_available_externally: false
homebridge_traefik_whitelist: "{{ lan }}"

# directories
homebridge_config_directory: "{{ docker_home }}/homebridge/config"

# uid / gid
homebridge_user_id: "0"
homebridge_group_id: "0"

# network
homebridge_hostname: "homebridge"
homebridge_port: "8087"

# docker
homebridge_container_name: "homebridge"
homebridge_image_name: "oznu/homebridge"
homebridge_image_version: "latest"
homebridge_cpu_shares: 1024

# specs
homebridge_memory: "1g"

# autoheal
homebridge_autoheal: "false"

# watchtower
homebridge_watchtower_monitor_only: "true"