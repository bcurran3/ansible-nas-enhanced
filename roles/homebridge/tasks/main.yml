---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        # mode: 0755
      with_items:
        - "{{ homebridge_data_directory }}"
        - "{{ homebridge_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ homebridge_container_name }}"
        hostname: "{{ homebridge_container_name }}"
        image: "{{ homebridge_image_name }}:{{ homebridge_image_version }}"
        pull: true
        volumes:
          - "{{ homebridge_data_directory }}/config:/homebridge"
        network_mode: "host"
        env:
          TZ: "{{ ansible_nas_timezone }}"
          PGID: "{{ homebridge_group_id }}"
          PUID: "{{ homebridge_user_id }}"
          HOMEBRIDGE_CONFIG_UI: "1"
          HOMEBRIDGE_CONFIG_UI_PORT: "{{ homebridge_port }}"
        labels:
          autoheal: "{{ homebridge_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ homebridge_watchtower_monitor_only }}"
          dockflare.enable: "{{ homebridge_dockflare_tunnel }}"
          dockflare.access.group: "{{ homebridge_dockflare_access_group }}"
          dockflare.hostname: "{{ homebridge_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ homebridge_port }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ homebridge_homepage_group }}"
          homepage.icon: "{{ homebridge_homepage_icon }}"
          homepage.href: "{{ homebridge_homepage_href }}"
          homepage.description: "{{ 'homebridge description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ homebridge_container_name }}"
          homepage.showStats: "{{ homebridge_homepage_showStats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ homebridge_port }}"
          traefik.enable: "{{ homebridge_available_externally | string }}"
          traefik.http.routers.homebridge.rule: "Host(`{{ homebridge_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.homebridge.tls.certresolver: "letsencrypt"
          traefik.http.routers.homebridge.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.homebridge.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ homebridge_hostname }}"
          traefik.http.routers.homebridge.middlewares: "{{ homebridge_hostname }}@docker"
          traefik.http.middlewares.homebridge.IPAllowList.sourcerange: "{{ homebridge_traefik_whitelist }}"
          traefik.http.services.homebridge.loadbalancer.server.port: "8087"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/oznu/homebridge"
        cpu_shares: "{{ homebridge_cpu_shares }}"
        restart_policy: unless-stopped
        memory: "{{ homebridge_memory }}"
  when: homebridge_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ homebridge_container_name }}"
        state: absent
  when: homebridge_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ homebridge_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ homebridge_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: homebridge_enabled is false and archive_app_data_enabled is true
