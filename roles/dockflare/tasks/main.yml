---
# https://github.com/ChrispyBacon-dev/DockFlare/blob/stable/docker-compose.yml

- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ dockflare_data_directory }}"
        - "{{ dockflare_data_directory }}/redis"

    - name: Create {{ ansible_nas_app_name }} Directories Part Deux
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "65532"
        group: "65532"
      with_items:
        - "{{ dockflare_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }} Docker Socket Proxy Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ dockflare_proxy_container_name }}"
        hostname: "{{ dockflare_proxy_container_name }}"
        image: "{{ dockflare_proxy_image_name }}:{{ dockflare_proxy_image_tag }}"
        pull: true
        volumes:
          - "/var/run/docker.sock:/var/run/docker.sock"
        env:
          DOCKER_HOST: "unix:///var/run/docker.sock"
          CONTAINERS: "1"
          EVENTS: "1"
          NETWORKS: "1"
          IMAGES: "1"
          POST: "1"
          PING: "1"
          INFO: "1"
          EXEC: "1"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ dockflare_proxy_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ dockflare_proxy_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} Docker Socket Proxy"
          homepage.group: "{{ dockflare_proxy_homepage_group }}"
          homepage.icon: "{{ dockflare_proxy_homepage_icon }}"
          homepage.href: "{{ dockflare_homepage_href }}"
          homepage.description: "{{ 'Proxy over your Docker socket to restrict which requests it accepts' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ dockflare_proxy_container_name }}"
          homepage.showStats: "{{ dockflare_proxy_homepage_showstats }}"
          repliqate.enabled: "false"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/tecnativa/docker-socket-proxy/pkgs/container/docker-socket-proxy"
        cpu_shares: "{{ dockflare_proxy_cpu_shares }}"
        memory: "{{ dockflare_proxy_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Redis Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ dockflare_redis_container_name }}"
        hostname: "{{ dockflare_redis_container_name }}"
        image: "{{ dockflare_redis_image_name }}:{{ dockflare_redis_image_tag }}"
        pull: true
        volumes:
          - "{{ dockflare_data_directory }}/redis:/data"
        command: "redis-server --save --appendonly no"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ dockflare_redis_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ dockflare_redis_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} Redis"
          homepage.group: "{{ dockflare_redis_homepage_group }}"
          homepage.icon: "{{ dockflare_redis_homepage_icon }}"
          homepage.href: "{{ dockflare_homepage_href }}"
          homepage.description: "{{ 'The Real-time Data Platform' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ dockflare_redis_container_name }}"
          homepage.showStats: "{{ dockflare_redis_homepage_showstats }}"
          repliqate.enabled: "{{ dockflare_redis_repliqate_enabled }}"
          repliqate.engine: "{{ dockflare_redis_repliqate_engine }}"
          repliqate.schedule: "{{ dockflare_redis_repliqate_schedule }}"
          repliqate.backup_id: "{{ dockflare_redis_repliqate_backup_id }}"
          repliqate.retention: "{{ dockflare_redis_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/redis"
        cpu_shares: "{{ dockflare_redis_cpu_shares }}"
        memory: "{{ dockflare_redis_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ dockflare_container_name }}"
        hostname: "{{ dockflare_container_name }}"
        image: "{{ dockflare_image_name }}:{{ dockflare_image_tag }}"
        pull: true
        volumes:
          - "{{ dockflare_data_directory }}/data:/app/data"
        ports:
          - "{{ dockflare_port_http }}:5000"
        env:
          REDIS_URL: "redis://{{ dockflare_redis_container_name }}:6379/0"
          REDIS_DB_INDEX: "0"  # Optional: specify Redis database index (0-15) for isolation from other containers
          DOCKER_HOST: "tcp://{{ dockflare_proxy_container_name }}:2375"
          STATE_FILE_PATH: "/app/data/state.json"
          USE_EXTERNAL_CLOUDFLARED: "{{ dockflare_env_use_external_cloudflared }}"
          EXTERNAL_TUNNEL_ID: "{{ dockflare_env_external_tunnel_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        links:
          - "{{ dockflare_proxy_container_name }}"
          - "{{ dockflare_redis_container_name }}"
        labels:
          autoheal: "{{ dockflare_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ dockflare_watchtower_enable }}"
          dockflare.enable: "{{ dockflare_dockflare_tunnel }}"
          dockflare.access.group: "{{ dockflare_dockflare_access_group }}"
          dockflare.hostname: "{{ dockflare_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ dockflare_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ dockflare_homepage_group }}"
          homepage.icon: "{{ dockflare_homepage_icon }}"
          homepage.href: "{{ dockflare_homepage_href }}"
          homepage.description: "{{ 'Automate Cloudflare Tunnels with Docker Labels' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ dockflare_container_name }}"
          homepage.showStats: "{{ dockflare_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ dockflare_port_http }}"
          repliqate.enabled: "{{ dockflare_repliqate_enabled }}"
          repliqate.engine: "{{ dockflare_repliqate_engine }}"
          repliqate.schedule: "{{ dockflare_repliqate_schedule }}"
          repliqate.backup_id: "{{ dockflare_repliqate_backup_id }}"
          repliqate.retention: "{{ dockflare_repliqate_retention }}"
          traefik.enable: "{{ dockflare_available_externally | string }}"
          traefik.http.routers.dockflare.rule: "Host(`{{ dockflare_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.dockflare.tls.certresolver: "letsencrypt"
          traefik.http.routers.dockflare.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.dockflare.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ dockflare_hostname }}"
          traefik.http.routers.dockflare.middlewares: "{{ dockflare_hostname }}@docker"
          traefik.http.middlewares.dockflare.IPAllowList.sourcerange: "{{ dockflare_traefik_whitelist }}"
          traefik.http.services.dockflare.loadbalancer.server.port: "5000"
          wud.tag.include: '^v\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/alplat/dockflare"
        cpu_shares: "{{ dockflare_cpu_shares }}"
        memory: "{{ dockflare_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (dockflare_port_http | string)] +
                (['https://' + dockflare_hostname + '.' + ansible_nas_domain] if (dockflare_available_externally is true or dockflare_dockflare_tunnel is true) else [])
              }}
  when: dockflare_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ dockflare_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} Proxy Container
      community.docker.docker_container:
        name: "{{ dockflare_proxy_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} Redis Container
      community.docker.docker_container:
        name: "{{ dockflare_redis_container_name }}"
        state: absent
  when: dockflare_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ dockflare_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - dockflare_enabled is false