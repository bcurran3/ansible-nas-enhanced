---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Try and stop and remove {{ ansible_nas_app_name }}
      community.docker.docker_container:
        name: "{{ dockflare_container_name }}"
        state: absent
      register: result

    - name: Try and stop and remove {{ ansible_nas_app_name }} Proxy
      community.docker.docker_container:
        name: "{{ dockflare_proxy_container_name }}"
        state: absent
      register: result_proxy

    - name: Try and stop and remove {{ ansible_nas_app_name }} Redis
      community.docker.docker_container:
        name: "{{ dockflare_redis_container_name }}"
        state: absent
      register: result_redis

    - name: Check if {{ ansible_nas_app_name }} is stopped
      ansible.builtin.assert:
        that:
          - not result.changed
          - not result_proxy.changed
          - not result_redis.changed
