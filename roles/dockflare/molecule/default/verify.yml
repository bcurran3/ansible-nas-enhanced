---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Get {{ dockflare_proper_name }} container state
      community.docker.docker_container:
        name: "{{ dockflare_container_name }}"
      register: result

    - name: Get {{ dockflare_proper_name }} Proxy container state
      community.docker.docker_container:
        name: "{{ dockflare_proxy_container_name }}"
      register: result_proxy

    - name: Get {{ dockflare_proper_name }} Redis container state
      community.docker.docker_container:
        name: "{{ dockflare_redis_container_name }}"
      register: result_redis

    - name: Check if {{ dockflare_proper_name }} container is running
      ansible.builtin.assert:
        that:
          - result.container['State']['Status'] == "running"
          - result.container['State']['Restarting'] == false
          - result_proxy.container['State']['Status'] == "running"
          - result_proxy.container['State']['Restarting'] == false
          - result_redis.container['State']['Status'] == "running"
          - result_redis.container['State']['Restarting'] == false