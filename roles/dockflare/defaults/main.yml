---
# ANE
ansible_nas_app_name: "DockFlare"
dockflare_enabled: false
dockflare_available_externally: false
dockflare_traefik_whitelist: "{{ lan }}"

# directories
dockflare_data_directory: "{{ docker_home }}/dockflare"

# docker
dockflare_container_name: "dockflare"
dockflare_image_name: "alplat/dockflare"
dockflare_image_tag: "stable"

# network
dockflare_port: "5002"
dockflare_hostname: "dockflare"

# specs
dockflare_cpu_shares: 1024
dockflare_memory: 512MB

# app
dockflare_env_use_external_cloudflared: "false"
dockflare_env_external_tunnel_id: "your_tunnel_id"

# autoheal
dockflare_autoheal: "false"

# dockflare
dockflare_dockflare_tunnel: "false"
dockflare_dockflare_access_group: ""

# homepage
dockflare_homepage_group: "Network"
dockflare_homepage_icon: "https://raw.githubusercontent.com/ChrispyBacon-dev/DockFlare/refs/heads/stable/images/bannertr.png"
dockflare_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ dockflare_port }}"
dockflare_homepage_showstats: "false"

# watchtower
dockflare_watchtower_enable: "false"
