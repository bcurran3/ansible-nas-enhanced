---
# ANE
dockflare_proper_name: "DockFlare"
dockflare_enabled: false
dockflare_traefik_enabled: false
dockflare_traefik_whitelist: "{{ lan }}"

# directories
dockflare_data_directory: "{{ docker_home }}/dockflare"

# uid / gid
dockflare_user_id: "65532"
dockflare_group_id: "65532"

# docker
dockflare_container_name: "dockflare"
dockflare_image_name: "alplat/dockflare"
dockflare_image_tag: "stable"
dockflare_proxy_container_name: "dockflare-proxy"
dockflare_proxy_image_name: "ghcr.io/tecnativa/docker-socket-proxy"
dockflare_proxy_image_tag: "latest"
dockflare_redis_container_name: "dockflare-redis"
dockflare_redis_image_name: "redis"
dockflare_redis_image_tag: "8-alpine"

# network
dockflare_port_http: "5003"
dockflare_hostname: "dockflare"

# specs
dockflare_cpu_shares: 1024
dockflare_memory: "512M"
dockflare_memory_swap: -1
dockflare_proxy_cpu_shares: 1024
dockflare_proxy_memory: "64M"
dockflare_proxy_memory_swap: -1
dockflare_redis_cpu_shares: 1024
dockflare_redis_memory: "128M"
dockflare_redis_memory_swap: "{{ dockflare_redis_memory }}"

# app
dockflare_env_use_external_cloudflared: "false"
dockflare_env_external_tunnel_id: "" # input your tunnel id

# autoheal
dockflare_autoheal_enabled: false
dockflare_proxy_autoheal_enabled: false
dockflare_redis_autoheal_enabled: false

# dockflare
dockflare_dockflare_enabled: false
dockflare_dockflare_access_group: ""

# healthcheck
dockflare_healthcheck_test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:5000/ || exit 1"]
dockflare_healthcheck_interval: 30s
dockflare_healthcheck_timeout: 10s
dockflare_healthcheck_retries: 3
dockflare_healthcheck_start_period: 30s
dockflare_proxy_healthcheck_test: ["CMD-SHELL", "pgrep -x haproxy > /dev/null || exit 1"]
dockflare_proxy_healthcheck_interval: 10s
dockflare_proxy_healthcheck_timeout: 5s
dockflare_proxy_retries: 3
dockflare_redis_healthcheck_test: ["CMD", "redis-cli", "ping"]
dockflare_redis_healthcheck_interval: 10s
dockflare_redis_healthcheck_timeout: 5s
dockflare_redis_retries: 3

# homepage
dockflare_homepage_group: "Network"
dockflare_homepage_icon: "https://raw.githubusercontent.com/ChrispyBacon-dev/DockFlare/refs/heads/stable/images/bannertr.png"
dockflare_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ dockflare_port_http }}"
dockflare_homepage_showstats: false
dockflare_proxy_homepage_group: "Misc"
dockflare_proxy_homepage_icon: "https://raw.githubusercontent.com/ChrispyBacon-dev/DockFlare/refs/heads/stable/images/bannertr.png"
dockflare_proxy_homepage_href: "{{ dockflare_homepage_href }}"
dockflare_proxy_homepage_showstats: false
dockflare_redis_homepage_group: "DBs"
dockflare_redis_homepage_icon: "redis.png"
dockflare_redis_homepage_href: "{{ dockflare_homepage_href }}"
dockflare_redis_homepage_showstats: false

# repliqate
dockflare_repliqate_enabled: false
dockflare_repliqate_engine: "restic"
dockflare_repliqate_schedule: "@daily 3am"
dockflare_repliqate_backup_id: "{{ dockflare_container_name }}"
dockflare_repliqate_retention: "30d"
dockflare_redis_repliqate_enabled: false
dockflare_redis_repliqate_engine: "restic"
dockflare_redis_repliqate_schedule: "@daily 3am"
dockflare_redis_repliqate_backup_id: "{{ dockflare_redis_container_name }}"
dockflare_redis_repliqate_retention: "30d"

# tinyauth
dockflare_tinyauth_enabled: false

# watchtower
dockflare_watchtower_enabled: false
dockflare_proxy_watchtower_enabled: false
dockflare_redis_watchtower_enabled: false
