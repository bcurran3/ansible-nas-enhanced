---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create Minecraft Server Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ minecraft_server_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ minecraft_server_container_name }}"
        image: "{{ minecraft_server_image_name }}:{{ minecraft_server_image_version }}"
        pull: true
        cpu_shares: "{{ minecraft_server_cpu_shares }}"
        volumes:
          - "{{ minecraft_server_data_directory }}:/data:rw"
        ports:
          - "{{ minecraft_server_port }}:25565"
        env:
          EULA: "TRUE"
        restart_policy: unless-stopped
        labels:
          autoheal: "{{ minecraft_server_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ minecraft_server_watchtower_monitor_only }}"
  when: minecraft_server_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ minecraft_server_container_name }}"
        state: absent
  when: minecraft_server_enabled is false
