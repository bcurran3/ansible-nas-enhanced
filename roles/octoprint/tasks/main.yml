---
- name: Start {{ octoprint_proper_name }}
  block:
    - name: Create {{ octoprint_proper_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ octoprint_data_directory }}"

    - name: Set {{ octoprint_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        octoprint_homepage_href: "https://{{ octoprint_hostname }}.{{ ansible_nas_domain }}"
      when: octoprint_traefik_enabled | bool or octoprint_dockflare_enabled | bool

    - name: Create {{ octoprint_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ octoprint_container_name }}"
        hostname: "{{ octoprint_container_name }}"
        image: "{{ octoprint_image_name }}:{{ octoprint_image_version }}"
        pull: true
        volumes:
          - "{{ octoprint_data_directory }}:/octoprint:rw"
        ports:
          - "{{ octoprint_port_http }}:80"
        devices:
          - "{{ octoprint_enable_printer | ternary(octoprint_printer_mountpoint, '/dev/null') }}"
          - "{{ octoprint_enable_webcam | ternary(octoprint_webcam_mountpoint, '/dev/null') }}"
        env:
          ENABLE_MJPG_STREAMER: "{{ octoprint_enable_webcam | string }}"
          MJPG_STREAMER_INPUT: "-n -r 1080x1024 -f 30"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ octoprint_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ octoprint_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ octoprint_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ octoprint_dockflare_access_group }}"
          dockflare.hostname: "{{ octoprint_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ octoprint_port_http }}"
          homepage.name: "{{ octoprint_proper_name }}"
          homepage.group: "{{ octoprint_homepage_group }}"
          homepage.icon: "{{ octoprint_homepage_icon }}"
          homepage.href: "{{ octoprint_homepage_href }}"
          homepage.description: "{{ 'octoprint description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ octoprint_container_name }}"
          homepage.showStats: "{{ octoprint_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ octoprint_port_http }}"
          homepage.widget.type: "octoprint"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ octoprint_port_http }}"
          homepage.widget.key: "{{ octoprint_homepage_widget_key }}"
          traefik.enable: "{{ octoprint_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.octoprint.rule: "Host(`{{ octoprint_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.octoprint.tls.certresolver: "letsencrypt"
          traefik.http.routers.octoprint.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.octoprint.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.octoprint.middlewares: "octoprint@docker{{ ',tinyauth-auth@docker' if octoprint_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.octoprint.IPAllowList.sourcerange: "{{ octoprint_traefik_whitelist }}"
          traefik.http.services.octoprint.loadbalancer.server.port: "80"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/octoprint/octoprint"
        cpu_shares: "{{ octoprint_cpu_shares }}"
        memory: "{{ octoprint_memory }}"
        memory_swap: "{{ octoprint_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ octoprint_proper_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (octoprint_port_http | string)] +
                (['https://' + octoprint_hostname + '.' + ansible_nas_domain] if (octoprint_traefik_enabled is true or octoprint_dockflare_enabled is true) else [])
              }}
  when: octoprint_enabled is true

- name: Stop {{ octoprint_proper_name }}
  block:
    - name: Stop {{ octoprint_proper_name }} Container
      community.docker.docker_container:
        name: "{{ octoprint_container_name }}"
        state: absent
  when: octoprint_enabled is false

- name: Data Archive {{ octoprint_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ octoprint_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - octoprint_enabled is false