---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ octoprint_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ octoprint_container_name }}"
        hostname: "{{ octoprint_container_name }}"
        image: "{{ octoprint_image_name }}:{{ octoprint_image_version }}"
        pull: true
        cpu_shares: "{{ octoprint_cpu_shares }}"
        volumes:
          - "{{ octoprint_data_directory }}:/octoprint:rw"
        ports:
          - "{{ octoprint_port }}:80"
        devices:
          - "{{ octoprint_printer_mountpoint }}"
          - "{{ octoprint_enable_webcam | ternary(octoprint_webcam_mountpoint, '/dev/null') }}"
        restart_policy: unless-stopped
        memory: "{{ octoprint_memory }}"
        env:
          TZ: "{{ ansible_nas_timezone }}"
          MJPG_STREAMER_INPUT: "-n -r 1080x1024 -f 30"
          ENABLE_MJPG_STREAMER: "{{ octoprint_enable_webcam | string }}"
        labels:
          autoheal: "{{ octoprint_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ octoprint_watchtower_monitor_only }}"
          traefik.enable: "{{ octoprint_available_externally | string }}"
          traefik.http.routers.octoprint.rule: "Host(`{{ octoprint_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.octoprint.tls.certresolver: "letsencrypt"
          traefik.http.routers.octoprint.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.octoprint.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.services.octoprint.loadbalancer.server.port: "80"
  when: octoprint_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ octoprint_container_name }}"
        state: absent
  when: octoprint_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ octoprint_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ octoprint_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: octoprint_enabled is false and archive_app_data_enabled is true
