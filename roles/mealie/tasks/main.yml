---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ mealie_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ mealie_container_name }}"
        hostname: "{{ mealie_container_name }}"
        image: "{{ mealie_image_name }}:{{ mealie_image_version }}"
        pull: true
        volumes:
          - "{{ mealie_data_directory }}:/app/data:rw"
        ports:
          - "{{ mealie_port }}:9000"
        env:
          BASE_URL: "{{ mealie_env_base_url }}"
          PUID: "{{ mealie_user_id }}"
          PGID: "{{ mealie_group_id }}"
          RECIPE_PUBLIC: "{{ mealie_env_recipe_public }}"
          RECIPE_SHOW_NUTRITION: "{{ mealie_env_recipe_show_nutrition }}"
          RECIPE_SHOW_ASSETS: "{{ mealie_env_recipe_show_assets }}"
          RECIPE_LANDSCAPE_VIEW: "{{ mealie_env_receipe_landscape_view }}"
          RECIPE_DISABLE_COMMENTS: "{{ mealie_env_recipe_disable_comments }}"
          RECIPE_DISABLE_AMOUNT: "{{ mealie_env_recipe_disable_amount }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ mealie_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ mealie_watchtower_enable }}"
          dockflare.enable: "{{ mealie_dockflare_tunnel }}"
          dockflare.access.group: "{{ mealie_dockflare_access_group }}"
          dockflare.hostname: "{{ mealie_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ mealie_port }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ mealie_homepage_group }}"
          homepage.icon: "{{ mealie_homepage_icon }}"
          homepage.href: "{{ mealie_homepage_href }}"
          homepage.description: "{{ 'mealie description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ mealie_container_name }}"
          homepage.showStats: "{{ mealie_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ mealie_port }}"
          traefik.enable: "{{ mealie_available_externally | string }}"
          traefik.http.routers.mealie.rule: "Host(`{{ mealie_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.mealie.tls.certresolver: "letsencrypt"
          traefik.http.routers.mealie.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.mealie.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ mealie_hostname }}"
          traefik.http.routers.mealie.middlewares: "{{ mealie_hostname }}@docker"
          traefik.http.middlewares.mealie.IPAllowList.sourcerange: "{{ mealie_traefik_whitelist }}"
          traefik.http.services.mealie.loadbalancer.server.port: "9000"
          wud.tag.include: '^v?\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/hkotel/mealie"
        cpu_shares: "{{ mealie_cpu_shares }}"
        memory: "{{ mealie_memory }}"
        restart_policy: unless-stopped
  when: mealie_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ mealie_container_name }}"
        state: absent
  when: mealie_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ mealie_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ mealie_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: mealie_enabled is false and archive_app_data_enabled is true
