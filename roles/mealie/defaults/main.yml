---
# ANE
ansible_nas_app_name: "Mealie"
mealie_enabled: false
mealie_available_externally: false
mealie_traefik_whitelist: "{{ lan }}"

# directories
mealie_data_directory: "{{ docker_home }}/mealie"

# uid / gid
mealie_user_id: 1000
mealie_group_id: 1000

# network
mealie_hostname: "mealie"
mealie_port_http: "9925"

# docker
mealie_container_name: "mealie"
mealie_image_name: "ghcr.io/mealie-recipes/mealie"
mealie_image_version: "latest"

# specs
mealie_cpu_shares: 1024
mealie_memory: "1G"

# app
mealie_env_base_url: "http://localhost:8080"
mealie_env_recipe_public: "true"
mealie_env_recipe_show_nutrition: "true"
mealie_env_recipe_show_assets: "true"
mealie_env_receipe_landscape_view: "true"
mealie_env_recipe_disable_comments: false
mealie_env_recipe_disable_amount: false

# autoheal
mealie_autoheal: "false"

# dockflare
mealie_dockflare_tunnel: "false"
mealie_dockflare_access_group: ""

# homepage
mealie_homepage_group: "Apps"
mealie_homepage_icon: "mealie.png"
mealie_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ mealie_port_http }}"
mealie_homepage_showstats: "false"

# repliqate
mealie_repliqate_enabled: "false"
mealie_repliqate_engine: "restic"
mealie_repliqate_schedule: "@daily 3am"
mealie_repliqate_backup_id: "{{ mealie_container_name }}"
mealie_repliqate_retention: "30d"

# watchtower
mealie_watchtower_enable: "false"