---
ansible_nas_app_name: "Mealie"

mealie_enabled: false
mealie_available_externally: false
mealie_traefik_whitelist: "{{ lan }}"

# directories
mealie_data_directory: "{{ docker_home }}/mealie"

# uid / gid
mealie_user_id: "1000"
mealie_group_id: "1000"

# network
mealie_hostname: "mealie"
mealie_port: "9925"

# docker
mealie_container_name: "mealie"
mealie_image_name: "hkotel/mealie"
mealie_image_version: "latest"
mealie_cpu_shares: 1024

# specs
mealie_memory: 1g

# autoheal
mealie_autoheal: "false"

# homepage
mealie_homepage_group: "Apps"
mealie_homepage_icon: "mealie.png"
mealie_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ mealie_port }}"
mealie_homepage_showStats: "false"

# watchtower
mealie_watchtower_monitor_only: "true"