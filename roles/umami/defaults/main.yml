---
ansible_nas_app_name: "Umami"

#
umami_enabled: false
umami_available_externally: false
umami_traefik_whitelist: "{{ lan }}"

# network
umami_port_http: "3019"
umami_hostname: "umami"
umami_data_directory: "{{ docker_home }}/umami"

# docker
umami_container_name: "umami"
umami_image_name: "ghcr.io/umami-software/umami"
umami_image_tag: "postgresql-latest"
umami_cpu_shares: "1024"
umami_memory: "1g"
umami_db_container_name: "umami-db"
umami_db_image_name: "postgres"
umami_db_image_tag: "16-alpine"
umami_db_cpu_shares: "1024"
umami_db_memory: "1g"

# app
umami_app_secret: "topsecret"

# autoheal
umami_autoheal: "false"
umami_db_autoheal: "false"

# dockflare
umami_dockflare_tunnel: "false"
umami_dockflare_access_group: ""

# homepage
umami_homepage_group: "Apps"
umami_homepage_icon: "umami.png"
umami_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ umami_port_http }}"
umami_homepage_showStats: "false"
umami_db_homepage_group: "DBs"
umami_db_homepage_icon: "postgres.png"
umami_db_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ umami_port_http }}"
umami_db_homepage_showStats: "false"

# watchtower
umami_watchtower_monitor_only: "true"
umami_db_watchtower_monitor_only: "true"