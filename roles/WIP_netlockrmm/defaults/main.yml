---
# ANE
ansible_nas_app_name: "appname"
netlockrmm_enabled: false
netlockrmm_available_externally: false
netlockrmm_traefik_whitelist: "{{ lan }}"

# directories
netlockrmm_data_directory: "{{ docker_home }}/appname"

# docker
netlockrmm_container_name: "appname"
netlockrmm_image_name: "appdev/appname" # use ghcr.io or lscr.io when available
netlockrmm_image_tag: "latest"

# uid / gid
netlockrmm_user_id: "0"
netlockrmm_group_id: "0"

# network
netlockrmm_port_http: "8989"
netlockrmm_hostname: "appname"

# specs
netlockrmm_cpu_shares: 1024
netlockrmm_memory: "1G"

# autoheal
netlockrmm_autoheal: "false"

# dockflare
netlockrmm_dockflare_tunnel: false
netlockrmm_dockflare_access_group: ""

# homepage
netlockrmm_homepage_group: "Apps"
netlockrmm_homepage_icon: "appname.png"
netlockrmm_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ netlockrmm_port_http }}"
netlockrmm_homepage_showstats: "false"

# linuxserver.io docker mods for linuxserver.io images
#netlockrmm_env_docker_mods: ""
#netlockrmm_env_docker_mods_install_packages: ""
#netlockrmm_env_docker_mods_install_pip_packages: ""

# repliqate
netlockrmm_repliqate_enabled: false
netlockrmm_repliqate_engine: "restic"
netlockrmm_repliqate_schedule: "@daily 3am"
netlockrmm_repliqate_backup_id: "{{ netlockrmm_container_name }}"
netlockrmm_repliqate_retention: "30d"

# tinyauth
netlockrmm_tinyauth_enabled: false

# watchtower
netlockrmm_watchtower_enable: false


