---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ netlockrmm_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ netlockrmm_container_name }}"
        hostname: "{{ netlockrmm_container_name }}"
        image: "{{ netlockrmm_image_name }}:{{ netlockrmm_image_tag }}"
        pull: true
        volumes:
          - "{{ netlockrmm_data_directory }}:/config"
        ports:
          - "{{ netlockrmm_port_http }}:80"
        env:
#         DOCKER_MODS: "{{ netlockrmm_env_docker_mods }}" # linuxserver.io images
#         INSTALL_PACKAGES: "{{ netlockrmm_env_docker_mods_install_packages }}"
#         INSTALL_PIP_PACKAGES: "{{ netlockrmm_env_docker_mods_install_pip_packages}}"
          PUID: "{{ netlockrmm_user_id }}"
          PGID: "{{ netlockrmm_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ netlockrmm_autoheal | string }} | string"
          com.centurylinklabs.watchtower.enable: "{{ netlockrmm_watchtower_enable | string }}"
          dockflare.enable: "{{ netlockrmm_dockflare_tunnel | string }}"
          dockflare.access.group: "{{ netlockrmm_dockflare_access_group }}"
          dockflare.hostname: "{{ netlockrmm_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ netlockrmm_port_http }}"
#         dockflare.access.policy: "authenticate"
#         dockflare.access.allowed_idps: "YOUR_IDP_UUID_HERE"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ netlockrmm_homepage_group }}"
          homepage.icon: "{{ netlockrmm_homepage_icon }}"
          homepage.href: "{{ netlockrmm_homepage_href }}"
          homepage.description: "{{ 'appname description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ netlockrmm_container_name }}"
          homepage.showStats: "{{ netlockrmm_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ netlockrmm_port_http }}"
          repliqate.enabled: "{{ netlockrmm_repliqate_enabled }} | string"
          repliqate.engine: "{{ netlockrmm_repliqate_engine }}"
          repliqate.schedule: "{{ netlockrmm_repliqate_schedule }}"
          repliqate.backup_id: "{{ netlockrmm_repliqate_backup_id }}"
          repliqate.retention: "{{ netlockrmm_repliqate_retention }}"
          traefik.enable: "{{ netlockrmm_available_externally | string }}"
          traefik.http.routers.appname.rule: "Host(`{{ netlockrmm_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.appname.tls.certresolver: "letsencrypt"
          traefik.http.routers.appname.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.appname.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.appname.middlewares: "appname@docker{{ ',tinyauth-auth@docker' if netlockrmm_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.appname.IPAllowList.sourcerange: "{{ netlockrmm_traefik_whitelist }}"
          traefik.http.services.appname.loadbalancer.server.port: "80"
### Docker hub example
          wud.tag.include: '^\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/devname/appname"
### Github example
#          wud.tag.include: '^\d+\.\d+\.\d+$'
#          wud.tag.transform.type: "semver"
#          wud.link.template: "https://github.com/dev/appname/pkgs/container/appname"
### Linuxserver.io example
#          wud.tag.include: '^\d+\.\d+\.\d+.*$'
#          wud.tag.transform.type: "semver"
#          wud.link.template: "https://lscr.io/linuxserver/appname"
        cpu_shares: "{{ netlockrmm_cpu_shares }}"
        memory: "{{ netlockrmm_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (netlockrmm_port_http | string)] +
                (['https://' + netlockrmm_hostname + '.' + ansible_nas_domain] if (netlockrmm_available_externally is true or netlockrmm_dockflare_tunnel is true) else [])
              }}
  when: netlockrmm_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ netlockrmm_container_name }}"
        state: absent
  when: netlockrmm_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ netlockrmm_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - netlockrmm_enabled is false



