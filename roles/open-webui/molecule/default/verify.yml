---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Get {{ ansible_nas_app_name }} container state
      community.docker.docker_container_info:
        name: "{{ openwebui_container_name }}"
      register: result_openwebui

    - name: Get {{ ansible_nas_app_name }} OpenedAI container state
      community.docker.docker_container_info:
        name: "{{ openwebui_openedai_container_name }}"
      register: result_openedai

    - name: Check {{ ansible_nas_app_name }} is running
      ansible.builtin.assert:
        that:
          - result_openwebui.container['State']['Status'] == "running"
          - result_openwebui.container['State']['Restarting'] == false
          - result_openedai.container['State']['Status'] == "running"
          - result_openedai.container['State']['Restarting'] == false
