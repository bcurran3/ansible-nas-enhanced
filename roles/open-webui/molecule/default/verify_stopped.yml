---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Try and stop and remove {{ ansible_nas_app_name }}
      community.docker.docker_container:
        name: "{{ openwebui_container_name }}"
        state: absent
      register: result_openwebui

    - name: Try and stop and remove {{ ansible_nas_app_name }} OpenedAI
      community.docker.docker_container:
        name: "{{ openwebui_openedai_container_name }}"
        state: absent
      register: result_openedai

    - name: Check {{ ansible_nas_app_name }} is stopped
      ansible.builtin.assert:
        that:
          - not result_openwebui.changed
          - not result_openedai.changed
