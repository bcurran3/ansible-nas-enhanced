---
# ANE
ansible_nas_app_name: "Open WebUI"
open_webui_enabled: false
open_webui_traefik_enabled: false
open_webui_traefik_whitelist: "{{ lan }}"

open_webui_data_directory: "{{ docker_home }}/open-webui"

# network
open_webui_port_http: "11435"
open_webui_hostname: "openwebui"
open_webui_openedai_port_http: "11436"
open_webui_openedai_hostname: "openedai"

# docker
open_webui_container_name: "open-webui"
open_webui_image_name: "ghcr.io/open-webui/open-webui"
open_webui_image_tag: "main"
open_webui_openedai_container_name: "open-webui-openedai"
open_webui_openedai_image_name: "ghcr.io/matatonic/openedai-speech"
open_webui_openedai_image_tag: "latest"

# specs
open_webui_cpu_shares: 1024
open_webui_memory: "4G"
open_webui_memory_swap: -1
open_webui_openedai_cpu_shares: 1024
open_webui_openedai_memory: "2G"
open_webui_openedai_memory_swap: -1

# app
open_webui_env_webui_secret_key: ""

# autoheal
open_webui_autoheal_enabled: false
open_webui_openedai_autoheal_enabled: false

# dockflare
open_webui_dockflare_enabled: false
open_webui_dockflare_access_group: ""
open_webui_openedai_dockflare_enabled: false
open_webui_openedai_dockflare_access_group: ""

# homepage
open_webui_homepage_group: "Apps"
open_webui_homepage_icon: "open-webui.png"
open_webui_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ open_webui_port_http }}"
open_webui_homepage_showstats: false
open_webui_openedai_homepage_group: "Misc"
open_webui_openedai_homepage_icon: "open-webui.png"
open_webui_openedai_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ open_webui_openedai_port_http }}"
open_webui_openedai_homepage_showstats: false

# repliqate
open_webui_repliqate_enabled: false
open_webui_repliqate_engine: "restic"
open_webui_repliqate_schedule: "@daily 3am"
open_webui_repliqate_backup_id: "{{ open_webui_container_name }}"
open_webui_repliqate_retention: "30d"
open_webui_openedai_repliqate_enabled: false
open_webui_openedai_repliqate_engine: "restic"
open_webui_openedai_repliqate_schedule: "@daily 3am"
open_webui_openedai_repliqate_backup_id: "{{ open_webui_openedai_container_name }}"
open_webui_openedai_repliqate_retention: "30d"

# tinyauth
open_webui_tinyauth_enabled: false

# watchtower
open_webui_watchtower_enabled: false
open_webui_openedai_watchtower_enabled: false
