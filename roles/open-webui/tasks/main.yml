---
# Notice: This software is mostly obsolete and will no longer be updated.
- name: Start {{ open_webui_proper_name }}
  block:
    - name: Create {{ open_webui_proper_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ open_webui_data_directory }}"
        - "{{ open_webui_data_directory }}/data"
        - "{{ open_webui_data_directory }}/openedai"
        - "{{ open_webui_data_directory }}/openedai/config"
        - "{{ open_webui_data_directory }}/openedai/voices"

    - name: Report Ollama Status
      ansible.builtin.debug:
        msg: "Ollama is required for {{ open_webui_proper_name }}. Skipping container creation."
      when: not ollama_enabled | bool

    - name: Continue {{ open_webui_proper_name }}
      block:
        - name: Set {{ open_webui_proper_name }} FQDN var overrides
          ansible.builtin.set_fact:
            open_webui_homepage_href: "https://{{ open_webui_hostname }}.{{ ansible_nas_domain }}"
          when: open_webui_traefik_enabled | bool or open_webui_dockflare_enabled | bool

        - name: Create {{ open_webui_proper_name }} OpenedAI Speech Container
          community.docker.docker_container:
            container_default_behavior: "compatibility"
            name: "{{ open_webui_openedai_container_name }}"
            hostname: "{{ open_webui_openedai_container_name }}"
            image: "{{ open_webui_openedai_image_name }}:{{ open_webui_openedai_image_tag }}"
            pull: true
            volumes:
              - "{{ open_webui_data_directory }}/openedai/config:/app/config"
              - "{{ open_webui_data_directory }}/openedai/voices:/app/voices"
            ports:
              - "{{ open_webui_openedai_port_http }}:8000"
            env:
              TTS_HOME: "{{ open_webui_openedai_tts_home }}"
              HF_HOME: "{{ open_webui_openedai_hf_home }}"
              USE_ROCM: "{{ open_webui_openedai_use_rocm  }}"
              TZ: "{{ ansible_nas_timezone }}"
            device_requests: "{{
              [{'driver': 'nvidia', 'count': -1, 'capabilities': ['gpu']}]
              if nvidia_runtime_enabled | default(false) | bool else omit
            }}"
            devices: >-
              {%- set dev_list = (app_devices | default([])) -%}
              {%- if intel_igpu_enabled | default(false) | bool or amd_gpu_enabled | default(false) | bool -%}
                {%- set _ = dev_list.append('/dev/dri:/dev/dri') -%}
              {%- endif -%}
              {%- if amd_gpu_enabled | default(false) | bool and open_webui_amd_ai_enabled | default(false) | bool -%}
                {%- set _ = dev_list.append('/dev/kfd:/dev/kfd') -%}
              {%- endif -%}
              {{ dev_list if dev_list | length > 0 else omit }}
            group_add: "{{ ['render', 'video'] if (amd_gpu_enabled | default(false) | bool or intel_igpu_enabled | default(false) | bool) else omit }}"
            runtime: "{{ 'nvidia' if nvidia_runtime_enabled | default(false) | bool else omit }}"
            healthcheck:
              test: "{{ open_webui_openedai_healthcheck_test }}"
              interval: "{{ open_webui_openedai_healthcheck_interval }}"
              timeout: "{{ open_webui_openedai_healthcheck_timeout }}"
              retries: "{{ open_webui_openedai_healthcheck_retries }}"
              start_period: "{{ open_webui_openedai_healthcheck_start_period }}"
            labels:
              autoheal: "{{ open_webui_openedai_autoheal_enabled | ternary('true', 'false') }}"
              com.centurylinklabs.watchtower.enable: "{{ open_webui_openedai_watchtower_enabled | ternary('true', 'false') }}"
              dockflare.enable: "{{ open_webui_openedai_dockflare_enabled | ternary('true', 'false') }}"
              dockflare.access.group: "{{ open_webui_openedai_dockflare_access_group }}"
              dockflare.hostname: "{{ open_webui_openedai_hostname }}.{{ ansible_nas_domain }}"
              dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ open_webui_openedai_port_http }}"
              homepage.name: "{{ open_webui_proper_name }} OpenedAI Speech"
              homepage.group: "{{ open_webui_openedai_homepage_group }}"
              homepage.icon: "{{ open_webui_openedai_homepage_icon }}"
              homepage.href: "{{ open_webui_openedai_homepage_href }}"
              homepage.description: "{{ 'An OpenAI API compatible text to speech server using Coqui AI''s xtts_v2 and/or piper tts as the backend.' if homepage_show_description else omit }}"
              homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ open_webui_openedai_port_http }}"
              homepage.server: "my-docker"
              homepage.container: "{{ open_webui_openedai_container_name }}"
              homepage.showStats: "{{ open_webui_openedai_homepage_showstats | ternary('true', 'false') }}"
              repliqate.enabled: "{{ open_webui_openedai_repliqate_enabled | ternary('true', 'false') }}"
              repliqate.engine: "{{ open_webui_openedai_repliqate_engine }}"
              repliqate.schedule: "{{ open_webui_openedai_repliqate_schedule }}"
              repliqate.backup_id: "{{ open_webui_openedai_repliqate_backup_id }}"
              repliqate.retention: "{{ open_webui_openedai_repliqate_retention }}"
              traefik.enable: "{{ open_webui_traefik_enabled | ternary('true', 'false') }}"
              traefik.http.routers.openwebui.rule: "Host(`{{ open_webui_openedai_hostname }}.{{ ansible_nas_domain }}`)"
              traefik.http.routers.openwebui.tls.certresolver: "letsencrypt"
              traefik.http.routers.openwebui.tls.domains[0].main: "{{ ansible_nas_domain }}"
              traefik.http.routers.openwebui.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
              traefik.http.routers.openwebui.middlewares: "openwebui@docker{{ ',tinyauth-auth@docker' if open_webui_tinyauth_enabled | bool else '' }}"
              traefik.http.middlewares.openwebui.IPAllowList.sourcerange: "{{ open_webui_traefik_whitelist }}"
              traefik.http.services.openedai.loadbalancer.server.port: "8000"
              wud.watch.digest: "true"
              wud.link.template: "https://github.com/matatonic/openedai-speech/pkgs/container/openedai-speech"
            cpu_shares: "{{ open_webui_openedai_cpu_shares }}"
            memory: "{{ open_webui_openedai_memory }}"
            memory_swap: "{{ open_webui_openedai_memory_swap }}"
            restart_policy: unless-stopped

        - name: Create {{ open_webui_proper_name }} Container
          community.docker.docker_container:
            container_default_behavior: "compatibility"
            name: "{{ open_webui_container_name }}"
            hostname: "{{ open_webui_container_name }}"
            image: "{{ open_webui_image_name }}:{{ open_webui_image_tag }}"
            pull: true
            volumes:
              - "{{ open_webui_data_directory }}/data:/app/backend/data"
            ports:
              - "{{ open_webui_port_http }}:8080"
            env:
              DOCKER: "true"
              CORS_ALLOW_ORIGIN: "{{ open_webui_env_cors_allow_origin }}"
              CORS_ALLOW_CUSTOM_SCHEME: "{{ open_webui_env_cors_allow_custom_scheme }}"
              OLLAMA_BASE_URL: "{{ 'http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + ollama_port_http if ollama_enabled else omit }}"
              WEBUI_SECRET_KEY: "{{ open_webui_env_webui_secret_key }}"
              ENABLE_RAG_WEB_SEARCH: "{{ open_webui_env_enable_rag_web_search }}"
              RAG_WEB_SEARCH_ENGINE: "{{ open_webui_env_rag_web_search_engine }}"
              RAG_WEB_SEARCH_RESULT_COUNT: "{{ open_webui_env_rag_web_search_result_count  }}"
              RAG_WEB_SEARCH_CONCURRENT_REQUESTS: "{{ open_webui_env_rag_web_search_result_count }}"
              SEARXNG_QUERY_URL: "{{ 'http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + searxng_port_http if searxng_enabled else omit }}"
              USE_CUDA: "{{ open_webui_env_use_cuda }}"
              TZ: "{{ ansible_nas_timezone }}"
            device_requests: "{{
              [{'driver': 'nvidia', 'count': -1, 'capabilities': ['gpu']}]
              if nvidia_runtime_enabled | default(false) | bool else omit
            }}"
            devices: >-
              {%- set dev_list = (app_devices | default([])) -%}
              {%- if intel_igpu_enabled | default(false) | bool or amd_gpu_enabled | default(false) | bool -%}
                {%- set _ = dev_list.append('/dev/dri:/dev/dri') -%}
              {%- endif -%}
              {%- if amd_gpu_enabled | default(false) | bool and open_webui_amd_ai_enabled | default(false) | bool -%}
                {%- set _ = dev_list.append('/dev/kfd:/dev/kfd') -%}
              {%- endif -%}
              {{ dev_list if dev_list | length > 0 else omit }}
            group_add: "{{ ['render', 'video'] if (amd_gpu_enabled | default(false) | bool or intel_igpu_enabled | default(false) | bool) else omit }}"
            runtime: "{{ 'nvidia' if nvidia_runtime_enabled | default(false) | bool else omit }}"
            healthcheck:
              test: "{{ open_webui_healthcheck_test }}"
              interval: "{{ open_webui_healthcheck_interval }}"
              timeout: "{{ open_webui_healthcheck_timeout }}"
              retries: "{{ open_webui_healthcheck_retries }}"
              start_period: "{{ open_webui_healthcheck_start_period }}"
            labels:
              autoheal: "{{ open_webui_autoheal_enabled | ternary('true', 'false') }}"
              com.centurylinklabs.watchtower.enable: "{{ open_webui_watchtower_enabled | ternary('true', 'false') }}"
              dockflare.enable: "{{ open_webui_dockflare_enabled | ternary('true', 'false') }}"
              dockflare.access.group: "{{ open_webui_dockflare_access_group }}"
              dockflare.hostname: "{{ open_webui_hostname }}.{{ ansible_nas_domain }}"
              dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ open_webui_port_http }}"
              homepage.name: "{{ open_webui_proper_name }}"
              homepage.group: "{{ open_webui_homepage_group }}"
              homepage.icon: "{{ open_webui_homepage_icon }}"
              homepage.href: "{{ open_webui_homepage_href }}"
              homepage.description: "{{ 'User-friendly AI Interface (Supports Ollama, OpenAI API, ...)' if homepage_show_description else omit }}"
              homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ open_webui_port_http }}"
              homepage.server: "my-docker"
              homepage.container: "{{ open_webui_container_name }}"
              homepage.showStats: "{{ open_webui_homepage_showstats | ternary('true', 'false') }}"
              repliqate.enabled: "{{ open_webui_repliqate_enabled | ternary('true', 'false') }}"
              repliqate.engine: "{{ open_webui_repliqate_engine }}"
              repliqate.schedule: "{{ open_webui_repliqate_schedule }}"
              repliqate.backup_id: "{{ open_webui_repliqate_backup_id }}"
              repliqate.retention: "{{ open_webui_repliqate_retention }}"
              traefik.enable: "{{ open_webui_traefik_enabled | ternary('true', 'false') }}"
              traefik.http.routers.open_webui.rule: "Host(`{{ open_webui_hostname }}.{{ ansible_nas_domain }}`)"
              traefik.http.routers.open_webui.tls.certresolver: "letsencrypt"
              traefik.http.routers.open_webui.tls.domains[0].main: "{{ ansible_nas_domain }}"
              traefik.http.routers.open_webui.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
              traefik.http.routers.open_webui.middlewares: "{{ open_webui_hostname }}@docker{{ ',tinyauth-auth@docker' if open_webui_tinyauth_enabled | bool else '' }}"
              traefik.http.middlewares.open_webui.IPAllowList.sourcerange: "{{ open_webui_traefik_whitelist }}"
              traefik.http.services.open_webui.loadbalancer.server.port: "8080"
              wud.tag.include: '^v\d+\.\d+\.\d+$'
              wud.tag.transform.type: "semver"
              wud.link.template: "https://github.com/open-webui/open-webui/pkgs/container/open-webui"
            cpu_shares: "{{ open_webui_cpu_shares }}"
            memory: "{{ open_webui_memory }}"
            memory_swap: "{{ open_webui_memory_swap }}"
            restart_policy: unless-stopped

        - name: Access {{ open_webui_proper_name }} at
          ansible.builtin.debug:
            msg: >-
                  {{
                    ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (open_webui_port_http | string)] +
                    (['https://' + open_webui_hostname + '.' + ansible_nas_domain] if (open_webui_traefik_enabled is true or open_webui_dockflare_enabled is true) else [])
                  }}
      when: ollama_enabled | bool
  when: open_webui_enabled is true

- name: Stop {{ open_webui_proper_name }}
  block:
    - name: Stop {{ open_webui_proper_name }} OpenedAI Speech Container
      community.docker.docker_container:
        name: "{{ open_webui_openedai_container_name }}"
        state: absent

    - name: Stop {{ open_webui_proper_name }} Open WebUI Container
      community.docker.docker_container:
        name: "{{ open_webui_container_name }}"
        state: absent
  when: open_webui_enabled is false

- name: Data Archive {{ open_webui_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ open_webui_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - open_webui_enabled is false