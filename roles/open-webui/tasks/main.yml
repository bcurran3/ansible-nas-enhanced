---
# Notice: This software is mostly obsolete and will no longer be updated.
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ open_webui_data_directory }}"
        - "{{ open_webui_data_directory }}/data"
        - "{{ open_webui_data_directory }}/openedai"
        - "{{ open_webui_data_directory }}/openedai/config"
        - "{{ open_webui_data_directory }}/openedai/voices"

    - name: Check for Ollama installation
      ansible.builtin.fail:
        msg: "{{ ansible_nas_app_name }} requires Ollama enabled to access LLMs, please set that up first."
      when: ollama_enabled is false

    - name: Create {{ ansible_nas_app_name }} OpenedAI Speech Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ open_webui_openedai_container_name }}"
        hostname: "{{ open_webui_openedai_container_name }}"
        image: "{{ open_webui_openedai_image_name }}:{{ open_webui_openedai_image_tag }}"
        pull: true
        volumes:
          - "{{ open_webui_data_directory }}/openedai/config:/app/config"
          - "{{ open_webui_data_directory }}/openedai/voices:/app/voices"
        ports:
          - "{{ open_webui_openedai_port_http }}:8000"
        env:
          TTS_HOME: "voices"
          HF_HOME: "voices"
          TZ: "{{ ansible_nas_timezone }}"
        runtime: "{{ 'nvidia' if nvidia_runtime_enabled | bool else omit }}"
        device_requests: "{{
          [{'driver': 'nvidia', 'count': -1, 'capabilities': ['gpu']}]
          if nvidia_runtime_enabled | bool else omit
        }}"
        # below needs OpenVINO toolkit or IPEX-LLM library
        devices: >-
                  {{
                    (open_webui_openedai_devices | default([])) + ['/dev/dri:/dev/dri']
                    if igpu_enabled | default(false) | bool
                    else (open_webui_openedai_devices | default(omit))
                  }}
        labels:
          autoheal: "{{ open_webui_openedai_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ open_webui_openedai_watchtower_enable }}"
          dockflare.enable: "{{ open_webui_openedai_dockflare_tunnel }}"
          dockflare.access.group: "{{ open_webui_openedai_dockflare_access_group }}"
          dockflare.hostname: "{{ open_webui_openedai_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ open_webui_openedai_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }} OpenedAI Speech"
          homepage.group: "{{ open_webui_openedai_homepage_group }}"
          homepage.icon: "{{ open_webui_openedai_homepage_icon }}"
          homepage.href: "{{ open_webui_openedai_homepage_href }}"
          homepage.description: "{{ 'An OpenAI API compatible text to speech server using Coqui AI''s xtts_v2 and/or piper tts as the backend.' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ open_webui_openedai_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ open_webui_openedai_container_name }}"
          homepage.showStats: "{{ open_webui_openedai_homepage_showstats }}"
          repliqate.enabled: "{{ open_webui_openedai_repliqate_enabled }}"
          repliqate.engine: "{{ open_webui_openedai_repliqate_engine }}"
          repliqate.schedule: "{{ open_webui_openedai_repliqate_schedule }}"
          repliqate.backup_id: "{{ open_webui_openedai_repliqate_backup_id }}"
          repliqate.retention: "{{ open_webui_openedai_repliqate_retention }}"
          traefik.enable: "{{ open_webui_available_externally | string }}"
          traefik.http.routers.openedai.rule: "Host(`openedai.{{ ansible_nas_domain }}`)"
          traefik.http.routers.openedai.tls.certresolver: "letsencrypt"
          traefik.http.routers.openedai.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.openedai.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ open_webui_openedai_hostname }}"
          traefik.http.routers.openedai.middlewares: "{{ open_webui_openedai_hostname }}@docker"
          traefik.http.middlewares.openedai.IPAllowList.sourcerange: "{{ open_webui_traefik_whitelist }}"
          traefik.http.services.openedai.loadbalancer.server.port: "8000"
          wud.watch.digest: "true"
          wud.link.template: "https://github.com/matatonic/openedai-speech/pkgs/container/openedai-speech"
        cpu_shares: "{{ open_webui_openedai_cpu_shares }}"
        memory: "{{ open_webui_openedai_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ open_webui_container_name }}"
        hostname: "{{ open_webui_container_name }}"
        image: "{{ open_webui_image_name }}:{{ open_webui_image_tag }}"
        pull: true
        volumes:
          - "{{ open_webui_data_directory }}/data:/app/backend/data"
        ports:
          - "{{ open_webui_port_http }}:8080"
        env:
          OLLAMA_BASE_URL: "{{ 'http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + ollama_port_http if ollama_enabled else omit }}"
          WEBUI_SECRET_KEY: " {{ open_webui_env_webui_secret_key }}"
          ENABLE_RAG_WEB_SEARCH: "true"
          RAG_WEB_SEARCH_ENGINE: "searxng"
          RAG_WEB_SEARCH_RESULT_COUNT: "3"
          RAG_WEB_SEARCH_CONCURRENT_REQUESTS: "10"
          SEARXNG_QUERY_URL: "{{ 'http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + searxng_port_http if searxng_enabled else omit }}"
          TZ: "{{ ansible_nas_timezone }}"
        runtime: "{{ 'nvidia' if nvidia_runtime_enabled | bool else omit }}"
        device_requests: "{{
          [{'driver': 'nvidia', 'count': -1, 'capabilities': ['gpu']}]
          if nvidia_runtime_enabled | bool else omit
        }}"
        # below needs OpenVINO toolkit or IPEX-LLM library
        devices: >-
                  {{
                    (open_webui_devices | default([])) + ['/dev/dri:/dev/dri']
                    if intel_igpu_enabled | default(false) | bool
                    else (open_webui_devices | default(omit))
                  }}
        labels:
          autoheal: "{{ open_webui_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ open_webui_watchtower_enable }}"
          dockflare.enable: "{{ open_webui_dockflare_tunnel }}"
          dockflare.access.group: "{{ open_webui_dockflare_access_group }}"
          dockflare.hostname: "{{ open_webui_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ open_webui_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ open_webui_homepage_group }}"
          homepage.icon: "{{ open_webui_homepage_icon }}"
          homepage.href: "{{ open_webui_homepage_href }}"
          homepage.description: "{{ 'User-friendly AI Interface (Supports Ollama, OpenAI API, ...)' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ open_webui_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ open_webui_container_name }}"
          homepage.showStats: "{{ open_webui_homepage_showstats }}"
          repliqate.enabled: "{{ open_webui_repliqate_enabled }}"
          repliqate.engine: "{{ open_webui_repliqate_engine }}"
          repliqate.schedule: "{{ open_webui_repliqate_schedule }}"
          repliqate.backup_id: "{{ open_webui_repliqate_backup_id }}"
          repliqate.retention: "{{ open_webui_repliqate_retention }}"
          traefik.enable: "{{ open_webui_available_externally | string }}"
          traefik.http.routers.open_webui.rule: "Host(`open_webui.{{ ansible_nas_domain }}`)"
          traefik.http.routers.open_webui.tls.certresolver: "letsencrypt"
          traefik.http.routers.open_webui.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.open_webui.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ open_webui_hostname }}"
          traefik.http.routers.open_webui.middlewares: "{{ open_webui_hostname }}@docker"
          traefik.http.middlewares.open_webui.IPAllowList.sourcerange: "{{ open_webui_traefik_whitelist }}"
          traefik.http.services.open_webui.loadbalancer.server.port: "8080"
          wud.tag.include: '^v\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/open-webui/open-webui/pkgs/container/open-webui"
        cpu_shares: "{{ open_webui_cpu_shares }}"
        memory: "{{ open_webui_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (open_webui_port_http | string)] +
                (['https://' + open_webui_hostname + '.' + ansible_nas_domain] if (open_webui_available_externally is true or open_webui_dockflare_tunnel is true) else [])
              }}
  when: open_webui_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} OpenedAI Speech Container
      community.docker.docker_container:
        name: "{{ open_webui_openedai_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} Open WebUI Container
      community.docker.docker_container:
        name: "{{ open_webui_container_name }}"
        state: absent
  when: open_webui_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ open_webui_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ open_webui_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: open_webui_enabled is false and archive_app_data_enabled is true
