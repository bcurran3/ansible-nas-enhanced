---
# ANE
ansible_nas_app_name: "ONLYOFFICE Docs"
onlyoffice_enabled: false
onlyoffice_traefik_enabled: false
onlyoffice_traefik_whitelist: "{{ lan }}"

# directories
onlyoffice_data_directory: "{{ docker_home }}/onlyoffice"

# network
onlyoffice_hostname: "onlyoffice"
onlyoffice_port_http: "9015"

# docker
onlyoffice_container_name: "onlyoffice-document-server"
onlyoffice_image_name: "onlyoffice/documentserver"
onlyoffice_image_tag: "latest"

# specs
onlyoffice_cpu_shares: 1024
# Minimum (Barely Functional): 2 GB (Expect slow loading times; suitable for 1 user).
# Recommended (Standard): 4 GB – 6 GB (Smooth experience for small teams).
# Performance (Production/Heavy Docs): 8 GB+.
onlyoffice_memory: "4G"
onlyoffice_memory_swap: -1

# app
onlyoffice_env_jwt_secret: "nextcloud"
onlyoffice_env_use_unauthorized_storage: "true"

# autoheal
onlyoffice_autoheal_enabled: false

# dockflare
onlyoffice_dockflare_enabled: false
onlyoffice_dockflare_access_group: ""

# homepage
onlyoffice_homepage_group: "Misc"
onlyoffice_homepage_icon: "onlyoffice.png"
onlyoffice_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ onlyoffice_port_http }}"
onlyoffice_homepage_showstats: false

# repliqate
onlyoffice_repliqate_enabled: false
onlyoffice_repliqate_engine: "restic"
onlyoffice_repliqate_schedule: "@daily 3am"
onlyoffice_repliqate_backup_id: "{{ onlyoffice_container_name }}"
onlyoffice_repliqate_retention: "30d"

# tinyauth
onlyoffice_tinyauth_enabled: false

# watchtower
onlyoffice_watchtower_enabled: false