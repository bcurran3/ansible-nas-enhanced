---
# ANE
ansible_nas_app_name: "Porn Vault"
pornvault_enabled: false
pornvault_traefik_enabled: false
pornvault_traefik_whitelist: "{{ lan }}"

# directories
pornvault_data_directory: "{{ docker_home }}/pornvault"
pornvault_porn_images_directory: "{{ porn_root }}/pix"
pornvault_porn_videos_directory: "{{ porn_root }}"

# network
pornvault_hostname: "pornvault"
pornvault_port_http: "6996"

# docker
pornvault_container_name: "porn-vault"
pornvault_image_name: "registry.gitlab.com/porn-vault/porn-vault"
pornvault_image_tag: "alpine-edge"

# specs
pornvault_cpu_shares: 1024
pornvault_memory: "1G"

# autoheal
pornvault_autoheal_enabled: false

# dockflare
pornvault_dockflare_enabled: false
pornvault_dockflare_access_group: ""

# homepage
pornvault_homepage_group: "Apps"
pornvault_homepage_icon: "pornvault.png"
pornvault_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ pornvault_port_http }}"
pornvault_homepage_showstats: false

# repliqate
pornvault_repliqate_enabled: false
pornvault_repliqate_engine: "restic"
pornvault_repliqate_schedule: "@daily 3am"
pornvault_repliqate_backup_id: "{{ pornvault_container_name }}"
pornvault_repliqate_retention: "30d"

# tinyauth
pornvault_tinyauth_enabled: false

# watchtower
pornvault_watchtower_enabled: false