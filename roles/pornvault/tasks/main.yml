---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ pornvault_data_directory }}"
        - "{{ pornvault_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ pornvault_container_name }}"
        hostname: "{{ pornvault_container_name }}"
        image: "{{ pornvault_image_name }}:{{ pornvault_image_tag }}"
        pull: true
        cpu_shares: "{{ pornvault_cpu_shares }}"
        volumes:
          - "/etc/localtime:/etc/localtime:ro"
          - "{{ pornvault_data_directory }}/config:/config:rw"
          - "{{ porn_root }}:/videos:ro"
          - "{{ porn_root }}/pix:/images:ro"
        ports:
          - "{{ pornvault_http_port }}:3000"
        labels:
          autoheal: "{{ pornvault_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ pornvault_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ pornvault_homepage_group }}"
          homepage.icon: "{{ pornvault_homepage_icon }}"
          homepage.href: "{{ pornvault_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ pornvault_port_http }}"
          homepage.description: "{{ 'Porn-Vault is a self hosted organizer for adult videos and imagery.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ pornvault_container_name }}"
          homepage.showStats: "{{ pornvault_homepage_showStats }}"
          traefik.enable: "{{ pornvault_available_externally | string }}"
          traefik.http.routers.pornvault.rule: "Host(`pornvault.{{ ansible_nas_domain }}`)"
          traefik.http.routers.pornvault.tls.certresolver: "letsencrypt"
          traefik.http.routers.pornvault.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.pornvault.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ pornvault_hostname }}"
          traefik.http.routers.pornvault.middlewares: "{{ pornvault_hostname }}@docker"
          traefik.http.middlewares.pornvault.IPAllowList.sourcerange: "{{ pornvault_traefik_whitelist }}"
          traefik.http.services.pornvault.loadbalancer.server.port: "3000"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://gitlab.com/porn-vault/porn-vault/-/releases/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ pornvault_memory }}"
        restart_policy: unless-stopped
  when: pornvault_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ pornvault_container_name }}"
        state: absent
  when: pornvault_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ pornvault_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ pornvault_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: pornvault_enabled is false and archive_app_data_enabled is true
