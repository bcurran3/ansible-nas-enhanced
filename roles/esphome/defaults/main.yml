---
# ANE
ansible_nas_app_name: "ESPHome"
esphome_enabled: false
esphome_available_externally: false
esphome_traefik_whitelist: "{{ lan }}"

# directories
esphome_data_directory: "{{ docker_home }}/esphome"

# uid / gid
esphome_user_id: "1000"
esphome_group_id: "1000"

# network
esphome_hostname: "esphome"
esphome_port: "6052"

# specs
esphome_memory: 1g

# docker
esphome_container_name: esphome
esphome_cpu_shares: 1024
esphome_image_name: "esphome/esphome"
esphome_image_tag: "latest"

# autoheal
esphome_autoheal: "false"

# dockflare
esphome_dockflare_tunnel: "false"
esphome_dockflare_access_group: ""

# homepage
esphome_homepage_group: "Apps"
esphome_homepage_icon: "esphome.png"
esphome_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ esphome_port }}"
esphome_homepage_showstats: "false"

# repliqate
esphome_repliqate_enabled: "false"
esphome_repliqate_engine: "restic"
esphome_repliqate_schedule: "@daily 3am"
esphome_repliqate_backup_id: "esphome"
esphome_repliqate_retention: "30d"

# watchtower
esphome_watchtower_enable: "false"