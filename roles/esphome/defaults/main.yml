---
# ANE
esphome_proper_name: "ESPHome"
esphome_enabled: false
esphome_traefik_enabled: false
esphome_traefik_whitelist: "{{ lan }}"

# directories
esphome_data_directory: "{{ docker_home }}/esphome"

# uid / gid
esphome_user_id: "1000"
esphome_group_id: "1000"

# network
esphome_hostname: "esphome"
esphome_port_http: "6052"

# docker
esphome_container_name: "esphome"
esphome_image_name: "ghcr.io/esphome/esphome"
esphome_image_tag: "latest"

# specs
esphome_cpu_shares: 1024
esphome_memory: "1G"
esphome_memory_swap: -1

# autoheal
esphome_autoheal_enabled: false

# dockflare
esphome_dockflare_enabled: false
esphome_dockflare_access_group: ""

# homepage
esphome_homepage_group: "Apps"
esphome_homepage_icon: "esphome.png"
esphome_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ esphome_port_http }}"
esphome_homepage_showstats: false

# repliqate
esphome_repliqate_enabled: false
esphome_repliqate_engine: "restic"
esphome_repliqate_schedule: "@daily 3am"
esphome_repliqate_backup_id: "{{ esphome_container_name }}"
esphome_repliqate_retention: "30d"

# tinyauth
esphome_tinyauth_enabled: false

# watchtower
esphome_watchtower_enabled: false