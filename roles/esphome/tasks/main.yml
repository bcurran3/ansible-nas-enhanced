---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create EspHome Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ esphome_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ esphome_container_name }}"
        hostname: "{{ esphome_container_name }}"
        image: "{{ esphome_image_name }}:{{ esphome_image_tag }}"
        pull: true
        cpu_shares: "{{ esphome_cpu_shares }}"
        volumes:
          - "{{ esphome_data_directory }}:/config:rw"
          - "/etc/localtime:/etc/localtime:ro"
        ports:
          - "{{ esphome_port }}:6052"
        env:
          TZ: "{{ ansible_nas_timezone }}"
          PUID: "{{ esphome_user_id }}"
          PGID: "{{ esphome_group_id }}"
        restart_policy: unless-stopped
        memory: "{{ esphome_memory }}"
        labels:
          autoheal: "{{ esphome_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ esphome_watchtower_monitor_only }}"
          traefik.enable: "{{ esphome_available_externally | string }}"
          traefik.http.routers.esphome.rule: "Host(`{{ esphome_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.esphome.tls.certresolver: "letsencrypt"
          traefik.http.routers.esphome.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.esphome.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.services.esphome.loadbalancer.server.port: "80"
  when: esphome_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ esphome_container_name }}"
        state: absent
  when: esphome_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ esphome_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ esphome_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: esphome_enabled is false and archive_app_data_enabled is true
