---
# ANE
ansible_nas_app_name: "The Lounge"
thelounge_enabled: false
thelounge_available_externally: false
thelounge_traefik_whitelist: "{{ lan }}"

# Directories
thelounge_data_directory: "{{ docker_home }}/thelounge"

# Networking
thelounge_port_one: "113"
thelounge_port_two: "9002"
thelounge_hostname: thelounge

# Container
thelounge_memory: 1g
thelounge_container_name: "thelounge"
thelounge_image_name: "thelounge/thelounge"
thelounge_image_version: "latest"
thelounge_cpu_shares: 1024

# autoheal
thelounge_autoheal: "false"

# dockflare
thelounge_dockflare_tunnel: "false"
thelounge_dockflare_access_group: ""

# homepage
thelounge_homepage_group: "Apps"
thelounge_homepage_icon: "thelounge.png"
thelounge_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ thelounge_port }}"
thelounge_homepage_showStats: "false"

# watchtower
thelounge_watchtower_monitor_only: "true"