---
# ANE
ansible_nas_app_name: "The Lounge"
thelounge_enabled: false
thelounge_traefik_enabled: false
thelounge_traefik_whitelist: "{{ lan }}"

# Directories
thelounge_data_directory: "{{ docker_home }}/thelounge"

# Networking
thelounge_port_http: "9023"
thelounge_port_ident: "113"
thelounge_hostname: "thelounge"

# Container
thelounge_memory: "1G"
thelounge_container_name: "thelounge"
thelounge_image_name: "thelounge/thelounge"
thelounge_image_version: "latest"
thelounge_cpu_shares: 1024

# autoheal
thelounge_autoheal_enabled: false

# dockflare
thelounge_dockflare_enabled: false
thelounge_dockflare_access_group: ""

# homepage
thelounge_homepage_group: "Apps"
thelounge_homepage_icon: "thelounge.png"
thelounge_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ thelounge_port_http }}"
thelounge_homepage_showstats: false

# repliqate
thelounge_repliqate_enabled: false
thelounge_repliqate_engine: "restic"
thelounge_repliqate_schedule: "@daily 3am"
thelounge_repliqate_backup_id: "{{ thelounge_container_name }}"
thelounge_repliqate_retention: "30d"

# tinyauth
thelounge_tinyauth_enabled: false

# watchtower
thelounge_watchtower_enabled: false