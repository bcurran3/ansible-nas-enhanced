---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ thelounge_data_directory }}"
        - "{{ thelounge_data_directory }}/users"

    - name: Set up admin user for {{ ansible_nas_app_name }}
      ansible.builtin.copy:
        src: admin.json
        dest: "{{ thelounge_data_directory }}/users/admin.json"
        mode: 0777

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ thelounge_container_name }}"
        hostname: "{{ thelounge_container_name }}"
        image: "{{ thelounge_image_name }}:{{ thelounge_image_version }}"
        pull: true
        ports:
          - "{{ thelounge_port_one }}:9001"
          - "{{ thelounge_port_two }}:9000"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        volumes:
          - "{{ thelounge_data_directory }}:/var/opt/thelounge"
          - "/var/run/dbus:/var/run/dbus"
        labels:
          autoheal: "{{ thelounge_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ thelounge_watchtower_enable }}"
          dockflare.enable: "{{ thelounge_dockflare_tunnel }}"
          dockflare.access.group: "{{ thelounge_dockflare_access_group }}"
          dockflare.hostname: "{{ thelounge_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ thelounge_port_two }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ thelounge_homepage_group }}"
          homepage.icon: "{{ thelounge_homepage_icon }}"
          homepage.href: "{{ thelounge_homepage_href }}"
          homepage.description: "{{ 'Modern, responsive, cross-platform, self-hosted web IRC client' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ thelounge_container_name }}"
          homepage.showStats: "{{ thelounge_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ thelounge_port_two }}"
          traefik.enable: "{{ thelounge_available_externally | string }}"
          traefik.http.routers.thelounge.rule: "Host(`{{ thelounge_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.thelounge.tls.certresolver: "letsencrypt"
          traefik.http.routers.thelounge.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.thelounge.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ thelounge_hostname }}"
          traefik.http.routers.thelounge.middlewares: "{{ thelounge_hostname }}@docker"
          traefik.http.middlewares.thelounge.IPAllowList.sourcerange: "{{ thelounge_traefik_whitelist }}"
          traefik.http.services.thelounge.loadbalancer.server.port: "9000"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/thelounge/thelounge"
        cpu_shares: "{{ thelounge_cpu_shares }}"
        memory: "{{ thelounge_memory }}"
        restart_policy: unless-stopped
  when: thelounge_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ thelounge_container_name }}"
        state: absent
  when: thelounge_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ thelounge_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ thelounge_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: thelounge_enabled is false and archive_app_data_enabled is true
