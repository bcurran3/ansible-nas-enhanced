---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ thelounge_data_directory }}"
        - "{{ thelounge_data_directory }}/users"

    - name: Set up admin user for {{ ansible_nas_app_name }}
      ansible.builtin.copy:
        src: admin.json
        dest: "{{ thelounge_data_directory }}/users/admin.json"
        mode: 0777

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ thelounge_container_name }}"
        image: "{{ thelounge_image_name }}:{{ thelounge_image_version }}"
        pull: true
        ports:
          - "{{ thelounge_port_one }}:9001"
          - "{{ thelounge_port_two }}:9000"
        volumes:
          - "{{ thelounge_data_directory }}:/var/opt/thelounge"
          - "/var/run/dbus:/var/run/dbus"
        restart_policy: unless-stopped
        cpu_shares: "{{ thelounge_cpu_shares }}"
        memory: "{{ thelounge_memory }}"
        labels:
          autoheal: "{{ thelounge_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ thelounge_watchtower_monitor_only }}"
          traefik.enable: "{{ thelounge_available_externally | string }}"
          traefik.http.routers.thelounge.rule: "Host(`{{ thelounge_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.thelounge.tls.certresolver: "letsencrypt"
          traefik.http.routers.thelounge.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.thelounge.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.services.thelounge.loadbalancer.server.port: "9000"
  when: thelounge_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ thelounge_container_name }}"
        state: absent
  when: thelounge_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ thelounge_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ thelounge_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: thelounge_enabled is false and archive_app_data_enabled is true
