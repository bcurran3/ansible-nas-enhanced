---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ thelounge_data_directory }}"
        - "{{ thelounge_data_directory }}/users"

    - name: Set up admin user for {{ ansible_nas_app_name }}
      ansible.builtin.copy:
        src: admin.json
        dest: "{{ thelounge_data_directory }}/users/admin.json"
        mode: 0777

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ thelounge_container_name }}"
        hostname: "{{ thelounge_container_name }}"
        image: "{{ thelounge_image_name }}:{{ thelounge_image_version }}"
        pull: true
        ports:
          - "{{ thelounge_port_http }}:9000"
          - "{{ thelounge_port_ident }}:9001"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        volumes:
          - "{{ thelounge_data_directory }}:/var/opt/thelounge"
          - "/var/run/dbus:/var/run/dbus"
        labels:
          autoheal: "{{ thelounge_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ thelounge_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ thelounge_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ thelounge_dockflare_access_group }}"
          dockflare.hostname: "{{ thelounge_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ thelounge_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ thelounge_homepage_group }}"
          homepage.icon: "{{ thelounge_homepage_icon }}"
          homepage.href: "{{ thelounge_homepage_href }}"
          homepage.description: "{{ 'Modern, responsive, cross-platform, self-hosted web IRC client' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ thelounge_container_name }}"
          homepage.showStats: "{{ thelounge_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ thelounge_port_http }}"
          repliqate.enabled: "{{ thelounge_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ thelounge_repliqate_engine }}"
          repliqate.schedule: "{{ thelounge_repliqate_schedule }}"
          repliqate.backup_id: "{{ thelounge_repliqate_backup_id }}"
          repliqate.retention: "{{ thelounge_repliqate_retention }}"
          traefik.enable: "{{ thelounge_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.thelounge.rule: "Host(`{{ thelounge_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.thelounge.tls.certresolver: "letsencrypt"
          traefik.http.routers.thelounge.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.thelounge.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.thelounge.middlewares: "thelounge@docker{{ ',tinyauth-auth@docker' if thelounge_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.thelounge.IPAllowList.sourcerange: "{{ thelounge_traefik_whitelist }}"
          traefik.http.services.thelounge.loadbalancer.server.port: "9000"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/thelounge/thelounge"
        cpu_shares: "{{ thelounge_cpu_shares }}"
        memory: "{{ thelounge_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (thelounge_port_http | string)] +
                (['https://' + thelounge_hostname + '.' + ansible_nas_domain] if (thelounge_traefik_enabled is true or thelounge_dockflare_enabled is true) else [])
              }}
  when: thelounge_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ thelounge_container_name }}"
        state: absent
  when: thelounge_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ thelounge_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - thelounge_enabled is false