---
# ANE
ansible_nas_app_name: "Modmanager"
modmanager_enabled: false
modmanager_available_externally: false
modmanager_traefik_whitelist: "{{ lan }}"

# directories
modmanager_data_directory: "{{ docker_home }}/modmanager"

# docker
modmanager_container_name: "modmanager"
modmanager_image_name: "lscr.io/linuxserver/modmanager"
modmanager_image_tag: "latest"

# network
modmanager_hostname: "modmanager"

# specs
modmanager_cpu_shares: 1024
modmanager_memory: "256M"
modmanager_memory_swap: -1

# autoheal
modmanager_autoheal: "false"

# homepage
modmanager_homepage_group: "Misc"
modmanager_homepage_icon: "sh-linuxserver-io.png"
modmanager_homepage_showstats: "false"

# linuxserver.io docker mods
modmanager_env_docker_mods: ""
modmanager_env_docker_mods_install_packages: ""
modmanager_env_docker_mods_install_pip_packages: ""
modmanager_env_docker_host: ""
modmanager_env_docker_mods_extra_hosts: ""

# repliqate
modmanager_repliqate_enabled: "false"
modmanager_repliqate_engine: "restic"
modmanager_repliqate_schedule: "@daily 3am"
modmanager_repliqate_backup_id: "{{ modmanager_container_name }}"
modmanager_repliqate_retention: "30d"

# watchtower
modmanager_watchtower_enable: "false"
