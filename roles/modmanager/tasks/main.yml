---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ modmanager_data_directory }}"
        - "{{ modmanager_data_directory }}/modcache"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ modmanager_container_name }}"
        hostname: "{{ modmanager_container_name }}"
        image: "{{ modmanager_image_name }}:{{ modmanager_image_tag }}"
        pull: true
        volumes:
          - "{{ modmanager_data_directory }}/modcache:/modcache"
          - /var/run/docker.sock:/var/run/docker.sock:ro
        env:
          DOCKER_MODS: "{{ modmanager_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ modmanager_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ modmanager_env_docker_mods_install_pip_packages}}"
          DOCKER_HOST: "{{ modmanager_env_docker_host }}"
          DOCKER_MODS_EXTRA_HOSTS: "{{ modmanager_env_docker_mods_extra_hosts }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ modmanager_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ modmanager_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ modmanager_homepage_group }}"
          homepage.icon: "{{ modmanager_homepage_icon }}"
          homepage.description: "{{ 'modmanager description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ modmanager_container_name }}"
          homepage.showStats: "{{ modmanager_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ modmanager_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ modmanager_repliqate_engine }}"
          repliqate.schedule: "{{ modmanager_repliqate_schedule }}"
          repliqate.backup_id: "{{ modmanager_repliqate_backup_id }}"
          repliqate.retention: "{{ modmanager_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^version-\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "lscr.io/linuxserver/modmanager"
        cpu_shares: "{{ modmanager_cpu_shares }}"
        memory: "{{ modmanager_memory }}"
        memory_swap: "{{ modmanager_memory_swap }}"
        restart_policy: unless-stopped
  when: modmanager_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ modmanager_container_name }}"
        state: absent
  when: modmanager_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ modmanager_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - modmanager_enabled is false