---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ romm_data_directory }}"
        - "{{ romm_data_directory }}/assets"
        - "{{ romm_data_directory }}/config"
        - "{{ romm_data_directory }}/db"
        - "{{ romm_data_directory }}/redis"
        - "{{ romm_data_directory }}/resources"
        - "{{ romm_roms_directory }}"

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ romm_db_container_name }}"
        hostname: "{{ romm_db_container_name }}"
        image: "{{ romm_db_image_name }}:{{ romm_db_image_version }}"
        pull: true
        volumes:
          - "{{ romm_data_directory }}/db:/var/lib/mysql"
        env:
          MARIADB_ROOT_PASSWORD: "{{ romm_database_root_password }}"
          MARIADB_DATABASE: "romm"
          MARIADB_USER: "{{ romm_database_username }}"
          MARIADB_PASSWORD: "{{ romm_database_password }}"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
          start_period: "30s"
          start_interval: "10s"
          interval: "10s"
          timeout: "5s"
          retries: "5"
        labels:
          autoheal: "{{ romm_db_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ romm_db_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} MySQL"
          homepage.group: "{{ romm_db_homepage_group }}"
          homepage.icon: "{{ romm_db_homepage_icon }}"
          homepage.href: "{{ romm_homepage_href }}"
          homepage.description: "{{ 'MySQL Server, the world''s most popular open source database' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ romm_db_container_name }}"
          homepage.showStats: "{{ romm_db_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ romm_db_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ romm_db_repliqate_engine }}"
          repliqate.schedule: "{{ romm_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ romm_db_repliqate_backup_id }}"
          repliqate.retention: "{{ romm_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/mariadb"
        cpu_shares: "{{ romm_db_cpu_shares }}"
        memory: "{{ romm_db_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Redis Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ romm_redis_container_name }}"
        hostname: "{{ romm_redis_container_name }}"
        image: "{{ romm_redis_image_name }}:{{ romm_redis_image_version }}"
        pull: true
        volumes:
          - "{{ romm_data_directory }}/redis:/data"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ romm_redis_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ romm_redis_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} Redis"
          homepage.group: "{{ romm_redis_homepage_group }}"
          homepage.icon: "{{ romm_redis_homepage_icon }}"
          homepage.href: "{{ romm_homepage_href }}"
          homepage.description: "{{ 'The Real-time Data Platform' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ romm_redis_container_name }}"
          homepage.showStats: "{{ romm_redis_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ romm_redis_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ romm_redis_repliqate_engine }}"
          repliqate.schedule: "{{ romm_redis_repliqate_schedule }}"
          repliqate.backup_id: "{{ romm_redis_repliqate_backup_id }}"
          repliqate.retention: "{{ romm_redis_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+-alpine.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/redis"
        cpu_shares: "{{ romm_redis_cpu_shares }}"
        memory: "{{ romm_redis_memory }}"
        restart_policy: unless-stopped

    - name: Verify {{ ansible_nas_app_name }} DB is healthy
      community.docker.docker_container_info:
        name: "{{ romm_db_container_name }}"
      register: db_info
      until: "db_info.container.State.Health.Status == 'healthy'"
      retries: 30
      delay: 5

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ romm_container_name }}"
        hostname: "{{ romm_container_name }}"
        image: "{{ romm_image_name }}:{{ romm_image_version }}"
        pull: true
        volumes:
          - "{{ romm_data_directory }}/assets:/romm/assets"
          - "{{ romm_data_directory }}/config:/romm/config"
          - "{{ romm_data_directory }}/redis:/redis-data"
          - "{{ romm_data_directory }}/resources:/romm/resources"
          - "{{ romm_roms_directory }}:/romm/library"
        ports:
          - "{{ romm_port_http }}:8080"
        env:
          ROMM_DB_DRIVER: "mariadb"
          DB_HOST: "{{ romm_db_container_name }}"
          DB_PORT: "3306"
          DB_USER: "{{ romm_database_username }}"
          DB_PASSWD: "{{ romm_database_password }}"
          DB_NAME: "romm"
          ROMM_AUTH_ENABLED: "{{ romm_auth_enabled }}"
          ROMM_AUTH_USERNAME: "{{ romm_auth_username }}"
          ROMM_AUTH_PASSWORD: "{{ romm_auth_password }}"
          ROMM_AUTH_SECRET_KEY: "{{ romm_auth_secret_key }}"
          ENABLE_EXPERIMENTAL_REDIS: "true"
          REDIS_HOST: "{{ romm_redis_container_name }}"
          REDIS_PORT: "6379"
          IGDB_CLIENT_ID: "{{ romm_igdb_client_id }}"
          IGDB_CLIENT_SECRET: "{{ romm_igdb_client_secret }}"
          MOBYGAMES_API_KEY: "{{ romm_mobygames_client_id }}"
          SCREENSCRAPER_USER: "{{ romm_screenscraper_user }}"
          SCREENSCRAPER_PASSWORD: "{{ romm_screenscraper_password }}"
          RETROACHIEVEMENTS_API_KEY: "{{ romm_retroachievements_api_key }}"
          STEAMGRIDDB_API_KEY: "{{ romm_steamgriddb_api_key }}"
          HASHEOUS_API_ENABLED: "{{ romm_hasheous_api_enabled }}"
          TZ: "{{ ansible_nas_timezone }}"
        links:
          - "{{ romm_db_container_name }}:db"
          - "{{ romm_redis_container_name }}:redis"
        labels:
          autoheal: "{{ romm_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ romm_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ romm_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ romm_dockflare_access_group }}"
          dockflare.hostname: "{{ romm_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ romm_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ romm_homepage_group }}"
          homepage.icon: "{{ romm_homepage_icon }}"
          homepage.href: "{{ romm_homepage_href }}"
          homepage.description: "{{ 'ROM manager and player' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ romm_container_name }}"
          homepage.showStats: "{{ romm_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ romm_port_http }}"
          homepage.widget.type: "romm"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ romm_port_http }}"
          homepage.widget.username: "{{ romm_homepage_widget_username }}"
          homepage.widget.password: "{{ romm_homepage_widget_password }}"
          homepage.widget.fields: "{{ romm_homepage_widget_fields }}"
          repliqate.enabled: "{{ romm_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ romm_repliqate_engine }}"
          repliqate.schedule: "{{ romm_repliqate_schedule }}"
          repliqate.backup_id: "{{ romm_repliqate_backup_id }}"
          repliqate.retention: "{{ romm_repliqate_retention }}"
          traefik.enable: "{{ romm_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.romm.rule: "Host(`{{ romm_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.romm.tls.certresolver: "letsencrypt"
          traefik.http.routers.romm.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.romm.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.romm.middlewares: "romm@docker{{ ',tinyauth-auth@docker' if romm_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.romm.IPAllowList.sourcerange: "{{ romm_traefik_whitelist }}"
          traefik.http.services.romm.loadbalancer.server.port: "8080"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/rommapp/romm/pkgs/container/romm"
        cpu_shares: "{{ romm_cpu_shares }}"
        memory: "{{ romm_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (romm_port_http | string)] +
                (['https://' + romm_hostname + '.' + ansible_nas_domain] if (romm_traefik_enabled is true or romm_dockflare_enabled is true) else [])
              }}
  when: romm_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ romm_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} Redis Container
      community.docker.docker_container:
        name: "{{ romm_redis_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ romm_db_container_name }}"
        state: absent
  when: romm_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ romm_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - romm_enabled is false