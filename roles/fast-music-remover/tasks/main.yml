---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create Fast {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ fast_music_remover_container_name }}"
        hostname: "{{ fast_music_remover_container_name }}"
        image: "{{ fast_music_remover_image_name }}:{{ fast_music_remover_image_tag }}"
        pull: true
        ports:
          - "{{ fast_music_remover_port_http }}:8080"
        network_mode: bridge
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ fast_music_remover_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ fast_music_remover_watchtower_enable }}"
          dockflare.enable: "{{ fast_music_remover_dockflare_tunnel }}"
          dockflare.access.group: "{{ fast_music_remover_dockflare_access_group }}"
          dockflare.hostname: "{{ fast_music_remover_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ fast_music_remover_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ fast_music_remover_homepage_group }}"
          homepage.href: "{{ fast_music_remover_homepage_href }}"
          homepage.icon: "{{ fast_music_remover_homepage_icon }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ fast_music_remover_port_http }}"
          homepage.description: "{{ 'lightweight music and noise remover for YouTube and other internet media, using DeepFilterNet for audio enhancement' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "fast_music_remover"
          homepage.showStats: "{{ fast_music_remover_homepage_showstats }}"
          repliqate.enabled: "false"
          traefik.enable: "{{ fast_music_remover_available_externally | string }}"
          traefik.http.routers.fastmusicremover.rule: "Host(`{{ fast_music_remover_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.fastmusicremover.tls.certresolver: "letsencrypt"
          traefik.http.routers.fastmusicremover.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.fastmusicremover.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.fastmusicremover.middlewares: "fastmusicremover@docker{{ ',tinyauth-auth@docker' if fast_music_remover_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.fastmusicremover.IPAllowList.sourcerange: "{{ fast_music_remover_traefik_whitelist }}"
          traefik.http.services.fastmusicremover.loadbalancer.server.port: "8080"
          wud.watch.digest: "true"
          wud.link.template: "https://github.com/omeryusufyagci/fast-music-remover"
        cpu_shares: "{{ fast_music_remover_cpu_shares }}"
        memory: "{{ fast_music_remover_memory }}"
        memory_swap: "{{ fast_music_remover_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (fast_music_remover_port_http | string)] +
                (['https://' + fast_music_remover_hostname + '.' + ansible_nas_domain] if (fast_music_remover_available_externally is true or fast_music_remover_dockflare_tunnel is true) else [])
              }}
  when: fast_music_remover_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ fast_music_remover_container_name }}"
        state: absent
  when: fast_music_remover_enabled is false
