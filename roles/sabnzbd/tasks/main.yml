---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ sabnzbd_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ sabnzbd_container_name }}"
        hostname: "{{ sabnzbd_container_name }}"
        image: "{{ sabnzbd_image_name }}:{{ sabnzbd_image_version }}"
        pull: true
        volumes:
          - "{{ sabnzbd_data_directory }}:/config:rw"
          - "{{ sabnzbd_downloads_directory }}:/downloads"
          - "{{ sabnzbd_incomplete_directory }}:/incomplete-downloads"
        ports:
          - "{{ sabnzbd_port }}:8080"
        env:
          PUID: "{{ sabnzbd_user_id }}"
          PGID: "{{ sabnzbd_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ sabnzbd_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ sabnzbd_watchtower_monitor_only }}"
          dockflare.enable: "{{ sabnzbd_dockflare_tunnel }}"
          dockflare.access.group: "{{ sabnzbd_dockflare_access_group }}"
          dockflare.hostname: "{{ sabnzbd_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ sabnzbd_port }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ sabnzbd_homepage_group }}"
          homepage.icon: "{{ sabnzbd_homepage_icon }}"
          homepage.href: "{{ sabnzbd_homepage_href }}"
          homepage.description: "{{ 'automated Usenet download tool' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ sabnzbd_container_name }}"
          homepage.showStats: "{{ sabnzbd_homepage_showStats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ sabnzbd_port }}"
          traefik.enable: "{{ sabnzbd_available_externally | string }}"
          traefik.http.routers.sabnzbd.rule: "Host(`{{ sabnzbd_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.sabnzbd.tls.certresolver: "letsencrypt"
          traefik.http.routers.sabnzbd.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.sabnzbd.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ sabnzbd_hostname }}"
          traefik.http.routers.sabnzbd.middlewares: "{{ sabnzbd_hostname }}@docker"
          traefik.http.middlewares.sabnzbd.IPAllowList.sourcerange: "{{ sabnzbd_traefik_whitelist }}"
          traefik.http.services.sabnzbd.loadbalancer.server.port: "8080"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://lscr.io/linuxserver/sabnzbd"
        cpu_shares: "{{ sabnzbd_cpu_shares }}"
        memory: "{{ sabnzbd_memory }}"
        restart_policy: unless-stopped
  when: sabnzbd_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ sabnzbd_container_name }}"
        state: absent
  when: sabnzbd_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ sabnzbd_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ sabnzbd_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: sabnzbd_enabled is false and archive_app_data_enabled is true
