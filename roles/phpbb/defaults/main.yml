---
# ANE
ansible_nas_app_name: "phpBB"
phpbb_enabled: false
phpbb_available_externally: false
phpbb_traefik_whitelist: "{{ lan }}"
phpbb_data_directory: "{{ docker_home }}/phpbb"

# network
phpbb_hostname: "phpbb"
phpbb_network_name: "phpbb"
phpbb_port_http: "8081"

# docker
phpbb_container_name: "phpbb"
# Legacy Bitnami image (no longer updated)
phpbb_image_name: "bitnamilegacy/phpbb-archived"
phpbb_image_tag: "sha256-eb5feb8d14b34aa8b6ebbdea3548b89d8427574f14f28709745cb01b48f099e0"
phpbb_cpu_shares: "1024"
phpbb_memory: "1g"
phpbb_db_container_name: "phpbb_mariadb"
# would like to migrate to lscr.io/linuxserver/mariadb https://docs.linuxserver.io/images/docker-mariadb/
#osclass_db_image_name: "lscr.io/linuxserver/mariadb"
phpbb_db_image_name: "bitnami/mariadb"
phpbb_db_image_tag: "latest"
phpbb_db_cpu_shares: "1024"
phpbb_db_memory: "1g"

# autoheal
phpbb_autoheal: "false"
phpbb_db_autoheal: "false"

# dockflare
phpbb_dockflare_tunnel: "false"
phpbb_dockflare_access_group: ""

# homepage
phpbb_homepage_group: "Apps"
phpbb_homepage_icon: "https://raw.githubusercontent.com/phpbb/phpbb/master/phpBB/styles/all/imgs/svg/phpbb_logo_large_cosmic.svg"
phpbb_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ phpbb_port_http }}"
phpbb_homepage_showstats: "false"
phpbb_db_homepage_group: "DBs"
phpbb_db_homepage_icon: "mariadb.png"
phpbb_db_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ phpbb_port_http }}"
phpbb_db_homepage_showstats: "false"

# watchtower
phpbb_watchtower_enable: "false"
phpbb_db_watchtower_enable: "false"