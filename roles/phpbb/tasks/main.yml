---
# ? Is there a better choice than the Bitnami images ?
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "1001"
        group: "1001"
      with_items:
        - "{{ phpbb_data_directory }}/phpbb"
        - "{{ phpbb_data_directory }}/db"

    - name: Create {{ ansible_nas_app_name }} network
      community.docker.docker_network:
        name: "{{ phpbb_network_name }}"

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ phpbb_db_container_name }}"
        hostname: "{{ phpbb_db_container_name }}"
        image: "{{ phpbb_db_image_name }}:{{ phpbb_db_image_tag }}"
        pull: true
        network_mode: bridge
        networks:
          - name: "{{ phpbb_network_name }}"
        networks_cli_compatible: "yes"
        volumes:
          - "{{ phpbb_data_directory }}/db:/bitnami/mariadb"
        env:
          ALLOW_EMPTY_PASSWORD: "yes"
          MARIADB_USER: "phpbb"
          MARIADB_PASSWORD: "topsecret"
          MARIADB_DATABASE: "phpbb_db"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ phpbb_db_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ phpbb_db_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} MariaDB"
          homepage.group: "{{ phpbb_db_homepage_group }}"
          homepage.icon: "{{ phpbb_db_homepage_icon }}"
          homepage.href: "{{ phpbb_db_homepage_href }}"
          homepage.description: "{{ 'MariaDB Server is a high performing open source relational database, forked from MySQL.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ phpbb_db_container_name }}"
          homepage.showStats: "{{ phpbb_db_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ phpbb_db_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ phpbb_db_repliqate_engine }}"
          repliqate.schedule: "{{ phpbb_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ phpbb_db_repliqate_backup_id }}"
          repliqate.retention: "{{ phpbb_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/bitnami/mariadb"
        cpu_shares: "{{ phpbb_db_cpu_shares }}"
        memory: "{{ phpbb_db_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ phpbb_container_name }}"
        hostname: "{{ phpbb_container_name }}"
        image: "{{ phpbb_image_name }}:{{ phpbb_image_tag }}"
        pull: true
        networks:
          - name: "{{ phpbb_network_name }}"
        networks_cli_compatible: "yes"
        network_mode: bridge
        ports:
          - "{{ phpbb_port_http }}:8080"
        volumes:
          - "{{ phpbb_data_directory }}/phpbb:/bitnami/phpbb"
        env:
          ALLOW_EMPTY_PASSWORD: "yes"
          PHPBB_DATABASE_USER: "phpbb"
          PHPBB_DATABASE_PASSWORD: "topsecret"
          PHPBB_DATABASE_NAME: "phpbb_db"
          PHPBB_DATABASE_HOST: "{{ phpbb_db_container_name }}"
          PHPBB_FORUM_SERVER_PROTOCOL: "http://"
          TZ: "{{ ansible_nas_timezone }}"
        links:
          - "{{ phpbb_db_container_name }}"
        labels:
          autoheal: "{{ phpbb_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ phpbb_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ phpbb_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ phpbb_dockflare_access_group }}"
          dockflare.hostname: "{{ phpbb_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ phpbb_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ phpbb_homepage_group }}"
          homepage.icon: "{{ phpbb_homepage_icon }}"
          homepage.href: "{{ phpbb_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ phpbb_port_http }}"
          homepage.description: "{{ 'phpBB is a popular open-source bulletin board written in PHP.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ phpbb_container_name }}"
          homepage.showStats: "{{ phpbb_homepage_showstats | ternary('true', 'false') }}"
          traefik.enable: "{{ phpbb_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.phpbb.rule: "Host(`{{ phpbb_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.phpbb.tls.certresolver: "letsencrypt"
          traefik.http.routers.phpbb.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.phpbb.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.phpbb.middlewares: "phpbb@docker{{ ',tinyauth-auth@docker' if phpbb_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.phpbb.IPAllowList.sourcerange: "{{ phpbb_traefik_whitelist }}"
          traefik.http.services.phpbb.loadbalancer.server.port: "8080"
          repliqate.enabled: "{{ phpbb_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ phpbb_repliqate_engine }}"
          repliqate.schedule: "{{ phpbb_repliqate_schedule }}"
          repliqate.backup_id: "{{ phpbb_repliqate_backup_id }}"
          repliqate.retention: "{{ phpbb_repliqate_retention }}"
          wud.watch.digest: "true"
          wud.link.template: "https://hub.docker.com/r/bitnamilegacy/phpbb-archived"
        cpu_shares: "{{ phpbb_cpu_shares }}"
        memory: "{{ phpbb_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (phpbb_port_http | string)] +
                (['https://' + phpbb_hostname + '.' + ansible_nas_domain] if (phpbb_traefik_enabled is true or phpbb_dockflare_enabled is true) else [])
              }}
  when: phpbb_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ phpbb_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ phpbb_db_container_name }}"
        state: absent
  when: phpbb_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ phpbb_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - phpbb_enabled is false