---
- name: Start {{ scrutiny_proper_name }}
  block:
    - name: Create {{ scrutiny_proper_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ scrutiny_data_directory }}"
        - "{{ scrutiny_data_directory }}/config"
        - "{{ scrutiny_data_directory }}/influxdb"

    - name: Set {{ scrutiny_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        scrutiny_homepage_href: "https://{{ scrutiny_hostname }}.{{ ansible_nas_domain }}"
      when: scrutiny_traefik_enabled | bool or scrutiny_dockflare_enabled | bool

    - name: Install {{ scrutiny_proper_name }} smartmontools
      apt:
        name: "smartmontools"
        state: present
      register: result
      until: result is succeeded

    - name: Template {{ scrutiny_proper_name }} scrutiny.yaml
      template:
        src: scrutiny.yaml
        dest: "{{ scrutiny_data_directory }}/config/scrutiny.yaml"
      register: template_config

    - name: Detect {{ scrutiny_proper_name }} storage devices
      set_fact:
        scrutiny_devices: "{{ ansible_facts.devices.keys() 
          | select('match', '^(sd[a-z]|nvme[0-9]n[0-9])') 
          | map('regex_replace', '^(.*)$', '/dev/\\1:/dev/\\1') 
          | list }}"
      when: scrutiny_devices is undefined

    - name: Create {{ scrutiny_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ scrutiny_container_name }}"
        hostname: "{{ scrutiny_container_name }}"
        image: "{{ scrutiny_image_name }}:{{ scrutiny_image_tag }}"
        pull: true
        ports:
          - "{{ scrutiny_port_http }}:8080"
        volumes:
          - "{{ scrutiny_data_directory }}/config:/opt/scrutiny/config"
          - "{{ scrutiny_data_directory }}/influxdb:/opt/scrutiny/influxdb"
          - "/run/udev:/run/udev:ro"
          - "/dev:/dev:ro"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: "{{ scrutiny_healthcheck_test }}"
          interval: "{{ scrutiny_healthcheck_interval }}"
          timeout: "{{ scrutiny_healthcheck_timeout }}"
          retries: "{{ scrutiny_healthcheck_retries }}"
          start_period: "{{ scrutiny_healthcheck_start_period }}"
        labels:
          autoheal: "{{ scrutiny_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ scrutiny_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ scrutiny_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ scrutiny_dockflare_access_group }}"
          dockflare.hostname: "{{ scrutiny_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ scrutiny_port_http }}"
          homepage.name: "{{ scrutiny_proper_name }}"
          homepage.group: "{{ scrutiny_homepage_group }}"
          homepage.href: "{{ scrutiny_homepage_href }}"
          homepage.icon: "{{ scrutiny_homepage_icon }}"
          homepage.description: "{{ 'Hard Drive S.M.A.R.T Monitoring, Historical Trends & Real World Failure Thresholds' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ scrutiny_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ scrutiny_container_name }}"
          homepage.showStats: "{{ scrutiny_homepage_showstats | ternary('true', 'false') }}"
          homepage.widget.type: "scrutiny"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ scrutiny_port_http }}"
          repliqate.enabled: "{{ scrutiny_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ scrutiny_repliqate_engine }}"
          repliqate.schedule: "{{ scrutiny_repliqate_schedule }}"
          repliqate.backup_id: "{{ scrutiny_repliqate_backup_id }}"
          repliqate.retention: "{{ scrutiny_repliqate_retention }}"
          traefik.enable: "{{ scrutiny_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.scrutiny.rule: "Host(`{{ scrutiny_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.scrutiny.tls.certresolver: "letsencrypt"
          traefik.http.routers.scrutiny.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.scrutiny.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.scrutiny.middlewares: "{{ scrutiny_hostname }}@docker{{ ',tinyauth-auth@docker' if scrutiny_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.scrutiny.IPAllowList.sourcerange: "{{ scrutiny_traefik_whitelist }}"
          traefik.http.services.scrutiny.loadbalancer.server.port: "8080"
          wud.tag.include: '^v\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/AnalogJ/scrutiny/pkgs/container/scrutiny"
        capabilities:
          - SYS_RAWIO
          - SYS_ADMIN # NVMe support
        cpu_shares: "{{ scrutiny_cpu_shares }}"
        devices: "{{ scrutiny_devices }}"
        memory: "{{ scrutiny_memory }}"
        memory_swap: "{{ scrutiny_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ scrutiny_proper_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (scrutiny_port_http | string)] +
                (['https://' + scrutiny_hostname + '.' + ansible_nas_domain] if (scrutiny_traefik_enabled is true or scrutiny_dockflare_enabled is true) else [])
              }}
  when: scrutiny_enabled is true

- name: Stop {{ scrutiny_proper_name }}
  block:
    - name: Stop {{ scrutiny_proper_name }} Container
      community.docker.docker_container:
        name: "{{ scrutiny_container_name }}"
        state: absent
  when: scrutiny_enabled is false

- name: Data Archive {{ scrutiny_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ scrutiny_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - scrutiny_enabled is false