---
ansible_nas_app_name: "Scrutiny"

# enable or disable the application
scrutiny_enabled: false
scrutiny_available_externally: false
scrutiny_traefik_whitelist: "{{ lan }}"

# directories
scrutiny_data_directory: "{{ docker_home }}/scrutiny"

# uid / gid
scrutiny_user_id: "0"
scrutiny_group_id: "0"

# network
scrutiny_hostname: "scrutiny"
scrutiny_port: "8085"
scrutiny_influxdb_port: "8086"

# notifications
#   - "discord://token@channel"
scrutiny_notification_discord: ""
#   - "telegram://token@telegram?channels=channel-1[,channel-2,...]"
scrutiny_notification_telegram: ""
#   - "pushover://shoutrrr:apiToken@userKey/?priority=1&devices=device1[,device2, ...]"
scrutiny_notification_pushover: ""
#   - "slack://[botname@]token-a/token-b/token-c"
scrutiny_notification_slack: ""
#   - "smtp://username:password@host:port/?fromAddress=fromAddress&toAddresses=recipient1[,recipient2,...]"
scrutiny_notification_smtp: ""
#   - "teams://token-a/token-b/token-c"
scrutiny_notification_teams: ""
#   - "gotify://gotify-host/token"
scrutiny_notification_gotify: ""
#   - "pushbullet://api-token[/device/#channel/email]"
scrutiny_notification_pushbullet: ""
#   - "ifttt://key/?events=event1[,event2,...]&value1=value1&value2=value2&value3=value3"
scrutiny_notification_ifttt: ""
#   - "mattermost://[username@]mattermost-host/token[/channel]"
scrutiny_notification_mattermost: ""
#   - "ntfy://username:password@host:port/topic"
scrutiny_notification_ntfy: ""
#   - "hangouts://chat.googleapis.com/v1/spaces/FOO/messages?key=bar&token=baz"
scrutiny_notification_hangouts: ""
#   - "zulip://bot-mail:bot-key@zulip-domain/?stream=name-or-id&topic=name"
scrutiny_notification_zulip: ""
#   - "join://shoutrrr:api-key@join/?devices=device1[,device2, ...][&icon=icon][&title=title]"
scrutiny_notification_shoutrrr: ""
#   - "script:///file/path/on/disk"
scrutiny_notification_script: ""
#   - "https://www.example.com/path"
scrutiny_notification_https: ""

# disks
scrutiny_devices:
 - /dev/sda:/dev/sda

# docker
scrutiny_container_name: "scrutiny"
scrutiny_cpu_shares: "1024"
scrutiny_image_name: "ghcr.io/analogj/scrutiny"
scrutiny_image_tag: "master-omnibus"
scrutiny_memory: "256m"

# autoheal
scrutiny_autoheal: "false"

# dockflare
scrutiny_dockflare_tunnel: "false"
scrutiny_dockflare_access_group: ""

# homepage
scrutiny_homepage_group: "Apps"
scrutiny_homepage_icon: "scrutiny.png"
scrutiny_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ scrutiny_port }}"
scrutiny_homepage_showStats: "false"

# watchtower
scrutiny_watchtower_monitor_only: "true"