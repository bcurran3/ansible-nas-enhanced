---
# ANE
ansible_nas_app_name: "Scrutiny"
scrutiny_enabled: false
scrutiny_available_externally: false
scrutiny_traefik_whitelist: "{{ lan }}"
scrutiny_data_directory: "{{ docker_home }}/scrutiny"

# uid / gid
scrutiny_user_id: "0"
scrutiny_group_id: "0"

# network
scrutiny_hostname: "scrutiny"
scrutiny_port_http: "9010"
scrutiny_influxdb_port: "8086"

# notifications
scrutiny_notification_discord: ""    # "discord://token@channel"
scrutiny_notification_gotify: ""     # "gotify://gotify-host/token"
scrutiny_notification_hangouts: ""   # "hangouts://chat.googleapis.com/v1/spaces/FOO/messages?key=bar&token=baz"
scrutiny_notification_https: ""      # "https://www.example.com/path"
scrutiny_notification_ifttt: ""      # "ifttt://key/?events=event1[,event2,...]&value1=value1&value2=value2&value3=value3"
scrutiny_notification_mattermost: "" # "mattermost://[username@]mattermost-host/token[/channel]"
scrutiny_notification_ntfy: ""       # "ntfy://username:password@host:port/topic"
scrutiny_notification_pushbullet: "" # "pushbullet://api-token[/device/#channel/email]"
scrutiny_notification_pushover: ""   # "pushover://shoutrrr:apiToken@userKey/?priority=1&devices=device1[,device2, ...]"
scrutiny_notification_script: ""     # "script:///file/path/on/disk"
scrutiny_notification_shoutrrr: ""   # "join://shoutrrr:api-key@join/?devices=device1[,device2, ...][&icon=icon][&title=title]"
scrutiny_notification_slack: ""      # "slack://[botname@]token-a/token-b/token-c"
scrutiny_notification_smtp: ""       # "smtp://username:password@host:port/?fromAddress=fromAddress&toAddresses=recipient1[,recipient2,...]"
scrutiny_notification_teams: ""      # "teams://token-a/token-b/token-c"
scrutiny_notification_telegram: ""   # "telegram://token@telegram?channels=channel-1[,channel-2,...]"
scrutiny_notification_zulip: ""      # "zulip://bot-mail:bot-key@zulip-domain/?stream=name-or-id&topic=name"

# disks
scrutiny_devices:
 - /dev/sda:/dev/sda

# docker
scrutiny_container_name: "scrutiny"
scrutiny_cpu_shares: "1024"
scrutiny_image_name: "ghcr.io/analogj/scrutiny"
scrutiny_image_tag: "master-omnibus"
scrutiny_memory: "256m"

# autoheal
scrutiny_autoheal: "false"

# dockflare
scrutiny_dockflare_tunnel: "false"
scrutiny_dockflare_access_group: ""

# homepage
scrutiny_homepage_group: "Apps"
scrutiny_homepage_icon: "scrutiny.png"
scrutiny_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ scrutiny_port_http }}"
scrutiny_homepage_showstats: "false"

# repliqate
scrutiny_repliqate_enabled: "false"
scrutiny_repliqate_engine: "restic"
scrutiny_repliqate_schedule: "@daily 3am"
scrutiny_repliqate_backup_id: "{{ scrutiny_container_name }}"
scrutiny_repliqate_retention: "30d"

# watchtower
scrutiny_watchtower_enable: "false"