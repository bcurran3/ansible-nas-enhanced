---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ jackett_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ jackett_container_name }}"
        hostname: "{{ jackett_container_name }}"
        image: "{{ jackett_image_name }}:{{ jackett_image_version }}"
        pull: true
        volumes:
          - "{{ jackett_data_directory }}:/config:rw"
          - "/etc/localtime:/etc/localtime:ro"
          - "{{ jackett_torrents_root }}:/downloads"
        ports:
          - "{{ jackett_port_http }}:9117"
        env:
          DOCKER_MODS: "{{ jackett_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ jackett_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ jackett_env_docker_mods_install_pip_packages}}"
          TP_DOMAIN: "{{ jackett_env_docker_mods_tp_domain }}"
          TP_THEME: "{{ jackett_env_docker_mods_tp_theme }}"
          TP_COMMUNITY_THEME: "{{ jackett_env_docker_mods_tp_community_theme }}"
          TP_ADDON: "{{ jackett_env_docker_mods_tp_addon }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ jackett_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ jackett_watchtower_enable }}"
          dockflare.enable: "{{ jackett_dockflare_tunnel }}"
          dockflare.access.group: "{{ jackett_dockflare_access_group }}"
          dockflare.hostname: "{{ jackett_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ jackett_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ jackett_homepage_group }}"
          homepage.icon: "{{ jackett_homepage_icon }}"
          homepage.href: "{{ jackett_homepage_href }}"
          homepage.description: "{{ 'API Support for your favorite torrent trackers' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ jackett_container_name }}"
          homepage.showStats: "{{ jackett_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ jackett_port_http }}"
          repliqate.enabled: "{{ jackett_repliqate_enabled }}"
          repliqate.engine: "{{ jackett_repliqate_engine }}"
          repliqate.schedule: "{{ jackett_repliqate_schedule }}"
          repliqate.backup_id: "{{ jackett_repliqate_backup_id }}"
          repliqate.retention: "{{ jackett_repliqate_retention }}"
          traefik.enable: "{{ jackett_available_externally | string }}"
          traefik.http.routers.jackett.rule: "Host(`{{ jackett_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.jackett.tls.certresolver: "letsencrypt"
          traefik.http.routers.jackett.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.jackett.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ jackett_hostname }}"
          traefik.http.routers.jackett.middlewares: "{{ jackett_hostname }}@docker"
          traefik.http.middlewares.jackett.IPAllowList.sourcerange: "{{ jackett_traefik_whitelist }}"
          traefik.http.services.jackett.loadbalancer.server.port: "9117"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "lscr.io/linuxserver/jackett"
        cpu_shares: "{{ jackett_cpu_shares }}"
        memory: "{{ jackett_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (jackett_port_http | string)] +
                (['https://' + jackett_hostname + '.' + ansible_nas_domain] if (jackett_available_externally is true or jackett_dockflare_tunnel is true) else [])
              }}
  when: jackett_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ jackett_container_name }}"
        state: absent
  when: jackett_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ jackett_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - jackett_enabled is false