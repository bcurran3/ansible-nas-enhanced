# https://bitmagnet.io/setup/installation.html
---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ bitmagnet_data_directory }}"
        - "{{ bitmagnet_data_directory }}/config"
        - "{{ bitmagnet_data_directory }}/db"

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ bitmagnet_db_container_name }}"
        hostname: "{{ bitmagnet_db_container_name }}"
        image: "{{ bitmagnet_db_image_name }}:{{ bitmagnet_db_image_tag }}"
        pull: true
        volumes:
          - "{{ bitmagnet_data_directory }}/db:/var/lib/postgresql/data"
        env:
          POSTGRES_PASSWORD: "bitmagnet"
          POSTGRES_DB: "bitmagnet"
          PGUSER: "postgres"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test:
            - CMD-SHELL
            - pg_isready
          start_period: 20s
          interval: 10s
        labels:
          autoheal: "{{ bitmagnet_db_autoheal | string }}"
          com.centurylinklabs.watchtower.enable: "{{ bitmagnet_db_watchtower_enabled | string }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} PostgreSQL"
          homepage.group: "{{ bitmagnet_db_homepage_group }}"
          homepage.icon: "{{ bitmagnet_db_homepage_icon }}"
          homepage.href: "{{ bitmagnet_homepage_href }}"
          homepage.description: "{{ 'PostgreSQL' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ bitmagnet_db_container_name }}"
          homepage.showStats: "{{ bitmagnet_db_homepage_showstats | string }}"
          repliqate.enabled: "{{ bitmagnet_db_repliqate_enabled | string }}"
          repliqate.engine: "{{ bitmagnet_db_repliqate_engine }}"
          repliqate.schedule: "{{ bitmagnet_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ bitmagnet_db_repliqate_backup_id }}"
          repliqate.retention: "{{ bitmagnet_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/postgres/postgres/tag/$${major}.$${minor}.$${patch}"
        cpu_shares: "{{ bitmagnet_db_cpu_shares }}"
        memory: "{{ bitmagnet_db_memory }}"
        memory_swap: "{{ bitmagnet_db_memory_swap }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ bitmagnet_container_name }}"
        hostname: "{{ bitmagnet_container_name }}"
        image: "{{ bitmagnet_image_name }}:{{ bitmagnet_image_tag }}"
        pull: true
        volumes:
          - "{{ bitmagnet_data_directory }}/config:/root/.config/bitmagnet"
        links:
          - "{{ bitmagnet_db_container_name }}"
        ports:
          - "{{ bitmagnet_port_http }}:3333"
          - "{{ bitmagnet_port_http2 }}:3334"
          - "{{ bitmagnet_port_http2 }}:3334/udp"
        env:
          POSTGRES_HOST: "{{ bitmagnet_db_container_name }}"
          POSTGRES_PASSWORD: "bitmagnet"
          TMDB_API_KEY: "{{ bitmagnet_tmdb_api_key }}"
          TZ: "{{ ansible_nas_timezone }}"
        command: worker run --keys=http_server --keys=queue_server --keys=dht_crawler
        labels:
          autoheal: "{{ bitmagnet_autoheal | string }}"
          com.centurylinklabs.watchtower.enable: "{{ bitmagnet_watchtower_enabled | string }}"
          dockflare.enable: "{{ bitmagnet_dockflare_enabled | string }}"
          dockflare.access.group: "{{ bitmagnet_dockflare_access_group }}"
          dockflare.hostname: "{{ bitmagnet_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ bitmagnet_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ bitmagnet_homepage_group }}"
          homepage.icon: "{{ bitmagnet_homepage_icon }}"
          homepage.href: "{{ bitmagnet_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ bitmagnet_port_http }}"
          homepage.description: "{{ 'A self-hosted BitTorrent indexer, DHT crawler, content classifier and torrent search engine with web UI, GraphQL API and Servarr stack integration.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ bitmagnet_container_name }}"
          homepage.showStats: "{{ bitmagnet_homepage_showstats | string }}"
          repliqate.enabled: "{{ bitmagnet_repliqate_enabled | string }}"
          repliqate.engine: "{{ bitmagnet_repliqate_engine }}"
          repliqate.schedule: "{{ bitmagnet_repliqate_schedule }}"
          repliqate.backup_id: "{{ bitmagnet_repliqate_backup_id }}"
          repliqate.retention: "{{ bitmagnet_repliqate_retention }}"
          traefik.enable: "{{ bitmagnet_available_externally | string }}"
          traefik.http.routers.bitmagnet.rule: "Host(`{{ bitmagnet_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.bitmagnet.tls.certresolver: "letsencrypt"
          traefik.http.routers.bitmagnet.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.bitmagnet.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.bitmagnet.middlewares: "bitmagnet@docker{{ ',tinyauth-auth@docker' if bitmagnet_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.bitmagnet.IPAllowList.sourcerange: "{{ bitmagnet_traefik_whitelist }}"
          traefik.http.services.bitmagnet.loadbalancer.server.port: "3333"
          wud.tag.include: '^v?\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/bitmagnet-io/bitmagnet/releases"
        cpu_shares: "{{ bitmagnet_cpu_shares }}"
        memory: "{{ bitmagnet_memory }}"
        memory_swap: "{{ bitmagnet_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (bitmagnet_port_http | string)] +
                (['https://' + bitmagnet_hostname + '.' + ansible_nas_domain] if (bitmagnet_available_externally is true or bitmagnet_dockflare_enabled is true) else [])
              }}
  when: bitmagnet_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ bitmagnet_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ bitmagnet_db_container_name }}"
        state: absent
  when: bitmagnet_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ bitmagnet_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - bitmagnet_enabled is false