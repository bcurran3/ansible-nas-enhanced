---
# ANE
ansible_nas_app_name: "What's Running"
whatsrunning_enabled: false
whatsrunning_traefik_enabled: false
whatsrunning_traefik_whitelist: "{{ lan }}"

# network
whatsrunning_hostname: "whatsrunning"
whatsrunning_port_http: "3411"

# docker
whatsrunning_container_name: "whatsrunning"
whatsrunning_image_name: "mikeage/whatsrunning"
whatsrunning_image_tag: "latest"

# specs
whatsrunning_cpu_shares: 1024
whatsrunning_memory: "256M"
whatsrunning_memory_swap: -1

# app
whatsrunning_env_host_hostname: "{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}"
whatsrunning_env_verbose: "true"

# autoheal
whatsrunning_autoheal_enabled: false

# dockflare
whatsrunning_dockflare_enabled: false
whatsrunning_dockflare_access_group: ""

# healthcheck
whatsrunning_healthcheck_test: ["CMD", "python3", "-c", "import socket; s = socket.socket(socket.AF_INET, socket.SOCK_STREAM); s.settimeout(2); s.connect(('127.0.0.1', 5000))"]
whatsrunning_healthcheck_interval: 1m
whatsrunning_healthcheck_timeout: 10s
whatsrunning_healthcheck_retries: 3
whatsrunning_healthcheck_start_period: 20s

# homepage
whatsrunning_homepage_group: "Apps"
whatsrunning_homepage_icon: "docker.png"
whatsrunning_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ whatsrunning_port_http }}"
whatsrunning_homepage_showstats: false

# tinyauth
whatsrunning_tinyauth_enabled: false

# watchtower
whatsrunning_watchtower_enabled: true