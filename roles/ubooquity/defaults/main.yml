---
# ANE
ansible_nas_app_name: "Ubooquity"
ubooquity_enabled: false
ubooquity_available_externally: false
ubooquity_traefik_whitelist: "{{ lan }}"

# uid / gid
ubooquity_user_id: "0"
ubooquity_group_id: "0"

# Directories
ubooquity_data_directory: "{{ docker_home }}/ubooquity"

# Networking
ubooquity_port_webui: "2202"
ubooquity_port_admin: "2203"
ubooquity_hostname: ubooquity

# Container
ubooquity_memory: 1g
ubooquity_container_name: "ubooquity"
ubooquity_image_name: "lscr.io/linuxserver/ubooquity"
ubooquity_image_version: "latest"
ubooquity_cpu_shares: 1024
ubooquity_env_docker_mods: ""

# autoheal
ubooquity_autoheal: "false"

# dockflare
ubooquity_dockflare_tunnel: "false"
ubooquity_dockflare_access_group: ""

# homepage
ubooquity_homepage_group: "Media Servers"
ubooquity_homepage_icon: "ubooquity.png"
ubooquity_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ ubooquity_port }}"
ubooquity_homepage_showstats: "false"

# watchtower
ubooquity_watchtower_enable: "false"