---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ ubooquity_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ ubooquity_container_name }}"
        hostname: "{{ ubooquity_container_name }}"
        image: "{{ ubooquity_image_name }}:{{ ubooquity_image_version }}"
        pull: true
        volumes:
          - "{{ ubooquity_data_directory }}/config:/config:rw"
          - "{{ ubooquity_data_directory }}/files:/files:rw"
          - "{{ books_root }}:/books"
          - "{{ comics_root }}:/comics"
        env:
          DOCKER_MODS: "{{ ubooquity_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ ubooquity_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ ubooquity_env_docker_mods_install_pip_packages}}"
          PUID: "{{ ubooquity_user_id }}"
          PGID: "{{ ubooquity_group_id }}"
          MAXMEM: "1024"
          TZ: "{{ ansible_nas_timezone }}"
        ports:
          - "{{ ubooquity_port_http }}:2202"
          - "{{ ubooquity_port_admin }}:2203"
        labels:
          autoheal: "{{ ubooquity_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ ubooquity_watchtower_enable }}"
          dockflare.enable: "{{ ubooquity_dockflare_tunnel }}"
          dockflare.access.group: "{{ ubooquity_dockflare_access_group }}"
          dockflare.hostname: "{{ ubooquity_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ ubooquity_port_http }}/ubooquity"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ ubooquity_homepage_group }}"
          homepage.icon: "{{ ubooquity_homepage_icon }}"
          homepage.href: "{{ ubooquity_homepage_href }}"
          homepage.description: "{{ 'free, lightweight and easy-to-use home server for your comics and ebooks' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ ubooquity_container_name }}"
          homepage.showStats: "{{ ubooquity_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ ubooquity_port_http }}/ubooquity"
          repliqate.enabled: "{{ ubooquity_repliqate_enabled }}"
          repliqate.engine: "{{ ubooquity_repliqate_engine }}"
          repliqate.schedule: "{{ ubooquity_repliqate_schedule }}"
          repliqate.backup_id: "{{ ubooquity_repliqate_backup_id }}"
          repliqate.retention: "{{ ubooquity_repliqate_retention }}"
          traefik.enable: "{{ ubooquity_available_externally | string }}"
          traefik.http.routers.ubooquity.rule: "Host(`{{ ubooquity_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.ubooquity.tls.certresolver: "letsencrypt"
          traefik.http.routers.ubooquity.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.ubooquity.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ ubooquity_hostname }}"
          traefik.http.routers.ubooquity.middlewares: "{{ ubooquity_hostname }}@docker"
          traefik.http.middlewares.ubooquity.IPAllowList.sourcerange: "{{ ubooquity_traefik_whitelist }}"
          traefik.http.services.ubooquity.loadbalancer.server.port: "2202"
          wud.tag.include: '^version-\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "lscr.io/linuxserver/ubooquity"
        cpu_shares: "{{ ubooquity_cpu_shares }}"
        memory: "{{ ubooquity_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
            {{
              ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (ubooquity_port_http | string) + '/ubooquity'] +
              (['https://' + ubooquity_hostname + '.' + ansible_nas_domain + '/ubooquity'] if (ubooquity_available_externally is true or ubooquity_dockflare_tunnel is true) else [])
            }}
  when: ubooquity_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ ubooquity_container_name }}"
        state: absent
  when: ubooquity_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ ubooquity_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ ubooquity_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: ubooquity_enabled is false and archive_app_data_enabled is true
