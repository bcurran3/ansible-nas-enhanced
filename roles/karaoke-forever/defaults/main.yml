---
# ANE
ansible_nas_app_name: "Karaoke-Forever"
karaokeforever_enabled: false
karaokeforever_available_externally: false
karaokeforever_traefik_whitelist: "{{ lan }}"

# network
karaokeforever_hostname: "karaokeforever"
karaokeforever_port_http: "8095"

# app config
karaokeforever_cdgfiles: "{{ music_root }}/karaoke"

# docker
karaokeforever_container_name: "karaoke-forever"
karaokeforever_image_name: "david510c/karaoke-forever"
karaokeforever_image_tag: "latest"
karaokeforever_cpu_shares: "1024"
karaokeforever_memory: "512m"

# autoheal
karaokeforever_autoheal: "false"

# dockflare
karaokeforever_dockflare_tunnel: "false"
karaokeforever_dockflare_access_group: ""

# homepage
karaokeforever_homepage_group: "Apps"
karaokeforever_homepage_icon: "karaokeforever.png"
karaokeforever_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ karaokeforever_port_http }}"
karaokeforever_homepage_showstats: "false"

# repliqate
karaokeforever_repliqate_enabled: "false"
karaokeforever_repliqate_engine: "restic"
karaokeforever_repliqate_schedule: "@daily 3am"
karaokeforever_repliqate_backup_id: "karaokeforever"
karaokeforever_repliqate_retention: "30d"

# watchtower
karaokeforever_watchtower_enable: "false"