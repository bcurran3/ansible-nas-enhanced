---
# ANE
ansible_nas_app_name: "Karaoke-Forever"
karaoke_forever_enabled: false
karaoke_forever_available_externally: false
karaoke_forever_traefik_whitelist: "{{ lan }}"

# network
karaoke_forever_hostname: "karaoke_forever"
karaoke_forever_port_http: "9018"

# app config
karaoke_forever_cdgfiles: "{{ music_root }}/karaoke"

# docker
karaoke_forever_container_name: "karaoke-forever"
karaoke_forever_image_name: "david510c/karaoke-forever"
karaoke_forever_image_tag: "latest"
karaoke_forever_cpu_shares: 1024
karaoke_forever_memory: "512M"

# autoheal
karaoke_forever_autoheal: "false"

# dockflare
karaoke_forever_dockflare_tunnel: "false"
karaoke_forever_dockflare_access_group: ""

# homepage
karaoke_forever_homepage_group: "Apps"
karaoke_forever_homepage_icon: "karaoke_forever.png"
karaoke_forever_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ karaoke_forever_port_http }}"
karaoke_forever_homepage_showstats: "false"

# repliqate
karaoke_forever_repliqate_enabled: "false"
karaoke_forever_repliqate_engine: "restic"
karaoke_forever_repliqate_schedule: "@daily 3am"
karaoke_forever_repliqate_backup_id: "{{ karaoke_forever_container_name }}"
karaoke_forever_repliqate_retention: "30d"

# watchtower
karaoke_forever_watchtower_enable: "false"