---
# ANE
ansible_nas_app_name: "Music Assistant"
music_assistant_enabled: false
music_assistant_traefik_enabled: false
music_assistant_traefik_whitelist: "{{ lan }}"

# directories
music_assistant_data_directory: "{{ docker_home }}/music-assistant"
music_assistant_audiobooks_directory: "{{ audiobooks_root }}"
music_assistant_music_directory: "{{ music_root }}"
music_assistant_podcasts_directory: "{{ podcasts_root }}"

# network
music_assistant_hostname: "musicassistant"
music_assistant_port_http: "8095"

# docker
music_assistant_container_name: "music-assistant"
music_assistant_image_name: "ghcr.io/music-assistant/server"
music_assistant_image_tag: "latest"

# specs
music_assistant_cpu_shares: 1024
# Minimum (Idle): 512 MB – 1 GB (Python baseline).
# Recommended (Standard): 2 GB (Required for stability during playback/scanning).
# Performance (Heavy DSP/Flow Mode): 4 GB+ (If you use "Flow Mode" to crossfade tracks or have a massive local library).
music_assistant_memory: "2G"
music_assistant_memory_swap: -1

# autoheal
music_assistant_autoheal_enabled: false

# healthcheck
music_assistant_healthcheck_test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:{{ music_assistant_port_http }}/ || [ $? -eq 8 ]"]
music_assistant_healthcheck_interval: 30s
music_assistant_healthcheck_timeout: 10s
music_assistant_healthcheck_retries: 3
music_assistant_healthcheck_start_period: 45s

# homepage
music_assistant_homepage_group: "Media Servers"
music_assistant_homepage_icon: "music-assistant.png"
music_assistant_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ music_assistant_port_http }}"
music_assistant_homepage_showstats: false

# repliqate
music_assistant_repliqate_enabled: false
music_assistant_repliqate_engine: "restic"
music_assistant_repliqate_schedule: "@daily 3am"
music_assistant_repliqate_backup_id: "{{ music_assistant_container_name }}"
music_assistant_repliqate_retention: "30d"

# tinyauth
music_assistant_tinyauth_enabled: false

# watchtower
music_assistant_watchtower_enabled: false