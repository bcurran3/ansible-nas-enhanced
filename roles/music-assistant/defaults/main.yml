---
# ANE
ansible_nas_app_name: "Music Assistant"
music_assistant_enabled: false
music_assistant_available_externally: false
music_assistant_traefik_whitelist: "{{ lan }}"
music_assistant_data_directory: "{{ docker_home }}/music-assistant"

# network
music_assistant_hostname: "musicassistant"
music_assistant_port_http: "8095"

# docker
music_assistant_container_name: "music-assistant"
music_assistant_image_name: "ghcr.io/music-assistant/server"
music_assistant_image_tag: "latest"

# specs
music_assistant_cpu_shares: 1024
music_assistant_memory: "1G"

# autoheal
music_assistant_autoheal: "false"

# homepage
music_assistant_homepage_group: "Apps"
music_assistant_homepage_icon: "music-assistant.png"
music_assistant_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ music_assistant__port_tcp }}"
music_assistant_homepage_showstats: "false"

# repliqate
music_assistant_repliqate_enabled: "false"
music_assistant_repliqate_engine: "restic"
music_assistant_repliqate_schedule: "@daily 3am"
music_assistant_repliqate_backup_id: "{{ music_assistant_container_name }}"
music_assistant_repliqate_retention: "30d"

# watchtower
music_assistant_watchtower_enable: "false"