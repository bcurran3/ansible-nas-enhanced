---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ titra_data_directory }}"
        - "{{ titra_data_directory }}/db"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        titra_env_root_url: "https://{{ titra_hostname }}.{{ ansible_nas_domain }}"
        titra_homepage_href: "https://{{ titra_hostname }}.{{ ansible_nas_domain }}"
      when: titra_traefik_enabled | bool or titra_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ titra_db_container_name }}"
        hostname: "{{ titra_db_container_name }}"
        image: "{{ titra_db_image_name }}:{{ titra_db_image_tag }}"
        pull: true
        volumes:
          - "{{ titra_data_directory }}/db:/data/db"
        env:
          MONGO_DB: "titra"
          TZ: "{{ ansible_nas_timezone }}"
        healthcheck:
          test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
          interval: 10s
          timeout: 5s
          retries: 3
          start_period: 5s
        labels:
          autoheal: "{{ titra_db_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ titra_db_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} MongoDB"
          homepage.group: "{{ titra_db_homepage_group }}"
          homepage.icon: "{{ titra_db_homepage_icon }}"
          homepage.href: "{{ titra_homepage_href }}"
          homepage.description: "{{ 'The Database for Secure Apps' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ titra_db_container_name }}"
          homepage.showStats: "{{ titra_db_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ titra_db_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ titra_db_repliqate_engine }}"
          repliqate.schedule: "{{ titra_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ titra_db_repliqate_backup_id }}"
          repliqate.retention: "{{ titra_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/mongo"
        cpu_shares: "{{ titra_db_cpu_shares }}"
        memory: "{{ titra_db_memory }}"
        memory_swap: "{{ titra_db_memory_swap }}"
        restart_policy: unless-stopped

    - name: Verify {{ ansible_nas_app_name }} DB is healthy
      community.docker.docker_container_info:
        name: "{{ titra_db_container_name }}"
      register: db_info
      until: "db_info.container.State.Health.Status == 'healthy'"
      retries: 30
      delay: 5

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ titra_container_name }}"
        hostname: "{{ titra_container_name }}"
        image: "{{ titra_image_name }}:{{ titra_image_tag }}"
        pull: true
        ports:
          - "{{ titra_port_http }}:{{ titra_port_http }}"
        env:
          MAIL_URL: "{{ titra_env_mail_url }}"
          MONGO_URL: "mongodb://{{ titra_db_container_name }}/titra?directConnection=true"
          PORT: "{{ titra_port_http }}"
          ROOT_URL: "{{ titra_env_root_url }}"
          TZ: "{{ ansible_nas_timezone }}"
        links:
          - "{{ titra_db_container_name }}"
        labels:
          autoheal: "{{ titra_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ titra_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ titra_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ titra_dockflare_access_group }}"
          dockflare.hostname: "{{ titra_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ titra_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ titra_homepage_group }}"
          homepage.icon: "{{ titra_homepage_icon }}"
          homepage.href: "{{ titra_homepage_href }}"
          homepage.description: "{{ 'modern open source project time tracking for freelancers and small teams' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ titra_container_name }}"
          homepage.showStats: "{{ titra_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ titra_port_http }}"
          repliqate.enabled: "{{ titra_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ titra_repliqate_engine }}"
          repliqate.schedule: "{{ titra_repliqate_schedule }}"
          repliqate.backup_id: "{{ titra_repliqate_backup_id }}"
          repliqate.retention: "{{ titra_repliqate_retention }}"
          traefik.enable: "{{ titra_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.titra.rule: "Host(`{{ titra_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.titra.tls.certresolver: "letsencrypt"
          traefik.http.routers.titra.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.titra.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.titra.middlewares: "titra@docker{{ ',tinyauth-auth@docker' if titra_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.titra.IPAllowList.sourcerange: "{{ titra_traefik_whitelist }}"
          traefik.http.services.titra.loadbalancer.server.port: "{{ titra_port_http }}"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/kromit/titra"
        cpu_shares: "{{ titra_cpu_shares }}"
        memory: "{{ titra_memory }}"
        memory_swap: "{{ titra_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (titra_port_http | string)] +
                (['https://' + titra_hostname + '.' + ansible_nas_domain] if (titra_traefik_enabled is true or titra_dockflare_enabled is true) else [])
              }}
  when: titra_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ titra_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ titra_db_container_name }}"
        state: absent
  when: titra_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ titra_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - titra_enabled is false
