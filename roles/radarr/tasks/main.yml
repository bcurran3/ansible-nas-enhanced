---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ radarr_data_directory }}"
        - "{{ radarr_download_directory }}"
        - "{{ radarr_movies_directory }}"
        - "{{ radarr_anime_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ radarr_container_name }}"
        hostname: "{{ radarr_container_name }}"
        image: "{{ radarr_image_name }}:{{ radarr_image_version }}"
        pull: true
        volumes:
          - "{{ radarr_data_directory }}:/config:rw"
          - "{{ radarr_download_directory }}:/downloads:rw"
          - "{{ radarr_anime_directory }}:/anime:rw"
          - "{{ radarr_movies_directory }}:/movies:rw"
        ports:
          - "{{ radarr_port_http }}:7878"
        env:
          DOCKER_MODS: "{{ radarr_env_docker_mods }}"
          INSTALL_PACKAGES: "{{ radarr_env_docker_mods_install_packages }}"
          INSTALL_PIP_PACKAGES: "{{ radarr_env_docker_mods_install_pip_packages}}"
          TP_DOMAIN: "{{ radarr_env_docker_mods_tp_domain }}"
          TP_THEME: "{{ radarr_env_docker_mods_tp_theme }}"
          TP_COMMUNITY_THEME: "{{ radarr_env_docker_mods_tp_community_theme }}"
          TP_ADDON: "{{ radarr_env_docker_mods_tp_addon }}"
          PUID: "{{ radarr_user_id }}"
          PGID: "{{ radarr_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ radarr_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ radarr_watchtower_enable }}"
          dockflare.enable: "{{ radarr_dockflare_tunnel }}"
          dockflare.access.group: "{{ radarr_dockflare_access_group }}"
          dockflare.hostname: "{{ radarr_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ radarr_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ radarr_homepage_group }}"
          homepage.icon: "{{ radarr_homepage_icon }}"
          homepage.href: "{{ radarr_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ radarr_port_http }}"
          homepage.description: "{{ 'A fork of Sonarr to work with movies' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ radarr_container_name }}"
          homepage.showStats: "{{ radarr_homepage_showstats }}"      
          homepage.widget.type: "radarr"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ radarr_port_http }}"
          homepage.widget.key: "{{ radarr_homepage_widget_key }}"
          repliqate.enabled: "{{ radarr_repliqate_enabled }}"
          repliqate.engine: "{{ radarr_repliqate_engine }}"
          repliqate.schedule: "{{ radarr_repliqate_schedule }}"
          repliqate.backup_id: "{{ radarr_repliqate_backup_id }}"
          repliqate.retention: "{{ radarr_repliqate_retention }}"
          traefik.enable: "{{ radarr_available_externally | string }}"
          traefik.http.routers.radarr.rule: "Host(`{{ radarr_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.radarr.tls.certresolver: "letsencrypt"
          traefik.http.routers.radarr.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.radarr.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.radarr.middlewares: "{{ radarr_hostname }}@docker{{ ',tinyauth-auth@docker' if radarr_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.radarr.IPAllowList.sourcerange: "{{ radarr_traefik_whitelist }}"
          traefik.http.services.radarr.loadbalancer.server.port: "7878"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://lscr.io/linuxserver/radarr"
        cpu_shares: "{{ radarr_cpu_shares }}"
        memory: "{{ radarr_memory }}"
        memory_swap: "{{ radarr_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (radarr_port_http | string)] +
                (['https://' + radarr_hostname + '.' + ansible_nas_domain] if (radarr_available_externally is true or radarr_dockflare_tunnel is true) else [])
              }}
  when: radarr_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ radarr_container_name }}"
        state: absent
  when: radarr_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ radarr_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - radarr_enabled is false