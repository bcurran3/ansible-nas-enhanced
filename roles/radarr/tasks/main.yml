---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ radarr_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ radarr_container_name }}"
        hostname: "{{ radarr_container_name }}"
        image: "{{ radarr_image_name }}:{{ radarr_image_version }}"
        pull: true
        volumes:
          - "{{ radarr_movies_directory }}:/movies:rw"
          - "{{ radarr_download_directory }}:/downloads:rw"
          - "{{ radarr_data_directory }}:/config:rw"
        ports:
          - "{{ radarr_port }}:7878"
        env:
          TZ: "{{ ansible_nas_timezone }}"
          PUID: "{{ radarr_user_id }}"
          PGID: "{{ radarr_group_id }}"
#         DOCKER_MODS: "linuxserver/mods:radarr-striptracks"   # added
#         DOCKER_MODS: "ghcr.io/themepark-dev/theme.park:radarr"
        labels:
          autoheal: "{{ radarr_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ radarr_watchtower_monitor_only }}"
          dockflare.enable: "{{ radarr_dockflare_tunnel }}"
          dockflare.access.group: "{{ radarr_dockflare_access_group }}"
          dockflare.hostname: "{{ radarr_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ radarr_port }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ radarr_homepage_group }}"
          homepage.icon: "{{ radarr_homepage_icon }}"
          homepage.href: "{{ radarr_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ radarr_port }}"
          homepage.description: "{{ 'A fork of Sonarr to work with movies' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ radarr_container_name }}"
          homepage.showStats: "{{ radarr_homepage_showStats }}"      
          homepage.widget.type: "radarr"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ radarr_port }}"
          homepage.widget.key: "{{ radarr_homepage_widget_key }}"
          traefik.enable: "{{ radarr_available_externally | string }}"
          traefik.http.routers.radarr.rule: "Host(`{{ radarr_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.radarr.tls.certresolver: "letsencrypt"
          traefik.http.routers.radarr.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.radarr.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ radarr_hostname }}"
          traefik.http.routers.radarr.middlewares: "{{ radarr_hostname }}@docker"
          traefik.http.middlewares.radarr.IPAllowList.sourcerange: "{{ radarr_traefik_whitelist }}"
          traefik.http.services.radarr.loadbalancer.server.port: "7878"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://lscr.io/linuxserver/radarr"
        cpu_shares: "{{ radarr_cpu_shares }}"
        memory: "{{ radarr_memory }}"
        restart_policy: unless-stopped
  when: radarr_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ radarr_container_name }}"
        state: absent
  when: radarr_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ radarr_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ radarr_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: radarr_enabled is false and archive_app_data_enabled is true
