---
radarr_enabled: false
radarr_available_externally: false
radarr_traefik_whitelist: "{{ lan }}"

# directories
radarr_movies_directory: "{{ movies_root }}"
radarr_download_directory: "{{ downloads_root }}"
radarr_data_directory: "{{ docker_home }}/radarr"

# uid / gid
radarr_user_id: "0"
radarr_group_id: "0"

# network
radarr_port: "7878"
radarr_hostname: "radarr"

# docker
radarr_container_name: "radarr"
radarr_image_name: "linuxserver/radarr"
radarr_image_version: "latest"

# specs
radarr_cpu_shares: 1024
radarr_memory: 1g

# autoheal
radarr_autoheal: "false"

# homepage
radarr_homepage_group: "Media Management"
radarr_homepage_icon: "radarr.png"
radarr_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ radarr_port }}"
radarr_homepage_showStats: "false"
radarr_homepage_widget_key: "your_api_key_here"

# watchtower
radarr_watchtower_monitor_only: "true"