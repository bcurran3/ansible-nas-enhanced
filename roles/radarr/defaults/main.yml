---
# ANE
ansible_nas_app_name: "Radarr"
radarr_enabled: false
radarr_traefik_enabled: false
radarr_traefik_whitelist: "{{ lan }}"

# directories
radarr_data_directory: "{{ docker_home }}/radarr"
radarr_download_directory: "{{ downloads_root }}"
radarr_movies_directory: "{{ movies_root }}"
radarr_anime_directory: "{{ anime_root }}"

# uid / gid
radarr_user_id: "0"
radarr_group_id: "0"

# network
radarr_port_http: "7878"
radarr_hostname: "radarr"

# docker
radarr_container_name: "radarr"
radarr_image_name: "lscr.io/linuxserver/radarr"
radarr_image_version: "latest"

# specs
radarr_cpu_shares: 1024
radarr_memory: "1G"
radarr_memory_swap: -1

# autoheal
radarr_autoheal_enabled: false

# dockflare
radarr_dockflare_enabled: false
radarr_dockflare_access_group: ""

# homepage
radarr_homepage_group: "Media Management"
radarr_homepage_icon: "radarr.png"
radarr_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ radarr_port_http }}"
radarr_homepage_showstats: false
radarr_homepage_widget_key: ""

# linuxserver.io docker mods
# https://mods.linuxserver.io/?mod=radarr
radarr_env_docker_mods: ""
radarr_env_docker_mods_install_packages: ""
radarr_env_docker_mods_install_pip_packages: ""

# theme.park themes
# https://docs.theme-park.dev/themes/radarr/
radarr_env_docker_mods_tp_theme: ""
radarr_env_docker_mods_tp_community_theme: ""
radarr_env_docker_mods_tp_domain: ""
radarr_env_docker_mods_tp_addon: ""

# repliqate
radarr_repliqate_enabled: false
radarr_repliqate_engine: "restic"
radarr_repliqate_schedule: "@daily 3am"
radarr_repliqate_backup_id: "{{ radarr_container_name }}"
radarr_repliqate_retention: "30d"

# tinyauth
radarr_tinyauth_enabled: false

# watchtower
radarr_watchtower_enabled: false