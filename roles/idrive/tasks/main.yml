---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ idrive_data_directory }}"
        - "{{ idrive_data_directory }}/idriveIt"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ idrive_container_name }}"
        hostname: "{{ idrive_container_name }}"
        image: "{{ idrive_image_name }}:{{ idrive_image_tag }}"
        pull: true
        cpu_shares: "{{ idrive_cpu_shares }}"
        volumes:
          - "{{ idrive_data_directory }}/idriveIt:/opt/IDriveForLinux/idriveIt"
          - "{{ idrive_backup_source }}:/source:ro"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ idrive_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ idrive_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ idrive_homepage_group }}"
          homepage.href: "{{ idrive_homepage_href }}"
          homepage.icon: "{{ idrive_homepage_icon }}"
          homepage.description: "{{'IDrive Linux Client in a docker container' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ idrive_container_name }}"
          homepage.showStats: "{{ idrive_homepage_showStats }}"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/RenoFischa/idrive/releases/tag/$${major}.$${minor}.$${patch}"
        memory: "{{ idrive_memory }}"
        restart_policy: unless-stopped
  when: idrive_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ idrive_container_name }}"
        state: absent
  when: idrive_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ idrive_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ idrive_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: idrive_enabled is false and archive_app_data_enabled is true
