---
# WIP
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ ghost_data_directory }}"
        - "{{ ghost_data_directory }}/content"
        - "{{ ghost_data_directory }}/db"

    - name: Create {{ ansible_nas_app_name }} Network
      community.docker.docker_network:
        name: "{{ ghost_network_name }}"

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ ghost_db_container_name }}"
        hostname: "{{ ghost_db_container_name }}"
        image: "{{ ghost_db_image_name }}:{{ ghost_db_image_tag }}"
        pull: true
        networks:
          - name: "{{ ghost_network_name }}"
        networks_cli_compatible: "yes"
        network_mode: bridge
        env:
          MYSQL_USER: "ghost"
          MYSQL_PASSWORD: "{{ ghost_env_db_password }}"
          MYSQL_DATABASE: "ghost"
          MYSQL_MULTIPLE_DATABASES: ""
          MYSQL_ROOT_PASSWORD: "{{ ghost_db_env_msql_root_password }}"
          TZ: "{{ ansible_nas_timezone }}"
        volumes:
          - "{{ ghost_data_directory }}/db:/var/lib/mysql"
        healthcheck:
          test: "mysqladmin ping -p${{ ghost_db_env_msql_root_password }} -h 127.0.0.1"
          interval: "1s"
          start_period: "30s"
          start_interval: "10s"
          retries: 120
        labels:
          autoheal: "{{ ghost_db_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ ghost_db_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} MySQL"
          homepage.group: "{{ ghost_db_homepage_group }}"
          homepage.icon: "{{ ghost_db_homepage_icon }}"
          homepage.href: "{{ ghost_db_homepage_href }}"
          homepage.description: "{{ 'MySQL Server, the world''s most popular open source database' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ ghost_db_container_name }}"
          homepage.showStats: "{{ ghost_db_homepage_showstats }}"
          repliqate.enabled: "{{ ghost_db_repliqate_enabled }}"
          repliqate.engine: "{{ ghost_db_repliqate_engine }}"
          repliqate.schedule: "{{ ghost_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ ghost_db_repliqate_backup_id }}"
          repliqate.retention: "{{ ghost_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^8\.0\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/mysql"
        cpu_shares: "{{ ghost_db_cpu_shares }}"
        memory: "{{ ghost_db_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ ghost_container_name }}"
        hostname: "{{ ghost_container_name }}"
        image: "{{ ghost_image_name }}:{{ ghost_image_tag }}"
        pull: true
        networks:
          - name: "{{ ghost_network_name }}"
        networks_cli_compatible: "yes"
        network_mode: bridge
        ports:
          - "{{ ghost_port_http }}:2368"
        env:
          url: "{{ ghost_env_url }}"
          database__client: "mysql"
          database__connection__host: "{{ ghost_db_container_name }}"
          database__connection__user:  "ghost"
          database__connection__password: "{{ ghost_env_db_password }}"
          database__connection__database: "ghost"
          mail__from: "{{ ghost_env_mail_from }}"
          mail__transport: "{{ ghost_env_mail_transport }}"
          mail__options__host: "{{ ghost_env_mail_options_host }}"
          mail__options__port: "{{ ghost_env_mail_options_port }}"
          NODE_ENV: "{{ ghost_env_node_env }}"
          TZ: "{{ ansible_nas_timezone }}"
        volumes:
          - "{{ ghost_data_directory }}/content:/var/lib/ghost/content"
#         - "{{ ghost_data_directory }}/config.production.json:/var/lib/ghost/config.production.json
        links:
          - "{{ ghost_db_container_name }}"
        labels:
          autoheal: "{{ ghost_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ ghost_watchtower_enable }}"
          dockflare.enable: "{{ ghost_dockflare_tunnel }}"
          dockflare.access.group: "{{ ghost_dockflare_access_group }}"
          dockflare.hostname: "{{ ghost_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "https://{{ ghost_hostname }}.{{ ansible_nas_domain }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ ghost_homepage_group }}"
          homepage.icon: "{{ ghost_homepage_icon }}"
          homepage.href: "{{ ghost_homepage_href }}"
          homepage.siteMonitor: "{{ ghost_homepage_sitemonitor }}"
          homepage.description: "{{ 'Independent technology for modern publishing, memberships, subscriptions and newsletters.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ ghost_container_name }}"
          homepage.showStats: "{{ ghost_homepage_showstats }}"
          repliqate.enabled: "{{ ghost_repliqate_enabled }}"
          repliqate.engine: "{{ ghost_repliqate_engine }}"
          repliqate.schedule: "{{ ghost_repliqate_schedule }}"
          repliqate.backup_id: "{{ ghost_repliqate_backup_id }}"
          repliqate.retention: "{{ ghost_repliqate_retention }}"
          traefik.enable: "{{ ghost_available_externally | string }}"
          traefik.http.routers.ghost.rule: "Host(`{{ ghost_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.ghost.tls.certresolver: "letsencrypt"
          traefik.http.routers.ghost.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.ghost.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ ghost_hostname }}"
          traefik.http.routers.ghost.middlewares: "{{ ghost_hostname }}@docker"
          traefik.http.middlewares.ghost.IPAllowList.sourcerange: "{{ ghost_traefik_whitelist }}"
          traefik.http.services.ghost.loadbalancer.server.port: "2368"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/ghost"
        cpu_shares: "{{ ghost_cpu_shares }}"
        memory: "{{ ghost_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                (['https://' + ghost_hostname + '.' + ansible_nas_domain] if (ghost_available_externally is true or ghost_dockflare_tunnel is true) else [])
              }}
  when: ghost_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ ghost_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ ghost_db_container_name }}"
        state: absent

    - name: Delete {{ ansible_nas_app_name }} Network
      community.docker.docker_network:
        name: "{{ ghost_network_name }}"
        state: absent
  when: ghost_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ ghost_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ ghost_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: ghost_enabled is false and archive_app_data_enabled is true
