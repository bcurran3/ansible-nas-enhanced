---
# ANE
ghost_proper_name: "Ghost"
ghost_enabled: false
ghost_traefik_enabled: false
ghost_traefik_whitelist: "{{ lan }}"

ghost_data_directory: "{{ docker_home }}/ghost"
ghost_hostname: "ghost"
ghost_port_http: "2368"
ghost_network_name: "ghost"

# docker
ghost_container_name: "ghost"
ghost_image_name: "ghost"
ghost_image_tag: "latest"
ghost_db_container_name: "ghost-db"
ghost_db_image_name: "mysql"
ghost_db_image_tag: "8.0.44"

# specs
ghost_cpu_shares: 1024
ghost_memory: "1G"
ghost_memory_swap: -1
ghost_db_cpu_shares: 1024
ghost_db_memory: "1G"
ghost_db_memory_swap: "{{ ghost_db_memory }}"

# app
# https://ghost.org/docs/config/#configuration-options
ghost_env_mail_from: "" # "'MyDomain' <postmaster@{{ ansible_nas_domain }}>"
ghost_env_mail_transport: "SMTP"
ghost_env_mail_options_host: "" # "smtp.{{ ansible_nas_domain }}"
ghost_env_mail_options_port: "465"
ghost_env_db_password: "d1746c5207f2bc63589be6c3ee89ddd2f9ffb1aa351c34ff5050149b6463d4c3"
ghost_env_node_env: "production"
ghost_env_url: "https://{{ ghost_hostname }}.{{ ansible_nas_domain }}"
ghost_db_env_msql_root_password: "90491b9e19c35feb5c68969d3fbf92a85fdffefe777dc20aab6c6c929e45a84a"

# autoheal
ghost_autoheal_enabled: false
ghost_db_autoheal_enabled: false

# dockflare
ghost_dockflare_enabled: false
ghost_dockflare_access_group: ""

# healthcheck
ghost_healthcheck_test: ["CMD", "node", "-e", "const s = require('net').createConnection(2368, '127.0.0.1', () => { s.end(); process.exit(0); }); s.on('error', () => process.exit(1));"]
ghost_healthcheck_interval: 1m
ghost_healthcheck_timeout: 10s
ghost_healthcheck_retries: 3
ghost_healthcheck_start_period: 60s
ghost_db_healthcheck_test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p{{ ghost_db_env_msql_root_password }} || exit 1"]
ghost_db_healthcheck_interval: 20s
ghost_db_healthcheck_timeout: 10s
ghost_db_healthcheck_retries: 5
ghost_db_healthcheck_start_period: 30s

# homepage
ghost_homepage_group: "Apps"
ghost_homepage_icon: "ghost.png"
ghost_homepage_href: "https://{{ ghost_hostname }}.{{ ansible_nas_domain }}"
ghost_homepage_showstats: false
ghost_homepage_sitemonitor: "https://{{ ghost_hostname }}.{{ ansible_nas_domain }}"
ghost_db_homepage_group: "DBs"
ghost_db_homepage_icon: "mysql.png"
ghost_db_homepage_href: "{{ ghost_homepage_href }}"
ghost_db_homepage_showstats: false

# repliqate
ghost_repliqate_enabled: false
ghost_repliqate_engine: "restic"
ghost_repliqate_schedule: "@daily 3am"
ghost_repliqate_backup_id: "{{ ghost_container_name }}"
ghost_repliqate_retention: "30d"
ghost_db_repliqate_enabled: false
ghost_db_repliqate_engine: "restic"
ghost_db_repliqate_schedule: "@daily 3am"
ghost_db_repliqate_backup_id: "{{ ghost_db_container_name }}"
ghost_db_repliqate_retention: "30d"

# tinyauth
ghost_tinyauth_enabled: false

# watchtower
ghost_watchtower_enabled: false
ghost_db_watchtower_enabled: false