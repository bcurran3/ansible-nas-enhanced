---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ maintainerr_data_directory }}"
        - "{{ maintainerr_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ maintainerr_container_name }}"
        hostname: "{{ maintainerr_container_name }}"
        image: "{{ maintainerr_image_name }}:{{ maintainerr_image_tag }}"
        pull: true
        ports:
          - "{{ maintainerr_port_http }}:80"
        volumes:
          - "{{ maintainerr_data_directory }}/data:/opt/data"
        env:
          UV_USE_IO_URING: "0"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ maintainerr_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ maintainerr_watchtower_enable }}"
          dockflare.enable: "{{ maintainerr_dockflare_tunnel }}"
          dockflare.access.group: "{{ maintainerr_dockflare_access_group }}"
          dockflare.hostname: "{{ maintainerr_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ maintainerr_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ maintainerr_homepage_group }}"
          homepage.icon: "{{ maintainerr_homepage_icon }}"
          homepage.href: "{{ maintainerr_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ maintainerr_port_http }}"
          homepage.description: "{{ 'Looks and smells like Overseerr, does the opposite. Maintenance tool for the Plex ecosystem' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ maintainerr_container_name }}"
          homepage.showStats: "{{ maintainerr_homepage_showstats }}"
          traefik.enable: "{{ maintainerr_available_externally | string }}"
          traefik.http.routers.maintainerr.rule: "Host(`{{ maintainerr_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.maintainerr.tls.certresolver: "letsencrypt"
          traefik.http.routers.maintainerr.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.maintainerr.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ maintainerr_hostname }}"
          traefik.http.routers.maintainerr.middlewares: "{{ maintainerr_hostname }}@docker"
          traefik.http.middlewares.maintainerr.IPAllowList.sourcerange: "{{ maintainerr_traefik_whitelist }}"      
          traefik.http.services.maintainerr.loadbalancer.server.port: "80"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/jorenn92/Maintainerr/releases"
        cpu_shares: "{{ maintainerr_cpu_shares }}"
        memory: "{{ maintainerr_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (maintainerr_port_http | string)] +
                (['https://' + maintainerr_hostname + '.' + ansible_nas_domain] if (maintainerr_available_externally is true or maintainerr_dockflare_tunnel is true) else [])
              }}
  when: maintainerr_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ maintainerr_container_name }}"
        state: absent
  when: maintainerr_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ maintainerr_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ maintainerr_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: maintainerr_enabled is false and archive_app_data_enabled is true
