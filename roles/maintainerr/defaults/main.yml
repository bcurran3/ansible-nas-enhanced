---
# ANE
ansible_nas_app_name: "Maintainerr"
maintainerr_enabled: false
maintainerr_available_externally: false
maintainerr_traefik_whitelist: "{{ lan }}"

# data directory
maintainerr_data_directory: "{{ docker_home }}/maintainerr"

# docker image to use
maintainerr_docker_image: jorenn92/maintainerr:latest

# network
maintainerr_port_http: "8154"
maintainerr_hostname: "maintainerr"

# docker
maintainerr_container_name: "maintainerr"
maintainerr_image_name: "ghcr.io/jorenn92/maintainerr"
maintainerr_image_tag: "latest"
maintainerr_cpu_shares: "1024"
maintainerr_memory: 512m

# autoheal
maintainerr_autoheal: "false"

# dockflare
maintainerr_dockflare_tunnel: "false"
maintainerr_dockflare_access_group: ""

# homepage
maintainerr_homepage_group: "Apps"
maintainerr_homepage_icon: "maintainerr.png"
maintainerr_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ maintainerr_port_http }}"
maintainerr_homepage_showstats: "false"

# repliqate
maintainerr_repliqate_enabled: "false"
maintainerr_repliqate_engine: "restic"
maintainerr_repliqate_schedule: "@daily 3am"
maintainerr_repliqate_backup_id: "{{ maintainerr_container_name }}"
maintainerr_repliqate_retention: "30d"

# watchtower
maintainerr_watchtower_enable: "false"