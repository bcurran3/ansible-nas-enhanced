---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ localai_data_directory }}"
        - "{{ localai_data_directory }}/models"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        localai_homepage_href: "https://{{ localai_hostname }}.{{ ansible_nas_domain }}"
      when: localai_traefik_enabled | bool or localai_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ localai_container_name }}"
        hostname: "{{ localai_container_name }}"
        image: "{{ localai_image_name }}:{{ localai_image_tag }}"
        pull: true
        ports:
          - "{{ localai_port_http }}:8080"
        runtime: "{{ 'nvidia' if nvidia_runtime_enabled | bool else omit }}"
        device_requests: "{{
          [{'driver': 'nvidia', 'count': -1, 'capabilities': ['gpu']}]
          if nvidia_runtime_enabled | bool else omit
        }}"
        devices: >-
                  {{
                    (localai_devices | default([])) + ['/dev/dri:/dev/dri']
                    if intel_igpu_enabled | default(false) | bool
                    else (localai_devices | default(omit))
                  }}
        volumes:
          - "{{ localai_data_directory }}/models:/models:rw"
        network_mode: bridge
        env:
          CMAKE_ARGS: "{{ localai_env_cmake_args }}"
          REBUILD: "{{ localai_env_rebuild }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ localai_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ localai_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ localai_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ localai_dockflare_access_group }}"
          dockflare.hostname: "{{ localai_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ localai_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ localai_homepage_group }}"
          homepage.icon: "{{ localai_homepage_icon }}"
          homepage.href: "{{ localai_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ localai_port_http }}"
          homepage.description: "{{ 'LocalAI is the free, Open Source OpenAI alternative.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ localai_container_name }}"
          homepage.showStats: "{{ localai_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "false"
          traefik.enable: "{{ localai_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.localai.rule: "Host(`{{ localai_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.localai.tls.certresolver: "letsencrypt"
          traefik.http.routers.localai.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.localai.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.localai.middlewares: "localai@docker{{ ',tinyauth-auth@docker' if localai_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.localai.IPAllowList.sourcerange: "{{ localai_traefik_whitelist }}"
          traefik.http.services.localai.loadbalancer.server.port: "8080"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/localai/localai"
        cpu_shares: "{{ localai_cpu_shares }}"
        memory: "{{ localai_memory }}"
        memory_swap: "{{ localai_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (localai_port_http | string)] +
                (['https://' + localai_hostname + '.' + ansible_nas_domain] if (localai_traefik_enabled is true or localai_dockflare_enabled is true) else [])
              }}
  when: localai_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ localai_container_name }}"
        state: absent
  when: localai_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ localai_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - localai_enabled is false