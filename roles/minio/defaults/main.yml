---
# ANE
ansible_nas_app_name: "MinIO"
minio_enabled: false
minio_available_externally: false
minio_traefik_whitelist: "{{ lan }}"

# directories
minio_data_directory: "{{ docker_home }}/minio"

# env
minio_admin_username: admin
minio_admin_password: supersecure

# network
minio_hostname: "minio"
minio_network_name: "minio"
minio_api_port: "9000"
minio_console_port: "9009"

# docker
minio_container_name: "minio"
minio_image_name: "minio/minio"
minio_image_version: "latest"
minio_cpu_shares: 1024

# specs
minio_memory: "1G"

# autoheal
minio_autoheal: "false"

# dockflare
minio_dockflare_tunnel: "false"
minio_dockflare_access_group: ""

# homepage
minio_homepage_group: "Apps"
minio_homepage_icon: "minio.png"
minio_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ minio_port }}"
minio_homepage_showstats: "false"

# repliqate
minio_repliqate_enabled: "false"
minio_repliqate_engine: "restic"
minio_repliqate_schedule: "@daily 3am"
minio_repliqate_backup_id: "{{ minio_container_name }}"
minio_repliqate_retention: "30d"

# watchtower
minio_watchtower_enable: "false"