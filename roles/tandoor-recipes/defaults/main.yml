---
# ANE
ansible_nas_app_name: "Tandoor Recipes"
tandoor_recipes_enabled: false
tandoor_recipes_available_externally: false
tandoor_recipes_traefik_whitelist: "{{ lan }}"

# directories
tandoor_recipes_data_directory: "{{ docker_home }}/tandoor-recipes"

# docker
tandoor_recipes_container_name: "tandoor-recipes"
tandoor_recipes_image_name: "ghcr.io/tandoorrecipes/recipes"
tandoor_recipes_image_tag: "latest"
tandoor_recipes_db_container_name: "tandoor-recipes-db"
tandoor_recipes_db_image_name: "postgres"
tandoor_recipes_db_image_tag: "16-alpine"

# network
tandoor_recipes_port_http: "3037"
tandoor_recipes_hostname: "recipes"

# specs
tandoor_recipes_cpu_shares: 1024
tandoor_recipes_memory: "1G"
tandoor_recipes_db_cpu_shares: 1024
tandoor_recipes_db_memory: "1G"

# app
# https://docs.tandoor.dev/system/configuration/
tandoor_recipes_env_allowed_hosts: "*"
tandoor_recipes_env_postgres_user: "recipes"
tandoor_recipes_env_postgres_password: "topsecret"
tandoor_recipes_env_postgres_db: "recipes_db"
tandoor_recipes_env_secret_key: "lhV7H9Hu6oXjW4T/CoKciocYlV4njZxSaTj2Uvt1bpYtctV4Vd"
# \/ not implemented
tandoor_recipes_env_gunicorn_workers: "3"
tandoor_recipes_env_gunicorn_threads: "2"
tandoor_recipes_env_gunicorn_timeout: "30"
tandoor_recipes_env_gunicorn_media: "0"
tandoor_recipes_env_csrf_trusted_origins: '[]'
tandoor_recipes_env_cors_allow_all_origins: "True"
tandoor_recipes_env_session_cookie_domain: "{{ tandoor_recipes_hostname }}.{{ ansible_nas_domain }}"
tandoor_recipes_env_session_cookie_name: "sessionid" # use this only to not interfere with non unified django applications under the same top level domain
tandoor_recipes_env_enable_metrics: "0"
tandoor_recipes_env_sort_tree_by_name: "0"
tandoor_recipes_env_enable_pdf_export: "0"
tandoor_recipes_env_terms_url: ""
tandoor_recipes_env_privacy_url: ""
tandoor_recipes_env_imprint_url: ""
tandoor_recipes_env_ratelimit_url_import_requests: ""
tandoor_recipes_env_social_default_access: "1"
tandoor_recipes_env_social_default_group: "guest"
tandoor_recipes_env_enable_signup: "0"
tandoor_recipes_env_social_providers: "" # "allauth.socialaccount.providers.github, allauth.socialaccount.providers.nextcloud,"
tandoor_recipes_env_remote_user_auth: "0"
tandoor_recipes_env_ldap_auth: ""
tandoor_recipes_env_auth_ldap_server_uri: ""
tandoor_recipes_env_auth_ldap_bind_dn: ""
tandoor_recipes_env_auth_ldap_bind_password: ""
tandoor_recipes_env_auth_ldap_bind_password_file: "" # "/run/secrets/ldap_password.txt"
tandoor_recipes_env_auth_ldap_user_search_base_dn: ""
tandoor_recipes_env_auth_ldap_tls_cacertfile: ""
tandoor_recipes_env_auth_ldap_start_tls: ""
tandoor_recipes_env_email_host: ""
tandoor_recipes_env_email_port: ""
tandoor_recipes_env_email_host_user: ""
tandoor_recipes_env_email_host_password: ""
tandoor_recipes_env_email_host_password_file: "" # "/run/secrets/email_password.txt"
tandoor_recipes_env_email_use_tls: "0"
tandoor_recipes_env_email_use_ssl: "0"
tandoor_recipes_env_default_from_email: ""  # email sender address (default 'webmaster@localhost')
tandoor_recipes_env_account_email_subject_prefix: "" # prefix used for account related emails (default "[Tandoor Recipes] ")
tandoor_recipes_env_s3_region_name: "" # default none, set your region might be required
tandoor_recipes_env_s3_querystring_auth: "" # "1" # default true, set to 0 to serve media from a public bucket without signed urls
tandoor_recipes_env_s3_querystring_expire: "" # "3600" # number of seconds querystring are valid for
tandoor_recipes_env_s3_endpoint_url: "" # when using a custom endpoint like minio
tandoor_recipes_env_s3_custom_domain: "" # when using a CDN/proxy to S3 (see https://github.com/TandoorRecipes/recipes/issues/1943)
tandoor_recipes_env_space_ai_enabled: "" # "1"
tandoor_recipes_env_space_ai_credits_monthly: "" # "100"
tandoor_recipes_env_ai_ratelimit: "" # "60/hour"
tandoor_recipes_env_fdc_api_key: "" # "DEMO_KEY"
tandoor_recipes_env_disable_external_connectors: "0"  # Default 0 (false), set to 1 (true) to disable connectors
tandoor_recipes_env_external_connectors_queue_size: "100"  # Defaults to 100, set to any number >1
tandoor_recipes_env_debug: "0"
tandoor_recipes_env_debug_toolbar: "0"
tandoor_recipes_env_sql_debug: "0"
tandoor_recipes_env_log_level: "DEBUG"
tandoor_recipes_env_gunicorn_log_level: "info"
tandoor_recipes_env_fraction_pref_default: "0"
tandoor_recipes_env_comment_pref_default: "1"
tandoor_recipes_env_sticky_nav_pref_default: "1"
tandoor_recipes_env_max_owned_spaces_pref_default: "" # "100"
tandoor_recipes_env_unauthenticated_theme_from_space: ""
tandoor_recipes_env_shopping_min_autosync_interval: "" # "5"
tandoor_recipes_env_drf_throttle_recipe_url_import: "" # "60/hour"
tandoor_recipes_env_space_default_max_recipes: "0" # 0:unlimited recipes
tandoor_recipes_env_space_default_max_users: "0" # 0:unlimited users per space
tandoor_recipes_env_space_default_max_files: "0" # Maximum file storage for space in MB. 0 for unlimited, -1 to disable file upload.
tandoor_recipes_env_space_default_allow_sharing: "" # "1" # Allow users to share recipes with public links
tandoor_recipes_env_export_file_cache_duration: "" # "600"
# /\ not implemented

# autoheal
tandoor_recipes_autoheal: false
tandoor_recipes_db_autoheal: false

# dockflare
tandoor_recipes_dockflare_enabled: false
tandoor_recipes_dockflare_access_group: ""

# homepage
tandoor_recipes_homepage_group: "Apps"
tandoor_recipes_homepage_icon: "tandoor-recipes.png"
tandoor_recipes_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ tandoor_recipes_port_http }}"
#tandoor_recipes_homepage_href: "{{ tandoor_recipes_hostname }}.{{ ansible_nas_domain }}"
tandoor_recipes_homepage_showstats: false
tandoor_recipes_homepage_widget_key: ""
tandoor_recipes_db_homepage_group: "DBs"
tandoor_recipes_db_homepage_icon: "postgres.png"
tandoor_recipes_db_homepage_href: "{{ tandoor_recipes_homepage_href }}"
tandoor_recipes_db_homepage_showstats: false

# repliqate
tandoor_recipes_repliqate_enabled: false
tandoor_recipes_repliqate_engine: "restic"
tandoor_recipes_repliqate_schedule: "@daily 3am"
tandoor_recipes_repliqate_backup_id: "{{ tandoor_recipes_container_name }}"
tandoor_recipes_repliqate_retention: "30d"
tandoor_recipes_db_repliqate_enabled: false
tandoor_recipes_db_repliqate_engine: "restic"
tandoor_recipes_db_repliqate_schedule: "@daily 3am"
tandoor_recipes_db_repliqate_backup_id: "{{ tandoor_recipes_container_name }}"
tandoor_recipes_db_repliqate_retention: "30d"

# tinyauth
tandoor_recipes_tinyauth_enabled: false

# watchtower
tandoor_recipes_watchtower_enabled: false
tandoor_recipes_db_watchtower_enabled: false
