---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ tandoor_recipes_data_directory }}"
        - "{{ tandoor_recipes_data_directory }}/db"
        - "{{ tandoor_recipes_data_directory }}/mediafiles"
        - "{{ tandoor_recipes_data_directory }}/staticfiles"

    - name: Create {{ ansible_nas_app_name }} PostgreSQL Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ tandoor_recipes_db_container_name }}"
        hostname: "{{ tandoor_recipes_db_container_name }}"
        image: "{{ tandoor_recipes_db_image_name }}:{{ tandoor_recipes_db_image_tag }}"
        pull: true
        volumes:
          - "{{ tandoor_recipes_data_directory }}/db:/var/lib/postgresql/data"
        env:
          POSTGRES_USER: "djangodb"
          POSTGRES_PASSWORD: "{{ tandoor_recipes_env_postgres_password }}"
          POSTGRES_DB: "djangodb"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ tandoor_recipes_db_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ tandoor_recipes_db_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} PostgreSQL"
          homepage.group: "{{ tandoor_recipes_db_homepage_group }}"
          homepage.icon: "{{ tandoor_recipes_db_homepage_icon }}"
          homepage.href: "{{ tandoor_recipes_homepage_href }}"
          homepage.description: "{{ 'PostgreSQL Database Management System' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ tandoor_recipes_db_container_name }}"
          homepage.showStats: "{{ tandoor_recipes_db_homepage_showstats }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/postgres"
        cpu_shares: "{{ tandoor_recipes_db_cpu_shares }}"
        memory: "{{ tandoor_recipes_db_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ tandoor_recipes_container_name }}"
        hostname: "{{ tandoor_recipes_container_name }}"
        image: "{{ tandoor_recipes_image_name }}:{{ tandoor_recipes_image_tag }}"
        pull: true
        volumes:
          - "{{ tandoor_recipes_data_directory }}/mediafiles:/opt/recipes/mediafiles"
          - "{{ tandoor_recipes_data_directory }}/staticfiles:/opt/recipes/staticfiles"
        ports:
          - "{{ tandoor_recipes_port_http }}:80"
        env:
          ALLOWED_HOSTS: "{{ tandoor_recipes_env_allowed_hosts }}"
          DB_ENGINE: "django.db.backends.postgresql"
          POSTGRES_HOST: "{{ tandoor_recipes_db_container_name }}"
          POSTGRES_PORT: "5432"
          POSTGRES_USER: "djangodb"
          POSTGRES_PASSWORD: "{{ tandoor_recipes_env_postgres_password }}"
          POSTGRES_DB: "djangodb"
          SECRET_KEY: "{{ tandoor_recipes_env_secret_key }}"
          TANDOOR_PORT: "{{ tandoor_recipes_port_http }}"
          TZ: "{{ ansible_nas_timezone }}"
#          https://docs.tandoor.dev/system/configuration/
#          GUNICORN_WORKERS: "3"
#          GUNICORN_THREADS: "2"
#          GUNICORN_TIMEOUT: "30"
#          GUNICORN_MEDIA: "0"
#          CSRF_TRUSTED_ORIGINS: '[]'
#          CORS_ALLOW_ALL_ORIGINS: "True"
#          SESSION_COOKIE_DOMAIN: ".{{ ansible_nas_domain }}"
#          SESSION_COOKIE_NAME: "sessionid" # use this only to not interfere with non unified django applications under the same top level domain
#          ENABLE_METRICS: "0"
#          SORT_TREE_BY_NAME: "0"
#          ENABLE_PDF_EXPORT: "0"
#          TERMS_URL: ""
#          PRIVACY_URL: ""
#          IMPRINT_URL: ""
#          RATELIMIT_URL_IMPORT_REQUESTS: ""
#          SOCIAL_DEFAULT_ACCESS: "1"
#          SOCIAL_DEFAULT_GROUP: "guest"
#          ENABLE_SIGNUP: "0"
#          SOCIAL_PROVIDERS: "allauth.socialaccount.providers.github, allauth.socialaccount.providers.nextcloud,"
#          REMOTE_USER_AUTH: "0"
#          LDAP_AUTH: ""
#          AUTH_LDAP_SERVER_URI: ""
#          AUTH_LDAP_BIND_DN: ""
#          AUTH_LDAP_BIND_PASSWORD: ""
#          AUTH_LDAP_BIND_PASSWORD_FILE: "/run/secrets/ldap_password.txt"
#          AUTH_LDAP_USER_SEARCH_BASE_DN: ""
#          AUTH_LDAP_TLS_CACERTFILE: ""
#          AUTH_LDAP_START_TLS: ""
#          EMAIL_HOST: ""
#          EMAIL_PORT: ""
#          EMAIL_HOST_USER: ""
#          EMAIL_HOST_PASSWORD: ""
#          EMAIL_HOST_PASSWORD_FILE: "/run/secrets/email_password.txt"
#          EMAIL_USE_TLS: "0"
#          EMAIL_USE_SSL: "0"
#          DEFAULT_FROM_EMAIL: "" # email sender address (default 'webmaster@localhost')
#          ACCOUNT_EMAIL_SUBJECT_PREFIX: "" # prefix used for account related emails (default "[Tandoor Recipes] ")
#          S3_REGION_NAME: "" # default none, set your region might be required
#          S3_QUERYSTRING_AUTH: "1" # default true, set to 0 to serve media from a public bucket without signed urls
#          S3_QUERYSTRING_EXPIRE: "3600" # number of seconds querystring are valid for
#          S3_ENDPOINT_URL: "" # when using a custom endpoint like minio
#          S3_CUSTOM_DOMAIN: "" # when using a CDN/proxy to S3 (see https://github.com/TandoorRecipes/recipes/issues/1943)
#          SPACE_AI_ENABLED: "1"
#          SPACE_AI_CREDITS_MONTHLY: "100"
#          AI_RATELIMIT: "60/hour"
#          FDC_API_KEY: "DEMO_KEY"
#          DISABLE_EXTERNAL_CONNECTORS: "0"  # Default 0 (false), set to 1 (true) to disable connectors
#          EXTERNAL_CONNECTORS_QUEUE_SIZE: "100"  # Defaults to 100, set to any number >1
#          DEBUG: "0"
#          DEBUG_TOOLBAR: "0"
#          SQL_DEBUG: "0"
#          LOG_LEVEL: "DEBUG"
#          GUNICORN_LOG_LEVEL: "debug"
#          FRACTION_PREF_DEFAULT: "0"
#          COMMENT_PREF_DEFAULT: "1"
#          STICKY_NAV_PREF_DEFAULT: "1"
#          MAX_OWNED_SPACES_PREF_DEFAULT: "100"
#          UNAUTHENTICATED_THEME_FROM_SPACE: ""
#          FORCE_THEME_FROM_SPACE: ""
#          SHOPPING_MIN_AUTOSYNC_INTERVAL: "5"
#          DRF_THROTTLE_RECIPE_URL_IMPORT: "60/hour"
#          SPACE_DEFAULT_MAX_RECIPES: "0" # 0:unlimited recipes
#          SPACE_DEFAULT_MAX_USERS: "0" # 0:unlimited users per space
#          SPACE_DEFAULT_MAX_FILES: "0" # Maximum file storage for space in MB. 0 for unlimited, -1 to disable file upload.
#          SPACE_DEFAULT_ALLOW_SHARING: "1" # Allow users to share recipes with public links
#          EXPORT_FILE_CACHE_DURATION: "600"
        links:
          - "{{ tandoor_recipes_db_container_name }}"
        labels:
          autoheal: "{{ tandoor_recipes_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ tandoor_recipes_watchtower_enable }}"
          dockflare.enable: "{{ tandoor_recipes_dockflare_tunnel }}"
          dockflare.access.group: "{{ tandoor_recipes_dockflare_access_group }}"
          dockflare.hostname: "{{ tandoor_recipes_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ tandoor_recipes_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ tandoor_recipes_homepage_group }}"
          homepage.icon: "{{ tandoor_recipes_homepage_icon }}"
          homepage.href: "{{ tandoor_recipes_homepage_href }}"
          homepage.description: "{{ 'tandoor_recipes description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ tandoor_recipes_container_name }}"
          homepage.showStats: "{{ tandoor_recipes_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ tandoor_recipes_port_http }}"
          traefik.enable: "{{ tandoor_recipes_available_externally | string }}"
#         traefik.http.routers.tandoor_recipes.rule: "Host(`{{ tandoor_recipes_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.tandoor_recipes.rule: "Host(`recipes.{{ ansible_nas_domain }}`)"
          traefik.http.routers.tandoor_recipes.tls.certresolver: "letsencrypt"
          traefik.http.routers.tandoor_recipes.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.tandoor_recipes.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ tandoor_recipes_hostname }}"
          traefik.http.routers.tandoor_recipes.middlewares: "tandoor_recipes@docker"
          traefik.http.middlewares.tandoor_recipes.IPAllowList.sourcerange: "{{ tandoor_recipes_traefik_whitelist }}"
          traefik.http.services.tandoor_recipes.loadbalancer.server.port: "{{ tandoor_recipes_port_http }}"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/TandoorRecipes/recipes/pkgs/container/recipes"
        cpu_shares: "{{ tandoor_recipes_cpu_shares }}"
        memory: "{{ tandoor_recipes_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (tandoor_recipes_port_http | string)] +
                (['https://' + tandoor_recipes_hostname + '.' + ansible_nas_domain] if (tandoor_recipes_available_externally is true or tandoor_recipes_dockflare_tunnel is true) else [])
              }}
  when: tandoor_recipes_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ tandoor_recipes_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ tandoor_recipes_db_container_name }}"
        state: absent
  when: tandoor_recipes_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ tandoor_recipes_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ tandoor_recipes_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: tandoor_recipes_enabled is false and archive_app_data_enabled is true
