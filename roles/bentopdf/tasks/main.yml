---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        bentopdf_homepage_href: "https://{{ bentopdf_hostname }}.{{ ansible_nas_domain }}/index.html#tools-header"
      when: bentopdf_traefik_enabled | bool or bentopdf_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ bentopdf_container_name }}"
        hostname: "{{ bentopdf_container_name }}"
        image: "{{ bentopdf_image_name }}:{{ bentopdf_image_tag }}"
        pull: true
        ports:
          - "{{ bentopdf_port_http }}:8080"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ bentopdf_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ bentopdf_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ bentopdf_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ bentopdf_dockflare_access_group }}"
          dockflare.hostname: "{{ bentopdf_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ bentopdf_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ bentopdf_homepage_group }}"
          homepage.icon: "{{ bentopdf_homepage_icon }}"
          homepage.href: "{{ bentopdf_homepage_href }}"
          homepage.description: "{{ 'bentopdf_homepage_description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ bentopdf_container_name }}"
          homepage.showStats: "{{ bentopdf_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ bentopdf_port_http }}"
          repliqate.enabled: "false"
          traefik.enable: "{{ bentopdf_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.bentopdf.rule: "Host(`{{ bentopdf_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.bentopdf.tls.certresolver: "letsencrypt"
          traefik.http.routers.bentopdf.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.bentopdf.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.bentopdf.middlewares: "bentopdf@docker{{ ',tinyauth-auth@docker' if bentopdf_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.bentopdf.IPAllowList.sourcerange: "{{ bentopdf_traefik_whitelist }}"
          traefik.http.services.bentopdf.loadbalancer.server.port: "8080"
          wud.tag.include: "^latest$"
          wud.watch.digest: "true"
          wud.link.template: "https://hub.docker.com/r/bentopdf/bentopdf"
        cpu_shares: "{{ bentopdf_cpu_shares }}"
        memory: "{{ bentopdf_memory }}"
        memory_swap: "{{ bentopdf_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (bentopdf_port_http | string)] +
                (['https://' + bentopdf_hostname + '.' + ansible_nas_domain] if (bentopdf_traefik_enabled is true or bentopdf_dockflare_enabled is true) else [])
              }}
  when: bentopdf_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ bentopdf_container_name }}"
        state: absent
  when: bentopdf_enabled is false
