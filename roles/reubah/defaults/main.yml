---
# ANE
reubah_proper_name: "Reubah"
reubah_enabled: false
reubah_traefik_enabled: false
reubah_traefik_whitelist: "{{ lan }}"

reubah_data_directory: "{{ docker_home }}/reubah"

# network
reubah_port_http: "3020"
reubah_hostname: "reubah"

# docker
reubah_container_name: "reubah"
reubah_image_name: "ghcr.io/dendianugerah/reubah"
reubah_image_tag: "latest"

# specs
reubah_cpu_shares: 1024
reubah_memory: "512M"
reubah_memory_swap: -1

# autoheal
reubah_autoheal_enabled: false

# dockflare
reubah_dockflare_enabled: false
reubah_dockflare_access_group: ""

# homepage
reubah_homepage_group: "Apps"
reubah_homepage_icon: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ reubah_port_http }}/static/assets/icon-light.png"
reubah_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ reubah_port_http }}"
reubah_homepage_showstats: false

# repliqate
reubah_repliqate_enabled: false
reubah_repliqate_engine: "restic"
reubah_repliqate_schedule: "@daily 3am"
reubah_repliqate_backup_id: "{{ reubah_container_name }}"
reubah_repliqate_retention: "30d"

# tinyauth
reubah_tinyauth_enabled: false

# watchtower
reubah_watchtower_enabled: false