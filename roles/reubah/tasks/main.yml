---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directory
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: 1000
        group: 1000
      with_items:
        - "{{ reubah_data_directory }}"
        - "{{ reubah_data_directory }}/tmp"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ reubah_container_name }}"
        hostname: "{{ reubah_container_name }}"
        image: "{{ reubah_image_name }}:{{ reubah_image_tag }}"
        pull: true
        volumes:
          - "{{ reubah_data_directory }}/tmp:/tmp"
        ports:
          - "{{ reubah_port_http }}:{{ reubah_port_http }}"
        env:
          PORT: "{{ reubah_port_http }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ reubah_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ reubah_watchtower_enable }}"
          dockflare.enable: "{{ reubah_dockflare_tunnel }}"
          dockflare.access.group: "{{ reubah_dockflare_access_group }}"
          dockflare.hostname: "{{ reubah_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ reubah_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ reubah_homepage_group }}"
          homepage.icon: "{{ reubah_homepage_icon }}"
          homepage.href: "{{ reubah_homepage_href }}"
          homepage.description: "{{ 'a web-based tool for processing images and converting documents with a simple interface' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ reubah_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ reubah_container_name }}"
          homepage.showStats: "{{ reubah_homepage_showstats }}"
          repliqate.enabled: "{{ reubah_repliqate_enabled }}"
          repliqate.engine: "{{ reubah_repliqate_engine }}"
          repliqate.schedule: "{{ reubah_repliqate_schedule }}"
          repliqate.backup_id: "{{ reubah_repliqate_backup_id }}"
          repliqate.retention: "{{ reubah_repliqate_retention }}"
          traefik.enable: "{{ reubah_available_externally | string }}"
          traefik.http.routers.reubah.rule: "Host(`reubah.{{ ansible_nas_domain }}`)"
          traefik.http.routers.reubah.tls.certresolver: "letsencrypt"
          traefik.http.routers.reubah.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.reubah.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ reubah_hostname }}"
          traefik.http.routers.reubah.middlewares: "{{ reubah_hostname }}@docker"
          traefik.http.middlewares.reubah.IPAllowList.sourcerange: "{{ reubah_traefik_whitelist }}"
          traefik.http.services.reubah.loadbalancer.server.port: "{{ reubah_port_http }}"
          wud.watch.digest: "true"
          wud.link.template: "https://github.com/dendianugerah/reubah/pkgs/container/reubah"
        cpu_shares: "{{ reubah_cpu_shares }}"
        memory: "{{ reubah_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (reubah_port_http | string)] +
                (['https://' + reubah_hostname + '.' + ansible_nas_domain] if (reubah_available_externally is true or reubah_dockflare_tunnel is true) else [])
              }}
  when: reubah_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ reubah_container_name }}"
        state: absent
  when: reubah_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ reubah_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ reubah_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: reubah_enabled is false and archive_app_data_enabled is true
