---
# ANE
ansible_nas_app_name: "Gokapi"
gokapi_enabled: false
gokapi_traefik_enabled: false
gokapi_traefik_whitelist: "{{ lan }}"
gokapi_data_directory: "{{ docker_home }}/gokapi"

# network
gokapi_hostname: "gokapi"
gokapi_port_http: "53842"

# docker
gokapi_container_name: "gokapi"
gokapi_image_name: "f0rc3/gokapi"
gokapi_image_tag: "latest"

# specs
gokapi_cpu_shares: 1024
gokapi_memory: "512M"
gokapi_memory_swap: -1

# autoheal
gokapi_autoheal_enabled: false

# dockflare
gokapi_dockflare_enabled: false
gokapi_dockflare_access_group: ""

# homepage
gokapi_homepage_group: "Apps"
gokapi_homepage_icon: "sh-gokapi.png"
gokapi_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ gokapi_port_http }}"
gokapi_homepage_showstats: false

# repliqate
gokapi_repliqate_enabled: false
gokapi_repliqate_engine: "restic"
gokapi_repliqate_schedule: "@daily 3am"
gokapi_repliqate_backup_id: "{{ gokapi_container_name }}"
gokapi_repliqate_retention: "30d"

# tinyauth
gokapi_tinyauth_enabled: false

# watchtower
gokapi_watchtower_enabled: false