---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Try and stop and remove Gok{{ gokapi_proper_name }}pi
      community.docker.docker_container:
        name: "{{ gokapi_container_name }}"
        state: absent
      register: result

    - name: Check {{ gokapi_proper_name }} is stopped
      ansible.builtin.assert:
        that:
          - not result.changed
