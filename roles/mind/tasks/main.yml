---
- name: Start {{ mind_proper_name }}
  block:
    - name: Create {{ mind_proper_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ mind_data_directory }}"
        - "{{ mind_data_directory }}/db"

    - name: Set {{ mind_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        mind_homepage_href: "https://{{ mind_hostname }}.{{ ansible_nas_domain }}"
      when: mind_traefik_enabled | bool or mind_dockflare_enabled | bool

    - name: Create {{ mind_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ mind_container_name }}"
        hostname: "{{ mind_container_name }}"
        image: "{{ mind_image_name }}:{{ mind_image_tag }}"
        pull: true
        volumes:
          - "{{ mind_data_directory }}/db:/app/db"
        ports:
          - "{{ mind_port_http }}:8080"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ mind_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ mind_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ mind_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ mind_dockflare_access_group }}"
          dockflare.hostname: "{{ mind_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ mind_port_http }}"
          homepage.name: "{{ mind_proper_name }}"
          homepage.group: "{{ mind_homepage_group }}"
          homepage.icon: "{{ mind_homepage_icon }}"
          homepage.href: "{{ mind_homepage_href }}"
          homepage.description: "{{ 'A simple self hosted reminder application that can send push notifications to your device. Set the reminder and forget about it!' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ mind_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ mind_container_name }}"
          homepage.showStats: "{{ mind_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ mind_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ mind_repliqate_engine }}"
          repliqate.schedule: "{{ mind_repliqate_schedule }}"
          repliqate.backup_id: "{{ mind_repliqate_backup_id }}"
          repliqate.retention: "{{ mind_repliqate_retention }}"
          traefik.enable: "{{ mind_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.mind.rule: "Host(`{{ mind_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.mind.tls.certresolver: "letsencrypt"
          traefik.http.routers.mind.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.mind.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.mind.middlewares: "mind@docker{{ ',tinyauth-auth@docker' if mind_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.mind.IPAllowList.sourcerange: "{{ mind_traefik_whitelist }}"
          traefik.http.services.mind.loadbalancer.server.port: "8080"
          wud.tag.include: '^v?\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/mrcas/mind"
        cpu_shares: "{{ mind_cpu_shares }}"
        memory: "{{ mind_memory }}"
        memory_swap: "{{ mind_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ mind_proper_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (mind_port_http | string)] +
                (['https://' + mind_hostname + '.' + ansible_nas_domain] if (mind_traefik_enabled is true or mind_dockflare_enabled is true) else [])
              }}
  when: mind_enabled is true

- name: Stop {{ mind_proper_name }}
  block:
    - name: Stop {{ mind_proper_name }} Container
      community.docker.docker_container:
        name: "{{ mind_container_name }}"
        state: absent
  when: mind_enabled is false

- name: Data Archive {{ mind_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ mind_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - mind_enabled is false