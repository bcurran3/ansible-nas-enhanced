---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "1001"
      with_items:
        - "{{ plexrewind_data_directory }}"
        - "{{ plexrewind_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ plexrewind_container_name }}"
        hostname: "{{ plexrewind_container_name }}"
        image: "{{ plexrewind_image_name }}:{{ plexrewind_image_tag }}"
        pull: true
        ports:
          - "{{ plexrewind_port_http }}:8383"
        volumes:
          - "{{ plexrewind_data_directory }}/config:/app/config"
        network_mode: bridge
        env:
          NEXTAUTH_SECRET: "{{ plexrewind_nextauth_secret }}"
          NEXTAUTH_URL: "{{ plexrewind_nextauth_url }}"
          NEXT_PUBLIC_SITE_URL: "{{ plexrewind_next_public_site_url }}"
          NEXT_PUBLIC_STATISTICS_START_DATE: "{{ plexrewind_next_public_statistics_start_date }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ plexrewind_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ plexrewind_watchtower_enable }}"
          dockflare.enable: "{{ plexrewind_dockflare_tunnel }}"
          dockflare.access.group: "{{ plexrewind_dockflare_access_group }}"
          dockflare.hostname: "{{ plexrewind_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ plexrewind_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ plexrewind_homepage_group }}"
          homepage.icon: "{{ plexrewind_homepage_icon }}"
          homepage.href: "{{ plexrewind_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ plexrewind_port_http }}"
          homepage.description: "{{ 'Present Plex user statistics and habits in a beautiful and organized manner.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ plexrewind_container_name }}"
          homepage.showStats: "{{ plexrewind_homepage_showstats }}"
          repliqate.enabled: "{{ plexrewind_repliqate_enabled }}"
          repliqate.engine: "{{ plexrewind_repliqate_engine }}"
          repliqate.schedule: "{{ plexrewind_repliqate_schedule }}"
          repliqate.backup_id: "{{ plexrewind_repliqate_backup_id }}"
          repliqate.retention: "{{ plexrewind_repliqate_retention }}"
          traefik.enable: "{{ plexrewind_available_externally | string }}"
          traefik.http.routers.plexrewind.rule: "Host(`{{ plexrewind_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.plexrewind.tls.certresolver: "letsencrypt"
          traefik.http.routers.plexrewind.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.plexrewind.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ plexrewind_hostname }}"
          traefik.http.routers.plexrewind.middlewares: "{{ plexrewind_hostname }}@docker"
          traefik.http.middlewares.plexrewind.IPAllowList.sourcerange: "{{ plexrewind_traefik_whitelist }}"
          traefik.http.services.plexrewind.loadbalancer.server.port: "8383"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/raunot/plex-rewind/pkgs/container/plex-rewind"
        cpu_shares: "{{ plexrewind_cpu_shares }}"
        memory: "{{ plexrewind_memory_limit }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (plexrewind_port_http | string)] +
                (['https://' + plexrewind_hostname + '.' + ansible_nas_domain] if (plexrewind_available_externally is true or plexrewind_dockflare_tunnel is true) else [])
              }}
  when: plexrewind_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ plexrewind_container_name }}"
        state: absent
  when: plexrewind_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ plexrewind_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ plexrewind_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: plexrewind_enabled is false and archive_app_data_enabled is true

