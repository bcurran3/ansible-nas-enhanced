---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ plex_rewind_data_directory }}"
        - "{{ plex_rewind_data_directory }}/config"

    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        plex_rewind_env_nextauth_url: "https://{{ plex_rewind_hostname }}.{{ ansible_nas_domain }}"
        plex_rewind_env_next_public_site_url: "https://{{ plex_rewind_hostname }}.{{ ansible_nas_domain }}"
        plex_rewind_homepage_href: "https://{{ plex_rewind_hostname }}.{{ ansible_nas_domain }}"
      when: plex_rewind_traefik_enabled | bool or plex_rewind_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ plex_rewind_container_name }}"
        hostname: "{{ plex_rewind_container_name }}"
        image: "{{ plex_rewind_image_name }}:{{ plex_rewind_image_tag }}"
        pull: true
        ports:
          - "{{ plex_rewind_port_http }}:8383"
        volumes:
          - "{{ plex_rewind_data_directory }}/config:/app/config"
        env:
          AUTH_TRUST_HOST: "{{ plex_rewind_env_auth_trust_host }}"
          NEXTAUTH_SECRET: "{{ plex_rewind_env_nextauth_secret }}"
          NEXTAUTH_URL: "{{ plex_rewind_env_nextauth_url }}"
          NEXTAUTH_URL_INTERNAL: "http://localhost:8383"
          NEXT_PUBLIC_SITE_URL: "{{ plex_rewind_env_next_public_site_url }}"
          NEXT_PUBLIC_STATISTICS_START_DATE: "{{ plex_rewind_env_next_public_statistics_start_date }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ plex_rewind_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ plex_rewind_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ plex_rewind_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ plex_rewind_dockflare_access_group }}"
          dockflare.hostname: "{{ plex_rewind_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ plex_rewind_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ plex_rewind_homepage_group }}"
          homepage.icon: "{{ plex_rewind_homepage_icon }}"
          homepage.href: "{{ plex_rewind_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ plex_rewind_port_http }}"
          homepage.description: "{{ 'Present Plex user statistics and habits in a beautiful and organized manner.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ plex_rewind_container_name }}"
          homepage.showStats: "{{ plex_rewind_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "{{ plex_rewind_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ plex_rewind_repliqate_engine }}"
          repliqate.schedule: "{{ plex_rewind_repliqate_schedule }}"
          repliqate.backup_id: "{{ plex_rewind_repliqate_backup_id }}"
          repliqate.retention: "{{ plex_rewind_repliqate_retention }}"
          traefik.enable: "{{ plex_rewind_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.plexrewind.rule: "Host(`{{ plex_rewind_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.plexrewind.tls.certresolver: "letsencrypt"
          traefik.http.routers.plexrewind.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.plexrewind.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.plexrewind.middlewares: "plexrewind@docker,plexrewind-headers@docker{{ ',tinyauth-auth@docker' if plex_rewind_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.plexrewind-headers.headers.customrequestheaders.X-Forwarded-Proto: "https"
          traefik.http.middlewares.plexrewind.IPAllowList.sourcerange: "{{ plex_rewind_traefik_whitelist }}"
          traefik.http.services.plexrewind.loadbalancer.server.port: "8383"
          wud.tag.include: "^latest$"
          wud.watch.digest: "true"
          wud.link.template: "https://github.com/raunot/plex-rewind/pkgs/container/plex-rewind"
        cpu_shares: "{{ plex_rewind_cpu_shares }}"
        memory: "{{ plex_rewind_memory }}"
        memory_swap: "{{ plex_rewind_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (plex_rewind_port_http | string)] +
                (['https://' + plex_rewind_hostname + '.' + ansible_nas_domain] if (plex_rewind_traefik_enabled is true or plex_rewind_dockflare_enabled is true) else [])
              }}
  when: plex_rewind_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ plex_rewind_container_name }}"
        state: absent
  when: plex_rewind_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ plex_rewind_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - plex_rewind_enabled is false