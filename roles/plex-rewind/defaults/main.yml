---
# ANE
ansible_nas_app_name: "Plex Rewind"
plex_rewind_enabled: false
plex_rewind_traefik_enabled: false
plex_rewind_traefik_whitelist: "{{ lan }}"
plex_rewind_data_directory: "{{ docker_home }}/plex-rewind"

# app
# (required) used to encrypt auth JWT token, generate one with `openssl rand -base64 32`
plex_rewind_nextauth_secret: "m07Gw05Gfdb0qeXOPuEGqMaVKIxLTwuXpwE7T14WSNk="
# change to your domain if you are exposing the app to the internet
plex_rewind_nextauth_url: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ plex_rewind_port_http }}"
# change to your domain if you are exposing the app to the internet
plex_rewind_next_public_site_url: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ plex_rewind_port_http }}"
# starting date for "all time" option (YYYY-MM-DD)
plex_rewind_next_public_statistics_start_date: "2018-01-01"

# network
plex_rewind_hostname: "plexrewind"
plex_rewind_port_http: "8383"

# docker
plex_rewind_container_name: "plex-rewind"
plex_rewind_image_name: "ghcr.io/raunot/plex-rewind"
plex_rewind_image_tag: "latest"

# specs
plex_rewind_cpu_shares: 1024
plex_rewind_memory: "512M"
plex_rewind_memory_swap: -1

# autoheal
plex_rewind_autoheal_enabled: false

# dockflare
plex_rewind_dockflare_enabled: false
plex_rewind_dockflare_access_group: ""

# homepage
plex_rewind_homepage_group: "Apps"
plex_rewind_homepage_icon: "plexrewind.png"
plex_rewind_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ plex_rewind_port_http }}"
plex_rewind_homepage_showstats: false

# repliqate
plex_rewind_repliqate_enabled: false
plex_rewind_repliqate_engine: "restic"
plex_rewind_repliqate_schedule: "@daily 3am"
plex_rewind_repliqate_backup_id: "{{ plex_rewind_container_name }}"
plex_rewind_repliqate_retention: "30d"

# tinyauth
plex_rewind_tinyauth_enabled: false

# watchtower
plex_rewind_watchtower_enabled: false