---
# enable or disable the application
mylar_enabled: false
mylar_available_externally: false
mylar_traefik_whitelist: "{{ lan }}"

# directories
mylar_data_directory: "{{ docker_home }}/mylar"
mylar_comics_directory: "{{ comics_root }}"
mylar_downloads_directory: "{{ downloads_root }}"

# uid / gid
mylar_user_id: "0"
mylar_group_id: "0"

# network
mylar_hostname: "mylar"
mylar_port_http: "8585"

# docker
mylar_container_name: "mylar"
mylar_image_name: "linuxserver/mylar"
mylar_image_version: "latest"

# specs
mylar_memory: "1g"

# homepage
mylar_homepage_group: "Media Management"
mylar_homepage_name: "Mylar"
mylar_homepage_icon: "mylar.png"
mylar_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ mylar_port_http }}"
mylar_homepage_widget_key: "insert_your_key_here"
