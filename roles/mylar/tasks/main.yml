---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        # mode: 0755
      with_items:
        - "{{ mylar_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ mylar_container_name }}"
        hostname: "{{ mylar_container_name }}"
        image: "{{ mylar_image_name }}:{{ mylar_image_version }}"
        pull: true
        volumes:
          - "{{ mylar_comics_directory }}:/comics:rw"
          - "{{ mylar_downloads_directory }}:/downloads:rw"
          - "{{ mylar_data_directory }}/config:/config:rw"
        network_mode: "bridge"
        ports:
          - "{{ mylar_port_http }}:8090"
        env:
          DOCKER_MODS: "{{ mylar_env_docker_mods }}"
          PUID: "{{ mylar_user_id }}"
          PGID: "{{ mylar_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ mylar_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ mylar_watchtower_monitor_only }}"
          dockflare.enable: "{{ mylar_dockflare_tunnel }}"
          dockflare.access.group: "{{ mylar_dockflare_access_group }}"
          dockflare.hostname: "{{ mylar_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ mylar_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ mylar_homepage_group }}"
          homepage.icon: "{{ mylar_homepage_icon }}"
          homepage.href: "{{ mylar_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ mylar_port_http }}"
          homepage.description: "{{ 'comicbook management' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ mylar_container_name }}"
          homepage.showStats: "false"
          homepage.widget.type: "mylar"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ mylar_port_http }}"
          homepage.widget.key: "{{ mylar_homepage_widget_key }}"
          traefik.enable: "{{ mylar_available_externally | string }}"
          traefik.http.routers.mylar.rule: "Host(`{{ mylar_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.mylar.tls.certresolver: "letsencrypt"
          traefik.http.routers.mylar.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.mylar.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ mylar_hostname }}"
          traefik.http.routers.mylar.middlewares: "{{ mylar_hostname }}@docker"
          traefik.http.middlewares.mylar.IPAllowList.sourcerange: "{{ mylar_traefik_whitelist }}"
          traefik.http.services.mylar.loadbalancer.server.port: "8090"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://lscr.io/linuxserver/mylar3"
        cpu_shares: "{{ mylar_cpu_shares }}"
        memory: "{{ mylar_memory }}"
        restart_policy: unless-stopped
  when: mylar_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ mylar_container_name }}"
        state: absent
  when: mylar_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ mylar_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ mylar_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: mylar_enabled is false and archive_app_data_enabled is true
