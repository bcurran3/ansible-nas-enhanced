---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Get {{ vert_proper_name }} container state
      community.docker.docker_container:
        name: "{{ vert_container_name }}"
      register: result

    - name: Get {{ vert_proper_name }} daemon container state
      community.docker.docker_container:
        name: "{{ vertd_container_name }}"
      register: resultd

    - name: Check if {{ vert_proper_name }} container is running
      ansible.builtin.assert:
        that:
          - result.container['State']['Status'] == "running"
          - result.container['State']['Restarting'] == false
          - resultd.container['State']['Status'] == "running"
          - resultd.container['State']['Restarting'] == false
