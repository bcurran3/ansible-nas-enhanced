#      args:
#        PUBLIC_URL: "{{ vert_env_public_url }}"
#        PUB_HOSTNAME: "{{ vert_env_pub_hostname }}"
#        PUB_PLAUSIBLE_URL: "{{ vert_env_pub_plausible_url }}"
#        PUB_DISABLE_ALL_EXTERNAL_REQUESTS: "{{ vert_env_pub_disable_all_external_requests }}"
#        PUB_ENV: "{{ vert_env_pub_env }}"
#        PUB_VERTD_URL: "{{ vert_env_pub_vertd_url }}"
