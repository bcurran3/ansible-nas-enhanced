---
- name: Start {{ vert_proper_name }}
  block:

    - name: Set {{ vert_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        vert_env_public_url: "https://{{ vert_hostname }}.{{ ansible_nas_domain }}"
        vert_homepage_href: "https://{{ vert_hostname }}.{{ ansible_nas_domain }}"
      when: vert_traefik_enabled | bool or vert_dockflare_enabled | bool

    - name: Create {{ vert_proper_name }} daemon Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ vertd_container_name }}"
        hostname: "{{ vertd_container_name }}"
        image: "{{ vertd_image_name }}:{{ vertd_image_tag }}"
        pull: true
        ports:
          - "{{ vertd_port_http }}:24153"
        device_requests: "{{
          [{'driver': 'nvidia', 'count': -1, 'capabilities': ['gpu']}]
          if nvidia_runtime_enabled | default(false) | bool else omit
        }}"
        devices: >-
          {%- set dev_list = (app_devices | default([])) -%}
          {%- if intel_igpu_enabled | default(false) | bool or amd_gpu_enabled | default(false) | bool -%}
            {%- set _ = dev_list.append('/dev/dri:/dev/dri') -%}
          {%- endif -%}
          {%- if amd_gpu_enabled | default(false) | bool and vertd_amd_ai_enabled | default(false) | bool -%}
            {%- set _ = dev_list.append('/dev/kfd:/dev/kfd') -%}
          {%- endif -%}
          {{ dev_list if dev_list | length > 0 else omit }}
        group_add: "{{ ['render', 'video'] if (amd_gpu_enabled | default(false) | bool or intel_igpu_enabled | default(false) | bool) else omit }}"
        runtime: "{{ 'nvidia' if nvidia_runtime_enabled | default(false) | bool else omit }}"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ vertd_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ vertd_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "{{ vert_proper_name }} daemon"
          homepage.group: "{{ vertd_homepage_group }}"
          homepage.icon: "{{ vertd_homepage_icon }}"
          homepage.href: "{{ vertd_homepage_href }}"
          homepage.description: "{{ 'VERT''s solution to crappy video conversion services.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ vertd_container_name }}"
          homepage.showStats: "{{ vertd_homepage_showstats | ternary('true', 'false') }}"
          traefik.enable: "false"
          wud.watch.digest: "true"
          wud.link.template: "https://github.com/VERT-sh/vertd/pkgs/container/vertd"
        cpu_shares: "{{ vertd_cpu_shares }}"
        memory: "{{ vertd_memory }}"
        memory_swap: "{{ vertd_memory_swap }}"
        restart_policy: unless-stopped

# TDL: implement a local build to use custom env vars
