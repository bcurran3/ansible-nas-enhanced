---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} daemon Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ vertd_container_name }}"
        hostname: "{{ vertd_container_name }}"
        image: "{{ vertd_image_name }}:{{ vertd_image_tag }}"
        pull: true
        ports:
          - "{{ vertd_port_http }}:24153"
        runtime: "{{ 'nvidia' if nvidia_runtime_enabled | bool else omit }}"
        device_requests: "{{
          [{'driver': 'nvidia', 'count': -1, 'capabilities': ['gpu']}]
          if nvidia_runtime_enabled | bool else omit
        }}"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ vertd_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ vertd_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} daemon"
          homepage.group: "{{ vertd_homepage_group }}"
          homepage.icon: "{{ vertd_homepage_icon }}"
          homepage.href: "{{ vertd_homepage_href }}"
          homepage.description: "{{ 'VERT''s solution to crappy video conversion services.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ vertd_container_name }}"
          homepage.showStats: "{{ vertd_homepage_showstats }}"
          traefik.enable: "false"
          wud.watch.digest: "true"
          wud.link.template: "https://github.com/VERT-sh/vertd/pkgs/container/vertd"
        cpu_shares: "{{ vertd_cpu_shares }}"
        memory: "{{ vertd_memory }}"
        restart_policy: unless-stopped

# TDL: implement a local built to use custom env vars
