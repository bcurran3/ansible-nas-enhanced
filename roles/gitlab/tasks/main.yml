---
- name: Start {{ ansible_nas_app_name }}
  block:
    # The gitlab uid/gid matches 'git:git' in the Gitlab Docker image.
    - name: Create {{ ansible_nas_app_name }} group account
      ansible.builtin.group:
        name: gitlab
        gid: 998
        state: present

    - name: Create {{ ansible_nas_app_name }} user account
      ansible.builtin.user:
        name: gitlab
        uid: 998
        state: present
        system: yes
        update_password: on_create
        create_home: no
        group: gitlab

    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: gitlab
        group: gitlab
      with_items:
        - "{{ gitlab_data_directory }}/config"
        - "{{ gitlab_data_directory }}/log"
        - "{{ gitlab_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ gitlab_container_name }}"
        hostname: "{{ gitlab_container_name }}"
        image: "{{ gitlab_image_name }}:{{ gitlab_image_version }}"
        pull: true
        volumes:
          - "{{ gitlab_data_directory }}/config:/etc/gitlab:rw"
          - "{{ gitlab_data_directory }}/log:/var/log/gitlab:rw"
          - "{{ gitlab_data_directory }}/data:/var/opt/gitlab:rw"
        network_mode: "bridge"
        ports:
          - "{{ gitlab_port_http }}:80"
          - "{{ gitlab_port_https }}:443"
          - "{{ gitlab_port_ssh }}:22"
        env:
          TZ: "{{ ansible_nas_timezone }}"
          PUID: "{{ gitlab_user_id }}"
          PGID: "{{ gitlab_group_id }}"
        labels:
          autoheal: "{{ gitlab_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ gitlab_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ gitlab_homepage_group }}"
          homepage.icon: "{{ gitlab_homepage_icon }}"
          homepage.href: "{{ gitlab_homepage_href }}"
          homepage.description: "{{ 'gitlab description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ gitlab_container_name }}"
          homepage.showStats: "{{ gitlab_homepage_showStats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ gitlab_port }}"
          traefik.enable: "{{ gitlab_available_externally | string }}"
          traefik.http.routers.gitlab.rule: "Host(`{{ gitlab_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.gitlab.tls.certresolver: "letsencrypt"
          traefik.http.routers.gitlab.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.gitlab.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ gitlab_hostname }}"
          traefik.http.routers.gitlab.middlewares: "{{ gitlab_hostname }}@docker"
          traefik.http.middlewares.gitlab.IPAllowList.sourcerange: "{{ gitlab_traefik_whitelist }}"
          traefik.http.services.gitlab.loadbalancer.server.port: "80"
        cpu_shares: "{{ gitlab_cpu_shares }}"
        memory: "{{ gitlab_memory }}"
        restart_policy: unless-stopped
  when: gitlab_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ gitlab_container_name }}"
        state: absent
  when: gitlab_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ gitlab_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ gitlab_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: gitlab_enabled is false and archive_app_data_enabled is true
