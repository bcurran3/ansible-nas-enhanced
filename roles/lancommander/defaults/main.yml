---
# ANE
ansible_nas_app_name: "LANCommander"
lancommander_enabled: false
lancommander_available_externally: false
lancommander_traefik_whitelist: "{{ lan }}"
lancommander_data_directory: "{{ docker_home }}/lancommander"

# network
lancommander_hostname: "lancommander"
lancommander_port_http: "1337"

# docker
lancommander_container_name: "lancommander"
lancommander_image_name: "lancommander/lancommander"
lancommander_image_tag: "latest"

# specs
lancommander_cpu_shares: 1024
lancommander_memory: "1G"

# app
lancommander_puid: "1000"
lancommander_pgid: "1000"

# autoheal
lancommander_autoheal: "false"

# dockflare
lancommander_dockflare_tunnel: "false"
lancommander_dockflare_access_group: ""

# homepage
lancommander_homepage_group: "Apps"
lancommander_homepage_icon: "lancommander.png"
lancommander_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ lancommander_port_http }}"
lancommander_homepage_showstats: "false"

# repliqate
lancommander_repliqate_enabled: "false"
lancommander_repliqate_engine: "restic"
lancommander_repliqate_schedule: "@daily 3am"
lancommander_repliqate_backup_id: "{{ lancommander_container_name }}"
lancommander_repliqate_retention: "30d"

# tinyauth
lancommander_tinyauth_enabled: false

# watchtower
lancommander_watchtower_enable: "false"