---
# ANE
twofauth_proper_name: "2FAuth"
twofauth_enabled: false
twofauth_traefik_enabled: false
twofauth_traefik_whitelist: "{{ lan }}"

# directories
twofauth_data_directory: "{{ docker_home }}/2fauth"

# docker
twofauth_container_name: "2fauth"
twofauth_image_name: "2fauth/2fauth"
twofauth_image_tag: "latest"

# specs
twofauth_cpu_shares: 1024
twofauth_memory: "1G"
twofauth_memory_swap: -1

# network
twofauth_hostname: "2fauth"
twofauth_port_http: "8001"

# app
twofauth_app_key: "cIAZm9N4b/jlWLNm55/18PbcKN9lny36KiE0t3Ox4YI=" # "use_php_artisan_key:generate"
twofauth_mail_driver: "" # "log"
twofauth_mail_host: "" # "smtp.mailtrap.io"
twofauth_mail_port: "" # "2525"
twofauth_mail_username: ""
twofauth_mail_password: ""
twofauth_mail_encryption: ""
twofauth_mail_from_name: "" # "{{ twofauth_hostname }}"
twofauth_mail_from_address: "" # "{{ twofauth_hostname }}@{{ ansible_nas_domain }}"
twofauth_mail_verify_ssl_peer: ""

# autoheal
twofauth_autoheal_enabled: false

# dockflare
twofauth_dockflare_enabled: false
twofauth_dockflare_access_group: ""

# homepage 
twofauth_homepage_group: "Apps"
twofauth_homepage_icon: "sh-2FAuth.png"
twofauth_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ twofauth_port_http }}"
twofauth_homepage_showstats: false

# repliqate
twofauth_repliqate_enabled: false
twofauth_repliqate_engine: "restic"
twofauth_repliqate_schedule: "@daily 3am"
twofauth_repliqate_backup_id: "{{ twofauth_container_name }}"
twofauth_repliqate_retention: "30d"

# tinyauth
twofauth_tinyauth_enabled: false

# watchtower
twofauth_watchtower_enabled: false
