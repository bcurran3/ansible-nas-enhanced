---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ utorrent_data_directory }}"
        - "{{ utorrent_data_directory }}/config"
        - "{{ utorrent_download_directory }}"
        - "{{ utorrent_download_directory_active }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ utorrent_container_name }}"
        image: "{{ utorrent_image_name }}:{{ utorrent_image_version }}"
        pull: true
        volumes:
          - "{{ utorrent_data_directory }}/config:/utorrent/settings:rw"
          - "{{ utorrent_download_directory }}:/data:rw"
          - "{{ torrents_root }}:/utorrent/torrents:rw"
        ports:
          - "{{ utorrent_port_http }}:8080"
          - "{{ utorrent_port_bt }}:6881"
          - "{{ utorrent_port_bt }}:6881/udp"
        env:
          TZ: "{{ ansible_nas_timezone }}"
          UID: "{{ utorrent_user_id }}"
          GID: "{{ utorrent_group_id }}"
          webui: "ng"
          dir_active: "/data/.incomplete"
          dir_completed: "/data"
        restart_policy: unless-stopped
        cpu_shares: "{{ utorrent_cpu_shares }}"
        memory: "{{ utorrent_memory }}"
        labels:
          autoheal: "{{ utorrent_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ utorrent_watchtower_monitor_only }}"
          traefik.enable: "{{ utorrent_available_externally | string }}"
          traefik.http.routers.utorrent.rule: "Host(`{{ utorrent_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.utorrent.tls.certresolver: "letsencrypt"
          traefik.http.routers.utorrent.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.utorrent.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.services.utorrent.loadbalancer.server.port: "8080"
  when: utorrent_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ utorrent_container_name }}"
        state: absent
  when: utorrent_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ utorrent_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ utorrent_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: utorrent_enabled is false and archive_app_data_enabled is true
