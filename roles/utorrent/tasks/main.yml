---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ utorrent_data_directory }}"
        - "{{ utorrent_data_directory }}/config"
        - "{{ utorrent_download_directory }}"
        - "{{ utorrent_download_directory_active }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ utorrent_container_name }}"
        hostname: "{{ utorrent_container_name }}"
        image: "{{ utorrent_image_name }}:{{ utorrent_image_version }}"
        pull: true
        volumes:
          - "{{ utorrent_data_directory }}/config:/utorrent/settings:rw"
          - "{{ utorrent_download_directory }}:/data:rw"
          - "{{ torrents_root }}:/utorrent/torrents:rw"
        ports:
          - "{{ utorrent_port_http }}:8080"
          - "{{ utorrent_port_bt }}:6881"
          - "{{ utorrent_port_bt }}:6881/udp"
        env:
          UID: "{{ utorrent_user_id }}"
          GID: "{{ utorrent_group_id }}"
          webui: "ng"
          dir_active: "/data/.incomplete"
          dir_completed: "/data"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ utorrent_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ utorrent_watchtower_enable }}"
          dockflare.enable: "{{ utorrent_dockflare_tunnel }}"
          dockflare.access.group: "{{ utorrent_dockflare_access_group }}"
          dockflare.hostname: "{{ utorrent_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ utorrent_port_http }}/gui/"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ utorrent_homepage_group }}"
          homepage.icon: "{{ utorrent_homepage_icon }}"
          homepage.href: "{{ utorrent_homepage_href }}"
          homepage.description: "{{ 'utorrent server' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ utorrent_container_name }}"
          homepage.showStats: "{{ utorrent_homepage_showstats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ utorrent_port_http }}/gui/"
          repliqate.enabled: "{{ utorrent_repliqate_enabled }}"
          repliqate.engine: "{{ utorrent_repliqate_engine }}"
          repliqate.schedule: "{{ utorrent_repliqate_schedule }}"
          repliqate.backup_id: "{{ utorrent_repliqate_backup_id }}"
          repliqate.retention: "{{ utorrent_repliqate_retention }}"
          traefik.enable: "{{ utorrent_available_externally | string }}"
          traefik.http.routers.utorrent.rule: "Host(`{{ utorrent_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.utorrent.tls.certresolver: "letsencrypt"
          traefik.http.routers.utorrent.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.utorrent.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ utorrent_hostname }}"
          traefik.http.routers.utorrent.middlewares: "{{ utorrent_hostname }}@docker"
          traefik.http.middlewares.utorrent.IPAllowList.sourcerange: "{{ utorrent_traefik_whitelist }}"
          traefik.http.services.utorrent.loadbalancer.server.port: "8080"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/ekho/utorrent"
        cpu_shares: "{{ utorrent_cpu_shares }}"
        memory: "{{ utorrent_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
          {{
            [
              'http://' ~ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] ~ ':' ~ utorrent_port_http ~ '/gui/'
            ] + (
              ['https://' ~ utorrent_hostname ~ '.' ~ ansible_nas_domain ~ '/gui/']
              if (utorrent_available_externally is true or utorrent_dockflare_tunnel is true) else []
            )
          }}
  when: utorrent_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ utorrent_container_name }}"
        state: absent
  when: utorrent_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ utorrent_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - utorrent_enabled is false