---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directory
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ change_detection_data_directory }}"
        - "{{ change_detection_data_directory }}/datastore"


    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        change_detection_homepage_href: "https://{{ change_detection_hostname }}.{{ ansible_nas_domain }}"
      when: change_detection_traefik_enabled | bool or change_detection_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Sock Puppet(eer) Browser Docker Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ change_detection_sockpuppet_container_name }}"
        hostname: "{{ change_detection_sockpuppet_container_name }}"
        image: "{{ change_detection_sockpuppet_image_name }}:{{ change_detection_sockpuppet_image_tag }}"
        pull: true
        capabilities:
          - SYS_ADMIN
        env:
          SCREEN_WIDTH: "1920"
          SCREEN_HEIGHT: "1024"
          SCREEN_DEPTH: "16"
          MAX_CONCURRENT_CHROME_PROCESSES: "10"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ change_detection_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ change_detection_sockpuppet_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "false"
          homepage.name: "Sock Puppet(eer) Browser"
          homepage.group: "{{ change_detection_sockpuppet_homepage_group }}"
          homepage.icon: "{{ change_detection_sockpuppet_homepage_icon }}"
          homepage.href: "{{ change_detection_sockpuppet_homepage_href }}"
          homepage.description: "{{ 'A scalable server for providing Chrome interfaces where needed' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ change_detection_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ change_detection_sockpuppet_container_name }}"
          homepage.showStats: "{{ change_detection_sockpuppet_homepage_showstats | ternary('true', 'false') }}"
          repliqate.enabled: "false"
          traefik.enable: "false"
          wud.tag.include: "^latest$"
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/dgtlmoon/sockpuppetbrowser"
        cpu_shares: "{{ change_detection_sockpuppet_cpu_shares }}"
        memory: "{{ change_detection_sockpuppet_memory }}"
        memory_swap: "{{ change_detection_sockpuppet_memory_swap }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ change_detection_container_name }}"
        hostname: "{{ change_detection_container_name }}"
        image: "{{ change_detection_image_name }}:{{ change_detection_image_tag }}"
        pull: true
        volumes:
          - "{{ change_detection_data_directory }}/datastore:/datastore"
        ports:
          - "{{ change_detection_port_http }}:{{ change_detection_port_http }}"
        env:
          BASE_URL: "{{ change_detection_base_url }}"
          HIDE_REFERER: "{{ change_detection_hide_referer }}"
          PLAYWRIGHT_DRIVER_URL: "ws://{{ change_detection_sockpuppet_hostname }}:3000"
          PORT: "{{ change_detection_port_http }}"
          TZ: "{{ ansible_nas_timezone }}"
        links:
          - "{{ change_detection_sockpuppet_container_name }}"
        labels:
          autoheal: "{{ change_detection_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ change_detection_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ change_detection_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ change_detection_dockflare_access_group }}"
          dockflare.hostname: "{{ change_detection_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ change_detection_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ change_detection_homepage_group }}"
          homepage.icon: "{{ change_detection_homepage_icon }}"
          homepage.href: "{{ change_detection_homepage_href }}"
          homepage.description: "{{ 'The best and simplest free open source web page change detection, website watcher, restock monitor and notification service.' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ change_detection_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ change_detection_container_name }}"
          homepage.showStats: "{{ change_detection_homepage_showstats | ternary('true', 'false') }}"
          homepage.widget.type: "changedetectionio"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ change_detection_port_http }}"
          homepage.widget.key: "{{ change_detection_widget_key }}"
          repliqate.enabled: "{{ change_detection_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ change_detection_repliqate_engine }}"
          repliqate.schedule: "{{ change_detection_repliqate_schedule }}"
          repliqate.backup_id: "{{ change_detection_repliqate_backup_id }}"
          repliqate.retention: "{{ change_detection_repliqate_retention }}"
          traefik.enable: "{{ change_detection_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.changedetection.rule: "Host(`{{ change_detection_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.changedetection.tls.certresolver: "letsencrypt"
          traefik.http.routers.changedetection.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.changedetection.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.changedetection.middlewares: "changedetection@docker{{ ',tinyauth-auth@docker' if change_detection_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.changedetection.IPAllowList.sourcerange: "{{ change_detection_traefik_whitelist }}"
          traefik.http.services.change_detection.loadbalancer.server.port: "{{ change_detection_port_http }}"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/dgtlmoon/changedetection.io/pkgs/container/changedetection.io"
        cpu_shares: "{{ change_detection_cpu_shares }}"
        memory: "{{ change_detection_memory }}"
        memory_swap: "{{ change_detection_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (change_detection_port_http | string)] +
                (['https://' + change_detection_hostname + '.' + ansible_nas_domain] if (change_detection_traefik_enabled is true or change_detection_dockflare_enabled is true) else [])
              }}
  when: change_detection_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ change_detection_container_name }}"
        state: absent

    - name: Stop Sock Puppet(eer) Browser Container
      community.docker.docker_container:
        name: "{{ change_detection_sockpuppet_container_name }}"
        state: absent
  when: change_detection_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ change_detection_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - change_detection_enabled is false