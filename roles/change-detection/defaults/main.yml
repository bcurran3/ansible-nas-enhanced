---
# ANE
ansible_nas_app_name: "Change Detection"
change_detection_enabled: false
change_detection_traefik_enabled: false
change_detection_traefik_whitelist: "{{ lan }}"
change_detection_data_directory: "{{ docker_home }}/change-detection"

# network
change_detection_port_http: "3029"
change_detection_hostname: "changedetection"
change_detection_sockpuppet_hostname: "sockpuppetserver"

# docker
change_detection_container_name: "change-detection"
change_detection_image_name: "ghcr.io/dgtlmoon/changedetection.io"
change_detection_image_tag: "latest"
change_detection_sockpuppet_container_name: "sockpuppetserver"
change_detection_sockpuppet_image_name: "dgtlmoon/sockpuppetbrowser"
change_detection_sockpuppet_image_tag: "latest"

# specs
change_detection_cpu_shares: 1024
change_detection_memory: "1G"
change_detection_memory_swap: -1
change_detection_sockpuppet_cpu_shares: 1024
change_detection_sockpuppet_memory: "1G"
change_detection_sockpuppet_memory_swap: -1

# app
change_detection_base_url: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ change_detection_port_http }}"
change_detection_hide_referer: "true"

# autoheal
change_detection_autoheal_enabled: false

# dockflare
change_detection_dockflare_enabled: false
change_detection_dockflare_access_group: ""

# healthcheck
change_detection_healthcheck_test: ["CMD", "python3", "-c", "import socket; s = socket.socket(); s.connect(('127.0.0.1', {{ change_detection_port_http }}))"]
change_detection_healthcheck_interval: 1m
change_detection_healthcheck_timeout: 10s
change_detection_healthcheck_retries: 3
change_detection_healthcheck_start_period: 30s
change_detection_sockpuppet_healthcheck_test: ["CMD-SHELL", "pgrep -f chrome || pgrep -f chromium || wget --quiet --tries=1 --spider http://127.0.0.1:3000 || curl -f http://127.0.0.1:3000 || exit 1"]
change_detection_sockpuppet_healthcheck_interval: 1m
change_detection_sockpuppet_healthcheck_timeout: 10s
change_detection_sockpuppet_healthcheck_retries: 3
change_detection_sockpuppet_healthcheck_start_period: 45s

# homepage
change_detection_homepage_group: "Apps"
change_detection_homepage_icon: "changedetection.png"
change_detection_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ change_detection_port_http }}"
change_detection_homepage_showstats: false
change_detection_widget_key: ""
change_detection_sockpuppet_homepage_group: "Misc"
change_detection_sockpuppet_homepage_icon: "chrome.png"
change_detection_sockpuppet_homepage_href: "{{ change_detection_homepage_href }}"
change_detection_sockpuppet_homepage_showstats: false

# repliqate
change_detection_repliqate_enabled: false
change_detection_repliqate_engine: "restic"
change_detection_repliqate_schedule: "@daily 3am"
change_detection_repliqate_backup_id: "{{ change_detection_container_name }}"
change_detection_repliqate_retention: "30d"

# tinyauth
change_detection_tinyauth_enabled: false

# watchtower
change_detection_watchtower_enabled: false
change_detection_sockpuppet_watchtower_enabled: false
