---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Get container state
      community.docker.docker_container_info:
        name: "{{ change_detection_container_name }}"
      register: result_app

    - name: Get container state
      community.docker.docker_container_info:
        name: "{{ change_detection_sockpuppet_container_name }}"
      register: result_sockpuppet

    - name: Check {{ change_detection_proper_name }} is running
      ansible.builtin.assert:
        that:
          - result_app.container['State']['Status'] == "running"
          - result_app.container['State']['Restarting'] == false
          - result_sockpuppet.container['State']['Status'] == "running"
          - result_sockpuppet.container['State']['Restarting'] == false