---
# ANE
ansible_nas_app_name: "MeshCentral"
meshcentral_enabled: false
meshcentral_available_externally: false
meshcentral_traefik_whitelist: "{{ lan }}"
meshcentral_data_directory: "{{ docker_home }}/meshcentral"

# network
meshcentral_network_name: "meshcentral"
meshcentral_hostname: "meshcentral"
meshcentral_port_http: "9012"

# docker
meshcentral_container_name: "meshcentral"
meshcentral_image_name: "typhonragewind/meshcentral" # possibly need a new image, on Feb 11, 2024 Typhonragewind posted "I won't be adding more changes at this moment, other than fixing bugs."
meshcentral_image_tag: "mongodb-latest"
meshcentral_db_container_name: "meshcentral-db"
meshcentral_db_image_name: "mongo"
meshcentral_db_image_tag: "latest"

# specs
meshcentral_cpu_shares: 1024
meshcentral_memory: "1G"
meshcentral_db_cpu_shares: 1024
meshcentral_db_memory: "1G"

# app
meshcentral_env_allow_new_accounts: "false" #set to false if you want disable self-service creation of new accounts besides the first (admin)
meshcentral_env_backups_pw: "TopSecret" #password for the autobackup function
meshcentral_env_backup_interval: "24" #Interval in hours for the autobackup function
meshcentral_env_backup_keep_days: "10" #number of days of backups the function keeps
meshcentral_env_hostname: "{{ meshcentral_hostname }}.{{ ansible_nas_domain }}"
meshcentral_env_iframe: "false" #set to true if you wish to enable iframe support
meshcentral_env_node_env: "production"
meshcentral_env_reverse_proxy: "{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}" #set to your reverse proxy IP if you want to put meshcentral behind a reverse proxy
meshcentral_env_reverse_proxy_tls_port: "443"
meshcentral_env_webrtc: "false" #set to true to enable WebRTC - per documentation it is not officially released with meshcentral, but is solid enough to work with. Use with caution

# autoheal
meshcentral_autoheal: "false"
meshcentral_db_autoheal: "false"

# dockflare
meshcentral_dockflare_tunnel: "false"
meshcentral_dockflare_access_group: ""

# homepage
meshcentral_homepage_group: "Apps"
meshcentral_homepage_icon: "meshcentral.png"
meshcentral_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ meshcentral_port_http }}"
meshcentral_homepage_showstats: "false"
meshcentral_db_homepage_group: "DBs"
meshcentral_db_homepage_icon: "mongodb.png"
meshcentral_db_homepage_showstats: "false"

# repliqate
meshcentral_repliqate_enabled: "false"
meshcentral_repliqate_engine: "restic"
meshcentral_repliqate_schedule: "@daily 3am"
meshcentral_repliqate_backup_id: "{{ meshcentral_container_name }}"
meshcentral_repliqate_retention: "30d"
meshcentral_db_repliqate_enabled: "false"
meshcentral_db_repliqate_engine: "restic"
meshcentral_db_repliqate_schedule: "@daily 3am"
meshcentral_db_repliqate_backup_id: "{{ meshcentral_db_container_name }}"
meshcentral_db_repliqate_retention: "30d"

# watchtower
meshcentral_watchtower_enable: "false"
meshcentral_db_watchtower_enable: "false"