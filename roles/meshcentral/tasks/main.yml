---
# WIP - NEEDS A TEMPLATE TO ADD SOME VALUES
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ meshcentral_data_directory }}"
        - "{{ meshcentral_data_directory }}/backups"
        - "{{ meshcentral_data_directory }}/data"
        - "{{ meshcentral_data_directory }}/db"
        - "{{ meshcentral_data_directory }}/user_files"
        - "{{ meshcentral_data_directory }}/web"

    - name: Create {{ ansible_nas_app_name }} Network
      community.docker.docker_network:
        name: "{{ meshcentral_network_name }}"

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ meshcentral_db_container_name }}"
        hostname: "mongodb"
#       ^ check if env var in app can specify db hostname to connect
#       hostname: "{{ meshcentral_db_container_name }}"
        image: "{{ meshcentral_db_image_name }}:{{ meshcentral_db_image_tag }}"
        pull: true
        networks:
          - name: "{{ meshcentral_network_name }}"
        networks_cli_compatible: "yes"
        volumes:
          - "{{ meshcentral_data_directory }}/db:/data/db"
        network_mode: bridge
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ meshcentral_db_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ meshcentral_db_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} MongoDB"
          homepage.group: "{{ meshcentral_db_homepage_group }}"
          homepage.icon: "{{ meshcentral_db_homepage_icon }}"
          homepage.href: "{{ meshcentral_homepage_href }}"
          homepage.description: "{{ 'The MongoDB Database' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ meshcentral_db_container_name }}"
          homepage.showStats: "{{ meshcentral_db_homepage_showstats }}"
          repliqate.enabled: "{{ meshcentral_db_repliqate_enabled }}"
          repliqate.engine: "{{ meshcentral_db_repliqate_engine }}"
          repliqate.schedule: "{{ meshcentral_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ meshcentral_db_repliqate_backup_id }}"
          repliqate.retention: "{{ meshcentral_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/mongo"
        cpu_shares: "{{ meshcentral_db_cpu_shares }}"
        memory: "{{ meshcentral_db_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ meshcentral_container_name }}"
        hostname: "{{ meshcentral_container_name }}"
        image: "{{ meshcentral_image_name }}:{{ meshcentral_image_tag }}"
        pull: true
        networks:
          - name: "{{ meshcentral_network_name }}"
        networks_cli_compatible: "yes"
        ports:
          - "{{ meshcentral_port_http }}:4430"
          - 4433:4433 # Intel AMT CIRA
          - 16990/udp:16990/udp
        volumes:
          - "{{ meshcentral_data_directory }}/backups:/opt/meshcentral/meshcentral-backups"
          - "{{ meshcentral_data_directory }}/data:/opt/meshcentral/meshcentral-data"
          - "{{ meshcentral_data_directory }}/user_files:/opt/meshcentral/meshcentral-files"
          - "{{ meshcentral_data_directory }}/web:/opt/meshcentral/meshcentral-web"
        network_mode: bridge
        env:
          ALLOW_NEW_ACCOUNTS: "{{ meshcentral_env_allow_new_accounts }}"
          BACKUPS_PW: "{{ meshcentral_env_backups_pw }}"
          BACKUP_INTERVAL: "{{ meshcentral_env_backup_interval }}"
          BACKUP_KEEP_DAYS: "{{ meshcentral_env_backup_keep_days }}"
          HOSTNAME: "{{ meshcentral_env_hostname }}"
          IFRAME: "{{ meshcentral_env_iframe }}"
# I don't know if typhonragewind/meshcentral supports setting the mongodb URL
#         MONGODB_URL: "mongodb://mongodb:27017" 
          NODE_ENV: "{{ meshcentral_env_node_env }}"
          REVERSE_PROXY: "{{ meshcentral_env_reverse_proxy }}"
          REVERSE_PROXY_TLS_PORT: "{{ meshcentral_env_reverse_proxy_tls_port }}"
          WEBRTC: "{{ meshcentral_env_webrtc }}"
          TZ: "{{ ansible_nas_timezone }}"
        links:
          - "{{ meshcentral_db_container_name }}"
        labels:
          autoheal: "{{ meshcentral_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ meshcentral_watchtower_enable }}"
          dockflare.enable: "{{ meshcentral_dockflare_tunnel }}"
          dockflare.access.group: "{{ meshcentral_dockflare_access_group }}"
          dockflare.hostname: "{{ meshcentral_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ meshcentral_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ meshcentral_homepage_group }}"
          homepage.icon: "{{ meshcentral_homepage_icon }}"
          homepage.href: "{{ meshcentral_homepage_href }}"
          homepage.description: "{{ 'A complete web-based remote monitoring and management web site.' if homepage_show_description else omit }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ meshcentral_port_http }}"
          homepage.server: "my-docker"
          homepage.container: "{{ meshcentral_container_name }}"
          homepage.showStats: "{{ meshcentral_homepage_showstats }}"
          repliqate.enabled: "{{ meshcentral_repliqate_enabled }}"
          repliqate.engine: "{{ meshcentral_repliqate_engine }}"
          repliqate.schedule: "{{ meshcentral_repliqate_schedule }}"
          repliqate.backup_id: "{{ meshcentral_repliqate_backup_id }}"
          repliqate.retention: "{{ meshcentral_repliqate_retention }}"
          traefik.enable: "{{ meshcentral_available_externally | string }}"
          traefik.http.routers.meshcentral.rule: "Host(`{{ meshcentral_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.meshcentral.tls.certresolver: "letsencrypt"
          traefik.http.routers.meshcentral.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.meshcentral.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ meshcentral_hostname }}"
          traefik.http.routers.meshcentral.middlewares: "{{ meshcentral_hostname }}@docker"
          traefik.http.middlewares.meshcentral.IPAllowList.sourcerange: "{{ meshcentral_traefik_whitelist }}"
          traefik.http.services.meshcentral.loadbalancer.server.port: "4430"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/typhonragewind/meshcentral"
        cpu_shares: "{{ meshcentral_cpu_shares }}"
        memory: "{{ meshcentral_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (meshcentral_port_http | string)] +
                (['https://' + meshcentral_hostname + '.' + ansible_nas_domain] if (meshcentral_available_externally is true or meshcentral_dockflare_tunnel is true) else [])
              }}
  when: meshcentral_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ meshcentral_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ meshcentral_db_container_name }}"
        state: absent

    - name: Delete {{ ansible_nas_app_name }} Network
      community.docker.docker_network:
        name: "{{ meshcentral_network_name }}"
        state: absent
  when: meshcentral_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ meshcentral_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - meshcentral_enabled is false

  # NOTE:
  # need to edit config.json with       "allowedOrigin": true 
  # need to edit config.json with the IP address in two fields
