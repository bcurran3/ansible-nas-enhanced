---
- name: Start {{ nocodb_proper_name }}
  block:
    - name: Create {{ nocodb_proper_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ nocodb_data_directory }}"

    - name: Set {{ nocodb_proper_name }} FQDN var overrides
      ansible.builtin.set_fact:
        nocodb_homepage_href: "https://{{ nocodb_hostname }}.{{ ansible_nas_domain }}"
      when: nocodb_traefik_enabled | bool or nocodb_dockflare_enabled | bool

    - name: Create {{ nocodb_proper_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ nocodb_container_name }}"
        hostname: "{{ nocodb_container_name }}"
        image: "{{ nocodb_image_name }}:{{ nocodb_image_tag }}"
        pull: true
        volumes:
          - "{{ nocodb_data_directory }}:/usr/app/data/"
        ports:
          - "{{ nocodb_port_http }}:8080"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ nocodb_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ nocodb_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ nocodb_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ nocodb_dockflare_access_group }}"
          dockflare.hostname: "{{ nocodb_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ nocodb_port_http }}"
          homepage.name: "{{ nocodb_proper_name }}"
          homepage.group: "{{ nocodb_homepage_group }}"
          homepage.icon: "{{ nocodb_homepage_icon }}"
          homepage.href: "{{ nocodb_homepage_href }}"
          homepage.description: "{{ 'Open Source Airtable Alternative' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ nocodb_container_name }}"
          homepage.showStats: "{{ nocodb_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}:{{ nocodb_port_http }}"
          repliqate.enabled: "{{ nocodb_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ nocodb_repliqate_engine }}"
          repliqate.schedule: "{{ nocodb_repliqate_schedule }}"
          repliqate.backup_id: "{{ nocodb_repliqate_backup_id }}"
          repliqate.retention: "{{ nocodb_repliqate_retention }}"
          traefik.enable: "{{ nocodb_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.nocodb.rule: "Host(`{{ nocodb_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.nocodb.tls.certresolver: "letsencrypt"
          traefik.http.routers.nocodb.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.nocodb.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.nocodb.middlewares: "nocodb@docker{{ ',tinyauth-auth@docker' if nocodb_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.nocodb.IPAllowList.sourcerange: "{{ nocodb_traefik_whitelist }}"
          traefik.http.services.nocodb.loadbalancer.server.port: "8080"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.link.template: "https://github.com/nocodb/nocodb/releases/tag/v${major}.${minor}.${patch}"
        cpu_shares: "{{ nocodb_cpu_shares }}"
        memory: "{{ nocodb_memory }}"
        memory_swap: "{{ nocodb_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ nocodb_proper_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] + ':' + (nocodb_port_http | string)] +
                (['https://' + nocodb_hostname + '.' + ansible_nas_domain] if (nocodb_traefik_enabled is true or nocodb_dockflare_enabled is true) else [])
              }}
  when: nocodb_enabled is true

- name: Stop {{ nocodb_proper_name }}
  block:
    - name: Stop {{ nocodb_proper_name }} Container
      community.docker.docker_container:
        name: "{{ nocodb_container_name }}"
        state: absent
  when: nocodb_enabled is false

- name: Data Archive {{ nocodb_proper_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ nocodb_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - nocodb_enabled is false
