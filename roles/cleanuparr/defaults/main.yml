---
# ANE
ansible_nas_app_name: "Cleanuparr"
cleanuparr_enabled: false
cleanuparr_available_externally: false
cleanuparr_traefik_whitelist: "{{ lan }}"

# directories
cleanuparr_data_directory: "{{ docker_home }}/cleanuparr"

# docker
cleanuparr_container_name: "cleanuparr"
cleanuparr_image_name: "ghcr.io/cleanuparr/cleanuparr"
cleanuparr_image_tag: "latest"

# uid / gid
cleanuparr_user_id: "1000"
cleanuparr_group_id: "1000"

# network
cleanuparr_port_http: "11011"
cleanuparr_hostname: "cleanuparr"

# specs
cleanuparr_cpu_shares: 1024
cleanuparr_memory: "1G"
cleanuparr_memory_swap: -1

# autoheal
cleanuparr_autoheal: false

# dockflare
cleanuparr_dockflare_enabled: false
cleanuparr_dockflare_access_group: ""

# homepage
cleanuparr_homepage_group: "Apps"
cleanuparr_homepage_icon: "sh-cleanuparr.png"
cleanuparr_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ cleanuparr_port_http }}"
cleanuparr_homepage_showstats: false

# repliqate
cleanuparr_repliqate_enabled: false
cleanuparr_repliqate_engine: "restic"
cleanuparr_repliqate_schedule: "@daily 3am"
cleanuparr_repliqate_backup_id: "{{ cleanuparr_container_name }}"
cleanuparr_repliqate_retention: "30d"

# tinyauth
cleanuparr_tinyauth_enabled: false

# watchtower
cleanuparr_watchtower_enabled: false
