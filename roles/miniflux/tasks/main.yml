---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ miniflux_data_directory }}/postgres"

    - name: Create {{ ansible_nas_app_name }} network
      community.docker.docker_network:
        name: "{{ miniflux_network_name }}"

    - name: Create {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ miniflux_db_container_name }}"
        hostname: "{{ miniflux_db_container_name }}"
        image: "{{ miniflux_db_image_name }}:{{ miniflux_db_image_version }}"
        pull: true
        networks:
          - name: "{{ miniflux_network_name }}"
        network_mode: "{{ miniflux_network_name }}"
        volumes:
          - "{{ miniflux_data_directory }}/postgres:/var/lib/postgresql/data:rw"
        env:
          POSTGRES_USER: "miniflux"
          POSTGRES_PASSWORD: "supersecure"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ miniflux_db_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ miniflux_db_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }} PostgreSQL"
          homepage.group: "{{ miniflux_db_homepage_group }}"
          homepage.icon: "{{ miniflux_db_homepage_icon }}"
          homepage.href: "{{ miniflux_homepage_href }}"
          homepage.description: "{{ 'PostgreSQL Database Management System' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ miniflux_db_container_name }}"
          homepage.showStats: "{{ miniflux_db_homepage_showstats }}"
          repliqate.enabled: "{{ miniflux_db_repliqate_enabled }}"
          repliqate.engine: "{{ miniflux_db_repliqate_engine }}"
          repliqate.schedule: "{{ miniflux_db_repliqate_schedule }}"
          repliqate.backup_id: "{{ miniflux_db_repliqate_backup_id }}"
          repliqate.retention: "{{ miniflux_db_repliqate_retention }}"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/_/postgres"
        cpu_shares: "{{ miniflux_db_cpu_shares }}"
        memory: "{{ miniflux_db_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ miniflux_container_name }}"
        hostname: "{{ miniflux_container_name }}"
        image: "{{ miniflux_image_name }}:{{ miniflux_image_version }}"
        pull: true
        networks:
          - name: "{{ miniflux_network_name }}"
        network_mode: "{{ miniflux_network_name }}"
        ports:
          - "{{ miniflux_port_http }}:8080"
        env:
          DATABASE_URL: "postgres://miniflux:supersecure@{{ miniflux_db_container_name }}/miniflux?sslmode=disable"
          RUN_MIGRATIONS: "1"
          CREATE_ADMIN: "1"
          ADMIN_USERNAME: "{{ miniflux_admin_username }}"
          ADMIN_PASSWORD: "{{ miniflux_admin_password }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ miniflux_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ miniflux_watchtower_enable }}"
          dockflare.enable: "{{ miniflux_dockflare_tunnel }}"
          dockflare.access.group: "{{ miniflux_dockflare_access_group }}"
          dockflare.hostname: "{{ miniflux_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ miniflux_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ miniflux_homepage_group }}"
          homepage.icon: "{{ miniflux_homepage_icon }}"
          homepage.href: "{{ miniflux_homepage_href }}"
          homepage.description: "{{ 'a minimalist and opinionated feed reader' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ miniflux_container_name }}"
          homepage.showStats: "{{ miniflux_homepage_showstats }}"
          homepage.widget.type: "miniflux"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ miniflux_port_http }}"
          homepage.widget.key: "{{ miniflux_homepage_widget_key }}"
          repliqate.enabled: "false"
          traefik.enable: "{{ miniflux_available_externally | string }}"
          traefik.http.routers.miniflux.rule: "Host(`{{ miniflux_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.miniflux.tls.certresolver: "letsencrypt"
          traefik.http.routers.miniflux.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.miniflux.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.miniflux.middlewares: "miniflux@docker{{ ',tinyauth-auth@docker' if miniflux_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.miniflux.IPAllowList.sourcerange: "{{ miniflux_traefik_whitelist }}"
          traefik.http.services.miniflux.loadbalancer.server.port: "8080"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/miniflux/miniflux"
        cpu_shares: "{{ miniflux_cpu_shares }}"
        memory: "{{ miniflux_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (miniflux_port_http | string)] +
                (['https://' + miniflux_hostname + '.' + ansible_nas_domain] if (miniflux_available_externally is true or miniflux_dockflare_tunnel is true) else [])
              }}
  when: miniflux_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ miniflux_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }} DB Container
      community.docker.docker_container:
        name: "{{ miniflux_db_container_name }}"
        state: absent

    - name: Delete {{ ansible_nas_app_name }} Network
      community.docker.docker_network:
        name: "{{ miniflux_network_name }}"
        state: absent
  when: miniflux_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ miniflux_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - miniflux_enabled is false