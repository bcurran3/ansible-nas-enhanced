---
# https://webmin.com/download/
- name: Install {{ ansible_nas_app_name }}
  block:
    - name: Download {{ ansible_nas_app_name }} setup repository script
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/webmin/webmin/master/webmin-setup-repo.sh
        dest: scripts/webmin-setup-repo.sh
        mode: '0755'

    - name: Run {{ ansible_nas_app_name }} setup repository script
      ansible.builtin.shell: scripts/webmin-setup-repo.sh
      register: webmin_setup_script_output
      changed_when: webmin_setup_script_output.rc != 0 or "added" in webmin_setup_script_output.stdout or "installed" in webmin_setup_script_output.stdout

    - name: Display {{ ansible_nas_app_name }} setup script output (optional for debugging)
      ansible.builtin.debug:
        var: webmin_setup_script_output.stdout_lines
      when: webmin_enabled is true and webmin_setup_script_output is defined

    - name: Install {{ ansible_nas_app_name }}
      ansible.builtin.apt:
        name: webmin
        state: present
        update_cache: yes
  when: webmin_enabled is true

- name: Remove {{ ansible_nas_app_name }}
  block:
        - name: Uninstall {{ ansible_nas_app_name }}
          ansible.builtin.apt:
            name: webmin
            state: absent
            autoremove: yes

        - name: Remove {{ ansible_nas_app_name }} APT repository file
          ansible.builtin.file:
            path: /etc/apt/sources.list.d/webmin.list # Assuming the script creates this file
            state: absent

        - name: Remove {{ ansible_nas_app_name }} GPG key (if script added it to a specific file)
          ansible.builtin.file:
            path: /etc/apt/trusted.gpg.d/jcameron-key.asc
            state: absent
          ignore_errors: true

        - name: Remove the downloaded setup script
          ansible.builtin.file:
            path: scripts/webmin-setup-repo.sh
            state: absent
  when: webmin_enabled is false
