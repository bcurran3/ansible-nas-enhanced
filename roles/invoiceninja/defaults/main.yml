---
# ANE
ansible_nas_app_name: "Invoice Ninja"
invoiceninja_enabled: false
invoiceninja_available_externally: false
invoiceninja_traefik_whitelist: "{{ lan }}"
invoiceninja_data_directory: "{{ docker_home }}/invoiceninja"

# network
invoiceninja_hostname: "invoiceninja"
invoiceninja_network_name: "invoiceninja"
invoiceninja_port_http: "9009"

# uid / gid
invoiceninja_user_id: 33
invoiceninja_group_id: 33
invoiceninja_db_user_id: 999
invoiceninja_db_group_id: 999
invoiceninja_web_user_id: 1500
invoiceninja_web_group_id: 1500

# docker
invoiceninja_app_container_name: "invoiceninja-app"
invoiceninja_app_image_name: "invoiceninja/invoiceninja-debian"
#invoiceninja_app_image_tag: "latest"
invoiceninja_app_image_tag: "5.12.39"
invoiceninja_db_container_name: "invoiceninja-db"
invoiceninja_db_image_name: "mariadb"
invoiceninja_db_image_tag: "10.11.6"
invoiceninja_web_container_name: "invoiceninja-web"
invoiceninja_web_image_name: "nginx"
invoiceninja_web_image_tag: "latest"

# specs
invoiceninja_app_cpu_shares: 1024
invoiceninja_app_memory: "1G"
invoiceninja_db_cpu_shares: 1024
invoiceninja_db_memory: "1G"
invoiceninja_web_cpu_shares: 1024
invoiceninja_web_memory: "1G"

# app
# https://invoiceninja.github.io/en/env-variables/
invoiceninja_mail_mailer: "smtp"
invoiceninja_mail_host: "smtp.{{ ansible_nas_domain }}"
invoiceninja_mail_port: "25"
invoiceninja_mail_username: "" # your@email.com
invoiceninja_mail_password: "" # your_email_password
invoiceninja_mail_encryption: "tls"
invoiceninja_mail_from_address: "" # your@email.com
invoiceninja_mail_from_name: "Invoice Ninja"
invoiceninja_error_email: "" # error@email.com
invoiceninja_nordigen_secret_id: ""
invoiceninja_nordigen_secret_key: ""
invoiceninja_delete_backup_days: "30"
invoiceninja_additional_upload_extensions: ""
invoiceninja_app_url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ invoiceninja_port_http }}"
invoiceninja_app_debug: "false"
invoiceninja_app_name: "Invoice Ninja"
invoiceninja_app_key: "base64:MjnTsSMXrdPtnuQZy18P8mySJ/plntseQ6kuJk/5iMM=" # docker run --rm -it invoiceninja/invoiceninja php artisan key:generate --show
invoiceninja_license_key: ""
invoiceninja_phantomjs_pdf_generation: "false"
invoiceninja_pdf_generator: "snappdf"
invoiceninja_trusted_proxies: '*'
invoiceninja_api_secret: "topsecret"
invoiceninja_update_secret: "YouShouldUpdateViaDocker"
invoiceninja_in_user_email: "{{ ansible_nas_email }}"
invoiceninja_in_password: "{{ ansible_nas_app_admin_password }}"
invoiceninja_db_mysql_root_password: "topsecretroot"
invoiceninja_db_mysql_database: "invoiceninja"
invoiceninja_db_mysql_user: "invoiceninja"
invoiceninja_db_mysql_password: "topsecret"
invoiceninja_require_https: "false"

# autoheal
invoiceninja_app_autoheal: "false"
invoiceninja_db_autoheal: "false"
invoiceninja_web_autoheal: "false"

# dockflare
invoiceninja_dockflare_tunnel: "false"
invoiceninja_dockflare_access_group: ""

# homepage
invoiceninja_app_homepage_group: "Misc"
invoiceninja_app_homepage_icon: "invoiceninja.png"
invoiceninja_app_homepage_showstats: "false"
invoiceninja_db_homepage_group: "DBs"
invoiceninja_db_homepage_icon: "mariadb.png"
invoiceninja_db_homepage_showstats: "false"
invoiceninja_web_homepage_group: "Apps"
invoiceninja_web_homepage_icon: "invoiceninja.png"
invoiceninja_web_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ invoiceninja_port_http }}"
invoiceninja_web_homepage_sitemonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ invoiceninja_port_http }}"
invoiceninja_web_homepage_showstats: "false"

# repliqate
invoiceninja_app_repliqate_enabled: "false"
invoiceninja_app_repliqate_engine: "restic"
invoiceninja_app_repliqate_schedule: "@daily 3am"
invoiceninja_app_repliqate_backup_id: "{{ invoiceninja_app_container_name }}"
invoiceninja_app_repliqate_retention: "30d"
invoiceninja_db_repliqate_enabled: "false"
invoiceninja_db_repliqate_engine: "restic"
invoiceninja_db_repliqate_schedule: "@daily 3am"
invoiceninja_db_repliqate_backup_id: "{{ invoiceninja_db_container_name }}"
invoiceninja_db_repliqate_retention: "30d"
invoiceninja_web_repliqate_enabled: "false"
invoiceninja_web_repliqate_engine: "restic"
invoiceninja_web_repliqate_schedule: "@daily 3am"
invoiceninja_web_repliqate_backup_id: "{{ invoiceninja_web_container_name }}"
invoiceninja_web_repliqate_retention: "30d"

# tinyauth
invoiceninja_tinyauth_enabled: false

# watchtower
invoiceninja_app_watchtower_enable: "false"
invoiceninja_db_watchtower_enable: "false"
invoiceninja_web_watchtower_enable: "false"
