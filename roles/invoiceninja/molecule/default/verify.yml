---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Get container state app
      community.docker.docker_container_info:
        name: "{{ invoiceninja_app_container_name }}"
      register: result_app

    - name: Get container state DB
      community.docker.docker_container_info:
        name: "{{ invoiceninja_db_container_name }}"
      register: result_db

    - name: Get container state web
      community.docker.docker_container_info:
        name: "{{ invoiceninja_web_container_name }}"
      register: result_web

    - name: Check {{ invoiceninja_proper_name }} is running
      ansible.builtin.assert:
        that:
          - result_app.container['State']['Status'] == "running"
          - result_app.container['State']['Restarting'] == false
          - result_db.container['State']['Status'] == "running"
          - result_db.container['State']['Restarting'] == false
          - result_web.container['State']['Status'] == "running"
          - result_web.container['State']['Restarting'] == false
