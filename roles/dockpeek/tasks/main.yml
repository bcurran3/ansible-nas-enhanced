---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ dockpeek_container_name }}"
        hostname: "{{ dockpeek_container_name }}"
        image: "{{ dockpeek_image_name }}:{{ dockpeek_image_tag }}"
        pull: true
        volumes:
          - "/var/run/docker.sock:/var/run/docker.sock"
        ports:
          - "{{ dockpeek_port_http }}:8000"
        env:
          SECRET_KEY: "{{ dockpeek_env_secret_key }}"
          USERNAME: "{{ dockpeek_env_username }}"
          PASSWORD: "{{ dockpeek_env_password }}"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ dockpeek_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ dockpeek_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ dockpeek_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ dockpeek_dockflare_access_group }}"
          dockflare.hostname: "{{ dockpeek_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ dockpeek_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ dockpeek_homepage_group }}"
          homepage.icon: "{{ dockpeek_homepage_icon }}"
          homepage.href: "{{ dockpeek_homepage_href }}"
          homepage.description: "{{ 'Docker Dashboard for Easy Container Access' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ dockpeek_container_name }}"
          homepage.showStats: "{{ dockpeek_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ dockpeek_port_http }}"
          repliqate.enabled: "false"
          traefik.enable: "{{ dockpeek_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.dockpeek.rule: "Host(`{{ dockpeek_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.dockpeek.tls.certresolver: "letsencrypt"
          traefik.http.routers.dockpeek.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.dockpeek.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.dockpeek.middlewares: "dockpeek@docker{{ ',tinyauth-auth@docker' if dockpeek_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.dockpeek.IPAllowList.sourcerange: "{{ dockpeek_traefik_whitelist }}"
          traefik.http.services.dockpeek.loadbalancer.server.port: "8000"
          wud.tag.include: "^v\\d+\\.\\d+\\.\\d+$"
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/dockpeek/dockpeek/pkgs/container/dockpeek"
        cpu_shares: "{{ dockpeek_cpu_shares }}"
        memory: "{{ dockpeek_memory }}"
        memory_swap: "{{ dockpeek_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (dockpeek_port_http | string)] +
                (['https://' + dockpeek_hostname + '.' + ansible_nas_domain] if (dockpeek_traefik_enabled is true or dockpeek_dockflare_enabled is true) else [])
              }}
  when: dockpeek_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ dockpeek_container_name }}"
        state: absent
  when: dockpeek_enabled is false
