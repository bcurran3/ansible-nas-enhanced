---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ minidlna_container_name }}"
        hostname: "{{ minidlna_container_name }}"
        image: "{{ minidlna_image_name }}:{{ minidlna_image_version }}"
        pull: true
        volumes:
          - "{{ minidlna_media_directory1 }}:/media1:rw"
          - "{{ minidlna_media_directory2 }}:/media2:rw"
          - "{{ minidlna_media_directory3 }}:/media3:rw"
        env:
          MINIDLNA_MEDIA_DIR1: "/media1"
          MINIDLNA_MEDIA_DIR2: "/media2"
          MINIDLNA_MEDIA_DIR3: "/media3"
          MINIDLNA_FRIENDLY_NAME: "{{ minidlna_friendly_name }}"
          MINIDLNA_PORT: "{{ minidlna_port }}"
        network_mode: host
        labels:
          autoheal: "{{ minidlna_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ minidlna_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ minidlna_homepage_group }}"
          homepage.icon: "{{ minidlna_homepage_icon }}"
          homepage.description: "{{ 'minidlna description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ minidlna_container_name }}"
          homepage.showStats: "{{ minidlna_homepage_showstats }}"
          repliqate.enabled: "false"
          traefik.enable: "false"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/vladgh/minidlna"
        cpu_shares: "{{ minidlna_cpu_shares }}"
        memory: "{{ minidlna_memory }}"
        restart_policy: unless-stopped
  when: minidlna_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ minidlna_container_name }}"
        state: absent
  when: minidlna_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ minidlna_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ minidlna_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: minidlna_enabled is false and archive_app_data_enabled is true
