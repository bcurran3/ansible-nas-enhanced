---
# ANE
ansible_nas_app_name: "MiniDLNA"
minidlna_enabled: false
minidlna_available_externally: false
minidlna_traefik_whitelist: "{{ lan }}"

# directories
minidlna_media_directory1: "{{ movies_root }}"
minidlna_media_directory3: "{{ music_root }}"
minidlna_media_directory2: "{{ tv_root }}"

# network
minidlna_friendly_name: "{{ ansible_nas_hostname }}"
minidlna_port: "8201"

# docker
minidlna_container_name: "minidnla"
minidlna_image_name: "vladgh/minidlna"
minidlna_image_version: "latest"
minidlna_cpu_shares: 1024

# specs
minidlna_memory: "1G"

# autoheal
minidlna_autoheal: "false"

# homepage
minidlna_homepage_group: "Misc"
minidlna_homepage_icon: "minidlna.png"
minidlna_homepage_showstats: "false"

# watchtower
minidlna_watchtower_enable: "false"