---
- name: Start {{ ansible_nas_docker_compose_proper_name }}
  block:
    - debug:
        msg: "EXPERIMENTAL: Discovery and Running of {{ ansible_nas_docker_compose_proper_name }} files"

    - name: Find {{ ansible_nas_docker_compose_proper_name }} files in "{{ docker_compose_data_directory }}"
      ansible.builtin.find:
        paths: "{{ docker_compose_data_directory }}"
        file_type: file
        patterns: "docker-compose.yml"
        recurse: yes
      register: compose_files

    - name: Bring up {{ ansible_nas_docker_compose_proper_name }} files in "{{ docker_compose_data_directory }}"
      community.docker.docker_compose_v2:
        project_src: "{{ item.path | dirname }}"
        state: present
      loop: "{{ compose_files.files }}"
      loop_control:
        label: "Deploying {{ item.path | dirname }}"
      when: docker_compose_enabled is true
  when: docker_compose_enabled is true
