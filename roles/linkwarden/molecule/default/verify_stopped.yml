---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Try and stop and remove {{ ansible_nas_app_name }}
      community.docker.docker_container:
        name: "{{ linkwarden_container_name }}"
        state: absent
      register: result_app

    - name: Try and stop and remove {{ ansible_nas_app_name }} search
      community.docker.docker_container:
        name: "{{ linkwarden_search_container_name }}"
        state: absent
      register: result_search

    - name: Try and stop and remove {{ ansible_nas_app_name }} DB
      community.docker.docker_container:
        name: "{{ linkwarden_db_container_name }}"
        state: absent
      register: result_db

    - name: Check {{ ansible_nas_app_name }} is stopped
      ansible.builtin.assert:
        that:
          - not result_search.changed
          - not result_db.changed
          - not result_app.changed
