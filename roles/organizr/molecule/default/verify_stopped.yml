---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Try and stop and remove {{ organizr_proper_name }}
      community.docker.docker_container:
        name: "{{ organizr_container_name }}"
        state: absent
      register: result

    - name: Check if organ{{ organizr_proper_name }}izr is stopped
      ansible.builtin.assert:
        that:
          - not result.changed
