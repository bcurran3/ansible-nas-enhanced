---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ organizr_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ organizr_container_name }}"
        hostname: "{{ organizr_container_name }}"
        image: "{{ organizr_image_name }}:{{ organizr_image_version }}"
        pull: true
        cpu_shares: "{{ organizr_cpu_shares }}"
        volumes:
          - "{{ organizr_data_directory }}:/config:rw"
        env:
          PUID: "{{ organizr_user_id }}"
          PGID: "{{ organizr_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        ports:
          - "{{ organizr_port_http }}:80"
          - "{{ organizr_port_https }}:443"
        restart_policy: unless-stopped
        memory: "{{ organizr_memory }}"
        labels:
          autoheal: "{{ organizr_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ organizr_watchtower_monitor_only }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ organizr_homepage_group }}"
          homepage.icon: "{{ organizr_homepage_icon }}"
          homepage.href: "{{ organizr_homepage_href }}"
          homepage.description: "{{ 'organizr description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ organizr_container_name }}"
          homepage.showStats: "{{ organizr_homepage_showStats }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ organizr_port }}"
          traefik.enable: "{{ organizr_available_externally | string }}"
          traefik.http.routers.organizr.rule: "Host(`{{ organizr_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.organizr.tls.certresolver: "letsencrypt"
          traefik.http.routers.organizr.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.organizr.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ organizr_hostname }}"
          traefik.http.routers.organizr.middlewares: "{{ organizr_hostname }}@docker"
          traefik.http.middlewares.organizr.IPAllowList.sourcerange: "{{ organizr_traefik_whitelist }}"
          traefik.http.services.organizr.loadbalancer.server.port: "80"
          wud.tag.include: '^\d+\.\d+\.\d+$$'
          wud.link.template: "https://github.com/causefx/Organizr/releases/tag/$${major}.$${minor}.$${patch}"
  when: organizr_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ organizr_container_name }}"
        state: absent
  when: organizr_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ organizr_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ organizr_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: organizr_enabled is false and archive_app_data_enabled is true
