---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ organizr_data_directory }}"


    - name: Set {{ ansible_nas_app_name }} FQDN var overrides
      ansible.builtin.set_fact:
        organizr_homepage_href: "https://{{ organizr_hostname }}.{{ ansible_nas_domain }}"
      when: organizr_traefik_enabled | bool or organizr_dockflare_enabled | bool

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ organizr_container_name }}"
        hostname: "{{ organizr_container_name }}"
        image: "{{ organizr_image_name }}:{{ organizr_image_version }}"
        pull: true
        volumes:
          - "{{ organizr_data_directory }}:/config:rw"
        env:
          PUID: "{{ organizr_user_id }}"
          PGID: "{{ organizr_group_id }}"
          TZ: "{{ ansible_nas_timezone }}"
        ports:
          - "{{ organizr_port_http }}:80"
          - "{{ organizr_port_https }}:443"
        labels:
          autoheal: "{{ organizr_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ organizr_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ organizr_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ organizr_dockflare_access_group }}"
          dockflare.hostname: "{{ organizr_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ organizr_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ organizr_homepage_group }}"
          homepage.icon: "{{ organizr_homepage_icon }}"
          homepage.href: "{{ organizr_homepage_href }}"
          homepage.description: "{{ 'organizr description' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ organizr_container_name }}"
          homepage.showStats: "{{ organizr_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ organizr_port_http }}"
          repliqate.enabled: "{{ organizr_repliqate_enabled | ternary('true', 'false') }}"
          repliqate.engine: "{{ organizr_repliqate_engine }}"
          repliqate.schedule: "{{ organizr_repliqate_schedule }}"
          repliqate.backup_id: "{{ organizr_repliqate_backup_id }}"
          repliqate.retention: "{{ organizr_repliqate_retention }}"
          traefik.enable: "{{ organizr_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.organizr.rule: "Host(`{{ organizr_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.organizr.tls.certresolver: "letsencrypt"
          traefik.http.routers.organizr.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.organizr.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.organizr.middlewares: "organizr@docker{{ ',tinyauth-auth@docker' if organizr_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.organizr.IPAllowList.sourcerange: "{{ organizr_traefik_whitelist }}"
          traefik.http.services.organizr.loadbalancer.server.port: "80"
          wud.tag.include: '^v\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/Organizr/Organizr/pkgs/container/organizr"
        cpu_shares: "{{ organizr_cpu_shares }}"
        memory: "{{ organizr_memory }}"
        memory_swap: "{{ organizr_memory_swap }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (organizr_port_http | string)] +
                (['https://' + organizr_hostname + '.' + ansible_nas_domain] if (organizr_traefik_enabled is true or organizr_dockflare_enabled is true) else [])
              }}
  when: organizr_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ organizr_container_name }}"
        state: absent
  when: organizr_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ organizr_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - organizr_enabled is false