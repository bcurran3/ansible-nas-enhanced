---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Try and stop and remove {{ magnetico_proper_name }} Web UI Container
      community.docker.docker_container:
        name: "{{ magnetico_container_name }}"
        state: absent
      register: result

    - name: Try and stop and remove {{ magnetico_proper_name }} Crawler Container
      community.docker.docker_container:
        name: "{{ magneticod_container_name }}"
        state: absent
      register: resultb

    - name: Check {{ magnetico_proper_name }} d is stopped
      ansible.builtin.assert:
        that:
          - not result.changed
          - not resultb.changed
