---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    - name: Get container state {{ magnetico_proper_name }} Web UI
      community.docker.docker_container_info:
        name: "{{ magnetico_container_name }}"
      register: result

    - name: Get container state {{ magnetico_proper_name }} Crawler
      community.docker.docker_container_info:
        name: "{{ magneticod_container_name }}"
      register: resultb

    - name: Check {{ magnetico_proper_name }} is running
      ansible.builtin.assert:
        that:
          - result.container['State']['Status'] == "running"
          - result.container['State']['Restarting'] == false
          - resultb.container['State']['Status'] == "running"
          - resultb.container['State']['Restarting'] == false
