---
# WIP
# need sudo touch credentials to config dir
# add admin:$2y$12$yOtVgiZRJ.l9ecjFYPW11e0N19PNs3jcbxDTund57DRs26..jNGaq for admin/topsecret
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ magnetico_data_directory }}"
        - "{{ magnetico_data_directory }}/config"
        - "{{ magnetico_data_directory }}/data"

    - name: Create {{ ansible_nas_app_name }}d Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ magneticod_container_name }}"
        hostname: "{{ magneticod_container_name }}"
        image: "{{ magneticod_image_name }}:{{ magneticod_image_tag }}"
        pull: true
        volumes:
          - "{{ magnetico_data_directory }}/config:/root/.config/magneticod"
          - "{{ magnetico_data_directory }}/data:/root/.local/share/magneticod"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        command:
          - "--indexer-addr=0.0.0.0:1212"
        labels:
          autoheal: "{{ magneticod_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ magnetico_watchtower_monitor_only }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }}d"
          homepage.group: "{{ magneticod_homepage_group }}"
          homepage.icon: "{{ magneticod_homepage_icon }}"
          homepage.href: "{{ magneticod_homepage_href }}"
          homepage.description: "{{ 'Autonomous (self-hosted) BitTorrent DHT search engine suite.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ magneticod_container_name }}"
          homepage.showStats: "{{ magneticod_homepage_showStats }}"
          traefik.enable: "false"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"
        cpu_shares: "{{ magneticod_cpu_shares }}"
        memory: "{{ magneticod_memory }}"
        restart_policy: unless-stopped

    - name: Create {{ ansible_nas_app_name }}w Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ magneticow_container_name }}"
        image: "{{ magneticow_image_name }}:{{ magneticow_image_tag }}"
        pull: true
        links:
          - "{{ magnetico_container2_name }}"
        volumes:
          - "{{ magnetico_data_directory }}/data:/root/.local/share/magneticod/"
          - "{{ magnetico_data_directory }}/config:/root/.config/magneticow"
        ports:
          - "{{ magnetico_port_http }}:8080"
        dns_servers: "{{ ansible_nas_dns }}"
        hostname: "{{ magneticow_container_name }}"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ magneticow_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ magnetico_watchtower_monitor_only }}"
          dockflare.enable: "{{ magnetico_dockflare_tunnel }}"
          dockflare.access.group: "{{ magnetico_dockflare_access_group }}"
          dockflare.hostname: "{{ magnetico_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ magnetico_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ magnetico_homepage_group }}"
          homepage.icon: "{{ magnetico_homepage_icon }}"
          homepage.href: "{{ magnetico_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ magnetico_port_http }}"
          homepage.description: "{{ 'Autonomous (self-hosted) BitTorrent DHT search engine suite.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ magneticow_container_name }}"
          homepage.showStats: "{{ magnetico_homepage_showStats }}"
          traefik.enable: "{{ magnetico_available_externally | string }}"
          traefik.http.routers.magnetico.rule: "Host(`magnetico.{{ ansible_nas_domain }}`)"
          traefik.http.routers.magnetico.tls.certresolver: "letsencrypt"
          traefik.http.routers.magnetico.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.magnetico.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ magnetico_hostname }}"
          traefik.http.routers.magnetico.middlewares: "{{ magnetico_hostname }}@docker"
          traefik.http.middlewares.magnetico.IPAllowList.sourcerange: "{{ magnetico_traefik_whitelist }}"
          traefik.http.services.magnetico.loadbalancer.server.port: "8080"
#         wud.tag.include: '^\d+\.\d+\.\d+$$'
#         wud.link.template: "https://github.com/fmartinou/whats-up-docker/releases/tag/$${major}.$${minor}.$${patch}"
        cpu_shares: "{{ magneticow_cpu_shares }}"
        memory: "{{ magneticow_memory }}"
        restart_policy: unless-stopped
  when: magnetico_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }}w Container
      community.docker.docker_container:
        name: "{{ magneticow_container_name }}"
        state: absent

    - name: Stop {{ ansible_nas_app_name }}d Container
      community.docker.docker_container:
        name: "{{ magneticod_container_name }}"
        state: absent
  when: magnetico_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ magnetico_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ magnetico_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: magnetico_enabled is false and archive_app_data_enabled is true
