---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ windows_data_directory }}"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ windows_container_name }}"
        hostname: "{{ windows_container_name }}"
        image: "{{ windows_image_name }}:{{ windows_image_tag }}"
        pull: true
        capabilities:
          - NET_ADMIN
#        devices:
#          - /dev/kvm  # this worked on baremetal, not in my vm - what's up
        ports:
          - "{{ windows_port_http }}:8006"
          - "{{ windows_port_rdp }}:3389"
          - "{{ windows_port_rdp }}:3389/udp"
        volumes:
          - "{{ windows_data_directory }}:/storage"
          - "{{ public_root }}:/shared"
        network_mode: bridge
        env:
          CPU_CORES: "{{ windows_cpu_cores }}"
          DISK_SIZE: "{{ windows_disk_size }}"
          RAM_SIZE: "{{ windows_memory_size }}"
          VERSION: "{{ windows_version }}"
          TZ: "{{ ansible_nas_timezone }}"
        stop_timeout: 120
        labels:
          autoheal: "{{ windows_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ windows_watchtower_enable }}"
          dockflare.enable: "{{ windows_dockflare_tunnel }}"
          dockflare.access.group: "{{ windows_dockflare_access_group }}"
          dockflare.hostname: "{{ windows_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ windows_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ windows_homepage_group }}"
          homepage.icon: "{{ windows_homepage_icon }}"
          homepage.href: "{{ windows_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ windows_port_http }}"
          homepage.description: "{{ 'Windows inside a Docker container.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ windows_container_name }}"
          homepage.showStats: "{{ windows_homepage_showstats }}"
          repliqate.enabled: "{{ windows_repliqate_enabled }}"
          repliqate.engine: "{{ windows_repliqate_engine }}"
          repliqate.schedule: "{{ windows_repliqate_schedule }}"
          repliqate.backup_id: "{{ windows_repliqate_backup_id }}"
          repliqate.retention: "{{ windows_repliqate_retention }}"
          traefik.enable: "{{ windows_available_externally | string }}"
          traefik.http.routers.windows.rule: "Host(`{{ windows_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.windows.tls.certresolver: "letsencrypt"
          traefik.http.routers.windows.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.windows.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ windows_hostname }}"
          traefik.http.routers.windows.middlewares: "{{ windows_hostname }}@docker"
          traefik.http.middlewares.windows.IPAllowList.sourcerange: "{{ windows_traefik_whitelist }}"
          traefik.http.services.windows.loadbalancer.server.port: "8006"
          wud.tag.include: '^\d+\.\d+\.\d+$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/dockur/windows/pkgs/container/windows"
        cpu_shares: "{{ windows_cpu_shares }}"
        memory: "{{ windows_memory_size }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (windows_port_http | string)] +
                (['https://' + windows_hostname + '.' + ansible_nas_domain] if (windows_available_externally is true or windows_dockflare_tunnel is true) else [])
              }}
  when: windows_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ windows_container_name }}"
        state: absent
  when: windows_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ windows_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ windows_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: windows_enabled is false and archive_app_data_enabled is true
