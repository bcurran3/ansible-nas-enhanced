---
# ANE
ansible_nas_app_name: "Checkmk Raw Edition"
checkmk_enabled: false
checkmk_available_externally: false
checkmk_traefik_whitelist: "{{ lan }}"
checkmk_data_directory: "{{ docker_home }}/checkmk"

# network
checkmk_hostname: "checkmk"
checkmk_port_http: 5000
checkmk_port_api: 8000

# docker
checkmk_container_name: "checkmk"
checkmk_image_name: "checkmk/check-mk-raw"
checkmk_image_tag: "master-daily"
checkmk_cpu_shares: "1024"
checkmk_memory: "1g"

# autoheal
checkmk_autoheal: "false"

# dockflare
checkmk_dockflare_tunnel: "false"
checkmk_dockflare_access_group: ""

# homepage
checkmk_homepage_group: "Apps"
checkmk_homepage_icon: "checkmk.png"
checkmk_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ checkmk_port_http }}"
checkmk_homepage_showstats: "false"

# repliqate
checkmk_repliqate_enabled: "false"
checkmk_repliqate_engine: "restic"
checkmk_repliqate_schedule: "@daily 3am"
checkmk_repliqate_backup_id: "{{ checkmk_container_name }}"
checkmk_repliqate_retention: "30d"

# watchtower
checkmk_watchtower_enable: "false"