---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ checkmk_data_directory }}"
        - "{{ checkmk_data_directory }}/omd"
        - "{{ checkmk_data_directory }}/omd/sites"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ checkmk_container_name }}"
        hostname: "{{ checkmk_container_name }}"
        image: "{{ checkmk_image_name }}:{{ checkmk_image_tag }}"
        pull: true
        network_mode: "bridge"
        volumes:
          -  "{{ checkmk_data_directory }}/omd/sites:/omd/sites"
          - "/etc/localtime:/etc/localtime:ro"
        ports:
          - "{{ checkmk_port_http }}:5000"
          - "{{ checkmk_port_api }}:8000"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ checkmk_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ checkmk_watchtower_enable }}"
          dockflare.enable: "{{ checkmk_dockflare_tunnel }}"
          dockflare.access.group: "{{ checkmk_dockflare_access_group }}"
          dockflare.hostname: "{{ checkmk_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ checkmk_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ checkmk_homepage_group }}"
          homepage.icon: "{{ checkmk_homepage_icon }}"
          homepage.href: "{{ checkmk_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ checkmk_port_http }}"
          homepage.description: "{{ 'Best-in-class infrastructure & application monitoring' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ checkmk_container_name }}"
          homepage.showStats: "{{ checkmk_homepage_showstats }}"
          homepage.widget.type: "checkmk"
          homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ checkmk_port_http }}"
          homepage.widget.site: "{{ checkmk_homepage_widget_site }}"
          homepage.widget.username: "{{ checkmk_homepage_widget_username }}"
          homepage.widget.password: "{{ checkmk_homepage_widget_password }}"
          repliqate.enabled: "{{ checkmk_repliqate_enabled }}"
          repliqate.engine: "{{ checkmk_repliqate_engine }}"
          repliqate.schedule: "{{ checkmk_repliqate_schedule }}"
          repliqate.backup_id: "{{ checkmk_repliqate_backup_id }}"
          repliqate.retention: "{{ checkmk_repliqate_retention }}"
          traefik.enable: "{{ checkmk_available_externally | string }}"
          traefik.http.routers.checkmk.rule: "Host(`{{ checkmk_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.checkmk.tls.certresolver: "letsencrypt"
          traefik.http.routers.checkmk.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.checkmk.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.checkmk.middlewares: "checkmk@docker{{ ',tinyauth-auth@docker' if checkmk_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.checkmk.IPAllowList.sourcerange: "{{ checkmk_traefik_whitelist }}"
          traefik.http.services.checkmk.loadbalancer.server.port: "5000"
          wud.watch.digest: "true"
          wud.tag.include: '^master-daily$"'
        cpu_shares: "{{ checkmk_cpu_shares }}"
        memory: "{{ checkmk_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (checkmk_port_http | string)] +
                (['https://' + checkmk_hostname + '.' + ansible_nas_domain] if (checkmk_available_externally is true or checkmk_dockflare_tunnel is true) else [])
              }}
  when: checkmk_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ checkmk_container_name }}"
        state: absent
  when: checkmk_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ checkmk_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - checkmk_enabled is false