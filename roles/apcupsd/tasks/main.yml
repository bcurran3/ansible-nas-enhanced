---

- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ apcupsd_data_directory }}"

    - name: "Check if {{ ansible_nas_app_name }} config exists"
      ansible.builtin.stat:
        path: "{{ apcupsd_data_directory }}/apcupsd.conf"
      register: apcupsd_config_path

    - name: Template {{ ansible_nas_app_name }} config
      ansible.builtin.template:
        src: apcupsd.conf
        dest: "{{ apcupsd_data_directory }}/apcupsd.conf"
      when: not apcupsd_config_path.stat.exists

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ apcupsd_container_name }}"
        hostname: "{{ apcupsd_container_name }}"
        image: "{{ apcupsd_image_name }}:{{ apcupsd_image_tag }}"
        pull: true
        privileged: true
        volumes:
          - "/var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket"
          - "{{ apcupsd_data_directory }}/apcupsd.conf:/etc/apcupsd/apcupsd.conf"
        ports:
          - "{{ apcupsd_port_http }}:3551"
        devices:
          - "{{ apcupsd_device }}"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ apcupsd_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ apcupsd_watchtower_enable }}"
          dockflare.enable: "false"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ apcupsd_homepage_group }}"
          homepage.icon: "{{ apcupsd_homepage_icon }}"
          homepage.description: "{{ 'Dockerized apcupsd' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ apcupsd_container_name }}"
          homepage.showStats: "{{ apcupsd_homepage_showstats }}"
          traefik.enable: "false"
          repliqate.enabled: "{{ apcupsd_repliqate_enabled }}"
          repliqate.engine: "{{ apcupsd_repliqate_engine }}"
          repliqate.schedule: "{{ apcupsd_repliqate_schedule }}"
          repliqate.backup_id: "{{ apcupsd_repliqate_backup_id }}"
          repliqate.retention: "{{ apcupsd_repliqate_retention }}"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/gregewing/apcupsd"
        cpu_shares: "{{ apcupsd_cpu_shares }}"
        memory: "{{ apcupsd_memory }}"
        restart_policy: unless-stopped
  when: apcupsd_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ apcupsd_container_name }}"
        state: absent
  when: apcupsd_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  include_role:
    name: ansible-nas-archive
  vars:
    target_data_dir: "{{ apcupsd_data_directory }}"
  when:
    - archive_app_data_enabled is true
    - apcupsd_enabled is false