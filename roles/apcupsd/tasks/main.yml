---

- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ apcupsd_data_directory }}"

    - name: "Check if {{ ansible_nas_app_name }} config exists"
      ansible.builtin.stat:
        path: "{{ apcupsd_data_directory }}/apcupsd.conf"
      register: apcupsd_config_path

    - name: Template {{ ansible_nas_app_name }} config
      ansible.builtin.template:
        src: apcupsd.conf
        dest: "{{ apcupsd_data_directory }}/apcupsd.conf"
      when: not apcupsd_config_path.stat.exists

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ apcupsd_container_name }}"
        hostname: "{{ apcupsd_container_name }}"
        image: "{{ apcupsd_image_name }}:{{ apcupsd_image_tag }}"
        pull: true
        cpu_shares: "{{ apcupsd_cpu_shares }}"
        privileged: true
        volumes:
          - "/var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket"
          - "{{ apcupsd_data_directory }}/apcupsd.conf:/etc/apcupsd/apcupsd.conf"
        ports:
          - "{{ apcupsd_port }}:3551"
        devices:
          - "{{ apcupsd_device }}:{{ apcupsd_device }}"
        env:
          TZ: "{{ ansible_nas_timezone }}"
        restart_policy: unless-stopped
        memory: "{{ apcupsd_memory }}"
        labels:
          autoheal: "{{ apcupsd_autoheal }}"
          com.centurylinklabs.watchtower.monitor-only: "{{ apcupsd_watchtower_monitor_only }}"
  when: apcupsd_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ apcupsd_container_name }}"
        state: absent
  when: apcupsd_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ apcupsd_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ apcupsd_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: apcupsd_enabled is false and archive_app_data_enabled is true
