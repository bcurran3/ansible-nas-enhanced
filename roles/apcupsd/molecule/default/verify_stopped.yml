---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - include_vars:
        file: ../../defaults/main.yml

    - name: Try and stop and remove {{ apcupsd_proper_name }}
      docker_container:
        name: "{{ apcupsd_container_name }}"
        state: absent
      register: result

    - name: Check {{ apcupsd_proper_name }} is stopped
      assert:
        that:
          - not result.changed
