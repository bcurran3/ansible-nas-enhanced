---
# ANE
ansible_nas_app_name: "Glances"
glances_enabled: false
glances_available_externally: false
glances_traefik_whitelist: "{{ lan }}"

# network
glances_hostname: "glances"
glances_port_http: "61208"
glances_port_two: "61209"

# security options
glances_security_options:
  - "apparmor=unconfined"

# docker
glances_container_name: "glances"
glances_image_name: "nicolargo/glances" 
glances_image_version: "latest" # ubuntu-latest-full for NVIDIA GPU support
glances_cpu_shares: 1024

# specs
glances_memory: "256M"

# app
glances_env_opt: "-w"

# autoheal
glances_autoheal: "false"

# dockflare
glances_dockflare_tunnel: "false"
glances_dockflare_access_group: ""

# homepage
glances_homepage_group: "Apps"
glances_homepage_icon: "glances.png"
glances_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ glances_port_http }}"
glances_homepage_showstats: "false"

# tinyauth
glances_tinyauth_enabled: false

# watchtower
glances_watchtower_enable: "false"
