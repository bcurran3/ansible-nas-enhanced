---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ glances_container_name }}"
        hostname: "{{ glances_container_name }}"
        image: "{{ glances_image_name }}:{{ glances_image_version }}"
        pull: true
        runtime: "{{ 'nvidia' if nvidia_runtime_enabled | bool else omit }}"
        device_requests: "{{
          [{'driver': 'nvidia', 'count': -1, 'capabilities': ['gpu']}]
          if nvidia_runtime_enabled | bool else omit
        }}"
        volumes:
          - "/var/run/docker.sock:/var/run/docker.sock:ro"
#         - "/etc/os-release:/etc/os-release:ro"
        pid_mode: host
        ports:
          - "{{ glances_port_http }}:61208"
          - "{{ glances_port_two }}:61209"
        privileged: true
        env:
          GLANCES_OPT: "{{ glances_env_opt }}"
          NVIDIA_VISIBLE_DEVICES: "all"
          NVIDIA_DRIVER_CAPABILITIES: "compute,video,utility"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ glances_autoheal_enabled | ternary('true', 'false') }}"
          com.centurylinklabs.watchtower.enable: "{{ glances_watchtower_enabled | ternary('true', 'false') }}"
          dockflare.enable: "{{ glances_dockflare_enabled | ternary('true', 'false') }}"
          dockflare.access.group: "{{ glances_dockflare_access_group }}"
          dockflare.hostname: "{{ glances_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ glances_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ glances_homepage_group }}"
          homepage.icon: "{{ glances_homepage_icon }}"
          homepage.href: "{{ glances_homepage_href }}"
          homepage.description: "{{ 'Glances an Eye on your system.' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ glances_container_name }}"
          homepage.showStats: "{{ glances_homepage_showstats | ternary('true', 'false') }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ glances_port_http }}"
#         homepage.widget.type: "glances"
#         homepage.widget.url: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ glances_port_http }}"
#         homepage.widget.version: "4"
#         homepage.widget.metric: "cpu"
          repliqate.enabled: "false"
          traefik.enable: "{{ glances_traefik_enabled | ternary('true', 'false') }}"
          traefik.http.routers.glances.rule: "Host(`{{ glances_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.glances.tls.certresolver: "letsencrypt"
          traefik.http.routers.glances.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.glances.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.glances.middlewares: "glances@docker{{ ',tinyauth-auth@docker' if glances_tinyauth_enabled | bool else '' }}"
          traefik.http.middlewares.glances.IPAllowList.sourcerange: "{{ glances_traefik_whitelist }}"
          traefik.http.services.glances.loadbalancer.server.port: "61208"
          wud.tag.include: '^\d+\.\d+\.\d+.*$'
          wud.tag.transform.type: "semver"
          wud.link.template: "https://hub.docker.com/r/nicolargo/glances"
        cpu_shares: "{{ glances_cpu_shares }}"
        memory: "{{ glances_memory }}"
        memory_swap: "{{ glances_memory_swap }}"
        security_opts: "{{ glances_security_options }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (glances_port_http | string)] +
                (['https://' + glances_hostname + '.' + ansible_nas_domain] if (glances_traefik_enabled is true or glances_dockflare_enabled is true) else [])
              }}
  when: glances_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ glances_container_name }}"
        state: absent
  when: glances_enabled is false
