---
# ANE
ansible_nas_app_name: "CrashPlan Pro"
crashplanpro_enabled: false
crashplanpro_traefik_enabled: false
crashplanpro_traefik_whitelist: "{{ lan }}"

# directories
crashplanpro_data_directory: "{{ docker_home }}/crashplanpro"
crashplanpro_storage_directory: "/"

# network
crashplanpro_hostname: "crashplanpro"
crashplanpro_port_http: "3063"

# docker
crashplanpro_container_name: "crashplanpro"
crashplanpro_image_name: "ghcr.io/jlesage/crashplan-pro"
crashplanpro_image_tag: "latest"

# specs
crashplanpro_cpu_shares: 1024
crashplanpro_memory: "8G"
crashplanpro_memory_swap: -1

# autoheal
crashplanpro_autoheal_enabled: false

# dockflare
crashplanpro_dockflare_enabled: false
crashplanpro_dockflare_access_group: ""

# homepage
crashplanpro_homepage_group: "Apps"
crashplanpro_homepage_icon: "https://images.icon-icons.com/2407/PNG/512/crashplan_icon_146200.png"
crashplanpro_homepage_href: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ crashplanpro_port_http }}"
crashplanpro_homepage_showstats: false

# repliqate
crashplanpro_repliqate_enabled: false
crashplanpro_repliqate_engine: "restic"
crashplanpro_repliqate_schedule: "@daily 3am"
crashplanpro_repliqate_backup_id: "{{ crashplanpro_container_name }}"
crashplanpro_repliqate_retention: "30d"

# tinyauth
crashplanpro_tinyauth_enabled: false

# watchtower
crashplanpro_watchtower_enabled: false