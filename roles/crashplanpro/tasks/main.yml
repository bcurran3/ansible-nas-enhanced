---
- name: Start {{ ansible_nas_app_name }}
  block:
    - name: Create {{ ansible_nas_app_name }} Directories
      file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ crashplanpro_data_directory }}"
        - "{{ crashplanpro_data_directory }}/config"

    - name: Create {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        container_default_behavior: "compatibility"
        name: "{{ crashplanpro_container_name }}"
        hostname: "{{ crashplanpro_container_name }}"
        image: "{{ crashplanpro_image_name }}:{{ crashplanpro_image_tag }}"
        pull: true
        ports:
          - "{{ crashplanpro_port_http }}:5800"
        volumes:
          - "{{ crashplanpro_data_directory }}/config:/config"
          - "{{ crashplanpro_storage_directory }}:/storage:ro"
        network_mode: bridge
        env:
          CRASHPLAN_SRV_MAX_MEM: "8G"
          TZ: "{{ ansible_nas_timezone }}"
        labels:
          autoheal: "{{ crashplanpro_autoheal }}"
          com.centurylinklabs.watchtower.enable: "{{ crashplanpro_watchtower_enable }}"
          dockflare.enable: "{{ crashplanpro_dockflare_tunnel }}"
          dockflare.access.group: "{{ crashplanpro_dockflare_access_group }}"
          dockflare.hostname: "{{ crashplanpro_hostname }}.{{ ansible_nas_domain }}"
          dockflare.service: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ crashplanpro_port_http }}"
          homepage.name: "{{ ansible_nas_app_name }}"
          homepage.group: "{{ crashplanpro_homepage_group }}"
          homepage.icon: "{{ crashplanpro_homepage_icon }}"
          homepage.href: "{{ crashplanpro_homepage_href }}"
          homepage.siteMonitor: "http://{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}:{{ crashplanpro_port_http }}"
          homepage.description: "{{ 'Docker container for CrashPlan PRO (aka CrashPlan for Small Business)' if homepage_show_description else omit }}"
          homepage.server: "my-docker"
          homepage.container: "{{ crashplanpro_container_name }}"
          homepage.showStats: "{{ crashplanpro_homepage_showstats }}"
          traefik.enable: "{{ crashplanpro_available_externally | string }}"
          traefik.http.routers.crashplanpro.rule: "Host(`{{ crashplanpro_hostname }}.{{ ansible_nas_domain }}`)"
          traefik.http.routers.crashplanpro.tls.certresolver: "letsencrypt"
          traefik.http.routers.crashplanpro.tls.domains[0].main: "{{ ansible_nas_domain }}"
          traefik.http.routers.crashplanpro.tls.domains[0].sans: "*.{{ ansible_nas_domain }}"
          traefik.http.routers.frontend.middlewares: "{{ crashplanpro_hostname }}"
          traefik.http.routers.crashplanpro.middlewares: "{{ crashplanpro_hostname }}@docker"
          traefik.http.middlewares.crashplanpro.IPAllowList.sourcerange: "{{ crashplanpro_traefik_whitelist }}"
          traefik.http.services.crashplanpro.loadbalancer.server.port: "5800"
          wud.tag.include: "^v\\d{2}\\.\\d{2}\\.\\d+$"
          wud.tag.transform.type: "semver"
          wud.link.template: "https://github.com/jlesage/docker-crashplan-pro/pkgs/container/crashplan-pro"
        cpu_shares: "{{ crashplanpro_cpu_shares }}"
        memory: "{{ crashplanpro_memory }}"
        restart_policy: unless-stopped

    - name: Access {{ ansible_nas_app_name }} at
      ansible.builtin.debug:
        msg: >-
              {{
                ['http://' + hostvars[inventory_hostname]['ansible_default_ipv4']['address'] + ':' + (crashplanpro_port_http | string)] +
                (['https://' + crashplanpro_hostname + '.' + ansible_nas_domain] if (crashplanpro_available_externally is true or crashplanpro_dockflare_tunnel is true) else [])
              }}
  when: crashplanpro_enabled is true

- name: Stop {{ ansible_nas_app_name }}
  block:
    - name: Stop {{ ansible_nas_app_name }} Container
      community.docker.docker_container:
        name: "{{ crashplanpro_container_name }}"
        state: absent
  when: crashplanpro_enabled is false

- name: Data Archive {{ ansible_nas_app_name }}
  block:
    - name: Check for {{ ansible_nas_app_name }} Data Directory
      stat:
        path: "{{ crashplanpro_data_directory }}"
      register: dir_stat

    - name: Archive {{ ansible_nas_app_name }} Data Directory
      ansible.builtin.archive:
        path: "{{ crashplanpro_data_directory }}"
        dest: "{{ docker_home }}/{{ ansible_nas_app_name | lower }}.zip"
        force_archive: true
        format: zip
        owner: ansible-nas
        group: ansible-nas
        mode: u=rw,g=rw
        remove: true
      when: dir_stat.stat.exists
  when: crashplanpro_enabled is false and archive_app_data_enabled is true
