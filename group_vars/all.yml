###
### DO NOT EDIT THIS FILE!
### Add your customisations to inventories/<your_inventory>/group_vars/nas.yml
###

###
### General
###

# User added to the docker group to give user command line access to docker
ansible_nas_user: user

# Your email address, used for Let's Encrypt SSL certs
ansible_nas_email: me@example.com

# Applications will have subdomain SSL certificates created if Traefik is enabled, e.g. ansible-nas.<your-domain>, nextcloud.<your-domain>
ansible_nas_domain: example.com

# Default admin password for apps (where pre-configurable)
ansible_nas_app_admin_password: "topsecret"

# Archive app data for disabled apps
archive_app_data_enabled: false

# Where to store Docker volumes
docker_home: /data/docker

# Where to store Docker images
docker_image_directory: "{{ docker_home }}/_images"

# docker-compose support
docker_compose_enabled: false

# Where to keep Docker Compose files (that you provide)
docker_compose_data_directory: "/home/{{ ansible_nas_user }}/docker-compose"

# DNS server for ANE server to use
ansible_nas_dns: 1.1.1.1

# LAN and WAN definitions for traefik IP whitelisting
# you can easily add multiple networks to whitelist, just define them and add them to lan; e.g.:
# vpn_whitelist: 192.168.99.0/16
# lan: "{{ lan_whitelist }}, {{ vpn_whitelist }}"
lan_whitelist: "{{ ansible_default_ipv4.network }}/{{ ansible_default_ipv4.prefix }}"
lan: "{{ lan_whitelist }}"
wan: "0.0.0.0/0"

# NVIDIA runtime support for transcoding and AI
nvidia_runtime_enabled: false

###
### Samba
###

# Share media libraires (proper NAS) or not (app server)
samba_share_libraries: true

# The location where all shares will be created by default. Can be overridden on a per-share basis.
samba_shares_root: /data/shares

# Where your anime library is stored
anime_root: "{{ samba_shares_root }}/anime"

# Where your audiobooks library is stored
audiobooks_root: "{{ samba_shares_root }}/audiobooks"

# This path will be mounted to backup containers, Duplicati
backups_root: "{{ samba_shares_root }}/backups"

# Where your books library is stored
books_root: "{{ samba_shares_root }}/books"

# Where your personal repos and code are stored
code_root: "{{ samba_shares_root }}/code"

# Where your comics library is stored
comics_root: "{{ samba_shares_root }}/comics"

# Where your CBT courses library is stored
courses_root: "{{ samba_shares_root }}/courses"

# Where paperless_ng consumes documents
documents_root: "{{ samba_shares_root }}/documents"

# Where your downloaded files are stored
downloads_root: "{{ samba_shares_root }}/downloads"

# Where misc. files are dumped
dump_root: "{{ samba_shares_root }}/dump"

# Where your games library is stored
games_root: "{{ samba_shares_root }}/games"

# Where your movies library is stored
movies_root: "{{ samba_shares_root }}/movies"

# Where your music library is stored
music_root: "{{ samba_shares_root }}/music"

# Where your photos library is stored
photos_root: "{{ samba_shares_root }}/photos"

# Where your podcast library is stored
podcasts_root: "{{ samba_shares_root }}/podcasts"

# Where your porn library is stored
porn_root: "{{ samba_shares_root }}/porn"

# Where your video and audio recordings are stored
recordings_root: "{{ samba_shares_root }}/recordings"

# Where your ROMs library is stored
roms_root: "{{ samba_shares_root }}/roms"

# Where your torrent files are stored (picked up by Transmission for downloading)
torrents_root: "{{ samba_shares_root }}/torrents"

# Where your TV episodes library is stored
tv_root: "{{ samba_shares_root }}/tv"

# Shares you want published over Samba.
samba_shares:
