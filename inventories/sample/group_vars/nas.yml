##  Ansible-NAS-Enhanced - https://github.com/bcurran3/ansible-nas-enhanced

# Add your all.yml config overrides to this file.
# See group_vars/all.yml for all possible settings.

# Defaults you want to customize:
ansible_nas_hostname: ANE
ansible_nas_timezone: Etc/UTC
ansible_nas_user: yourname
ansible_nas_email: you@example.com
ansible_nas_domain: example.com
ansible_nas_dns: 1.1.1.1
# Where you want to store Docker volumes.
docker_home: /data/docker
# Where you want to store Docker images.
docker_image_directory: "{{ docker_home }}/_images"
# If you have an NVIDIA GPU for AI or transcoding
nvidia_runtime_enabled: false

# Extra apt packages you want installed:
ansible_nas_extra_packages:
  - ansible-lint
  - iputils-ping
  - nano
#  - nfs-common
#  - samba
#  - bonnie++
#  - net-tools

## Applications to enable:
homepage_enabled: true
portainer_enabled: true
