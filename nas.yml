---
- name: Ansible-NAS-Enhanced
  hosts: all

  roles:
    ###
    ### Requirements
    ###

    - role: vladgh.samba.server        # ANE requirement
      tags:
        - samba
        - skip_ansible_lint

    - role: geerlingguy.nfs            # ANE requirement
      tags:
        - nfs
        - skip_ansible_lint

    - role: geerlingguy.docker         # ANE requirement
      vars:
        docker_apt_release_channel: stable
        docker_apt_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"
        docker_apt_repository: "deb [arch={{ docker_apt_arch }}{{' signed-by=/etc/apt/keyrings/docker.asc' if add_repository_key is not failed}}] {{ docker_repo_url }}/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} {{ docker_apt_release_channel }}"
        docker_apt_ignore_key_error: True
        docker_apt_gpg_key: "{{ docker_repo_url }}/{{ ansible_distribution | lower }}/gpg"
        docker_apt_filename: "download_docker_com_linux_ubuntu"
      tags:
        - docker
        - skip_ansible_lint

    ###
    ### Ansible-NAS-Enhanced Core Roles
    ###

    - role: ansible-nas-users          # ANE core
      tags:
        - ansible-nas-users
        - ansible-nas
        - ansible-nas-enhanced

    - role: ansible-nas-general        # ANE core
      tags:
        - ansible-nas-general
        - ansible-nas
        - ansible-nas-enhanced

    - role: ansible-nas-docker         # ANE core
      tags:
        - ansible-nas-docker
        - ansible-nas
        - ansible-nas-enhanced
        - nvidia-runtime
        - nvidia_runtime
        - nvidiaruntime

    ###
    ### Stacks
    ###

    - role: logging                    # ANE stack (Grafana, MinIO, Loki, Promtail)
      tags:
        - logging

    ###
